<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twins Matrix Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; color: #1a1a1a; -webkit-font-smoothing: antialiased; }
        
        /* Células de Datos: Diseño Único */
        .data-cell { background: #ffffff; border: 1px solid #eee; border-radius: 4px; transition: all 0.2s; position: relative; overflow: hidden; }
        .data-cell-active { border-left: 6px solid #2563eb; background: #f8faff; }
        
        /* Botones de Acción Táctica */
        .btn-tactical { background: #1a1a1a; color: #fff; font-weight: 900; letter-spacing: 0.05em; padding: 1.25rem; border-radius: 4px; text-transform: uppercase; width: 100%; transition: 0.2s; }
        .btn-tactical:active { background: #2563eb; transform: translateY(2px); }

        /* Input de Grado Industrial */
        .industrial-input { width: 100%; background: #f5f5f5; border: 1px solid #ddd; padding: 1rem; font-size: 1.1rem; font-weight: 700; border-radius: 4px; outline: none; transition: 0.2s; }
        .industrial-input:focus { background: #fff; border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .view { display: none; padding: 1.5rem; flex-direction: column; min-height: 100vh; }
        .view.active { display: flex; animation: k-fade 0.3s ease; }
        @keyframes k-fade { from { opacity: 0; } to { opacity: 1; } }

        .status-badge { font-size: 0.7rem; font-weight: 900; padding: 0.2rem 0.6rem; border-radius: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav class="bg-white border-b-2 border-slate-100 px-6 py-5 flex justify-between items-center sticky top-0 z-50">
        <div>
            <span class="text-[10px] font-black text-blue-600 block leading-none tracking-[0.3em]">VERSION 4.0</span>
            <h1 class="text-xl font-black italic tracking-tighter">TWINS<span class="text-slate-400">CORE</span></h1>
        </div>
        <div id="connection-status" class="flex items-center gap-2">
            <span class="text-[10px] font-bold text-slate-400">DATABASE SYNC</span>
            <div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
        </div>
    </nav>

    <div id="view-home" class="view active">
        <div class="mb-8">
            <h2 class="text-4xl font-black text-slate-900 leading-tight">Módulo de<br>Despachos.</h2>
        </div>

        <div class="space-y-4">
            <div onclick="navTo('crear')" class="data-cell p-6 flex justify-between items-center border-2 border-slate-200 hover:border-blue-500 cursor-pointer">
                <div>
                    <p class="text-2xl font-black">NUEVA CARGA</p>
                    <p class="text-xs font-bold text-slate-400">INICIAR REGISTRO DE SALIDA</p>
                </div>
                <div class="text-blue-600">
                    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                </div>
            </div>

            <div onclick="navTo('historial')" class="data-cell p-6 flex justify-between items-center opacity-70">
                <div>
                    <p class="text-xl font-bold">HISTORIAL DE LOGS</p>
                    <p class="text-xs font-bold text-slate-400">REPORTES AUTORIZADOS</p>
                </div>
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </div>
        </div>

        <div class="mt-auto py-8">
            <div class="border-t pt-6">
                <p class="text-[10px] font-black text-slate-400 tracking-widest uppercase mb-2">Responsable Logístico</p>
                <p class="font-bold text-slate-900">J. Angelo Nuñez Durand</p>
            </div>
        </div>
    </div>

    <div id="view-crear" class="view">
        <div class="flex items-center justify-between mb-8">
            <button onclick="navTo('home')" class="font-black text-xs text-blue-600">← CANCELAR</button>
            <span class="text-[10px] font-black text-slate-400 tracking-widest uppercase">Paso 01: Setup</span>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-black text-slate-500 mb-2 block tracking-widest">ID DE DOCUMENTO / CONTENEDOR</label>
                <input type="text" id="c-id" class="industrial-input uppercase text-blue-600" placeholder="DIGITE REFERENCIA">
            </div>

            <div class="relative">
                <label class="text-[10px] font-black text-slate-500 mb-2 block tracking-widest">BÚSQUEDA DE MATERIAL (SKU)</label>
                <input type="text" id="s-sku" oninput="searchMaster()" class="industrial-input" placeholder="ESCRIBA CÓDIGO O NOMBRE">
                <div id="results" class="absolute z-50 left-0 right-0 bg-white border border-slate-200 shadow-2xl hidden max-h-60 overflow-y-auto"></div>
            </div>

            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="text-[10px] font-black text-slate-500 mb-2 block tracking-widest">CANTIDAD META</label>
                    <input type="number" id="s-meta" class="industrial-input text-center text-3xl" placeholder="0">
                </div>
                <button onclick="addToQueue()" class="w-24 bg-blue-600 text-white font-black text-4xl rounded-sm">＋</button>
            </div>
        </div>

        <div id="queue-list" class="mt-10 space-y-2 pb-32"></div>

        <div class="fixed bottom-0 left-0 right-0 p-6 bg-white border-t border-slate-100">
            <button onclick="initWork()" class="btn-tactical">Activar Terminal de Conteo</button>
        </div>
    </div>

    <div id="view-ops" class="view" style="background: #fff;">
        <div class="mb-6 flex justify-between items-end">
            <div>
                <p id="op-ref-label" class="text-[10px] font-black text-blue-600 tracking-widest"></p>
                <h2 class="text-2xl font-black uppercase tracking-tighter">Conteo en Curso</h2>
            </div>
            <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
        </div>

        <div class="data-cell data-cell-active p-8 mb-6 shadow-sm">
            <label class="text-[10px] font-black text-slate-400 block mb-4 uppercase tracking-widest">Producto en Mano</label>
            <select id="sel-sku" onchange="refreshOpsUI()" class="w-full bg-transparent text-3xl font-black outline-none mb-8 border-none appearance-none"></select>
            
            <div class="flex gap-4">
                <input type="number" id="qty-in" class="industrial-input h-24 text-6xl text-center flex-1 !bg-slate-50 border-none" placeholder="0">
                <button onclick="registerUnits()" class="w-24 h-24 bg-blue-600 text-white flex items-center justify-center">
                    <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                </button>
            </div>
        </div>

        <div id="op-feed" class="space-y-4 pb-48 overflow-y-auto"></div>

        <div class="fixed bottom-0 left-0 right-0 p-6 bg-white border-t-2 border-slate-100">
            <button onclick="finalizeAndSign()" class="btn-tactical !bg-emerald-600">Finalizar & Generar Reporte</button>
        </div>
    </div>

    <div id="view-historial" class="view">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="navTo('home')" class="font-black text-xs text-blue-600">VOLVER</button>
            <h2 class="text-xl font-black">LOGS DE AUDITORÍA</h2>
        </div>
        <div id="hist-list" class="space-y-4 pb-20"></div>
    </div>

    <script>
        const CLOUD_ENDPOINT = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let masterStock = {};
        let jobQueue = [];
        let currentSession = null;

        async function initApp() {
            try {
                const res = await fetch(CLOUD_ENDPOINT);
                const data = await res.json();
                data.forEach(i => { if(i.CODIGO) masterStock[i.CODIGO.toString().trim().toUpperCase()] = i.DESCRIPCION; });
            } catch(e) { console.error("Error offline"); }
            
            const saved = localStorage.getItem('twins_active_session');
            if(saved) { currentSession = JSON.parse(saved); navTo('ops'); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'historial') renderHistory();
            if(v === 'ops' && currentSession) refreshOpsUI();
        }

        function searchMaster() {
            const val = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('results');
            if(val.length < 2) { resDiv.classList.add('hidden'); return; }
            
            const matches = Object.entries(masterStock).filter(([k,v]) => k.includes(val) || v.toUpperCase().includes(val)).slice(0, 5);
            resDiv.innerHTML = matches.map(([k,v]) => `
                <div onclick="selectProduct('${k}')" class="p-6 border-b border-slate-100 hover:bg-slate-50 active:bg-blue-600 transition-colors">
                    <p class="font-black text-sm">${k}</p>
                    <p class="text-[10px] text-slate-500 font-bold uppercase truncate">${v}</p>
                </div>
            `).join('');
            resDiv.classList.remove('hidden');
        }

        function selectProduct(k) {
            document.getElementById('s-sku').value = k;
            document.getElementById('results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function addToQueue() {
            const sku = document.getElementById('s-sku').value.toUpperCase();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            jobQueue.push({ sku, desc: masterStock[sku] || "ID NO CATALOGADO", meta, real: 0 });
            renderQueue();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderQueue() {
            document.getElementById('queue-list').innerHTML = jobQueue.map((item, idx) => `
                <div class="data-cell p-4 flex justify-between items-center bg-slate-50">
                    <div><p class="font-black text-sm">${item.sku}</p><p class="text-[10px] font-black text-slate-400">PLAN: ${item.meta} UNIDADES</p></div>
                    <button onclick="jobQueue.splice(${idx},1);renderQueue()" class="text-red-500 font-black px-4 text-xl">×</button>
                </div>
            `).join('');
        }

        function initWork() {
            if(jobQueue.length === 0) return;
            const id = document.getElementById('c-id').value.toUpperCase() || "AUDIT-" + Date.now().toString().slice(-4);
            currentSession = { id, items: [...jobQueue], date: new Date().toLocaleString(), status: 'PENDIENTE' };
            localStorage.setItem('twins_active_session', JSON.stringify(currentSession));
            
            let h = JSON.parse(localStorage.getItem('twins_master_hist')) || [];
            h.unshift(currentSession);
            localStorage.setItem('twins_master_hist', JSON.stringify(h));
            
            jobQueue = [];
            navTo('ops');
        }

        function refreshOpsUI() {
            document.getElementById('op-ref-label').innerText = "ID: " + currentSession.id;
            document.getElementById('sel-sku').innerHTML = currentSession.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            renderLiveFeed();
        }

        function registerUnits() {
            const val = parseInt(document.getElementById('qty-in').value);
            if(!val) return;
            const target = currentSession.items.find(i => i.sku === document.getElementById('sel-sku').value);
            if(target) target.real += val;
            document.getElementById('qty-in').value = '';
            localStorage.setItem('twins_active_session', JSON.stringify(currentSession));
            renderLiveFeed();
        }

        function renderLiveFeed() {
            document.getElementById('op-feed').innerHTML = currentSession.items.map(i => {
                const pc = Math.min(Math.round((i.real / i.meta) * 100), 100);
                const isSelected = i.sku === document.getElementById('sel-sku').value;
                return `
                <div class="data-cell p-5 ${isSelected ? 'border-2 border-blue-600 bg-blue-50' : 'opacity-40'}">
                    <div class="flex justify-between items-end mb-4">
                        <div><p class="text-[10px] font-black text-slate-500 uppercase">${i.sku}</p><p class="text-3xl font-black">${i.real} <span class="text-xs text-slate-400">/ ${i.meta}</span></p></div>
                        <span class="text-xs font-black ${pc >= 100 ? 'text-emerald-500' : 'text-blue-600'}">${pc}%</span>
                    </div>
                    <div class="h-2 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-blue-600" style="width:${pc}%"></div></div>
                </div>`;
            }).join('');
        }

        function finalizeAndSign() {
            if(!confirm("¿CONFIRMAR CIERRE FINAL? ESTA ACCIÓN GENERARÁ EL REPORTE DE AUDITORÍA.")) return;
            
            let h = JSON.parse(localStorage.getItem('twins_master_hist')) || [];
            const idx = h.findIndex(x => x.id === currentSession.id && x.status !== 'CERRADO');
            currentSession.status = 'CERRADO';
            if(idx !== -1) h[idx] = currentSession;
            
            localStorage.setItem('twins_master_hist', JSON.stringify(h));
            generateMatrixPDF(currentSession);
            
            localStorage.removeItem('twins_active_session');
            currentSession = null;
            navTo('home');
        }

        function generateMatrixPDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header Minimalista Industrial
            doc.setFillColor(26, 26, 26); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.setFont("helvetica", "bold"); doc.text("INFORME DE VERIFICACIÓN LOGÍSTICA", 14, 25);
            doc.setFontSize(9); doc.setTextColor(150); doc.text("SISTEMA MATRIX CORE - CONTROL DE SALIDAS", 14, 32);
            
            doc.setTextColor(30); doc.setFontSize(10);
            doc.text(`CÓDIGO DE AUDITORÍA: ${data.id}`, 14, 55);
            doc.text(`FECHA DE EMISIÓN: ${data.date}`, 14, 60);

            doc.autoTable({
                startY: 70,
                head: [['SKU', 'DESCRIPCIÓN', 'OBJETIVO', 'REAL', 'DIFERENCIA']],
                body: data.items.map(i => [i.sku, i.desc.slice(0,35), i.meta, i.real, (i.real - i.meta)]),
                theme: 'plain',
                headStyles: { fontStyle: 'bold', borderBottom: '1px solid black' },
                columnStyles: { 4: { fontStyle: 'bold' } }
            });

            const finalY = doc.lastAutoTable.finalY + 30;
            doc.line(14, finalY, 100, finalY);
            doc.setFontSize(8);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, finalY + 5);
            doc.save(`MATRIX_CORE_${data.id}.pdf`);
        }

        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('twins_master_hist')) || [];
            document.getElementById('hist-list').innerHTML = h.map(x => `
                <div class="data-cell p-6 border-l-8 ${x.status === 'CERRADO' ? 'border-l-emerald-500' : 'border-l-blue-500'}">
                    <div class="flex justify-between items-start mb-6">
                        <div><p class="text-[10px] text-slate-400 font-black mb-1">${x.date}</p><h3 class="text-2xl font-black italic tracking-tighter">${x.id}</h3></div>
                        <span class="status-badge ${x.status === 'CERRADO' ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'}">${x.status}</span>
                    </div>
                    <button onclick='generateMatrixPDF(${JSON.stringify(x)})' class="btn-tactical !p-3 text-[10px]">Descargar Auditoría PDF</button>
                </div>
            `).join('');
        }

        initApp();
    </script>
</body>
</html>
