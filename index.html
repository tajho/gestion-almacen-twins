<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TITAN | Devoluciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --primary: #0052cc;
            --danger: #ff5630;
            --bg: #f7f8fa;
            --surface: #ffffff;
            --text: #172b4d;
            --border: #ebecf0;
        }

        body { 
            background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text); padding-bottom: 100px; margin: 0;
        }

        /* BARRA DE CARGA INVISIBLE (Solo un hilo superior) */
        #stealth-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px;
            z-index: 9999; background: transparent;
        }
        .active-sync { background: linear-gradient(90deg, transparent, var(--primary), transparent); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .app-header {
            background: #fff; padding: 18px 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .main-card {
            background: var(--surface); border-radius: 24px; padding: 24px;
            margin: 16px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        .label-pro { font-size: 11px; font-weight: 800; color: #6b778c; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.5px; }

        .input-pro {
            width: 100%; padding: 14px 16px; border-radius: 12px; border: 2px solid var(--border);
            font-size: 15px; font-weight: 600; margin-bottom: 18px; transition: 0.2s; background: #fff;
        }
        .input-pro:focus { border-color: var(--primary); outline: none; background: #fbfcfe; }

        .search-box { position: relative; }
        .search-results {
            position: absolute; width: 100%; background: #fff; border-radius: 12px;
            border: 1px solid var(--border); z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-height: 250px; overflow-y: auto; display: none; margin-top: -10px;
        }

        /* TARJETAS DE HISTORIAL */
        .history-card {
            background: #fff; border-radius: 18px; padding: 16px; margin-bottom: 12px;
            border: 1px solid var(--border); border-left: 5px solid var(--danger);
        }
        .hc-time { font-size: 11px; font-weight: 800; color: var(--danger); background: #fff0ed; padding: 3px 10px; border-radius: 20px; }
        
        .footer-claim { 
            font-size: 9px; font-weight: 700; color: #97a0af; text-align: center;
            margin-top: 15px; padding-top: 10px; border-top: 1px solid #f4f5f7;
        }

        /* NAVEGACIÓN 2 OPCIONES */
        .nav-titan {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: #172b4d; border-radius: 24px; display: flex;
            padding: 12px; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .nav-item { 
            flex: 1; border: none; background: none; color: #a5adba;
            font-size: 11px; font-weight: 800; text-align: center;
        }
        .nav-item.active { color: #fff; background: rgba(255,255,255,0.1); border-radius: 16px; padding: 8px 0; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="stealth-loader"></div>

    <header class="app-header">
        <div>
            <span class="fw-800" style="font-size: 20px;">TITAN <span style="color:var(--danger)">DEV</span></span>
        </div>
        <div class="text-end">
            <small class="d-block fw-800 text-muted" style="font-size: 10px;">RESPONSABLE</small>
            <span class="fw-700" style="font-size: 14px;">Angelo Durand</span>
        </div>
    </header>

    <main class="container p-0">
        <section id="v-ret" class="view">
            <div class="main-card">
                <span class="label-pro">Origen de Mercadería</span>
                <input type="text" id="cli-r" class="input-pro" placeholder="Cliente o Proveedor">

                <span class="label-pro">Buscador de Ítem</span>
                <div class="search-box">
                    <input type="text" id="src-r" class="input-pro" placeholder="SKU o Nombre del producto..." oninput="find(this.value)">
                    <div id="res-r" class="search-results"></div>
                </div>

                <div id="form-r" class="d-none mt-2 p-3 rounded-4" style="background: #fff5f5; border: 1px solid #ffdbdb;">
                    <b id="p-n-r" class="d-block text-danger mb-3" style="font-size: 16px;"></b>
                    <div class="row g-2 mb-3">
                        <div class="col-6"><span class="label-pro">Cant. Guía</span><input type="number" id="cg-r" class="input-pro" placeholder="0"></div>
                        <div class="col-6"><span class="label-pro">Cant. Real</span><input type="number" id="cr-r" class="input-pro" placeholder="0"></div>
                    </div>
                    <span class="label-pro">Motivo de Devolución</span>
                    <select id="st-r" class="input-pro">
                        <option value="MERMA">FALLADO / MERMA</option>
                        <option value="CAMBIO">CAMBIO DE PRODUCTO</option>
                        <option value="GARANTIA">GARANTÍA TÉCNICA</option>
                    </select>
                    <button class="btn btn-danger w-100 py-3 rounded-4 fw-800" onclick="addItem()">AÑADIR A LA LISTA</button>
                </div>

                <div id="list-r" class="mt-4 d-none">
                    <div id="items-r"></div>
                    <button class="btn btn-dark w-100 py-3 rounded-4 fw-800 mt-3" onclick="invisibleSync()">SINCRONIZAR INVISIBLE</button>
                </div>
            </div>
        </section>

        <section id="v-his" class="view d-none">
            <div id="feed-his" class="p-3"></div>
        </section>
    </main>

    <nav class="nav-titan">
        <button class="nav-item active" onclick="nav('ret', this)"><i class="fas fa-box-open"></i>DEVOLUCIONES</button>
        <button class="nav-item" onclick="nav('his', this)"><i class="fas fa-history"></i>HISTORIAL</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCeMB7Cf1DpA41NEmprwR0XqrvdD_-xTEbl3vKsMlaHIp_r3b5MpMWcbrQKyOiYFF2NQ/exec";
        let MASTER = []; let CART = []; let HIS_DATA = {};

        async function init() {
            try {
                const r = await fetch(API, {method: "POST", body: JSON.stringify({action: "load"})});
                const d = await r.json();
                MASTER = d.p;
                processHis(d.h);
            } catch(e) { console.warn("Offline"); }
        }

        function find(v) {
            const box = document.getElementById('res-r');
            if(v.length < 1) { box.style.display='none'; return; }
            const m = MASTER.filter(p => p[1].toLowerCase().includes(v.toLowerCase()) || p[0].toString().includes(v)).slice(0,5);
            box.innerHTML = m.map(p => `<div class="p-3 border-bottom" onclick="pick('${p[0]}','${p[1]}')"><b>${p[1]}</b><br><small class="text-muted">${p[0]}</small></div>`).join('');
            box.style.display = m.length ? 'block' : 'none';
        }

        function pick(s, n) {
            window.lastItem = {sku: s, name: n};
            document.getElementById('p-n-r').innerText = n;
            document.getElementById('form-r').classList.remove('d-none');
            document.getElementById('res-r').style.display = 'none';
        }

        function addItem() {
            const cg = document.getElementById('cg-r').value;
            const cr = document.getElementById('cr-r').value;
            if(!cr) return;
            CART.push({...window.lastItem, cg, cr, st: document.getElementById('st-r').value});
            document.getElementById('form-r').classList.add('d-none');
            document.getElementById('src-r').value = '';
            renderCart();
        }

        function renderCart() {
            const cont = document.getElementById('list-r');
            const items = document.getElementById('items-r');
            cont.classList.toggle('d-none', CART.length === 0);
            items.innerHTML = CART.map((i, idx) => `
                <div class="p-3 mb-2 bg-white rounded-3 border d-flex justify-content-between align-items-center">
                    <div><b>${i.cr}</b> x ${i.name}<br><small class="text-muted">${i.st}</small></div>
                    <i class="fas fa-trash text-muted" onclick="CART.splice(${idx},1); renderCart();"></i>
                </div>
            `).join('');
        }

        // --- SINCRONIZACIÓN INVISIBLE ---
        async function invisibleSync() {
            const cli = document.getElementById('cli-r').value;
            if(!cli) return Swal.fire("Error", "Falta el Cliente", "error");

            const bar = document.getElementById('stealth-loader');
            const payload = CART.map(i => [new Date(), "DEVOLUCION", i.sku, i.name, i.cr, cli, `Guía: ${i.cg} | Motivo: ${i.st}`]);
            
            // Acción inmediata: Limpiar UI y mostrar hilo de carga
            bar.className = 'active-sync';
            CART = []; renderCart();
            document.getElementById('cli-r').value = '';
            
            // Sincronización en segundo plano
            fetch(API, {method: "POST", body: JSON.stringify({action: "save", sheet: "Devoluciones", payload})})
            .then(() => {
                bar.className = '';
                init(); // Actualiza historial silenciosamente
            });
        }

        function processHis(data) {
            const groups = {};
            data.filter(r => r[1] === "DEVOLUCION").forEach(r => {
                const d = new Date(r[0]);
                const time = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const key = r[5] + "_" + time;
                if(!groups[key]) groups[key] = { cli: r[5], time, date: d.toLocaleDateString(), prods: [] };
                groups[key].prods.push({ n: r[3], q: r[4], s: r[2], m: r[6] });
            });
            HIS_DATA = groups;
            renderHis();
        }

        function renderHis() {
            const feed = document.getElementById('feed-his');
            feed.innerHTML = Object.values(HIS_DATA).reverse().slice(0, 15).map(g => `
                <div class="history-card" onclick="verPop('${btoa(JSON.stringify(g))}')">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="hc-time">${g.time}</span>
                        <small class="text-muted fw-bold">${g.date}</small>
                    </div>
                    <div class="fw-800" style="font-size: 17px;">${g.cli}</div>
                    <div class="text-muted" style="font-size: 13px;">${g.prods.length} productos devueltos</div>
                    <div class="footer-claim">Autorizado: J. Angelo Nuñez Durand</div>
                </div>
            `).join('');
        }

        function verPop(dataStr) {
            const g = JSON.parse(atob(dataStr));
            Swal.fire({
                title: 'Detalle de Devolución',
                html: `
                    <div class="text-start" style="font-size:14px">
                        <div class="mb-3 p-3 bg-light rounded-4">
                            <b>Origen:</b> ${g.cli}<br>
                            <b>Registro:</b> ${g.date} ${g.time}
                        </div>
                        ${g.prods.map(p => `
                            <div class="border-bottom py-2">
                                <b>${p.q} unid.</b> - ${p.n}<br>
                                <small class="text-muted">${p.m}</small>
                            </div>
                        `).join('')}
                    </div>
                `,
                confirmButtonText: 'GENERAR PDF',
                showCancelButton: true,
                cancelButtonText: 'CERRAR',
                confirmButtonColor: '#ff5630',
                customClass: { popup: 'rounded-5' }
            }).then(r => { if(r.isConfirmed) genPDF(g); });
        }

        function genPDF(g) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.text("REPORTE DE DEVOLUCIÓN", 14, 20);
            doc.setFontSize(10);
            doc.text(`CLIENTE/ORIGEN: ${g.cli}`, 14, 30);
            doc.text(`FECHA: ${g.date} | HORA: ${g.time}`, 14, 35);

            doc.autoTable({
                startY: 45,
                head: [['Cant', 'Producto', 'Detalles']],
                body: g.prods.map(p => [p.q, p.n, p.m]),
                headStyles: { fillColor: [255, 86, 48] }
            });

            doc.setFontSize(8);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 105, doc.lastAutoTable.finalY + 20, {align:'center'});
            doc.save(`DEV_${g.cli}.pdf`);
        }

        function nav(v, btn) {
            document.querySelectorAll('.view').forEach(x => x.classList.add('d-none'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('v-'+v).classList.remove('d-none');
            btn.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
