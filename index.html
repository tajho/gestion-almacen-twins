<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJHO.OS v14.1 - Smart Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #0f172a; overflow: hidden; height: 100vh; }
        
        .glass-card { background: white; border-radius: 2.2rem; box-shadow: 0 8px 30px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.03); }
        .input-tajho { background: #f1f5f9; border-radius: 1.2rem; border: 2px solid transparent; transition: all 0.2s; font-weight: 700; text-align: center; }
        .input-tajho:focus { border-color: var(--accent); background: white; }
        
        .main-scroll { height: calc(100vh - 130px); overflow-y: auto; scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Animaciones inteligentes para no perder el foco */
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-shadow { shadow-[0_-10px_40px_rgba(0,0,0,0.05)]; }
    </style>
</head>
<body class="flex flex-col">

    <header class="px-7 pt-6 pb-2 flex justify-between items-center shrink-0">
        <div>
            <h1 class="text-2xl font-[800] tracking-tighter text-slate-900 leading-none">TAJHO<span class="text-blue-600">.OS</span></h1>
            <p class="text-[8px] font-extrabold text-slate-400 uppercase tracking-widest mt-1.5">Inventory Management V14.1</p>
        </div>
        <div class="text-right">
            <p class="text-[7px] font-black text-slate-300 uppercase mb-1">Efficiency Timer</p>
            <div class="bg-blue-50 px-3 py-1 rounded-xl border border-blue-100/50">
                <span id="timer-val" class="text-[11px] font-black text-blue-600 font-mono">00:00:00</span>
            </div>
        </div>
    </header>

    <main class="main-scroll no-scrollbar px-5">
        
        <section id="tab-recepcion" class="space-y-4 pt-3 fade-in">
            
            <div id="stats-panel" class="hidden">
                <div class="bg-[#0f172a] rounded-[2rem] p-6 text-white shadow-xl relative overflow-hidden">
                    <div class="flex justify-between items-end mb-4">
                        <div class="space-y-1">
                            <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest opacity-80">Progreso Global</p>
                            <h2 id="global-perc" class="text-4xl font-black italic leading-none">0%</h2>
                        </div>
                        <div class="text-right">
                            <p id="global-counter" class="text-sm font-black tracking-tight">0 / 0</p>
                            <p class="text-[8px] font-bold text-slate-500 uppercase">Unidades Totales</p>
                        </div>
                    </div>
                    <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                        <div id="global-bar" class="h-full bg-blue-500 duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div id="config-card" class="glass-card p-6 space-y-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center text-blue-600 font-bold">+</div>
                    <h3 class="font-bold text-slate-800 text-xs uppercase tracking-tight">Configurar Contenedor</h3>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="in-cod" placeholder="CÓDIGO" class="input-tajho p-3.5 text-xs outline-none uppercase">
                    <input type="number" id="in-meta" placeholder="CANTIDAD" class="input-tajho p-3.5 text-xs outline-none">
                </div>
                
                <button onclick="addPackingItem()" class="w-full py-3.5 bg-slate-50 text-slate-400 rounded-2xl font-black text-[9px] uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">Añadir al Manifiesto</button>
                
                <div id="mini-list" class="max-h-[180px] overflow-y-auto space-y-2 no-scrollbar"></div>
                
                <button id="btn-start-ops" onclick="startOperations()" class="hidden w-full bg-blue-600 text-white py-4.5 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] shadow-lg shadow-blue-100">Iniciar Recepción</button>
            </div>

            <div id="ops-panel" class="hidden space-y-3">
                <div class="glass-card p-8 text-center space-y-6">
                    <div class="relative inline-block">
                        <select id="op-select" class="appearance-none bg-transparent font-black text-slate-800 text-2xl pr-6 outline-none"></select>
                        <div class="absolute right-0 top-1/2 -translate-y-1/2 text-blue-600 text-[10px]">▼</div>
                    </div>
                    
                    <input type="number" id="op-input" placeholder="0" class="w-full text-7xl font-black text-slate-900 bg-transparent text-center outline-none">
                    
                    <button onclick="submitCount()" class="w-full bg-blue-600 text-white py-4.5 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-xl shadow-blue-100">Registrar Bulto</button>
                </div>
                
                <div id="items-grid" class="space-y-2.5"></div>
                
                <button onclick="closeContainerReport()" class="w-full py-4 text-slate-300 font-bold text-[8px] uppercase tracking-[0.3em]">Finalizar Jornada</button>
            </div>
        </section>

        <section id="tab-historial" class="hidden space-y-3 pt-3 fade-in">
            <div class="sticky top-0 bg-[#f8fafc] pb-2 z-10">
                <input type="text" id="hist-search" oninput="filterHistory()" placeholder="🔍 Buscar por código o reporte..." class="input-tajho w-full p-4 text-left text-xs shadow-sm">
            </div>
            <div id="hist-container" class="space-y-2.5"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white h-20 flex justify-around items-center z-50 rounded-t-[2.2rem] shadow-[0_-10px_40px_rgba(0,0,0,0.03)] border-t border-slate-50 px-4">
        <button onclick="switchTab('tab-recepcion', this)" class="flex flex-col items-center flex-1 tab-active">
            <span class="text-xl mb-1">📦</span>
            <span class="text-[8px] font-black uppercase tracking-tighter">Carga</span>
        </button>
        <button onclick="switchTab('tab-devolucion', this)" class="flex flex-col items-center flex-1 text-slate-300">
            <span class="text-xl mb-1">🔄</span>
            <span class="text-[8px] font-black uppercase tracking-tighter">Devolu.</span>
        </button>
        <button onclick="switchTab('tab-historial', this)" class="flex flex-col items-center flex-1 text-slate-300">
            <span class="text-xl mb-1">📂</span>
            <span class="text-[8px] font-black uppercase tracking-tighter">Historial</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;
        let pList = [];
        let sec = 0, timer;

        function switchTab(id, el) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-slate-300'));
            el.classList.add('tab-active');
            if(id === 'tab-historial') renderHistory();
        }

        function addPackingItem() {
            const cod = document.getElementById('in-cod').value.toUpperCase();
            const meta = parseInt(document.getElementById('in-meta').value);
            if(!cod || !meta) return;
            pList.push({ cod, meta, real: 0 });
            renderMiniList();
            document.getElementById('in-cod').value = "";
            document.getElementById('in-meta').value = "";
            document.getElementById('btn-start-ops').classList.remove('hidden');
        }

        function renderMiniList() {
            const cont = document.getElementById('mini-list');
            cont.innerHTML = pList.map((p, idx) => `
                <div class="flex justify-between items-center bg-white p-3.5 rounded-xl border border-slate-100 fade-in">
                    <span class="text-[11px] font-black text-slate-800">${p.cod}</span>
                    <div class="flex items-center gap-3">
                        <span class="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-lg">${p.meta} UN</span>
                        <button onclick="pList.splice(${idx},1);renderMiniList()" class="text-slate-300 text-xs">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function startOperations() {
            document.getElementById('config-card').classList.add('hidden');
            document.getElementById('stats-panel').classList.remove('hidden');
            document.getElementById('ops-panel').classList.remove('hidden');
            document.getElementById('op-select').innerHTML = pList.map(p => `<option value="${p.cod}">${p.cod}</option>`).join('');
            timer = setInterval(() => {
                sec++;
                const h = Math.floor(sec/3600).toString().padStart(2,'0');
                const m = Math.floor((sec%3600)/60).toString().padStart(2,'0');
                const s = (sec%60).toString().padStart(2,'0');
                document.getElementById('timer-val').innerText = `${h}:${m}:${s}`;
            }, 1000);
            updateView();
        }

        function submitCount() {
            const cod = document.getElementById('op-select').value;
            const cant = parseInt(document.getElementById('op-input').value);
            if(!cant) return;
            pList.find(p => p.cod === cod).real += cant;
            document.getElementById('op-input').value = "";
            updateView();
            navigator.vibrate(40);
        }

        function updateView() {
            const tPlan = pList.reduce((a,b) => a + b.meta, 0);
            const tReal = pList.reduce((a,b) => a + b.real, 0);
            const perc = Math.round((tReal / tPlan) * 100) || 0;
            document.getElementById('global-perc').innerText = perc + "%";
            document.getElementById('global-bar').style.width = Math.min(perc, 100) + "%";
            document.getElementById('global-counter').innerText = `${tReal} / ${tPlan}`;
            
            const grid = document.getElementById('items-grid');
            grid.innerHTML = pList.map(p => `
                <div class="glass-card p-4 flex justify-between items-center border-l-4 ${p.real >= p.meta ? 'border-l-green-500' : 'border-l-blue-600'}">
                    <div>
                        <p class="text-[8px] font-black text-slate-400 uppercase tracking-tight">${p.cod}</p>
                        <p class="text-xs font-black text-slate-800">${p.real} / ${p.meta}</p>
                    </div>
                    <div class="w-20 h-1 bg-slate-50 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-600" style="width: ${Math.min((p.real/p.meta)*100, 100)}%"></div>
                    </div>
                </div>`).join('');
        }

        function closeContainerReport() {
            clearInterval(timer);
            const reportID = "TJ-" + Math.floor(1000 + Math.random() * 9000);
            const time = document.getElementById('timer-val').innerText;
            const storage = JSON.parse(localStorage.getItem('tajho_v14_data') || '[]');
            storage.unshift({ id: reportID, tipo: 'RECEPCIÓN', fecha: new Date().toLocaleString(), tiempo: time, data: [...pList] });
            localStorage.setItem('tajho_v14_data', JSON.stringify(storage));
            
            const doc = new jsPDF();
            doc.text("REPORTE TAJHO.OS", 14, 20);
            doc.autoTable({ startY: 30, head: [['SKU', 'PLAN', 'REAL', 'ST']], body: pList.map(i => [i.cod, i.meta, i.real, i.real >= i.meta ? 'OK' : 'F']) });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 15);
            doc.save(`${reportID}_Tajho.pdf`);
            location.reload();
        }

        function renderHistory(filter = "") {
            const cont = document.getElementById('hist-container');
            const storage = JSON.parse(localStorage.getItem('tajho_v14_data') || '[]');
            const filtered = storage.filter(h => h.id.includes(filter) || h.tipo.includes(filter) || (h.data && h.data.some(d => d.cod.includes(filter))));
            
            cont.innerHTML = filtered.map(h => `
                <div class="glass-card p-5 flex justify-between items-center">
                    <div>
                        <p class="text-[8px] font-bold text-slate-400 uppercase mb-1">${h.fecha}</p>
                        <h4 class="font-black text-slate-800 text-xs">${h.id} • ${h.tipo}</h4>
                    </div>
                    <div class="text-right">
                        <p class="text-[11px] font-black text-blue-600 font-mono">${h.tiempo}</p>
                    </div>
                </div>`).join('') || "<div class='text-center py-20 text-[10px] font-black text-slate-300'>SIN REGISTROS</div>";
        }

        function filterHistory() { renderHistory(document.getElementById('hist-search').value.toUpperCase()); }
    </script>
</body>
</html>
