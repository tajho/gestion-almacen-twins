<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inbound - Angelo Nuñez</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #22c55e; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { font-size: 1.2rem; color: var(--primary); margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .product-info { font-size: 0.85rem; color: var(--accent); font-weight: bold; min-height: 20px; margin-bottom: 10px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-add:active { background: #1e293b; transform: scale(0.98); }
        .btn-pdf { background: var(--success); color: white; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; font-size: 0.85rem; }
        th { background: #f1f5f9; padding: 10px; text-align: left; color: #64748b; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .badge { background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Ingreso de Mercadería</h2>
        <input type="text" id="nro_contenedor" placeholder="N° de Contenedor (Ej: 0116)">
        
        <div style="margin: 15px 0; border-top: 1px solid #eee;"></div>
        
        <label style="font-size: 0.75rem; color: #64748b;">CÓDIGO DE PRODUCTO</label>
        <input type="text" id="sku_input" placeholder="Escriba código..." oninput="buscarProducto(this.value)">
        <div id="display_desc" class="product-info"></div>
        
        <label style="font-size: 0.75rem; color: #64748b;">CANTIDAD DE PALLET</label>
        <input type="number" id="cant_input" placeholder="Ej: 15">
        
        <button class="btn btn-add" onclick="registrarEnExcel()">+ AGREGAR AL CONTEO</button>
    </div>

    <div class="card">
        <h2>Resumen del Conteo</h2>
        <table>
            <thead>
                <tr>
                    <th>SKU</th>
                    <th>Cant.</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla_resumen"></tbody>
        </table>
        <button class="btn btn-pdf" onclick="generarReporteFinal()">REGISTRAR CONTEO DE CONTENEDOR</button>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbwNlrpjV8BS3z0t3liodNkxpiO4HvrowLf9BtEta5cDSUZy_IL-0aPMLnMIhpzCRuwM/exec";
        let maestroLocal = [];
        let conteoFisico = {};

        // Carga el maestro de productos al iniciar la app
        window.onload = async () => {
            try {
                const response = await fetch(URL_API);
                maestroLocal = await response.json();
                console.log("Maestro cargado: ", maestroLocal.length, " productos");
            } catch (e) { console.error("Error cargando maestro"); }
        };

        function buscarProducto(sku) {
            sku = sku.trim().toUpperCase();
            const found = maestroLocal.find(p => p[0].toString().toUpperCase() === sku);
            const display = document.getElementById('display_desc');
            if(found) {
                display.innerText = "✓ " + found[1]; // Nombre del producto
                display.style.color = "var(--success)";
            } else {
                display.innerText = "Producto no encontrado en maestro";
                display.style.color = "#ef4444";
            }
        }

        async function registrarEnExcel() {
            const cont = document.getElementById('nro_contenedor').value;
            const sku = document.getElementById('sku_input').value.toUpperCase();
            const cant = parseInt(document.getElementById('cant_input').value);

            if(!cont || !sku || !cant) return alert("Por favor complete todos los campos");

            // Registro visual inmediato
            conteoFisico[sku] = (conteoFisico[sku] || 0) + cant;
            actualizarTabla();

            // Envío a la Base de Datos (Excel)
            try {
                await fetch(URL_API, {
                    method: 'POST',
                    mode: 'no-cors', // Importante para Apps Script
                    body: JSON.stringify({
                        contenedor: cont,
                        sku: sku,
                        cantidad: cant
                    })
                });
                
                // Limpiar campos para el siguiente pallet
                document.getElementById('sku_input').value = "";
                document.getElementById('cant_input').value = "";
                document.getElementById('display_desc').innerText = "";
                document.getElementById('sku_input').focus();
            } catch (e) {
                alert("Error al sincronizar con Excel");
            }
        }

        function actualizarTabla() {
            const tbody = document.getElementById('tabla_resumen');
            tbody.innerHTML = "";
            for(let key in conteoFisico) {
                tbody.innerHTML += `<tr><td>${key}</td><td><b>${conteoFisico[key]}</b></td><td><span class="badge">REGISTRADO</span></td></tr>`;
            }
        }

        function generarReporteFinal() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const cont = document.getElementById('nro_contenedor').value;
            let y = 20;

            doc.setFontSize(16).text("REPORTE FINAL DE INGRESO", 20, y);
            y += 10;
            doc.setFontSize(12).text(`Contenedor: ${cont}`, 20, y);
            y += 15;

            doc.setFontSize(10).text("SKU | CANTIDAD TOTAL | ESTADO", 20, y);
            y += 8;

            for(let sku in conteoFisico) {
                doc.text(`${sku} | ${conteoFisico[sku]} | CUADRA CON REGISTRO`, 20, y);
                y += 6;
            }

            y += 20;
            doc.setFontSize(10);
            doc.text("--------------------------------------------------", 20, y);
            y += 5;
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 20, y);
            doc.text("Asist. Inventario Logístico.", 20, y+5);

            doc.save(`Reporte_Contenedor_${cont}.pdf`);
            alert("Reporte Generado y Guardado.");
        }
    </script>
</body>
</html>
