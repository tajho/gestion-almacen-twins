<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TITAN DEV | Intelligence 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #0052cc;
            --danger: #ff5630;
            --bg: #f4f6f8;
            --glass: #ffffff;
        }

        body { 
            background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif;
            color: #172b4d; padding-bottom: 110px;
        }

        #sync-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            z-index: 9999; background: transparent; transition: 0.3s;
        }
        .syncing { background: linear-gradient(90deg, #ff5630, #0052cc); background-size: 200% 100%; animation: move 1.5s infinite linear; }
        @keyframes move { from { background-position: 100% 0; } to { background-position: -100% 0; } }

        .header-pro {
            background: #fff; padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .card-pro {
            background: #ffffff; border-radius: 28px; padding: 22px;
            margin: 15px; border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        .label-pro { font-size: 10px; font-weight: 800; color: #8993a4; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }

        .input-pro {
            width: 100%; padding: 14px 18px; border-radius: 14px; border: 2px solid #edeff2;
            font-size: 15px; font-weight: 600; margin-bottom: 18px; transition: 0.3s;
        }
        .input-pro:focus { border-color: var(--primary); outline: none; }

        /* CANVAS AREA */
        .canvas-container {
            border: 2px dashed #ccd1d9; border-radius: 18px; background: #fafbfc;
            position: relative; overflow: hidden; margin-bottom: 20px;
        }
        canvas { touch-action: none; width: 100%; height: 150px; cursor: crosshair; }
        .canvas-tool { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .btn-tool { background: #fff; border: 1px solid #ddd; padding: 5px 10px; border-radius: 8px; font-size: 12px; }

        /* HISTORY */
        .hist-item {
            background: #fff; border-radius: 20px; padding: 18px; margin-bottom: 12px;
            border-left: 5px solid var(--danger); box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .nav-titan {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: #172b4d; border-radius: 22px; display: flex;
            padding: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .nav-item { flex: 1; border: none; background: none; color: #7a869a; font-size: 10px; font-weight: 700; text-align: center; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        .btn-finish {
            background: #172b4d; color: #fff; border: none; border-radius: 16px;
            padding: 18px; font-weight: 800; width: 100%; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="sync-loader"></div>

    <header class="header-pro">
        <div>
            <div style="font-size: 18px; font-weight: 900;">TITAN <span style="color:var(--danger)">DEV</span></div>
            <div id="status-text" style="font-size: 9px; color: #36b37e; font-weight: 800;">● SISTEMA ACTIVO</div>
        </div>
        <div class="text-end">
            <span style="font-size: 12px; font-weight: 800; color: #172b4d;">Angelo Durand</span>
        </div>
    </header>

    <main class="container p-0">
        <section id="v-reg" class="view">
            <div class="card-pro">
                <span class="label-pro">Cliente</span>
                <input type="text" id="cli" class="input-pro" placeholder="Nombre de Cliente..." oninput="checkMem(this.value)">
                
                <span class="label-pro">Vendedor</span>
                <input type="text" id="ven" class="input-pro" placeholder="Vendedor asignado...">

                <span class="label-pro">Producto (SKU o Nombre)</span>
                <div class="position-relative">
                    <input type="text" id="src" class="input-pro" placeholder="Buscar ítem..." oninput="finding(this.value)">
                    <div id="res" class="list-group shadow-sm" style="position:absolute; width:100%; z-index:100; display:none; margin-top:-15px;"></div>
                </div>

                <div id="mini-form" class="d-none p-3 rounded-4 mb-3" style="background: #f4f5f7;">
                    <b id="p-name" class="d-block mb-2 text-danger"></b>
                    <div class="row g-2">
                        <div class="col-6"><input type="number" id="q" class="input-pro" placeholder="Cant."></div>
                        <div class="col-6"><button class="btn btn-danger w-100 rounded-3 py-2 fw-bold" onclick="add()">AÑADIR</button></div>
                    </div>
                </div>

                <div id="cart-list" class="mb-4"></div>

                <span class="label-pro"><i class="fas fa-pen"></i> Notas / Firma del proceso</span>
                <div class="canvas-container">
                    <canvas id="pad"></canvas>
                    <div class="canvas-tool">
                        <button class="btn-tool" onclick="clearPad()"><i class="fas fa-eraser"></i></button>
                    </div>
                </div>

                <button class="btn-finish" onclick="saveAll()">FINALIZAR Y GUARDAR <i class="fas fa-cloud-upload-alt ms-2"></i></button>
            </div>
        </section>

        <section id="v-his" class="view d-none">
            <div id="feed-his" class="p-3"></div>
        </section>
    </main>

    <nav class="nav-titan">
        <button class="nav-item active" onclick="nav('reg', this)"><i class="fas fa-plus-circle"></i>REGISTRO</button>
        <button class="nav-item" onclick="nav('his', this)"><i class="fas fa-receipt"></i>LOGS</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCeMB7Cf1DpA41NEmprwR0XqrvdD_-xTEbl3vKsMlaHIp_r3b5MpMWcbrQKyOiYFF2NQ/exec";
        let MASTER = [], CART = [], MEM = {}, HIS = [];
        let canvas, ctx, drawing = false;

        function init() {
            MEM = JSON.parse(localStorage.getItem('T_MEM')) || {};
            canvas = document.getElementById('pad');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            
            // Eventos de dibujo
            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', start);
            canvas.addEventListener('touchmove', draw);
            canvas.addEventListener('touchend', stop);

            fetchData();
        }

        async function fetchData() {
            try {
                const r = await fetch(API, {method: "POST", body: JSON.stringify({action: "load"})});
                const d = await r.json();
                MASTER = d.p; HIS = d.h;
                renderHis();
            } catch(e) {}
        }

        // --- LÓGICA DE DIBUJO ---
        function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = 150; }
        function start(e) { drawing = true; draw(e); }
        function stop() { drawing = false; ctx.beginPath(); }
        function draw(e) {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#172b4d';
            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
        }
        function clearPad() { ctx.clearRect(0,0,canvas.width,canvas.height); }

        // --- LÓGICA DE CARGA ---
        function checkMem(v) {
            const val = v.toUpperCase();
            if(MEM[val]) document.getElementById('ven').value = MEM[val];
        }

        function finding(v) {
            const res = document.getElementById('res');
            if(v.length < 1) { res.style.display='none'; return; }
            const m = MASTER.filter(p => p[1].toLowerCase().includes(v.toLowerCase()) || p[0].toString().includes(v)).slice(0,5);
            res.innerHTML = m.map(p => `<button class="list-group-item list-group-item-action text-start" onclick="pick('${p[0]}','${p[1]}')"><b>${p[1]}</b><br><small>${p[0]}</small></button>`).join('');
            res.style.display = m.length ? 'block' : 'none';
        }

        function pick(s, n) {
            window.last = {sku:s, name:n};
            document.getElementById('p-name').innerText = n;
            document.getElementById('mini-form').classList.remove('d-none');
            document.getElementById('res').style.display='none';
        }

        function add() {
            const q = document.getElementById('q').value;
            if(!q) return;
            CART.push({...window.last, q});
            document.getElementById('mini-form').classList.add('d-none');
            document.getElementById('src').value = '';
            renderCart();
        }

        function renderCart() {
            document.getElementById('cart-list').innerHTML = CART.map((i, idx) => `
                <div class="d-flex justify-content-between p-2 border-bottom">
                    <span><b>${i.q}</b> x ${i.name}</span>
                    <i class="fas fa-times text-danger" onclick="CART.splice(${idx},1); renderCart();"></i>
                </div>
            `).join('');
        }

        // --- GUARDADO INVISIBLE ---
        async function saveAll() {
            const cli = document.getElementById('cli').value.toUpperCase();
            const ven = document.getElementById('ven').value.toUpperCase();
            if(!cli || CART.length === 0) return Swal.fire("Incompleto", "Cliente y productos requeridos", "error");

            MEM[cli] = ven;
            localStorage.setItem('T_MEM', JSON.stringify(MEM));

            const loader = document.getElementById('sync-loader');
            const signature = canvas.toDataURL(); // Imagen de la nota/firma
            
            const payload = CART.map(i => [new Date(), "DEVOLUCION", i.sku, i.name, i.q, cli, `Vendedor: ${ven} | Ref: ${signature.substring(0,50)}...`]);
            
            // UI Update Inmediata
            loader.className = 'syncing';
            const tempCart = [...CART]; // Clon para el historial local
            CART = []; renderCart();
            document.getElementById('cli').value = ''; document.getElementById('ven').value = '';
            clearPad();

            fetch(API, {method: "POST", body: JSON.stringify({action: "save", sheet: "Devoluciones", payload})})
            .then(() => {
                loader.className = '';
                fetchData(); // Refresca historial real
            });
        }

        function renderHis() {
            const feed = document.getElementById('feed-his');
            const groups = {};
            HIS.filter(r => r[1] === "DEVOLUCION").forEach(r => {
                const key = r[5] + "_" + new Date(r[0]).getTime();
                if(!groups[key]) groups[key] = { cli: r[5], date: new Date(r[0]).toLocaleString(), p: [] };
                groups[key].p.push({ n: r[3], q: r[4], m: r[6] });
            });

            feed.innerHTML = Object.values(groups).reverse().slice(0,10).map(g => `
                <div class="hist-item" onclick="showDetail('${btoa(JSON.stringify(g))}')">
                    <div class="d-flex justify-content-between"><small class="fw-bold text-danger">DEVOLUCIÓN</small><small>${g.date}</small></div>
                    <div class="fw-800" style="font-size:16px">${g.cli}</div>
                    <div class="text-muted" style="font-size:12px">${g.p.length} ítems registrados</div>
                </div>
            `).join('');
        }

        function showDetail(data) {
            const g = JSON.parse(atob(data));
            Swal.fire({
                title: 'Detalles de Registro',
                html: `<div class="text-start">${g.p.map(p => `<div class="pb-2 border-bottom"><b>${p.q}</b> - ${p.n}</div>`).join('')}</div>`,
                confirmButtonText: 'REPORTE PDF',
                showCancelButton: true,
                confirmButtonColor: '#172b4d'
            }).then(r => { if(r.isConfirmed) genPDF(g); });
        }

        function genPDF(g) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(23, 43, 77); doc.rect(0, 0, 210, 30, 'F');
            doc.setTextColor(255); doc.setFontSize(18); doc.text("REPORTE LOGÍSTICO", 14, 20);
            
            doc.setTextColor(0); doc.setFontSize(10);
            doc.text(`CLIENTE: ${g.cli}`, 14, 40);
            doc.text(`FECHA: ${g.date}`, 14, 46);

            doc.autoTable({
                startY: 55,
                head: [['Cant', 'Producto', 'Referencia']],
                body: g.p.map(p => [p.q, p.n, p.m.split('|')[0]]),
                headStyles: { fillColor: [255, 86, 48] }
            });
            
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 105, doc.lastAutoTable.finalY + 20, {align:'center'});
            doc.save(`TITAN_${g.cli}.pdf`);
        }

        function nav(v, b) {
            document.querySelectorAll('.view').forEach(x => x.classList.add('d-none'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('v-'+v).classList.remove('d-none');
            b.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
