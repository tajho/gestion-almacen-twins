<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJHO.OS v41 SPEED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; }
        .btn-mode { border-radius: 1rem; padding: 12px; font-size: 10px; font-weight: 800; transition: 0.2s; border: 2px solid #f1f5f9; }
        .active-mode { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
        .input-box { background: #f8fafc; border-radius: 1.5rem; padding: 20px; border: 2px solid transparent; font-size: 24px; font-weight: 800; text-align: center; width: 100%; transition: 0.2s; }
        .input-box:focus { background: white; border-color: #2563eb; outline: none; box-shadow: 0 10px 20px -10px rgba(37, 99, 235, 0.2); }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-[800] tracking-tighter text-slate-900">TAJHO<span class="text-blue-600">.OS</span></h1>
        <button onclick="syncCloud()" id="btn-sync" class="text-[10px] font-black text-slate-400 uppercase border px-3 py-2 rounded-xl">Sincronizar</button>
    </header>

    <div class="grid grid-cols-2 gap-3 mb-8">
        <button id="mode-carga" onclick="setMode('CARGA')" class="btn-mode active-mode">📦 CONTENEDOR (CJ)</button>
        <button id="mode-ret" onclick="setMode('RETORNO')" class="btn-mode">↩️ DEVOLUCIÓN (UM)</button>
    </div>

    <main class="space-y-6">
        <div class="relative">
            <input type="text" id="sku-in" oninput="quickSearch()" class="input-box" placeholder="CÓDIGO SKU">
            <div id="loader" class="hidden absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        </div>

        <div id="info-box" class="hidden text-center space-y-1 py-2">
            <p id="p-desc" class="text-sm font-bold text-slate-800 uppercase italic"></p>
            <p id="p-um" class="text-[10px] font-black text-blue-500 uppercase tracking-widest"></p>
        </div>

        <div class="flex gap-4">
            <input type="number" id="qty-in" class="input-box flex-1" placeholder="CANT" inputmode="numeric">
            <button onclick="registrar()" class="w-20 h-20 bg-blue-600 text-white rounded-[1.8rem] flex items-center justify-center shadow-xl active:scale-90 transition-all">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </div>
    </main>

    <section class="mt-8 space-y-3" id="log-list">
        <h3 class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Registros de hoy</h3>
    </section>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbyijMhWNmXwMZTKv2qDhN4HvL74QeETP5Mabe4MRaDq4RkhNqiaUmEGKmniIed7FQbN3g/exec";
        let db_tajho = JSON.parse(localStorage.getItem('db_tajho') || '{}');
        let currentMode = 'CARGA';

        // 1. Sincronización en segundo plano (No traba la app)
        async function syncCloud() {
            const btn = document.getElementById('btn-sync');
            btn.innerText = "Cargando...";
            try {
                const res = await fetch(CLOUD_URL);
                const data = await res.json();
                const tempDb = {};
                data.forEach(r => {
                    const cod = String(r.CODIGO).toUpperCase().trim();
                    tempDb[cod] = { d: r.DESCRIPCION, u: r.UM || "UND" };
                });
                db_tajho = tempDb;
                localStorage.setItem('db_tajho', JSON.stringify(db_tajho));
                btn.innerText = "✅ Al día";
                setTimeout(() => btn.innerText = "Sincronizar", 2000);
            } catch (e) {
                btn.innerText = "❌ Error";
            }
        }

        function setMode(m) {
            currentMode = m;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active-mode'));
            document.getElementById('mode-' + (m === 'CARGA' ? 'carga' : 'ret')).classList.add('active-mode');
            quickSearch(); // Actualiza visual si hay algo escrito
        }

        function quickSearch() {
            const sku = document.getElementById('sku-in').value.toUpperCase().trim();
            const box = document.getElementById('info-box');
            if(db_tajho[sku]) {
                document.getElementById('p-desc').innerText = db_tajho[sku].d;
                // Si es carga, forzamos CJ, si es retorno, usamos UM del excel
                document.getElementById('p-um').innerText = "UM: " + (currentMode === 'CARGA' ? 'CJ' : db_tajho[sku].u);
                box.classList.remove('hidden');
            } else {
                box.classList.add('hidden');
            }
        }

        async function registrar() {
            const sku = document.getElementById('sku-in').value.toUpperCase().trim();
            const qty = document.getElementById('qty-in').value;
            if(!db_tajho[sku] || !qty) return;

            const umActual = currentMode === 'CARGA' ? 'CJ' : db_tajho[sku].u;
            const dataRow = [new Date().toLocaleString(), sku, db_tajho[sku].d, qty, umActual];

            // Renderizado instantáneo en lista
            renderLog(sku, qty, umActual);

            // Enviar a nube en silencio (sin bloquear la app)
            fetch(CLOUD_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ tipo: currentMode, datos: dataRow })
            });

            // Limpiar rápido
            document.getElementById('sku-in').value = "";
            document.getElementById('qty-in').value = "";
            document.getElementById('info-box').classList.add('hidden');
            document.getElementById('sku-in').focus();
            navigator.vibrate(40);
        }

        function renderLog(sku, qty, um) {
            const log = document.getElementById('log-list');
            const div = document.createElement('div');
            div.className = "flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100";
            div.innerHTML = `<div><p class="text-[10px] font-black text-slate-400">${sku}</p><p class="text-xs font-bold text-slate-800">${db_tajho[sku].d}</p></div>
                             <div class="text-right"><p class="text-lg font-black text-blue-600">${qty}</p><p class="text-[8px] font-bold text-slate-300 uppercase">${um}</p></div>`;
            log.prepend(div);
        }

        // Ejecutar sync al iniciar pero no bloquear
        window.onload = () => { if(Object.keys(db_tajho).length === 0) syncCloud(); };
    </script>
</body>
</html>
