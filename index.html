<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gestión de Inventario - Angelo Nuñez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue-brand: #2563eb; --slate-dark: #1e293b; --bg-app: #f8f9fc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-app); color: var(--slate-dark); margin: 0; -webkit-tap-highlight-color: transparent; }
        
        /* Layout */
        .view { display: none; min-height: 100vh; padding: 1.2rem; flex-direction: column; box-sizing: border-box; }
        .view.active { display: flex; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Tarjetas Estilo "Twins" */
        .card-twins { 
            background: white; 
            border-radius: 1.2rem; 
            border: 1px solid #edf2f7; 
            padding: 1.25rem; 
            margin-bottom: 1rem; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); 
        }
        
        /* Botones Acción */
        .btn-action { 
            border: 1px solid #e2e8f0; 
            font-size: 0.7rem; 
            font-weight: 700; 
            padding: 0.7rem; 
            border-radius: 0.8rem; 
            flex: 1; 
            text-align: center; 
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn-action:active { transform: scale(0.95); background: #f8fafc; }
        .btn-pdf { background: #f0fdf4; color: #16a34a; border-color: #dcfce7; }

        /* Inputs Profesionales */
        .input-twins { 
            background: white; 
            border: 1px solid #e2e8f0; 
            border-radius: 0.8rem; 
            padding: 0.9rem; 
            font-weight: 600; 
            width: 100%; 
            outline: none; 
        }
        .input-twins:focus { border-color: var(--blue-brand); ring: 2px; ring-color: #dbeafe; }

        /* Barra de Carga */
        .progress-track { height: 8px; background: #e2e8f0; border-radius: 10px; position: relative; margin: 1.5rem 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--blue-brand); width: 0%; transition: width 0.4s ease; }

        .footer-nav { position: fixed; bottom: 1.5rem; left: 1.2rem; right: 1.2rem; z-index: 50; }
        .btn-main { background: var(--blue-brand); color: white; border-radius: 1rem; font-weight: 700; padding: 1.1rem; width: 100%; shadow: lg; }
    </style>
</head>
<body>

    <header class="h-20 px-6 flex justify-between items-center bg-white border-b border-slate-100 sticky top-0 z-[100]">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic">T</div>
            <div>
                <h1 class="text-lg font-black tracking-tighter leading-none uppercase">Twins <span class="text-blue-600">Despacho</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Asist. Inventario Logístico</p>
            </div>
        </div>
        <button onclick="navTo('home')" class="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center text-slate-400">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        </button>
    </header>

    <div id="view-home" class="view active">
        <div class="mt-8 space-y-4">
            <div onclick="navTo('crear')" class="card-twins flex items-center gap-5 !py-8 border-l-4 border-l-blue-600 active:bg-slate-50">
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center font-bold">ADD</div>
                <div><h3 class="font-bold text-sm uppercase">Nuevo Despacho</h3><p class="text-[9px] text-slate-400 font-bold uppercase">Ingresar SKUs y Metas</p></div>
            </div>
            <div onclick="navTo('historial')" class="card-twins flex items-center gap-5 !py-8 border-l-4 border-l-slate-800 active:bg-slate-50">
                <div class="w-12 h-12 bg-slate-50 text-slate-800 rounded-xl flex items-center justify-center font-bold">HIST</div>
                <div><h3 class="font-bold text-sm uppercase">Historial Diario</h3><p class="text-[9px] text-slate-400 font-bold uppercase">Reportes en PDF</p></div>
            </div>
        </div>
    </div>

    <div id="view-crear" class="view">
        <h2 class="text-xl font-black mb-6 uppercase italic">Configurar <span class="text-blue-600">Carga</span></h2>
        <div class="card-twins space-y-4">
            <div class="relative">
                <input type="text" id="s-sku" oninput="smartSearch()" class="input-twins uppercase" placeholder="BUSCAR SKU / CÓDIGO">
                <div id="results" class="absolute z-50 left-0 right-0 bg-white shadow-xl rounded-xl mt-1 border hidden max-h-48 overflow-y-auto"></div>
            </div>
            <div class="flex gap-3">
                <input type="number" id="s-meta" class="input-twins flex-1" placeholder="CANTIDAD META">
                <button onclick="addMani()" class="w-14 h-14 bg-blue-600 text-white rounded-xl flex items-center justify-center shadow-lg active:scale-90">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>
        </div>
        <div id="pre-list" class="flex-grow overflow-y-auto space-y-2 pb-24"></div>
        <div class="footer-nav"><button id="btn-start" onclick="startOps()" class="btn-main hidden shadow-blue-200 shadow-xl">INICIAR OPERACIÓN</ASISTENTE></button></div>
    </div>

    <div id="view-ops" class="view">
        <div class="card-twins !py-6">
            <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase mb-2"><span>Avance Total</span><span id="global-pc" class="text-blue-600">0%</span></div>
            <div class="progress-track"><div id="pc-fill" class="progress-fill"></div></div>
        </div>
        <div class="text-center mb-8">
            <select id="sel-sku" onchange="syncItem()" class="text-2xl font-black text-slate-800 bg-transparent outline-none border-b-2 border-blue-600 pb-1 mb-2 uppercase"></select>
            <p id="live-desc" class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter px-4"></p>
            <div class="flex items-center justify-center gap-4 mt-6">
                <input type="number" id="qty-in" class="input-twins w-24 h-16 text-center text-3xl font-black" placeholder="0">
                <button onclick="registrarBulto()" class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-xl active:scale-90">
                    <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>
        </div>
        <div id="mini-progress-list" class="space-y-2 pb-24"></div>
        <div class="footer-nav"><button onclick="finishAndReport()" class="btn-main !bg-emerald-600">FINALIZAR Y GENERAR REPORTE</button></div>
    </div>

    <div id="view-historial" class="view">
        <h2 class="text-2xl font-black italic mb-6">Historial de <br><span class="text-blue-600">Actividad</span></h2>
        <div id="history-list" class="flex-grow overflow-y-auto pb-10"></div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_items = {};
        let currentMani = [];
        let activeJob = JSON.parse(localStorage.getItem('tj_active')) || null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                const raw = await res.json();
                raw.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().toUpperCase().trim()] = r.DESCRIPCION; });
            } catch (e) { console.log("Cargando modo local"); }
            if (activeJob) resumeOps(); else navTo('home');
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'historial') renderHistory();
        }

        function smartSearch() {
            const input = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('results');
            if(input.length < 2) { resDiv.classList.add('hidden'); return; }
            const matches = Object.keys(db_items).filter(sku => sku.includes(input)).slice(0, 5);
            resDiv.innerHTML = matches.map(sku => `<div onclick="setProd('${sku}')" class="p-3 border-b text-[11px] font-bold uppercase active:bg-blue-50">${sku} <br><span class="text-slate-400 font-normal">${db_items[sku]}</span></div>`).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(sku) { document.getElementById('s-sku').value = sku; document.getElementById('results').classList.add('hidden'); document.getElementById('s-meta').focus(); }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "PRODUCTO GENERICO", meta, real: 0 });
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderPreList() {
            document.getElementById('pre-list').innerHTML = currentMani.map(i => `<div class="bg-white p-4 rounded-xl border-l-4 border-blue-500 mb-2 flex justify-between shadow-sm"><div><p class="font-bold text-[11px] uppercase">${i.sku}</p></div><p class="font-black text-blue-600">${i.meta} CJ</p></div>`).join('');
            document.getElementById('btn-start').classList.toggle('hidden', currentMani.length === 0);
        }

        function startOps() {
            activeJob = { id: "TW-" + Date.now().toString().slice(-4), items: [...currentMani], start: new Date().toISOString() };
            localStorage.setItem('tj_active', JSON.stringify(activeJob));
            currentMani = [];
            resumeOps();
        }

        function resumeOps() {
            navTo('ops');
            document.getElementById('sel-sku').innerHTML = activeJob.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem();
        }

        function syncItem() {
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('live-desc').innerText = item.desc;
            const totalM = activeJob.items.reduce((a,b) => a + b.meta, 0);
            const totalR = activeJob.items.reduce((a,b) => a + b.real, 0);
            const pc = Math.min(Math.round((totalR / totalM) * 100), 100);
            document.getElementById('pc-fill').style.width = pc + "%";
            document.getElementById('global-pc').innerText = pc + "%";
            renderMiniBars();
        }

        function registrarBulto() {
            const val = parseInt(document.getElementById('qty-in').value);
            if(!val) return;
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += val;
            document.getElementById('qty-in').value = '';
            localStorage.setItem('tj_active', JSON.stringify(activeJob));
            syncItem();
            if(item.real >= item.meta) autoNext();
        }

        function autoNext() {
            const sel = document.getElementById('sel-sku');
            if(sel.selectedIndex < sel.options.length - 1) { sel.selectedIndex++; syncItem(); }
        }

        function renderMiniBars() {
            document.getElementById('mini-progress-list').innerHTML = activeJob.items.map(i => {
                const pc = Math.min(Math.round((i.real / i.meta) * 100), 100);
                const isSel = i.sku === document.getElementById('sel-sku').value;
                return `<div class="bg-white p-3 rounded-xl border ${isSel ? 'border-blue-500 shadow-md' : 'border-slate-100'}"><div class="flex justify-between text-[10px] font-bold mb-1"><span>${i.sku}</span><span>${i.real}/${i.meta}</span></div><div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-blue-600" style="width:${pc}%"></div></div></div>`;
            }).join('');
        }

        function finishAndReport() {
            const report = { ...activeJob, fecha: new Date().toLocaleString() };
            const history = JSON.parse(localStorage.getItem('taj_history')) || [];
            history.unshift(report);
            localStorage.setItem('taj_history', JSON.stringify(history));
            localStorage.removeItem('tj_active');
            activeJob = null;
            downloadPDF(report);
            navTo('home');
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('taj_history')) || [];
            const list = document.getElementById('history-list');
            if(history.length === 0) { list.innerHTML = `<p class="text-center text-slate-300 text-[10px] mt-20 uppercase font-black tracking-widest">Sin registros</p>`; return; }
            list.innerHTML = history.map(h => `
                <div class="card-twins">
                    <div class="flex justify-between text-[9px] font-bold mb-2"><span class="text-red-500">📅 ${h.fecha.split(',')[0]}</span><span class="text-blue-600">ID: ${h.id}</span></div>
                    <div class="flex justify-between items-end mb-4">
                        <h4 class="text-3xl font-black text-slate-800">${h.items.reduce((a,b)=>a+b.real,0)} <span class="text-[10px] text-slate-400 font-bold uppercase">Cjs</span></h4>
                    </div>
                    <div class="flex gap-2">
                        <button onclick='alert("${h.items.map(i => i.sku+": "+i.real).join('\\n')}")' class="btn-action bg-slate-50">Lista</button>
                        <button onclick='downloadPDF(${JSON.stringify(h)})' class="btn-action btn-pdf">Reporte PDF</button>
                    </div>
                </div>
            `).join('');
        }

        function downloadPDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Estilo Cuadro Excel Profesional
            doc.setFillColor(30, 41, 59);
            doc.rect(0, 0, 210, 30, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(16); doc.text("TWINS DESPACHO - REPORTE LOGÍSTICO", 14, 20);

            doc.setTextColor(0,0,0);
            doc.setFontSize(10);
            doc.text(`ID: ${data.id} | Fecha: ${data.fecha}`, 14, 40);
            doc.text(`Operador: J. Angelo Nuñez Durand`, 14, 46);

            doc.autoTable({
                startY: 55,
                head: [['CÓDIGO / SKU', 'DESCRIPCIÓN', 'META', 'REAL', 'DIF']],
                body: data.items.map(i => [i.sku, i.desc.substring(0,35), i.meta, i.real, i.real - i.meta]),
                theme: 'grid',
                headStyles: { fillColor: [37, 99, 235], textColor: [255, 255, 255] },
                styles: { fontSize: 8, cellPadding: 2.5 }
            });

            const fY = doc.lastAutoTable.finalY + 15;
            doc.setFontSize(8); doc.setFont("helvetica", "italic");
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, fY);
            doc.save(`Reporte_${data.id}.pdf`);
        }

        init();
    </script>
</body>
</html>
