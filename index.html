<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TITAN ELITE | Gestión Avanzada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');

        :root {
            --apple-blue: #007AFF;
            --apple-gray: #F2F2F7;
            --apple-text: #1D1D1F;
            --apple-subtext: #86868B;
            --radius-lg: 20px;
            --radius-md: 12px;
        }

        body { 
            background: #F5F5F7; 
            font-family: -apple-system, "SF Pro Display", sans-serif;
            color: var(--apple-text);
            padding-bottom: 110px;
        }

        .app-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px; position: sticky; top: 0; z-index: 1000;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }

        .main-card {
            background: #FFF; border-radius: var(--radius-lg);
            padding: 22px; margin: 16px; border: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }

        .label-apple {
            font-size: 12px; font-weight: 700; color: var(--apple-subtext);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block;
        }

        .input-apple, .select-apple {
            width: 100%; padding: 12px 16px; border-radius: var(--radius-md);
            border: 1px solid #D2D2D7; background: #FFF; font-size: 16px;
            margin-bottom: 18px; transition: 0.2s; appearance: none;
        }

        .input-apple:focus { border-color: var(--apple-blue); outline: none; background: #FBFBFF; }

        .btn-apple {
            background: var(--apple-blue); color: white; border: none;
            padding: 16px; border-radius: var(--radius-md);
            font-weight: 600; width: 100%; transition: 0.2s;
        }
        .btn-apple:active { transform: scale(0.98); opacity: 0.9; }

        /* SEARCH OVERLAY */
        .search-results {
            position: absolute; width: 100%; background: #FFF; border-radius: var(--radius-md);
            border: 1px solid #D2D2D7; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-height: 200px; overflow-y: auto; display: none; margin-top: -15px;
        }

        /* HISTORIAL CARDS */
        .history-card {
            background: #FFF; border-radius: var(--radius-md); padding: 18px;
            margin: 12px 16px; border: 0.5px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .action-chip {
            font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 20px;
            text-transform: uppercase; margin-bottom: 8px; display: inline-block;
        }
        .chip-ent { background: #E3F2FD; color: #007AFF; }
        .chip-dev { background: #FBE9E7; color: #FF3B30; }

        .footer-claim { 
            font-size: 10px; color: #AEAEB2; text-align: center;
            margin-top: 15px; border-top: 0.5px solid #F2F2F7; padding-top: 10px;
        }

        .nav-apple {
            position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; padding: 12px 0 35px; border-top: 0.5px solid #D2D2D7;
        }
        .nav-item { flex: 1; border: none; background: none; color: #8E8E93; font-size: 10px; font-weight: 600; text-align: center; }
        .nav-item.active { color: var(--apple-blue); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="d-flex justify-content-between align-items-center">
            <span class="fw-bold fs-4">TITAN <span style="color:var(--apple-blue)">ELITE</span></span>
            <span class="badge rounded-pill bg-light text-dark border p-2" onclick="emergencyCheck()">
                <i class="fas fa-user-circle me-1"></i> Angelo Durand
            </span>
        </div>
    </header>

    <main>
        <section id="v-ent" class="view">
            <div class="main-card">
                <span class="label-apple">Cliente / Área</span>
                <input type="text" id="cli-e" class="input-apple" placeholder="Ej: Tienda Central" oninput="sugerirVendor(this.value, 'ven-e')">
                
                <span class="label-apple">Vendor Responsable</span>
                <input type="text" id="ven-e" class="input-apple" style="background:#F2F2F7" readonly>

                <span class="label-apple">Buscar Producto</span>
                <div class="position-relative">
                    <input type="text" id="src-e" class="input-apple" placeholder="SKU o Nombre..." oninput="motorBusqueda(this.value, 'res-e', 'e')">
                    <div id="res-e" class="search-results"></div>
                </div>

                <div id="form-e" class="d-none p-3 rounded-4 mb-3" style="background:#F2F2F7">
                    <b id="p-n-e" class="d-block mb-2"></b>
                    <div class="d-flex gap-2">
                        <input type="number" id="q-e" class="input-apple m-0" placeholder="Cant.">
                        <button class="btn btn-primary rounded-3 px-4" onclick="addToCart('e')"><i class="fas fa-plus"></i></button>
                    </div>
                </div>

                <div id="cart-e" class="d-none">
                    <div id="items-e" class="mb-3"></div>
                    <button class="btn-apple" onclick="finalizarOp('Pedidos', 'e')">FINALIZAR ENTREGA</button>
                </div>
            </div>
        </section>

        <section id="v-dev" class="view d-none">
            <div class="main-card">
                <span class="label-apple">Cliente / Origen</span>
                <input type="text" id="cli-d" class="input-apple" placeholder="¿Quién devuelve?" oninput="sugerirVendor(this.value, 'ven-d')">

                <span class="label-apple">Vendedor / Vendor</span>
                <input type="text" id="ven-d" class="input-apple" placeholder="Especifique Vendedor">

                <span class="label-apple">Producto a Retornar</span>
                <div class="position-relative">
                    <input type="text" id="src-d" class="input-apple" placeholder="Buscar por SKU..." oninput="motorBusqueda(this.value, 'res-d', 'd')">
                    <div id="res-d" class="search-results"></div>
                </div>

                <div id="form-d" class="d-none p-3 rounded-4 border">
                    <b id="p-n-d" class="d-block mb-3 text-primary"></b>
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <span class="label-apple">Cant. Guía</span>
                            <input type="number" id="cg-d" class="input-apple">
                        </div>
                        <div class="col-6">
                            <span class="label-apple">Cant. Recibida</span>
                            <input type="number" id="cr-d" class="input-apple">
                        </div>
                    </div>
                    
                    <span class="label-apple">Motivo de Devolución</span>
                    <select id="st-d" class="select-apple">
                        <option value="MERMA">MERMA / DAÑADO</option>
                        <option value="FALLA IMPORTACION">FALLA DE IMPORTACIÓN</option>
                        <option value="SE ARREGLO">SE ARREGLÓ (REPARADO)</option>
                        <option value="REINGRESO">REINGRESO A STOCK</option>
                    </select>

                    <span class="label-apple">Observaciones Adicionales</span>
                    <textarea id="obs-d" class="input-apple" rows="2" placeholder="Detalles del estado..."></textarea>

                    <button class="btn-apple" style="background:#000" onclick="addToCart('d')">AGREGAR A LA LISTA</button>
                </div>

                <div id="cart-d" class="d-none mt-3">
                    <div id="items-d" class="mb-3 border-top pt-2"></div>
                    <button class="btn-apple" onclick="finalizarOp('Devoluciones', 'd')">PROCESAR TODO EL RETORNO</button>
                </div>
            </div>
        </section>

        <section id="v-his" class="view d-none">
            <div id="feed-his"></div>
        </section>
    </main>

    <nav class="nav-apple">
        <button class="nav-item active" onclick="nav('ent', this)"><i class="fas fa-truck-loading"></i>ENTREGA</button>
        <button class="nav-item" onclick="nav('dev', this)"><i class="fas fa-box-open"></i>RETORNOS</button>
        <button class="nav-item" onclick="nav('his', this)"><i class="fas fa-list-ul"></i>HISTORIAL</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCeMB7Cf1DpA41NEmprwR0XqrvdD_-xTEbl3vKsMlaHIp_r3b5MpMWcbrQKyOiYFF2NQ/exec";
        let MASTER = []; let CART_E = []; let CART_D = []; let HIS_DATA = {};

        async function init() {
            try {
                const r = await fetch(API, {method: "POST", body: JSON.stringify({action: "load"})});
                const d = await r.json();
                MASTER = d.p;
                processHis(d.h);
            } catch(e) { console.warn("Offline"); }
        }

        function motorBusqueda(v, boxId, t) {
            const box = document.getElementById(boxId);
            if(v.length < 1) { box.style.display='none'; return; }
            const m = MASTER.filter(p => p[1].toLowerCase().includes(v.toLowerCase()) || p[0].toString().includes(v)).slice(0,5);
            box.innerHTML = m.map(p => `<div class="p-3 border-bottom" onclick="pick('${p[0]}','${p[1]}','${t}')"><b>${p[1]}</b><br><small class="text-muted">SKU: ${p[0]}</small></div>`).join('');
            box.style.display = m.length ? 'block' : 'none';
        }

        function pick(s, n, t) {
            window.lastPick = {sku: s, name: n};
            document.getElementById(`p-n-${t}`).innerText = n;
            document.getElementById(`form-${t}`).classList.remove('d-none');
            document.querySelectorAll('.search-results').forEach(b => b.style.display='none');
        }

        function addToCart(t) {
            const cart = t === 'e' ? CART_E : CART_D;
            const q = t === 'e' ? document.getElementById('q-e').value : document.getElementById('cr-d').value;
            if(!q) return;

            const item = { ...window.lastPick, q: q };
            if(t === 'd') {
                item.cg = document.getElementById('cg-d').value;
                item.st = document.getElementById('st-d').value;
                item.obs = document.getElementById('obs-d').value || "Sin obs.";
                item.type = "DEVOLUCION";
            } else { item.type = "ENTREGA"; }

            cart.push(item);
            document.getElementById(`form-${t}`).classList.add('d-none');
            // Limpiar campos de devolución
            if(t === 'd') {
                document.getElementById('cr-d').value = '';
                document.getElementById('cg-d').value = '';
                document.getElementById('obs-d').value = '';
            }
            renderCart(t);
        }

        function renderCart(t) {
            const cart = t === 'e' ? CART_E : CART_D;
            const cont = document.getElementById(`cart-${t}`);
            const items = document.getElementById(`items-${t}`);
            cont.classList.toggle('d-none', cart.length === 0);
            items.innerHTML = cart.map((i, idx) => `
                <div class="p-2 border-bottom d-flex justify-content-between align-items-center" style="font-size:13px">
                    <span><b>${i.q}</b> x ${i.name} ${t==='d' ? `<br><small class="text-danger">${i.st}</small>` : ''}</span>
                    <i class="fas fa-times-circle text-muted" onclick="((${t==='e'?'CART_E':'CART_D'}).splice(${idx},1)); renderCart('${t}');"></i>
                </div>
            `).join('');
        }

        async function finalizarOp(sheet, t) {
            const cli = document.getElementById(`cli-${t}`).value;
            const ven = document.getElementById(`ven-${t}`).value;
            if(!cli || !ven) return Swal.fire("Atención", "Cliente y Vendedor son obligatorios", "warning");

            const cart = t === 'e' ? CART_E : CART_D;
            const payload = cart.map(i => [
                new Date(), i.type, i.sku, i.name, i.q, cli, 
                t === 'e' ? `Vendedor: ${ven}` : `Guía: ${i.cg} | Motivo: ${i.st} | Obs: ${i.obs} | Vendedor: ${ven}`
            ]);

            Swal.fire({ title: 'Sincronizando...', didOpen: () => Swal.showLoading() });
            
            try {
                await fetch(API, {method: "POST", body: JSON.stringify({action: "save", sheet, payload})});
                if(t==='e') CART_E = []; else CART_D = [];
                renderCart(t);
                document.getElementById(`cli-${t}`).value = '';
                document.getElementById(`ven-${t}`).value = '';
                await init();
                Swal.fire("Éxito", "Registro guardado correctamente", "success");
            } catch(e) { Swal.fire("Error", "No se pudo conectar", "error"); }
        }

        function processHis(data) {
            const groups = {};
            data.forEach(r => {
                const dateObj = new Date(r[0]);
                const time = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const key = r[5] + "_" + time;
                if(!groups[key]) groups[key] = { cliente: r[5], hora: time, fecha: dateObj.toLocaleDateString(), tipo: r[1], prods: [] };
                groups[key].prods.push({ n: r[3], q: r[4], s: r[2], obs: r[6] });
            });
            HIS_DATA = groups;
            renderHis();
        }

        function renderHis() {
            const feed = document.getElementById('feed-his');
            feed.innerHTML = Object.values(HIS_DATA).reverse().slice(0, 20).map(g => `
                <div class="history-card">
                    <span class="action-chip ${g.tipo === 'ENTREGA' ? 'chip-ent' : 'chip-dev'}">${g.tipo}</span>
                    <div class="d-flex justify-content-between">
                        <span class="fw-bold fs-5">${g.cliente}</span>
                        <small class="text-muted">${g.hora}</small>
                    </div>
                    <div class="text-muted mb-3" style="font-size:12px">${g.prods.length} items registrados el ${g.fecha}</div>
                    
                    <div class="d-flex gap-2">
                        <button class="btn btn-light btn-sm w-100 fw-bold" onclick="verDetalle('${btoa(JSON.stringify(g))}')">LISTA ITEMS</button>
                        <button class="btn btn-outline-primary btn-sm w-100 fw-bold" onclick="genPDF(JSON.parse(atob('${btoa(JSON.stringify(g))}')))">PDF</button>
                    </div>
                    <div class="footer-claim">Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.</div>
                </div>
            `).join('');
        }

        function verDetalle(dataStr) {
            const g = JSON.parse(atob(dataStr));
            Swal.fire({
                title: 'Detalle de Carga',
                html: `
                    <div class="text-start" style="font-size:14px">
                        <div class="mb-3 p-2 bg-light rounded"><b>Origen/Destino:</b> ${g.cliente}</div>
                        <div class="list-group list-group-flush">
                            ${g.prods.map(p => `
                                <div class="list-group-item px-0">
                                    <b>${p.q}</b> - ${p.n}<br>
                                    <small class="text-muted">${p.obs}</small>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `,
                confirmButtonColor: '#007AFF'
            });
        }

        function genPDF(g) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.text("REPORTE DE MOVIMIENTO - TITAN ELITE", 14, 20);
            doc.setFontSize(10); 
            doc.text(`CLIENTE: ${g.cliente} | TIPO: ${g.tipo}`, 14, 30);
            doc.text(`FECHA: ${g.fecha} | HORA: ${g.hora}`, 14, 35);

            doc.autoTable({
                startY: 45,
                head: [['Cant', 'Producto', 'SKU', 'Referencia / Motivo']],
                body: g.prods.map(p => [p.q, p.n, p.s, p.obs]),
                headStyles: { fillColor: [0, 122, 255] }
            });

            const finalY = doc.lastAutoTable.finalY + 20;
            doc.setFontSize(8);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 105, finalY, {align: 'center'});
            doc.save(`TITAN_${g.cliente}_${g.fecha}.pdf`);
        }

        function sugerirVendor(v, targetId) {
            let s = "";
            if(v.toUpperCase().includes("GLOBAL")) s = "GLOBAL LOGISTICS";
            else if(v.toUpperCase().includes("TIENDA")) s = "VENDEDOR INTERNO";
            
            if(s) document.getElementById(targetId).value = s;
        }

        function nav(v, btn) {
            document.querySelectorAll('.view').forEach(x => x.classList.add('d-none'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('v-'+v).classList.remove('d-none');
            btn.classList.add('active');
        }

        function emergencyCheck() {
            Swal.fire({
                title: 'Acceso Restringido',
                text: "¿Desea cambiar el responsable asignado?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Sí, Cambiar'
            });
        }

        window.onload = init;
    </script>
</body>
</html>
