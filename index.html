<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        .premium-card { background: #FFFFFF; border: 1px solid #F1F5F9; border-radius: 32px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.04); }
        .btn-action { border-radius: 16px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 14px 8px; transition: all 0.2s; }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 p-6">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-[800] tracking-tighter italic text-slate-900">TWINS <span class="text-blue-600">ELITE</span></h1>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">J. Angelo Nuñez Durand</p>
            </div>
            <div id="month-label" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-2xl text-[10px] font-extrabold uppercase border border-blue-100">
                Inventario
            </div>
        </div>
    </header>

    <main class="p-5 max-w-xl mx-auto pb-40">
        
        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
                <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-4">
                    <i class="ph-bold ph-package text-xl"></i>
                </div>
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Cajas del Mes</p>
                <h2 id="total-boxes" class="text-3xl font-black text-slate-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
                <div class="w-10 h-10 bg-green-50 text-green-600 rounded-xl flex items-center justify-center mb-4">
                    <i class="ph-bold ph-barcode text-xl"></i>
                </div>
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Variedad SKUs</p>
                <h2 id="total-skus" class="text-3xl font-black text-slate-800">0</h2>
            </div>
        </div>

        <div class="flex flex-col gap-3 mb-8">
            <input type="text" id="search-input" oninput="applyFilters()" placeholder="Buscar contenedor o producto..." 
                class="w-full bg-white border border-slate-200 rounded-2xl py-5 px-6 text-sm font-semibold outline-none focus:ring-4 focus:ring-blue-500/5 transition-all">
            
            <select id="month-select" onchange="applyFilters()" class="bg-white border border-slate-200 rounded-2xl py-4 px-5 text-xs font-black text-slate-600 outline-none appearance-none cursor-pointer">
                <option value="01">Enero</option>
                <option value="02">Febrero</option>
                <option value="03" selected>Marzo</option>
                <option value="04">Abril</option>
                <option value="05">Mayo</option>
                <option value="06">Junio</option>
            </select>
        </div>

        <div id="operations-list" class="space-y-6">
            </div>

    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw-v5b_DkMPqup6Wm4J5KfGKZq9IRs99drhBYFV-MzHa4tcyb8dSn7YRx7KTHAEj1Jp/exec";
        let master_data = [];

        // SINCRONIZACIÓN 100% INVISIBLE
        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                // Verificamos si los datos vienen en 'historial' o directamente en el array
                master_data = data.historial || data; 
                applyFilters();
            } catch (e) {
                console.error("Silent sync error");
            }
        }

        function applyFilters() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const month = document.getElementById('month-select').value;
            const list = document.getElementById('operations-list');
            
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio"];
            document.getElementById('month-label').innerText = `Resumen de ${monthNames[parseInt(month)-1]}`;

            // Agrupamos por operación
            const grouped = master_data.reduce((acc, curr) => {
                // Si no hay operación, saltar
                if(!curr.operacion) return acc;

                // Extraemos el mes del string "CONT 15/03/26" o similar
                const dateParts = curr.operacion.match(/(\d{2})\/(\d{2})/);
                const itemMonth = dateParts ? dateParts[2] : "03"; // Por defecto marzo si no hay fecha
                const itemDay = dateParts ? dateParts[1] : "01";

                const matchesSearch = curr.operacion.toLowerCase().includes(query) || 
                                     (curr.sku && curr.sku.toLowerCase().includes(query)) || 
                                     (curr.descripcion && curr.descripcion.toLowerCase().includes(query));
                
                const matchesMonth = itemMonth === month;

                if (matchesMonth && matchesSearch) {
                    if (!acc[curr.operacion]) {
                        acc[curr.operacion] = { 
                            ...curr, 
                            items: [], 
                            totalBoxes: 0,
                            sortKey: `${itemMonth}${itemDay}` 
                        };
                    }
                    acc[curr.operacion].items.push(curr);
                    acc[curr.operacion].totalBoxes += (Number(curr.meta) || 0);
                }
                return acc;
            }, {});

            // Convertimos a array y ordenamos: Lo más reciente arriba
            const results = Object.values(grouped).sort((a,b) => b.sortKey.localeCompare(a.sortKey));

            // Dashboard
            document.getElementById('total-boxes').innerText = results.reduce((a,b) => a + b.totalBoxes, 0).toLocaleString();
            document.getElementById('total-skus').innerText = results.reduce((a,b) => a + b.items.length, 0).toLocaleString();

            renderCards(results);
        }

        function renderCards(data) {
            const list = document.getElementById('operations-list');
            if (data.length === 0) {
                list.innerHTML = `<p class="text-center py-20 text-slate-400 text-xs font-bold uppercase tracking-widest">No hay registros para mostrar</p>`;
                return;
            }

            list.innerHTML = data.map(op => `
                <div class="premium-card p-7">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[9px] font-black uppercase tracking-[0.2em] ${op.estado === 'COMPLETADO' ? 'text-green-500' : 'text-amber-500'}">
                                ${op.estado || 'PENDIENTE'}
                            </span>
                            <h3 class="text-2xl font-[800] text-slate-800 tracking-tighter mt-1">${op.operacion}</h3>
                        </div>
                        <span class="bg-slate-900 text-white text-[8px] font-black px-3 py-1.5 rounded-xl uppercase tracking-widest">Canal ${op.canal || 'S/C'}</span>
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <div class="btn-action bg-blue-50 text-blue-600 border border-blue-100">
                            <i class="ph-bold ph-pencil-simple text-lg"></i>Corregir
                        </div>
                        <div class="btn-action bg-slate-50 text-slate-600 border border-slate-100">
                            <i class="ph-bold ph-list-bullets text-lg"></i>Ver Lista
                        </div>
                        <div class="btn-action bg-red-50 text-red-600 border border-red-100">
                            <i class="ph-bold ph-file-pdf text-lg"></i>PDF
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Sincronización cada 60 segundos
        setInterval(loadData, 60000);
        // Carga inicial
        window.onload = loadData;
    </script>
</body>
</html>
