<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura Pro | Twins Logistics</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00f7ff;
            --surface: #0a0a0f;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--surface);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 247, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.08) 0%, transparent 50%);
        }

        .view { display: none; height: 100vh; flex-direction: column; padding: 24px; overflow-y: auto; padding-bottom: 140px; }
        .view.active { display: flex; animation: viewIn 0.5s cubic-bezier(0.2, 1, 0.3, 1); }
        @keyframes viewIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 32px;
        }

        .dock {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            padding: 8px; border-radius: 40px; border: 1px solid var(--border);
            display: flex; gap: 8px; z-index: 1000;
        }
        .dock-item {
            display: flex; align-items: center; gap: 10px; padding: 14px 24px;
            border-radius: 32px; font-size: 11px; font-weight: 800; text-transform: uppercase;
            color: rgba(255,255,255,0.4); transition: all 0.3s;
        }
        .dock-item.active { background: #fff; color: #000; box-shadow: 0 10px 30px rgba(255,255,255,0.2); }

        input {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid var(--border) !important;
            color: #fff !important; border-radius: 20px !important;
            padding: 20px !important; outline: none !important;
        }
        input:focus { border-color: var(--accent) !important; }

        .orb-btn {
            width: 80px; height: 80px; background: var(--accent); color: #000;
            border-radius: 30px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(0,247,255,0.3);
        }

        /* Estilos Sugerencias */
        #suggestions {
            position: absolute; width: 100%; top: 100%; left: 0; z-index: 50;
            max-height: 200px; overflow-y: auto; margin-top: 8px;
        }
        .suggestion-item {
            padding: 15px 20px; background: rgba(20, 20, 30, 0.95);
            border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .suggestion-item:last-child { border: none; }
        .suggestion-item:active { background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <nav class="dock">
        <button onclick="navTo('dash')" class="dock-item active" id="n-dash"><i class="ph-duotone ph-house"></i> Dash</button>
        <button onclick="navTo('work')" class="dock-item" id="n-work"><i class="ph-duotone ph-scan"></i> Carga</button>
    </nav>

    <div id="v-dash" class="view active">
        <header class="pt-10 pb-10 text-center">
            <h1 class="text-5xl font-black tracking-tighter italic">LOGISTICA <span style="color:var(--accent)">TWINS</span></h1>
            <p class="text-[9px] font-bold text-white/30 uppercase tracking-[0.6em] mt-2">By Tajho</p>
        </header>
        <div class="space-y-4">
            <div onclick="navTo('work')" class="glass-panel p-8 flex justify-between items-center active:scale-95 transition-all">
                <div>
                    <h3 class="text-2xl font-black">Nueva Carga</h3>
                    <p class="text-xs text-white/40">Conexión con Sheets activa</p>
                </div>
                <div class="w-14 h-14 rounded-2xl bg-white text-black flex items-center justify-center">
                    <i class="ph-duotone ph-plus-circle text-2xl"></i>
                </div>
            </div>
            <div id="history-feed" class="mt-8 space-y-3"></div>
        </div>
    </div>

    <div id="v-work" class="view">
        <div id="setup-panel">
            <h2 class="text-4xl font-black mb-8 tracking-tighter">Preparación</h2>
            <div class="glass-panel p-7 space-y-6 relative">
                <div class="relative">
                    <label class="text-[10px] font-bold uppercase text-white/30 ml-2 block mb-2">Buscador Inteligente</label>
                    <input type="text" id="sku-in" oninput="searchProduct(this.value)" class="w-full text-xl font-bold" placeholder="Escriba SKU o nombre..." autocomplete="off">
                    <div id="suggestions" class="glass-panel hidden overflow-hidden border-accent/20"></div>
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="text-[10px] font-bold uppercase text-white/30 ml-2 block mb-2">Meta</label>
                        <input type="number" id="meta-in" class="w-full text-center text-2xl font-black" placeholder="0">
                    </div>
                    <button onclick="addItem()" class="mt-6 px-8 rounded-2xl bg-white text-black font-black uppercase text-[10px]">Añadir</button>
                </div>
            </div>
            <div id="q-list" class="mt-6 space-y-3"></div>
            <button onclick="start()" class="w-full py-5 rounded-3xl font-black text-[11px] uppercase tracking-widest mt-10 text-white" style="background:linear-gradient(90deg, #8b5cf6, #d946ef);">
                Abrir Terminal de Conteo
            </button>
        </div>

        <div id="terminal-panel" class="hidden flex-1 flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <div><p id="disp-id" class="text-[10px] font-bold text-accent uppercase tracking-widest mb-1"></p><h2 class="text-3xl font-black">Conteo Tajho</h2></div>
                <button onclick="openCloseModal()" class="w-12 h-12 glass-panel flex items-center justify-center text-red-500"><i class="ph-duotone ph-power"></i></button>
            </div>
            <div class="glass-panel p-8 mb-6 text-center">
                <select id="sku-sel" onchange="upUI()" class="bg-transparent text-white w-full p-2 mb-6 text-2xl font-black uppercase outline-none"></select>
                <div class="flex items-center gap-6 justify-center">
                    <input type="number" id="count-in" class="w-32 p-6 rounded-3xl text-6xl font-black text-center" placeholder="0">
                    <button onclick="commit()" class="orb-btn"><i class="ph-duotone ph-check-circle text-4xl"></i></button>
                </div>
            </div>
            <div id="stat-list" class="space-y-3 flex-1 overflow-y-auto"></div>
        </div>
    </div>

    <div id="m-final" class="fixed inset-0 z-[2000] bg-black/95 backdrop-blur-xl hidden flex items-center justify-center p-8 text-center">
        <div class="glass-panel p-10 max-w-sm w-full">
            <i class="ph-duotone ph-file-pdf text-6xl text-accent mb-6 block"></i>
            <h3 class="text-2xl font-black mb-2">Finalizar Operación</h3>
            <button onclick="finishAll()" class="w-full py-5 rounded-2xl bg-white text-black font-black uppercase text-xs mb-4">Generar Reporte PDF</button>
            <button onclick="closeCloseModal()" class="text-white/40 text-[10px] font-bold uppercase">Volver</button>
        </div>
    </div>

    <script>
        const SHEETS_URL = "https://script.google.com/macros/s/AKfycbx7c6bHpxn9HWgsgdh7NC5wuZpEcqTh-ta6JqPgH9sBt6vyHpRX1sLpMLHGUp_OS6G1eQ/exec";
        let masterProducts = [];
        let q = [], activeOp = null;

        // CARGAR PRODUCTOS DESDE GOOGLE SHEETS
        async function loadProducts() {
            try {
                const response = await fetch(SHEETS_URL);
                const data = await response.json();
                masterProducts = data; // Asume que tu script devuelve un array de objetos
                console.log("Inventario cargado:", masterProducts.length);
            } catch (e) { console.error("Error cargando Sheets:", e); }
        }

        function searchProduct(query) {
            const div = document.getElementById('suggestions');
            if (query.length < 2) { div.classList.add('hidden'); return; }
            
            const matches = masterProducts.filter(p => 
                p.sku.toLowerCase().includes(query.toLowerCase()) || 
                p.nombre.toLowerCase().includes(query.toLowerCase())
            ).slice(0, 5);

            if (matches.length > 0) {
                div.innerHTML = matches.map(m => `
                    <div class="suggestion-item" onclick="selectProduct('${m.sku}')">
                        <p class="font-bold text-sm text-accent">${m.sku}</p>
                        <p class="text-[10px] text-white/50">${m.nombre}</p>
                    </div>`).join('');
                div.classList.remove('hidden');
            } else { div.classList.add('hidden'); }
        }

        function selectProduct(sku) {
            document.getElementById('sku-in').value = sku;
            document.getElementById('suggestions').classList.add('hidden');
            document.getElementById('meta-in').focus();
        }

        function genID() {
            const d = new Date();
            return `AURA-${d.getDate()}${d.getMonth()+1}-${Math.floor(Math.random()*999)}`;
        }

        window.onload = () => {
            loadProducts();
            const s = localStorage.getItem('aura_v3_active');
            if(s) { activeOp = JSON.parse(s); navTo('work'); loadTerm(); }
            renderHistory();
        };

        function navTo(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.dock-item').forEach(e => e.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            document.getElementById('n-' + v).classList.add('active');
            if(v === 'dash') renderHistory();
        }

        function addItem() {
            const s = document.getElementById('sku-in').value, m = parseInt(document.getElementById('meta-in').value);
            if(!s || !m) return;
            q.push({ sku: s, meta: m, r: 0 });
            document.getElementById('sku-in').value = ''; document.getElementById('meta-in').value = '';
            renderQ();
        }

        function renderQ() {
            document.getElementById('q-list').innerHTML = q.map((x, i) => `
                <div class="glass-panel p-5 flex justify-between items-center">
                    <p class="text-xs font-black">${x.sku} <span class="text-accent ml-2">${x.meta}</span></p>
                    <button onclick="q.splice(${i},1);renderQ()" class="text-red-500"><i class="ph-duotone ph-trash"></i></button>
                </div>`).join('');
        }

        function start() {
            if(q.length === 0) return alert("Agregue SKUs");
            activeOp = { id: genID(), items: [...q], date: new Date().toLocaleString() };
            q = [];
            localStorage.setItem('aura_v3_active', JSON.stringify(activeOp));
            loadTerm();
        }

        function loadTerm() {
            document.getElementById('setup-panel').classList.add('hidden');
            document.getElementById('terminal-panel').classList.remove('hidden');
            document.getElementById('disp-id').innerText = activeOp.id;
            document.getElementById('sku-sel').innerHTML = activeOp.items.map(x => `<option value="${x.sku}">${x.sku}</option>`).join('');
            upUI();
        }

        function commit() {
            const i = document.getElementById('count-in'), v = parseInt(i.value);
            if(!v) return;
            const item = activeOp.items.find(x => x.sku === document.getElementById('sku-sel').value);
            if(item) { item.r += v; i.value = ''; localStorage.setItem('aura_v3_active', JSON.stringify(activeOp)); upUI(); }
        }

        function upUI() {
            const cur = document.getElementById('sku-sel').value;
            document.getElementById('stat-list').innerHTML = activeOp.items.map(x => `
                <div class="glass-panel p-5 ${x.sku === cur ? 'border-accent/40' : 'opacity-30'}">
                    <div class="flex justify-between font-black text-[9px] mb-3 uppercase tracking-tighter">
                        <span>${x.sku}</span><span class="text-accent">${x.r} / ${x.meta}</span>
                    </div>
                    <div class="h-1.5 bg-white/5 rounded-full overflow-hidden"><div class="h-full bg-accent" style="width:${Math.min((x.r/x.meta)*100, 100)}%"></div></div>
                </div>`).join('');
        }

        function openCloseModal() { document.getElementById('m-final').classList.remove('hidden'); }
        function closeCloseModal() { document.getElementById('m-final').classList.add('hidden'); }

        async function finishAll() {
    let h = JSON.parse(localStorage.getItem('aura_v3_history') || '[]');
    h.unshift(activeOp);
    localStorage.setItem('aura_v3_history', JSON.stringify(h));

    // NUEVO: Enviar a la Hoja 2 antes de cerrar
    try {
        await fetch(SHEETS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                accion: "guardar_contenedor",
                id: activeOp.id,
                fecha: activeOp.date,
                detalles: activeOp.items // Envía el array completo de SKUs, metas y reales
            })
        });
        console.log("Datos sincronizados con la Base de Datos");
    } catch (e) {
        console.error("Error al sincronizar:", e);
    }

    await makePDF(activeOp);
    localStorage.removeItem('aura_v3_active');
    activeOp = null;
    location.reload();
}

       async function makePDF(d) {
    try {
        // Validación de librerías con acceso global forzado
        const { jsPDF } = window.jspdf || {};
        if (!jsPDF) {
            alert("⚠️ Error: Sistema de impresión no listo. Reintentando...");
            location.reload();
            return;
        }

        const doc = new jsPDF({
            orientation: 'p',
            unit: 'mm',
            format: 'a4'
        });

        // DISEÑO DE CABECERA PREMIUM (Twins Logistics)
        doc.setFillColor(15, 15, 25);
        doc.rect(0, 0, 210, 45, 'F');
        
        doc.setTextColor(0, 247, 255);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(26);
        doc.text("AURA PRO", 14, 22);
        
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text("TWINS ELITE LOGISTICS SYSTEM", 14, 30);
        doc.text(`ID OPERACIÓN: ${d.id}`, 14, 38);

        // CUERPO DEL REPORTE
        doc.setTextColor(100, 100, 100);
        doc.setFontSize(9);
        doc.text(`FECHA DE EMISIÓN: ${d.date}`, 14, 55);
        doc.text(`RESPONSABLE: J. Angelo Nuñez Durand`, 14, 60);

        // TABLA DE DATOS (AutoTable)
        doc.autoTable({
            startY: 70,
            head: [['PRODUCTO SKU', 'META PLAN', 'CANT. REAL', 'DIFERENCIA']],
            body: d.items.map(x => [
                x.sku, 
                x.meta, 
                x.r, 
                { content: (x.r - x.meta), styles: { fontStyle: 'bold', textColor: (x.r - x.meta < 0 ? [200, 0, 0] : [0, 150, 0]) } }
            ]),
            theme: 'grid',
            headStyles: { fillColor: [0, 247, 255], textColor: [0, 0, 0], fontSize: 10 },
            styles: { fontSize: 9, cellPadding: 4 },
            alternateRowStyles: { fillColor: [245, 252, 255] }
        });

        // FIRMA Y CIERRE
        const finalY = doc.lastAutoTable.finalY + 25;
        doc.setTextColor(0, 0, 0);
        doc.setFontSize(10);
        doc.text("__________________________", 14, finalY);
        doc.setFont("helvetica", "bold");
        doc.text("Firma: J. Angelo Nuñez Durand", 14, finalY + 7);
        doc.setFont("helvetica", "normal");
        doc.text("Asistente de Inventario Logístico", 14, finalY + 12);

        // SOLUCIÓN DEFINITIVA PARA MÓVILES (Blob Method)
        const pdfBlob = doc.output('blob');
        const pdfUrl = URL.createObjectURL(pdfBlob);
        
        // Crear un enlace invisible y disparar la descarga
        const link = document.createElement('a');
        link.href = pdfUrl;
        link.download = `Reporte_${d.id}.pdf`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        // Liberar memoria
        setTimeout(() => URL.revokeObjectURL(pdfUrl), 100);

    } catch (error) {
        console.error("Falla en PDF:", error);
        alert("El PDF no pudo descargarse. Pero no te preocupes, los datos ya están guardados en tu Google Sheets.");
    }
}
        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('aura_v3_history') || '[]');
            const feed = document.getElementById('history-feed');
            let html = activeOp ? `<div class="glass-panel p-5 border border-accent/30 mb-6 bg-accent/5 flex justify-between items-center"><div><p class="text-[8px] font-bold text-accent uppercase mb-1">Carga Activa</p><p class="text-sm font-black">${activeOp.id}</p></div><button onclick="navTo('work')" class="w-10 h-10 rounded-full bg-accent text-black flex items-center justify-center"><i class="ph-bold ph-arrow-right"></i></button></div>` : '';
            html += h.map(x => `<div class="glass-panel p-5 flex justify-between items-center mb-2"><div><p class="text-[7px] text-white/20 uppercase">${x.date}</p><p class="text-xs font-black">${x.id}</p></div><button onclick='makePDF(${JSON.stringify(x)})' class="text-accent"><i class="ph-duotone ph-file-pdf text-2xl"></i></button></div>`).join('');
            feed.innerHTML = html || '<p class="text-center text-[10px] text-white/10 uppercase py-10">Sin reportes</p>';
        }
    </script>
</body>
</html>
