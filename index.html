<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tajho Aura Prime</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #f8fafc; 
            --glass: rgba(255, 255, 255, 0.9);
            --accent: #000000;
            --shadow-soft: 0 10px 40px -10px rgba(0,0,0,0.05);
            --border: rgba(0,0,0,0.04);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #0f172a; letter-spacing: -0.01em; }
        
        .view { display: none; min-height: 100vh; padding: 24px; flex-direction: column; animation: viewIn 0.5s ease; }
        .view.active { display: flex; }
        @keyframes viewIn { from { opacity: 0; filter: blur(10px); transform: translateY(10px); } to { opacity: 1; filter: blur(0); transform: translateY(0); } }

        /* Tarjetas con Efecto Aura */
        .aura-card { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: var(--shadow-soft);
        }

        /* Botones de Navegación Premium */
        .nav-card {
            background: #fff;
            border-radius: 35px;
            height: 190px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .nav-card:active { transform: scale(0.95); background: #f1f5f9; }
        .nav-card i { font-size: 3.2rem; margin-bottom: 1rem; color: #1e293b; }

        /* Inputs Estilo "Clean Focus" */
        input, select {
            background: #fff!important;
            border: 1px solid #e2e8f0!important;
            border-radius: 20px!important;
            padding: 18px!important;
            font-weight: 600!important;
            transition: 0.3s;
            outline: none!important;
        }
        input:focus { border-color: #000!important; box-shadow: 0 0 0 4px rgba(0,0,0,0.03); }

        /* Botón de Acción Principal */
        .btn-prime {
            background: var(--accent);
            color: white;
            padding: 20px;
            border-radius: 24px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.1em;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .btn-prime:active { transform: translateY(2px); box-shadow: none; }

        /* Barra de progreso elegante */
        .progress-bar { height: 6px; border-radius: 10px; background: #f1f5f9; overflow: hidden; }
        .progress-fill { height: 100%; background: #000; border-radius: 10px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Sugerencias de búsqueda */
        #search-results {
            position: absolute; width: 100%; top: 100%; z-index: 50; margin-top: 10px;
            background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-height: 250px; overflow-y: auto; border: 1px solid var(--border);
        }
        .search-item { padding: 16px 20px; border-bottom: 1px solid #f8fafc; font-weight: 700; font-size: 14px; }
        .search-item:active { background: #f1f5f9; }
    </style>
</head>
<body>

    <div id="v-dash" class="view active">
        <header class="pt-20 pb-16 text-center">
            <h1 class="text-[10px] font-extrabold tracking-[0.8em] text-slate-300 uppercase mb-4">Logistics Management</h1>
            <h2 class="text-5xl font-light italic tracking-tight text-slate-900">Tajho <span class="font-black not-italic tracking-tighter">Prime</span></h2>
        </header>

        <div class="grid grid-cols-2 gap-6 px-2">
            <button onclick="navTo('create')" class="nav-card">
                <i class="ph-thin ph-truck"></i>
                <span class="text-[10px] font-extrabold uppercase tracking-widest text-slate-500">Crear<br>Contenedor</span>
            </button>
            <button onclick="navTo('hist')" class="nav-card">
                <i class="ph-thin ph-stack"></i>
                <span class="text-[10px] font-extrabold uppercase tracking-widest text-slate-500">Historial<br>Reportes</span>
            </button>
        </div>

        <div class="mt-auto pb-12 text-center">
            <div class="inline-flex items-center gap-3 px-6 py-3 aura-card rounded-full border-none">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-400">Sistema Sincronizado</span>
            </div>
        </div>
    </div>

    <div id="v-create" class="view">
        <nav class="flex items-center justify-between mb-12">
            <button onclick="navTo('dash')" class="w-12 h-12 rounded-full bg-white flex items-center justify-center border border-slate-100 shadow-sm"><i class="ph-bold ph-arrow-left"></i></button>
            <span class="text-xs font-black uppercase tracking-widest">Nueva Carga</span>
            <div class="w-12"></div>
        </nav>

        <div class="aura-card p-8 mb-8 space-y-6">
            <div class="relative">
                <label class="text-[9px] font-extrabold uppercase text-slate-400 ml-2 mb-2 block">Buscador Maestra (Hoja 1)</label>
                <input type="text" id="sku-in" oninput="searchMaster(this.value)" class="w-full" placeholder="Ingrese SKU..." autocomplete="off">
                <div id="search-results" class="hidden"></div>
            </div>
            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="text-[9px] font-extrabold uppercase text-slate-400 ml-2 mb-2 block">Meta de Conteo</label>
                    <input type="number" id="meta-in" class="w-full text-center text-xl font-bold" placeholder="0">
                </div>
                <button onclick="addToQueue()" class="mt-6 px-8 btn-prime !shadow-none !bg-slate-100 !text-black">Añadir</button>
            </div>
        </div>

        <div id="queue-list" class="space-y-3 flex-1 overflow-y-auto pr-2"></div>

        <button onclick="saveContenedor()" class="w-full btn-prime mt-6">Confirmar y Guardar Registro</button>
    </div>

    <div id="v-hist" class="view">
        <nav class="flex items-center justify-between mb-12">
            <button onclick="navTo('dash')" class="w-12 h-12 rounded-full bg-white flex items-center justify-center border border-slate-100 shadow-sm"><i class="ph-bold ph-arrow-left"></i></button>
            <span class="text-xs font-black uppercase tracking-widest">Historial</span>
            <div class="w-12"></div>
        </nav>
        <div id="history-feed" class="space-y-4"></div>
    </div>

    <div id="v-work" class="view">
        <header class="flex justify-between items-end mb-10">
            <div>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Operación Activa</p>
                <h2 class="text-4xl font-black tracking-tighter" id="work-title"></h2>
            </div>
            <button onclick="finalizeWork()" class="px-6 py-3 rounded-2xl bg-emerald-50 text-emerald-600 font-bold text-[10px] uppercase">Finalizar</button>
        </header>

        <div class="aura-card p-10 text-center mb-8">
            <select id="work-select" onchange="refreshWorkStats()" class="w-full mb-8 text-center text-xl font-black border-none bg-slate-50"></select>
            <div class="flex items-center justify-center gap-6">
                <input type="number" id="work-input" class="w-32 text-6xl font-black text-center border-none" placeholder="0">
                <button onclick="commitCount()" class="w-20 h-20 rounded-[28px] bg-black text-white flex items-center justify-center shadow-2xl">
                    <i class="ph-bold ph-plus text-3xl"></i>
                </button>
            </div>
        </div>

        <div id="work-stats" class="space-y-4 flex-1 overflow-y-auto"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let master = [], queue = [], currentOp = null;

        window.onload = async () => {
            renderHistory();
            try { 
                const res = await fetch(API_URL); 
                master = await res.json(); 
            } catch(e) { console.error("Error cargando maestra"); }
        };

        function navTo(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            if(v === 'hist') renderHistory();
        }

        // --- LÓGICA CREACIÓN (HOJA 1) ---
        function searchMaster(q) {
            const resDiv = document.getElementById('search-results');
            if (q.length < 2) { resDiv.classList.add('hidden'); return; }
            const m = master.filter(p => p.sku.toLowerCase().includes(q.toLowerCase())).slice(0, 5);
            resDiv.innerHTML = m.map(x => `<div onclick="pickSku('${x.sku}')" class="search-item">${x.sku}</div>`).join('');
            resDiv.classList.remove('hidden');
        }
        function pickSku(s) { document.getElementById('sku-in').value = s; document.getElementById('search-results').classList.add('hidden'); }

        function addToQueue() {
            const s = document.getElementById('sku-in').value, m = parseInt(document.getElementById('meta-in').value);
            if(!s || !m) return;
            queue.push({ sku: s, meta: m, r: 0 });
            document.getElementById('sku-in').value = ''; document.getElementById('meta-in').value = '';
            renderQueue();
        }
        function renderQueue() {
            document.getElementById('queue-list').innerHTML = queue.map((x, i) => `
                <div class="aura-card p-5 flex justify-between items-center bg-white/50">
                    <span class="font-bold text-sm">${x.sku} <span class="ml-3 text-slate-400 font-medium">OBJ: ${x.meta}</span></span>
                    <button onclick="queue.splice(${i},1);renderQueue()" class="text-slate-300 hover:text-red-500 transition-colors"><i class="ph-bold ph-x-circle text-xl"></i></button>
                </div>`).join('');
        }

        async function saveContenedor() {
            if(queue.length === 0) return;
            const op = { id: `C-${Math.floor(Math.random()*900+100)}`, date: new Date().toLocaleString(), items: [...queue], done: false };
            let history = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            history.unshift(op);
            localStorage.setItem('tajho_v3', JSON.stringify(history));
            
            // Sync Invisible a Hoja 2
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ accion: 'guardar_contenedor', ...op }) });

            queue = []; renderQueue();
            navTo('hist');
        }

        // --- LÓGICA HISTORIAL ---
        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            document.getElementById('history-feed').innerHTML = h.map((x, i) => `
                <div class="aura-card p-6 flex justify-between items-center">
                    <div>
                        <p class="text-[8px] font-black text-slate-300 mb-1 uppercase tracking-widest">${x.date}</p>
                        <p class="text-xl font-extrabold italic tracking-tighter">${x.id}</p>
                    </div>
                    ${x.done ? 
                        `<button onclick="genPDF(${i})" class="w-14 h-14 rounded-full bg-black text-white flex items-center justify-center shadow-lg active:scale-90 transition-all"><i class="ph-bold ph-file-pdf text-xl"></i></button>` : 
                        `<button onclick="openWork(${i})" class="px-6 py-3 rounded-2xl bg-slate-900 text-white font-black text-[9px] uppercase tracking-widest">Iniciar Descarga</button>`
                    }
                </div>`).join('') || '<div class="py-20 text-center opacity-20 font-bold uppercase text-xs tracking-widest">Historial Vacío</div>';
        }

        // --- LÓGICA DESCARGA (CONTEO) ---
        function openWork(idx) {
            const h = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            currentOp = { ...h[idx], localIdx: idx };
            navTo('work');
            document.getElementById('work-title').innerText = currentOp.id;
            document.getElementById('work-select').innerHTML = currentOp.items.map(x => `<option value="${x.sku}">${x.sku}</option>`).join('');
            refreshWorkStats();
        }

        function commitCount() {
            const val = parseInt(document.getElementById('work-input').value);
            if(!val && val !== 0) return;
            const sku = document.getElementById('work-select').value;
            const item = currentOp.items.find(x => x.sku === sku);
            item.r += val;
            document.getElementById('work-input').value = '';
            refreshWorkStats();
            updateLocal();
        }

        function refreshWorkStats() {
            document.getElementById('work-stats').innerHTML = currentOp.items.map(x => `
                <div class="aura-card p-5">
                    <div class="flex justify-between text-[10px] font-black uppercase mb-3">
                        <span>${x.sku}</span>
                        <span class="${x.r >= x.meta ? 'text-emerald-500' : 'text-slate-400'}">${x.r} / ${x.meta}</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${Math.min((x.r/x.meta)*100,100)}%"></div></div>
                </div>`).join('');
        }

        function updateLocal() {
            let h = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            h[currentOp.localIdx] = currentOp;
            localStorage.setItem('tajho_v3', JSON.stringify(h));
        }

        async function finalizeWork() {
            currentOp.done = true;
            updateLocal();
            // Sync Final Invisible
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ accion: 'finalizar_conteo', ...currentOp }) });
            alert("Operación completada.");
            navTo('hist');
        }

        // --- GENERACIÓN DE PDF ---
        function genPDF(idx) {
            const d = JSON.parse(localStorage.getItem('tajho_v3') || '[]')[idx];
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(255, 255, 255); doc.rect(0, 0, 210, 297, 'F');
            doc.setTextColor(0); doc.setFontSize(26); doc.setFont("helvetica", "bold"); doc.text("TAJHO PRIME", 14, 30);
            doc.setFontSize(9); doc.setFont("helvetica", "normal"); 
            doc.text(`REPORTE DE OPERACIÓN: ${d.id}`, 14, 38);
            doc.text(`FECHA: ${d.date}`, 14, 43);

            doc.autoTable({
                startY: 55,
                head: [['SKU', 'META', 'REAL', 'DIF.']],
                body: d.items.map(it => [it.sku, it.meta, it.r, (it.r - it.meta)]),
                theme: 'striped',
                headStyles: { fillColor: [0, 0, 0], textColor: [255, 255, 255], fontStyle: 'bold' },
                styles: { font: 'helvetica', fontSize: 9 }
            });

            const finalY = doc.lastAutoTable.finalY + 30;
            doc.setDrawColor(230); doc.line(14, finalY, 100, finalY);
            doc.setFontSize(9); doc.setFont("helvetica", "bold");
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, finalY + 8);
            doc.setFont("helvetica", "normal"); doc.text("Asist. Inventario Logístico", 14, finalY + 13);
            
            doc.save(`Tajho_Prime_${d.id}.pdf`);
        }
    </script>
</body>
</html>
