<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Logistics - Twins Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        
        /* Agrupación por Color de Puerto */
        .color-section { margin-bottom: 30px; }
        .color-label { 
            font-size: 11px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.15em; margin-bottom: 12px; display: flex; 
            align-items: center; gap: 10px; color: #64748b;
        }
        .color-label::after { content: ""; flex: 1; height: 1px; background: #E2E8F0; }

        .premium-card { background: white; border-radius: 24px; border: 1px solid #F1F5F9; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 12px; }
        .btn-tool { border-radius: 14px; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 2px; transition: all 0.2s; cursor: pointer; border: 1px solid transparent; }
        .btn-tool:active { transform: scale(0.96); opacity: 0.7; }

        /* Indicadores de Color Lateral */
        .bar-red { border-left: 5px solid #ef4444; }
        .bar-blue { border-left: 5px solid #3b82f6; }
        .bar-green { border-left: 5px solid #22c55e; }
        .bar-yellow { border-left: 5px solid #eab308; }
        .bar-purple { border-left: 5px solid #a855f7; }
        .bar-orange { border-left: 5px solid #f97316; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 p-6">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-[800] tracking-tighter italic">TWINS <span class="text-blue-600">ELITE</span></h1>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Angelo N. Durand</p>
            </div>
            <div class="w-10 h-10 bg-slate-50 rounded-2xl flex items-center justify-center">
                <i class="ph-bold ph-factory text-blue-600"></i>
            </div>
        </div>
    </header>

    <main class="p-5 max-w-xl mx-auto pb-40">
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Volumen Cajas</p>
                <h2 id="dash-boxes" class="text-3xl font-black text-slate-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Diversidad SKUs</p>
                <h2 id="dash-skus" class="text-3xl font-black text-slate-800">0</h2>
            </div>
        </div>

        <div class="mb-8">
            <div class="relative">
                <i class="ph-bold ph-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                <input type="text" id="search-box" oninput="renderApp()" placeholder="Buscar por código o descripción..." 
                    class="w-full bg-white border border-slate-200 rounded-2xl py-5 pl-14 pr-6 text-sm font-semibold outline-none focus:ring-4 focus:ring-blue-500/5 transition-all">
            </div>
        </div>

        <div id="app-content"></div>

    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw-v5b_DkMPqup6Wm4J5KfGKZq9IRs99drhBYFV-MzHa4tcyb8dSn7YRx7KTHAEj1Jp/exec";
        
        // Carga inmediata desde memoria local
        let inventoryData = JSON.parse(localStorage.getItem('twins_inventory')) || [];

        async function syncData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                inventoryData = data.historial || data;
                localStorage.setItem('twins_inventory', JSON.stringify(inventoryData));
                renderApp();
            } catch(e) { console.log("Silent background sync active"); }
        }

        function renderApp() {
            const query = document.getElementById('search-box').value.toLowerCase();
            const container = document.getElementById('app-content');
            
            // 1. Agrupar por Contenedor e identificar Color de Puerto
            const grouped = inventoryData.reduce((acc, curr) => {
                if(!curr.operacion) return acc;

                const matches = curr.sku.toLowerCase().includes(query) || 
                               curr.descripcion.toLowerCase().includes(query) ||
                               curr.operacion.toLowerCase().includes(query);

                if(matches) {
                    if(!acc[curr.operacion]) {
                        // El color se extrae directamente de la columna de tu Excel
                        const puertoColor = curr.color ? curr.color.toLowerCase() : 'blue';
                        acc[curr.operacion] = { 
                            name: curr.operacion,
                            color: puertoColor,
                            totalBoxes: 0,
                            itemsCount: 0,
                            canal: curr.canal || 'S/C'
                        };
                    }
                    acc[curr.operacion].totalBoxes += (Number(curr.meta) || 0);
                    acc[curr.operacion].itemsCount += 1;
                }
                return acc;
            }, {});

            // 2. Clasificar grupos por Color
            const byColor = Object.values(grouped).reduce((acc, op) => {
                if(!acc[op.color]) acc[op.color] = [];
                acc[op.color].push(op);
                return acc;
            }, {});

            // 3. Renderizado
            let html = '';
            let boxesSum = 0;
            let skusSum = 0;

            Object.keys(byColor).forEach(color => {
                html += `
                <div class="color-section">
                    <div class="color-label">
                        <i class="ph-fill ph-circle text-[8px]" style="color: ${color}"></i>
                        Llegada a Puerto: ${color}
                    </div>`;
                
                byColor[color].forEach(op => {
                    boxesSum += op.totalBoxes;
                    skusSum += op.itemsCount;
                    html += `
                        <div class="premium-card p-6 bar-${color}">
                            <div class="flex justify-between items-start mb-5">
                                <div class="flex-1">
                                    <h3 class="text-xl font-[800] text-slate-800 tracking-tight">${op.name}</h3>
                                    <div class="flex gap-3 mt-1">
                                        <p class="text-[10px] font-bold text-slate-400 uppercase">Cajas: ${op.totalBoxes}</p>
                                        <p class="text-[10px] font-bold text-slate-400 uppercase">SKUs: ${op.itemsCount}</p>
                                    </div>
                                </div>
                                <span class="bg-slate-900 text-white text-[8px] font-black px-2.5 py-1.5 rounded-lg uppercase tracking-widest">
                                    Canal ${op.canal}
                                </span>
                            </div>

                            <div class="grid grid-cols-3 gap-2.5">
                                <div onclick="action('CORREGIR', '${op.name}')" class="btn-tool bg-blue-50 text-blue-600 border-blue-100/50">
                                    <i class="ph-bold ph-pencil-simple text-lg"></i>CORREGIR
                                </div>
                                <div onclick="action('LISTA', '${op.name}')" class="btn-tool bg-slate-50 text-slate-600 border-slate-100">
                                    <i class="ph-bold ph-stack text-lg"></i>LISTA
                                </div>
                                <div onclick="action('PDF', '${op.name}')" class="btn-tool bg-red-50 text-red-600 border-red-100/50">
                                    <i class="ph-bold ph-file-pdf text-lg"></i>PDF
                                </div>
                            </div>
                        </div>`;
                });
                html += `</div>`;
            });

            container.innerHTML = html || `<div class="py-20 text-center text-slate-300 font-black text-xs uppercase tracking-widest">Sin coincidencias</div>`;
            document.getElementById('dash-boxes').innerText = boxesSum.toLocaleString();
            document.getElementById('dash-skus').innerText = skusSum.toLocaleString();
        }

        function action(type, id) {
            if(type === 'PDF') {
                const footer = "Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.";
                alert(`Generando reporte técnico para: ${id}\n\n${footer}`);
            }
        }

        // Inicio
        renderApp();
        syncData();
        setInterval(syncData, 60000); // Sync invisible cada minuto
    </script>
</body>
</html>
