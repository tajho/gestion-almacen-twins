<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INBOUND TWINS - ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #ffffff; --card: #f9fafb; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 100px; }
        .header { background: #fff; padding: 25px 20px; border-bottom: 4px solid var(--primary); sticky; top: 0; z-index: 10; }
        .header h1 { font-size: 1.2rem; margin: 0; color: var(--primary); font-weight: 900; }
        .header p { font-size: 0.75rem; margin: 4px 0 0; font-weight: 700; color: #6b7280; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .sync-box { background: #f3f4f6; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; border-radius: 10px; padding: 10px; border: 1px solid #ccc; font-size: 0.8rem; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .item-card { background: var(--card); border: 1px solid #e5e7eb; border-radius: 15px; padding: 15px; margin-bottom: 12px; }
        .sku-row { font-weight: 900; color: #000; display: flex; justify-content: space-between; }
        .sku-desc { font-size: 0.7rem; color: #4b5563; display: block; margin-bottom: 10px; }
        .control-row { display: flex; justify-content: space-between; align-items: center; }
        .qty-box { text-align: center; }
        .qty-label { font-size: 0.6rem; color: #9ca3af; font-weight: 800; display: block; }
        .qty-val { font-size: 1.1rem; font-weight: 900; }
        .btn-add { background: #fff; border: 2px solid #e5e7eb; width: 45px; height: 45px; border-radius: 10px; font-weight: 900; font-size: 1.2rem; }
        .footer-action { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 20px; border-top: 1px solid #eee; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>J. ANGELO NUÑEZ</h1>
    <p>TWINS - INGRESO DE MERCADERÍA</p>
</div>

<div class="container">
    <div id="setup">
        <div class="sync-box">
            <textarea id="json-input" rows="4" placeholder="Pega el código JSON de Gemini aquí..."></textarea>
            <button class="btn-main" onclick="initApp()">CARGAR DATOS</button>
        </div>
    </div>
    <div id="list"></div>
</div>

<div class="footer-action hidden" id="footer">
    <button class="btn-main" onclick="makePDF()" id="pdf-btn">GENERAR REPORTE AZUL</button>
</div>

<script>
    let items = [];
    const firmaData = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgetfirmaficticia... (Firma Angelo)";

    function initApp() {
        try {
            items = JSON.parse(document.getElementById('json-input').value);
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('footer').classList.remove('hidden');
            draw();
        } catch(e) { alert("Error en JSON"); }
    }

    function draw() {
        const list = document.getElementById('list');
        list.innerHTML = "";
        items.forEach((item, i) => {
            const boxes = item.fisico / item.u_por_caja;
            list.innerHTML += `
                <div class="item-card">
                    <div class="sku-row"><span>${item.sku}</span> <span style="color:#2563eb">${boxes.toFixed(0)} / ${item.cajas_pck} CJ</span></div>
                    <span class="sku-desc">${item.desc}</span>
                    <div class="control-row">
                        <button class="btn-add" onclick="update(${i}, -1)">-</button>
                        <div class="qty-box"><span class="qty-label">DIFERENCIA</span><span class="qty-val">${(boxes - item.cajas_pck).toFixed(0)}</span></div>
                        <button class="btn-add" onclick="update(${i}, 1)">+</button>
                    </div>
                </div>`;
        });
    }

    function update(i, val) {
        let currentBoxes = items[i].fisico / items[i].u_por_caja;
        let newBoxes = Math.max(0, currentBoxes + val);
        items[i].fisico = newBoxes * items[i].u_por_caja;
        draw();
    }

    function makePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Estilo Azul Twins
        doc.setFillColor(37, 99, 235);
        doc.rect(0, 0, 210, 35, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(16).setFont(undefined, 'bold').text("REVISIÓN DE CONTENEDOR", 105, 15, {align:'center'});
        doc.setFontSize(10).setFont(undefined, 'normal').text("TWINS - INGRESO DE MERCADERÍA", 105, 23, {align:'center'});
        
        doc.setTextColor(0,0,0);
        doc.setFontSize(9).text(`FECHA: ${new Date().toLocaleDateString()}`, 15, 45);

        const tableData = items.map(i => [
            i.sku, 
            i.desc, 
            i.cajas_pck, 
            (i.fisico/i.u_por_caja).toFixed(0),
            (i.fisico/i.u_por_caja) >= i.cajas_pck ? "OK" : "FALTA"
        ]);

        doc.autoTable({
            startY: 50,
            head: [['SKU', 'PRODUCTO', 'CJ PACK', 'CJ FIS', 'ESTADO']],
            body: tableData,
            headStyles: { fillColor: [37, 99, 235] },
            styles: { fontSize: 7 }
        });

        // Firma Final
        const finalY = doc.lastAutoTable.finalY + 15;
        try {
            doc.addImage(firmaData, 'PNG', 80, finalY, 50, 20);
        } catch(e) {}
        
        doc.setLineWidth(0.5);
        doc.line(70, finalY + 22, 140, finalY + 22);
        doc.setFontSize(10).setFont(undefined, 'bold').text("J. ANGELO NUÑEZ DURAND", 105, finalY + 28, {align:'center'});
        doc.setFontSize(8).setFont(undefined, 'normal').text("Asistente Inventario Logístico", 105, finalY + 33, {align:'center'});
        doc.text("Revisión por J. Angelo Nuñez Durand", 105, finalY + 38, {align:'center'});
        
        doc.save("Reporte_Twins_Angelo.pdf");
    }
</script>
</body>
</html>
