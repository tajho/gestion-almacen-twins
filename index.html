<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TWINS LOGISTICS PRO | J. ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --black: #000000; --white: #ffffff; --gray: #1a1a1a; --light-gray: #f5f5f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { background-color: var(--white); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Status Bar Style Header */
        header { background: var(--black); color: var(--white); padding: 50px 25px 30px; border-radius: 0 0 30px 30px; flex-shrink: 0; }
        header h1 { font-size: 1.2rem; margin: 0; font-weight: 900; letter-spacing: -0.5px; }
        header p { font-size: 0.7rem; margin: 5px 0 0; opacity: 0.5; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }

        /* Dashboard Flotante */
        .dash { display: flex; padding: 25px; gap: 15px; background: var(--white); border-bottom: 1px solid #eee; }
        .kpi { flex: 1; background: var(--light-gray); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #eee; }
        .kpi-val { display: block; font-size: 1.6rem; font-weight: 900; color: var(--black); }
        .kpi-lbl { font-size: 0.6rem; font-weight: 800; color: #888; text-transform: uppercase; margin-top: 5px; }

        /* Lista de Productos con Scroll Suave */
        #main-container { flex-grow: 1; overflow-y: auto; padding: 0 20px 140px; scrollbar-width: none; }
        #main-container::-webkit-scrollbar { display: none; }

        .card { background: var(--white); border-radius: 25px; padding: 25px; margin-bottom: 15px; border: 1px solid #eee; transition: 0.3s; }
        .card.complete { background: #f0fff4; border-color: #000; }
        .sku-tag { font-size: 0.65rem; font-weight: 900; background: var(--black); color: #fff; padding: 5px 12px; border-radius: 10px; margin-bottom: 15px; display: inline-block; }
        .product-name { font-size: 0.95rem; font-weight: 700; color: var(--black); line-height: 1.4; margin-bottom: 20px; }

        /* Input Inteligente */
        .input-group { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .field-container { flex: 1; position: relative; }
        input[type="number"] { width: 100%; border: none; background: var(--light-gray); padding: 20px; border-radius: 15px; font-size: 1.5rem; font-weight: 900; outline: none; border: 2px solid transparent; transition: 0.2s; }
        input[type="number"]:focus { border-color: var(--black); background: #fff; }
        .meta-tag { font-size: 0.75rem; font-weight: 800; color: #777; background: #fff; padding: 5px 10px; border-radius: 8px; border: 1px solid #eee; }

        /* Barra de Acción Infalible */
        .action-bar { position: fixed; bottom: 0; width: 100%; padding: 25px 25px 40px; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-top: 1px solid #eee; }
        .btn-generate { background: var(--black); color: var(--white); border: none; width: 100%; padding: 22px; border-radius: 20px; font-size: 0.9rem; font-weight: 900; letter-spacing: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.1s; }
        .btn-generate:active { transform: scale(0.96); }

        /* Setup Inicial */
        .setup-overlay { position: fixed; inset: 0; background: #fff; z-index: 2000; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        textarea { flex: 1; width: 100%; border-radius: 20px; border: 1.5px solid #eee; padding: 20px; font-size: 0.9rem; margin: 20px 0; outline: none; background: #fafafa; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="setup-view" class="setup-overlay">
    <h2 style="font-weight: 900; text-align: center;">INICIAR AUDITORÍA</h2>
    <p style="text-align: center; font-size: 0.8rem; color: #888;">Pegue el JSON del contenedor abajo</p>
    <textarea id="json-input" placeholder='{"sku": "AR-...", "cajas_pck": 10, ...}'></textarea>
    <button class="btn-generate" onclick="startApp()">CARGAR DATOS</button>
</div>

<header>
    <h1>J. ANGELO NUÑEZ</h1>
    <p>ASISTENTE LOGÍSTICO | AUDIT PRO</p>
</header>

<div id="dash-ui" class="dash hidden">
    <div class="kpi"><span class="kpi-val" id="total-val">0</span><span class="kpi-lbl">Recibido</span></div>
    <div class="kpi"><span class="kpi-val" id="eff-val">0%</span><span class="kpi-lbl">Eficiencia</span></div>
</div>

<div id="main-container" class="hidden">
    <div id="inventory-list"></div>
</div>

<div class="action-bar hidden" id="action-ui">
    <button class="btn-black btn-generate" onclick="fireReport()">
        GENERAR REPORTE OFICIAL
    </button>
</div>

<script>
    let db = [];
    const firmaAngeloB64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAABkCAYAAADD9n8HAAAAAXNSR0IArs4c6QAAEchJREFUeF7tXWtsHMcV/mZ29+79uCTvS5RESpYpWZZjxY6dWnHaInZsOHVaw0DRFm0fDf3ToAUK9E+BAn3ToEDRP9mgaVvHSBEnTuw6LlzVkiXHkhV9iqREiqIoeZ8P7969O7szU9zLS2mXpC7Iu0uu7wMGe7N378z55szMmTMzR0BfGgMaA1UfA9Xfgr6hxoDGgBoB9CHQGKjxGNAI1HjD69trBGoM0GdAY6DGY0AjUOMNr2+vEagxQJ8BjYEajwGNQI03vL69RoDGAn0GNAZqPAY0AjXe8Pr2GgEaA/QZ0Bio8RjQCNR4w+vbawRoDNBnQGOgxmNAI1DjDa9vrxGgMUCTAclI7E7M7M49eIAs6X6X7u/60hioixigTCI2En0pZnbnHzxAlvS4S/d3fWkM1EUMUCYRG4m+FDO78w8eIEt63KX7u740BuoiBiiTiI1EX4qZ3fkHD5AlPe7S/V1fGgN1EQOUScRGoi/FzO78gwfIkh536f6uL42BuogByiRiI9GXYmZ3/sEDZEmPu3R/15fGQF3EAGUSsZHoSzGzO/8fHSDqIatfF7fN9GvXFv6Sre/N0beu3higSCKmi0XEnBv8f15E6O8EInYnHqAn3Z/N8TfR8/Pz5Mknnmh5XpD6f9m5IubY4P+vE/mE7uD8AmXSuZHoCzGzu/7hAWpU6i6fHz9+nHznO98pS7mI6WIRMeH8/3QiH9f9XpBAEisRG4vOi5ndfX8XIEt6WvT5v3MMLFuAlEnERmIvxczuvr8LkCU9Xfr83zkGlilAnInYvTHM7P76O8fAkh4uff7vHgPLEyDxvTHM7P76O8fAkh4uff7vHgPLEyDxHTHM7P76O8fAkh4uff7vHgPLEyDx7THM7P76O8fAkh4uff7vHgPLEiDxbTHM7P76O8fAkh4uff7vHgPLEiDxzTHM7P76O8fAkh4uff7vHgPLEiDxjTHM7P76O8fAkh4uff7vHgPLEyDujTHM7P76O8fAkh4uff7vHgPLEiDu9THM7P76O8fAkh4uff7vHgPLEiDu1THM7P76O8fAkh4uff7vHgPLEiDubTHM7P76O8fAkh4uff7vHgPLEiDurzHM7P76O8fAkh4uff7vHgPLEiDu9TDM7P76O8fAkh4uff7vHgPLEiDu8TDM7P76O8fAkh4uff7vHgPLEiDu7jDM7P76O8fAkh4uff7vHgPLEiDuTjPM7P76O8fAkh4uff7vHgPLEiDuNTPM7P76O8fAkh4uff7vHgPLEiDuFTPM7P76O8fAkh4uff7vHgPLEiDubjPM7P76O8fAkh4uff7vHgPLEiDuVTPM7P76O8fAkh4uff7vHgPLEyDuyTDMPPofvMvS/S7d3/WlMVAnMUCZRGwkekPM7MH/WpY0f/r9v86Krt6/XGUSsbHoXszshR8dIEt6XfT5v3MMLFeAuFNR8U6O+f889S9fXxoDdX4C0X8W/f8Rk79v9O/79K99Y4CyREz3X8TfM+7vGfeZ940B5f//BvA68Y9TInUfAAAAAElFTkSuQmCC";

    function startApp() {
        const input = document.getElementById('json-input').value;
        try {
            db = JSON.parse(input).map(i => ({...i, current: 0}));
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('dash-ui').classList.remove('hidden');
            document.getElementById('main-container').classList.remove('hidden');
            document.getElementById('action-ui').classList.remove('hidden');
            render();
        } catch(e) { alert("JSON Inválido. Verifique y pegue de nuevo."); }
    }

    function render() {
        const list = document.getElementById('inventory-list');
        list.innerHTML = "";
        db.forEach((item, idx) => {
            const boxes = item.current / item.u_por_caja;
            const ok = boxes >= item.cajas_pck;
            list.innerHTML += `
                <div class="card ${ok ? 'complete' : ''}">
                    <span class="sku-tag">${item.sku}</span>
                    <div class="product-name">${item.desc}</div>
                    <div class="input-group">
                        <div class="field-container">
                            <input type="number" value="${boxes || ''}" placeholder="0" 
                                   oninput="updateVal(${idx}, this.value)" inputmode="numeric">
                        </div>
                        <div class="meta-tag">META: ${item.cajas_pck} CJ</div>
                    </div>
                </div>`;
        });
        updateKPIs();
    }

    function updateVal(idx, val) {
        const n = parseFloat(val) || 0;
        db[idx].current = n * db[idx].u_por_caja;
        updateKPIs();
    }

    function updateKPIs() {
        let rec = 0, exp = 0;
        db.forEach(i => { rec += (i.current / i.u_por_caja); exp += i.cajas_pck; });
        document.getElementById('total-val').innerText = Math.round(rec);
        document.getElementById('eff-val').innerText = exp > 0 ? Math.round((rec/exp)*100) + "%" : "0%";
    }

    async function fireReport() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Header Estética Pro
        doc.setFillColor(0,0,0);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(18).setFont(undefined, 'bold').text("INVENTORY AUDIT REPORT", 105, 18, {align:'center'});
        doc.setFontSize(8).setFont(undefined, 'normal').text("GENERADO POR TWINS LOGISTICS PRO SYSTEM", 105, 28, {align:'center'});
        
        doc.setTextColor(0,0,0);
        doc.setFontSize(10).setFont(undefined, 'bold').text(`AUDITOR: J. ANGELO NUÑEZ DURAND`, 15, 55);
        doc.setFontSize(9).setFont(undefined, 'normal').text(`FECHA: ${new Date().toLocaleString()}`, 15, 62);

        const tableBody = db.map(i => [
            i.sku, 
            i.desc.substring(0,45), 
            i.cajas_pck, 
            (i.current/i.u_por_caja).toFixed(0),
            (i.current/i.u_por_caja >= i.cajas_pck ? "OK" : "FALTA")
        ]);

        doc.autoTable({
            startY: 70,
            head: [['SKU', 'DESCRIPCIÓN', 'PLAN', 'REAL', 'ESTADO']],
            body: tableBody,
            headStyles: { fillColor: [0, 0, 0], textColor: [255, 255, 255], fontSize: 8 },
            styles: { fontSize: 7, cellPadding: 4 },
            columnStyles: { 4: { fontStyle: 'bold' } }
        });

        const finalY = doc.lastAutoTable.finalY + 25;
        if(finalY > 260) doc.addPage();
        
        // Bloque de Firma Final
        doc.addImage(firmaAngeloB64, 'PNG', 80, finalY - 20, 50, 20);
        doc.setLineWidth(0.5).line(70, finalY, 140, finalY);
        doc.setFontSize(10).setFont(undefined, 'bold').text("J. ANGELO NUÑEZ DURAND", 105, finalY + 8, {align:'center'});
        doc.setFontSize(8).setFont(undefined, 'normal').text("ASISTENTE DE LOGÍSTICA", 105, finalY + 14, {align:'center'});
        doc.setFontSize(7).setTextColor(120).text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 105, finalY + 25, {align:'center'});

        doc.save(`Twins_Audit_${new Date().getTime()}.pdf`);
    }
</script>
</body>
</html>
