<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v59 - Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7fa; color: #1e293b; height: 100vh; overflow: hidden; margin: 0; }
        
        /* Layout Compacto */
        .view { display: none; height: 100vh; padding: 1rem; flex-direction: column; box-sizing: border-box; }
        .view.active { display: flex; }

        /* Cronómetro Flotante */
        .timer-badge { background: #1e293b; color: #3b82f6; padding: 4px 12px; border-radius: 20px; font-weight: 900; font-size: 12px; font-variant-numeric: tabular-nums; border: 1px solid #3b82f6; shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* Barra de Progreso Mejorada */
        .logistics-track { height: 50px; background: #e2e8f0; border-radius: 1rem; position: relative; overflow: hidden; border: 2px solid #fff; }
        .progress-flow { position: absolute; height: 100%; background: linear-gradient(90deg, #2563eb, #3b82f6); transition: width 0.5s ease; }
        .truck-unit { position: absolute; top: 50%; transform: translateY(-50%); transition: left 0.5s ease; z-index: 10; display: flex; align-items: center; }
        .truck-body { background: #1e293b; color: white; padding: 4px 8px; border-radius: 8px; font-size: 8px; font-weight: 900; border: 1px solid #3b82f6; }

        /* Inputs y Botones */
        .input-pro { background: white; border: 2px solid #e2e8f0; border-radius: 1rem; padding: 0.8rem; width: 100%; font-weight: 700; outline: none; }
        .footer-fixed { position: fixed; bottom: 0; left: 0; right: 0; padding: 1rem; background: linear-gradient(to top, #f4f7fa 80%, transparent); }
        .btn-action { background: #1e293b; color: white; border-radius: 1rem; padding: 1rem; width: 100%; font-weight: 900; text-transform: uppercase; }

        .search-results { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100; max-h: 200px; overflow-y: auto; }
    </style>
</head>
<body>

    <header class="h-16 px-6 flex justify-between items-center bg-white border-b">
        <div>
            <p class="text-[7px] font-black text-blue-600 uppercase tracking-widest">Master Inventory</p>
            <h1 class="text-lg font-black italic">TAJHO<span class="text-slate-400">.OS</span></h1>
        </div>
        <div id="op-timer" class="timer-badge hidden">00:00:00</div>
    </header>

    <div id="view-crear" class="view active">
        <h2 class="text-lg font-black mb-3">CONFIGURAR <span class="text-blue-600 italic">CARGA</span></h2>
        <div class="bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-sm space-y-3 relative">
            <div class="relative">
                <input type="text" id="s-sku" oninput="smartSearch()" class="input-pro" placeholder="SKU o Descripción">
                <div id="results" class="search-results hidden"></div>
            </div>
            <div class="flex gap-2">
                <input type="number" id="s-meta" class="input-pro flex-1" placeholder="Meta">
                <button onclick="addMani()" class="w-12 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center shadow-lg"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg></button>
            </div>
        </div>
        <div class="flex-grow overflow-y-auto mt-4 pb-24">
            <div id="pre-list" class="space-y-2"></div>
        </div>
        <div class="footer-fixed">
            <button id="btn-start" onclick="openModal()" class="btn-action hidden">INICIAR DESCARGA</button>
        </div>
    </div>

    <div id="view-ops" class="view">
        <div class="bg-white p-4 rounded-[1.5rem] shadow-sm mb-4">
            <div class="flex justify-between items-center mb-2">
                <span class="text-[9px] font-black text-blue-600 uppercase italic">Avance Logístico</span>
                <span id="global-pc" class="text-xl font-black">0%</span>
            </div>
            <div class="logistics-track">
                <div id="progress-flow" class="progress-flow" style="width: 0%"></div>
                <div id="truck-unit" class="truck-unit" style="left: 0%">
                    <div class="truck-body">TAJHO</div>
                </div>
            </div>
        </div>

        <div class="text-center mb-4">
            <select id="sel-sku" onchange="syncItem()" class="text-xl font-black bg-white border-2 border-slate-100 rounded-xl px-4 py-2 w-full outline-none italic uppercase text-slate-900 shadow-sm"></select>
            <p id="live-desc" class="text-[9px] font-bold text-blue-500 uppercase mt-1 px-4 truncate"></p>
        </div>

        <div class="flex flex-col gap-4">
            <div class="flex items-center justify-center gap-4">
                <input type="number" id="qty-in" class="input-pro w-28 h-16 text-center text-3xl !rounded-[1.5rem] border-2 shadow-inner" placeholder="0">
                <button onclick="registrarBulto()" class="w-16 h-16 bg-blue-600 text-white rounded-[1.5rem] flex items-center justify-center shadow-xl active:scale-90"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg></button>
            </div>
            <div class="grid grid-cols-2 gap-3 px-2">
                <div class="bg-white p-4 rounded-2xl border border-slate-50 text-center shadow-sm">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Restante</p>
                    <p id="live-rem" class="text-2xl font-black">0</p>
                </div>
                <div class="bg-slate-900 p-4 rounded-2xl text-center">
                    <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Confirmado</p>
                    <p id="live-real" class="text-2xl font-black text-white">0</p>
                </div>
            </div>
        </div>

        <div class="footer-fixed">
            <button onclick="finishAndReport()" class="btn-action">CERRAR Y GENERAR REPORTE</button>
        </div>
    </div>

    <div id="modal-choice" class="fixed inset-0 z-[1000] bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-8">
        <div class="bg-white w-full rounded-[2rem] p-8 text-center">
            <h3 class="font-black mb-6">¿INICIAR CRONÓMETRO?</h3>
            <button onclick="continuarConteo()" class="btn-action">EMPEZAR</button>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_items = {};
        let currentMani = JSON.parse(localStorage.getItem('taj_cur')) || [];
        let activeJob = JSON.parse(localStorage.getItem('taj_active')) || null;
        let timerInterval;
        let seconds = 0;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                const raw = await res.json();
                raw.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().toUpperCase()] = r.DESCRIPCION; });
            } catch (e) { console.warn("Modo Offline"); }
        }

        function smartSearch() {
            const val = document.getElementById('s-sku').value.toUpperCase();
            const resDiv = document.getElementById('results');
            if(val.length < 1) { resDiv.classList.add('hidden'); return; }
            const matches = Object.keys(db_items).filter(k => k.includes(val) || db_items[k].toUpperCase().includes(val)).slice(0,8);
            resDiv.innerHTML = matches.map(k => `<div onclick="setProd('${k}')" class="p-3 border-b text-[10px] font-bold uppercase">${k} - ${db_items[k]}</div>`).join('');
            resDiv.classList.toggle('hidden', matches.length === 0);
        }

        function setProd(sku) {
            document.getElementById('s-sku').value = sku;
            document.getElementById('results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "S/D", meta, real: 0 });
            localStorage.setItem('taj_cur', JSON.stringify(currentMani));
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderPreList() {
            document.getElementById('pre-list').innerHTML = currentMani.map(i => `<div class="bg-white p-3 rounded-xl border-l-4 border-blue-600 flex justify-between font-black text-[11px]"><span>${i.sku}</span><span class="text-blue-600">${i.meta} CJ</span></div>`).join('');
            document.getElementById('btn-start').classList.toggle('hidden', currentMani.length === 0);
        }

        function openModal() { document.getElementById('modal-choice').style.display = 'flex'; }
        
        function continuarConteo() {
            document.getElementById('modal-choice').style.display = 'none';
            activeJob = { id: Date.now(), start: new Date().toLocaleTimeString(), items: [...currentMani] };
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
            currentMani = []; localStorage.removeItem('taj_cur');
            startTimer();
            startOps();
        }

        function startTimer() {
            document.getElementById('op-timer').classList.remove('hidden');
            timerInterval = setInterval(() => {
                seconds++;
                let h = Math.floor(seconds / 3600).toString().padStart(2, '0');
                let m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                let s = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('op-timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function startOps() {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-ops').classList.add('active');
            // Añadir opción por defecto
            const selector = document.getElementById('sel-sku');
            selector.innerHTML = `<option value="">SELECCIONA PRODUCTO</option>` + activeJob.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem();
        }

        function syncItem() {
            const val = document.getElementById('sel-sku').value;
            const item = activeJob.items.find(i => i.sku === val);
            if(item) {
                document.getElementById('live-desc').innerText = item.desc;
                document.getElementById('live-rem').innerText = Math.max(0, item.meta - item.real);
                document.getElementById('live-real').innerText = item.real;
            } else {
                document.getElementById('live-desc').innerText = "ESPERANDO SELECCIÓN";
                document.getElementById('live-rem').innerText = "0";
                document.getElementById('live-real').innerText = "0";
            }

            const totalM = activeJob.items.reduce((a,b) => a + b.meta, 0);
            const totalR = activeJob.items.reduce((a,b) => a + b.real, 0);
            const pc = Math.min(Math.round((totalR / totalM) * 100), 100);
            document.getElementById('progress-flow').style.width = pc + "%";
            document.getElementById('truck-unit').style.left = `calc(${pc}% - 35px)`;
            document.getElementById('global-pc').innerText = pc + "%";
        }

        function registrarBulto() {
            const val = document.getElementById('sel-sku').value;
            const q = parseInt(document.getElementById('qty-in').value);
            if(!val || !q) { alert("Selecciona producto y cantidad"); return; }
            
            const item = activeJob.items.find(i => i.sku === val);
            item.real += q;
            document.getElementById('qty-in').value = '';
            
            // VOLVER A "SELECCIONA PRODUCTO"
            document.getElementById('sel-sku').value = "";
            
            syncItem();
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
            navigator.vibrate(30);
        }

        function finishAndReport() {
            clearInterval(timerInterval);
            const duration = document.getElementById('op-timer').innerText;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(14); doc.text("REPORTE OPERATIVO TAJHO.OS", 14, 20);
            doc.setFontSize(10); doc.text(`Inicio: ${activeJob.start} | Duración Total: ${duration}`, 14, 28);
            doc.autoTable({
                startY: 35, head: [['SKU', 'META', 'REAL', 'DIF']],
                body: activeJob.items.map(i => [i.sku, i.meta, i.real, i.meta-i.real]),
                theme: 'striped', headStyles: { fillColor: [30, 41, 59] }
            });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 10);
            doc.save(`TAJHO_OP_${Date.now()}.pdf`);
            location.reload();
        }

        init();
    </script>
</body>
</html>
