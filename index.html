<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tajho Logistics | Aura Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root { --accent: #00f7ff; --surface: #050508; --panel: rgba(255, 255, 255, 0.03); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--surface); color: #fff; overflow-x: hidden; }
        .view { display: none; min-height: 100vh; padding: 24px; padding-bottom: 120px; flex-direction: column; }
        .view.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.2, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: var(--panel); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 30px; }
        .btn-main { background: #fff; color: #000; font-weight: 800; text-transform: uppercase; border-radius: 20px; transition: all 0.3s; }
        input, select { background: rgba(255,255,255,0.05)!important; border: 1px solid rgba(255,255,255,0.1)!important; color: #fff!important; border-radius: 18px!important; padding: 18px!important; outline: none!important; }
        .tab-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 160px; border-radius: 32px; background: var(--panel); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .tab-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="v-dash" class="view active">
        <header class="pt-12 pb-10">
            <h1 class="text-xs font-black tracking-[0.4em] text-white/30 uppercase mb-2">Tajho Intelligence</h1>
            <h2 class="text-4xl font-black italic">¿QUÉ HACEMOS <span class="text-accent">HOY?</span></h2>
        </header>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="navTo('create')" class="tab-btn">
                <i class="ph-duotone ph-truck text-5xl text-accent mb-4"></i>
                <span class="text-[10px] font-black uppercase tracking-widest">Crear<br>Contenedor</span>
            </button>
            <button onclick="navTo('hist')" class="tab-btn">
                <i class="ph-duotone ph-clipboard-text text-5xl text-purple-400 mb-4"></i>
                <span class="text-[10px] font-black uppercase tracking-widest">Historial<br>Reportes</span>
            </button>
        </div>
    </div>

    <div id="v-create" class="view">
        <div class="flex items-center gap-4 mb-8" onclick="navTo('dash')">
            <i class="ph-bold ph-arrow-left text-xl"></i>
            <h2 class="text-2xl font-black italic uppercase">Nuevo Contenedor</h2>
        </div>
        
        <div class="glass p-6 space-y-4">
            <div class="relative">
                <input type="text" id="sku-search" oninput="searchSku(this.value)" class="w-full font-bold" placeholder="Buscar SKU (Hoja 1)...">
                <div id="results" class="absolute w-full mt-2 glass z-50 hidden overflow-hidden"></div>
            </div>
            <div class="flex gap-2">
                <input type="number" id="sku-meta" class="w-full text-center font-black" placeholder="Meta">
                <button onclick="addToList()" class="px-6 btn-main text-[10px]">Añadir</button>
            </div>
        </div>

        <div id="pre-list" class="mt-6 space-y-2 flex-1"></div>
        
        <button onclick="saveAndGoHist()" class="w-full py-5 btn-main bg-accent border-none mt-4 shadow-xl shadow-cyan-500/20">
            Guardar Contenedor
        </button>
    </div>

    <div id="v-hist" class="view">
        <div class="flex items-center gap-4 mb-8" onclick="navTo('dash')">
            <i class="ph-bold ph-arrow-left text-xl"></i>
            <h2 class="text-2xl font-black italic uppercase">Historial</h2>
        </div>
        <div id="history-list" class="space-y-3"></div>
    </div>

    <div id="v-work" class="view">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black italic uppercase text-accent" id="active-id"></h2>
            <button onclick="finishWork()" class="px-4 py-2 glass text-[10px] font-black text-green-400">FINALIZAR</button>
        </div>
        
        <div class="glass p-8 text-center mb-6">
            <select id="work-sel" onchange="renderStats()" class="w-full mb-6 font-black text-xl text-center"></select>
            <div class="flex items-center justify-center gap-4">
                <input type="number" id="work-val" class="w-24 text-4xl font-black text-center" placeholder="0">
                <button onclick="doCount()" class="w-16 h-16 rounded-2xl bg-white text-black flex items-center justify-center shadow-lg">
                    <i class="ph-bold ph-plus text-2xl"></i>
                </button>
            </div>
        </div>
        <div id="work-stats" class="space-y-2"></div>
    </div>

    <script>
        const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let master = [], preItems = [], workingOp = null;

        window.onload = async () => {
            renderHistory();
            try { 
                const res = await fetch(SHEETS_URL); 
                master = await res.json(); 
            } catch(e) {}
        };

        function navTo(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            if(v === 'hist') renderHistory();
        }

        // --- LÓGICA CREACIÓN ---
        function searchSku(q) {
            const div = document.getElementById('results');
            if (q.length < 2) { div.classList.add('hidden'); return; }
            const m = master.filter(p => p.sku.toLowerCase().includes(q.toLowerCase())).slice(0, 5);
            div.innerHTML = m.map(x => `<div onclick="setSku('${x.sku}')" class="p-4 border-b border-white/5 font-bold text-sm">${x.sku}</div>`).join('');
            div.classList.remove('hidden');
        }
        function setSku(s) { document.getElementById('sku-search').value = s; document.getElementById('results').classList.add('hidden'); }
        
        function addToList() {
            const s = document.getElementById('sku-search').value, m = parseInt(document.getElementById('sku-meta').value);
            if(!s || !m) return;
            preItems.push({ sku: s, meta: m, r: 0, status: 'pending' });
            document.getElementById('sku-search').value = ''; document.getElementById('sku-meta').value = '';
            renderPre();
        }
        function renderPre() {
            document.getElementById('pre-list').innerHTML = preItems.map((x, i) => `<div class="glass p-4 flex justify-between text-xs font-bold"><span>${x.sku} (META: ${x.meta})</span><button onclick="preItems.splice(${i},1);renderPre()"><i class="ph-bold ph-trash text-red-500"></i></button></div>`).join('');
        }

        async function saveAndGoHist() {
            if(preItems.length === 0) return;
            const op = { id: `CONT-${Date.now().toString().slice(-4)}`, date: new Date().toLocaleString(), items: [...preItems], completed: false };
            let h = JSON.parse(localStorage.getItem('tj_hist') || '[]');
            h.unshift(op);
            localStorage.setItem('tj_hist', JSON.stringify(h));
            
            // Sync invisible
            fetch(SHEETS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ accion: 'guardar_contenedor', ...op }) });
            
            preItems = [];
            document.getElementById('pre-list').innerHTML = '';
            navTo('hist');
        }

        // --- LÓGICA HISTORIAL ---
        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('tj_hist') || '[]');
            document.getElementById('history-list').innerHTML = h.map((x, i) => `
                <div class="glass p-5 flex justify-between items-center">
                    <div>
                        <p class="text-[8px] font-black text-white/30 mb-1 uppercase">${x.date}</p>
                        <p class="text-sm font-black italic">${x.id}</p>
                    </div>
                    ${x.completed ? 
                        `<button onclick="genPDF(${i})" class="w-12 h-12 rounded-2xl bg-accent text-black flex items-center justify-center shadow-lg shadow-cyan-500/30"><i class="ph-bold ph-file-pdf text-xl"></i></button>` : 
                        `<button onclick="startWork(${i})" class="w-12 h-12 rounded-2xl bg-white text-black flex items-center justify-center font-black text-[9px] italic uppercase">INICIAR</button>`
                    }
                </div>`).join('') || '<p class="text-center py-20 text-white/10 font-bold uppercase text-[10px]">Sin contenedores</p>';
        }

        // --- LÓGICA TRABAJO/DESCARGA ---
        function startWork(idx) {
            const h = JSON.parse(localStorage.getItem('tj_hist') || '[]');
            workingOp = { ...h[idx], globalIndex: idx };
            navTo('work');
            document.getElementById('active-id').innerText = workingOp.id;
            document.getElementById('work-sel').innerHTML = workingOp.items.map(x => `<option value="${x.sku}">${x.sku}</option>`).join('');
            renderStats();
        }

        function doCount() {
            const val = parseInt(document.getElementById('work-val').value);
            if(!val && val !== 0) return;
            const sku = document.getElementById('work-sel').value;
            const it = workingOp.items.find(x => x.sku === sku);
            it.r += val;
            document.getElementById('work-val').value = '';
            renderStats();
        }

        function renderStats() {
            document.getElementById('work-stats').innerHTML = workingOp.items.map(x => `
                <div class="glass p-4">
                    <div class="flex justify-between text-[9px] font-black uppercase mb-2"><span>${x.sku}</span><span class="${x.r >= x.meta ? 'text-green-400' : 'text-accent'}">${x.r} / ${x.meta}</span></div>
                    <div class="h-1 bg-white/5 rounded-full overflow-hidden"><div class="h-full bg-accent" style="width:${Math.min((x.r/x.meta)*100,100)}%"></div></div>
                </div>`).join('');
        }

        async function finishWork() {
            workingOp.completed = true;
            let h = JSON.parse(localStorage.getItem('tj_hist') || '[]');
            h[workingOp.globalIndex] = workingOp;
            localStorage.setItem('tj_hist', JSON.stringify(h));
            
            // Sync invisible
            fetch(SHEETS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ accion: 'finalizar_conteo', ...workingOp }) });
            
            alert("Descarga Completada. PDF habilitado en historial.");
            navTo('hist');
        }

        // --- PDF ---
        function genPDF(idx) {
            const d = JSON.parse(localStorage.getItem('tj_hist') || '[]')[idx];
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(10, 10, 15); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("TAJHO LOGISTICS | REPORTE", 14, 25);
            doc.setTextColor(120); doc.setFontSize(9); doc.text(`ID: ${d.id} | ${d.date}`, 14, 48);

            doc.autoTable({
                startY: 55,
                head: [['SKU', 'META', 'REAL', 'DIFERENCIA']],
                body: d.items.map(it => [it.sku, it.meta, it.r, (it.r - it.meta)]),
                theme: 'grid',
                headStyles: { fillColor: [0, 247, 255], textColor: [0, 0, 0] }
            });

            const finalY = doc.lastAutoTable.finalY + 20;
            doc.setTextColor(0); doc.text("__________________________________", 14, finalY);
            doc.setFont("helvetica", "bold"); doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, finalY + 7);
            doc.setFont("helvetica", "normal"); doc.text("Asist. Inventario Logístico", 14, finalY + 12);
            
            doc.save(`Reporte_${d.id}.pdf`);
        }
    </script>
</body>
</html>
