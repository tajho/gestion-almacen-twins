<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twins Elite Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --primary: #0F172A; 
            --accent: #2563EB; 
            --success: #10B981;
            --bg: #F8FAFC; 
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--primary); 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow-x: hidden;
        }

        .safe-area-top { padding-top: env(safe-area-inset-top); }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .native-card {
            background: #FFFFFF;
            border-radius: 24px;
            border: 1px solid #E2E8F0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .native-card:active { transform: scale(0.97); }

        .search-bar {
            background: #FFFFFF;
            border: 1.5px solid #E2E8F0;
            border-radius: 18px;
            transition: all 0.2s ease;
        }

        .fab-sync {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 64px;
            height: 64px;
            background: var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.2);
            z-index: 40;
        }

        .modal-full { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: #F8FAFC; 
            z-index: 100; 
            flex-direction: column;
            animation: slideIn 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }

        @keyframes slideIn {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .step-btn {
            @apply h-14 w-14 rounded-2xl flex items-center justify-center transition-all active:scale-95 shadow-sm font-bold text-xl;
        }

        .progress-ring {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* --- NUEVO DISEÑO SECCIÓN CONTEO --- */
        .count-item-card {
            @apply bg-white p-5 rounded-[28px] border border-slate-100 shadow-sm transition-all duration-300;
        }

        .count-input {
            @apply w-full bg-slate-50 border-none text-center text-3xl font-900 py-3 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none text-slate-900;
            appearance: none;
        }
        
        .diff-badge {
            @apply px-3 py-1 rounded-full text-[10px] font-900 uppercase tracking-tighter;
        }

        .sku-label {
            @apply text-[10px] font-900 text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md;
        }

        .summary-mini-card {
            @apply bg-slate-900/5 px-4 py-2 rounded-xl flex flex-col items-center justify-center min-w-[70px];
        }

        /* Indicador de cambio */
        .ping-update {
            animation: ping 0.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {
            75%, 100% { transform: scale(1.1); opacity: 0; }
        }
    </style>
</head>
<body class="antialiased">

    <div class="glass-header safe-area-top px-6 py-4 mb-2">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] font-800 text-blue-600 uppercase tracking-widest">Almacén Pro</p>
                <h1 class="text-xl font-800 text-slate-900 tracking-tight">Twins Elite</h1>
            </div>
            <div class="relative flex items-center justify-center">
                <svg class="w-12 h-12">
                    <circle class="text-slate-100" stroke-width="4" stroke="currentColor" fill="transparent" r="20" cx="24" cy="24"/>
                    <circle id="global-ring" class="text-blue-600 progress-ring" stroke-width="4" stroke-dasharray="125.6" stroke-dashoffset="125.6" stroke-linecap="round" stroke="currentColor" fill="transparent" r="20" cx="24" cy="24"/>
                </svg>
                <span id="global-perc" class="absolute text-[10px] font-800">0%</span>
            </div>
        </div>
    </div>

    <div id="app-shell" class="max-w-md mx-auto px-6 pb-24">
        
        <!-- Dashboard Summary -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white p-4 rounded-[22px] border border-slate-100 shadow-sm">
                <i class="ph-fill ph-package text-blue-500 text-xl mb-2"></i>
                <p id="stat-containers" class="text-2xl font-800 text-slate-900">0</p>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Cargas Activas</p>
            </div>
            <div class="bg-white p-4 rounded-[22px] border border-slate-100 shadow-sm">
                <i class="ph-fill ph-barcode text-purple-500 text-xl mb-2"></i>
                <p id="stat-skus" class="text-2xl font-800 text-slate-900">0</p>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">SKUs Registrados</p>
            </div>
        </div>

        <!-- Search & Filter -->
        <div class="flex gap-2 mb-8">
            <div class="flex-1 search-bar flex items-center px-4 py-1">
                <i class="ph-bold ph-magnifying-glass text-slate-400 mr-3"></i>
                <input type="text" id="main-search" oninput="core.render()" placeholder="N° de Contenedor..." 
                    class="w-full py-3 bg-transparent outline-none font-semibold text-sm text-slate-700">
            </div>
            <div class="w-14 h-14 bg-white border border-slate-100 rounded-[18px] flex items-center justify-center relative">
                <i class="ph-bold ph-calendar-blank text-slate-400 text-xl"></i>
                <select id="month-select" onchange="core.filterMonth(this.value)" class="absolute inset-0 opacity-0 cursor-pointer"></select>
            </div>
        </div>

        <div id="container-list" class="space-y-4">
            <div class="py-20 text-center text-slate-400 font-medium">Cargando inventario...</div>
        </div>

        <button onclick="core.fetchData()" class="fab-sync">
            <i id="sync-icon" class="ph-bold ph-arrows-clockwise text-white text-2xl"></i>
        </button>
    </div>

    <!-- MODAL DE AUDITORÍA / CONTEO (MEJORADO - PREMIUM) -->
    <div id="audit-view" class="modal-full">
        <!-- Header Audtoría -->
        <div class="px-6 py-6 flex items-center justify-between bg-white">
            <button onclick="core.closeModal('audit-view')" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center">
                <i class="ph-bold ph-caret-left text-xl"></i>
            </button>
            <div class="text-center">
                <h2 id="audit-title" class="text-base font-900 text-slate-900 tracking-tight leading-none mb-1">Sección Conteo</h2>
                <span id="audit-date" class="text-[9px] font-bold text-blue-600 uppercase bg-blue-50 px-2 py-0.5 rounded-md">CONTENEDOR CARGA</span>
            </div>
            <div class="w-12"></div>
        </div>

        <!-- Panel de Estadísticas Rápidas de la Carga -->
        <div class="px-6 py-4 bg-white border-y border-slate-50 flex items-center justify-between gap-2 overflow-x-auto no-scrollbar">
            <div class="summary-mini-card">
                <span id="audit-count-total" class="text-sm font-900 text-slate-900">0</span>
                <span class="text-[8px] font-bold text-slate-400 uppercase">Teóricos</span>
            </div>
            <div class="summary-mini-card">
                <span id="audit-count-done" class="text-sm font-900 text-blue-600">0</span>
                <span class="text-[8px] font-bold text-slate-400 uppercase">Auditados</span>
            </div>
            <div class="summary-mini-card">
                <span id="audit-count-diff" class="text-sm font-900 text-red-500">0</span>
                <span class="text-[8px] font-bold text-slate-400 uppercase">Diferencia</span>
            </div>
            <div class="flex-1 text-right pl-2">
                 <p id="audit-perc-text" class="text-xs font-900 text-slate-900">0%</p>
                 <div class="h-1.5 w-full bg-slate-100 rounded-full mt-1 overflow-hidden">
                    <div id="audit-perc-bar" class="h-full bg-blue-600 rounded-full transition-all duration-700"></div>
                 </div>
            </div>
        </div>

        <!-- Lista de items para contar -->
        <div id="audit-items-container" class="flex-1 overflow-y-auto p-5 space-y-4 no-scrollbar bg-slate-50/50"></div>

        <!-- Footer Finalizar -->
        <div class="p-6 bg-white border-t border-slate-100 safe-area-bottom shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
            <div class="flex items-center gap-3 mb-5 px-1">
                <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center">
                    <i class="ph-fill ph-shield-check text-blue-500 text-sm"></i>
                </div>
                <p class="text-[10px] font-bold text-slate-400 leading-tight">Autorizado por: <span class="text-slate-900">J. Angelo Nuñez Durand</span></p>
            </div>
            <button onclick="core.saveAndFinish()" class="w-full py-5 bg-slate-900 text-white rounded-[24px] font-900 text-xs shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2 tracking-widest uppercase">
                CONFIRMAR Y FINALIZAR
                <i class="ph-bold ph-check-circle text-lg"></i>
            </button>
        </div>
    </div>

    <!-- MODAL DE DETALLE (LISTA SIMPLE) -->
    <div id="list-view" class="modal-full">
        <div class="px-6 py-8 flex items-center justify-between bg-white">
            <button onclick="core.closeModal('list-view')" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center">
                <i class="ph-bold ph-x text-xl"></i>
            </button>
            <div class="text-center">
                <h2 class="text-base font-800 text-slate-900">Vista de Contenido</h2>
                <p id="list-cont-id" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">--</p>
            </div>
            <div class="w-12"></div>
        </div>
        <div id="list-items-content" class="flex-1 overflow-y-auto px-6 space-y-3 no-scrollbar pb-10"></div>
    </div>

    <script>
        const core = {
            url: "https://script.google.com/macros/s/AKfycbw0KydAuPeiscsYBy-r0TJBWr1xjuCh848gIigA2MFGHDwPJbv-Z8ZqSXIqW4uymlyb/exec",
            raw: JSON.parse(localStorage.getItem('twins_cache')) || [],
            mesesNombre: ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"],
            currentMonth: "",
            activeCont: null,

            getDesc: function(item) {
                const keys = Object.keys(item);
                const descKey = keys.find(k => {
                    const ck = k.toString().toUpperCase();
                    return ck.includes("DESC") || ck.includes("PRODUCTO") || ck.includes("DETALLE");
                });
                return descKey ? item[descKey] : "Producto sin descripción";
            },

            fetchData: async function() {
                const btn = document.getElementById('sync-icon');
                btn.classList.add('animate-spin');
                try {
                    const response = await fetch(this.url);
                    const data = await response.json();
                    if (data && Array.isArray(data)) {
                        this.raw = data.map(item => {
                            const isCompleted = item["ESTADO"] && item["ESTADO"].toString().toUpperCase() === "COMPLETADO";
                            return { 
                                ...item, 
                                audit: isCompleted ? (item["CAJAS"] || 0) : (item.audit || 0) 
                            };
                        });
                        localStorage.setItem('twins_cache', JSON.stringify(this.raw));
                        this.render();
                    }
                } catch (e) { console.error(e); }
                finally { btn.classList.remove('animate-spin'); }
            },

            getItemMonth: function(item) {
                const fecha = item["FECHA_LIMPIA"] || item["FECHA"] || "";
                if (!fecha || fecha === "") return "EN PROGRAMACIÓN";
                const partes = fecha.split("/");
                if (partes.length < 2) return "EN PROGRAMACIÓN";
                const mesIdx = parseInt(partes[1]) - 1;
                return this.mesesNombre[mesIdx] || "EN PROGRAMACIÓN";
            },

            filterMonth: function(m) { this.currentMonth = m; this.render(); },

            render: function() {
                const list = document.getElementById('container-list');
                const search = document.getElementById('main-search').value.toLowerCase();
                const now = new Date();
                const mesActualNom = this.mesesNombre[now.getMonth()];

                if (!this.currentMonth) this.currentMonth = mesActualNom;

                const select = document.getElementById('month-select');
                const uniqueMonths = new Set(this.raw.map(i => this.getItemMonth(i)));
                let options = `<option value="TODOS">TODOS LOS MESES</option>`;
                this.mesesNombre.forEach(m => {
                    if(uniqueMonths.has(m)) options += `<option value="${m}" ${this.currentMonth === m ? 'selected' : ''}>${m}</option>`;
                });
                if(uniqueMonths.has("EN PROGRAMACIÓN")) options += `<option value="EN PROGRAMACIÓN" ${this.currentMonth === "EN PROGRAMACIÓN" ? 'selected' : ''}>EN PROGRAMACIÓN</option>`;
                select.innerHTML = options;

                const groups = {};
                let tTotalCj = 0, tTotalAud = 0;

                this.raw.forEach(item => {
                    const contId = (item["CONTENEDOR"] || item["CONTENEDOR_LIMPIO"] || "S/N").toString();
                    const itemMonth = this.getItemMonth(item);
                    const matchesMonth = (this.currentMonth === "TODOS") || (this.currentMonth === itemMonth);
                    const matchesSearch = contId.toLowerCase().includes(search);

                    if (matchesMonth && matchesSearch) {
                        if (!groups[contId]) groups[contId] = [];
                        groups[contId].push(item);
                        tTotalCj += (item["CAJAS"] || 0);
                        tTotalAud += (item.audit || 0);
                    }
                });

                const globalP = tTotalCj > 0 ? Math.round((tTotalAud/tTotalCj)*100) : 0;
                document.getElementById('global-perc').innerText = globalP + "%";
                document.getElementById('global-ring').style.strokeDashoffset = 125.6 - (125.6 * globalP) / 100;

                const ids = Object.keys(groups);
                document.getElementById('stat-containers').innerText = ids.length;
                document.getElementById('stat-skus').innerText = this.raw.length;

                if(ids.length === 0) {
                    list.innerHTML = `<div class="py-10 text-center text-slate-400 font-medium">Sin datos para este mes</div>`;
                    return;
                }

                list.innerHTML = ids.map(id => {
                    const items = groups[id];
                    let t = 0, a = 0;
                    items.forEach(i => { t += (i["CAJAS"] || 0); a += (i.audit || 0); });
                    const perc = t > 0 ? Math.round((a/t)*100) : 0;
                    const esProg = this.getItemMonth(items[0]) === "EN PROGRAMACIÓN";
                    const isCompleted = items[0]["ESTADO"] && items[0]["ESTADO"].toString().toUpperCase() === "COMPLETADO";

                    return `
                    <div class="native-card p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-[10px] font-900 uppercase">CARGA #${id}</div>
                            <span class="text-[10px] font-bold text-slate-400">${esProg ? 'POR CONFIRMAR' : items[0]["FECHA_LIMPIA"]}</span>
                        </div>
                        <div class="flex items-center gap-4 mb-6">
                            <div class="h-12 w-12 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-400">
                                <i class="ph-bold ph-truck text-2xl"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="text-sm font-800 text-slate-900 uppercase">Contenedor ${id}</h3>
                                <p class="text-[9px] font-bold text-slate-400">DETALLE: ${items.length} SKUs REGISTRADOS</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-900 ${perc >= 100 ? 'text-green-500' : 'text-slate-900'}">${perc}%</p>
                                <p class="text-[8px] font-black text-slate-300 uppercase">CONTEO</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            ${!isCompleted ? `
                            <button onclick="core.openAudit('${id}')" class="flex-1 bg-slate-900 text-white h-14 rounded-2xl flex items-center justify-center gap-2 font-bold text-[10px] uppercase tracking-wider">
                                <i class="ph-bold ph-selection-all text-lg"></i> Conteo
                            </button>
                            ` : ''}
                            <button onclick="core.viewList('${id}')" class="flex-1 bg-white border border-slate-100 h-14 rounded-2xl flex items-center justify-center gap-2 font-bold text-[10px] text-slate-600 uppercase tracking-wider shadow-sm">
                                <i class="ph-bold ph-list-bullets text-lg"></i> Lista
                            </button>
                            <button onclick="core.generatePDF('${id}')" class="w-14 bg-red-50 text-red-600 h-14 rounded-2xl flex items-center justify-center">
                                <i class="ph-bold ph-file-pdf text-xl"></i>
                            </button>
                        </div>
                    </div>`;
                }).join('');
            },

            openAudit: function(id) {
                this.activeCont = id;
                const items = this.raw.filter(i => (i["CONTENEDOR"] || i["CONTENEDOR_LIMPIO"]) == id);
                document.getElementById('audit-title').innerText = "Carga #" + id;
                this.renderAuditItems(items);
                this.updateProgress(id);
                document.getElementById('audit-view').style.display = 'flex';
            },

            renderAuditItems: function(items) {
                document.getElementById('audit-items-container').innerHTML = items.map(item => {
                    const idx = this.raw.indexOf(item);
                    const diff = (item.audit || 0) - (item["CAJAS"] || 0);
                    const diffColor = diff === 0 ? 'bg-slate-100 text-slate-400' : (diff > 0 ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600');
                    
                    return `
                    <div id="card-${idx}" class="count-item-card">
                        <div class="flex justify-between items-start mb-5">
                            <div class="flex-1 pr-3">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="sku-label">${item["CODIGO"]}</span>
                                    <span id="diff-${idx}" class="diff-badge ${diffColor}">${diff === 0 ? 'OK' : (diff > 0 ? '+'+diff : diff)}</span>
                                </div>
                                <h4 class="text-xs font-900 text-slate-800 leading-tight uppercase line-clamp-2">${this.getDesc(item)}</h4>
                            </div>
                            <div class="text-right">
                                <div class="text-[8px] font-bold text-slate-300 uppercase mb-1 tracking-widest">Teórico</div>
                                <div class="text-sm font-900 text-slate-900">${item["CAJAS"] || 0}</div>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-4">
                            <button onclick="core.step(${idx}, -1)" class="step-btn bg-white border border-slate-200 text-slate-400">
                                <i class="ph-bold ph-minus"></i>
                            </button>
                            
                            <div class="flex-1 relative">
                                <input type="number" 
                                    id="input-${idx}" 
                                    inputmode="numeric"
                                    pattern="[0-9]*"
                                    value="${item.audit || 0}" 
                                    onchange="core.manualCount(${idx}, this.value)"
                                    class="count-input">
                                <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 text-[8px] font-black text-blue-500/40 uppercase">Auditado</div>
                            </div>

                            <button onclick="core.step(${idx}, 1)" class="step-btn bg-blue-600 text-white shadow-blue-200">
                                <i class="ph-bold ph-plus"></i>
                            </button>
                        </div>
                    </div>`;
                }).join('');
            },

            step: function(idx, val) {
                const item = this.raw[idx];
                const input = document.getElementById(`input-${idx}`);
                item.audit = Math.max(0, (item.audit || 0) + val);
                input.value = item.audit;
                
                // Efecto de feedback visual
                input.classList.add('scale-105', 'text-blue-600');
                setTimeout(() => input.classList.remove('scale-105', 'text-blue-600'), 100);

                this.updateUIItem(idx);
                this.updateProgress(this.activeCont);
            },

            manualCount: function(idx, val) {
                const item = this.raw[idx];
                item.audit = Math.max(0, parseInt(val) || 0);
                this.updateUIItem(idx);
                this.updateProgress(this.activeCont);
            },

            updateUIItem: function(idx) {
                const item = this.raw[idx];
                const diff = (item.audit || 0) - (item["CAJAS"] || 0);
                const tag = document.getElementById(`diff-${idx}`);
                tag.innerText = diff === 0 ? 'OK' : (diff > 0 ? '+'+diff : diff);
                tag.className = `diff-badge ${diff === 0 ? 'bg-slate-100 text-slate-400' : (diff > 0 ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600')}`;
            },

            updateProgress: function(id) {
                const items = this.raw.filter(i => (i["CONTENEDOR"] || i["CONTENEDOR_LIMPIO"]) == id);
                let tT = 0, tA = 0, diffCount = 0;
                items.forEach(i => { 
                    tT += (i["CAJAS"] || 0); 
                    tA += (i.audit || 0); 
                    if(i.audit !== i["CAJAS"]) diffCount += Math.abs((i.audit || 0) - (i["CAJAS"] || 0));
                });
                
                const perc = tT > 0 ? Math.round((tA/tT)*100) : 0;
                
                document.getElementById('audit-perc-bar').style.width = Math.min(100, perc) + "%";
                document.getElementById('audit-perc-text').innerText = perc + "%";
                document.getElementById('audit-count-total').innerText = tT;
                document.getElementById('audit-count-done').innerText = tA;
                document.getElementById('audit-count-diff').innerText = diffCount;
            },

            viewList: function(id) {
                const items = this.raw.filter(i => (i["CONTENEDOR"] || i["CONTENEDOR_LIMPIO"]) == id);
                document.getElementById('list-cont-id').innerText = "Ref: " + id;
                document.getElementById('list-items-content').innerHTML = items.map(item => `
                    <div class="bg-white px-5 py-4 rounded-2xl border border-slate-50 flex justify-between items-center">
                        <div class="flex-1 pr-4">
                            <p class="text-[10px] font-900 text-slate-900 mb-0.5">${item["CODIGO"]}</p>
                            <p class="text-[9px] text-slate-400 uppercase line-clamp-1">${this.getDesc(item)}</p>
                        </div>
                        <div class="text-right flex items-center gap-3">
                             <span class="text-xs font-900 ${item.audit >= item["CAJAS"] ? 'text-green-500' : 'text-slate-900'}">${item.audit || 0}/${item["CAJAS"] || 0}</span>
                             <i class="ph-fill ph-check-circle ${item.audit >= item["CAJAS"] ? 'text-green-400' : 'text-slate-100'} text-xl"></i>
                        </div>
                    </div>
                `).join('');
                document.getElementById('list-view').style.display = 'flex';
            },

            closeModal: function(id) { document.getElementById(id).style.display = 'none'; },
            
            saveAndFinish: function() {
                localStorage.setItem('twins_cache', JSON.stringify(this.raw));
                this.closeModal('audit-view');
                this.render();
                // Opcional: Toast de éxito
            },

            generatePDF: function(id) {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const items = this.raw.filter(i => (i["CONTENEDOR"] || i["CONTENEDOR_LIMPIO"]) == id);
                const fechaReporte = items[0]["FECHA_LIMPIA"] || "PENDIENTE";

                doc.setFontSize(22);
                doc.setTextColor(15, 23, 42);
                doc.text("TWINS ALMACEN", 14, 22);
                doc.setFontSize(9);
                doc.setTextColor(120);
                doc.text(`REPORTE DE AUDITORÍA • TAJHO • CONTENEDOR: ${id} • FECHA: ${fechaReporte}`, 14, 30);
                
                const tableBody = items.map(i => [
                    i["CODIGO"] || "---", 
                    this.getDesc(i), 
                    i["CAJAS"] || 0, 
                    i.audit || 0, 
                    (i.audit || 0) - (i["CAJAS"] || 0)
                ]);

                doc.autoTable({
                    startY: 40,
                    head: [['SKU', 'DESCRIPCIÓN', 'TEO', 'AUD', 'DIF']],
                    body: tableBody,
                    headStyles: { fillColor: [15, 23, 42], fontSize: 9, halign: 'center' },
                    styles: { fontSize: 7, cellPadding: 2 },
                    columnStyles: { 0: { cellWidth: 25 }, 1: { cellWidth: 90 }, 2: { halign: 'center' }, 3: { halign: 'center' }, 4: { halign: 'center' } }
                });
                
                const finalY = doc.lastAutoTable.finalY + 20;
                doc.setFontSize(9);
                doc.setTextColor(15, 23, 42);
                doc.text("Revisión autorizada por:", 14, finalY);
                doc.setFont("helvetica", "bold");
                doc.text("J. Angelo Nuñez Durand", 14, finalY + 6);
                doc.setFont("helvetica", "normal");
                doc.text("Asist. Inventario Logístico", 14, finalY + 11);
                
                doc.save(`Reporte_Conteo_${id}.pdf`);
            }
        };

        window.onload = () => { if(core.raw.length > 0) core.render(); else core.fetchData(); };
    </script>
</body>
</html>
