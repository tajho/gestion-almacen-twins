<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twins | Logistics Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; --surface: #ffffff; --text: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        .view { display: none; min-height: 100vh; padding: 1.5rem; flex-direction: column; }
        .view.active { display: flex; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .card-app { background: var(--surface); border-radius: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .input-app { background: #f1f5f9; border: 2px solid transparent; border-radius: 0.75rem; padding: 1rem; transition: 0.2s; width: 100%; outline: none; }
        .input-app:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn-main { background: var(--accent); color: white; font-weight: 700; border-radius: 0.75rem; padding: 1.25rem; text-align: center; transition: 0.2s; width: 100%; }
        .btn-main:active { transform: scale(0.97); background: #1d4ed8; }

        /* Barra de progreso elegante */
        .p-bar { height: 10px; background: #e2e8f0; border-radius: 99px; overflow: hidden; position: relative; }
        .p-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.5s ease; }
    </style>
</head>
<body>

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black text-xs">T</div>
            <h1 class="text-lg font-extrabold tracking-tight text-slate-900">TWINS <span class="text-blue-600">LOGISTICS</span></h1>
        </div>
        <button onclick="navTo('historial')" class="text-slate-400 hover:text-blue-600 transition-colors">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        </button>
    </header>

    <div id="view-home" class="view active">
        <div class="py-6">
            <p class="text-blue-600 font-bold text-xs uppercase tracking-widest mb-1">Bienvenido de nuevo</p>
            <h2 class="text-3xl font-extrabold text-slate-900">Gestión de Inventario</h2>
        </div>

        <div class="grid gap-4">
            <button onclick="navTo('crear')" class="card-app p-6 flex flex-col items-start text-left gap-4 hover:border-blue-200 transition-all active:scale-95">
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                </div>
                <div>
                    <h3 class="font-bold text-lg">Nueva Operación</h3>
                    <p class="text-sm text-slate-500">Configurar despacho y meta de bultos.</p>
                </div>
            </button>

            <button onclick="navTo('historial')" class="card-app p-6 flex flex-col items-start text-left gap-4 hover:border-slate-300 transition-all active:scale-95">
                <div class="w-12 h-12 bg-slate-50 text-slate-600 rounded-xl flex items-center justify-center">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                </div>
                <div>
                    <h3 class="font-bold text-lg">Archivo de Reportes</h3>
                    <p class="text-sm text-slate-500">Consulta y descarga reportes anteriores.</p>
                </div>
            </button>
        </div>

        <div class="mt-auto py-8">
            <div class="bg-blue-600 rounded-2xl p-6 text-white shadow-lg shadow-blue-200">
                <p class="text-[10px] font-bold uppercase opacity-80 tracking-widest mb-1">Encargado de Inventario</p>
                <p class="text-lg font-bold italic">J. Angelo Nuñez Durand</p>
            </div>
        </div>
    </div>

    <div id="view-crear" class="view">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="navTo('home')" class="p-2 bg-white rounded-lg border border-slate-200">←</button>
            <h2 class="text-xl font-extrabold">Configurar Despacho</h2>
        </div>

        <div class="card-app p-6 space-y-6">
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase ml-1">Identificador (Guía/Contenedor)</label>
                <input type="text" id="c-id" class="input-app mt-2 font-bold text-blue-600 uppercase" placeholder="EJ: CONT-001">
            </div>

            <div class="relative">
                <label class="text-xs font-bold text-slate-400 uppercase ml-1">Producto / SKU</label>
                <input type="text" id="s-sku" oninput="liveSearch()" class="input-app mt-2" placeholder="Buscar por código o nombre...">
                <div id="results" class="absolute z-50 left-0 right-0 bg-white border border-slate-200 rounded-xl mt-1 hidden max-h-56 overflow-y-auto shadow-xl"></div>
            </div>

            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">Meta Cantidad</label>
                    <input type="number" id="s-meta" class="input-app mt-2 text-center text-xl font-bold" placeholder="0">
                </div>
                <button onclick="addItem()" class="w-20 bg-slate-900 text-white font-bold text-2xl mt-6 rounded-xl active:scale-90 transition-all">+</button>
            </div>
        </div>

        <div id="staging-list" class="mt-6 space-y-3 pb-32"></div>

        <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-md border-t border-slate-100">
            <button onclick="launchOps()" class="btn-main shadow-xl shadow-blue-200">INICIAR CONTEO OFICIAL</button>
        </div>
    </div>

    <div id="view-ops" class="view">
        <div class="card-app p-6 mb-6">
            <p id="op-id-label" class="text-[10px] font-bold text-blue-600 uppercase mb-2 tracking-widest"></p>
            <select id="sel-sku" onchange="syncUI()" class="w-full bg-slate-50 p-4 rounded-xl text-xl font-extrabold outline-none mb-6 border-none appearance-none"></select>
            
            <div class="flex gap-4">
                <input type="number" id="qty-in" class="flex-1 bg-white border-2 border-slate-200 h-20 text-center text-4xl font-extrabold rounded-2xl focus:border-blue-600 outline-none transition-all" placeholder="0">
                <button onclick="submitCount()" class="w-24 h-20 btn-main flex items-center justify-center">
                    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                </button>
            </div>
        </div>

        <div id="live-progress" class="space-y-4 pb-44 overflow-y-auto"></div>

        <div class="fixed bottom-0 left-0 right-0 p-6 bg-white border-t border-slate-100 flex gap-3">
            <button onclick="closeAndReport()" class="btn-main !bg-emerald-600 shadow-emerald-100 shadow-xl">FINALIZAR Y FIRMAR PDF</button>
        </div>
    </div>

    <div id="view-historial" class="view">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="navTo('home')" class="p-2 bg-white rounded-lg border border-slate-200">←</button>
            <h2 class="text-xl font-extrabold">Historial Logístico</h2>
        </div>
        <div id="hist-list" class="space-y-4 pb-20"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let itemsDB = {};
        let stagedItems = [];
        let activeOp = null;

        async function init() {
            try {
                const r = await fetch(API_URL);
                const data = await r.json();
                data.forEach(i => { if(i.CODIGO) itemsDB[i.CODIGO.toString().trim().toUpperCase()] = i.DESCRIPCION; });
            } catch(e) {}
            
            const saved = localStorage.getItem('twins_v4_active');
            if(saved) { activeOp = JSON.parse(saved); navTo('ops'); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'historial') renderHistory();
            if(v === 'ops' && activeOp) syncUI();
        }

        function liveSearch() {
            const val = document.getElementById('s-sku').value.toUpperCase().trim();
            const res = document.getElementById('results');
            if(val.length < 2) { res.classList.add('hidden'); return; }
            
            const matches = Object.entries(itemsDB).filter(([k,v]) => k.includes(val) || v.toUpperCase().includes(val)).slice(0, 5);
            res.innerHTML = matches.map(([k,v]) => `
                <div onclick="selectProduct('${k}')" class="p-4 border-b border-slate-100 hover:bg-blue-50 cursor-pointer">
                    <p class="font-bold text-sm text-slate-900">${k}</p>
                    <p class="text-[10px] text-slate-500 uppercase font-semibold truncate">${v}</p>
                </div>
            `).join('');
            res.classList.remove('hidden');
        }

        function selectProduct(k) {
            document.getElementById('s-sku').value = k;
            document.getElementById('results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function addItem() {
            const sku = document.getElementById('s-sku').value.toUpperCase();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            stagedItems.push({ sku, desc: itemsDB[sku] || "N/D", meta, real: 0 });
            renderStaging();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderStaging() {
            document.getElementById('staging-list').innerHTML = stagedItems.map((item, idx) => `
                <div class="card-app p-4 flex justify-between items-center bg-slate-50/50">
                    <div><p class="font-extrabold text-sm text-slate-900">${item.sku}</p><p class="text-[10px] text-slate-400 font-bold uppercase">${item.meta} UNIDADES PLANIFICADAS</p></div>
                    <button onclick="stagedItems.splice(${idx},1);renderStaging()" class="w-8 h-8 flex items-center justify-center text-red-500 font-black">×</button>
                </div>
            `).join('');
        }

        function launchOps() {
            if(stagedItems.length === 0) return;
            const id = document.getElementById('c-id').value.toUpperCase() || "CARGA-" + Date.now().toString().slice(-4);
            activeOp = { id, items: [...stagedItems], date: new Date().toLocaleString(), status: 'PENDIENTE' };
            localStorage.setItem('twins_v4_active', JSON.stringify(activeOp));
            
            let hist = JSON.parse(localStorage.getItem('twins_v4_hist')) || [];
            hist.unshift(activeOp);
            localStorage.setItem('twins_v4_hist', JSON.stringify(hist));
            
            stagedItems = [];
            navTo('ops');
        }

        function syncUI() {
            document.getElementById('op-id-label').innerText = "EJECUTANDO: " + activeOp.id;
            document.getElementById('sel-sku').innerHTML = activeOp.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            renderProgress();
        }

        function submitCount() {
            const val = parseInt(document.getElementById('qty-in').value);
            if(!val) return;
            const target = activeOp.items.find(i => i.sku === document.getElementById('sel-sku').value);
            if(target) target.real += val;
            document.getElementById('qty-in').value = '';
            localStorage.setItem('twins_v4_active', JSON.stringify(activeOp));
            renderProgress();
        }

        function renderProgress() {
            document.getElementById('live-progress').innerHTML = activeOp.items.map(i => {
                const pc = Math.min(Math.round((i.real / i.meta) * 100), 100);
                const isSel = i.sku === document.getElementById('sel-sku').value;
                return `
                <div class="card-app p-5 transition-all ${isSel ? 'border-blue-500 ring-2 ring-blue-50' : 'opacity-50'}">
                    <div class="flex justify-between items-end mb-3">
                        <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${i.sku}</p><p class="font-extrabold text-xl">${i.real} <span class="text-xs text-slate-300">/ ${i.meta}</span></p></div>
                        <span class="text-xs font-black ${pc >= 100 ? 'text-emerald-500' : 'text-blue-600'}">${pc}%</span>
                    </div>
                    <div class="p-bar"><div class="p-fill ${pc >= 100 ? '!bg-emerald-500' : ''}" style="width:${pc}%"></div></div>
                </div>`;
            }).join('');
        }

        function closeAndReport() {
            if(!confirm("¿CONFIRMAR CIERRE Y GENERAR REPORTE?")) return;
            let hist = JSON.parse(localStorage.getItem('twins_v4_hist')) || [];
            const idx = hist.findIndex(h => h.id === activeOp.id && h.status !== 'COMPLETADO');
            activeOp.status = 'COMPLETADO';
            if(idx !== -1) hist[idx] = activeOp;
            localStorage.setItem('twins_v4_hist', JSON.stringify(hist));
            
            savePDF(activeOp);
            localStorage.removeItem('twins_v4_active');
            activeOp = null;
            navTo('home');
        }

        function savePDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(37, 99, 235); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.setFont("helvetica", "bold"); doc.text("REPORTE DE SALIDA DE ALMACÉN", 14, 25);
            doc.setFontSize(10); doc.text("TWINS LOGISTICS - GESTIÓN DE INVENTARIOS", 14, 33);
            
            doc.setTextColor(30); doc.setFontSize(10);
            doc.text(`ID OPERACIÓN: ${data.id}`, 14, 50);
            doc.text(`FECHA: ${data.date}`, 14, 55);

            doc.autoTable({
                startY: 65,
                head: [['SKU', 'PRODUCTO', 'META', 'REAL', 'DIF.']],
                body: data.items.map(i => [i.sku, i.desc.slice(0,35), i.meta, i.real, (i.real - i.meta)]),
                theme: 'grid',
                headStyles: { fillColor: [37, 99, 235] }
            });

            const finalY = doc.lastAutoTable.finalY + 25;
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, finalY);
            doc.save(`Reporte_Logistico_${data.id}.pdf`);
        }

        function renderHistory() {
            const hist = JSON.parse(localStorage.getItem('twins_v4_hist')) || [];
            document.getElementById('hist-list').innerHTML = hist.map(h => `
                <div class="card-app p-5 border-l-4 ${h.status === 'COMPLETADO' ? 'border-l-emerald-500' : 'border-l-blue-500'}">
                    <div class="flex justify-between items-start mb-4">
                        <div><p class="text-[10px] text-slate-400 font-bold mb-1">${h.date}</p><h3 class="text-xl font-extrabold text-slate-900 tracking-tight">${h.id}</h3></div>
                        <span class="text-[9px] font-black px-2 py-1 rounded-full ${h.status === 'COMPLETADO' ? 'bg-emerald-50 text-emerald-600' : 'bg-blue-50 text-blue-600'}">${h.status}</span>
                    </div>
                    <button onclick='savePDF(${JSON.stringify(h)})' class="w-full bg-slate-100 py-3 rounded-xl text-xs font-bold text-slate-700 hover:bg-slate-200 transition-all">Descargar PDF</button>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
