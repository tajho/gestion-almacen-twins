<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura | Twins Despachos - Esbelta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --aura-blue: #007AFF; --aura-bg: #f2f2f7; --aura-card: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--aura-bg); color: #1c1c1e; overflow-x: hidden; margin: 0; }
        
        /* Glassmorphism Esbelto */
        .aura-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 4px 16px rgba(0,0,0,0.03); transition: all 0.2s ease; }
        
        /* Input Inteligente Compacto */
        .aura-input { background: transparent; border: none; font-size: 1.25rem; font-weight: 800; width: 100%; color: #000; outline: none; border-bottom: 2px solid #e5e5ea; transition: 0.3s; border-radius: 0; padding-bottom: 8px;}
        .aura-input:focus { border-bottom-color: var(--aura-blue); }

        /* Navegación por estados */
        .view { display: none; padding: 16px; flex-direction: column; min-height: 100vh; padding-bottom: 120px; }
        .view.active { display: flex; animation: view-slide 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes view-slide { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* Slider de Finalización Esbelto */
        .finish-slider { position: relative; height: 50px; background: #e5e5ea; border-radius: 25px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .slider-handle { position: absolute; left: 4px; height: 42px; width: 42px; background: #000; border-radius: 21px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; transition: transform 0.1s; }
        .slider-text { font-size: 0.65rem; font-weight: 800; color: #8e8e93; text-transform: uppercase; letter-spacing: 2px; pointer-events: none; }
        
        /* Ajuste de scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }
    </style>
</head>
<body>

    <header class="fixed top-0 left-0 right-0 px-6 py-8 z-50 flex justify-between items-center pointer-events-none bg-transparent">
        <div>
            <p class="text-[9px] font-extrabold text-blue-600 tracking-[0.4em] uppercase opacity-80">Aura 1.1</p>
            <h1 class="text-xl font-black tracking-tighter">TWINS.</h1>
        </div>
        <div class="pointer-events-auto">
            <button onclick="navTo('historial')" class="w-10 h-10 bg-black rounded-full flex items-center justify-center text-white shadow-xl hover:bg-blue-600 transition-colors">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 6h16M4 12h8M4 18h12"/></svg>
            </button>
        </div>
    </header>

    <div id="view-home" class="view active pt-28">
        <div class="mt-4 mb-8">
            <h2 class="text-4xl font-black leading-tight tracking-tighter text-slate-900">Manejo de<br>Flujos.</h2>
        </div>

        <div class="grid gap-4">
            <div onclick="navTo('crear')" class="aura-card p-6 bg-blue-600 text-white border-none shadow-blue-100 flex flex-col items-start gap-5 cursor-pointer hover:scale-[1.01]">
                <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                </div>
                <p class="text-xl font-extrabold leading-tight">Configurar Despacho de Inventario</p>
            </div>

            <div onclick="navTo('historial')" class="aura-card p-6 flex items-center justify-between cursor-pointer hover:border-slate-300">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Registros</p>
                    <p class="text-lg font-extrabold">Historial de Reportes</p>
                </div>
                <div class="text-xl text-slate-300">→</div>
            </div>
        </div>

        <footer class="mt-auto py-8 opacity-40">
            <p class="text-[9px] font-bold uppercase tracking-widest">Responsable Operativo</p>
            <p class="text-sm font-bold">J. Angelo Nuñez Durand</p>
        </footer>
    </div>

    <div id="view-crear" class="view pt-28">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="navTo('home')" class="text-xs font-bold text-slate-400 hover:text-blue-600">ATRAS</button>
            <h2 class="text-lg font-black uppercase text-slate-900">Setup</h2>
        </div>

        <div class="space-y-4">
            <div class="aura-card p-5">
                <label class="text-[9px] font-bold text-blue-600 uppercase tracking-widest block mb-2">Contenedor ID</label>
                <input type="text" id="c-id" class="aura-input uppercase" placeholder="Ej: CT-9920">
            </div>

            <div class="aura-card p-5 relative">
                <label class="text-[9px] font-bold text-blue-600 uppercase tracking-widest block mb-2">Producto SKU / Nombre</label>
                <input type="text" id="s-sku" oninput="liveSearch()" class="aura-input" placeholder="Buscar material...">
                <div id="results" class="absolute z-50 left-0 right-0 bg-white border border-slate-200 rounded-2xl mt-1 hidden max-h-52 overflow-y-auto shadow-xl"></div>
            </div>

            <div class="flex gap-3">
                <div class="aura-card p-5 flex-1">
                    <label class="text-[9px] font-bold text-blue-600 uppercase tracking-widest block mb-2">Meta</label>
                    <input type="number" id="s-meta" class="aura-input text-center" placeholder="0">
                </div>
                <button onclick="queueItem()" class="w-16 aura-card bg-black text-white flex items-center justify-center text-3xl font-light hover:bg-blue-600 transition-colors">＋</button>
            </div>
        </div>

        <div id="staging-area" class="mt-6 space-y-3 pb-20"></div>

        <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-md border-t border-slate-100 z-50">
            <button onclick="startSession()" class="w-full bg-blue-600 text-white h-14 rounded-[18px] font-black text-xs uppercase tracking-widest shadow-xl shadow-blue-100">Iniciar Terminal</button>
        </div>
    </div>

    <div id="view-ops" class="view pt-28">
        <div class="aura-card p-6 mb-6 border-l-8 border-l-blue-600">
            <div id="op-title" class="text-[9px] font-bold text-blue-600 uppercase tracking-[0.3em] mb-4"></div>
            <select id="sel-sku" onchange="syncTerminal()" class="w-full bg-slate-100 p-4 rounded-xl text-2xl font-black outline-none mb-6 appearance-none border-none text-slate-800"></select>
            
            <div class="flex gap-3 items-center">
                <input type="number" id="qty-in" class="flex-1 text-5xl font-black bg-transparent outline-none border-none" placeholder="0">
                <button onclick="recordCount()" class="w-16 h-16 bg-blue-600 text-white rounded-[20px] flex items-center justify-center shadow-2xl hover:bg-emerald-600 transition-colors">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                </button>
            </div>
        </div>

        <div id="progress-list" class="space-y-4 pb-20"></div>

        <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/90 border-t border-slate-100 z-50">
            <div class="finish-slider" id="main-slider">
                <div class="slider-text">Desliza para autorizar cierre</div>
                <div class="slider-handle" id="handle">
                    <svg width="18" height="18" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><path d="M13 5l7 7-7 7M5 5l7 7-7 7"/></svg>
                </div>
            </div>
        </div>
    </div>

    <div id="view-historial" class="view pt-28">
        <div class="mb-8 flex justify-between items-center">
            <h2 class="text-3xl font-black tracking-tight">Archivo.</h2>
            <button onclick="navTo('home')" class="text-xs font-bold text-slate-400 hover:text-blue-600">VOLVER</button>
        </div>
        <div id="hist-feed" class="space-y-4"></div>
    </div>

    <script>
        const SOURCE = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db = {};
        let queue = [];
        let activeOp = null;

        async function init() {
            try {
                const r = await fetch(SOURCE);
                const d = await r.json();
                d.forEach(i => { if(i.CODIGO) db[i.CODIGO.toString().trim().toUpperCase()] = i.DESCRIPCION; });
            } catch(e) {}
            
            const saved = localStorage.getItem('twins_aura_session_v2');
            if(saved) { activeOp = JSON.parse(saved); navTo('ops'); }
            setupSlider();
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'historial') renderHistory();
            if(v === 'ops' && activeOp) syncTerminal();
        }

        function liveSearch() {
            const val = document.getElementById('s-sku').value.toUpperCase().trim();
            const res = document.getElementById('results');
            if(val.length < 2) { res.classList.add('hidden'); return; }
            const matches = Object.entries(db).filter(([k,v]) => k.includes(val) || v.toUpperCase().includes(val)).slice(0, 5);
            res.innerHTML = matches.map(([k,v]) => `
                <div onclick="pickProd('${k}')" class="p-4 border-b border-slate-100 hover:bg-blue-50 cursor-pointer transition-all">
                    <p class="font-bold text-sm text-slate-900">${k}</p>
                    <p class="text-[10px] font-semibold text-slate-500 uppercase truncate">${v}</p>
                </div>
            `).join('');
            res.classList.remove('hidden');
        }

        function pickProd(k) {
            document.getElementById('s-sku').value = k;
            document.getElementById('results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function queueItem() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            queue.push({ sku, desc: db[sku] || "OBJETO_MANUAL", meta, real: 0 });
            renderQueue();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderQueue() {
            document.getElementById('staging-area').innerHTML = queue.map((i, idx) => `
                <div class="aura-card p-4 flex justify-between items-center bg-slate-50 border-slate-100">
                    <div><p class="font-extrabold text-sm text-slate-900">${i.sku}</p><p class="text-[9px] font-bold text-slate-400">PLAN: ${i.meta} UNIDADES</p></div>
                    <button onclick="queue.splice(${idx},1);renderQueue()" class="w-8 h-8 rounded-full bg-slate-200 text-red-500 font-bold hover:bg-red-50transition-all">×</button>
                </div>
            `).join('');
        }

        function startSession() {
            if(queue.length === 0) return alert("Agrega ítems");
            const id = document.getElementById('c-id').value.toUpperCase().trim() || "LOG-" + Date.now().toString().slice(-4);
            activeOp = { id, items: [...queue], date: new Date().toLocaleString(), status: 'EJECUCIÓN' };
            localStorage.setItem('twins_aura_session_v2', JSON.stringify(activeOp));
            
            let h = JSON.parse(localStorage.getItem('twins_aura_hist_v2')) || [];
            h.unshift(activeOp);
            localStorage.setItem('twins_aura_hist_v2', JSON.stringify(h));
            
            queue = [];
            navTo('ops');
        }

        function syncTerminal() {
            document.getElementById('op-title').innerText = "AUDITORÍA: " + activeOp.id;
            document.getElementById('sel-sku').innerHTML = activeOp.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            renderOpsFeed();
        }

        function recordCount() {
            const val = parseInt(document.getElementById('qty-in').value);
            if(!val) return;
            const t = activeOp.items.find(i => i.sku === document.getElementById('sel-sku').value);
            if(t) t.real += val;
            document.getElementById('qty-in').value = '';
            localStorage.setItem('twins_aura_session_v2', JSON.stringify(activeOp));
            renderOpsFeed();
            document.getElementById('qty-in').focus(); // Vuelve a enfocar para conteo rápido
        }

        function renderOpsFeed() {
            document.getElementById('progress-list').innerHTML = activeOp.items.map(i => {
                const pc = Math.min(Math.round((i.real / i.meta) * 100), 100);
                const isSel = i.sku === document.getElementById('sel-sku').value;
                return `
                <div class="aura-card p-5 border-l-8 transition-all duration-300 ${isSel ? 'border-blue-600 scale-[1.01]' : 'border-slate-100 opacity-40'}">
                    <div class="flex justify-between items-end mb-3">
                        <span class="text-[9px] font-bold uppercase tracking-widest text-slate-800">${i.sku}</span>
                        <span class="text-2xl font-black">${i.real}<span class="text-xs text-slate-300">/${i.meta}</span></span>
                    </div>
                    <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-blue-600 transition-all ${pc >= 100 ? '!bg-emerald-500' : ''}" style="width:${pc}%"></div></div>
                </div>`;
            }).join('');
        }

        function setupSlider() {
            const handle = document.getElementById('handle');
            const slider = document.getElementById('main-slider');
            let isDragging = false;
            let startX = 0;

            const onStart = (e) => {
                isDragging = true;
                startX = e.touches ? e.touches[0].clientX : e.clientX;
                handle.style.transition = 'none';
            };
            const onMove = (e) => {
                if (!isDragging) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const rect = slider.getBoundingClientRect();
                const limit = rect.width - 50; // Ajuste por tamaño de handle esbelto
                let x = clientX - rect.left - 25;
                x = Math.max(0, Math.min(x, limit));
                handle.style.transform = `translateX(${x}px)`;
                if (x >= limit - 5) {
                    isDragging = false;
                    finishAudit();
                }
            };
            const onEnd = () => {
                if (!isDragging) return;
                isDragging = false;
                handle.style.transition = 'transform 0.2s cubic-bezier(0.16, 1, 0.3, 1)';
                handle.style.transform = `translateX(0px)`;
            };

            handle.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
            handle.addEventListener('touchstart', onStart, {passive: true});
            window.addEventListener('touchmove', onMove, {passive: true});
            window.addEventListener('touchend', onEnd);
        }

        function finishAudit() {
            if(!confirm("¿AUTORIZAR CIERRE Y FIRMAR REPORTE?")) {
                document.getElementById('handle').style.transform = 'translateX(0px)';
                return;
            }
            let h = JSON.parse(localStorage.getItem('twins_aura_hist_v2')) || [];
            const idx = h.findIndex(x => x.id === activeOp.id && x.status !== 'CERRADO');
            activeOp.status = 'CERRADO';
            if(idx !== -1) h[idx] = activeOp;
            localStorage.setItem('twins_aura_hist_v2', JSON.stringify(h));
            
            generateAuraPDF(activeOp);
            localStorage.removeItem('twins_aura_session_v2');
            activeOp = null;
            navTo('home');
        }

        function generateAuraPDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(0, 122, 255); doc.rect(0, 0, 210, 45, 'F');
            doc.setTextColor(255); doc.setFontSize(26); doc.setFont("helvetica", "bold"); doc.text("REPORTE DE AUDITORÍA", 14, 28);
            doc.setFontSize(10); doc.text("TWINS DESPACHOS | SISTEMA AURA | J. ANGELO NUÑEZ", 14, 38);
            
            doc.setTextColor(40); doc.setFontSize(10); doc.text(`IDENTIFICADOR: ${data.id}`, 14, 60);
            doc.text(`REGISTRO FINAL: ${data.date}`, 14, 66);

            doc.autoTable({
                startY: 75,
                head: [['SKU', 'DESCRIPCIÓN', 'META', 'REAL', 'ESTADO']],
                body: data.items.map(i => [i.sku, i.desc.slice(0,30), i.meta, i.real, (i.real >= i.meta ? 'COMPLETO' : 'PENDIENTE')]),
                theme: 'striped',
                headStyles: { fillColor: [0, 0, 0] }
            });

            const fY = doc.lastAutoTable.finalY + 30;
            doc.setFontSize(9); doc.text("Documento oficial firmado por J. Angelo Nuñez Durand - Asist. Inventario Logístico.", 14, fY);
            doc.save(`AURA_REPORT_${data.id}.pdf`);
        }

        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('twins_aura_hist_v2')) || [];
            document.getElementById('hist-feed').innerHTML = h.map(x => `
                <div class="aura-card p-6 border-l-8 ${x.status === 'CERRADO' ? 'border-l-emerald-500' : 'border-l-blue-400'}">
                    <div class="flex justify-between items-start mb-5">
                        <div><p class="text-[9px] font-bold text-slate-300 mb-1 uppercase">${x.date}</p><h3 class="text-xl font-black">${x.id}</h3></div>
                        <span class="text-[9px] font-black px-3 py-1 bg-slate-100 rounded-full">${x.status}</span>
                    </div>
                    <button onclick='generateAuraPDF(${JSON.stringify(x)})' class="w-full py-3 bg-black text-white rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-blue-600 transition-colors">Descargar Documento</button>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
