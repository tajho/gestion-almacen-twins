<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA LOGÍSTICO PRO | ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; overflow-x: hidden; }
        
        /* Navegación por Secciones */
        .tabs { display: flex; background: var(--card); sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .tab-btn { flex: 1; padding: 18px; text-align: center; border: none; background: none; color: #94a3b8; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.75rem; text-transform: uppercase; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); background: rgba(59, 130, 246, 0.1); }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Tarjetas y Estética */
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h2 { font-size: 0.9rem; color: #94a3b8; text-transform: uppercase; margin-top: 0; display: flex; justify-content: space-between; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #334155; border-radius: 10px; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: var(--accent); outline: none; }

        .preview { background: rgba(59, 130, 246, 0.1); padding: 15px; border-radius: 10px; border-left: 4px solid var(--accent); margin: 10px 0; font-weight: bold; color: var(--accent); }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; margin-top: 10px; }
        .btn-add { background: var(--accent); color: white; }
        .btn-pdf { background: transparent; border: 2px solid var(--success); color: var(--success); }

        /* Tabla de Auditoría */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8rem; }
        th { text-align: left; padding: 12px; color: #94a3b8; border-bottom: 1px solid #334155; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        .diff-tag { font-weight: bold; padding: 4px 8px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="openSection(event, 'sec-inicio')">1. Inicio</button>
        <button class="tab-btn" onclick="openSection(event, 'sec-conteo')">2. Conteo</button>
        <button class="tab-btn" onclick="openSection(event, 'sec-reporte')">3. Reporte</button>
    </div>

    <div class="container">
        
        <div id="sec-inicio" class="section active">
            <div class="card">
                <h2>IDENTIFICACIÓN DE CARGA</h2>
                <label style="font-size: 0.7rem;">N° CONTENEDOR / GUÍA</label>
                <input type="text" id="id_contenedor" placeholder="Ej: 0116-A">
                <label style="font-size: 0.7rem;">FOTO PACKING LIST</label>
                <input type="file" id="foto_pck" accept="image/*">
                <button class="btn btn-add" onclick="document.querySelector('.tab-btn:nth-child(2)').click()">Siguiente Paso</button>
            </div>
        </div>

        <div id="sec-conteo" class="section">
            <div class="card">
                <h2>BUSCADOR MAESTRO <span id="sync-icon" style="color:var(--success)">●</span></h2>
                <input type="text" id="busqueda" placeholder="SKU o Nombre del producto..." oninput="ejecutarBusqueda(this.value)">
                <div id="res_busqueda" class="preview">Esperando SKU...</div>

                <div style="display: flex; gap: 10px;">
                    <div style="flex:1">
                        <label style="font-size: 0.7rem;">CANT. PACKING</label>
                        <input type="number" id="cant_pck" placeholder="Dato Foto">
                    </div>
                    <div style="flex:1">
                        <label style="font-size: 0.7rem;">CANT. FÍSICA</label>
                        <input type="number" id="cant_fis" placeholder="Conteo">
                    </div>
                </div>
                <button class="btn btn-add" onclick="registrarItem()">Registrar Bulto</button>
            </div>
        </div>

        <div id="sec-reporte" class="section">
            <div class="card">
                <h2>RESUMEN DE CUADRE</h2>
                <table id="tabla_resumen">
                    <thead>
                        <tr><th>PRODUCTO</th><th>PK</th><th>FIS</th><th>DIF</th></tr>
                    </thead>
                    <tbody id="cuerpo_tabla"></tbody>
                </table>
                <button class="btn btn-pdf" onclick="exportarPDF()">Generar PDF Detallado</button>
            </div>
        </div>

    </div>

<script>
    // URL DE TU GOOGLE APPS SCRIPT (REEMPLAZAR AQUÍ)
    const URL_MAESTRO = "https://script.google.com/macros/s/AKfycbz2FWrNqYTWr2TZiD56WDidmjAg1Xkgx2Bkka6uG_xUGhtwMUAOhFiDIHBpxvKIAHmh/exec"; 
    
    let dbMaestra = [];
    let itemsContados = {};
    let itemSeleccionado = null;

    // Carga de datos sin interrupción
    window.onload = async () => {
        try {
            const r = await fetch(URL_MAESTRO);
            dbMaestra = await r.json();
            console.log("Maestro Sincronizado");
        } catch (e) { console.error("Error de conexión"); }
    };

    function openSection(evt, sectionName) {
        let sections = document.getElementsByClassName("section");
        for (let s of sections) s.classList.remove("active");
        let tabs = document.getElementsByClassName("tab-btn");
        for (let t tabs) t.classList.remove("active");
        document.getElementById(sectionName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function ejecutarBusqueda(val) {
        val = val.trim().toUpperCase();
        if(val.length < 2) return;
        const p = dbMaestra.find(x => x[0].toString().includes(val) || x[1].toString().includes(val));
        const visor = document.getElementById('res_busqueda');
        if(p) {
            itemSeleccionado = { sku: p[0], nombre: p[1] };
            visor.innerText = `📦 [${p[0]}] ${p[1]}`;
            visor.style.color = "var(--accent)";
        } else {
            itemSeleccionado = null;
            visor.innerText = "NO ENCONTRADO EN MAESTRO";
            visor.style.color = "var(--danger)";
        }
    }

    function registrarItem() {
        const pck = parseInt(document.getElementById('cant_pck').value) || 0;
        const fis = parseInt(document.getElementById('cant_fis').value) || 0;
        const cont = document.getElementById('id_contenedor').value;

        if(!itemSeleccionado || fis === 0 || !cont) return alert("Complete Contenedor y Cantidad");

        const sku = itemSeleccionado.sku;
        if(!itemsContados[sku]) {
            itemsContados[sku] = { nombre: itemSeleccionado.nombre, p: pck, f: 0 };
        }
        itemsContados[sku].f += fis;
        if(pck > 0) itemsContados[sku].p = pck;

        // SINCRONIZACIÓN INVISIBLE AL EXCEL (POST)
        fetch(URL_MAESTRO, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ contenedor: cont, sku: sku, cantidad: fis })
        });

        actualizarVisualizacion();
        // Limpiar para siguiente bulto
        document.getElementById('busqueda').value = "";
        document.getElementById('cant_fis').value = "";
        document.getElementById('busqueda').focus();
    }

    function actualizarVisualizacion() {
        const tbody = document.getElementById('cuerpo_tabla');
        tbody.innerHTML = "";
        for(let s in itemsContados) {
            const i = itemsContados[s];
            const d = i.f - i.p;
            tbody.innerHTML += `<tr>
                <td><b>${s}</b><br><small>${i.nombre.substring(0,25)}</small></td>
                <td>${i.p}</td>
                <td>${i.f}</td>
                <td style="color:${d === 0 ? 'var(--success)' : 'var(--danger)'}">${d}</td>
            </tr>`;
        }
    }

    function exportarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const cont = document.getElementById('id_contenedor').value;

        doc.setFontSize(18).text("REPORTE DETALLADO DE RECEPCIÓN", 105, 20, {align:'center'});
        doc.setFontSize(10).text(`CONTENEDOR: ${cont} | FECHA: ${new Date().toLocaleString()}`, 105, 28, {align:'center'});

        const rows = Object.keys(itemsContados).map(s => [s, itemsContados[s].nombre, itemsContados[s].p, itemsContados[s].f, itemsContados[s].f - itemsContados[s].p]);

        doc.autoTable({
            startY: 35,
            head: [['CÓDIGO', 'DESCRIPCIÓN', 'PACKING', 'CONTEO', 'DIF.']],
            body: rows,
            theme: 'grid',
            headStyles: { fillColor: [15, 23, 42] }
        });

        const y = doc.lastAutoTable.finalY + 30;
        doc.text("Revisión autorizada por:", 105, y, {align:'center'});
        doc.setFont(undefined, 'bold').text("J. Angelo Nuñez Durand", 105, y + 8, {align:'center'});
        doc.setFont(undefined, 'normal').text("Asist. Inventario Logístico", 105, y + 14, {align:'center'});
        doc.save(`Reporte_Logistico_${cont}.pdf`);
    }
</script>
</body>
</html>
