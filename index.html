<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura Pro | Inbound 100%</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --aura-blue: #007AFF; --aura-bg: #f2f2f7; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--aura-bg); color: #1c1c1e; overflow: hidden; height: 100vh; }
        .aura-card { background: white; border-radius: 28px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .view { display: none; height: 100vh; overflow-y: auto; padding: 20px; padding-top: 100px; padding-bottom: 120px; }
        .view.active { display: flex; flex-direction: column; }
        .aura-input { background: transparent; border: none; font-size: 1.2rem; font-weight: 700; width: 100%; border-bottom: 2px solid #e5e5ea; padding: 10px 0; outline: none; transition: 0.3s; }
        .aura-input:focus { border-bottom-color: var(--aura-blue); }
        .finish-slider { position: relative; height: 70px; background: #000; border-radius: 35px; display: flex; align-items: center; justify-content: center; width: 100%; }
        .slider-handle { position: absolute; left: 5px; height: 60px; width: 60px; background: #fff; border-radius: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }
    </style>
</head>
<body>

    <header class="fixed top-0 left-0 right-0 p-6 z-[100] flex justify-between items-center pointer-events-none">
        <div class="pointer-events-auto">
            <p class="text-[9px] font-black text-blue-600 tracking-widest uppercase">Aura Pro</p>
            <h1 class="text-xl font-black">TWINS.</h1>
        </div>
    </header>

    <div id="view-home" class="view active">
        <h2 class="text-4xl font-black tracking-tighter mb-8 mt-4">Panel de<br>Ingresos.</h2>
        <div class="grid gap-4">
            <button onclick="navTo('crear')" class="aura-card p-8 bg-blue-600 text-white text-left">
                <p class="text-[10px] font-bold uppercase opacity-60 mb-8">Operación Nueva</p>
                <p class="text-2xl font-black">Iniciar Descarga</p>
            </button>
            <button onclick="navTo('historial')" class="aura-card p-8 text-left flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold uppercase text-slate-400 mb-1">Trazabilidad</p>
                    <p class="text-xl font-black">Historial / Buscar</p>
                </div>
                <span class="text-2xl">→</span>
            </button>
        </div>
    </div>

    <div id="view-crear" class="view">
        <button onclick="navTo('home')" class="text-[10px] font-bold text-slate-400 mb-6 uppercase">← Volver</button>
        <div class="space-y-4">
            <div class="aura-card p-6">
                <label class="text-[10px] font-bold text-blue-600 uppercase block mb-2">Contenedor ID</label>
                <input type="text" id="c-id" class="aura-input uppercase" placeholder="Ej: CONT-9910">
            </div>
            <div class="aura-card p-6">
                <label class="text-[10px] font-bold text-blue-600 uppercase block mb-2">Producto / SKU</label>
                <input type="text" id="s-sku" oninput="liveSearch()" class="aura-input" placeholder="Buscar SKU...">
                <div id="results" class="mt-2 space-y-1 hidden"></div>
            </div>
            <div class="flex gap-2">
                <div class="aura-card p-6 flex-1">
                    <label class="text-[10px] font-bold text-blue-600 uppercase block mb-2">Meta</label>
                    <input type="number" id="s-meta" class="aura-input" placeholder="0">
                </div>
                <button onclick="queueItem()" class="aura-card bg-black text-white px-8 text-2xl font-bold">＋</button>
            </div>
        </div>
        <div id="staging-area" class="mt-6 space-y-2"></div>
        <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/80">
            <button onclick="startSession()" class="w-full h-16 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest">Confirmar e Iniciar</button>
        </div>
    </div>

    <div id="view-ops" class="view">
        <div class="aura-card p-8 mb-4 border-t-8 border-t-blue-600 text-center">
            <p id="op-title" class="text-[10px] font-bold text-blue-600 uppercase mb-4"></p>
            <select id="sel-sku" onchange="syncTerminal()" class="w-full text-3xl font-black bg-transparent border-none text-center outline-none mb-6"></select>
            <div class="flex gap-4">
                <input type="number" id="qty-in" class="flex-1 text-6xl font-black text-center bg-slate-50 rounded-2xl p-4 outline-none" placeholder="0">
                <button onclick="recordCount()" class="w-24 bg-black text-white rounded-2xl text-3xl font-bold flex items-center justify-center">✓</button>
            </div>
        </div>
        <div id="progress-list" class="space-y-3"></div>
        <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/90">
            <div class="finish-slider" id="main-slider">
                <div class="text-[9px] font-black text-white/50 uppercase tracking-[3px]">Desliza para finalizar</div>
                <div class="slider-handle" id="handle">→</div>
            </div>
        </div>
    </div>

    <div id="modal-confirm" class="fixed inset-0 z-[200] bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-6">
        <div class="aura-card p-8 w-full max-w-sm space-y-6">
            <h3 class="text-2xl font-black">Finalizar Reporte</h3>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Asistente Responsable</label>
                <input type="text" id="final-assistant" class="aura-input !text-lg" value="J. Angelo Nuñez Durand">
            </div>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 h-14 bg-slate-100 rounded-xl font-bold text-xs uppercase">Atrás</button>
                <button onclick="processFinalClosure()" class="flex-1 h-14 bg-black text-white rounded-xl font-bold text-xs uppercase">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="view-historial" class="view">
        <button onclick="navTo('home')" class="text-[10px] font-bold text-slate-400 mb-6 uppercase">← Inicio</button>
        <div class="aura-card p-4 mb-6 space-y-2">
            <input type="text" id="h-search-sku" oninput="renderHistory()" class="aura-input !text-sm" placeholder="Buscar por SKU...">
            <input type="date" id="h-search-date" onchange="renderHistory()" class="aura-input !text-sm">
        </div>
        <div id="hist-feed" class="space-y-4"></div>
    </div>

    <script>
        // DB DE PRUEBA (MOCK) - Esto asegura que funcione sin internet
        let db = { "ITEM-001": "CAJA TIPO A", "ITEM-002": "CAJA TIPO B", "TAJHO-01": "JERSEY DEPORTIVO" };
        let queue = [];
        let activeOp = null;

        // --- NAVEGACIÓN ---
        function navTo(v) {
            document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'historial') renderHistory();
            if(v === 'ops' && activeOp) syncTerminal();
        }

        // --- FUNCIONES DE CREACIÓN ---
        function liveSearch() {
            const val = document.getElementById('s-sku').value.toUpperCase();
            const res = document.getElementById('results');
            if(val.length < 1) { res.classList.add('hidden'); return; }
            const matches = Object.keys(db).filter(k => k.includes(val));
            res.innerHTML = matches.map(k => `<div onclick="pickProd('${k}')" class="p-3 bg-white border-b text-xs font-bold">${k} - ${db[k]}</div>`).join('');
            res.classList.remove('hidden');
        }

        function pickProd(k) {
            document.getElementById('s-sku').value = k;
            document.getElementById('results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function queueItem() {
            const sku = document.getElementById('s-sku').value.toUpperCase();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            queue.push({ sku, meta, real: 0 });
            renderQueue();
            document.getElementById('s-sku').value = '';
            document.getElementById('s-meta').value = '';
        }

        function renderQueue() {
            document.getElementById('staging-area').innerHTML = queue.map((i, idx) => `
                <div class="aura-card p-4 flex justify-between items-center text-xs font-bold">
                    <span>${i.sku} (${i.meta})</span>
                    <button onclick="queue.splice(${idx},1);renderQueue()" class="text-red-500">Eliminar</button>
                </div>
            `).join('');
        }

        function startSession() {
            if(queue.length === 0) { alert("Agrega al menos un producto"); return; }
            activeOp = {
                id: document.getElementById('c-id').value.toUpperCase() || "CONT-" + Date.now().toString().slice(-4),
                items: [...queue],
                fullDate: new Date().toLocaleString(),
                dateIso: new Date().toISOString().split('T')[0],
                status: 'CONTEO'
            };
            localStorage.setItem('aura_session', JSON.stringify(activeOp));
            queue = [];
            document.getElementById('staging-area').innerHTML = '';
            navTo('ops');
        }

        // --- FUNCIONES DE TERMINAL ---
        function syncTerminal() {
            document.getElementById('op-title').innerText = "CONTENEDOR: " + activeOp.id;
            const select = document.getElementById('sel-sku');
            select.innerHTML = activeOp.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            renderOpsFeed();
        }

        function recordCount() {
            const val = parseInt(document.getElementById('qty-in').value);
            if(!val) return;
            const sku = document.getElementById('sel-sku').value;
            const item = activeOp.items.find(i => i.sku === sku);
            if(item) item.real += val;
            document.getElementById('qty-in').value = '';
            localStorage.setItem('aura_session', JSON.stringify(activeOp));
            renderOpsFeed();
        }

        function renderOpsFeed() {
            const currentSku = document.getElementById('sel-sku').value;
            document.getElementById('progress-list').innerHTML = activeOp.items.map(i => `
                <div class="aura-card p-5 ${i.sku === currentSku ? 'border-2 border-blue-600' : 'opacity-50'}">
                    <div class="flex justify-between font-black text-sm mb-2">
                        <span>${i.sku}</span>
                        <span>${i.real} / ${i.meta}</span>
                    </div>
                    <div class="h-1 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-600" style="width: ${Math.min((i.real/i.meta)*100, 100)}%"></div>
                    </div>
                </div>
            `).join('');
        }

        // --- CIERRE Y PDF ---
        function openClosureModal() { document.getElementById('modal-confirm').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal-confirm').classList.add('hidden'); }

        function processFinalClosure() {
            const assistant = document.getElementById('final-assistant').value;
            let hist = JSON.parse(localStorage.getItem('aura_history')) || [];
            activeOp.asistente = assistant;
            activeOp.status = 'CERRADO';
            hist.unshift(activeOp);
            localStorage.setItem('aura_history', JSON.stringify(hist));
            
            generatePDF(activeOp);
            localStorage.removeItem('aura_session');
            activeOp = null;
            closeModal();
            navTo('home');
        }

        function generatePDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(20); doc.text("REPORTE DE INGRESO", 14, 20);
            doc.setFontSize(10); doc.text("CONTENEDOR: " + data.id, 14, 30);
            doc.text("FECHA: " + data.fullDate, 14, 35);
            doc.text("RESPONSABLE: " + data.asistente, 14, 40);
            
            doc.autoTable({
                startY: 50,
                head: [['SKU', 'META', 'REAL', 'DIF']],
                body: data.items.map(i => [i.sku, i.meta, i.real, i.real - i.meta])
            });
            
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 20);
            doc.save(`INGRESO_${data.id}.pdf`);
        }

        // --- HISTORIAL ---
        function renderHistory() {
            const hist = JSON.parse(localStorage.getItem('aura_history')) || [];
            const searchSku = document.getElementById('h-search-sku').value.toUpperCase();
            const searchDate = document.getElementById('h-search-date').value;

            const filtered = hist.filter(x => {
                const matchesSku = x.items.some(i => i.sku.includes(searchSku));
                const matchesDate = !searchDate || x.dateIso === searchDate;
                return matchesSku && matchesDate;
            });

            document.getElementById('hist-feed').innerHTML = filtered.map(x => `
                <div class="aura-card p-6">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">${x.fullDate}</p>
                    <p class="text-xl font-black mb-4">${x.id}</p>
                    <button onclick='generatePDF(${JSON.stringify(x)})' class="w-full py-3 bg-slate-100 rounded-xl text-[10px] font-black uppercase">Ver PDF</button>
                </div>
            `).join('') || '<p class="text-center text-slate-400 text-xs">Sin registros</p>';
        }

        // --- SLIDER LOGIC ---
        const handle = document.getElementById('handle');
        const slider = document.getElementById('main-slider');
        let isDragging = false;
        const moveHandler = (e) => {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = slider.getBoundingClientRect();
            let x = clientX - rect.left - 30;
            x = Math.max(0, Math.min(x, rect.width - 65));
            handle.style.transform = `translateX(${x}px)`;
            if (x >= rect.width - 70) { isDragging = false; openClosureModal(); }
        };
        handle.addEventListener('mousedown', () => isDragging = true);
        handle.addEventListener('touchstart', () => isDragging = true);
        window.addEventListener('mousemove', moveHandler);
        window.addEventListener('touchmove', moveHandler);
        window.addEventListener('mouseup', () => { isDragging = false; handle.style.transform = 'translateX(0px)'; });
        window.addEventListener('touchend', () => { isDragging = false; handle.style.transform = 'translateX(0px)'; });

        // Cargar sesión previa si existe
        const saved = localStorage.getItem('aura_session');
        if(saved) { activeOp = JSON.parse(saved); navTo('ops'); }

    </script>
</body>
</html>
