<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v40 Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; padding-bottom: 100px; }
        .glass-card { background: white; border-radius: 2.5rem; border: 1px solid #f1f5f9; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.03); }
        .input-tajho { background: #f1f5f9; border-radius: 1.25rem; border: 2px solid transparent; transition: 0.3s; }
        .input-tajho:focus { border-color: var(--blue); background: white; outline: none; }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <header class="p-8 pb-4 flex justify-between items-center">
        <div>
            <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.3em] mb-1">Status: Conectado</p>
            <h1 class="text-3xl font-[800] tracking-tighter">TAJHO<span class="text-blue-600">.OS</span></h1>
        </div>
        <button onclick="syncCloud()" class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center border border-slate-100">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
    </header>

    <main class="px-6 space-y-6">
        
        <section class="glass-card p-8 space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Registro de Carga</h3>
                <span id="um-badge" class="hidden px-3 py-1 bg-blue-50 text-blue-600 text-[9px] font-black rounded-lg uppercase">Cajas</span>
            </div>

            <div class="space-y-4 text-center">
                <input type="text" id="sku-in" oninput="autoFetch()" class="input-tajho w-full p-5 text-2xl font-black text-center uppercase" placeholder="CÓDIGO (EJ: DD)">
                
                <div id="display-info" class="hidden space-y-1">
                    <p id="desc-out" class="text-sm font-bold text-slate-800 uppercase italic"></p>
                    <p id="um-out" class="text-[10px] font-black text-blue-400 uppercase tracking-tighter"></p>
                </div>

                <div class="flex items-center gap-4 pt-4">
                    <input type="number" id="qty-in" class="input-tajho flex-1 p-5 text-3xl font-black text-center" placeholder="0" inputmode="numeric">
                    <button onclick="registrar()" class="w-20 h-20 bg-blue-600 text-white rounded-3xl flex items-center justify-center shadow-lg shadow-blue-200 active:scale-90 transition-transform">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </div>
            </div>
        </section>

        <div id="recent-list" class="space-y-3">
            <h4 class="px-4 text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Últimos Registros Nube</h4>
            </div>

    </main>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbyijMhWNmXwMZTKv2qDhN4HvL74QeETP5Mabe4MRaDq4RkhNqiaUmEGKmniIed7FQbN3g/exec";
        let db_ref = {};

        // 1. Sincronizar desde Google Sheets al abrir
        async function syncCloud() {
            document.body.classList.add('loading');
            try {
                const res = await fetch(CLOUD_URL);
                const data = await res.json();
                data.forEach(r => {
                    const cod = String(r.CODIGO).toUpperCase().trim();
                    db_ref[cod] = { desc: r.DESCRIPCION, um: r.UM || "UND" };
                });
                alert("✅ Nube Conectada: " + Object.keys(db_ref).length + " productos.");
            } catch (e) {
                alert("❌ Error al leer Maestro_Productos. Revisa tu Excel.");
            }
            document.body.classList.remove('loading');
        }

        // 2. Búsqueda Automática Inteligente
        function autoFetch() {
            const sku = document.getElementById('sku-in').value.toUpperCase().trim();
            const info = document.getElementById('display-info');
            const badge = document.getElementById('um-badge');

            if(db_ref[sku]) {
                document.getElementById('desc-out').innerText = db_ref[sku].desc;
                document.getElementById('um-out').innerText = "Unidad: " + db_ref[sku].um;
                badge.innerText = db_ref[sku].um;
                badge.classList.remove('hidden');
                info.classList.remove('hidden');
            } else {
                info.classList.add('hidden');
                badge.classList.add('hidden');
            }
        }

        // 3. Registrar y enviar a la nube
        async function registrar() {
            const sku = document.getElementById('sku-in').value.toUpperCase().trim();
            const qty = document.getElementById('qty-in').value;
            
            if(!db_ref[sku] || !qty) return alert("Tajho, completa SKU y Cantidad");

            const payload = {
                tipo: 'CARGA', // Cambiar a 'DEVOLUCION' si estás en ese módulo
                datos: [
                    new Date().toLocaleString(),
                    sku,
                    db_ref[sku].desc,
                    qty,
                    db_ref[sku].um
                ]
            };

            // Mostrar en lista local inmediatamente
            addToList(sku, qty, db_ref[sku].um);

            try {
                await fetch(CLOUD_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Importante para Google Apps Script
                    body: JSON.stringify(payload)
                });
                document.getElementById('sku-in').value = "";
                document.getElementById('qty-in').value = "";
                document.getElementById('display-info').classList.add('hidden');
                navigator.vibrate(50);
            } catch (e) {
                alert("Error al enviar a la nube");
            }
        }

        function addToList(sku, qty, um) {
            const list = document.getElementById('recent-list');
            const item = document.createElement('div');
            item.className = "glass-card p-5 flex justify-between items-center border-l-4 border-l-blue-600";
            item.innerHTML = `
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase">${sku}</p>
                    <p class="text-xs font-bold text-slate-800">${db_ref[sku].desc}</p>
                </div>
                <div class="text-right">
                    <p class="text-lg font-black text-blue-600">${qty}</p>
                    <p class="text-[8px] font-bold text-slate-300 uppercase">${um}</p>
                </div>
            `;
            list.prepend(item);
        }

        window.onload = syncCloud;
    </script>
</body>
</html>
