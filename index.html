<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twins Elite Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --primary: #0F172A; 
            --accent: #2563EB; 
            --success: #10B981;
            --bg: #F8FAFC; 
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--primary); 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow-x: hidden;
        }

        .safe-area-top { padding-top: env(safe-area-inset-top); }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .native-card {
            background: #FFFFFF;
            border-radius: 24px;
            border: 1px solid #F1F5F9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .native-card:active { transform: scale(0.98); }

        .search-bar {
            background: #FFFFFF;
            border: 1.5px solid #E2E8F0;
            border-radius: 18px;
            transition: all 0.2s ease;
        }

        .fab-sync {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 64px;
            height: 64px;
            background: var(--primary);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.2);
            z-index: 40;
        }

        .modal-full { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: #F8FAFC; 
            z-index: 100; 
            flex-direction: column;
            animation: slideIn 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }

        @keyframes slideIn {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .progress-ring {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* --- SECCIÓN AUDITORÍA ULTRA-LIMPIA --- */
        .audit-header-clean {
            background: white;
            padding: 20px 24px;
            border-bottom: 1px solid #F1F5F9;
            position: sticky;
            top: 0;
            z-index: 60;
        }

        .item-audit-card {
            background: white;
            padding: 24px;
            border-radius: 24px;
            border: 1px solid #F1F5F9;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        .item-audit-card.match { border-left: 4px solid #10B981; }
        .item-audit-card.diff { border-left: 4px solid #F59E0B; }

        .btn-action-audit {
            @apply h-12 w-12 rounded-full flex items-center justify-center transition-all active:scale-90;
            background: #F8FAFC;
            color: #0F172A;
            border: 1px solid #E2E8F0;
        }

        .btn-plus-audit {
            background: #0F172A;
            color: white;
            border: none;
        }

        .audit-input {
            @apply text-3xl font-extrabold text-center bg-transparent w-20 outline-none;
            font-variant-numeric: tabular-nums;
        }

        .tag-minimal {
            @apply px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase tracking-wider;
            background: #F1F5F9;
            color: #64748B;
        }

        .tag-minimal.success { background: #ECFDF5; color: #059669; }
        .tag-minimal.warning { background: #FFF7ED; color: #D97706; }
    </style>
</head>
<body class="antialiased">

    <!-- HOME / LISTA DE CARGAS (MANTENIDO) -->
    <div class="glass-header safe-area-top px-6 py-4 mb-2">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] font-extrabold text-blue-600 uppercase tracking-widest">Almacén Pro</p>
                <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">Twins Elite</h1>
            </div>
            <div class="relative flex items-center justify-center">
                <svg class="w-12 h-12">
                    <circle class="text-slate-100" stroke-width="4" stroke="currentColor" fill="transparent" r="20" cx="24" cy="24"/>
                    <circle id="global-ring" class="text-blue-600 progress-ring" stroke-width="4" stroke-dasharray="125.6" stroke-dashoffset="125.6" stroke-linecap="round" stroke="currentColor" fill="transparent" r="20" cx="24" cy="24"/>
                </svg>
                <span id="global-perc" class="absolute text-[10px] font-bold">0%</span>
            </div>
        </div>
    </div>

    <div id="app-shell" class="max-w-md mx-auto px-6 pb-24">
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white p-4 rounded-[22px] border border-slate-50 shadow-sm">
                <i class="ph-fill ph-package text-blue-500 text-xl mb-2"></i>
                <p id="stat-containers" class="text-2xl font-extrabold text-slate-900">0</p>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Cargas Activas</p>
            </div>
            <div class="bg-white p-4 rounded-[22px] border border-slate-50 shadow-sm">
                <i class="ph-fill ph-barcode text-purple-500 text-xl mb-2"></i>
                <p id="stat-skus" class="text-2xl font-extrabold text-slate-900">0</p>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">SKUs Registrados</p>
            </div>
        </div>

        <div class="flex gap-2 mb-8">
            <div class="flex-1 search-bar flex items-center px-4 py-1">
                <i class="ph-bold ph-magnifying-glass text-slate-400 mr-3"></i>
                <input type="text" id="main-search" oninput="core.render()" placeholder="Buscar contenedor..." 
                    class="w-full py-3 bg-transparent outline-none font-semibold text-sm text-slate-700">
            </div>
            <div class="w-14 h-14 bg-white border border-slate-100 rounded-[18px] flex items-center justify-center relative">
                <i class="ph-bold ph-calendar-blank text-slate-400 text-xl"></i>
                <select id="month-select" onchange="core.filterMonth(this.value)" class="absolute inset-0 opacity-0 cursor-pointer"></select>
            </div>
        </div>

        <div id="container-list" class="space-y-4"></div>

        <button onclick="core.fetchData()" class="fab-sync">
            <i id="sync-icon" class="ph-bold ph-arrows-clockwise text-white text-2xl"></i>
        </button>
    </div>

    <!-- SECCIÓN DE AUDITORÍA (MODIFICADA: LIMPIA Y MODERNA) -->
    <div id="audit-view" class="modal-full">
        <div class="audit-header-clean">
            <div class="flex items-center justify-between mb-6">
                <button onclick="core.closeModal('audit-view')" class="text-slate-900">
                    <i class="ph-bold ph-arrow-left text-2xl"></i>
                </button>
                <div class="text-center">
                    <h2 id="audit-title" class="text-sm font-extrabold text-slate-900 uppercase tracking-tight">Carga #---</h2>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Auditoría en proceso</p>
                </div>
                <div class="w-8"></div>
            </div>

            <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl">
                <div class="flex-1">
                    <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase mb-2">
                        <span>Progreso General</span>
                        <span id="audit-perc-text">0%</span>
                    </div>
                    <div class="h-1.5 w-full bg-slate-200 rounded-full overflow-hidden">
                        <div id="audit-perc-bar" class="h-full bg-slate-900 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
                <div class="h-10 w-[1px] bg-slate-200"></div>
                <div class="text-center px-2">
                    <p id="audit-count-done" class="text-lg font-black text-slate-900 leading-none">0</p>
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Auditado</p>
                </div>
            </div>
        </div>

        <!-- Buscador Interno Minimalista -->
        <div class="px-6 py-4 bg-white">
            <div class="relative">
                <i class="ph-bold ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="inner-search" oninput="core.filterAuditItems(this.value)" 
                placeholder="Escribe SKU o nombre..." 
                class="w-full bg-slate-100 rounded-xl py-3 pl-11 pr-4 text-sm font-semibold outline-none focus:ring-2 ring-slate-200 transition-all">
            </div>
        </div>

        <!-- Contenedor de Items -->
        <div id="audit-items-container" class="flex-1 overflow-y-auto px-6 pb-24 no-scrollbar"></div>

        <!-- Botón Guardar -->
        <div class="p-6 bg-white border-t border-slate-50 safe-area-bottom">
            <button onclick="core.saveAndFinish()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-xs tracking-widest uppercase shadow-lg active:scale-95 transition-all">
                Finalizar Auditoría
            </button>
        </div>
    </div>

    <!-- VISTA LISTA (MANTENIDO) -->
    <div id="list-view" class="modal-full">
        <div class="px-6 py-8 flex items-center justify-between bg-white border-b">
            <button onclick="core.closeModal('list-view')" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center">
                <i class="ph-bold ph-x text-xl"></i>
            </button>
            <div class="text-center">
                <h2 class="text-base font-extrabold text-slate-900 uppercase tracking-tighter">Contenido Carga</h2>
                <p id="list-cont-id" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">--</p>
            </div>
            <div class="w-12"></div>
        </div>
        <div id="list-items-content" class="flex-1 overflow-y-auto px-6 py-6 space-y-4 no-scrollbar"></div>
    </div>

    <script>
        const core = {
            url: "https://script.google.com/macros/s/AKfycbw0KydAuPeiscsYBy-r0TJBWr1xjuCh848gIigA2MFGHDwPJbv-Z8ZqSXIqW4uymlyb/exec",
            raw: JSON.parse(localStorage.getItem('twins_cache')) || [],
            mesesNombre: ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"],
            currentMonth: "",
            activeCont: null,

            getDesc: function(item) {
                const keys = Object.keys(item);
                const descKey = keys.find(k => k.toString().toUpperCase().includes("DESC") || k.toString().toUpperCase().includes("PRODUCTO"));
                return descKey ? item[descKey] : "PRODUCTO SIN DESCRIPCIÓN";
            },

            fetchData: async function() {
                const btn = document.getElementById('sync-icon');
                btn.classList.add('animate-spin');
                try {
                    const response = await fetch(this.url);
                    const data = await response.json();
                    if (data && Array.isArray(data)) {
                        this.raw = data.map(item => {
                            const isCompleted = item["ESTADO"]?.toString().toUpperCase() === "COMPLETADO";
                            const cached = this.raw.find(c => c["CODIGO"] === item["CODIGO"] && (c["CONTENEDOR"] || c["CONTENEDOR_LIMPIO"]) === (item["CONTENEDOR"] || item["CONTENEDOR_LIMPIO"]));
                            return { 
                                ...item, 
                                audit: isCompleted ? (item["CAJAS"] || 0) : (cached ? (cached.audit || 0) : 0) 
                            };
                        });
                        localStorage.setItem('twins_cache', JSON.stringify(this.raw));
                        this.render();
                    }
                } catch (e) { console.error(e); }
                finally { btn.classList.remove('animate-spin'); }
            },

            getItemMonth: function(item) {
                const fecha = item["FECHA_LIMPIA"] || item["FECHA"] || "";
                if (!fecha) return "EN PROGRAMACIÓN";
                const partes = fecha.split("/");
                return this.mesesNombre[parseInt(partes[1]) - 1] || "EN PROGRAMACIÓN";
            },

            filterMonth: function(m) { this.currentMonth = m; this.render(); },

            render: function() {
                const list = document.getElementById('container-list');
                const search = document.getElementById('main-search').value.toLowerCase();
                const now = new Date();
                if (!this.currentMonth) this.currentMonth = this.mesesNombre[now.getMonth()];

                const select = document.getElementById('month-select');
                const uniqueMonths = new Set(this.raw.map(i => this.getItemMonth(i)));
                let options = `<option value="TODOS">TODOS LOS MESES</option>`;
                this.mesesNombre.forEach(m => {
                    if(uniqueMonths.has(m)) options += `<option value="${m}" ${this.currentMonth === m ? 'selected' : ''}>${m}</option>`;
                });
                if(uniqueMonths.has("EN PROGRAMACIÓN")) options += `<option value="EN PROGRAMACIÓN" ${this.currentMonth === "EN PROGRAMACIÓN" ? 'selected' : ''}>EN PROGRAMACIÓN</option>`;
                select.innerHTML = options;

                const groups = {};
                let tTotalCj = 0, tTotalAud = 0;

                this.raw.forEach(item => {
                    const contId = (item["CONTENEDOR"] || item["CONTENEDOR_LIMPIO"] || "S/N").toString();
                    const itemMonth = this.getItemMonth(item);
                    if (((this.currentMonth === "TODOS") || (this.currentMonth === itemMonth)) && contId.toLowerCase().includes(search)) {
                        if (!groups[contId]) groups[contId] = [];
                        groups[contId].push(item);
                        tTotalCj += (item["CAJAS"] || 0);
                        tTotalAud += (item.audit || 0);
                    }
                });

                const globalP = tTotalCj > 0 ? Math.round((tTotalAud/tTotalCj)*100) : 0;
                document.getElementById('global-perc').innerText = globalP + "%";
                document.getElementById('global-ring').style.strokeDashoffset = 125.6 - (125.6 * globalP) / 100;

                const ids = Object.keys(groups);
                document.getElementById('stat-containers').innerText = ids.length;
                document.getElementById('stat-skus').innerText = this.raw.length;

                list.innerHTML = ids.map(id => {
                    const items = groups[id];
                    let t = 0, a = 0;
                    items.forEach(i => { t += (i["CAJAS"] || 0); a += (i.audit || 0); });
                    const perc = t > 0 ? Math.round((a/t)*100) : 0;
                    const esProg = this.getItemMonth(items[0]) === "EN PROGRAMACIÓN";
                    const isCompleted = items[0]["ESTADO"]?.toString().toUpperCase() === "COMPLETADO";

                    return `
                    <div class="native-card p-5 border-b-2 ${perc >= 100 ? 'border-emerald-500' : 'border-slate-100'}">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <h3 class="text-sm font-extrabold text-slate-900 uppercase">Contenedor ${id}</h3>
                                <p class="text-[9px] font-bold text-slate-400 uppercase">${esProg ? 'En Espera' : items[0]["FECHA_LIMPIA"]}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-black text-slate-900 leading-none">${perc}%</p>
                                <p class="text-[7px] font-bold text-slate-400 uppercase">Avance</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            ${!isCompleted ? `
                            <button onclick="core.openAudit('${id}')" class="flex-1 bg-slate-900 text-white h-11 rounded-xl font-bold text-[9px] uppercase tracking-widest active:scale-95 transition-all">
                                Auditar
                            </button>
                            ` : ''}
                            <button onclick="core.viewList('${id}')" class="flex-1 bg-white border border-slate-100 h-11 rounded-xl font-bold text-[9px] text-slate-600 uppercase tracking-widest active:scale-95 transition-all">
                                Detalles
                            </button>
                            <button onclick="core.generatePDF('${id}')" class="w-11 bg-red-50 text-red-600 h-11 rounded-xl flex items-center justify-center active:scale-95">
                                <i class="ph-bold ph-file-pdf"></i>
                            </button>
                        </div>
                    </div>`;
                }).join('');
            },

            /* LOGICA DE AUDITORIA MODERNA Y LIMPIA */
            openAudit: function(id) {
                this.activeCont = id;
                const items = this.raw.filter(i => (i["CONTENEDOR"] || i["CONTENEDOR_LIMPIO"]) == id);
                document.getElementById('audit-title').innerText = "Carga #" + id;
                document.getElementById('inner-search').value = "";
                this.renderAuditItems(items);
                this.updateProgress(id);
                document.getElementById('audit-view').style.display = 'flex';
            },

            filterAuditItems: function(val) {
                const items = this.raw.filter(i => (i["CONTENEDOR"] || i["CONTENEDOR_LIMPIO"]) == this.activeCont);
                const filtered = items.filter(i => 
                    i["CODIGO"].toString().toLowerCase().includes(val.toLowerCase()) || 
                    this.getDesc(i).toLowerCase().includes(val.toLowerCase())
                );
                this.renderAuditItems(filtered);
            },

            renderAuditItems: function(items) {
                document.getElementById('audit-items-container').innerHTML = items.map(item => {
                    const idx = this.raw.indexOf(item);
                    const auditVal = item.audit || 0;
                    const theoreticalVal = item["CAJAS"] || 0;
                    const diff = auditVal - theoreticalVal;
                    
                    let stateClass = '';
                    let tagClass = '';
                    let tagText = 'Pendiente';

                    if (auditVal > 0) {
                        if (diff === 0) { stateClass = 'match'; tagClass = 'success'; tagText = 'Correcto'; }
                        else { stateClass = 'diff'; tagClass = 'warning'; tagText = diff > 0 ? `Sobrante (+${diff})` : `Faltante (${diff})`; }
                    }

                    return `
                    <div id="card-${idx}" class="item-audit-card ${stateClass}">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex-1 pr-4">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[10px] font-black text-slate-900">${item["CODIGO"]}</span>
                                    <span id="tag-${idx}" class="tag-minimal ${tagClass}">${tagText}</span>
                                </div>
                                <h4 class="text-xs font-bold text-slate-500 uppercase leading-tight">${this.getDesc(item)}</h4>
                            </div>
                            <div class="text-right">
                                <p class="text-[8px] font-bold text-slate-400 uppercase">Teórico</p>
                                <p class="text-sm font-black text-slate-900">${theoreticalVal}</p>
                            </div>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex gap-2">
                                <button onclick="core.step(${idx}, -1)" class="btn-action-audit"><i class="ph-bold ph-minus"></i></button>
                                <button onclick="core.step(${idx}, 1)" class="btn-action-audit btn-plus-audit"><i class="ph-bold ph-plus"></i></button>
                            </div>
                            <input type="number" id="input-${idx}" value="${auditVal}" onchange="core.manualCount(${idx}, this.value)" class="audit-input">
                            <div class="flex gap-2">
                                <button onclick="core.step(${idx}, 5)" class="px-3 py-2 bg-slate-50 rounded-lg text-[10px] font-bold text-slate-500">+5</button>
                                <button onclick="core.manualCount(${idx}, ${theoreticalVal})" class="px-3 py-2 bg-slate-50 rounded-lg text-[10px] font-bold text-blue-600">Max</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            },

            step: function(idx, val) {
                const item = this.raw[idx];
                item.audit = Math.max(0, (item.audit || 0) + val);
                document.getElementById(`input-${idx}`).value = item.audit;
                this.updateUIItem(idx);
                this.updateProgress(this.activeCont);
            },

            manualCount: function(idx, val) {
                const item = this.raw[idx];
                item.audit = Math.max(0, parseInt(val) || 0);
                const input = document.getElementById(`input-${idx}`);
                if(input) input.value = item.audit;
                this.updateUIItem(idx);
                this.updateProgress(this.activeCont);
            },

            updateUIItem: function(idx) {
                const item = this.raw[idx];
                const card = document.getElementById(`card-${idx}`);
                const tag = document.getElementById(`tag-${idx}`);
                const auditVal = item.audit || 0;
                const theoreticalVal = item["CAJAS"] || 0;
                const diff = auditVal - theoreticalVal;

                card.classList.remove('match', 'diff');
                tag.className = 'tag-minimal';
                
                if (auditVal > 0) {
                    if (diff === 0) { 
                        card.classList.add('match'); 
                        tag.classList.add('success'); 
                        tag.innerText = 'Correcto'; 
                    } else { 
                        card.classList.add('diff'); 
                        tag.classList.add('warning'); 
                        tag.innerText = diff > 0 ? `Sobrante (+${diff})` : `Faltante (${diff})`; 
                    }
                } else {
                    tag.innerText = 'Pendiente';
                }
            },

            updateProgress: function(id) {
                const items = this.raw.filter(i => (i["CONTENEDOR"] || i["CONTENEDOR_LIMPIO"]) == id);
                let tT = 0, tA = 0;
                items.forEach(i => { tT += (i["CAJAS"] || 0); tA += (i.audit || 0); });
                const perc = tT > 0 ? Math.round((tA/tT)*100) : 0;
                document.getElementById('audit-perc-bar').style.width = Math.min(100, perc) + "%";
                document.getElementById('audit-perc-text').innerText = perc + "%";
                document.getElementById('audit-count-done').innerText = tA;
            },

            viewList: function(id) {
                const items = this.raw.filter(i => (i["CONTENEDOR"] || i["CONTENEDOR_LIMPIO"]) == id);
                document.getElementById('list-cont-id').innerText = id;
                document.getElementById('list-items-content').innerHTML = items.map(item => `
                    <div class="bg-white p-5 rounded-2xl border border-slate-50 flex justify-between items-center">
                        <div class="flex-1 pr-4">
                            <p class="text-[9px] font-bold text-blue-600 mb-1 tracking-wider uppercase">${item["CODIGO"]}</p>
                            <p class="text-xs font-bold text-slate-800 uppercase line-clamp-1">${this.getDesc(item)}</p>
                        </div>
                        <div class="text-right">
                             <span class="text-sm font-black text-slate-900">${item.audit || 0} / ${item["CAJAS"] || 0}</span>
                        </div>
                    </div>
                `).join('');
                document.getElementById('list-view').style.display = 'flex';
            },

            closeModal: function(id) { document.getElementById(id).style.display = 'none'; },
            
            saveAndFinish: function() {
                localStorage.setItem('twins_cache', JSON.stringify(this.raw));
                this.closeModal('audit-view');
                this.render();
            },

            generatePDF: function(id) {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const items = this.raw.filter(i => (i["CONTENEDOR"] || i["CONTENEDOR_LIMPIO"]) == id);
                const fechaReporte = items[0]["FECHA_LIMPIA"] || "PENDIENTE";
                
                doc.setFontSize(22);
                doc.setTextColor(15, 23, 42);
                doc.text("TWINS ALMACEN", 14, 22);
                doc.setFontSize(9);
                doc.setTextColor(120);
                doc.text(`REPORTE DE AUDITORÍA • CONTENEDOR: ${id} • FECHA: ${fechaReporte}`, 14, 30);
                
                const tableBody = items.map(i => [
                    i["CODIGO"] || "---", 
                    this.getDesc(i), 
                    i["CAJAS"] || 0, 
                    i.audit || 0, 
                    (i.audit || 0) - (i["CAJAS"] || 0)
                ]);

                doc.autoTable({
                    startY: 40,
                    head: [['SKU', 'DESCRIPCIÓN', 'TEO', 'AUD', 'DIF']],
                    body: tableBody,
                    headStyles: { fillColor: [15, 23, 42], fontSize: 9, halign: 'center' },
                    styles: { fontSize: 7, cellPadding: 2 },
                    columnStyles: { 0: { cellWidth: 25 }, 1: { cellWidth: 90 }, 2: { halign: 'center' }, 3: { halign: 'center' }, 4: { halign: 'center' } }
                });
                
                const finalY = doc.lastAutoTable.finalY + 20;
                doc.setFontSize(9);
                doc.text("Revisión autorizada por:", 14, finalY);
                doc.setFont("helvetica", "bold");
                doc.text("J. Angelo Nuñez Durand", 14, finalY + 6);
                doc.setFont("helvetica", "normal");
                doc.text("Asist. Inventario Logístico", 14, finalY + 11);
                
                doc.save(`Reporte_${id}.pdf`);
            }
        };

        window.onload = () => { if(core.raw.length > 0) core.render(); else core.fetchData(); };
    </script>
</body>
</html>
