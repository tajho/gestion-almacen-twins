<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite | Control Logístico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        .month-divider { @apply sticky top-[100px] z-40 bg-slate-900 py-3 px-6 my-4 rounded-2xl text-[10px] font-black text-white uppercase tracking-[0.2em] flex items-center justify-between shadow-lg; }
        .card-container { @apply bg-white rounded-[28px] border border-slate-200 p-6 mb-4 shadow-sm; }
        /* Estilo para la lista de ítems interna */
        .item-row { @apply flex justify-between items-center py-3 border-b border-slate-50 last:border-0; }
    </style>
</head>
<body class="antialiased">

    <header class="glass-header sticky top-0 z-50 p-6 bg-white/90 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-xl mx-auto">
            <h1 class="text-2xl font-800 tracking-tighter italic leading-none">TWINS <span class="text-blue-600">ELITE</span></h1>
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic mt-1">J. Angelo Nuñez Durand</p>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-6">
        <div class="space-y-3 mb-8">
            <input type="text" id="searchInput" oninput="app.render()" placeholder="Buscar contenedor, código o descripción..." class="w-full px-6 py-5 rounded-[24px] bg-white border border-slate-200 shadow-sm outline-none font-bold text-sm">
            <select id="monthFilter" onchange="app.render()" class="w-full p-5 px-6 rounded-[24px] bg-white border border-slate-200 shadow-sm font-800 text-[10px] uppercase text-slate-500 outline-none appearance-none tracking-widest">
                <option value="ALL">TODOS LOS COMPLETADOS</option>
                <option value="0">ENERO</option><option value="1">FEBRERO</option><option value="2">MARZO</option>
                <option value="3">ABRIL</option><option value="4">MAYO</option><option value="5">JUNIO</option>
                <option value="6">JULIO</option><option value="7">AGOSTO</option><option value="8">SEPTIEMBRE</option>
                <option value="9">OCTUBRE</option><option value="10">NOVIEMBRE</option><option value="11">DICIEMBRE</option>
            </select>
        </div>

        <div id="feed" class="space-y-4 pb-20"></div>
    </main>

    <script>
        const app = {
            data: [],
            url: "https://script.google.com/macros/s/AKfycbwyaW2P0aK17COlZtYElUCj_8sgiZ3j9cvjXbhbjEWpAA3e-puqRwlTXlbAj-e_9D8H/exec",

            parseFecha: function(str) {
                if(!str || str === "") return { label: "SIN FECHA", sort: 9999999999999, m: "PENDIENTE", y: "" };
                const f = new Date(str + "T12:00:00");
                const hoy = new Date(); hoy.setHours(0,0,0,0);
                if(isNaN(f.getTime()) || f > hoy) return { label: "PENDIENTE", sort: f.getTime(), m: "PENDIENTE", y: "" };
                return { label: `${f.getDate()}/${f.getMonth()+1}/${f.getFullYear()}`, sort: f.getTime(), m: f.getMonth().toString(), y: f.getFullYear() };
            },

            sync: async function() {
                try {
                    const res = await fetch(this.url);
                    this.data = await res.json();
                    this.render();
                } catch(e) { console.log("Error de conexión"); }
            },

            // Función para alternar la visibilidad de la lista
            toggleLista: function(id) {
                const el = document.getElementById(`lista-${id}`);
                el.classList.toggle('hidden');
            },

            render: function() {
                const search = document.getElementById('searchInput').value.toLowerCase();
                const mFilter = document.getElementById('monthFilter').value;
                const mNames = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
                
                const groups = this.data.reduce((acc, item) => {
                    const id = (item.contenedor || "S/N").toString();
                    const f = this.parseFecha(item.descarga);
                    const estado = (item.estado || "").toUpperCase();

                    const isPendiente = (f.m === "PENDIENTE");
                    const matchMes = isPendiente || (mFilter === "ALL") || (f.m === mFilter);
                    const matchBusqueda = id.toLowerCase().includes(search) || item.codigo.toLowerCase().includes(search) || item.descripcion.toLowerCase().includes(search);

                    if(matchMes && matchBusqueda) {
                        if(!acc[id]) acc[id] = { id, f, estado, items: [] };
                        acc[id].items.push(item);
                    }
                    return acc;
                }, {});

                const sorted = Object.values(groups).sort((a,b) => b.f.sort - a.f.sort);
                let html = '';
                let lastHeader = '';

                sorted.forEach(g => {
                    const header = g.f.m === "PENDIENTE" ? "SECCIÓN PENDIENTE" : `${mNames[g.f.m]} ${g.f.y}`;
                    if(header !== lastHeader) {
                        html += `<div class="month-divider"><span>${header}</span><i class="ph-bold ph-calendar"></i></div>`;
                        lastHeader = header;
                    }

                    const tCajas = g.items.reduce((s, i) => s + i.cajas, 0);
                    const esCompletado = g.estado === "COMPLETADO";

                    html += `
                    <div class="card-container">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-[10px] font-800 text-blue-600 uppercase tracking-widest mb-1">📅 ${g.f.label}</p>
                                <h3 class="text-xl font-900 text-slate-900">CONTENEDOR ${g.id}</h3>
                            </div>
                            <div class="px-3 py-1 ${esCompletado ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-500'} rounded-lg text-[10px] font-black">
                                ${esCompletado ? 'COMPLETADO' : tCajas + ' CAJAS'}
                            </div>
                        </div>

                        <div id="lista-${g.id}" class="hidden mb-6 bg-slate-50 rounded-2xl p-4 border border-slate-100">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-3 tracking-tighter">Desglose de Ítems:</p>
                            ${g.items.map(i => `
                                <div class="item-row">
                                    <div class="flex flex-col">
                                        <span class="text-[11px] font-900 text-slate-800">${i.codigo}</span>
                                        <span class="text-[9px] font-600 text-slate-500 uppercase">${i.descripcion}</span>
                                    </div>
                                    <span class="text-[11px] font-900 text-blue-600">${i.cajas} CJ</span>
                                </div>
                            `).join('')}
                        </div>

                        <div class="grid grid-cols-1 gap-3">
                            <button class="w-full py-4 ${esCompletado ? 'hidden' : 'bg-blue-600 text-white'} rounded-2xl text-[10px] font-black uppercase shadow-md">
                                <i class="ph-bold ph-play mr-2"></i>INICIAR DESCARGA
                            </button>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="app.toggleLista('${g.id}')" class="py-4 bg-slate-100 text-slate-600 rounded-2xl text-[10px] font-black uppercase">
                                    <i class="ph-bold ph-list-bullets mr-1"></i>VER LISTA
                                </button>
                                <button class="py-4 ${esCompletado ? 'bg-green-600 text-white shadow-lg' : 'bg-slate-50 text-slate-300 pointer-events-none'} rounded-2xl text-[10px] font-black uppercase">
                                    <i class="ph-bold ph-file-pdf mr-1"></i>REPORTE
                                </button>
                            </div>
                        </div>
                    </div>`;
                });
                document.getElementById('feed').innerHTML = html;
            }
        };

        window.onload = () => { app.sync(); setInterval(() => app.sync(), 30000); };
    </script>
</body>
</html>
