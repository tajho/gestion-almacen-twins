<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite | Smart Logistics</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f1f5f9; 
            color: #0f172a;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .container-card {
            background: white;
            border-radius: 32px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s ease;
        }

        .smart-btn {
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 16px 8px;
            transition: all 0.2s ease;
        }

        /* DISEÑO DE MODAL PROFESIONAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: none; /* Se activa con JS */
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-box {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 30px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-body {
            overflow-y: auto;
            padding: 24px;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">

    <div id="modalApp" class="modal-overlay" onclick="closeAppModal()">
        <div class="modal-box shadow-2xl" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <div>
                    <h3 id="modalTitle" class="text-xl font-800 tracking-tighter uppercase text-blue-600">Lista de Carga</h3>
                    <p id="modalSubtitle" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"></p>
                </div>
                <button onclick="closeAppModal()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500">
                    <i class="ph-bold ph-x text-xl"></i>
                </button>
            </div>
            <div id="modalContent" class="modal-body space-y-3">
                </div>
            <div class="p-6 border-t border-slate-50 bg-slate-50/50 rounded-b-[30px]">
                <button onclick="closeAppModal()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-sm">CERRAR DETALLE</button>
            </div>
        </div>
    </div>

    <header class="glass-header sticky top-0 z-50 p-6">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <i class="ph-bold ph-cube text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-800 tracking-tighter italic leading-none">TWINS <span class="text-blue-600">ELITE</span></h1>
                    <span class="text-[9px] font-black uppercase text-slate-400 tracking-widest">Gestión de Inventario</span>
                </div>
            </div>
            <div class="text-right">
                <p id="live-clock" class="text-xs font-bold text-slate-800">--:--</p>
                <p id="status-tag" class="text-[8px] font-black text-orange-500 uppercase">Sincronizando...</p>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-5 pb-32">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-8">
            <div class="relative group">
                <input type="text" id="searchInput" oninput="logic.render()" 
                    class="w-full bg-white border-2 border-slate-100 rounded-[20px] py-4 pl-12 pr-4 text-sm font-semibold shadow-sm focus:border-blue-500 outline-none transition-all"
                    placeholder="Buscar por código o descripción...">
                <i class="ph-bold ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl group-focus-within:text-blue-500"></i>
            </div>
            
            <div class="relative">
                <select id="monthFilter" onchange="logic.render()" 
                    class="w-full bg-white border-2 border-slate-100 rounded-[20px] py-4 px-4 text-xs font-bold uppercase text-slate-500 shadow-sm outline-none appearance-none">
                    <option value="ALL">TODOS LOS MESES</option>
                    <option value="0">ENERO</option>
                    <option value="1">FEBRERO</option>
                    <option value="2">MARZO</option>
                    <option value="3">ABRIL</option>
                    <option value="4">MAYO</option>
                    <option value="5">JUNIO</option>
                    <option value="6">JULIO</option>
                    <option value="7">AGOSTO</option>
                    <option value="8">SEPTIEMBRE</option>
                    <option value="9">OCTUBRE</option>
                    <option value="10">NOVIEMBRE</option>
                    <option value="11">DICIEMBRE</option>
                </select>
                <i class="ph-bold ph-calendar-blank absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
            </div>
        </div>

        <div id="app-feed" class="space-y-6">
            </div>

    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass-header rounded-[30px] p-2 flex justify-between items-center shadow-2xl z-50 border border-white">
        <button class="w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg"><i class="ph-bold ph-house-line text-xl"></i></button>
        <button class="w-14 h-14 text-slate-400 flex items-center justify-center"><i class="ph-bold ph-chart-pie text-xl"></i></button>
        <button class="w-14 h-14 text-slate-400 flex items-center justify-center"><i class="ph-bold ph-file-plus text-xl"></i></button>
        <button onclick="logic.sync()" class="w-14 h-14 text-slate-400 flex items-center justify-center"><i class="ph-bold ph-arrows-clockwise text-xl"></i></button>
    </nav>

    <script>
        const API_URL = "TU_URL_DE_APPS_SCRIPT";
        const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        const logic = {
            db: JSON.parse(localStorage.getItem('twins_elite_pro')) || [],

            init: function() {
                this.updateClock();
                this.render();
                this.sync();
            },

            sync: async function() {
                document.getElementById('status-tag').innerText = "Sincronizando...";
                try {
                    const response = await fetch(API_URL);
                    const data = await response.json();
                    this.db = data.historial || data;
                    localStorage.setItem('twins_elite_pro', JSON.stringify(this.db));
                    this.render();
                    document.getElementById('status-tag').innerText = "Actualizado";
                    document.getElementById('status-tag').classList.replace('text-orange-500', 'text-blue-600');
                } catch(e) {
                    document.getElementById('status-tag').innerText = "Modo Local";
                    console.warn("Error de conexión, usando datos locales.");
                }
            },

            formatDate: function(dateStr) {
                if (!dateStr || dateStr === "SIN FECHA") return "Fecha pendiente";
                const d = new Date(dateStr);
                if (isNaN(d)) return dateStr;
                return `${d.getDate()} de ${MESES[d.getMonth()]} ${d.getFullYear()}`;
            },

            render: function() {
                const feed = document.getElementById('app-feed');
                const query = document.getElementById('searchInput').value.toLowerCase();
                const selectedMonth = document.getElementById('monthFilter').value;

                // AGRUPACIÓN INTELIGENTE POR CANAL
                const groups = this.db.reduce((acc, item) => {
                    const canal = item.canal || "Sin Canal";
                    const itemDate = new Date(item.almacen);
                    
                    // Lógica de Filtros (Buscador + Mes)
                    const matchesSearch = item.codigo?.toLowerCase().includes(query) || item.descripcion?.toLowerCase().includes(query);
                    const matchesMonth = selectedMonth === "ALL" || (!isNaN(itemDate) && itemDate.getMonth().toString() === selectedMonth);

                    if (matchesSearch && matchesMonth) {
                        if (!acc[canal]) {
                            acc[canal] = { 
                                id: canal, 
                                date: item.almacen, 
                                color: item.fontColor || '#2563eb',
                                items: [] 
                            };
                        }
                        acc[canal].items.push(item);
                    }
                    return acc;
                }, {});

                let html = '';
                const sortedGroups = Object.values(groups).sort((a, b) => b.id - a.id);

                if (sortedGroups.length === 0) {
                    feed.innerHTML = `<div class="text-center py-20 opacity-30 font-bold uppercase text-xs tracking-widest">No hay datos que coincidan</div>`;
                    return;
                }

                sortedGroups.forEach(group => {
                    html += `
                    <div class="container-card overflow-hidden shadow-sm">
                        <div class="h-2 w-full" style="background: ${group.color}"></div>
                        <div class="p-7">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <div class="flex items-center gap-2 mb-2">
                                        <span class="bg-slate-900 text-white text-[9px] font-900 px-3 py-1 rounded-full">CANAL ${group.id}</span>
                                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">${this.formatDate(group.date)}</span>
                                    </div>
                                    <h3 class="text-2xl font-800 text-slate-800 tracking-tighter uppercase leading-none">Contenedor ${group.id}</h3>
                                </div>
                                <div class="bg-blue-50 px-4 py-2 rounded-2xl text-center">
                                    <p class="text-[8px] font-black text-blue-400 uppercase leading-none mb-1">Items</p>
                                    <p class="text-xl font-800 text-blue-600 leading-none">${group.items.length}</p>
                                </div>
                            </div>

                            <div class="grid grid-cols-3 gap-3">
                                <button onclick="logic.action('EDIT', '${group.id}')" class="smart-btn bg-slate-50 text-slate-600 border border-slate-100 hover:bg-blue-50 hover:text-blue-600">
                                    <i class="ph-bold ph-note-pencil text-xl"></i>
                                    <span class="text-[9px] font-900 tracking-tighter">CORREGIR</span>
                                </button>
                                <button onclick="logic.action('LIST', '${group.id}')" class="smart-btn bg-slate-50 text-slate-600 border border-slate-100">
                                    <i class="ph-bold ph-list-magnifying text-xl"></i>
                                    <span class="text-[9px] font-900 tracking-tighter">VER LISTA</span>
                                </button>
                                <button onclick="logic.action('PDF', '${group.id}')" class="smart-btn bg-red-50 text-red-600 border border-red-100">
                                    <i class="ph-bold ph-file-pdf text-xl"></i>
                                    <span class="text-[9px] font-900 tracking-tighter">REPORTE</span>
                                </button>
                            </div>
                        </div>
                    </div>`;
                });

                feed.innerHTML = html;
            },

            action: function(type, canalId) {
                const groupItems = this.db.filter(i => String(i.canal) === String(canalId));
                
                if(type === 'LIST') {
                    document.getElementById('modalTitle').innerText = `Contenedor ${canalId}`;
                    document.getElementById('modalSubtitle').innerText = `${groupItems.length} SKUs Registrados`;
                    
                    let content = '';
                    groupItems.forEach(item => {
                        content += `
                        <div class="p-4 rounded-2xl bg-slate-50 border border-slate-100 flex items-center gap-4">
                            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm text-blue-600">
                                <i class="ph-bold ph-barcode text-xl"></i>
                            </div>
                            <div>
                                <p class="text-xs font-black text-blue-600">${item.codigo}</p>
                                <p class="text-[11px] font-bold text-slate-700 uppercase leading-tight">${item.descripcion}</p>
                            </div>
                        </div>`;
                    });
                    
                    document.getElementById('modalContent').innerHTML = content;
                    document.getElementById('modalApp').style.display = 'flex';
                }

                if(type === 'PDF') {
                    const firma = "Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.";
                    alert(`[SISTEMA TWINS]\nGenerando reporte para Canal: ${canalId}\n\n${firma}`);
                    // Aquí iría el código de jsPDF o similar
                }

                if(type === 'EDIT') {
                    alert(`Redirigiendo al formulario de edición para el Canal ${canalId}...`);
                }
            },

            updateClock: function() {
                setInterval(() => {
                    const now = new Date();
                    document.getElementById('live-clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }, 1000);
            }
        };

        function closeAppModal() {
            document.getElementById('modalApp').style.display = 'none';
        }

        // Arrancar aplicación
        logic.init();
    </script>
</body>
</html>
