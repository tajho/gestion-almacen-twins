<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TITAN OS | Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --ios-bg: #F2F2F7;
            --brand: #007AFF;
            --delivery: #007AFF;
            --return: #FF3B30;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body { 
            background-color: var(--ios-bg); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1C1C1E; margin: 0; padding-bottom: 120px;
        }

        /* Header Dinámico */
        .app-header {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 25px 20px; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .app-header h1 { font-weight: 800; font-size: 24px; margin: 0; letter-spacing: -1px; }

        /* Contenedores Didácticos */
        .card-titan {
            background: #fff; border-radius: 28px; padding: 25px;
            margin: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            animation: fadeIn 0.4s ease-out;
        }

        .step-indicator { font-size: 11px; font-weight: 800; color: var(--brand); text-transform: uppercase; margin-bottom: 15px; display: block; }

        /* Inputs Modernos */
        .input-titan {
            background: #F2F2F7; border: 2px solid transparent;
            border-radius: 16px; padding: 16px; width: 100%;
            font-size: 16px; transition: 0.3s; margin-bottom: 15px;
        }
        .input-titan:focus { border-color: var(--brand); background: #fff; outline: none; }

        /* Buscador Predictivo */
        .search-container { position: relative; }
        .sug-box {
            position: absolute; width: 100%; background: #fff;
            border-radius: 20px; z-index: 2000; box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            max-height: 250px; overflow-y: auto; display: none; margin-top: 5px;
        }
        .sug-item { padding: 15px 20px; border-bottom: 1px solid #F2F2F7; cursor: pointer; }

        /* Botones de Acción */
        .btn-titan {
            border-radius: 20px; padding: 18px; font-weight: 700; width: 100%;
            border: none; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-delivery { background: var(--delivery); color: white; }
        .btn-return { background: var(--return); color: white; }
        .btn-titan:active { transform: scale(0.95); opacity: 0.8; }

        /* Historial - Sellos */
        .history-item {
            background: #fff; border-radius: 22px; padding: 18px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 6px solid #ccc;
        }
        .stamp { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 8px; text-transform: uppercase; }
        .stamp-delivery { background: #E1EFFF; color: var(--delivery); }
        .stamp-return { background: #FFE5E5; color: var(--return); }

        /* Tab Bar Navegación Inferior */
        .tab-bar {
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            border-radius: 35px; padding: 12px; display: flex;
            justify-content: space-around; z-index: 2000;
        }
        .tab-item { border: none; background: none; color: #666; font-size: 10px; font-weight: 700; text-align: center; }
        .tab-item.active { color: #fff; }
        .tab-item i { font-size: 22px; margin-bottom: 4px; display: block; }

        .view { display: none; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="d-flex justify-content-between align-items-center">
            <h1>TITAN <span style="color:var(--brand)">OS</span></h1>
            <div id="sync-icon" class="text-success small"><i class="fas fa-check-circle"></i> Online</div>
        </div>
    </header>

    <main>
        <section id="v-delivery" class="view active">
            <div class="card-titan">
                <span class="step-indicator">Módulo de Despachos</span>
                <input type="text" id="cli-d" class="input-titan" placeholder="Cliente / Destino" oninput="iaMemory(this.value, 'ven-d')">
                <input type="text" id="ven-d" class="input-titan" placeholder="Vendedor Responsable">
                
                <div class="search-container">
                    <input type="text" id="search-d" class="input-titan" placeholder="🔍 Buscar Producto..." oninput="smartSearch(this.value, 'sug-d', 'd')">
                    <div id="sug-d" class="sug-box"></div>
                </div>

                <div id="ui-d" class="d-none">
                    <div class="p-3 mb-3 bg-light rounded-4">
                        <b id="p-name-d"></b><br><small class="text-primary" id="p-sku-d"></small>
                    </div>
                    <input type="number" id="cant-d" class="input-titan" placeholder="Cantidad a Entregar">
                    <button class="btn-titan btn-delivery" onclick="addToQueue('d')">Añadir al Despacho</button>
                </div>

                <div id="list-d" class="mt-4 d-none">
                    <hr>
                    <div id="q-items-d"></div>
                    <button class="btn-titan btn-delivery mt-3" onclick="saveData('Pedidos', 'd')">Confirmar Entrega</button>
                </div>
            </div>
        </section>

        <section id="v-return" class="view">
            <div class="card-titan">
                <span class="step-indicator" style="color:var(--return)">Módulo de Calidad (QC)</span>
                <input type="text" id="cli-r" class="input-titan" placeholder="Nombre Cliente" oninput="iaMemory(this.value, 'ven-r')">
                <input type="text" id="ven-r" class="input-titan" placeholder="Vendedor">

                <div class="search-container">
                    <input type="text" id="search-r" class="input-titan" placeholder="🔍 Buscar Producto Fallado..." oninput="smartSearch(this.value, 'sug-r', 'r')">
                    <div id="sug-r" class="sug-box"></div>
                </div>

                <div id="ui-r" class="d-none">
                    <div class="p-3 mb-3" style="background:#FFF5F5; border-radius: 18px;">
                        <b id="p-name-r"></b>
                    </div>
                    <div class="row g-2">
                        <div class="col-6"><input type="number" id="cg-r" class="input-titan" placeholder="Cant. Guía"></div>
                        <div class="col-6"><input type="number" id="cr-r" class="input-titan" placeholder="Cant. Real"></div>
                    </div>
                    <select id="st-r" class="input-titan">
                        <option>FALLADO A MERMA</option>
                        <option>SE ARREGLO EL PRODUCTO</option>
                        <option>PRODUCTO FALLA DE IMPORTACION</option>
                    </select>
                    <button class="btn-titan btn-return" onclick="addToQueue('r')">Añadir a Devolución</button>
                </div>

                <div id="list-r" class="mt-4 d-none">
                    <hr>
                    <div id="q-items-r"></div>
                    <button class="btn-titan btn-return mt-3" onclick="saveData('Devoluciones', 'r')">Procesar QC & PDF</button>
                </div>
            </div>
        </section>

        <section id="v-history" class="view">
            <div class="px-3 mt-3">
                <h6 class="fw-bold mb-3 opacity-50">REGISTROS RECIENTES</h6>
                <div id="history-list"></div>
            </div>
        </section>
    </main>

    <nav class="tab-bar">
        <button class="tab-item active" onclick="nav('delivery', this)"><i class="fas fa-truck-loading"></i><span>Entrega</span></button>
        <button class="tab-item" onclick="nav('return', this)"><i class="fas fa-sync"></i><span>Retorno</span></button>
        <button class="tab-item" onclick="nav('history', this)"><i class="fas fa-history"></i><span>Historial</span></button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCeMB7Cf1DpA41NEmprwR0XqrvdD_-xTEbl3vKsMlaHIp_r3b5MpMWcbrQKyOiYFF2NQ/exec";
        let DB = []; let QUEUE_D = []; let QUEUE_R = []; let MEMORY = {}; let SELECTED = null;

        async function init() {
            const r = await fetch(API, {method: "POST", body: JSON.stringify({action: "load"})});
            const d = await r.json();
            DB = d.p;
            // IA: Aprende relaciones cliente-vendedor del historial
            d.h.forEach(row => { if(row[5]) MEMORY[row[5].toLowerCase()] = row[6].split('| Vend: ')[1] || row[6]; });
            renderHistory(d.h);
        }

        function iaMemory(v, inputId) {
            const match = MEMORY[v.toLowerCase()];
            if(match) document.getElementById(inputId).value = match;
        }

        function smartSearch(v, boxId, type) {
            const box = document.getElementById(boxId);
            if(v.length < 1) { box.style.display='none'; return; }
            const matches = DB.filter(p => p[1].toLowerCase().includes(v.toLowerCase()) || p[0].toString().includes(v)).slice(0,5);
            box.innerHTML = matches.map(p => `<div class="sug-item" onclick="pick('${p[0]}','${p[1]}','${type}')"><b>${p[1]}</b><br><small class="text-muted">${p[0]}</small></div>`).join('');
            box.style.display = matches.length ? 'block' : 'none';
        }

        function pick(sku, name, type) {
            SELECTED = {sku, name};
            document.getElementById(`p-name-${type}`).innerText = name;
            if(type==='d') document.getElementById(`p-sku-d`).innerText = sku;
            document.getElementById(`ui-${type}`).classList.remove('d-none');
            document.querySelectorAll('.sug-box').forEach(b => b.style.display='none');
        }

        function addToQueue(type) {
            if(type === 'd') {
                const c = document.getElementById('cant-d').value;
                if(!c) return;
                QUEUE_D.push({...SELECTED, c});
            } else {
                const cg = document.getElementById('cg-r').value;
                const cr = document.getElementById('cr-r').value;
                if(!cg || !cr) return;
                QUEUE_R.push({...SELECTED, cg, cr, st: document.getElementById('st-r').value});
            }
            renderQueue(type);
            document.getElementById(`ui-${type}`).classList.add('d-none');
            document.getElementById(`search-${type}`).value = "";
        }

        function renderQueue(type) {
            const list = type==='d' ? QUEUE_D : QUEUE_R;
            document.getElementById(`list-${type}`).classList.remove('d-none');
            document.getElementById(`q-items-${type}`).innerHTML = list.map(i => `
                <div class="p-3 mb-2 bg-light rounded-3 d-flex justify-content-between align-items-center">
                    <div><b>${i.name}</b><br><small>${i.st || 'Despacho'}</small></div>
                    <span class="badge rounded-pill bg-dark">x${i.c || i.cr}</span>
                </div>
            `).join('');
        }

        async function saveData(sheet, type) {
            const cli = document.getElementById(`cli-${type}`).value;
            const ven = document.getElementById(`ven-${type}`).value;
            if(!cli || !ven) return Swal.fire("Campos requeridos", "Nombre y Vendedor", "warning");

            const q = type === 'd' ? QUEUE_D : QUEUE_R;
            const payload = q.map(i => [
                new Date(), 
                type==='d'?'ENTREGA':'DEVOLUCION', 
                i.sku, i.name, i.c || i.cr, 
                cli, 
                type==='d' ? `Vend: ${ven}` : `Guia: ${i.cg} | Rev: ${i.st} | Vend: ${ven}`
            ]);

            Swal.fire({title:'Sincronizando...', didOpen:()=>Swal.showLoading()});
            await fetch(API, {method: "POST", body: JSON.stringify({action: "save", sheet, payload})});
            
            if(type==='r') {
                generatePDF(cli, ven, q);
                sendWA(cli, ven, q);
            }

            Swal.fire("Sincronizado", "Registro exitoso", "success").then(()=>location.reload());
        }

        function renderHistory(h) {
            document.getElementById('history-list').innerHTML = h.slice(0,30).map(r => `
                <div class="history-item" style="border-left-color: ${r[1]==='ENTREGA'?'var(--delivery)':'var(--return)'}">
                    <div>
                        <span class="stamp ${r[1]==='ENTREGA'?'stamp-delivery':'stamp-return'}">${r[1]}</span>
                        <div class="fw-bold mt-1">${r[5]}</div>
                        <small class="opacity-50">${r[3]}</small>
                    </div>
                    <div class="text-end">
                        <div class="fw-black fs-5">x${r[4]}</div>
                        <small style="font-size:9px">${new Date(r[0]).toLocaleDateString()}</small>
                    </div>
                </div>
            `).join('');
        }

        function generatePDF(cli, ven, q) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(0, 122, 255); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("ACTA DE INSPECCIÓN LOGÍSTICA", 14, 25);
            doc.setFontSize(10); doc.text(`CLIENTE: ${cli.toUpperCase()} | VENDEDOR: ${ven.toUpperCase()}`, 14, 35);
            
            doc.autoTable({
                head: [['SKU', 'PRODUCTO', 'GUÍA', 'REAL', 'DIAGNÓSTICO']],
                body: q.map(i => [i.sku, i.name, i.cg, i.cr, i.st]),
                startY: 50, theme: 'grid', headStyles: {fillColor: [40, 40, 40]}
            });

            const fY = doc.lastAutoTable.finalY + 30;
            doc.setDrawColor(200); doc.line(14, fY, 100, fY);
            doc.setTextColor(0); doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, fY + 7);
            doc.text("Asist. Inventario Logístico", 14, fY + 12);
            doc.save(`QC_${cli}.pdf`);
        }

        function sendWA(cli, ven, q) {
            let msg = `*REPORTE QC - TITAN OS*%0A*Cliente:* ${cli}%0A*Vendedor:* ${ven}%0A---%0A`;
            q.forEach(i => { msg += `• ${i.name} (Real: ${i.cr}/Guia: ${i.cg})%0A  _Estado: ${i.st}_%0A`; });
            msg += `%0A*Autorizado por:* J. Angelo Nuñez Durand`;
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }

        function nav(v, btn) {
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(e => e.classList.remove('active'));
            document.getElementById('v-'+v).classList.add('active');
            btn.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
