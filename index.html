<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twins Despacho - Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f1f5f9; margin: 0; overflow-x: hidden; }
        
        /* Glassmorphism & Depth */
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; }
        .view { display: none; min-height: 100vh; padding: 1.5rem; flex-direction: column; }
        .view.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .btn-elite { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border-radius: 1.2rem; font-weight: 800; padding: 1.2rem; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); border: none; transition: 0.3s; }
        .btn-elite:active { transform: scale(0.96); opacity: 0.9; }
        
        .input-elite { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; color: white; width: 100%; outline: none; transition: 0.3s; }
        .input-elite:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="fixed top-0 left-0 right-0 h-20 px-6 flex justify-between items-center z-[100] bg-[#0f172a]/80 backdrop-blur-md">
        <div onclick="navTo('home')" class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black italic">T</div>
            <span class="font-extrabold tracking-tighter text-lg">TWINS <span class="text-blue-500">PRO</span></span>
        </div>
        <button onclick="navTo('historial')" class="p-3 bg-slate-800 rounded-2xl">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </button>
    </header>

    <div id="view-home" class="view active pt-28">
        <div class="mb-10">
            <p class="text-blue-400 font-bold text-xs uppercase tracking-widest mb-2">Inventory System</p>
            <h1 class="text-5xl font-extrabold tracking-tight leading-[0.95] mb-4">Manejo de<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Despachos.</span></h1>
            <p class="text-slate-400 text-sm max-w-[250px]">Control de contenedores y reportes automáticos para Angelo.</p>
        </div>
        <div class="grid gap-4">
            <button onclick="navTo('crear')" class="btn-elite text-left flex justify-between items-center">
                <span>NUEVA CARGA</span>
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
            </button>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="navTo('historial')" class="glass-card p-6 flex flex-col justify-between h-40">
                    <span class="bg-blue-500/20 text-blue-400 p-2 rounded-lg w-fit text-xs font-bold">HISTORIA</span>
                    <span class="text-xl font-bold">Ver todos</span>
                </div>
                <div class="glass-card p-6 flex flex-col justify-between h-40 opacity-50">
                    <span class="bg-slate-500/20 text-slate-400 p-2 rounded-lg w-fit text-xs font-bold">STATUS</span>
                    <span class="text-xl font-bold">Cloud Sync</span>
                </div>
            </div>
        </div>
    </div>

    <div id="view-crear" class="view pt-28">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="navTo('home')" class="text-slate-400 italic">← Volver</button>
            <h2 class="text-2xl font-black italic">SET UP</h2>
        </div>
        <div class="space-y-4 mb-8">
            <input type="text" id="c-id" class="input-elite text-blue-400 font-bold uppercase" placeholder="ID DEL CONTENEDOR">
            <div class="relative">
                <input type="text" id="s-sku" oninput="smartSearch()" class="input-elite" placeholder="SKU o Descripción">
                <div id="results" class="absolute z-50 left-0 right-0 bg-slate-800 rounded-2xl mt-2 hidden border border-white/10 max-h-56 overflow-y-auto shadow-2xl"></div>
            </div>
            <div class="flex gap-3">
                <input type="number" id="s-meta" class="input-elite" placeholder="Meta Pack">
                <button onclick="addMani()" class="w-16 h-14 bg-white text-black rounded-2xl font-black text-xl">+</button>
            </div>
        </div>
        <div id="pre-list" class="flex-grow space-y-3 overflow-y-auto pb-24"></div>
        <div class="fixed bottom-8 left-6 right-6">
            <button onclick="saveAndGo()" class="btn-elite w-full">LANZAR OPERACIÓN</button>
        </div>
    </div>

    <div id="view-ops" class="view pt-28">
        <div class="glass-card p-8 mb-6 text-center border-t-4 border-t-blue-500">
            <span id="op-title" class="text-[10px] font-black text-blue-500 tracking-[.3em] uppercase mb-4 block">TERMINAL ACTIVA</span>
            <select id="sel-sku" onchange="renderMiniBars()" class="text-3xl font-black bg-transparent text-white w-full text-center outline-none mb-6 appearance-none uppercase"></select>
            <div class="flex justify-center items-center gap-6">
                <input type="number" id="qty-in" class="bg-slate-900 border border-white/10 w-28 h-20 text-center text-4xl font-black rounded-3xl" placeholder="0">
                <button onclick="registrarBulto()" class="w-20 h-20 bg-emerald-500 text-white rounded-[2rem] font-black text-2xl shadow-lg shadow-emerald-500/20">OK</button>
            </div>
        </div>
        <div id="mini-progress-list" class="space-y-3 pb-32"></div>
        <div class="fixed bottom-8 left-6 right-6 flex gap-3">
            <button onclick="finalizarOficial()" class="btn-elite !bg-emerald-600 flex-1">FINALIZAR Y PDF</button>
        </div>
    </div>

    <div id="view-historial" class="view pt-28">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="navTo('home')" class="text-slate-400 italic">← Inicio</button>
            <h2 class="text-2xl font-black italic uppercase">Registros</h2>
        </div>
        <div id="history-list" class="space-y-4 pb-20"></div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_items = {};
        let currentMani = [];
        let activeJob = null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                const raw = await res.json();
                raw.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().trim().toUpperCase()] = r.DESCRIPCION; });
            } catch (e) {}
            activeJob = JSON.parse(localStorage.getItem('tj_active'));
            if (activeJob) { navTo('ops'); resumeOps(); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'historial') renderHistory();
        }

        function smartSearch() {
            const val = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('results');
            if(val.length < 2) { resDiv.classList.add('hidden'); return; }
            const matches = Object.entries(db_items).filter(([sku, desc]) => 
                sku.includes(val) || desc.toUpperCase().includes(val)
            ).slice(0, 5);
            resDiv.innerHTML = matches.map(([sku, desc]) => `
                <div onclick="setProd('${sku}')" class="p-4 border-b border-white/5 active:bg-blue-600 transition-colors">
                    <p class="font-black text-sm">${sku}</p>
                    <p class="text-[10px] text-slate-400 uppercase truncate">${desc}</p>
                </div>
            `).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(sku) { 
            document.getElementById('s-sku').value = sku; 
            document.getElementById('results').classList.add('hidden'); 
            document.getElementById('s-meta').focus(); 
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "S/D", meta, real: 0 });
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderPreList() {
            document.getElementById('pre-list').innerHTML = currentMani.map((i, idx) => `
                <div class="glass-card p-5 flex justify-between items-center">
                    <div><p class="font-black text-blue-400">${i.sku}</p><p class="text-[9px] text-slate-400">${i.desc}</p></div>
                    <div class="flex items-center gap-4">
                        <span class="text-sm font-black">${i.meta} CJ</span>
                        <button onclick="currentMani.splice(${idx},1);renderPreList()" class="text-red-400">×</button>
                    </div>
                </div>
            `).join('');
        }

        function saveAndGo() {
            if(currentMani.length === 0) return;
            const id = document.getElementById('c-id').value || "ELITE-" + Math.floor(Math.random()*900);
            activeJob = { id, items: [...currentMani], fecha: new Date().toLocaleString(), status: 'ACTIVE' };
            localStorage.setItem('tj_active', JSON.stringify(activeJob));
            let history = JSON.parse(localStorage.getItem('tj_history')) || [];
            history.unshift(activeJob);
            localStorage.setItem('tj_history', JSON.stringify(history));
            currentMani = [];
            navTo('ops');
            resumeOps();
        }

        function resumeOps() {
            document.getElementById('op-title').innerText = "TERMINAL: " + activeJob.id;
            document.getElementById('sel-sku').innerHTML = activeJob.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            renderMiniBars();
        }

        function registrarBulto() {
            const val = parseInt(document.getElementById('qty-in').value);
            if(!val) return;
            const target = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            if(target) target.real += val;
            document.getElementById('qty-in').value = '';
            localStorage.setItem('tj_active', JSON.stringify(activeJob));
            renderMiniBars();
        }

        function renderMiniBars() {
            document.getElementById('mini-progress-list').innerHTML = activeJob.items.map(i => {
                const pc = Math.min(Math.round((i.real / i.meta) * 100), 100);
                const isSelected = i.sku === document.getElementById('sel-sku').value;
                return `<div class="glass-card p-4 transition-all ${isSelected ? 'border-l-4 border-l-blue-500 scale-[1.02]' : 'opacity-60'}">
                    <div class="flex justify-between font-black text-[10px] mb-2"><span>${i.sku}</span><span class="${pc>=100?'text-emerald-400':'text-blue-400'}">${i.real}/${i.meta}</span></div>
                    <div class="h-1 w-full bg-slate-700 rounded-full overflow-hidden"><div class="h-full bg-blue-500" style="width:${pc}%"></div></div>
                </div>`;
            }).join('');
        }

        function finalizarOficial() {
            if(!activeJob) return;
            let history = JSON.parse(localStorage.getItem('tj_history')) || [];
            const idx = history.findIndex(h => h.id === activeJob.id && h.status !== 'DONE');
            activeJob.status = "DONE";
            if(idx !== -1) history[idx] = activeJob;
            localStorage.setItem('tj_history', JSON.stringify(history));
            generarPDF(activeJob);
            localStorage.removeItem('tj_active');
            activeJob = null;
            navTo('home');
        }

        function generarPDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("TWINS DESPACHO ELITE", 14, 25);
            doc.setTextColor(0,0,0); doc.setFontSize(10);
            doc.text(`CONTENEDOR: ${data.id} | CIERRE: ${data.fecha}`, 14, 50);
            doc.autoTable({
                startY: 60,
                head: [['SKU', 'DESCRIPCION', 'PACK', 'FISICO', 'RESULT']],
                body: data.items.map(i => [i.sku, i.desc.slice(0,35), i.meta, i.real, (i.real === i.meta ? 'OK' : 'X')]),
                theme: 'grid',
                headStyles: { fillColor: [37, 99, 235] }
            });
            doc.setFontSize(8); doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 20);
            doc.save(`REPORT_${data.id}.pdf`);
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('tj_history')) || [];
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="glass-card p-6 border-l-4 ${h.status==='DONE'?'border-l-emerald-500':'border-l-amber-500'}">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">${h.fecha}</p>
                            <h3 class="text-xl font-black italic tracking-tighter">${h.id}</h3>
                        </div>
                        <span class="text-[8px] font-black px-2 py-1 bg-white/5 rounded-md uppercase">${h.status}</span>
                    </div>
                    <div class="flex gap-3">
                        ${h.status!=='DONE' ? `<button onclick="loadJob('${h.id}')" class="flex-1 bg-blue-600 p-3 rounded-xl text-[10px] font-black italic">RESUMIR</button>`:''}
                        <button onclick='descargarManual("${h.id}")' class="flex-1 bg-slate-700 p-3 rounded-xl text-[10px] font-black italic">PDF REPORTE</button>
                    </div>
                </div>
            `).join('');
        }

        function loadJob(id) {
            activeJob = (JSON.parse(localStorage.getItem('tj_history'))).find(x => x.id === id);
            localStorage.setItem('tj_active', JSON.stringify(activeJob));
            navTo('ops'); resumeOps();
        }

        function descargarManual(id) {
            const h = (JSON.parse(localStorage.getItem('tj_history'))).find(x => x.id === id);
            if(h) generarPDF(h);
        }

        init();
    </script>
</body>
</html>
