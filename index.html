<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS LOGISTICS PRO | J. ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --black: #000000; --white: #ffffff; --gray-1: #f8f9fa; --gray-2: #e9ecef; --gray-3: #dee2e6; }
        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--white); color: var(--black); margin: 0; padding-bottom: 120px; line-height: 1.5; }
        
        /* Navigation & Dashboard */
        .nav-header { background: var(--black); color: var(--white); padding: 30px 20px; text-align: center; }
        .nav-header h1 { margin: 0; font-size: 0.8rem; letter-spacing: 4px; font-weight: 900; text-transform: uppercase; }
        
        .kpi-container { display: flex; border-bottom: 1px solid var(--black); background: var(--white); }
        .kpi-box { flex: 1; padding: 20px; text-align: center; border-right: 1px solid var(--gray-2); }
        .kpi-val { display: block; font-size: 1.5rem; font-weight: 900; color: var(--black); }
        .kpi-lbl { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; color: #888; letter-spacing: 1px; }

        .container { padding: 20px; max-width: 650px; margin: auto; }
        
        /* Professional Item Card */
        .card { border: 1px solid var(--black); margin-bottom: 15px; padding: 20px; transition: all 0.2s ease; }
        .card:hover { background: var(--gray-1); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .sku-badge { border: 1.5px solid var(--black); padding: 4px 10px; font-size: 0.75rem; font-weight: 900; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--gray-3); }
        .complete .status-dot { background: var(--black); box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        
        .item-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 15px; text-transform: uppercase; }
        
        /* Pro Inputs */
        .input-wrapper { display: flex; align-items: center; border-bottom: 2px solid var(--black); padding: 5px 0; }
        .input-wrapper label { font-size: 0.6rem; font-weight: 900; text-transform: uppercase; margin-right: 15px; }
        input[type="number"] { border: none; font-size: 1.3rem; font-weight: 900; width: 100px; outline: none; background: transparent; }
        .plan-info { margin-left: auto; font-size: 0.75rem; font-weight: 700; color: #555; }

        /* Action Bar */
        .action-bar { position: fixed; bottom: 0; width: 100%; background: var(--white); border-top: 1px solid var(--black); padding: 25px 20px; z-index: 1000; }
        .btn-black { background: var(--black); color: var(--white); border: none; width: 100%; padding: 20px; font-size: 0.8rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
        .btn-black:active { opacity: 0.8; }

        /* Setup View */
        textarea { width: 100%; border: 1px solid var(--black); padding: 20px; font-size: 0.8rem; min-height: 150px; outline: none; margin-bottom: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="nav-header">
    <h1>Logistics Intelligence Twins</h1>
</div>

<div id="dashboard" class="kpi-container hidden">
    <div class="kpi-box"><span class="kpi-val" id="total-received">0</span><span class="kpi-lbl">Recibido</span></div>
    <div class="kpi-box" style="border:none;"><span class="kpi-val" id="total-progress">0%</span><span class="kpi-lbl">Eficiencia</span></div>
</div>

<div class="container">
    <div id="setup-view">
        <p style="font-size: 0.7rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase;">Importar datos de contenedor (JSON):</p>
        <textarea id="json-input" placeholder="Pegue la estructura de datos aquí..."></textarea>
        <button class="btn-black" onclick="initializeSystem()">Inicializar Sistema</button>
    </div>
    <div id="inventory-list"></div>
</div>

<div class="action-bar hidden" id="action-bar">
    <button class="btn-black" onclick="generateProfessionalPDF()">Finalizar y Exportar Reporte</button>
</div>

<script>
    let inventoryData = [];
    
    // Firma caligráfica generada por código (Vectorial elegante)
    const signatureAsset = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAABkCAYAAADD9n8HAAAAAXNSR0IArs4c6QAAEchJREFUeF7tXWtsHMcV/mZ29+79uCTvS5RESpYpWZZjxY6dWnHaInZsOHVaw0DRFm0fDf3ToAUK9E+BAn3ToEDRP9mgaVvHSBEnTuw6LlzVkiXHkhV9iqREiqIoeZ8P7969O7szU9zLS2mXpC7Iu0uu7wMGe7N378z55szMmTMzR0BfGgMaA1UfA9Xfgr6hxoDGgBoB9CHQGKjxGNAI1HjD69trBGoM0GdAY6DGY0AjUOMNr2+vEagxQJ8BjYEajwGNQI03vL69RoDGAn0GNAZqPAY0AjXe8Pr2GgEaA/QZ0Bio8RjQCNR4w+vbawRoDNBnQGOgxmNAI1DjDa9vrxGgMUCTAclI7E7M7M49eIAs6X6X7u/60hioixigTCI2En0pZnbnHzxAlvS4S/d3fWkM1EUMUCYRG4m+FDO78w8eIEt63KX7u740BuoiBiiTiI1EX4qZ3fkHD5AlPe7S/V1fGgN1EQOUScRGoi/FzO78gwfIkh536f6uL42BuogByiRiI9GXYmZ3/sEDZEmPu3R/15fGQF3EAGUSsZHoSzGzO/8fHSDqIatfF7fN9GvXFv6Sre/N0beu3higSCKmi0XEnBv8f15E6O8EInYnHqAn3Z/N8TfR8/Pz5Mknnmh5XpD6f9m5IubY4P+vE/mE7uD8AmXSuZHoCzGzu/7hAWpU6i6fHz9+nHznO98pS7mI6WIRMeH8/3QiH9f9XpBAEisRG4vOi5ndfX8XIEt6WvT5v3MMLFuAlEnERmIvxczuvr8LkCU9Xfr83zkGlilAnInYvTHM7P76O8fAkh4uff7vHgPLEyDxvTHM7P76O8fAkh4uff7vHgPLEyDxHTHM7P76O8fAkh4uff7vHgPLEyDx7THM7P76O8fAkh4uff7vHgPLEiDxbTHM7P76O8fAkh4uff7vHgPLEiDxzTHM7P76O8fAkh4uff7vHgPLEiDxjTHM7P76O8fAkh4uff7vHgPLEyDujTHM7P76O8fAkh4uff7vHgPLEiDu9THM7P76O8fAkh4uff7vHgPLEiDu1THM7P76O8fAkh4uff7vHgPLEiDubTHM7P76O8fAkh4uff7vHgPLEiDurzHM7P76O8fAkh4uff7vHgPLEiDu9TDM7P76O8fAkh4uff7vHgPLEiDu8TDM7P76O8fAkh4uff7vHgPLEiDu7jDM7P76O8fAkh4uff7vHgPLEiDuTjPM7P76O8fAkh4uff7vHgPLEiDuNTPM7P76O8fAkh4uff7vHgPLEiDuFTPM7P76O8fAkh4uff7vHgPLEiDubjPM7P76O8fAkh4uff7vHgPLEiDuVTPM7P76O8fAkh4uff7vHgPLEyDuyTDMPPofvMvS/S7d3/WlMVAnMUCZRGwkekPM7MH/WpY0f/r9v86Krt6/XGUSsbHoXszshR8dIEt6XfT5v3MMLFeAuFNR8U6O+f889S9fXxoDdX4C0X8W/f8Rk79v9O/79K99Y4CyREz3X8TfM+7vGfeZ940B5f//BvA68Y9TInUfAAAAAElFTkSuQmCC";

    function initializeSystem() {
        const input = document.getElementById('json-input').value;
        try {
            inventoryData = JSON.parse(input).map(i => ({...i, current: 0}));
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('action-bar').classList.remove('hidden');
            renderInventory();
        } catch(e) { alert("Error en estructura JSON. Por favor verifique."); }
    }

    function renderInventory() {
        const list = document.getElementById('inventory-list');
        list.innerHTML = "";
        inventoryData.forEach((item, index) => {
            const boxes = item.current / item.u_por_caja;
            const isComplete = boxes >= item.cajas_pck;
            
            list.innerHTML += `
                <div class="card ${isComplete ? 'complete' : ''}">
                    <div class="card-header">
                        <span class="sku-badge">${item.sku}</span>
                        <div class="status-dot"></div>
                    </div>
                    <div class="item-name">${item.desc}</div>
                    <div class="input-wrapper">
                        <label>Ingreso Físico</label>
                        <input type="number" value="${boxes || ''}" placeholder="0" 
                               oninput="updateItem(${index}, this.value)" inputmode="numeric">
                        <span class="plan-info">PLAN: ${item.cajas_pck} CJ</span>
                    </div>
                </div>`;
        });
        updateDashboard();
    }

    function updateItem(index, val) {
        const num = parseFloat(val) || 0;
        inventoryData[index].current = num * inventoryData[index].u_por_caja;
        updateDashboard();
    }

    function updateDashboard() {
        let rec = 0, exp = 0;
        inventoryData.forEach(i => {
            rec += (i.current / i.u_por_caja);
            exp += i.cajas_pck;
        });
        document.getElementById('total-received').innerText = Math.round(rec);
        document.getElementById('total-progress').innerText = exp > 0 ? Math.round((rec/exp)*100) + "%" : "0%";
    }

    function generateProfessionalPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Estilo Corporativo Blanco y Negro
        doc.setFillColor(0,0,0);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(18).setFont(undefined, 'bold').text("INVENTORY DISPATCH REPORT", 105, 18, {align:'center'});
        doc.setFontSize(8).setFont(undefined, 'normal').text("TWINS MANAGEMENT SYSTEM | LOGISTICS DIVISION", 105, 28, {align:'center'});
        
        doc.setTextColor(0,0,0);
        doc.setFontSize(10).setFont(undefined, 'bold').text(`AUDIT DATE: ${new Date().toLocaleDateString()}`, 15, 50);
        doc.text(`REVISOR: J. ANGELO NUÑEZ DURAND`, 15, 56);

        const rows = inventoryData.map(i => [
            i.sku, 
            i.desc.substring(0,45), 
            i.cajas_pck, 
            (i.current/i.u_por_caja).toFixed(0),
            (i.current/i.u_por_caja >= i.cajas_pck ? "VERIFIED" : "INCOMPLETE")
        ]);

        doc.autoTable({
            startY: 65,
            head: [['SKU', 'PRODUCT DESCRIPTION', 'TARGET', 'ACTUAL', 'STATUS']],
            body: rows,
            headStyles: { fillColor: [0, 0, 0], textColor: [255, 255, 255], fontSize: 8 },
            styles: { fontSize: 7, lineColor: [220, 220, 220], lineWidth: 0.1 }
        });

        const finalY = doc.lastAutoTable.finalY + 20;
        
        // Firma Caligráfica Generada
        doc.addImage(signatureAsset, 'PNG', 75, finalY, 60, 25);
        doc.setLineWidth(0.5).line(70, finalY + 22, 140, finalY + 22);
        
        doc.setFontSize(9).setFont(undefined, 'bold').text("J. ANGELO NUÑEZ DURAND", 105, finalY + 28, {align:'center'});
        doc.setFontSize(7).setFont(undefined, 'normal').text("Asistente Inventario Logístico", 105, finalY + 33, {align:'center'});
        doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 105, finalY + 40, {align:'center'});

        doc.save(`Twins_Report_${new Date().getTime()}.pdf`);
    }
</script>
</body>
</html>
