<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogiMaster Pro | Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #0052FF;
            --dark-bg: #0A0C10;
            --surface: #FFFFFF;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #F4F7FA; 
            color: #1A1C21;
            -webkit-font-smoothing: antialiased;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Glassmorphism & Shadow Effects */
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .neo-card {
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }
        .input-premium {
            @apply w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-600 outline-none transition-all text-base font-medium placeholder:text-slate-400 shadow-inner;
        }
        .btn-execute {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            @apply text-white font-bold py-5 rounded-2xl shadow-2xl active:scale-[0.97] transition-all flex items-center justify-center gap-3 uppercase tracking-tighter;
        }
        .pallet-badge {
            @apply px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest bg-slate-900 text-white;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-40">

    <header class="glass-header sticky top-0 z-50 p-6 flex justify-between items-center">
        <div>
            <div class="flex items-center gap-2">
                <div class="w-2 h-6 bg-blue-600 rounded-full"></div>
                <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">LOGIMASTER<span class="text-blue-600">PRO</span></h1>
            </div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[4px] ml-4">Terminal de Control</p>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden md:block text-right">
                <p class="text-[9px] font-black text-slate-400">OPERADOR</p>
                <p class="text-xs font-bold text-slate-700">J. Angelo Nuñez</p>
            </div>
            <div class="h-12 w-12 bg-slate-900 rounded-2xl flex items-center justify-center shadow-lg">
                <span class="text-xl">⚡</span>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-6 space-y-10">

        <section id="view-cargo" class="space-y-8 animate-in fade-in duration-500">
            <div class="flex justify-between items-end px-2">
                <div>
                    <h2 class="text-3xl font-extrabold text-slate-900 tracking-tighter italic">Carga de Contenedor</h2>
                    <p class="text-sm text-slate-500 font-medium">Registro táctico de mercadería entrante</p>
                </div>
                <div class="text-right">
                    <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-md">ID: SYS-002</span>
                </div>
            </div>

            <div class="neo-card p-6 space-y-6">
                <div class="relative">
                    <label class="absolute -top-2 left-4 px-2 bg-white text-[10px] font-black text-slate-400 uppercase">Número de Contenedor</label>
                    <input type="text" id="main_id" placeholder="CÓDIGO ÚNICO" class="input-premium mono uppercase text-lg tracking-widest">
                </div>
            </div>

            <div id="pallet-container" class="space-y-4">
                </div>

            <button onclick="addPalletRow()" class="w-full py-6 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 font-bold text-xs hover:border-blue-300 hover:text-blue-500 transition-all flex items-center justify-center gap-2">
                <span class="text-xl">+</span> AÑADIR UNIDAD DE CARGA / PALLET
            </button>

            <button onclick="finalizeReport('CONTENEDOR')" class="btn-execute w-full">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Generar Documentación Oficial
            </button>
        </section>

        <section id="view-returns" class="space-y-8 hidden">
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tighter italic px-2">Gestión Devoluciones</h2>
            <div class="neo-card p-6 space-y-4">
                <input type="text" id="ret_client" placeholder="Nombre del Cliente" class="input-premium">
                <input type="text" id="ret_vendor" placeholder="Vendedor Responsable" class="input-premium">
            </div>
            <div id="returns-list" class="space-y-4"></div>
            <button onclick="addReturnRow()" class="w-full py-6 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 font-bold text-xs uppercase tracking-widest">+ Producto Devuelto</button>
            <button onclick="finalizeReport('DEVOLUCION')" class="btn-execute w-full bg-blue-600">Procesar Retorno</button>
        </section>

    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-slate-900/95 backdrop-blur-xl rounded-[32px] p-3 flex shadow-2xl border border-white/10">
        <button onclick="navTo('view-cargo', this)" class="flex-1 py-4 flex flex-col items-center text-blue-400 transition-all">
            <span class="text-xl">⚓</span>
            <span class="text-[8px] font-black uppercase mt-1 tracking-widest">Carga</span>
        </button>
        <button onclick="navTo('view-returns', this)" class="flex-1 py-4 flex flex-col items-center text-slate-500">
            <span class="text-xl">📦</span>
            <span class="text-[8px] font-black uppercase mt-1 tracking-widest">Devolución</span>
        </button>
        <button class="flex-1 py-4 flex flex-col items-center text-slate-500">
            <span class="text-xl">📊</span>
            <span class="text-[8px] font-black uppercase mt-1 tracking-widest">Logs</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;

        function navTo(id, btn) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.className = "flex-1 py-4 flex flex-col items-center text-slate-500");
            btn.className = "flex-1 py-4 flex flex-col items-center text-blue-400 scale-110 transition-all";
        }

        function addPalletRow() {
            const container = document.getElementById('pallet-container');
            const card = document.createElement('div');
            card.className = "neo-card p-5 animate-in slide-in-from-bottom-4 duration-300";
            card.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <span class="pallet-badge">Unit #${container.children.length + 1}</span>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-slate-300 hover:text-red-500 text-xs font-bold uppercase">Eliminar</button>
                </div>
                <div class="grid grid-cols-12 gap-4">
                    <div class="col-span-12">
                        <input type="text" placeholder="CÓDIGO DE PRODUCTO" class="input-premium mono text-sm uppercase">
                    </div>
                    <div class="col-span-6">
                        <input type="number" placeholder="CANTIDAD" class="input-premium text-center font-bold text-blue-600">
                    </div>
                    <div class="col-span-6">
                        <select class="input-premium text-[10px] font-black uppercase text-slate-600">
                            <option>ESTADO: BUENO</option>
                            <option>ESTADO: DAÑADO</option>
                        </select>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }

        function finalizeReport(type) {
            const id = document.getElementById('main_id').value || "SIN_ID";
            const doc = new jsPDF();
            
            // Estilo Profesional en PDF
            doc.setFillColor(15, 23, 42);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text("LOGIMASTER PRO | REPORT", 14, 20);
            doc.setFontSize(10);
            doc.text(`TIPO: ${type} | REFERENCIA: ${id}`, 14, 30);
            
            doc.autoTable({
                startY: 50,
                head: [['REF', 'DESCRIPCIÓN', 'Q', 'STATUS']],
                body: [['PRD-001', 'Carga General Registrada', '1', 'OK']],
                theme: 'striped',
                headStyles: { fillColor: [15, 23, 42] }
            });

            const finalY = doc.lastAutoTable.finalY + 20;
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text("------------------------------------------------------------------", 14, finalY);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, finalY + 10);
            
            doc.save(`LOGIMASTER_${type}_${id}.pdf`);
        }

        // Initialize with one row
        window.onload = () => { addPalletRow(); };
    </script>
</body>
</html>
