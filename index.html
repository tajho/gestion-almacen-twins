<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almacén Tajho - Gestión de Contenedores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f9fafb; color: #111827; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.05); }
        .card-tajho { border-radius: 2rem; background: #ffffff; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
        .input-tajho { @apply w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 font-bold text-sm; }
        .btn-primary { @apply py-5 px-8 bg-blue-600 text-white rounded-[1.5rem] font-bold text-xs uppercase tracking-widest shadow-lg shadow-blue-100 active:scale-95 transition-all; }
        .hidden { display: none !important; }
        .stepper-active { @apply text-blue-600 border-b-2 border-blue-600; }
    </style>
</head>
<body class="pb-40">

    <header class="px-8 pt-10 pb-6 bg-white border-b border-gray-100">
        <h1 class="text-3xl font-[900] tracking-tighter text-gray-900 leading-none uppercase">Almacén<span class="text-blue-600 italic ml-1">Tajho</span></h1>
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-2">Control de Inventario Logístico</p>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-8">

        <section id="fase-plan" class="space-y-6 animate-in fade-in">
            <div class="px-2">
                <h2 class="text-xl font-extrabold italic">1. Planificar Contenedor</h2>
                <p class="text-xs text-gray-400 font-medium">Define qué productos esperas recibir hoy.</p>
            </div>

            <div class="card-tajho p-6 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="plan-cod" placeholder="Código" class="input-tajho">
                    <input type="number" id="plan-meta" placeholder="Cant. Total" class="input-tajho">
                </div>
                <input type="text" id="plan-desc" placeholder="Descripción del producto" class="input-tajho">
                <button onclick="agregarAlPacking()" class="w-full py-4 bg-gray-100 text-gray-600 rounded-2xl font-black text-[10px] uppercase tracking-widest">+ Añadir a la Lista</button>
            </div>

            <div class="space-y-3">
                <p class="text-[10px] font-black text-gray-400 uppercase ml-2">Vista Previa Packing List</p>
                <div id="lista-previa" class="space-y-2">
                    </div>
            </div>

            <button id="btn-crear" onclick="activarAuditoria()" class="btn-primary w-full hidden">Crear Contenedor & Iniciar Conteo</button>
        </section>

        <section id="fase-conteo" class="space-y-6 hidden">
            <div class="px-2 flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-extrabold italic">2. Conteo de Cajas</h2>
                    <p class="text-xs text-gray-400 font-medium">Registrando ingreso físico por bulto.</p>
                </div>
                <button onclick="location.reload()" class="text-[10px] font-bold text-red-500 underline">Cancelar</button>
            </div>

            <div class="card-tajho p-10 text-center space-y-4 border-2 border-blue-100">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Ingresar Código de Bulto</p>
                <input type="text" id="input-auditor" oninput="auditarBulto(this)" class="w-full text-4xl font-black text-blue-600 text-center outline-none bg-transparent uppercase" placeholder="----">
            </div>

            <div id="audit-feedback" class="card-tajho p-8 text-center min-h-[120px] flex flex-col justify-center items-center bg-gray-50/50">
                <p class="text-gray-400 text-sm italic">Esperando primera caja...</p>
            </div>

            <div id="audit-resumen" class="space-y-2">
                </div>

            <button onclick="finalizarRegistro()" class="btn-primary w-full bg-gray-900">Finalizar y Generar Reporte</button>
        </section>

        <section id="vista-historial" class="hidden space-y-6">
            <h2 class="text-xl font-extrabold italic px-2">Historial de Descargas</h2>
            <div id="historial-feed" class="space-y-4"></div>
        </section>

    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] glass-panel rounded-[2.5rem] p-3 flex justify-around items-center shadow-2xl z-50">
        <button onclick="nav('fase-plan', this)" class="nav-active flex flex-col items-center p-3 text-blue-600">
            <span class="text-xl">📋</span>
            <span class="text-[8px] font-black uppercase mt-1">Planificar</span>
        </button>
        <button onclick="nav('vista-historial', this)" class="flex flex-col items-center p-3 text-gray-300">
            <span class="text-xl">📁</span>
            <span class="text-[8px] font-black uppercase mt-1">Historial</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;
        let packingPlan = []; // La lista que creamos antes del conteo
        let conteoReal = {};  // El conteo físico que se hace después

        // Datos falsos iniciales para ver la dinámica
        const demoData = [
            { cod: "ZAP-01", desc: "Zapatilla Tajho Urban", meta: 100 },
            { cod: "BOX-05", desc: "Boxer Tajho Cotton", meta: 240 }
        ];

        function agregarAlPacking() {
            const cod = document.getElementById('plan-cod').value.toUpperCase();
            const meta = parseInt(document.getElementById('plan-meta').value);
            const desc = document.getElementById('plan-desc').value;

            if(!cod || !meta) return alert("Completa código y cantidad.");

            packingPlan.push({ cod, meta, desc });
            renderListaPrevia();
            
            document.getElementById('plan-cod').value = "";
            document.getElementById('plan-meta').value = "";
            document.getElementById('plan-desc').value = "";
            document.getElementById('btn-crear').classList.remove('hidden');
        }

        function renderListaPrevia() {
            const div = document.getElementById('lista-previa');
            div.innerHTML = "";
            packingPlan.forEach((p, index) => {
                div.innerHTML += `
                    <div class="card-tajho p-4 flex justify-between items-center text-xs">
                        <div><span class="font-black text-blue-600">${p.cod}</span> | ${p.desc}</div>
                        <div class="font-bold bg-gray-100 px-3 py-1 rounded-full text-gray-500">${p.meta} UND</div>
                    </div>`;
            });
        }

        function activarAuditoria() {
            document.getElementById('fase-plan').classList.add('hidden');
            document.getElementById('fase-conteo').classList.remove('hidden');
            renderResumenAuditoria();
        }

        function auditarBulto(input) {
            const val = input.value.toUpperCase();
            const prod = packingPlan.find(p => p.cod === val);
            const feedback = document.getElementById('audit-feedback');

            if(prod) {
                // Suponemos que cada bulto/caja trae una cantidad fija (ej: 12)
                const cantPorCaja = 12; 
                conteoReal[val] = (conteoReal[val] || 0) + cantPorCaja;
                
                const total = conteoReal[val];
                feedback.className = `card-tajho p-8 text-center flex flex-col justify-center items-center ${total >= prod.meta ? 'bg-green-50 text-green-600' : 'bg-blue-50 text-blue-600'}`;
                feedback.innerHTML = `
                    <h3 class="text-3xl font-black">${total} / ${prod.meta}</h3>
                    <p class="text-xs font-bold uppercase">${prod.desc}</p>
                    <p class="text-[10px] mt-1">${total >= prod.meta ? '¡CONTEO COMPLETADO!' : 'Faltan ' + (prod.meta - total)}</p>
                `;
                input.value = "";
                renderResumenAuditoria();
            }
        }

        function renderResumenAuditoria() {
            const div = document.getElementById('audit-resumen');
            div.innerHTML = "";
            packingPlan.forEach(p => {
                const actual = conteoReal[p.cod] || 0;
                const porc = (actual / p.meta) * 100;
                div.innerHTML += `
                    <div class="card-tajho p-4 space-y-2">
                        <div class="flex justify-between text-[10px] font-black uppercase">
                            <span>${p.cod}</span>
                            <span>${actual} de ${p.meta}</span>
                        </div>
                        <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-600 transition-all" style="width: ${Math.min(porc, 100)}%"></div>
                        </div>
                    </div>`;
            });
        }

        function finalizarRegistro() {
            const hist = JSON.parse(localStorage.getItem('tajho_hist')) || [];
            const registro = {
                id: "CONT-" + Math.floor(1000 + Math.random() * 9000),
                fecha: new Date().toLocaleString(),
                packing: packingPlan,
                conteo: conteoReal
            };
            hist.unshift(registro);
            localStorage.setItem('tajho_hist', JSON.stringify(hist));
            alert("Contenedor guardado en historial.");
            location.reload();
        }

        function nav(id, btn) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'vista-historial') renderHistorial();
        }

        function renderHistorial() {
            const feed = document.getElementById('historial-feed');
            const hist = JSON.parse(localStorage.getItem('tajho_hist')) || [];
            feed.innerHTML = hist.length ? "" : "<p class='text-center text-gray-400 py-10'>No hay registros guardados.</p>";
            hist.forEach(h => {
                feed.innerHTML += `
                    <div class="card-tajho p-6 flex justify-between items-center border border-gray-50">
                        <div>
                            <p class="text-[9px] font-black text-gray-400 uppercase italic">${h.fecha}</p>
                            <h3 class="text-lg font-black text-gray-800">${h.id}</h3>
                        </div>
                        <button onclick="generarReporte('${h.id}')" class="w-12 h-12 bg-gray-900 rounded-2xl flex items-center justify-center text-white shadow-xl">📄</button>
                    </div>`;
            });
        }

        function generarReporte(id) {
            const hist = JSON.parse(localStorage.getItem('tajho_hist')) || [];
            const item = hist.find(x => x.id === id);
            const doc = new jsPDF();
            
            doc.setFontSize(22); doc.text("REPORTE ALMACÉN TAJHO", 14, 25);
            doc.setFontSize(10); doc.text(`Contenedor: ${item.id} | Fecha: ${item.fecha}`, 14, 33);
            
            const rows = item.packing.map(p => [
                p.cod, 
                p.desc, 
                p.meta, 
                (item.conteo[p.cod] || 0), 
                (item.conteo[p.cod] >= p.meta ? 'OK' : 'FALTANTE')
            ]);

            doc.autoTable({
                startY: 40,
                head: [['CÓDIGO', 'PRODUCTO', 'PLANIFICADO', 'RECIBIDO', 'ESTADO']],
                body: rows,
                theme: 'grid',
                headStyles: { fillColor: [17, 24, 39] }
            });

            doc.setFontSize(9);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 20);
            doc.save(`Reporte_Tajho_${id}.pdf`);
        }
    </script>
</body>
</html>
