<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v52 - Ultra-Compact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #0f172a; height: 100vh; overflow: hidden; }
        
        /* Contenedores de Vista Optimizados para No Scroll */
        .view { display: none; height: 100vh; padding: 1rem; padding-top: 4.5rem; flex-direction: column; }
        .view.active { display: flex; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Tarjetas Compactas */
        .card-main { background: white; border-radius: 1.8rem; padding: 1rem; display: flex; align-items: center; gap: 1rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 15px rgba(0,0,0,0.04); height: 22%; transition: 0.2s; }
        .card-main:active { transform: scale(0.97); background: #f8fafc; }
        .icon-sq { width: 3rem; height: 3rem; background: #eff6ff; border-radius: 1rem; display: flex; align-items: center; justify-content: center; color: var(--blue); flex-shrink: 0; }
        
        /* Sistema de Barras Compacto */
        .progress-track { background: #f1f5f9; border-radius: 50px; overflow: hidden; height: 8px; width: 100%; position: relative; }
        .progress-bar { height: 100%; background: var(--blue); border-radius: 50px; transition: width 0.6s ease; }

        /* Inputs de una línea */
        .input-mini { background: #f4f7fa; border-radius: 1rem; border: 2px solid transparent; font-weight: 700; padding: 0.75rem 1rem; font-size: 0.85rem; width: 100%; outline: none; transition: 0.3s; }
        .input-mini:focus { border-color: var(--blue); background: white; }

        .btn-action { background: var(--blue); color: white; border-radius: 1.2rem; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; padding: 1rem; width: 100%; text-align: center; }
        
        /* Lista Scrolleable Interna (Solo donde es crítico) */
        .scroll-area { flex-grow: 1; overflow-y: auto; margin: 0.5rem 0; padding-right: 4px; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full h-16 px-6 flex justify-between items-center z-[1000] bg-white/80 backdrop-blur-md border-b border-slate-50">
        <button onclick="goHome()" class="w-9 h-9 flex items-center justify-center rounded-lg bg-slate-50 text-slate-900 active:scale-90">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <div class="text-right">
            <p class="text-[9px] font-black italic tracking-tighter">TAJHO<span class="text-blue-600">.OS</span></p>
        </div>
    </header>

    <div id="view-home" class="view active">
        <h1 class="text-3xl font-black italic mb-6 tracking-tighter">Panel de<br><span class="text-blue-600 uppercase">Gestión</span></h1>
        
        <div class="flex flex-col gap-3 flex-grow pb-4">
            <div onclick="navTo('crear')" class="card-main">
                <div class="icon-sq">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
                </div>
                <div>
                    <p class="text-[12px] font-extrabold uppercase leading-none mb-1">Contenedor</p>
                    <p class="text-[9px] font-bold text-slate-400 italic">Crear nuevo manifiesto</p>
                </div>
            </div>

            <div onclick="navTo('historial')" class="card-main">
                <div class="icon-sq" style="background: #f0fdf4; color: #16a34a;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                </div>
                <div>
                    <p class="text-[12px] font-extrabold uppercase leading-none mb-1 text-green-600">Registros</p>
                    <p class="text-[9px] font-bold text-slate-400 italic">Historial de descargas</p>
                </div>
            </div>

            <div class="card-main opacity-60">
                <div class="icon-sq" style="background: #fff7ed; color: #f97316;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m11 17-5-5 5-5"/><path d="M18 17v-3a4 4 0 0 0-4-4H6"/></svg>
                </div>
                <div>
                    <p class="text-[12px] font-extrabold uppercase leading-none mb-1 text-orange-500">Devoluciones</p>
                    <p class="text-[9px] font-bold text-slate-400 italic">Gestión de retorno</p>
                </div>
            </div>
        </div>
    </div>

    <div id="view-crear" class="view">
        <h2 class="text-xl font-black italic mb-3">Nuevo <span class="text-blue-600">Manifiesto</span></h2>
        <div class="grid grid-cols-1 gap-2">
            <div class="relative">
                <input type="text" id="s-sku" oninput="smartSearch()" class="input-mini uppercase" placeholder="SKU...">
                <div id="search-results" class="hidden absolute z-50 w-full bg-white rounded-xl shadow-2xl border p-2 mt-1 max-h-32 overflow-y-auto"></div>
            </div>
            <input type="text" id="s-desc" class="input-mini text-blue-600 italic bg-blue-50/30 font-medium" placeholder="Producto..." readonly>
            <div class="flex gap-2">
                <input type="number" id="s-meta" class="input-mini" placeholder="Cant. Meta">
                <button onclick="addMani()" class="w-12 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center active:scale-90">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>
        </div>

        <div class="scroll-area mt-4">
            <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest mb-2 italic">Pre-visualización</p>
            <div id="pre-list" class="space-y-1.5"></div>
        </div>

        <button id="btn-done" onclick="openModal()" class="hidden btn-action mt-2 py-3 bg-blue-600 shadow-lg shadow-blue-100">Comenzar Carga</button>
    </div>

    <div id="view-ops" class="view">
        <div class="bg-slate-900 p-4 rounded-[1.5rem] mb-4">
            <div class="flex justify-between items-center mb-2">
                <p class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">Avance Global</p>
                <h4 id="global-pc" class="text-xl font-black text-white">0%</h4>
            </div>
            <div class="progress-track bg-white/10 h-2.5"><div id="global-bar" class="progress-bar" style="width: 0%"></div></div>
        </div>

        <div class="text-center mb-4">
            <select id="sel-sku" onchange="syncItem()" class="text-2xl font-black bg-transparent text-slate-900 border-b-2 border-slate-100 w-full mb-1 text-center outline-none"></select>
            <p id="live-desc" class="text-[9px] font-bold text-blue-600 uppercase truncate px-4"></p>
        </div>

        <div class="flex flex-col gap-4 flex-grow justify-center">
            <div class="flex items-center justify-center gap-4">
                <input type="number" id="qty-in" class="input-mini w-24 h-20 text-center text-3xl shadow-inner border-2 border-slate-50" placeholder="0">
                <button onclick="registrarBulto()" class="w-20 h-20 bg-blue-600 text-white rounded-[1.5rem] flex items-center justify-center shadow-xl active:scale-90 transition-all">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-50 p-3 rounded-2xl text-center">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Restante</p>
                    <p id="live-rem" class="text-xl font-black">0</p>
                </div>
                <div class="bg-blue-50 p-3 rounded-2xl text-center">
                    <p class="text-[8px] font-black text-blue-400 uppercase mb-1">Real</p>
                    <p id="live-real" class="text-xl font-black text-blue-600">0</p>
                </div>
            </div>

            <div>
                <div class="flex justify-between mb-1">
                    <p class="text-[8px] font-black text-slate-300 uppercase">Item Progreso</p>
                    <p id="item-pc" class="text-[8px] font-black text-slate-900">0%</p>
                </div>
                <div class="progress-track bg-slate-100 h-1.5"><div id="item-bar" class="progress-bar bg-slate-900" style="width: 0%"></div></div>
            </div>
        </div>

        <button onclick="finishAndReport()" class="btn-action bg-slate-900 mt-4 py-3">Cerrar y Firmar</button>
    </div>

    <div id="view-historial" class="view">
        <h2 class="text-xl font-black italic mb-4 uppercase">Registros <span class="text-blue-600">Finalizados</span></h2>
        <div class="scroll-area" id="history-list"></div>
    </div>

    <div id="modal-choice" class="fixed inset-0 z-[2000] bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center p-6">
        <div class="bg-white w-full rounded-[2rem] p-8 text-center shadow-2xl">
            <p class="text-[9px] font-black text-blue-600 uppercase mb-2 tracking-widest">Listo para procesar</p>
            <h3 class="text-lg font-black italic mb-6">¿INICIAR CONTEO AHORA?</h3>
            <div class="flex flex-col gap-2">
                <button onclick="continuarConteo()" class="btn-action bg-blue-600 py-4">Sí, Empezar</button>
                <button onclick="guardarMani()" class="btn-action bg-slate-100 text-slate-500 py-4">Solo Guardar</button>
                <button onclick="closeModal()" class="text-[10px] font-black uppercase text-slate-300 mt-2">Regresar</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_items = {};
        let currentMani = JSON.parse(localStorage.getItem('taj_cur')) || [];
        let history = JSON.parse(localStorage.getItem('taj_his')) || [];
        let activeJob = JSON.parse(localStorage.getItem('taj_active')) || null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                const raw = await res.json();
                raw.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().toUpperCase().trim()] = r.DESCRIPCION; });
                const lastView = localStorage.getItem('taj_view') || 'home';
                if(lastView === 'ops' && activeJob) startOps(activeJob);
                else navTo(lastView);
            } catch (e) { console.warn("Offline"); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            localStorage.setItem('taj_view', v);
            if(v === 'historial') renderHistory();
            if(v === 'crear') renderPreList();
        }

        function goHome() { navTo('home'); }

        function smartSearch() {
            const input = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('search-results');
            if(input.length < 1) { resDiv.classList.add('hidden'); return; }
            const matches = Object.keys(db_items).filter(k => k.includes(input)).slice(0,5);
            resDiv.innerHTML = matches.map(k => `<div onclick="setProd('${k}','${db_items[k]}')" class="p-3 border-b border-slate-50 text-[10px] font-black uppercase">${k} - <span class="text-blue-600">${db_items[k]}</span></div>`).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(s,d) {
            document.getElementById('s-sku').value = s; document.getElementById('s-desc').value = d;
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "GENERICO", meta, real: 0 });
            localStorage.setItem('taj_cur', JSON.stringify(currentMani));
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderPreList() {
            const container = document.getElementById('pre-list');
            container.innerHTML = currentMani.map((i, idx) => `
                <div class="p-3 bg-slate-50 rounded-xl flex justify-between items-center text-[10px] font-bold border border-slate-100">
                    <p class="uppercase">${i.sku}</p>
                    <p class="text-blue-600 font-black">${i.meta} CJ</p>
                </div>
            `).join('');
            if(currentMani.length > 0) document.getElementById('btn-done').classList.remove('hidden');
        }

        function openModal() { document.getElementById('modal-choice').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-choice').style.display = 'none'; }

        function continuarConteo() {
            closeModal();
            activeJob = { id: Date.now(), name: "L-" + new Date().getHours() + ":" + new Date().getMinutes(), items: [...currentMani], status: 'PROCESO' };
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
            currentMani = []; localStorage.removeItem('taj_cur');
            startOps(activeJob);
        }

        function guardarMani() {
            closeModal();
            history.push({ id: Date.now(), name: "M-" + new Date().toLocaleDateString(), items: [...currentMani], status: 'PENDIENTE' });
            localStorage.setItem('taj_his', JSON.stringify(history));
            currentMani = []; localStorage.removeItem('taj_cur');
            navTo('historial');
        }

        function startOps(job) {
            navTo('ops');
            document.getElementById('sel-sku').innerHTML = job.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem();
        }

        function syncItem() {
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('live-desc').innerText = item.desc;
            document.getElementById('live-rem').innerText = Math.max(0, item.meta - item.real);
            document.getElementById('live-real').innerText = item.real;

            const itemPc = Math.min(Math.round((item.real / item.meta) * 100), 100);
            document.getElementById('item-bar').style.width = itemPc + "%";
            document.getElementById('item-pc').innerText = itemPc + "%";

            const totalM = activeJob.items.reduce((a,b) => a + b.meta, 0);
            const totalR = activeJob.items.reduce((a,b) => a + b.real, 0);
            const pc = Math.min(Math.round((totalR / totalM) * 100), 100);
            document.getElementById('global-bar').style.width = pc + "%";
            document.getElementById('global-pc').innerText = pc + "%";
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
        }

        function registrarBulto() {
            const q = parseInt(document.getElementById('qty-in').value);
            if(!q) return;
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += q;
            document.getElementById('qty-in').value = '';
            syncItem();
            navigator.vibrate(30);
            fetch(CLOUD_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({tipo:'CARGA', datos: [new Date().toLocaleString(), item.sku, q]})});
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="p-4 bg-white border border-slate-100 rounded-2xl mb-2 flex justify-between items-center shadow-sm">
                    <div>
                        <p class="text-[8px] font-black text-blue-500 uppercase mb-0.5">${h.status}</p>
                        <p class="text-[11px] font-bold uppercase italic">${h.name}</p>
                    </div>
                    <button onclick="startFromHistory(${h.id})" class="text-[9px] font-black text-slate-900 bg-slate-100 px-4 py-2 rounded-xl">ABRIR</button>
                </div>
            `).join('');
        }

        function startFromHistory(id) {
            activeJob = history.find(x => x.id === id);
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
            startOps(activeJob);
        }

        function finishAndReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.setFont("helvetica", "bold"); doc.text("REPORTE TAJHO.OS", 14, 20);
            doc.autoTable({
                startY: 30, head: [['SKU', 'META', 'REAL', 'DIF']],
                body: activeJob.items.map(i => [i.sku, i.meta, i.real, i.meta-i.real]),
                theme: 'striped', headStyles: { fillColor: [37, 99, 235] }
            });
            const finalY = doc.lastAutoTable.finalY + 15;
            doc.setFontSize(10);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, finalY);
            doc.text("Asist. Inventario Logístico", 14, finalY + 5);
            doc.save(`REPORTE_${activeJob.name}.pdf`);
            activeJob.status = 'COMPLETADO';
            localStorage.setItem('taj_his', JSON.stringify(history));
            localStorage.removeItem('taj_active');
            navTo('historial');
        }

        init();
    </script>
</body>
</html>
