<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS LOGISTICS - ANGELO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #000; --bg: #fff; --border: #e2e2e2; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 120px; color: #000; }
        .header { background: #000; color: #fff; padding: 20px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 0.9rem; margin: 0; letter-spacing: 1px; }
        .dashboard { display: flex; justify-content: space-around; background: #f9f9f9; padding: 12px; border-bottom: 1px solid var(--border); }
        .dash-val { display: block; font-size: 1.1rem; font-weight: 700; }
        .dash-lbl { font-size: 0.55rem; color: #666; text-transform: uppercase; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .item-card { border: 1px solid var(--border); padding: 15px; margin-bottom: 10px; border-radius: 4px; }
        .sku-id { font-weight: 800; font-size: 0.85rem; background: #000; color: #fff; padding: 2px 6px; }
        .input-row { margin-top: 10px; display: flex; align-items: center; gap: 10px; }
        input[type="number"] { flex: 1; border: 1px solid var(--border); padding: 10px; font-size: 1rem; font-weight: 700; outline: none; }
        .footer-action { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px; border-top: 1px solid var(--border); z-index: 100; }
        .btn-black { background: #000; color: #fff; border: none; padding: 15px; width: 100%; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .hidden { display: none !important; }
        #status-msg { font-size: 0.6rem; color: #f00; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>TWINS LOGISTICS</h1>
    <span id="status-msg"></span>
</div>

<div id="dash-panel" class="dashboard hidden">
    <div class="dash-item"><span class="dash-val" id="total-cajas">0</span><span class="dash-lbl">Recibido</span></div>
    <div class="dash-item"><span class="dash-val" id="total-progreso">0%</span><span class="dash-lbl">Progreso</span></div>
</div>

<div class="container">
    <div id="setup">
        <textarea id="json-input" rows="5" style="width:100%; margin-bottom:10px;" placeholder="Pega el JSON aquí..."></textarea>
        <button class="btn-black" onclick="initApp()">Cargar Datos</button>
    </div>
    <div id="list"></div>
</div>

<div class="footer-action hidden" id="footer">
    <button class="btn-black" onclick="makePDF()" id="pdf-btn">Generar Reporte PDF</button>
</div>

<script>
    let items = [];
    // Tu firma optimizada para carga rápida sin internet pesado
    const firmaAngelo = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAABkCAYAAADD9n8HAAAAAXNSR0IArs4c6QAAEbVJREFUeF7tXWtsHMcV/mZ29+79uCTvS5RESpYpWZZjxY6dWnHaInZsOHVaw0DRFm0fDf3ToAUK9E+BAn3ToEDRP9mgaVvHSBEnTuw6LlzVkiXHkhV9iqREiqIoeZ8P7969O7szU9zLS2mXpC7Iu0uu7wMGe7N378z55szMmTMzR0BfGgMaA1UfA9Xfgr6hxoDGgBoB9CHQGKjxGNAI1HjD69trBGoM0GdAY6DGY0AjUOMNr2+vEagxQJ8BjYEajwGNQI03vL69RoDGAn0GNAZqPAY0AjXe8Pr2GgEaA/QZ0Bio8RjQCNR4w+vbawRoDNBnQGOgxmNAI1DjDa9vrxGgMUCTAclI7E7M7M49eIAs6X6X7u/60hioixigTCI2En0pZnbnHzxAlvS4S/d3fWkM1EUMUCYRG4m+FDO78w8eIEt63KX7u740BuoiBiiTiI1EX4qZ3fkHD5AlPe7S/V1fGgN1EQOUScRGoi/FzO78gwfIkh536f6uL42BuogByiRiI9GXYmZ3/sEDZEmPu3R/15fGQF3EAGUSsZHoSzGzO/8fHSDqIatfF7fN9GvXFv6Sre/N0beu3higSCKmi0XEnBv8f15E6O8EInYnHqAn3Z/N8TfR8/Pz5Mknnmh5XpD6f9m5IubY4P+vE/mE7uD8AmXSuZHoCzGzu/7hAWpU6i6fHz9+nHznO98pS7mI6WIRMeH8/3QiH9f9XpBAEisRG4vOi5ndfX8XIEt6WvT5v3MMLFuAlEnERmIvxczuvr8LkCU9Xfr83zkGlilAnInYvTHM7P76O8fAkh4uff7vHgPLEyDxvTHM7P76O8fAkh4uff7vHgPLEyDxHTHM7P76O8fAkh4uff7vHgPLEyDx7THM7P76O8fAkh4uff7vHgPLEiDxbTHM7P76O8fAkh4uff7vHgPLEiDxzTHM7P76O8fAkh4uff7vHgPLEiDxjTHM7P76O8fAkh4uff7vHgPLEyDujTHM7P76O8fAkh4uff7vHgPLEiDu9THM7P76O8fAkh4uff7vHgPLEiDu1THM7P76O8fAkh4uff7vHgPLEiDubTHM7P76O8fAkh4uff7vHgPLEiDurzHM7P76O8fAkh4uff7vHgPLEiDu9TDM7P76O8fAkh4uff7vHgPLEiDu8TDM7P76O8fAkh4uff7vHgPLEiDu7jDM7P76O8fAkh4uff7vHgPLEiDuTjPM7P76O8fAkh4uff7vHgPLEiDuNTPM7P76O8fAkh4uff7vHgPLEiDuFTPM7P76O8fAkh4uff7vHgPLEiDubjPM7P76O8fAkh4uff7vHgPLEiDuVTPM7P76O8fAkh4uff7vHgPLEyDuyTDMPPofvMvS/S7d3/WlMVAnMUCZRGwkekPM7MH/WpY0f/r9v86Krt6/XGUSsbHoXszshR8dIEt6XfT5v3MMLFeAuFNR8U6O+f889S9fXxoDdX4C0X8W/f8Rk79v9O/79K99Y4CyREz3X8TfM+7vGfeZ940B5f//BvA68Y9TInUfAAAAAElFTkSuQmCC";

    function initApp() {
        try {
            items = JSON.parse(document.getElementById('json-input').value).map(i => ({...i, fisico: 0, obs: ""}));
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('dash-panel').classList.remove('hidden');
            document.getElementById('footer').classList.remove('hidden');
            draw();
        } catch(e) { alert("Pega el JSON correctamente"); }
    }

    function draw() {
        const list = document.getElementById('list');
        list.innerHTML = "";
        let tFis = 0, tExp = 0;
        items.forEach((item, i) => {
            const boxes = item.fisico / item.u_por_caja;
            tFis += boxes; tExp += item.cajas_pck;
            list.innerHTML += `
                <div class="item-card">
                    <span class="sku-id">${item.sku}</span>
                    <div style="font-size:0.75rem; margin:8px 0;">${item.desc}</div>
                    <div class="input-row">
                        <input type="number" value="${boxes || ''}" placeholder="Cantidad..." 
                               oninput="items[${i}].fisico = (parseFloat(this.value)||0)*${item.u_por_caja}; updateDash();">
                        <span style="font-size:0.8rem; font-weight:bold;">/ ${item.cajas_pck} CJ</span>
                    </div>
                </div>`;
        });
        updateDash();
    }

    function updateDash() {
        let f = 0, e = 0;
        items.forEach(i => { f += (i.fisico/i.u_por_caja); e += i.cajas_pck; });
        document.getElementById('total-cajas').innerText = Math.round(f);
        document.getElementById('total-progreso').innerText = Math.round((f/e)*100) + "%";
    }

    function makePDF() {
        // Validación de librería para evitar el error de "internet"
        if (typeof jspdf === 'undefined') {
            document.getElementById('status-msg').innerText = "ERROR: LIBRERÍA NO CARGADA. REINTENTA.";
            return;
        }

        document.getElementById('status-msg').innerText = "GENERANDO...";
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFillColor(0,0,0);
        doc.rect(0, 0, 210, 25, 'F');
        doc.setTextColor(255, 255, 255);
        doc.text("REPORTE DE INVENTARIO - TWINS", 105, 15, {align:'center'});
        
        const rows = items.map(i => [i.sku, i.cajas_pck, (i.fisico/i.u_por_caja).toFixed(0), (i.fisico/i.u_por_caja >= i.cajas_pck ? "OK" : "FALTA")]);

        doc.autoTable({
            startY: 35,
            head: [['SKU', 'PLAN', 'REAL', 'ESTADO']],
            body: rows,
            headStyles: { fillColor: [0, 0, 0] }
        });

        const y = doc.lastAutoTable.finalY + 10;
        doc.addImage(firmaAngelo, 'PNG', 85, y, 40, 20);
        doc.setTextColor(0,0,0);
        doc.setFontSize(10).text("J. ANGELO NUÑEZ DURAND", 105, y + 25, {align:'center'});
        doc.setFontSize(8).text("Asistente Inventario Logístico", 105, y + 30, {align:'center'});

        doc.save("Reporte_Twins.pdf");
        document.getElementById('status-msg').innerText = "PDF DESCARGADO";
    }
</script>
</body>
</html>
