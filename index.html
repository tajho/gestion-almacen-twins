<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogiMaster - Auditor de Carga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card-auditor { @apply bg-white rounded-[2.5rem] p-6 shadow-xl shadow-slate-200/50 border border-slate-100; }
        .status-pill { @apply px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter; }
        .input-code { @apply w-full p-4 bg-slate-100 rounded-2xl border-none focus:ring-2 focus:ring-blue-600 font-bold text-center text-lg; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-32 text-slate-800">

    <header class="p-6 flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-black tracking-tighter">AUDITOR<span class="text-blue-600">PRO</span></h1>
            <p id="label-modo" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Recepción en tiempo real</p>
        </div>
        <div class="text-right">
            <span class="text-[10px] font-bold block text-slate-400">SESIÓN</span>
            <span class="text-xs font-black">J. ANGELO N.</span>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 space-y-6">

        <section id="vista-recepcion" class="space-y-6">
            <div class="card-auditor space-y-4">
                <p class="text-[10px] font-black text-center text-slate-400 uppercase">Escanear o Ingresar Código</p>
                <input type="text" id="input-auditor" oninput="auditarProducto(this)" placeholder="CÓDIGO" class="input-code uppercase">
                
                <div id="feedback-prod" class="bg-slate-50 rounded-3xl p-6 text-center min-h-[160px] flex flex-col justify-center items-center space-y-2 border-2 border-dashed border-slate-200">
                    <p class="text-slate-400 font-medium">Esperando ingreso de mercadería...</p>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm">
                <div class="p-4 bg-slate-900 text-white text-[10px] font-bold flex justify-between">
                    <span>CONTEO ACTUAL DE DESCARGA</span>
                    <span id="items-count">0 ITEMS</span>
                </div>
                <div id="resumen-lista" class="max-h-60 overflow-y-auto divide-y divide-slate-50">
                    </div>
            </div>

            <button onclick="finalizarDescarga()" class="w-full py-5 bg-blue-600 text-white rounded-[2rem] font-bold shadow-lg shadow-blue-200 active:scale-95 transition-all">
                FINALIZAR Y GUARDAR DESCARGA
            </button>
        </section>

        <section id="vista-historial" class="space-y-4 hidden">
            <h2 class="text-xl font-black px-2 italic">Historial de Descargas</h2>
            <div id="lista-historial" class="space-y-3">
                </div>
        </section>

    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-white/80 backdrop-blur-xl shadow-2xl rounded-[2.5rem] p-2 flex border border-slate-200/50">
        <button onclick="cambiarSeccion('vista-recepcion')" class="flex-1 py-4 flex flex-col items-center text-blue-600">
            <span class="text-xl">🛠️</span>
            <span class="text-[8px] font-black uppercase mt-1">Auditor</span>
        </button>
        <button onclick="cambiarSeccion('vista-historial')" class="flex-1 py-4 flex flex-col items-center text-slate-400">
            <span class="text-xl">📁</span>
            <span class="text-[8px] font-black uppercase mt-1">Historial</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;

        // 1. LISTA DE PACKING ESPERADA (Lo que "debe" venir)
        const packingEsperado = [
            { cod: "1010", desc: "ZAPATILLA SPORT TR-X", esperado: 120, pack: 12 },
            { cod: "2020", desc: "BOXER ALGODÓN TAJHO", esperado: 500, pack: 50 },
            { cod: "3030", desc: "GORRA URBAN PRO", esperado: 100, pack: 10 }
        ];

        let conteoActual = {};
        let historialDescargas = JSON.parse(localStorage.getItem('historial_v4')) || [];

        function auditarProducto(input) {
            const cod = input.value.toUpperCase();
            const feedback = document.getElementById('feedback-prod');
            const match = packingEsperado.find(p => p.cod === cod);

            if(match) {
                // Registrar o sumar conteo
                conteoActual[cod] = (conteoActual[cod] || 0) + match.pack;
                const total = conteoActual[cod];
                const falta = match.esperado - total;

                let colorClass = "text-blue-600";
                let msg = `¡Auditando ${match.desc}!`;
                let statusMsg = `Contando: ${total} de ${match.esperado}`;

                if(total === match.esperado) {
                    colorClass = "text-green-600";
                    msg = "¡CONTEO EXACTO! ✅";
                } else if (total > match.esperado) {
                    colorClass = "text-red-600";
                    msg = `¡EXCESO DETECTADO! (+${total - match.esperado})`;
                }

                feedback.innerHTML = `
                    <h3 class="text-2xl font-black ${colorClass}">${msg}</h3>
                    <p class="text-sm font-bold text-slate-600">${match.desc}</p>
                    <div class="mt-2 text-xs font-black bg-slate-100 px-4 py-2 rounded-full">${statusMsg}</div>
                `;
                
                input.value = ""; // Limpiar para siguiente caja
                actualizarResumen();
            }
        }

        function actualizarResumen() {
            const lista = document.getElementById('resumen-lista');
            lista.innerHTML = "";
            let i = 0;
            for(let cod in conteoActual) {
                const p = packingEsperado.find(x => x.cod === cod);
                lista.innerHTML += `
                    <div class="p-4 flex justify-between items-center text-xs">
                        <div><span class="font-black text-blue-600">${cod}</span> - ${p.desc}</div>
                        <div class="font-bold">${conteoActual[cod]} UND</div>
                    </div>`;
                i++;
            }
            document.getElementById('items-count').innerText = i + " PRODUCTOS";
        }

        function finalizarDescarga() {
            if(Object.keys(conteoActual).length === 0) return alert("No hay datos para guardar.");
            
            const nuevaDescarga = {
                id: "DESC-" + Date.now().toString().slice(-4),
                fecha: new Date().toLocaleString(),
                data: {...conteoActual}
            };

            historialDescargas.unshift(nuevaDescarga);
            localStorage.setItem('historial_v4', JSON.stringify(historialDescargas));
            alert("Descarga guardada en el historial.");
            conteoActual = {};
            actualizarResumen();
            document.getElementById('feedback-prod').innerHTML = '<p class="text-slate-400 font-medium">Esperando ingreso de mercadería...</p>';
        }

        function cambiarSeccion(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'vista-historial') renderHistorial();
        }

        function renderHistorial() {
            const div = document.getElementById('lista-historial');
            div.innerHTML = "";
            historialDescargas.forEach(reg => {
                div.innerHTML += `
                    <div class="card-auditor flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-black text-blue-600 uppercase italic">${reg.fecha}</p>
                            <h3 class="font-black text-slate-800">${reg.id}</h3>
                        </div>
                        <button onclick="generarPDF('${reg.id}')" class="bg-slate-100 p-3 rounded-2xl text-lg shadow-inner">📄</button>
                    </div>
                `;
            });
        }

        function generarPDF(id) {
            const desc = historialDescargas.find(h => h.id === id);
            const doc = new jsPDF();
            
            doc.setFontSize(18);
            doc.text("REPORTE DE CONTEO - CONTENEDOR", 14, 20);
            doc.setFontSize(10);
            doc.text(`ID Registro: ${desc.id} | Fecha: ${desc.fecha}`, 14, 28);

            const body = [];
            for(let cod in desc.data) {
                const p = packingEsperado.find(x => x.cod === cod);
                body.push([cod, p.desc, desc.data[cod], "CONFORME"]);
            }

            doc.autoTable({
                startY: 35,
                head: [['Código', 'Producto', 'Conteo Final', 'Estado']],
                body: body,
                theme: 'striped',
                headStyles: { fillColor: [15, 23, 42] }
            });

            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 20);
            doc.save(`Reporte_${id}.pdf`);
        }

    </script>
</body>
</html>
