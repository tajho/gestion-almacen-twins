<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOGÍSTICA VISION | ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #3b82f6; --success: #10b981; --warn: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 90px; }
        
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .glass { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        
        /* Scanner Effect */
        .scanning-loader { display: none; text-align: center; padding: 20px; border: 2px dashed var(--accent); border-radius: 15px; margin-bottom: 15px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        input { width: 100%; background: #020617; border: 1px solid #334155; padding: 16px; border-radius: 12px; color: white; font-size: 1rem; margin: 10px 0; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-scan { background: linear-gradient(90deg, #3b82f6, #8b5cf6); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .btn-add { background: var(--success); color: white; margin-top: 10px; }

        .item-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .progress-bar { height: 10px; background: #020617; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: 0.5s; }
        .status-badge { font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 20px; float: right; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass">
        <h2 style="margin:0 0 10px 0; font-size: 1.1rem;">📸 LECTOR DE PACKING IA</h2>
        <p style="font-size: 0.7rem; color: #94a3b8; margin-bottom: 15px;">Sube la foto para sugerir cantidades automáticamente.</p>
        
        <input type="text" id="id_cont" placeholder="N° Contenedor / Operación">
        <input type="file" id="foto_pck" accept="image/*" onchange="leerPackingIA(this)">
        
        <div id="loader" class="scanning-loader">
            <span style="color: var(--accent); font-weight: 800;">ANALIZANDO PACKING LIST...</span>
        </div>
    </div>

    <div class="glass" id="panel-conteo" style="display:none;">
        <label style="font-size: 0.7rem; font-weight: bold; color: var(--accent);">PRODUCTO IDENTIFICADO</label>
        <input type="text" id="sku_auto" placeholder="Buscando SKU en foto...">
        
        <div style="display: flex; gap: 10px;">
            <div style="flex:1">
                <label style="font-size: 0.65rem;">SUGERIDO (FOTO)</label>
                <input type="number" id="q_sugerido" style="border-color: var(--accent);">
            </div>
            <div style="flex:1">
                <label style="font-size: 0.65rem;">CONTEO FÍSICO</label>
                <input type="number" id="q_fisico" placeholder="0">
            </div>
        </div>
        <button class="btn btn-add" onclick="registrarAuditoria()">Confirmar e Ir Sumando</button>
    </div>

    <div id="lista_auditoria"></div>
</div>

<script>
    const API = "TU_URL_AQUI";
    let log = {};

    // FUNCIÓN MAESTRA: Lectura de Foto con OCR
    async function leerPackingIA(input) {
        if (!input.files || !input.files[0]) return;
        
        const loader = document.getElementById('loader');
        const panel = document.getElementById('panel-conteo');
        loader.style.display = 'block';
        panel.style.display = 'none';

        try {
            const image = input.files[0];
            const { data: { text } } = await Tesseract.recognize(image, 'spa');
            
            // Lógica de detección: Buscamos números grandes después de palabras clave
            console.log("Texto detectado:", text);
            
            // Intento de extracción (Ejemplo: busca números de 2-4 dígitos que suelen ser cantidades)
            const numeros = text.match(/\b\d{1,4}\b/g) || [];
            const sugerido = numeros.length > 0 ? Math.max(...numeros.map(Number)) : 0;
            
            // Mostrar resultados sugeridos
            document.getElementById('q_sugerido').value = sugerido;
            document.getElementById('sku_auto').value = text.substring(0, 15).replace(/[^a-zA-Z0-9]/g, ''); // Intento de SKU
            
            loader.style.display = 'none';
            panel.style.display = 'block';
            document.getElementById('q_fisico').focus();
            
        } catch (e) {
            alert("Error leyendo la imagen. Intenta una foto más clara.");
            loader.style.display = 'none';
        }
    }

    function registrarAuditoria() {
        const sku = document.getElementById('sku_auto').value.toUpperCase();
        const pck = parseInt(document.getElementById('q_sugerido').value) || 0;
        const fis = parseInt(document.getElementById('q_fisico').value) || 0;
        const cont = document.getElementById('id_cont').value;

        if(!sku || fis === 0) return alert("Complete los datos detectados");

        if(!log[sku]) log[sku] = { p: pck, f: 0 };
        log[sku].f += fis;
        log[sku].p = pck;

        // Sincro en segundo plano
        fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ contenedor: cont, sku: sku, cantidad: fis }) });

        actualizarLista();
        document.getElementById('panel-conteo').style.display = 'none';
    }

    function actualizarLista() {
        const list = document.getElementById('lista_auditoria');
        list.innerHTML = "";
        Object.keys(log).forEach(k => {
            const item = log[k];
            const pct = (item.f / item.p) * 100;
            list.innerHTML += `
                <div class="item-card">
                    <span class="status-badge" style="background:${item.f===item.p?'var(--success)':'var(--warn)'}">
                        ${item.f===item.p?'CUADRADO':'PENDIENTE'}
                    </span>
                    <div style="font-weight:900; font-size:0.9rem;">${k}</div>
                    <div style="font-size:0.7rem; color:#94a3b8; margin:5px 0;">Cant. Foto: ${item.p} | Físico: ${item.f}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pct,100)}%; background:${item.f===item.p?'var(--success)':'var(--accent)'}"></div></div>
                </div>
            `;
        });
    }
</script>
</body>
</html>
