<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Pro | Warehouse System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #ffffff; overflow: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; backdrop-blur: 10px; }
        .view { display: none; height: 100vh; flex-direction: column; padding: 20px; overflow-y: auto; }
        .view.active { display: flex; }
        .neon-accent { color: #00f2ff; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .btn-primary { background: #ffffff; color: #000000; font-weight: 900; border-radius: 16px; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.96); opacity: 0.9; }
        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
        .progress-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .progress-fill { height: 100%; background: #00f2ff; transition: width 0.3s ease; }
    </style>
</head>
<body>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 flex gap-2 p-2 glass-card z-50">
        <button onclick="navTo('home')" class="px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10" id="n-home">Dashboard</button>
        <button onclick="navTo('work')" class="px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10" id="n-work">Operación</button>
    </nav>

    <div id="v-home" class="view active">
        <header class="py-8">
            <p class="text-[10px] font-black text-white/40 uppercase tracking-[0.3em] mb-2">Inventory Manager</p>
            <h1 class="text-5xl font-black tracking-tighter">AURA <span class="neon-accent">PRO.</span></h1>
        </header>

        <div class="grid gap-4">
            <div onclick="navTo('work')" class="glass-card p-8 active:scale-95 transition-all cursor-pointer">
                <h3 class="text-2xl font-black mb-1">Nueva Carga</h3>
                <p class="text-sm text-white/50">Iniciar registro de contenedor</p>
            </div>
            <div id="historial-list" class="space-y-3 mt-4">
                <p class="text-[10px] font-black text-white/40 uppercase mb-4">Recientes</p>
                </div>
        </div>
    </div>

    <div id="v-work" class="view">
        <div id="setup-view">
            <h2 class="text-3xl font-black mb-6 tracking-tight">Configuración</h2>
            <div class="glass-card p-6 space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-white/30 ml-2">ID Contenedor</label>
                    <input type="text" id="c-id" class="w-full p-4 rounded-xl mt-1 text-lg" placeholder="EJ: CT-2026">
                </div>
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="text-[10px] font-black uppercase text-white/30 ml-2">SKU</label>
                        <input type="text" id="c-sku" class="w-full p-4 rounded-xl mt-1" placeholder="Producto...">
                    </div>
                    <div class="w-24">
                        <label class="text-[10px] font-black uppercase text-white/30 ml-2">Meta</label>
                        <input type="number" id="c-meta" class="w-full p-4 rounded-xl mt-1 text-center" placeholder="0">
                    </div>
                    <button onclick="addItem()" class="mt-5 px-6 btn-primary">＋</button>
                </div>
            </div>
            <div id="queue-display" class="mt-6 space-y-2"></div>
            <button onclick="startSession()" class="w-full py-5 btn-primary mt-8 shadow-[0_20px_40px_rgba(255,255,255,0.1)]">INICIAR CONTEO</button>
        </div>

        <div id="active-view" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 id="display-id" class="text-2xl font-black neon-accent"></h2>
                <button onclick="finishSession()" class="text-[10px] font-black bg-red-500/10 text-red-500 px-4 py-2 rounded-full border border-red-500/20">CERRAR</button>
            </div>
            
            <div class="glass-card p-6 mb-6">
                <select id="sku-picker" onchange="refreshUI()" class="w-full p-4 rounded-xl mb-6 text-xl font-black"></select>
                <div class="flex gap-4 items-center">
                    <input type="number" id="qty-input" class="flex-1 p-6 rounded-2xl text-6xl font-black text-center" placeholder="0">
                    <button onclick="submitCount()" class="w-24 h-24 btn-primary text-4xl">OK</button>
                </div>
            </div>

            <div id="stats-display" class="space-y-4"></div>
            <button onclick="generatePDF(currentSession)" class="w-full py-4 glass-card mt-6 text-[10px] font-black uppercase tracking-widest">Descargar Borrador</button>
        </div>
    </div>

    <script>
        let currentSession = null;
        let queue = [];

        function navTo(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            if(v === 'home') loadHistory();
        }

        function addItem() {
            const sku = document.getElementById('c-sku').value, meta = parseInt(document.getElementById('c-meta').value);
            if(!sku || !meta) return;
            queue.push({ sku, meta, real: 0 });
            document.getElementById('c-sku').value = ''; document.getElementById('c-meta').value = '';
            renderQueue();
        }

        function renderQueue() {
            document.getElementById('queue-display').innerHTML = queue.map((x, i) => `
                <div class="glass-card p-4 flex justify-between items-center">
                    <span class="font-black text-xs">${x.sku} <span class="text-white/30 ml-2">${x.meta} PCS</span></span>
                    <button onclick="queue.splice(${i},1);renderQueue()" class="text-red-500 font-bold">✕</button>
                </div>`).join('');
        }

        function startSession() {
            const id = document.getElementById('c-id').value;
            if(!id || queue.length === 0) return alert("Faltan datos");
            currentSession = { id, items: [...queue], date: new Date().toLocaleString() };
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('active-view').classList.remove('hidden');
            document.getElementById('display-id').innerText = id;
            
            const picker = document.getElementById('sku-picker');
            picker.innerHTML = currentSession.items.map(x => `<option value="${x.sku}">${x.sku}</option>`).join('');
            refreshUI();
        }

        function submitCount() {
            const input = document.getElementById('qty-input'), val = parseInt(input.value);
            if(!val) return;
            const item = currentSession.items.find(x => x.sku === document.getElementById('sku-picker').value);
            if(item) { item.real += val; input.value = ''; refreshUI(); }
        }

        function refreshUI() {
            const sel = document.getElementById('sku-picker').value;
            document.getElementById('stats-display').innerHTML = currentSession.items.map(x => `
                <div class="p-4 ${x.sku === sel ? 'glass-card border-white/20' : 'opacity-30'} transition-all">
                    <div class="flex justify-between mb-2">
                        <span class="text-[10px] font-black uppercase">${x.sku}</span>
                        <span class="text-[10px] font-black">${x.real} / ${x.meta}</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min((x.real/x.meta)*100, 100)}%"></div></div>
                </div>`).join('');
        }

        function finishSession() {
            if(!confirm("¿Finalizar y guardar reporte?")) return;
            let history = JSON.parse(localStorage.getItem('aura_history') || '[]');
            history.unshift(currentSession);
            localStorage.setItem('aura_history', JSON.stringify(history));
            generatePDF(currentSession);
            location.reload();
        }

        function generatePDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(22); doc.text("REPORTE LOGISTICO AURA", 14, 20);
            doc.setFontSize(10); doc.text(`CONTENEDOR: ${data.id} | FECHA: ${data.date}`, 14, 30);
            
            doc.autoTable({
                startY: 40,
                head: [['PRODUCTO SKU', 'PLANIFICADO', 'RECIBIDO', 'DIFERENCIA']],
                body: data.items.map(x => [x.sku, x.meta, x.real, x.real - x.meta]),
                theme: 'grid',
                styles: { fontSize: 9, cellPadding: 5 }
            });

            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 20);
            doc.save(`AURA_${data.id}.pdf`);
        }

        function loadHistory() {
            const h = JSON.parse(localStorage.getItem('aura_history') || '[]');
            document.getElementById('historial-list').innerHTML = h.map(x => `
                <div class="glass-card p-4 flex justify-between items-center" onclick='generatePDF(${JSON.stringify(x)})'>
                    <div><p class="text-xs font-black">${x.id}</p><p class="text-[8px] text-white/30">${x.date}</p></div>
                    <span class="text-xl">📄</span>
                </div>`).join('');
        }

        window.onload = loadHistory;
    </script>
</body>
</html>
