<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TITAN ELITE | Logistics Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');

        :root {
            --apple-blue: #007AFF;
            --apple-gray: #F2F2F7;
            --apple-text: #1D1D1F;
            --apple-subtext: #86868B;
            --apple-card: #FFFFFF;
            --radius-lg: 24px;
            --radius-md: 14px;
        }

        body { 
            background: #F5F5F7; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--apple-text);
            padding-bottom: 120px;
            -webkit-font-smoothing: antialiased;
        }

        /* BARRA DE PROGRESO ESTILO APPLE */
        #sync-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px;
            z-index: 9999; background: transparent;
        }
        .syncing { background: var(--apple-blue); animation: loading-pulse 1.5s infinite ease-in-out; }
        @keyframes loading-pulse { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        .app-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 18px 24px;
            position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }

        .brand-title { font-weight: 700; font-size: 20px; letter-spacing: -0.5px; }
        .brand-accent { color: var(--apple-blue); }

        .main-card {
            background: var(--apple-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            border: none;
        }

        .label-apple {
            font-size: 13px; font-weight: 600; color: var(--apple-subtext);
            margin-left: 4px; margin-bottom: 8px; display: block;
        }

        .input-apple {
            width: 100%; padding: 14px 16px; border-radius: var(--radius-md);
            border: 1px solid #D2D2D7; background: #FFF;
            font-size: 16px; transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .input-apple:focus {
            border-color: var(--apple-blue); outline: none;
            box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
        }

        .btn-apple-primary {
            background: var(--apple-blue); color: white; border: none;
            padding: 14px; border-radius: var(--radius-md);
            font-weight: 600; width: 100%; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-apple-primary:active { transform: scale(0.97); }

        /* SEARCH RESULTS */
        .search-results {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            border-radius: var(--radius-md); border: 1px solid #D2D2D7;
            margin-top: -15px; margin-bottom: 15px; overflow: hidden; display: none;
        }
        .search-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #F2F2F7; }
        .search-item:last-child { border: none; }
        .search-item:hover { background: var(--apple-gray); }

        /* HISTORIAL CARDS */
        .history-card {
            background: var(--apple-card); border-radius: var(--radius-md);
            padding: 18px; margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }
        .history-card:active { transform: scale(0.98); background: var(--apple-gray); }
        .hc-type-tag { 
            font-size: 10px; font-weight: 700; padding: 4px 8px; 
            border-radius: 6px; text-transform: uppercase; margin-bottom: 8px; display: inline-block;
        }
        .tag-ent { background: #E1F5FE; color: #0288D1; }
        .tag-dev { background: #FFF3E0; color: #F57C00; }

        /* NAV BAR */
        .nav-apple {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(249, 249, 249, 0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; padding: 10px 0 30px 0;
            border-top: 0.5px solid rgba(0,0,0,0.1); z-index: 2000;
        }
        .nav-item {
            flex: 1; border: none; background: none; color: #8E8E93;
            font-size: 10px; font-weight: 500; display: flex; flex-direction: column; align-items: center;
        }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }
        .nav-item.active { color: var(--apple-blue); }

        .footer-claim { 
            font-size: 10px; color: var(--apple-subtext); text-align: center;
            margin-top: 15px; font-style: italic; border-top: 1px solid #F2F2F7; padding-top: 10px;
        }
    </style>
</head>
<body>

    <div id="sync-loader"></div>

    <header class="app-header">
        <div class="brand-title">TITAN <span class="brand-accent">ELITE</span></div>
        <button class="btn btn-link p-0 text-decoration-none" onclick="emergencyCheck()" style="color: var(--apple-text)">
            <small class="fw-600">Angelo Durand</small>
            <i class="fas fa-chevron-right ms-1 opacity-50" style="font-size: 10px;"></i>
        </button>
    </header>

    <main class="container p-0">
        <section id="v-ent" class="view">
            <div class="main-card">
                <span class="label-apple">Destinatario</span>
                <input type="text" id="cli-e" class="input-apple" placeholder="Nombre del cliente o área" oninput="sugerirVendor(this.value)">
                
                <span class="label-apple">Canal Sugerido</span>
                <input type="text" id="ven-e" class="input-apple" readonly style="background: var(--apple-gray); border: none; color: var(--apple-subtext)">

                <span class="label-apple">Catálogo de Productos</span>
                <input type="text" id="src-e" class="input-apple" placeholder="Buscar por SKU o nombre..." oninput="motorBusqueda(this.value, 'res-e', 'e')">
                <div id="res-e" class="search-results"></div>

                <div id="form-e" class="d-none animate__animated animate__fadeIn">
                    <div class="p-3 mb-3" style="background: var(--apple-gray); border-radius: var(--radius-md);">
                        <b id="p-n-e" class="d-block mb-2"></b>
                        <div class="d-flex gap-2">
                            <input type="number" id="q-e" class="input-apple m-0" placeholder="Cantidad">
                            <button class="btn-apple-primary" style="width: 60px;" onclick="addToCart('e')"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                </div>

                <div id="cart-e" class="d-none">
                    <div id="items-e" class="mb-4"></div>
                    <button class="btn-apple-primary" onclick="finalizarOp('Pedidos', 'e')">Registrar Entrega</button>
                </div>
            </div>
        </section>

        <section id="v-dev" class="view d-none">
            <div class="main-card">
                <span class="label-apple">Origen</span>
                <input type="text" id="cli-d" class="input-apple" placeholder="Proveedor / Tienda">

                <span class="label-apple">Seleccionar Item</span>
                <input type="text" id="src-d" class="input-apple" placeholder="Buscar SKU..." oninput="motorBusqueda(this.value, 'res-d', 'd')">
                <div id="res-d" class="search-results"></div>

                <div id="form-d" class="d-none">
                    <div class="p-3 mb-3 border" style="border-radius: var(--radius-md);">
                        <b id="p-n-d" class="d-block mb-3 text-primary"></b>
                        <div class="row g-2">
                            <div class="col-6">
                                <span class="label-apple">Cant. Guía</span>
                                <input type="number" id="cg-d" class="input-apple">
                            </div>
                            <div class="col-6">
                                <span class="label-apple">Cant. Real</span>
                                <input type="number" id="cr-d" class="input-apple">
                            </div>
                        </div>
                        <span class="label-apple">Estado de recepción</span>
                        <select id="st-d" class="input-apple">
                            <option value="MERMA">MERMA / FALLADO</option>
                            <option value="REPARACION">PARA REPARACIÓN</option>
                        </select>
                        <button class="btn-apple-primary" style="background: #000;" onclick="addToCart('d')">Agregar a Retorno</button>
                    </div>
                </div>

                <div id="cart-d" class="d-none">
                    <div id="items-d" class="mb-3"></div>
                    <button class="btn-apple-primary" onclick="finalizarOp('Devoluciones', 'd')">Procesar Devolución</button>
                </div>
            </div>
        </section>

        <section id="v-his" class="view d-none">
            <div id="feed-his" class="p-3"></div>
        </section>
    </main>

    <nav class="nav-apple">
        <button class="nav-item active" onclick="nav('ent', this)">
            <i class="fas fa-shipping-fast"></i>
            <span>Entregas</span>
        </button>
        <button class="nav-item" onclick="nav('dev', this)">
            <i class="fas fa-arrow-left-rotate"></i>
            <span>Retornos</span>
        </button>
        <button class="nav-item" onclick="nav('his', this)">
            <i class="fas fa-clock"></i>
            <span>Historial</span>
        </button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCeMB7Cf1DpA41NEmprwR0XqrvdD_-xTEbl3vKsMlaHIp_r3b5MpMWcbrQKyOiYFF2NQ/exec";
        let MASTER = []; let CART_E = []; let CART_D = []; let HIS_DATA = {};

        async function init() {
            try {
                const r = await fetch(API, {method: "POST", body: JSON.stringify({action: "load"})});
                const d = await r.json();
                MASTER = d.p;
                processHis(d.h);
            } catch(e) { console.warn("Modo Offline"); }
        }

        function motorBusqueda(v, boxId, t) {
            const box = document.getElementById(boxId);
            if(v.length < 1) { box.style.display='none'; return; }
            const m = MASTER.filter(p => p[1].toLowerCase().includes(v.toLowerCase()) || p[0].toString().includes(v)).slice(0,5);
            box.innerHTML = m.map(p => `<div class="search-item" onclick="pick('${p[0]}','${p[1]}','${t}')">
                <div class="fw-600" style="font-size:14px">${p[1]}</div>
                <div class="text-muted" style="font-size:11px">SKU: ${p[0]}</div>
            </div>`).join('');
            box.style.display = m.length ? 'block' : 'none';
        }

        function pick(s, n, t) {
            window.lastPick = {sku: s, name: n};
            document.getElementById(`p-n-${t}`).innerText = n;
            document.getElementById(`form-${t}`).classList.remove('d-none');
            document.querySelectorAll('.search-results').forEach(b => b.style.display='none');
        }

        function addToCart(t) {
            const cart = t === 'e' ? CART_E : CART_D;
            const q = t === 'e' ? document.getElementById('q-e').value : document.getElementById('cr-d').value;
            if(!q) return;

            const item = { ...window.lastPick, q: q };
            if(t === 'd') {
                item.cg = document.getElementById('cg-d').value;
                item.st = document.getElementById('st-d').value;
                item.type = "DEVOLUCION";
            } else { item.type = "ENTREGA"; }

            cart.push(item);
            document.getElementById(`form-${t}`).classList.add('d-none');
            renderCart(t);
        }

        function renderCart(t) {
            const cart = t === 'e' ? CART_E : CART_D;
            const cont = document.getElementById(`cart-${t}`);
            const items = document.getElementById(`items-${t}`);
            cont.classList.toggle('d-none', cart.length === 0);
            items.innerHTML = cart.map((i, idx) => `
                <div class="d-flex justify-content-between align-items-center mb-2 p-2" style="background:#F9F9F9; border-radius:10px">
                    <span style="font-size:14px"><b>${i.q}</b> · ${i.name}</span>
                    <button class="btn btn-sm text-danger border-0" onclick="((${t==='e'?'CART_E':'CART_D'}).splice(${idx},1)); renderCart('${t}');">
                        <i class="fas fa-minus-circle"></i>
                    </button>
                </div>
            `).join('');
        }

        async function finalizarOp(sheet, t) {
            const cli = document.getElementById(`cli-${t}`).value;
            if(!cli) return Swal.fire({ title: "Falta Cliente", icon: "warning", confirmButtonColor: "#007AFF" });

            const bar = document.getElementById('sync-loader');
            const cart = t === 'e' ? CART_E : CART_D;
            const payload = cart.map(i => [
                new Date(), i.type, i.sku, i.name, i.q, cli, 
                t === 'e' ? `Vendor: ${document.getElementById('ven-e').value}` : `Guía: ${i.cg} | Estado: ${i.st}`
            ]);

            bar.className = 'syncing';
            if(t==='e') CART_E = []; else CART_D = [];
            renderCart(t);
            document.getElementById(`cli-${t}`).value = '';

            try {
                fetch(API, {method: "POST", body: JSON.stringify({action: "save", sheet, payload})})
                .then(() => {
                    bar.className = '';
                    init(); 
                    Swal.fire({ title: "Guardado", icon: "success", timer: 1500, showConfirmButton: false });
                });
            } catch(e) { bar.className = ''; }
        }

        function processHis(data) {
            const groups = {};
            data.forEach(r => {
                const dateObj = new Date(r[0]);
                const time = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const key = r[5] + "_" + time;
                if(!groups[key]) groups[key] = { cliente: r[5], hora: time, fecha: dateObj.toLocaleDateString(), tipo: r[1], prods: [] };
                groups[key].prods.push({ n: r[3], q: r[4], s: r[2], obs: r[6] });
            });
            HIS_DATA = groups;
            renderHis();
        }

        function renderHis() {
            const feed = document.getElementById('feed-his');
            feed.innerHTML = Object.values(HIS_DATA).reverse().slice(0, 15).map(g => `
                <div class="history-card" onclick="verDetalle('${btoa(JSON.stringify(g))}')">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="hc-type-tag ${g.tipo === 'ENTREGA' ? 'tag-ent' : 'tag-dev'}">${g.tipo}</span>
                        <small class="text-muted fw-600" style="font-size:11px">${g.hora}</small>
                    </div>
                    <div class="fw-700" style="font-size:17px; margin: 4px 0;">${g.cliente}</div>
                    <div class="text-muted" style="font-size:13px">${g.prods.length} productos</div>
                    <div class="footer-claim">Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.</div>
                </div>
            `).join('');
        }

        function verDetalle(dataStr) {
            const g = JSON.parse(atob(dataStr));
            Swal.fire({
                title: 'Detalle de Movimiento',
                html: `
                    <div class="text-start" style="font-size:14px">
                        <div class="p-3 bg-light rounded-4 mb-3">
                            <b>${g.cliente}</b><br>
                            <span class="text-muted">${g.fecha} a las ${g.hora}</span>
                        </div>
                        <div class="list-group list-group-flush">
                            ${g.prods.map(p => `
                                <div class="list-group-item px-0 border-0 border-bottom">
                                    <div class="d-flex justify-content-between">
                                        <span><b>${p.q}</b> ${p.n}</span>
                                    </div>
                                    <small class="text-muted">SKU: ${p.s}</small>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: '<i class="fas fa-file-pdf"></i> PDF',
                cancelButtonText: 'Cerrar',
                confirmButtonColor: '#007AFF',
                customClass: { popup: 'rounded-4' }
            }).then((result) => { if (result.isConfirmed) genPDF(g); });
        }

        function genPDF(g) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22); doc.text("TITAN ELITE", 14, 20);
            doc.setFontSize(10); doc.setFont("helvetica", "normal");
            doc.text(`DESTINO/ORIGEN: ${g.cliente}`, 14, 30);
            doc.text(`FECHA: ${g.fecha} | HORA: ${g.hora} | TIPO: ${g.tipo}`, 14, 35);

            doc.autoTable({
                startY: 45,
                head: [['Cant', 'Producto', 'SKU', 'Referencia']],
                body: g.prods.map(p => [p.q, p.n, p.s, p.obs]),
                headStyles: { fillColor: [0, 122, 255] },
                theme: 'striped'
            });

            const finalY = doc.lastAutoTable.finalY + 20;
            doc.setFontSize(9);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 105, finalY, {align: 'center'});
            doc.save(`TITAN_${g.cliente}.pdf`);
        }

        function sugerirVendor(v) {
            let s = "GENERAL";
            if(v.toUpperCase().includes("GLOBAL")) s = "GLOBAL LOGISTICS";
            document.getElementById('ven-e').value = s;
        }

        function nav(v, btn) {
            document.querySelectorAll('.view').forEach(x => x.classList.add('d-none'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('v-'+v).classList.remove('d-none');
            btn.classList.add('active');
            window.scrollTo(0,0);
        }

        function emergencyCheck() {
            Swal.fire({
                title: 'Configuración',
                text: "¿Desea cambiar el responsable del inventario?",
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Cambiar',
                confirmButtonColor: '#007AFF',
                cancelButtonText: 'Cancelar'
            });
        }

        window.onload = init;
    </script>
</body>
</html>
