<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura Pro | Exclusive Logistics</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050509;
            --bg-frost: rgba(15, 15, 25, 0.7);
            --border-frost: rgba(255, 255, 255, 0.06);
            --neon-cyan: #00f7ff;
            --neon-violet: #8b5cf6;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            background-image: radial-gradient(at 10% 10%, rgba(0, 247, 255, 0.15) 0px, transparent 50%),
                              radial-gradient(at 90% 90%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
        }

        /* Efecto Glassmorphism */
        .glass-card {
            background: var(--bg-frost);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-frost);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .view {
            display: none;
            height: 100vh;
            flex-direction: column;
            padding: 24px;
            padding-bottom: 110px; /* Espacio para el nav */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .view.active {
            display: flex;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Navegación Flotante Exclusiva */
        .nav-orb {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 1px solid var(--border-frost);
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .nav-btn {
            padding: 12px 24px;
            border-radius: 32px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            color: var(--text-main);
            background: var(--bg-frost);
            box-shadow: 0 0 15px rgba(0, 247, 255, 0.2);
        }

        /* Estilos de inputs exclusivos */
        input, select {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            color: var(--text-main) !important;
            border-radius: 16px !important;
            font-weight: 600 !important;
        }
        input:focus, select:focus {
            border-color: var(--neon-cyan) !important;
            box-shadow: 0 0 10px rgba(0, 247, 255, 0.2) !important;
            outline: none !important;
        }

        /* Botón OK Orbe */
        .btn-orb {
            width: 80px; height: 80px;
            background: #000;
            border: 2px solid var(--neon-cyan);
            border-radius: 40px;
            color: var(--neon-cyan);
            font-size: 24px;
            font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.4);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-orb:active {
            transform: scale(0.92);
            box-shadow: 0 0 5px rgba(0, 247, 255, 0.1);
        }

        /* Barras de progreso neon */
        .progress-container { height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-violet)); transition: width 0.4s ease; }
    </style>
</head>
<body>

    <nav class="nav-orb">
        <button onclick="navTo('dash')" class="nav-btn active" id="n-dash">Dashboard</button>
        <button onclick="navTo('conteo')" class="nav-btn" id="n-conteo">Terminal</button>
    </nav>

    <div id="v-dash" class="view active">
        <header class="py-10">
            <p class="text-[11px] font-black text-white/30 uppercase tracking-[0.4em] mb-2">Exclusive Logistics</p>
            <h1 class="text-5xl font-black tracking-tighter leading-none">AURA <span class="style-neon-cyan" style="color:var(--neon-cyan);">PRO</span></h1>
            <div class="h-1 w-16 bg-white rounded-full mt-4"></div>
        </header>

        <div class="grid gap-4">
            <div onclick="navTo('conteo')" class="glass-card p-8 flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                <div>
                    <h3 class="text-2xl font-black tracking-tight">Nuevo Ingreso</h3>
                    <p class="text-sm text-white/50">Configurar operación de contenedor</p>
                </div>
                <span class="text-4xl style-neon-cyan" style="color:var(--neon-cyan);">📦</span>
            </div>

            <div id="historial-feed" class="mt-8 space-y-4">
                <p class="text-[11px] font-black text-white/30 uppercase tracking-[0.3em] mb-4">Reportes Recientes</p>
                </div>
        </div>
    </div>

    <div id="v-conteo" class="view">
        
        <div id="setup-panel" class="space-y-6">
            <h2 class="text-3xl font-black tracking-tighter mb-8">Configuración Carga</h2>
            
            <div class="glass-card p-6 space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-white/30 ml-2">ID Contenedor</label>
                    <input type="text" id="setup-id" class="w-full p-4 mt-1 text-lg" placeholder="Ej: CT-LIMA-01">
                </div>
                
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="text-[10px] font-black uppercase text-white/30 ml-2">Producto SKU</label>
                        <input type="text" id="setup-sku" class="w-full p-4 mt-1" placeholder="Buscar producto...">
                    </div>
                    <div class="w-28">
                        <label class="text-[10px] font-black uppercase text-white/30 ml-2">Meta</label>
                        <input type="number" id="setup-meta" class="w-full p-4 mt-1 text-center font-black" placeholder="0">
                    </div>
                    <button onclick="addProducto()" class="mt-5 px-6 font-black text-lg text-black rounded-2xl transition-all" style="background:var(--neon-cyan);">＋</button>
                </div>
            </div>

            <div id="queue-list" class="space-y-3 max-h-48 overflow-y-auto"></div>

            <button onclick="startOperation()" class="w-full h-16 rounded-2xl font-black text-xs uppercase tracking-widest mt-10 shadow-2xl transition-all text-white" style="background:var(--neon-violet); box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);">Iniciar Operación en Terminal</button>
        </div>

        <div id="active-panel" class="hidden flex-1 flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p id="active-id-display" class="text-[10px] font-black uppercase" style="color:var(--neon-cyan);"></p>
                    <h2 class="text-3xl font-black tracking-tighter">Terminal Tajho</h2>
                </div>
                <div class="flex gap-2">
                    <button onclick="hacerPDF(activeOperation)" class="p-3 glass-card rounded-xl">📄</button>
                    <button onclick="openFinalModal()" class="p-3 rounded-xl font-black text-[10px] uppercase bg-red-500/10 text-red-500 border border-red-500/20">Cerrar</button>
                </div>
            </div>

            <div class="glass-card p-6 mb-6">
                <select id="sku-selector" onchange="renderStats()" class="w-full p-4 mb-5 text-xl font-black uppercase appearance-none text-center"></select>
                <div class="flex items-center gap-5 justify-center">
                    <input type="number" id="count-input" class="w-40 p-6 rounded-3xl text-7xl font-black text-center" placeholder="0">
                    <button onclick="commitCount()" class="btn-orb">OK</button>
                </div>
            </div>

            <div id="active-stats-list" class="space-y-3 flex-1 overflow-y-auto pr-2"></div>
        </div>
    </div>

    <div id="modal-final" class="fixed inset-0 z-[200] bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-sm p-10 text-center shadow-2xl border-white/10">
            <div class="w-20 h-20 bg-green-500/10 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl border border-green-500/20">✓</div>
            <h3 class="text-2xl font-black tracking-tight mb-2">Finalizar Operación</h3>
            <p class="text-[10px] text-white/40 font-bold uppercase tracking-widest mb-10">AUTORIZA: J. ANGELO NUÑEZ DURAND</p>
            <div class="flex flex-col gap-3">
                <button onclick="closeModal()" class="h-14 glass-card font-black text-[10px] uppercase">Volver</button>
                <button onclick="confirmFinalClose()" class="h-16 rounded-2xl font-black text-xs uppercase tracking-widest text-black" style="background:var(--neon-cyan);">Confirmar y Generar PDF</button>
            </div>
        </div>
    </div>

    <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycbwNlrpjV8BS3z0t3liodNkxpiO4HvrowLf9BtEta5cDSUZy_IL-0aPMLnMIhpzCRuwM/exec";
        let tempQueue = [];
        let activeOperation = null;

        // INICIALIZACIÓN
        window.onload = () => {
            const savedOp = localStorage.getItem('aura_exclusive_active');
            if(savedOp) {
                activeOperation = JSON.parse(savedOp);
                navTo('conteo');
                loadActiveTerminal();
            }
        };

        // NAVEGACIÓN
        function navTo(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            const navBtn = document.getElementById('n-' + v);
            if(navBtn) navBtn.classList.add('active');
            if(v === 'dash') renderHistory();
        }

        // --- FASE SETUP ---
        function addProducto() {
            const sku = document.getElementById('setup-sku').value;
            const meta = parseInt(document.getElementById('setup-meta').value);
            if(!sku || !meta) return;
            tempQueue.push({ sku, meta, real: 0 });
            document.getElementById('setup-sku').value = '';
            document.getElementById('setup-meta').value = '';
            renderTempQueue();
        }

        function renderTempQueue() {
            document.getElementById('queue-list').innerHTML = tempQueue.map((x, i) => `
                <div class="glass-card p-4 flex justify-between items-center bg-white/5 border border-white/5 shadow-inner">
                    <p class="text-xs font-black">${x.sku} <span style="color:var(--neon-cyan);" class="ml-2">Meta: ${x.meta} Pcs</span></p>
                    <button onclick="tempQueue.splice(${i},1);renderTempQueue()" class="text-red-500 font-bold px-2 text-xl">×</button>
                </div>`).join('');
        }

        function startOperation() {
            const id = document.getElementById('setup-id').value;
            if(!id || tempQueue.length === 0) return alert("Completa ID y Productos");
            activeOperation = { id, items: [...tempQueue], date: new Date().toLocaleString() };
            tempQueue = [];
            localStorage.setItem('aura_exclusive_active', JSON.stringify(activeOperation));
            loadActiveTerminal();
        }

        // --- FASE TERMINAL ACTIVA ---
        function loadActiveTerminal() {
            document.getElementById('setup-panel').classList.add('hidden');
            document.getElementById('active-panel').classList.remove('hidden');
            document.getElementById('active-id-display').innerText = activeOperation.id;
            
            const picker = document.getElementById('sku-selector');
            picker.innerHTML = activeOperation.items.map(x => `<option value="${x.sku}">${x.sku}</option>`).join('');
            renderStats();
        }

        function commitCount() {
            const input = document.getElementById('count-input');
            const val = parseInt(input.value);
            if(!val) return;
            const item = activeOperation.items.find(x => x.sku === document.getElementById('sku-selector').value);
            if(item) {
                item.real += val;
                input.value = '';
                localStorage.setItem('aura_exclusive_active', JSON.stringify(activeOperation));
                renderStats();
                if(window.navigator.vibrate) window.navigator.vibrate(50);
            }
        }

        function renderStats() {
            const cur = document.getElementById('sku-selector').value;
            document.getElementById('active-stats-list').innerHTML = activeOperation.items.map(x => `
                <div class="glass-card p-5 ${x.sku === cur ? 'ring-2 ring-cyan-500 shadow-lg' : 'opacity-40'} transition-all duration-300">
                    <div class="flex justify-between font-black text-[10px] mb-2 uppercase tracking-tight">
                        <span>${x.sku}</span>
                        <span style="color:var(--neon-cyan);">${x.real} / ${x.meta}</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-fill" style="width:${Math.min((x.real/x.meta)*100, 100)}%"></div>
                    </div>
                </div>`).join('');
        }

        // --- PDF Y CIERRE (BLINDADO) ---
        function openFinalModal() { document.getElementById('modal-final').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal-final').classList.add('hidden'); }

        function confirmFinalClose() {
            if (!activeOperation) return;
            let history = JSON.parse(localStorage.getItem('aura_exclusive_history') || '[]');
            history.unshift(activeOperation);
            localStorage.setItem('aura_exclusive_history', JSON.stringify(history));
            
            hacerPDF(activeOperation); // Llamada infalible
            
            localStorage.removeItem('aura_exclusive_active');
            activeOperation = null;
            closeModal();
            location.reload(); // Recarga para limpiar estado
        }

        function hacerPDF(d) {
            if(!d) return;
            try {
                // Validación estricta de librerías
                const { jsPDF } = window.jspdf;
                if (!jsPDF) throw new Error("jsPDF no cargado");
                
                const doc = new jsPDF();
                
                // Diseño de reporte profesional
                doc.setFont("helvetica", "bold");
                doc.setFontSize(18);
                doc.text("REPORTE LOGÍSTICO EXCLUSIVO TAJHO", 14, 20);
                
                doc.setFontSize(10);
                doc.text(`CONTENEDOR ID: ${d.id}`, 14, 30);
                doc.text(`FECHA DE REGISTRO: ${d.date}`, 14, 35);
                
                doc.autoTable({
                    startY: 40,
                    head: [['SKU PRODUCTO', 'PLANIFICADO', 'REAL', 'DIFERENCIA']],
                    body: d.items.map(x => [x.sku, x.meta, x.real, x.real - x.meta]),
                    theme: 'striped',
                    headStyles: { fillColor: [15, 15, 25] }, // Gris frost profundo
                    styles: { fontSize: 8, font: "helvetica" }
                });

                const finalY = doc.lastAutoTable.finalY + 15;
                doc.setFontSize(9);
                doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, finalY);
                
                doc.save(`Tajho_Exclusive_${d.id}.pdf`);
            } catch(e) {
                console.error(e);
                alert("Error técnico al generar PDF. Asegúrate de tener conexión.");
            }
        }

        // --- HISTORIAL ---
        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('aura_exclusive_history') || '[]');
            const feed = document.getElementById('historial-feed');
            
            if(h.length === 0 && !activeOperation) {
                feed.innerHTML = '<p class="text-center py-10 text-[10px] text-white/30 font-bold uppercase tracking-widest">Sin registros previos</p>';
                return;
            }

            let html = '';
            
            // Mostrar operación activa en el feed si existe
            if(activeOperation) {
                html += `
                    <div class="glass-card p-5 border-2 border-cyan-500 mb-6 bg-cyan-950/20">
                        <p class="text-[8px] font-black uppercase tracking-widest text-cyan-400 mb-1">En curso</p>
                        <p class="text-xl font-black mb-4">${activeOperation.id}</p>
                        <button onclick="navTo('conteo')" class="w-full py-3 h-12 rounded-xl font-black text-[9px] uppercase tracking-widest text-black" style="background:var(--neon-cyan);">Continuar Conteo</button>
                    </div>`;
            }

            html += h.map(x => `
                <div class="glass-card p-5 flex justify-between items-center border-white/5 shadow-sm">
                    <div>
                        <p class="text-[7px] font-black text-white/30 uppercase tracking-widest">${x.date}</p>
                        <p class="text-xs font-black">${x.id}</p>
                    </div>
                    <button onclick='hacerPDF(${JSON.stringify(x)})' class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center border border-white/5 text-xl">📄</button>
                </div>`).join('');
            
            feed.innerHTML = html;
        }

        renderHistory(); // Carga inicial
    </script>
</body>
</html>
