<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajho.OS v12 - Dynamic Expansion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #0f172a; overflow: hidden; height: 100vh; }
        
        .main-container { height: calc(100vh - 140px); overflow-y: auto; scroll-behavior: smooth; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); border-radius: 2rem; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 20px -5px rgba(0,0,0,0.03); }
        .input-neo { background: #f1f5f9; border-radius: 1rem; border: 2px solid transparent; transition: all 0.2s; font-size: 0.8rem; font-weight: 700; }
        .input-neo:focus { border-color: var(--accent); background: white; }
        
        .btn-pro { background: #0f172a; border-radius: 1rem; color: white; font-weight: 800; font-size: 0.7rem; letter-spacing: 0.1em; transition: all 0.2s; }
        .btn-pro:active { transform: scale(0.95); opacity: 0.9; }

        .tab-content { display: none; }
        .tab-active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Lista Elástica */
        #mini-list { display: flex; flex-direction: column; gap: 0.5rem; transition: all 0.3s ease; }
        .item-row { animation: expandIn 0.3s ease-out; }
        @keyframes expandIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col">

    <header class="px-6 pt-6 pb-2 flex justify-between items-center shrink-0">
        <div>
            <h1 class="text-xl font-[800] tracking-tighter text-slate-900 uppercase leading-none">Tajho<span class="text-blue-600">.OS</span></h1>
            <p class="text-[7px] font-black text-slate-400 uppercase tracking-widest mt-1">Inventory Manager</p>
        </div>
        <div class="bg-blue-50 px-3 py-1.5 rounded-2xl border border-blue-100 flex items-center gap-2">
            <div class="w-1.5 h-1.5 bg-blue-600 rounded-full animate-pulse"></div>
            <p id="timer-val" class="text-[10px] font-bold text-blue-600 font-mono">00:00:00</p>
        </div>
    </header>

    <main class="main-container px-4">
        
        <section id="tab-recepcion" class="tab-content tab-active space-y-4 pt-2">
            
            <div id="stats-panel" class="hidden">
                <div class="bg-slate-900 rounded-[2rem] p-5 text-white shadow-xl relative overflow-hidden">
                    <div class="flex justify-between items-end mb-3">
                        <h2 id="global-perc" class="text-4xl font-black italic leading-none">0%</h2>
                        <div class="text-right">
                            <p id="global-counter" class="text-xs font-bold text-blue-400">0 / 0</p>
                            <p class="text-[6px] font-black text-slate-500 uppercase tracking-widest">Unidades</p>
                        </div>
                    </div>
                    <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                        <div id="global-bar" class="h-full bg-blue-500 duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div id="config-card" class="glass-panel p-5 space-y-4">
                <div class="grid grid-cols-12 gap-2">
                    <input type="text" id="in-cod" placeholder="CÓDIGO" class="col-span-5 input-neo p-3 uppercase text-center outline-none">
                    <input type="number" id="in-meta" placeholder="CANT" class="col-span-4 input-neo p-3 text-center outline-none">
                    <button onclick="addPackingItem()" class="col-span-3 btn-pro bg-blue-600 text-sm">+</button>
                </div>
                
                <div id="mini-list"></div>
                
                <button id="btn-start-ops" onclick="startOperations()" class="hidden w-full btn-pro py-4 uppercase tracking-[0.2em]">Abrir Contenedor</button>
            </div>

            <div id="ops-panel" class="hidden space-y-3">
                <div class="glass-panel p-6 text-center space-y-4 border-2 border-blue-50">
                    <select id="op-select" class="w-full bg-transparent text-center font-black text-slate-700 text-sm outline-none"></select>
                    <input type="number" id="op-input" placeholder="0" class="w-full text-6xl font-black text-slate-900 bg-transparent text-center outline-none">
                    <button onclick="submitCount()" class="w-full btn-pro py-4 text-white uppercase shadow-lg shadow-blue-100 bg-blue-600">Sumar Cajas</button>
                </div>
                <div id="items-grid" class="space-y-2"></div>
                <button onclick="closeContainerReport()" class="w-full py-4 text-slate-400 font-black text-[9px] uppercase tracking-widest border border-dashed border-slate-200 rounded-2xl">Finalizar Jornada</button>
            </div>
        </section>

        <section id="tab-devolucion" class="tab-content space-y-4 pt-2">
            <div class="glass-panel p-6 space-y-4">
                <h3 class="text-[9px] font-black uppercase tracking-widest text-slate-400">Registro de Devolución</h3>
                <input type="text" id="dev-cli" placeholder="CLIENTE / VENDEDOR" class="input-neo w-full p-4 outline-none">
                <input type="text" id="dev-sku" placeholder="SKU PRODUCTO" class="input-neo w-full p-4 uppercase outline-none">
                <input type="number" id="dev-qty" placeholder="CANTIDAD" class="input-neo w-full p-4 outline-none">
                <textarea id="dev-note" placeholder="MOTIVO DE RETORNO..." class="input-neo w-full p-4 h-24 outline-none"></textarea>
                <button onclick="saveDevolution()" class="w-full btn-pro py-4 bg-orange-600 shadow-orange-100">Guardar Devolución</button>
            </div>
        </section>

        <section id="tab-historial" class="tab-content space-y-4 pt-2">
            <div class="sticky top-0 z-10 bg-white/50 backdrop-blur-md pb-2">
                <input type="text" id="hist-search" oninput="filterHistory()" placeholder="🔍 Buscar por código o ID..." class="input-neo w-full p-4 outline-none border-2 border-blue-50 shadow-sm">
            </div>
            <div id="hist-container" class="space-y-3"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-100 px-10 py-4 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
        <button onclick="switchTab('tab-recepcion', this)" class="flex flex-col items-center text-blue-600 transition-all">
            <span class="text-xl">📥</span>
            <span class="text-[8px] font-black uppercase mt-1">Carga</span>
        </button>
        <button onclick="switchTab('tab-devolucion', this)" class="flex flex-col items-center text-slate-300 transition-all">
            <span class="text-xl">📤</span>
            <span class="text-[8px] font-black uppercase mt-1">Devolu.</span>
        </button>
        <button onclick="switchTab('tab-historial', this)" class="flex flex-col items-center text-slate-300 transition-all">
            <span class="text-xl">📂</span>
            <span class="text-[8px] font-black uppercase mt-1">Historial</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;
        let pList = [];
        let timer;
        let sec = 0;

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(id).classList.add('tab-active');
            const btns = el.parentElement.querySelectorAll('button');
            btns.forEach(b => b.classList.replace('text-blue-600', 'text-slate-300'));
            el.classList.replace('text-slate-300', 'text-blue-600');
            if(id === 'tab-historial') renderHistory();
        }

        function addPackingItem() {
            const cod = document.getElementById('in-cod').value.toUpperCase();
            const meta = parseInt(document.getElementById('in-meta').value);
            if(!cod || !meta) return;
            pList.push({ cod, meta, real: 0 });
            renderMiniList();
            document.getElementById('in-cod').value = "";
            document.getElementById('in-meta').value = "";
            document.getElementById('btn-start-ops').classList.remove('hidden');
        }

        function renderMiniList() {
            const cont = document.getElementById('mini-list');
            cont.innerHTML = pList.map((p, idx) => `
                <div class="item-row flex justify-between items-center p-3 bg-white rounded-xl border border-slate-100 shadow-sm">
                    <span class="text-[10px] font-black text-slate-800">${p.cod}</span>
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-lg">${p.meta} UNIDADES</span>
                        <button onclick="removePackingItem(${idx})" class="text-slate-300 text-xs">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function removePackingItem(idx) {
            pList.splice(idx, 1);
            renderMiniList();
            if(pList.length === 0) document.getElementById('btn-start-ops').classList.add('hidden');
        }

        function startOperations() {
            document.getElementById('config-card').classList.add('hidden');
            document.getElementById('stats-panel').classList.remove('hidden');
            document.getElementById('ops-panel').classList.remove('hidden');
            const sel = document.getElementById('op-select');
            sel.innerHTML = pList.map(p => `<option value="${p.cod}">${p.cod}</option>`).join('');
            timer = setInterval(() => {
                sec++;
                const h = Math.floor(sec/3600).toString().padStart(2,'0');
                const m = Math.floor((sec%3600)/60).toString().padStart(2,'0');
                const s = (sec%60).toString().padStart(2,'0');
                document.getElementById('timer-val').innerText = `${h}:${m}:${s}`;
            }, 1000);
            updateView();
        }

        function submitCount() {
            const cod = document.getElementById('op-select').value;
            const cant = parseInt(document.getElementById('op-input').value);
            if(!cant) return;
            pList.find(p => p.cod === cod).real += cant;
            document.getElementById('op-input').value = "";
            updateView();
            navigator.vibrate(50);
        }

        function updateView() {
            const tPlan = pList.reduce((a,b) => a + b.meta, 0);
            const tReal = pList.reduce((a,b) => a + b.real, 0);
            const perc = Math.round((tReal / tPlan) * 100) || 0;
            document.getElementById('global-perc').innerText = perc + "%";
            document.getElementById('global-bar').style.width = Math.min(perc, 100) + "%";
            document.getElementById('global-counter').innerText = `${tReal} / ${tPlan}`;
            const grid = document.getElementById('items-grid');
            grid.innerHTML = pList.map(p => `
                <div class="glass-panel p-4 flex justify-between items-center border-l-4 ${p.real >= p.meta ? 'border-l-green-500' : 'border-l-blue-600'}">
                    <div>
                        <p class="text-[7px] font-black text-slate-400 uppercase">${p.cod}</p>
                        <p class="text-xs font-black text-slate-800">${p.real} / ${p.meta}</p>
                    </div>
                    <div class="w-20 h-1 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-600" style="width: ${Math.min((p.real/p.meta)*100, 100)}%"></div>
                    </div>
                </div>`).join('');
        }

        function closeContainerReport() {
            clearInterval(timer);
            const reportID = "TJ-" + Math.floor(1000 + Math.random() * 9000);
            const time = document.getElementById('timer-val').innerText;
            const storage = JSON.parse(localStorage.getItem('tajho_v12_data') || '[]');
            const record = { id: reportID, tipo: 'RECEPCIÓN', fecha: new Date().toLocaleString(), tiempo: time, data: [...pList] };
            storage.unshift(record);
            localStorage.setItem('tajho_v12_data', JSON.stringify(storage));
            
            const doc = new jsPDF();
            doc.setFontSize(20); doc.text("REPORTE OPERATIVO TAJHO.OS", 14, 20);
            const rows = pList.map(i => [i.cod, i.meta, i.real, (i.real >= i.meta ? 'OK' : 'FALTANTE')]);
            doc.autoTable({ startY: 30, head: [['COD', 'PLAN', 'REAL', 'ESTADO']], body: rows });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 15);
            doc.save(`${reportID}_Tajho.pdf`);
            location.reload();
        }

        function filterHistory() {
            renderHistory(document.getElementById('hist-search').value.toUpperCase());
        }

        function renderHistory(filter = "") {
            const cont = document.getElementById('hist-container');
            const storage = JSON.parse(localStorage.getItem('tajho_v12_data') || '[]');
            const filtered = storage.filter(h => h.id.includes(filter) || h.tipo.includes(filter) || (h.data && h.data.some(d => d.cod.includes(filter))));
            
            cont.innerHTML = filtered.length ? filtered.map(h => `
                <div class="glass-panel p-5 flex justify-between items-center shadow-sm border-l-4 ${h.tipo === 'RECEPCIÓN' ? 'border-l-blue-600' : 'border-l-orange-500'}">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[6px] font-black text-white px-2 py-0.5 rounded-full ${h.tipo === 'RECEPCIÓN' ? 'bg-blue-600' : 'bg-orange-500'}">${h.tipo}</span>
                            <span class="text-[9px] font-black text-slate-800">${h.id}</span>
                        </div>
                        <p class="text-[8px] text-slate-400 font-medium">${h.fecha}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-black text-slate-900 font-mono tracking-tighter">${h.tiempo}</p>
                        <p class="text-[6px] font-bold text-slate-300 uppercase">TIEMPO TOTAL</p>
                    </div>
                </div>`).join('') : "<p class='text-center py-20 text-slate-300 text-[10px] font-bold uppercase'>Sin coincidencias</p>";
        }

        function saveDevolution() {
            const cli = document.getElementById('dev-cli').value;
            const sku = document.getElementById('dev-sku').value;
            const qty = document.getElementById('dev-qty').value;
            if(!cli || !sku || !qty) return;
            const storage = JSON.parse(localStorage.getItem('tajho_v12_data') || '[]');
            storage.unshift({ id: "DEV-" + Math.floor(Math.random()*999), tipo: 'DEVOLUCIÓN', fecha: new Date().toLocaleString(), tiempo: '00:00:00', data: [{cod: sku}] });
            localStorage.setItem('tajho_v12_data', JSON.stringify(storage));
            alert("Devolución Guardada");
            switchTab('tab-historial', document.querySelectorAll('nav button')[2]);
        }
    </script>
</body>
</html>
