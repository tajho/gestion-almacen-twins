    function initApp() {
        const input = document.getElementById('json-input');
        try {
            items = JSON.parse(input.value);
            document.getElementById('setup').style.display = 'none';
            document.getElementById('footer').classList.remove('hidden');
            draw();
        } catch(e) { alert("Error en JSON"); }
    }

    function draw() {
        const list = document.getElementById('list');
        list.innerHTML = "";
        items.forEach((item, i) => {
            const boxes = item.fisico / item.u_por_caja;
            list.innerHTML += `
                <div class="item-card">
                    <div class="sku-row"><span>${item.sku}</span> <span style="color:#2563eb">${boxes.toFixed(0)} / ${item.cajas_pck} CJ</span></div>
                    <span class="sku-desc">${item.desc}</span>
                    <div class="control-row">
                        <button class="btn-add" onclick="update(${i}, -1)">−</button>
                        <div class="qty-box"><span class="qty-label">DIFERENCIA</span><span class="qty-val">${(boxes - item.cajas_pck).toFixed(0)}</span></div>
                        <button class="btn-add" onclick="update(${i}, 1)">+</button>
                    </div>
                </div>`;
        });
    }

    function update(i, val) {
        let currentBoxes = items[i].fisico / items[i].u_por_caja;
        items[i].fisico = Math.max(0, currentBoxes + val) * items[i].u_por_caja;
        draw();
    }

    // FUNCIÓN DE DESCARGA CON SEGURIDAD EXTRA
    function makePDF() {
        try {
            if (!window.jspdf) {
                alert("La librería PDF aún no ha cargado. Espera 3 segundos e intenta de nuevo.");
                return;
            }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header Azul
            doc.setFillColor(37, 99, 235);
            doc.rect(0, 0, 210, 35, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(16).setFont("helvetica", "bold").text("REVISIÓN DE CONTENEDOR", 105, 15, {align:'center'});
            doc.setFontSize(10).setFont("helvetica", "normal").text("TWINS - INGRESO DE MERCADERÍA", 105, 23, {align:'center'});
            
            doc.setTextColor(0,0,0);
            doc.setFontSize(9).text(`FECHA: ${new Date().toLocaleDateString()}`, 15, 45);

            const tableData = items.map(i => [
                i.sku, 
                i.desc, 
                i.cajas_pck, 
                (i.fisico/i.u_por_caja).toFixed(0),
                (i.fisico/i.u_por_caja) >= i.cajas_pck ? "OK" : "FALTA"
            ]);

            doc.autoTable({
                startY: 50,
                head: [['SKU', 'PRODUCTO', 'CJ PACK', 'CJ FIS', 'ESTADO']],
                body: tableData,
                headStyles: { fillColor: [37, 99, 235] },
                styles: { fontSize: 7 }
            });

            const finalY = doc.lastAutoTable.finalY + 10;
            
            // Intento de Firma con manejo de errores
            try {
                doc.addImage(firmaAngeloBase64, 'PNG', 85, finalY, 40, 20);
            } catch (e) { console.log("Firma no disponible en este momento"); }
            
            doc.setLineWidth(0.5);
            doc.line(70, finalY + 22, 140, finalY + 22);
            doc.setFontSize(10).setFont("helvetica", "bold").text("J. ANGELO NUÑEZ DURAND", 105, finalY + 28, {align:'center'});
            doc.setFontSize(8).setFont("helvetica", "normal").text("Asistente Inventario Logístico", 105, finalY + 33, {align:'center'});
            doc.text("Revisión por J. Angelo Nuñez Durand", 105, finalY + 38, {align:'center'});
            
            doc.save("Reporte_Twins_Angelo.pdf");
        } catch (err) {
            console.error(err);
            alert("Error crítico al generar el PDF. Verifica que el JSON tenga datos.");
        }
    }
