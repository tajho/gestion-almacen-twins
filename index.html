<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite | Smart Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; overscroll-behavior: none; }
        .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid #E2E8F0; }
        .card-container { background: white; border-radius: 28px; border: 1px solid #E2E8F0; transition: all 0.3s ease; }
        .btn-status { @apply flex flex-col items-center justify-center gap-2 p-5 rounded-[24px] transition-all active:scale-90 text-[10px] font-black uppercase tracking-widest border; }
        .month-divider { @apply sticky top-[100px] z-40 bg-slate-900 py-3 px-6 my-6 rounded-2xl text-[10px] font-black text-white uppercase tracking-[0.2em] flex items-center justify-between shadow-lg; }
        .work-mode { display: none; position: fixed; inset: 0; background: white; z-index: 100; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">

    <div id="view-dashboard">
        <header class="glass-header sticky top-0 z-50 p-6">
            <div class="max-w-xl mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-800 tracking-tighter italic leading-none">TWINS <span class="text-blue-600">ELITE</span></h1>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic mt-1">J. Angelo Nuñez Durand</p>
                </div>
                <div id="syncIndicator" class="w-2 h-2 bg-blue-500 rounded-full animate-pulse opacity-0 transition-opacity"></div>
            </div>
        </header>

        <main class="max-w-xl mx-auto p-6">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white p-5 rounded-[26px] border border-slate-200 shadow-sm flex flex-col items-center text-center">
                    <i class="ph-bold ph-shipping-container text-blue-600 text-xl mb-2"></i>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Contenedores</p>
                    <p class="text-2xl font-900 text-slate-800" id="dash-total-cont">0</p>
                </div>
                <div class="bg-white p-5 rounded-[26px] border border-slate-200 shadow-sm flex flex-col items-center text-center">
                    <i class="ph-bold ph-package text-green-600 text-xl mb-2"></i>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Cajas Totales</p>
                    <p class="text-2xl font-900 text-slate-800" id="dash-total-cajas">0</p>
                </div>
            </div>

            <div class="space-y-3 mb-8">
                <input type="text" id="searchInput" oninput="app.render()" placeholder="Buscar contenedor..." class="w-full pl-6 pr-6 py-5 rounded-[24px] bg-white border border-slate-200 shadow-sm outline-none font-bold text-sm">
                <select id="monthFilter" onchange="app.render()" class="w-full p-5 px-6 rounded-[24px] bg-white border border-slate-200 shadow-sm font-800 text-[10px] uppercase text-slate-500 outline-none appearance-none tracking-widest">
                    <option value="ALL">TODOS LOS MESES</option>
                    <option value="0">ENERO</option><option value="1">FEBRERO</option><option value="2">MARZO</option>
                    <option value="3">ABRIL</option><option value="4">MAYO</option><option value="5">JUNIO</option>
                    <option value="6">JULIO</option><option value="7">AGOSTO</option><option value="8">SEPTIEMBRE</option>
                    <option value="9">OCTUBRE</option><option value="10">NOVIEMBRE</option><option value="11">DICIEMBRE</option>
                </select>
            </div>

            <div id="feed" class="space-y-4 pb-20"></div>
        </main>
    </div>

    <div id="view-counter" class="work-mode flex-col">
        <header class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-900 text-white">
            <div>
                <h2 class="text-xl font-900 uppercase tracking-tighter" id="counter-title">Contenedor</h2>
                <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Conteo de Cajas en Almacén</p>
            </div>
            <button onclick="app.closeCounter()" class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center"><i class="ph-bold ph-x text-xl"></i></button>
        </header>
        <div id="counterList" class="flex-1 overflow-y-auto p-6"></div>
        <div class="p-6 bg-white border-t border-slate-100">
            <button onclick="app.saveWork()" class="w-full py-5 bg-blue-600 text-white rounded-[24px] font-900 text-xs uppercase tracking-[0.2em] shadow-xl">Finalizar Conteo</button>
            <p class="text-center text-[8px] font-bold text-slate-400 uppercase mt-4 tracking-widest italic">Revisión autorizada por J. Angelo Nuñez Durand</p>
        </div>
    </div>

    <script>
        const app = {
            data: JSON.parse(localStorage.getItem('twins_elite_data')) || [],
            activeId: null,

            // LÓGICA DE FECHA MEJORADA: Obliga al sistema a leer el mes del texto
            parseFechaAlmacen: function(str) {
                if(!str) return { obj: new Date(), display: "S/F" };
                let clean = str.toString().split('T')[0]; // Quita la parte técnica de Google
                let day, month, year;

                if (clean.includes('/')) {
                    let p = clean.split('/');
                    day = parseInt(p[0]);
                    month = parseInt(p[1]) - 1;
                    year = p[2].length === 2 ? 2000 + parseInt(p[2]) : parseInt(p[2]);
                } else if (clean.includes('-')) {
                    let p = clean.split('-');
                    if (p[0].length === 4) { // YYYY-MM-DD
                        year = parseInt(p[0]); month = parseInt(p[1]) - 1; day = parseInt(p[2]);
                    } else { // DD-MM-YYYY
                        day = parseInt(p[0]); month = parseInt(p[1]) - 1; year = parseInt(p[2]);
                    }
                }
                
                let d = new Date(year, month, day);
                return { obj: d, display: clean, month: month.toString() };
            },

            sync: async function() {
                const dot = document.getElementById('syncIndicator');
                dot.style.opacity = '1';
                try {
                    const res = await fetch("https://script.google.com/macros/s/AKfycbycL7jCK_jAwAch6H9DVnpditaxcMnghvhu860tGiCroA_ncf2fTKR6TU-qs1ojqEU/exec");
                    const json = await res.json();
                    this.data = Array.isArray(json) ? json : (json.historial || []);
                    localStorage.setItem('twins_elite_data', JSON.stringify(this.data));
                    this.render();
                } catch(e) { console.log("Modo offline."); }
                finally { setTimeout(() => dot.style.opacity = '0', 1000); }
            },

            render: function() {
                const feed = document.getElementById('feed');
                const search = document.getElementById('searchInput').value.toLowerCase();
                const monthFilter = document.getElementById('monthFilter').value;
                const monthNames = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];

                const groups = this.data.reduce((acc, item) => {
                    const id = (item.canal || item.CONTENEDOR || "S/N").toString().split('T')[0];
                    const dateInfo = this.parseFechaAlmacen(item.almacen || item.FECHA);
                    
                    if (JSON.stringify(item).toLowerCase().includes(search) && (monthFilter === "ALL" || dateInfo.month === monthFilter)) {
                        if (!acc[id]) acc[id] = { id, dateObj: dateInfo.obj, dateLabel: dateInfo.display, items: [] };
                        acc[id].items.push(item);
                    }
                    return acc;
                }, {});

                const sorted = Object.values(groups).sort((a,b) => b.dateObj - a.dateObj);
                
                document.getElementById('dash-total-cont').innerText = sorted.length;
                document.getElementById('dash-total-cajas').innerText = sorted.reduce((sum, g) => 
                    sum + g.items.reduce((s, i) => s + (parseInt(i.cantidad) || 0), 0), 0);

                let html = '';
                let lastMonth = '';

                sorted.forEach(g => {
                    const monthKey = `${monthNames[g.dateObj.getMonth()]} ${g.dateObj.getFullYear()}`;
                    if (monthKey !== lastMonth) {
                        html += `<div class="month-divider"><span>${monthKey}</span><i class="ph-bold ph-calendar"></i></div>`;
                        lastMonth = monthKey;
                    }

                    const totalCajas = g.items.reduce((s, i) => s + (parseInt(i.cantidad) || 0), 0);
                    
                    html += `
                    <div class="card-container p-6 mb-4">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">ALMACÉN: ${g.dateLabel}</p>
                                <h3 class="text-xl font-900 text-slate-900 uppercase leading-none">Contenedor ${g.id}</h3>
                            </div>
                            <div class="px-3 py-1 bg-blue-600 text-white rounded-lg text-[10px] font-black">${totalCajas} CAJAS</div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="app.startWork('${g.id}')" class="btn-status bg-blue-50 text-blue-600">
                                <i class="ph-fill ph-play text-xl"></i>EMPEZAR
                            </button>
                            <button onclick="app.generatePDF('${g.id}')" class="btn-status border-slate-100 text-slate-400"><i class="ph-fill ph-file-pdf text-xl"></i>REPORTE</button>
                        </div>
                    </div>`;
                });
                feed.innerHTML = html || '<p class="text-center py-10 opacity-30 font-bold text-xs uppercase">Sin registros en este mes</p>';
            },

            startWork: function(id) {
                this.activeId = id;
                const filtrados = this.data.filter(i => (i.canal || i.CONTENEDOR || "").toString().includes(id));
                document.getElementById('counter-title').innerText = `CONTENEDOR ${id}`;
                document.getElementById('counterList').innerHTML = filtrados.map((item, idx) => `
                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl mb-3 border border-slate-100">
                        <div class="flex-1">
                            <p class="text-[10px] font-black text-blue-600 mb-1">${item.codigo || 'S/C'}</p>
                            <p class="text-xs font-bold text-slate-800 uppercase leading-tight">${item.descripcion || 'SIN DESCRIPCIÓN'}</p>
                        </div>
                        <div class="flex items-center gap-3 bg-white p-2 rounded-xl shadow-sm">
                            <button onclick="app.adjust('${id}', ${idx}, -1)" class="w-10 h-10 bg-slate-100 rounded-lg font-black">-</button>
                            <span class="w-8 text-center font-900 text-lg text-blue-600">${item.cantidad || 0}</span>
                            <button onclick="app.adjust('${id}', ${idx}, 1)" class="w-10 h-10 bg-blue-600 text-white rounded-lg font-black">+</button>
                        </div>
                    </div>`).join('');
                document.getElementById('view-counter').style.display = 'flex';
                document.body.style.overflow = 'hidden';
            },

            adjust: function(id, idx, val) {
                const filtrados = this.data.filter(i => (i.canal || i.CONTENEDOR || "").toString().includes(id));
                filtrados[idx].cantidad = Math.max(0, (parseInt(filtrados[idx].cantidad) || 0) + val);
                this.startWork(id);
            },

            saveWork: function() {
                localStorage.setItem('twins_elite_data', JSON.stringify(this.data));
                this.render();
                this.closeCounter();
            },

            closeCounter: function() {
                document.getElementById('view-counter').style.display = 'none';
                document.body.style.overflow = 'auto';
            },

            generatePDF: function(id) {
                alert(`Reporte generado: Contenedor ${id}\nAutorizado por J. Angelo Nuñez Durand.`);
            }
        };

        window.onload = () => { app.sync(); app.render(); };
        setInterval(() => app.sync(), 60000);
    </script>
</body>
</html>
