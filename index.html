<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN V3 | Logística Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --accent: #0062ff;
            --bg: #f4f7fa;
            --card: #ffffff;
            --text: #1a202c;
            --border: #e2e8f0;
        }

        body { 
            background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text);
            margin: 0; padding-bottom: 90px;
        }

        /* --- HEADER --- */
        .glass-nav {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 15px 20px; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        /* --- CARDS & INPUTS --- */
        .container-main { padding: 15px; max-width: 600px; margin: auto; }
        
        .neo-card {
            background: var(--card); border-radius: 20px; padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .section-label { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }

        .modern-input {
            width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid var(--border);
            background: #f8fafc; font-size: 14px; margin-bottom: 15px; transition: 0.3s;
        }
        .modern-input:focus { border-color: var(--accent); outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(0,98,255,0.1); }

        /* --- SEARCH ENGINE --- */
        .search-wrapper { position: relative; }
        #results-box {
            position: absolute; top: 100%; left: 0; right: 0; background: #fff;
            border-radius: 12px; border: 1px solid var(--border); z-index: 2000;
            max-height: 250px; overflow-y: auto; display: none; box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .search-item { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .search-item:hover { background: #f0f7ff; }

        /* --- BOTONES --- */
        .btn-primary-custom {
            background: var(--accent); color: #fff; border: none; padding: 15px;
            border-radius: 12px; width: 100%; font-weight: 700; transition: 0.3s;
        }
        .btn-primary-custom:active { transform: scale(0.97); }

        /* --- FOOTER NAV --- */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
            display: flex; justify-content: space-around; padding: 12px;
            border-top: 1px solid var(--border); box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 11px; font-weight: 600; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        /* --- HISTORIAL --- */
        .hist-card {
            background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 10px;
            border-left: 5px solid var(--accent); border: 1px solid var(--border);
        }
        .report-footer { font-size: 9px; color: #94a3b8; margin-top: 10px; text-align: center; font-weight: 700; border-top: 1px dotted #ccc; padding-top: 5px; }
    </style>
</head>
<body>

    <nav class="glass-nav d-flex justify-content-between align-items-center">
        <div><b style="font-size: 18px; letter-spacing: -1px;">TITAN <span style="color:var(--accent)">V3</span></b></div>
        <button class="btn btn-sm btn-light fw-bold" onclick="confirmarEmergencia()">🚑 EMERGENCIA</button>
    </nav>

    <div class="container-main">
        <div id="view-despacho" class="app-view">
            <div class="neo-card">
                <span class="section-label">Información de Ruta</span>
                <input type="text" id="cli-nom" class="modern-input" placeholder="Cliente / Destino" oninput="motorSugerencia(this.value)">
                <input type="text" id="vend-sug" class="modern-input" placeholder="Proveedor / Vendor" readonly style="opacity: 0.7;">

                <span class="section-label">Buscador de Stock</span>
                <div class="search-wrapper">
                    <input type="text" id="input-search" class="modern-input" placeholder="Escribe SKU o Nombre..." oninput="motorBusqueda(this.value)">
                    <div id="results-box"></div>
                </div>

                <div id="form-item" class="d-none animate__animated animate__fadeIn">
                    <div class="p-3 bg-light rounded-3 mb-3 border">
                        <b id="sel-name"></b><br><small id="sel-sku" class="text-muted"></small>
                    </div>
                    <input type="number" id="sel-cant" class="modern-input" placeholder="Cantidad a retirar">
                    <button class="btn-primary-custom" onclick="agregarItem()">AÑADIR A LA COLA</button>
                </div>
            </div>

            <div id="cola-container" class="d-none">
                <div id="lista-items"></div>
                <button class="btn-primary-custom mt-2" style="background:#1a202c" onclick="enviarAFirma()">PROCESAR DESPACHO</button>
            </div>
        </div>

        <div id="view-historial" class="app-view d-none">
            <div id="feed-historial"></div>
        </div>
    </div>

    <nav class="bottom-bar">
        <button class="nav-item active" onclick="showView('despacho', this)"><i class="fas fa-truck-loading"></i>SALIDA</button>
        <button class="nav-item" onclick="showView('historial', this)"><i class="fas fa-history"></i>HISTORIAL</button>
    </nav>

    <script>
        const SCRIPT_URL = "TU_URL_DE_APPS_SCRIPT"; // Reemplaza esto
        let MASTER_DATA = []; 
        let TEMP_LIST = [];
        let HISTORIAL = [];

        // Datos de respaldo por si el servidor falla
        const FALLBACK_DATA = [
            ["SKU001", "PRODUCTO DE PRUEBA A", "100"],
            ["SKU002", "PRODUCTO DE PRUEBA B", "50"]
        ];

        async function init() {
            Swal.fire({ title: 'Sincronizando...', text: 'Conectando con la nube', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            // Timeout de seguridad: Si en 4 segundos no responde, usa fallback
            const timeout = setTimeout(() => {
                if(MASTER_DATA.length === 0) {
                    MASTER_DATA = FALLBACK_DATA;
                    Swal.fire('Modo Offline', 'Usando datos locales por lentitud de red', 'warning');
                    renderHistorial([]);
                }
            }, 4000);

            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'load' }) });
                const data = await response.json();
                MASTER_DATA = data.p;
                HISTORIAL = data.h;
                renderHistorial(data.h);
                clearTimeout(timeout);
                Swal.close();
            } catch (e) {
                console.log("Error de conexión, usando fallback");
            }
        }

        // --- MOTOR DE BÚSQUEDA ---
        function motorBusqueda(val) {
            const box = document.getElementById('results-box');
            if(val.length < 1) { box.style.display = 'none'; return; }

            const term = val.toLowerCase();
            // Filtrado agresivo: busca en SKU (index 0) y Nombre (index 1)
            const matches = MASTER_DATA.filter(p => 
                (p[0] && p[0].toString().toLowerCase().includes(term)) || 
                (p[1] && p[1].toString().toLowerCase().includes(term))
            ).slice(0, 10);

            if(matches.length > 0) {
                box.innerHTML = matches.map(p => `
                    <div class="search-item" onclick="seleccionar('${p[0]}','${p[1]}')">
                        <b>${p[1]}</b><br><small class="text-muted">SKU: ${p[0]}</small>
                    </div>
                `).join('');
                box.style.display = 'block';
            } else {
                box.style.display = 'none';
            }
        }

        function seleccionar(sku, nombre) {
            window.current = { sku, nombre };
            document.getElementById('sel-name').innerText = nombre;
            document.getElementById('sel-sku').innerText = "SKU: " + sku;
            document.getElementById('form-item').classList.remove('d-none');
            document.getElementById('results-box').style.display = 'none';
            document.getElementById('input-search').value = '';
        }

        // --- LÓGICA DE NEGOCIO ---
        function motorSugerencia(val) {
            const v = val.toUpperCase();
            let sugerencia = "PROVEEDOR GENERAL";
            if(v.includes("GLOBAL")) sugerencia = "GLOBAL LOGISTICS S.A.";
            if(v.includes("IMPORT")) sugerencia = "IMPORTADORA CENTRAL";
            document.getElementById('vend-sug').value = sugerencia;
        }

        function agregarItem() {
            const c = document.getElementById('sel-cant').value;
            if(!c) return;
            TEMP_LIST.push({...window.current, cant: c});
            document.getElementById('form-item').classList.add('d-none');
            renderCola();
        }

        function renderCola() {
            const container = document.getElementById('lista-items');
            document.getElementById('cola-container').classList.remove('d-none');
            container.innerHTML = TEMP_LIST.map((item, idx) => `
                <div class="p-3 bg-white border rounded-3 mb-2 d-flex justify-content-between align-items-center">
                    <div><b>${item.nombre}</b><br><small class="text-primary fw-bold">Cantidad: ${item.cant}</small></div>
                    <i class="fas fa-trash text-danger" onclick="TEMP_LIST.splice(${idx},1); renderCola();"></i>
                </div>
            `).join('');
            if(TEMP_LIST.length === 0) document.getElementById('cola-container').classList.add('d-none');
        }

        async function enviarAFirma() {
            const cli = document.getElementById('cli-nom').value;
            if(!cli) return Swal.fire('Error', 'Indique el cliente', 'error');

            Swal.fire({ title: 'Guardando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            const payload = TEMP_LIST.map(i => [
                new Date(), "SALIDA", i.sku, i.nombre, i.cant, cli, "Revisado por Angelo Durand"
            ]);

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'save', payload }) });
                Swal.fire('Éxito', 'Inventario actualizado', 'success').then(() => location.reload());
            } catch (e) {
                Swal.fire('Error de Red', 'Se guardará localmente', 'error');
            }
        }

        function renderHistorial(h) {
            const feed = document.getElementById('feed-historial');
            if(!h || h.length === 0) { feed.innerHTML = "<p class='text-center mt-5 text-muted'>No hay registros hoy</p>"; return; }
            
            feed.innerHTML = h.map(r => `
                <div class="hist-card">
                    <div class="d-flex justify-content-between">
                        <span class="badge bg-primary">${r[1]}</span>
                        <small>${new Date(r[0]).toLocaleDateString()}</small>
                    </div>
                    <div class="fw-bold mt-2" style="font-size:16px">${r[5]}</div>
                    <div class="text-muted mb-2" style="font-size:13px">${r[3]} (x${r[4]})</div>
                    <div class="report-footer">Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.</div>
                </div>
            `).join('');
        }

        function confirmarEmergencia() {
            Swal.fire({
                title: '¿Confirmar Emergencia?',
                text: "Esta acción permite cambiar de asistente o chofer de forma excepcional.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Sí, permitir'
            });
        }

        function showView(v, btn) {
            document.querySelectorAll('.app-view').forEach(x => x.classList.add('d-none'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.remove('d-none');
            btn.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
