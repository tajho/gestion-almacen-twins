<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v36</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; overflow: hidden; height: 100vh; }
        .card-modern { background: white; border-radius: 1.8rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
        .input-clean { background: #f1f5f9; border-radius: 1rem; border: 2px solid transparent; font-weight: 700; transition: 0.3s; padding: 0.8rem 1rem; }
        .input-clean:focus { border-color: var(--blue); background: white; outline: none; }
        
        /* Menú Lateral */
        #side-menu { position: fixed; inset: 0; z-index: 1000; visibility: hidden; pointer-events: none; }
        #menu-content { width: 85%; max-width: 300px; height: 100%; background: white; transform: translateX(-100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #side-menu.open { visibility: visible; pointer-events: auto; }
        #side-menu.open #menu-content { transform: translateX(0); }
        #side-menu.open #menu-overlay { opacity: 1; }
        #menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); opacity: 0; transition: 0.3s; backdrop-filter: blur(2px); }

        /* Contenedores de Vistas */
        .view { display: none; height: 100%; overflow-y: auto; padding: 1.5rem; }
        .view.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        /* Barras de Carga */
        .progress-container { width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--blue); transition: width 0.4s ease; }
    </style>
</head>
<body>

    <div id="side-menu">
        <div id="menu-overlay" onclick="toggleMenu()"></div>
        <div id="menu-content" class="p-8 flex flex-col">
            <h2 class="text-xl font-black italic mb-8 uppercase tracking-tighter">Tajho<span class="text-blue-600">.OS</span></h2>
            <nav class="space-y-4">
                <button onclick="changeView('landing')" class="w-full text-left font-bold text-slate-500 py-2">🏠 Inicio</button>
                <button onclick="changeView('historial')" class="w-full text-left font-bold text-slate-500 py-2">📦 Historial / Espera</button>
            </nav>
        </div>
    </div>

    <header class="h-16 px-6 flex justify-between items-center bg-white border-b border-slate-100 sticky top-0 z-50">
        <button onclick="toggleMenu()" class="p-2"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div id="global-progress-header" class="hidden flex-1 px-4">
            <div class="progress-container"><div id="main-bar" class="progress-bar" style="width: 0%"></div></div>
            <p id="timer" class="text-[9px] font-black text-blue-600 text-center mt-1 italic uppercase">00:00:00</p>
        </div>
        <div class="w-10 text-right font-black italic text-blue-600">T.OS</div>
    </header>

    <div id="view-landing" class="view active">
        <h1 class="text-3xl font-black italic mb-6">Nuevo <span class="text-blue-600">Contenedor</span></h1>
        <div class="card-modern p-6 space-y-4">
            <input type="text" id="c-name" class="input-clean w-full" placeholder="NOMBRE / PLACA">
            <div class="relative">
                <input type="text" id="s-sku" oninput="smartSearch()" class="input-clean w-full" placeholder="BUSCAR SKU..." autocomplete="off">
                <div id="search-results" class="hidden absolute z-10 w-full bg-white mt-1 rounded-xl shadow-xl border border-slate-100 max-h-40 overflow-y-auto"></div>
            </div>
            <input type="text" id="s-desc" class="input-clean w-full text-xs text-blue-600 font-bold italic" readonly placeholder="Descripción...">
            <input type="number" id="s-meta" class="input-clean w-full" placeholder="CANTIDAD META">
            <button onclick="addItemToList()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase text-xs tracking-widest">Añadir a Lista</button>
        </div>
        <div id="current-list" class="mt-6 space-y-2"></div>
        <button id="btn-save" onclick="saveToHistory()" class="hidden mt-4 w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-xs shadow-lg">Guardar en Historial</button>
    </div>

    <div id="view-historial" class="view">
        <h1 class="text-3xl font-black italic mb-6">Historial de <span class="text-blue-600">Espera</span></h1>
        <div id="history-container" class="space-y-4"></div>
    </div>

    <div id="view-ops" class="view">
        <div class="card-modern p-6 text-center space-y-6">
            <select id="sel-sku" onchange="syncOps()" class="text-3xl font-black italic bg-transparent w-full text-center outline-none"></select>
            <p id="ops-desc" class="text-[10px] font-black text-blue-500 uppercase tracking-widest"></p>
            
            <div class="py-4">
                <p class="text-[10px] font-black text-slate-300 uppercase mb-2">Progreso Ítem</p>
                <div class="progress-container"><div id="item-bar" class="progress-bar" style="width: 0%"></div></div>
            </div>

            <div class="flex items-center justify-center gap-4">
                <input type="number" id="qty-in" class="input-clean w-28 text-center text-3xl" placeholder="0">
                <button onclick="registerQty()" class="w-16 h-16 bg-blue-600 text-white rounded-2xl text-3xl font-bold shadow-lg">+</button>
            </div>

            <div class="flex justify-around pt-4 border-t border-slate-50">
                <div><p class="text-[9px] font-black text-slate-400">RESTANTE</p><p id="txt-rem" class="text-xl font-black">0</p></div>
                <div><p class="text-[9px] font-black text-slate-400">TOTAL OK</p><p id="txt-real" class="text-xl font-black text-blue-600">0</p></div>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_raw = [];
        let history = [];
        let currentDraft = [];
        let activeOp = null;
        let timerInterval;

        // --- PREVENCIÓN DE CIERRE ---
        window.onbeforeunload = function() {
            if (currentDraft.length > 0 || activeOp) return "¿Seguro que quieres salir? Se perderá el avance actual.";
        };

        async function init() {
            const res = await fetch(CLOUD_URL);
            db_raw = await res.json();
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }

        function changeView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            if(document.getElementById('side-menu').classList.contains('open')) toggleMenu();
        }

        // --- LÓGICA DE CREACIÓN ---
        function smartSearch() {
            const input = document.getElementById('s-sku').value.toUpperCase();
            const resDiv = document.getElementById('search-results');
            if(input.length < 2) { resDiv.classList.add('hidden'); return; }
            const matches = db_raw.filter(i => String(i.CODIGO).includes(input)).slice(0,5);
            resDiv.innerHTML = matches.map(m => `<div onclick="setProd('${m.CODIGO}','${m.DESCRIPCION}')" class="p-4 border-b font-bold text-xs">${m.CODIGO} - ${m.DESCRIPCION}</div>`).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(c, d) {
            document.getElementById('s-sku').value = c;
            document.getElementById('s-desc').value = d;
            document.getElementById('search-results').classList.add('hidden');
        }

        function addItemToList() {
            const sku = document.getElementById('s-sku').value;
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentDraft.push({ sku, desc: document.getElementById('s-desc').value, meta, real: 0 });
            renderDraft();
            document.getElementById('btn-save').classList.remove('hidden');
            document.getElementById('s-sku').value = ''; document.getElementById('s-desc').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderDraft() {
            document.getElementById('current-list').innerHTML = currentDraft.map(i => `<div class="p-4 bg-white rounded-xl border-l-4 border-blue-600 font-bold text-[10px] uppercase">${i.sku} | META: ${i.meta}</div>`).join('');
        }

        function saveToHistory() {
            const name = document.getElementById('c-name').value || "Contenedor " + (history.length + 1);
            history.push({ id: Date.now(), name, items: [...currentDraft], status: 'espera', time: 0 });
            currentDraft = [];
            document.getElementById('c-name').value = '';
            document.getElementById('btn-save').classList.add('hidden');
            renderDraft();
            renderHistory();
            changeView('historial');
        }

        // --- LÓGICA DE HISTORIAL ---
        function renderHistory() {
            document.getElementById('history-container').innerHTML = history.map(h => `
                <div class="card-modern p-6">
                    <p class="text-[10px] font-black text-slate-400 uppercase italic">Estado: ${h.status}</p>
                    <h3 class="text-xl font-black uppercase mb-4">${h.name}</h3>
                    <button onclick="preStart(${h.id})" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-[10px] uppercase">Comenzar Descarga</button>
                </div>
            `).join('');
        }

        function preStart(id) {
            if(confirm("¿Deseas comenzar la descarga de este contenedor? Se iniciará el cronómetro.")) {
                activeOp = history.find(h => h.id === id);
                activeOp.status = 'en proceso';
                startOps();
            }
        }

        // --- LÓGICA DE OPERACIÓN ---
        function startOps() {
            changeView('ops');
            document.getElementById('global-progress-header').classList.remove('hidden');
            const sel = document.getElementById('sel-sku');
            sel.innerHTML = activeOp.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncOps();
            startTimer();
        }

        function syncOps() {
            const item = activeOp.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('ops-desc').innerText = item.desc;
            document.getElementById('txt-rem').innerText = item.meta - item.real;
            document.getElementById('txt-real').innerText = item.real;
            
            const pc = (item.real / item.meta) * 100;
            document.getElementById('item-bar').style.width = pc + "%";
            updateGlobalBar();
        }

        function registerQty() {
            const qty = parseInt(document.getElementById('qty-in').value);
            if(!qty) return;
            const item = activeOp.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += qty;
            document.getElementById('qty-in').value = '';
            syncOps();
            
            // Envío silencioso
            fetch(CLOUD_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({tipo:'CARGA', datos:[activeOp.name, item.sku, qty]}) });
        }

        function updateGlobalBar() {
            const totalMeta = activeOp.items.reduce((a, b) => a + b.meta, 0);
            const totalReal = activeOp.items.reduce((a, b) => a + b.real, 0);
            const pc = (totalReal / totalMeta) * 100;
            document.getElementById('main-bar').style.width = pc + "%";
            if(pc >= 100) {
                clearInterval(timerInterval);
                alert("¡CONTENEDOR COMPLETADO!");
            }
        }

        function startTimer() {
            let s = 0;
            timerInterval = setInterval(() => {
                s++;
                let h = Math.floor(s/3600);
                let m = Math.floor((s % 3600)/60);
                let sec = s % 60;
                document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            }, 1000);
        }

        init();
    </script>
</body>
</html>
