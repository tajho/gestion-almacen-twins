<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tajho | Luxury Logistics</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --main: #ffffff; --accent: #000000; --soft: #f4f7f9; --shadow: rgba(0,0,0,0.05); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--soft); color: var(--accent); overflow-x: hidden; }
        
        .view { display: none; min-height: 100vh; padding: 24px; flex-direction: column; animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .view.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid white; border-radius: 32px; box-shadow: 0 20px 40px var(--shadow); }
        
        .btn-luxury { background: var(--accent); color: white; border-radius: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-luxury:active { transform: scale(0.96); }

        input, select { background: white!important; border: 1px solid #e2e8f0!important; border-radius: 20px!important; padding: 18px!important; font-weight: 600!important; outline: none!important; transition: 0.3s; }
        input:focus { border-color: var(--accent)!important; box-shadow: 0 0 0 4px rgba(0,0,0,0.02); }

        .tab-button { background: white; border-radius: 35px; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 30px var(--shadow); transition: 0.4s; border: 1px solid transparent; }
        .tab-button:active { transform: translateY(5px); box-shadow: 0 5px 15px var(--shadow); }
        .tab-button i { font-size: 3rem; margin-bottom: 1rem; color: #1a1a1a; }
        
        /* Ocultar barra de scroll */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="v-dash" class="view active">
        <header class="pt-16 pb-12 text-center">
            <h1 class="text-[10px] font-extrabold tracking-[0.6em] text-black/30 uppercase mb-3">Intelligent Inventory</h1>
            <h2 class="text-5xl font-light italic tracking-tighter">Tajho <span class="font-black not-italic">Elite</span></h2>
        </header>

        <div class="grid grid-cols-2 gap-6 mt-4">
            <button onclick="navTo('create')" class="tab-button">
                <i class="ph-thin ph-truck"></i>
                <span class="text-[10px] font-black uppercase tracking-widest">Crear<br>Contenedor</span>
            </button>
            <button onclick="navTo('hist')" class="tab-button">
                <i class="ph-thin ph-notebook"></i>
                <span class="text-[10px] font-black uppercase tracking-widest">Historial<br>Reportes</span>
            </button>
        </div>

        <footer class="mt-auto pb-10 text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white shadow-sm border border-gray-100">
                <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                <span class="text-[9px] font-bold uppercase opacity-40">Sincronización Activa</span>
            </div>
        </footer>
    </div>

    <div id="v-create" class="view">
        <div class="flex items-center justify-between mb-10">
            <button onclick="navTo('dash')" class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-sm border border-gray-100"><i class="ph-bold ph-caret-left"></i></button>
            <h2 class="text-xl font-black uppercase italic tracking-tighter">Nueva Operación</h2>
            <div class="w-12"></div>
        </div>

        <div class="glass-card p-8 space-y-6">
            <div class="relative">
                <p class="text-[9px] font-black uppercase opacity-30 ml-2 mb-2">Maestra de Productos (Hoja 1)</p>
                <input type="text" id="sku-search" oninput="searchInMaster(this.value)" class="w-full text-lg" placeholder="Escribe SKU...">
                <div id="results" class="absolute w-full mt-2 glass-card z-50 hidden overflow-hidden border-none shadow-2xl"></div>
            </div>
            <div class="flex gap-3">
                <div class="flex-1">
                    <p class="text-[9px] font-black uppercase opacity-30 ml-2 mb-2">Meta Cantidad</p>
                    <input type="number" id="sku-meta" class="w-full text-center text-xl font-bold" placeholder="0">
                </div>
                <button onclick="addSku()" class="mt-6 px-8 btn-luxury text-[10px]">Añadir</button>
            </div>
        </div>

        <div id="pre-list" class="mt-8 space-y-3 flex-1 overflow-y-auto"></div>

        <button onclick="confirmAndSave()" class="w-full py-6 btn-luxury bg-black text-white mt-6 rounded-[28px]">
            Registrar Contenedor
        </button>
    </div>

    <div id="v-hist" class="view">
        <div class="flex items-center justify-between mb-10">
            <button onclick="navTo('dash')" class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-sm border border-gray-100"><i class="ph-bold ph-caret-left"></i></button>
            <h2 class="text-xl font-black uppercase italic tracking-tighter">Historial Elite</h2>
            <div class="w-12"></div>
        </div>
        <div id="history-list" class="space-y-4"></div>
    </div>

    <div id="v-work" class="view">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-black italic tracking-tighter" id="work-id"></h2>
                <p class="text-[9px] font-bold text-black/30 uppercase tracking-[0.3em]">Operación en tiempo real</p>
            </div>
            <button onclick="finishProcess()" class="px-6 py-3 btn-luxury bg-green-500 text-white border-none text-[9px]">FINALIZAR</button>
        </div>

        <div class="glass-card p-10 text-center mb-8">
            <select id="work-sel" onchange="refreshWorkUI()" class="w-full mb-8 font-extrabold text-2xl text-center border-none bg-gray-50"></select>
            <div class="flex items-center justify-center gap-6">
                <input type="number" id="work-val" class="w-32 text-5xl font-black text-center border-none" placeholder="0">
                <button onclick="commitValue()" class="w-20 h-20 rounded-3xl bg-black text-white flex items-center justify-center shadow-xl">
                    <i class="ph-bold ph-plus text-3xl"></i>
                </button>
            </div>
        </div>

        <div id="work-stats" class="space-y-3 flex-1 overflow-y-auto"></div>
    </div>

    <script>
        const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let masterItems = [], queue = [], currentOp = null;

        window.onload = async () => {
            renderHistory();
            try { 
                const res = await fetch(SHEETS_URL); 
                masterItems = await res.json(); 
            } catch(e) { console.error("Error Maestra"); }
        };

        function navTo(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            if(v === 'hist') renderHistory();
        }

        // --- CREACIÓN ---
        function searchInMaster(q) {
            const resDiv = document.getElementById('results');
            if (q.length < 2) { resDiv.classList.add('hidden'); return; }
            const m = masterItems.filter(p => p.sku.toLowerCase().includes(q.toLowerCase())).slice(0, 5);
            resDiv.innerHTML = m.map(x => `<div onclick="selectFromMaster('${x.sku}')" class="p-5 border-b border-gray-50 font-bold text-sm hover:bg-gray-50">${x.sku}</div>`).join('');
            resDiv.classList.remove('hidden');
        }
        function selectFromMaster(s) { document.getElementById('sku-search').value = s; document.getElementById('results').classList.add('hidden'); }

        function addSku() {
            const s = document.getElementById('sku-search').value, m = parseInt(document.getElementById('sku-meta').value);
            if(!s || !m) return;
            queue.push({ sku: s, meta: m, r: 0 });
            document.getElementById('sku-search').value = ''; document.getElementById('sku-meta').value = '';
            renderQueue();
        }
        function renderQueue() {
            document.getElementById('pre-list').innerHTML = queue.map((x, i) => `
                <div class="glass-card p-5 flex justify-between items-center animate-pulse">
                    <span class="font-bold text-sm">${x.sku} <span class="ml-3 opacity-30 text-[10px]">META: ${x.meta}</span></span>
                    <button onclick="queue.splice(${i},1);renderQueue()" class="text-red-400 w-10 h-10 flex items-center justify-center"><i class="ph-bold ph-trash"></i></button>
                </div>`).join('');
        }

        async function confirmAndSave() {
            if(queue.length === 0) return;
            const op = { id: `TJ-${Math.floor(Math.random()*9000+1000)}`, date: new Date().toLocaleString(), items: [...queue], done: false };
            let history = JSON.parse(localStorage.getItem('tajho_elite_v1') || '[]');
            history.unshift(op);
            localStorage.setItem('tajho_elite_v1', JSON.stringify(history));
            
            // Invisible Background Sync (Hoja 2)
            fetch(SHEETS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ accion: 'guardar_contenedor', ...op }) });

            queue = []; renderQueue();
            navTo('hist');
        }

        // --- HISTORIAL ---
        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('tajho_elite_v1') || '[]');
            document.getElementById('history-list').innerHTML = h.map((x, i) => `
                <div class="glass-card p-6 flex justify-between items-center">
                    <div>
                        <p class="text-[8px] font-black text-black/20 mb-1 uppercase">${x.date}</p>
                        <p class="text-lg font-black italic tracking-tighter">${x.id}</p>
                    </div>
                    ${x.done ? 
                        `<button onclick="downloadPDF(${i})" class="w-14 h-14 rounded-full bg-black text-white flex items-center justify-center shadow-lg"><i class="ph-bold ph-file-pdf text-xl"></i></button>` : 
                        `<button onclick="openProcess(${i})" class="px-6 py-3 rounded-2xl bg-gray-100 text-black font-black text-[9px] uppercase tracking-widest">Descargar</button>`
                    }
                </div>`).join('') || '<div class="text-center py-20 opacity-20 font-bold uppercase text-xs tracking-[0.5em]">Limpio</div>';
        }

        // --- TRABAJO REAL ---
        function openProcess(idx) {
            const h = JSON.parse(localStorage.getItem('tajho_elite_v1') || '[]');
            currentOp = { ...h[idx], localIdx: idx };
            navTo('work');
            document.getElementById('work-id').innerText = currentOp.id;
            document.getElementById('work-sel').innerHTML = currentOp.items.map(x => `<option value="${x.sku}">${x.sku}</option>`).join('');
            refreshWorkUI();
        }

        function commitValue() {
            const val = parseInt(document.getElementById('work-val').value);
            if(!val && val !== 0) return;
            const sku = document.getElementById('work-sel').value;
            const item = currentOp.items.find(x => x.sku === sku);
            item.r += val;
            document.getElementById('work-val').value = '';
            refreshWorkUI();
            // Guardado automático local
            updateLocalStorage();
        }

        function refreshWorkUI() {
            document.getElementById('work-stats').innerHTML = currentOp.items.map(x => `
                <div class="glass-card p-5">
                    <div class="flex justify-between text-[10px] font-black uppercase mb-3">
                        <span>${x.sku}</span>
                        <span class="opacity-40 tracking-widest">${x.r} / ${x.meta}</span>
                    </div>
                    <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full bg-black" style="width:${Math.min((x.r/x.meta)*100,100)}%"></div>
                    </div>
                </div>`).join('');
        }

        function updateLocalStorage() {
            let h = JSON.parse(localStorage.getItem('tajho_elite_v1') || '[]');
            h[currentOp.localIdx] = currentOp;
            localStorage.setItem('tajho_elite_v1', JSON.stringify(h));
        }

        async function finishProcess() {
            currentOp.done = true;
            updateLocalStorage();
            // Invisible Sync Final
            fetch(SHEETS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ accion: 'finalizar_conteo', ...currentOp }) });
            alert("Operación completada satisfactoriamente.");
            navTo('hist');
        }

        // --- PDF ---
        function downloadPDF(idx) {
            const d = JSON.parse(localStorage.getItem('tajho_elite_v1') || '[]')[idx];
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header Minimalista
            doc.setFillColor(245, 247, 249); doc.rect(0, 0, 210, 297, 'F');
            doc.setTextColor(0); doc.setFontSize(28); doc.setFont("helvetica", "bold"); doc.text("TAJHO ELITE", 14, 30);
            doc.setFontSize(8); doc.setFont("helvetica", "normal"); doc.text(`REPORTE DE LOGÍSTICA • ${d.id}`, 14, 38);
            doc.text(`FECHA: ${d.date}`, 14, 43);

            doc.autoTable({
                startY: 55,
                head: [['PRODUCTO SKU', 'META', 'CONTEO REAL', 'DIFERENCIA']],
                body: d.items.map(it => [it.sku, it.meta, it.r, (it.r - it.meta)]),
                theme: 'striped',
                headStyles: { fillColor: [0, 0, 0], textColor: [255, 255, 255], fontStyle: 'bold' },
                styles: { font: 'helvetica', fontSize: 9 }
            });

            const finalY = doc.lastAutoTable.finalY + 30;
            doc.setDrawColor(200); doc.line(14, finalY, 100, finalY);
            doc.setFontSize(9); doc.setFont("helvetica", "bold");
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, finalY + 8);
            doc.setFont("helvetica", "normal"); doc.text("Asist. Inventario Logístico", 14, finalY + 13);
            
            doc.save(`Tajho_${d.id}.pdf`);
        }
    </script>
</body>
</html>
