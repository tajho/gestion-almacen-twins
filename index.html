<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twins Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #f0f4f8; --accent: #3b82f6; --text-primary: #1e293b; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--main-bg); color: var(--text-primary); margin: 0; }

        /* Estética Neumórfica Profesional (No plana) */
        .neu-inset { border-radius: 20px; background: #f0f4f8; box-shadow: inset 6px 6px 12px #ced4da, inset -6px -6px 12px #ffffff; }
        .neu-flat { border-radius: 24px; background: #f0f4f8; box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff; border: 1px solid rgba(255,255,255,0.4); }
        .neu-button { border-radius: 16px; background: #f0f4f8; box-shadow: 4px 4px 8px #d1d9e6, -4px -4px 8px #ffffff; transition: 0.2s; }
        .neu-button:active { box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff; transform: scale(0.98); }

        .view { display: none; min-height: 100vh; padding: 2rem 1.5rem; flex-direction: column; }
        .view.active { display: flex; animation: smoothReveal 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes smoothReveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Pantalla de carga inteligente */
        .loading-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.3; } }
    </style>
</head>
<body>

    <nav class="fixed top-0 left-0 right-0 h-20 px-6 flex justify-between items-center z-50">
        <div class="neu-flat px-4 py-2 flex items-center gap-2">
            <div class="w-3 h-3 bg-emerald-500 rounded-full shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
            <span class="text-xs font-black tracking-widest uppercase">Twins Hub</span>
        </div>
        <button onclick="navTo('historial')" class="neu-button w-12 h-12 flex items-center justify-center">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
        </button>
    </nav>

    <div id="view-home" class="view active pt-24">
        <div class="mb-10">
            <h1 class="text-4xl font-black tracking-tighter text-slate-900 leading-none mb-2">Control de<br>Flujos.</h1>
            <p class="text-sm font-semibold text-slate-500 italic">Optimización por J. Angelo Nuñez Durand</p>
        </div>

        <div class="grid gap-6">
            <div onclick="navTo('crear')" class="neu-flat p-8 flex flex-col gap-6 group active:bg-blue-50 transition-colors">
                <div class="w-14 h-14 neu-button flex items-center justify-center text-blue-600">
                    <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                </div>
                <div>
                    <h3 class="text-2xl font-black text-slate-800">Nueva Carga</h3>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mt-1">Configurar despacho inteligente</p>
                </div>
            </div>

            <div onclick="navTo('historial')" class="neu-flat p-8 flex items-center justify-between">
                <div>
                    <h3 class="text-lg font-black text-slate-800 uppercase">Historial</h3>
                    <p class="text-xs font-bold text-slate-400">REPORTES DE AUDITORÍA</p>
                </div>
                <div class="w-10 h-10 neu-button flex items-center justify-center text-slate-400">→</div>
            </div>
        </div>
    </div>

    <div id="view-crear" class="view pt-24">
        <button onclick="navTo('home')" class="mb-8 text-xs font-black text-slate-400 tracking-widest uppercase flex items-center gap-2">
            <span class="text-lg">←</span> Volver al Hub
        </button>

        <div class="neu-flat p-8 space-y-8">
            <div class="space-y-3">
                <label class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] ml-2">Referencia de Despacho</label>
                <input type="text" id="c-id" class="neu-inset w-full p-5 font-black text-xl outline-none text-slate-700 placeholder:text-slate-300 uppercase" placeholder="ID CONTENEDOR">
            </div>

            <div class="relative space-y-3">
                <label class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] ml-2">Selección de SKU</label>
                <input type="text" id="s-sku" oninput="searchData()" class="neu-inset w-full p-5 font-bold outline-none text-slate-700" placeholder="Buscar por código...">
                <div id="results" class="absolute z-50 left-0 right-0 neu-flat mt-2 hidden max-h-60 overflow-y-auto bg-[#f0f4f8]"></div>
            </div>

            <div class="flex gap-4">
                <div class="flex-1 space-y-3">
                    <label class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] ml-2">Meta</label>
                    <input type="number" id="s-meta" class="neu-inset w-full p-5 text-center text-2xl font-black outline-none" placeholder="0">
                </div>
                <button onclick="pushItem()" class="neu-button w-20 h-20 flex items-center justify-center text-3xl font-black text-blue-600 mt-6">＋</button>
            </div>
        </div>

        <div id="staged-list" class="mt-8 space-y-4 pb-32"></div>

        <div class="fixed bottom-0 left-0 right-0 p-8 bg-[#f0f4f8]/80 backdrop-blur-xl">
            <button onclick="startOperation()" class="neu-button w-full p-6 text-sm font-black text-blue-600 uppercase tracking-[0.2em]">Ejecutar Operación</button>
        </div>
    </div>

    <div id="view-ops" class="view pt-24">
        <div class="neu-flat p-8 mb-8 border-t-4 border-t-blue-500">
            <div class="flex justify-between items-start mb-6">
                <span id="op-tag" class="text-[10px] font-black bg-blue-600 text-white px-3 py-1 rounded-full uppercase tracking-widest"></span>
                <div class="loading-dot"></div>
            </div>
            
            <select id="sel-sku" onchange="refreshUI()" class="w-full bg-transparent text-3xl font-black outline-none mb-10 appearance-none text-slate-800"></select>
            
            <div class="flex gap-6">
                <input type="number" id="qty-in" class="neu-inset flex-1 h-24 text-center text-5xl font-black outline-none text-blue-600" placeholder="0">
                <button onclick="commitCount()" class="neu-button w-24 h-24 flex items-center justify-center">
                    <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" class="text-emerald-500"><path d="M5 13l4 4L19 7"/></svg>
                </button>
            </div>
        </div>

        <div id="op-progress-feed" class="space-y-6 pb-48"></div>

        <div class="fixed bottom-0 left-0 right-0 p-8 bg-[#f0f4f8]/90 backdrop-blur-md flex gap-4">
            <button onclick="completeJob()" class="neu-button flex-1 p-6 text-xs font-black uppercase text-emerald-600 tracking-widest">Cerrar Auditoría & PDF</button>
        </div>
    </div>

    <div id="view-historial" class="view pt-24">
        <button onclick="navTo('home')" class="mb-10 text-xs font-black text-slate-400 tracking-widest uppercase">← Volver</button>
        <div id="history-feed" class="space-y-6 pb-20"></div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let localData = {};
        let stagedItems = [];
        let sessionActive = null;

        async function init() {
            try {
                const r = await fetch(API);
                const d = await r.json();
                d.forEach(i => { if(i.CODIGO) localData[i.CODIGO.toString().trim().toUpperCase()] = i.DESCRIPCION; });
            } catch(e) {}
            
            const saved = localStorage.getItem('twins_hub_session');
            if(saved) { sessionActive = JSON.parse(saved); navTo('ops'); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'historial') renderHistory();
            if(v === 'ops' && sessionActive) refreshUI();
        }

        function searchData() {
            const val = document.getElementById('s-sku').value.toUpperCase().trim();
            const res = document.getElementById('results');
            if(val.length < 2) { res.classList.add('hidden'); return; }
            const matches = Object.entries(localData).filter(([k,v]) => k.includes(val) || v.toUpperCase().includes(val)).slice(0, 5);
            res.innerHTML = matches.map(([k,v]) => `
                <div onclick="pickProd('${k}')" class="p-6 border-b border-white/50 active:bg-blue-50">
                    <p class="font-black text-slate-800 text-sm">${k}</p>
                    <p class="text-[10px] font-bold text-slate-400 uppercase truncate">${v}</p>
                </div>
            `).join('');
            res.classList.remove('hidden');
        }

        function pickProd(k) {
            document.getElementById('s-sku').value = k;
            document.getElementById('results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function pushItem() {
            const sku = document.getElementById('s-sku').value.toUpperCase();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            stagedItems.push({ sku, desc: localData[sku] || "MANUAL_INPUT", meta, real: 0 });
            renderStaged();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderStaged() {
            document.getElementById('staged-list').innerHTML = stagedItems.map((i, idx) => `
                <div class="neu-flat p-6 flex justify-between items-center">
                    <div><p class="font-black text-slate-800">${i.sku}</p><p class="text-[10px] font-black text-slate-400 uppercase">META: ${i.meta} UNIDADES</p></div>
                    <button onclick="stagedItems.splice(${idx},1);renderStaged()" class="text-red-400 font-black">QUITAR</button>
                </div>
            `).join('');
        }

        function startOperation() {
            if(stagedItems.length === 0) return;
            const id = document.getElementById('c-id').value.toUpperCase() || "HUB-" + Date.now().toString().slice(-4);
            sessionActive = { id, items: [...stagedItems], date: new Date().toLocaleString(), status: 'ACTIVE' };
            localStorage.setItem('twins_hub_session', JSON.stringify(sessionActive));
            
            let h = JSON.parse(localStorage.getItem('twins_hub_history')) || [];
            h.unshift(sessionActive);
            localStorage.setItem('twins_hub_history', JSON.stringify(h));
            
            stagedItems = [];
            navTo('ops');
        }

        function refreshUI() {
            document.getElementById('op-tag').innerText = sessionActive.id;
            document.getElementById('sel-sku').innerHTML = sessionActive.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            renderLiveProgress();
        }

        function commitCount() {
            const val = parseInt(document.getElementById('qty-in').value);
            if(!val) return;
            const t = sessionActive.items.find(i => i.sku === document.getElementById('sel-sku').value);
            if(t) t.real += val;
            document.getElementById('qty-in').value = '';
            localStorage.setItem('twins_hub_session', JSON.stringify(sessionActive));
            renderLiveProgress();
        }

        function renderLiveProgress() {
            document.getElementById('op-progress-feed').innerHTML = sessionActive.items.map(i => {
                const pc = Math.min(Math.round((i.real / i.meta) * 100), 100);
                const isSel = i.sku === document.getElementById('sel-sku').value;
                return `
                <div class="neu-flat p-6 transition-all ${isSel ? 'border-2 border-blue-500 scale-[1.02]' : 'opacity-40'}">
                    <div class="flex justify-between items-end mb-4">
                        <span class="text-xs font-black text-slate-800 uppercase tracking-widest">${i.sku}</span>
                        <span class="text-2xl font-black">${i.real}<span class="text-xs text-slate-300">/${i.meta}</span></span>
                    </div>
                    <div class="neu-inset h-3 w-full overflow-hidden"><div class="h-full bg-blue-500" style="width:${pc}%"></div></div>
                </div>`;
            }).join('');
        }

        function completeJob() {
            if(!confirm("¿CERRAR AUDITORÍA Y GENERAR DOCUMENTO OFICIAL?")) return;
            let h = JSON.parse(localStorage.getItem('twins_hub_history')) || [];
            const idx = h.findIndex(x => x.id === sessionActive.id && x.status !== 'CLOSED');
            sessionActive.status = 'CLOSED';
            if(idx !== -1) h[idx] = sessionActive;
            localStorage.setItem('twins_hub_history', JSON.stringify(h));
            
            exportPDF(sessionActive);
            localStorage.removeItem('twins_hub_session');
            sessionActive = null;
            navTo('home');
        }

        function exportPDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(30, 41, 59); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.setFont("helvetica", "bold"); doc.text("REPORTE DE AUDITORÍA TWINS", 14, 25);
            doc.setFontSize(9); doc.text("HUB DE INTELIGENCIA LOGÍSTICA - REGISTRO DE SALIDAS", 14, 32);
            
            doc.setTextColor(50); doc.setFontSize(10);
            doc.text(`CÓDIGO OPERATIVO: ${data.id}`, 14, 52);
            doc.text(`FECHA DE REGISTRO: ${data.date}`, 14, 57);

            doc.autoTable({
                startY: 65,
                head: [['SKU / CODIGO', 'PRODUCTO', 'META', 'CONTADO', 'ESTADO']],
                body: data.items.map(i => [i.sku, i.desc.slice(0,35), i.meta, i.real, (i.real >= i.meta ? 'OK' : 'PENDIENTE')]),
                theme: 'striped',
                headStyles: { fillColor: [59, 130, 246] }
            });

            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 20);
            doc.save(`Twins_Hub_${data.id}.pdf`);
        }

        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('twins_hub_history')) || [];
            document.getElementById('history-feed').innerHTML = h.map(x => `
                <div class="neu-flat p-6 border-l-8 ${x.status === 'CLOSED' ? 'border-l-emerald-400' : 'border-l-blue-400'}">
                    <div class="flex justify-between items-start mb-6">
                        <div><p class="text-[10px] font-black text-slate-400 mb-1 tracking-widest uppercase">${x.date}</p><h3 class="text-2xl font-black italic tracking-tighter">${x.id}</h3></div>
                        <span class="text-[10px] font-black px-3 py-1 neu-button uppercase">${x.status}</span>
                    </div>
                    <button onclick='exportPDF(${JSON.stringify(x)})' class="neu-button w-full py-4 text-[10px] font-black uppercase tracking-[0.2em] text-blue-600">Exportar Reporte Oficial</button>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
