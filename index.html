<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS G-FORCE | Logistics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #0A0A0C;
            --accent: #007AFF;
            --card: rgba(28, 28, 30, 0.8);
            --text: #FFFFFF;
            --danger: #FF453A;
            --success: #32D74B;
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        /* Header Estilo Minimalista */
        .header-pro {
            padding: 40px 25px 20px;
            background: linear-gradient(to bottom, #1C1C1E, var(--bg));
        }
        .header-pro h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin: 0; }
        .header-pro span { color: var(--accent); font-size: 12px; font-weight: 600; text-transform: uppercase; }

        /* Tarjetas Estilo Glassmorphism */
        .action-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 25px;
            margin: 0 15px 20px;
        }

        /* Buscador Flotante */
        .search-box-pro { position: relative; }
        .search-input {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 16px 16px 16px 50px;
            color: white;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
        }
        .search-input:focus { background: rgba(255,255,255,0.15); border-color: var(--accent); outline: none; }
        .search-icon { position: absolute; left: 18px; top: 18px; color: var(--accent); }

        /* Sugerencias Inteligentes */
        .sug-dropdown {
            background: #1C1C1E;
            border-radius: 20px;
            margin-top: 10px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .sug-item { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .sug-item b { display: block; font-size: 14px; }
        .sug-item small { color: var(--accent); font-weight: 700; }

        /* Botones de Acción Rápida */
        .btn-main {
            border-radius: 20px;
            padding: 18px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            width: 100%;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-accent { background: var(--accent); color: white; }
        .btn-danger-pro { background: var(--danger); color: white; }
        .btn-success-pro { background: var(--success); color: black; }
        .btn-main:active { transform: scale(0.95); }

        /* Lista de Items (Carrito) */
        .item-row {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Bottom Tab Navigation */
        .tab-nav {
            position: fixed;
            bottom: 25px;
            left: 20px;
            right: 20px;
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            padding: 12px 10px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        .tab-btn { border: none; background: none; color: #8E8E93; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .tab-btn.active { color: var(--accent); }
        .tab-btn i { font-size: 22px; margin-bottom: 5px; }
        .tab-btn span { font-size: 10px; font-weight: 600; }

        .view { display: none; } .view.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        input, select { background: rgba(255,255,255,0.08) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 15px !important; padding: 12px !important; }
    </style>
</head>
<body>

    <header class="header-pro">
        <span>Inventory Warehouse Manager</span>
        <h1>TWINS G-FORCE</h1>
    </header>

    <main id="main">
        <section id="v-salidas" class="view active">
            <div class="action-card">
                <div class="search-box-pro mb-4">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="iSal" class="search-input" placeholder="Buscar Producto / SKU..." oninput="fastSearch(this.value, 'sugSal', 'sal')">
                    <div id="sugSal" class="sug-dropdown"></div>
                </div>

                <div id="selSal" class="d-none animate__animated animate__fadeIn">
                    <div class="p-3 mb-3" style="background: rgba(0,122,255,0.1); border-radius: 20px; border-left: 5px solid var(--accent);">
                        <div id="nSal" class="fw-bold"></div>
                        <div id="sSal" class="small opacity-50"></div>
                    </div>
                    <div class="row g-2 mb-4">
                        <div class="col-4"><input type="number" id="cSal" class="form-control" placeholder="Cant."></div>
                        <div class="col-8"><button class="btn-main btn-accent" onclick="add('sal')">AÑADIR <i class="fas fa-plus-circle"></i></button></div>
                    </div>
                </div>

                <div id="listSalArea" class="d-none">
                    <h6 class="small fw-bold opacity-50 mb-3 text-uppercase">Lista de Carga</h6>
                    <div id="contSal" class="mb-4"></div>
                    <input type="text" id="whoSal" class="form-control mb-2" placeholder="Responsable">
                    <select id="typeSal" class="form-select mb-4">
                        <option value="MARKETING">MARKETING</option>
                        <option value="OFICINA">OFICINA</option>
                        <option value="VENDEDOR">VENDEDOR</option>
                    </select>
                    <button class="btn-main btn-success-pro" onclick="save('Pedidos', 'sal')">CONFIRMAR SALIDA <i class="fas fa-shipping-fast"></i></button>
                </div>
            </div>
        </section>

        <section id="v-dev" class="view">
            <div class="action-card">
                <div class="search-box-pro mb-4">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="iDev" class="search-input" placeholder="Buscar para devolver..." oninput="fastSearch(this.value, 'sugDev', 'dev')">
                    <div id="sugDev" class="sug-dropdown"></div>
                </div>

                <div id="selDev" class="d-none animate__animated animate__fadeIn">
                    <div class="p-3 mb-3" style="background: rgba(255,69,58,0.1); border-radius: 20px; border-left: 5px solid var(--danger);">
                        <div id="nDev" class="fw-bold"></div>
                        <div id="sDev" class="small opacity-50"></div>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-4"><input type="number" id="cDev" class="form-control" placeholder="Cant."></div>
                        <div class="col-8">
                            <select id="mDev" class="form-select">
                                <option>Dañado / Mal estado</option>
                                <option>Rotación / Cambio</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn-main btn-danger-pro" onclick="add('dev')">AÑADIR A RETORNO <i class="fas fa-undo"></i></button>
                </div>

                <div id="listDevArea" class="d-none mt-4">
                    <h6 class="small fw-bold opacity-50 mb-3 text-uppercase">Productos a Recibir</h6>
                    <div id="contDev" class="mb-4"></div>
                    <input type="text" id="cliDev" class="form-control mb-4" placeholder="Cliente / Origen">
                    <button class="btn-main btn-success-pro" onclick="save('Devoluciones', 'dev')">TERMINAR Y PDF <i class="fas fa-file-pdf"></i></button>
                </div>
            </div>
        </section>

        <section id="v-hist" class="view">
            <div id="histContent" class="px-3">Cargando base de datos...</div>
        </section>
    </main>

    <nav class="tab-nav">
        <button class="tab-btn active" onclick="nav('salidas', this)"><i class="fas fa-box-open"></i><span>Despacho</span></button>
        <button class="tab-btn" onclick="nav('dev', this)"><i class="fas fa-box-tissue"></i><span>Retorno</span></button>
        <button class="tab-btn" onclick="nav('hist', this)"><i class="fas fa-clock-rotate-left"></i><span>Historial</span></button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCeMB7Cf1DpA41NEmprwR0XqrvdD_-xTEbl3vKsMlaHIp_r3b5MpMWcbrQKyOiYFF2NQ/exec"; // <--- PEGA TU URL DE GOOGLE APPS SCRIPT
        let DB = []; let L_SAL = []; let L_DEV = []; let SEL = null;

        async function init() {
            const r = await fetch(API, {method: "POST", body: JSON.stringify({action: "load"})});
            const d = await r.json();
            DB = d.p;
            renderHist(d.h);
        }

        function fastSearch(v, bId, t) {
            const b = document.getElementById(bId);
            if(v.length < 2) { b.style.display='none'; return; }
            const m = DB.filter(p => p[0].toString().toLowerCase().includes(v.toLowerCase()) || p[1].toString().toLowerCase().includes(v.toLowerCase())).slice(0,5);
            b.innerHTML = m.map(p => `<div class="sug-item" onclick="select('${p[0]}','${p[1]}','${t}')"><b>${p[1]}</b><small>${p[0]}</small></div>`).join('');
            b.style.display='block';
        }

        function select(s, n, t) {
            SEL = {s, n};
            document.getElementById('n'+(t==='sal'?'Sal':'Dev')).innerText = n;
            document.getElementById('s'+(t==='sal'?'Sal':'Dev')).innerText = "SKU: " + s;
            document.getElementById('sel'+(t==='sal'?'Sal':'Dev')).classList.remove('d-none');
            document.getElementById('sug'+(t==='sal'?'Sal':'Dev')).style.display='none';
            document.getElementById('i'+(t==='sal'?'Sal':'Dev')).value = s;
        }

        function add(t) {
            const c = document.getElementById('c'+(t==='sal'?'Sal':'Dev')).value;
            if(!c) return;
            if(t === 'sal') {
                L_SAL.push({...SEL, c});
                renderUI('sal');
            } else {
                const m = document.getElementById('mDev').value;
                L_DEV.push({...SEL, c, m});
                renderUI('dev');
            }
            document.getElementById('sel'+(t==='sal'?'Sal':'Dev')).classList.add('d-none');
            document.getElementById('i'+(t==='sal'?'Sal':'Dev')).value = "";
        }

        function renderUI(t) {
            const cont = document.getElementById('cont'+(t==='sal'?'Sal':'Dev'));
            const area = document.getElementById('list'+(t==='sal'?'Sal':'Dev')+'Area');
            const list = t === 'sal' ? L_SAL : L_DEV;
            area.classList.remove('d-none');
            cont.innerHTML = list.map(i => `
                <div class="item-row">
                    <div><b>${i.n}</b><br><small class="opacity-50">${i.s} ${i.m ? '| '+i.m : ''}</small></div>
                    <span class="badge bg-primary rounded-pill px-3">${i.c}</span>
                </div>
            `).join('');
        }

        async function save(sheet, t) {
            const q = document.getElementById(t==='sal'?'whoSal':'cliDev').value;
            if(!q) return Swal.fire("Datos Faltantes", "Escribe el nombre del responsable", "warning");
            
            const list = t === 'sal' ? L_SAL : L_DEV;
            const payload = list.map(i => [new Date(), t==='sal'?document.getElementById('typeSal').value:'DEVOLUCION', i.s, i.n, i.c, q, i.m || 'PENDIENTE SAP']);
            
            Swal.fire({title: 'Sincronizando...', didOpen: () => Swal.showLoading()});
            await fetch(API, {method: "POST", body: JSON.stringify({action: "save", sheet, payload})});
            
            if(t === 'dev') genPDF(q, list);
            Swal.fire("¡Completado!", "Datos guardados en la nube", "success").then(()=>location.reload());
        }

        function genPDF(q, list) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(22); doc.text("REPORTE DE BODEGA - TWINS", 20, 25);
            doc.setFontSize(10); doc.text(`Cliente/Responsable: ${q}`, 20, 40);
            doc.text(`Fecha: ${new Date().toLocaleString()}`, 20, 45);
            doc.line(20, 50, 190, 50);
            let y = 60;
            list.forEach(i => {
                doc.text(`${i.n} (${i.s})`, 20, y);
                doc.text(`Cant: ${i.c} | ${i.m}`, 140, y);
                y += 10;
            });
            doc.save(`Reporte_${q}.pdf`);
        }

        function renderHist(l) {
            document.getElementById('histContent').innerHTML = l.map(r => `
                <div class="action-card py-3 mb-2" style="border-radius:20px">
                    <div class="d-flex justify-content-between small opacity-50 mb-1"><span>${r[1]}</span> <span>${new Date(r[0]).toLocaleDateString()}</span></div>
                    <div class="fw-bold">${r[3]}</div>
                    <div class="d-flex justify-content-between mt-2"><small>${r[5]}</small> <b class="text-primary">x${r[4]}</b></div>
                </div>
            `).join('');
        }

        function nav(v, b) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            const id = v === 'salidas' ? 'v-salidas' : (v === 'dev' ? 'v-dev' : 'v-hist');
            document.getElementById(id).classList.add('active');
            b.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
