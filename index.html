<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogiMaster Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .input-field { @apply w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm; }
        .hidden { display: none !important; }
        .active-tab { @apply text-blue-600 bg-blue-50 rounded-2xl; }
        /* Optimización para móviles */
        input, select { font-size: 16px !important; } 
    </style>
</head>
<body class="pb-32">

    <header class="bg-white/80 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-slate-100 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-black text-slate-800 tracking-tighter">LOGIMASTER<span class="text-blue-600">PRO</span></h1>
        </div>
        <div id="status-cloud" class="text-[9px] font-bold text-green-500 bg-green-50 px-2 py-1 rounded-full uppercase">Memoria Local OK</div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <section id="vista-ingreso" class="space-y-4">
            <h2 class="text-lg font-black text-slate-800 px-1 italic">🚢 Registro de Contenedor</h2>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-3">
                <input type="text" id="cont_id" placeholder="N° Contenedor (Ej: ABCU123)" class="input-field font-bold uppercase">
                <input type="date" id="cont_fecha" class="input-field">
            </div>
            
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <div id="lista-ingreso" class="divide-y divide-slate-50">
                    </div>
                <button onclick="agregarFila('lista-ingreso')" class="w-full p-4 text-blue-600 text-xs font-bold bg-slate-50">+ AÑADIR PRODUCTO</button>
            </div>
            <button onclick="guardarRegistro('CONTENEDOR')" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform uppercase text-sm tracking-widest">Finalizar y Guardar</button>
        </section>

        <section id="vista-devolucion" class="space-y-4 hidden">
            <h2 class="text-lg font-black text-slate-800 px-1 italic">📦 Registro de Devolución</h2>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-3">
                <input type="text" id="dev_cliente" placeholder="Nombre del Cliente" class="input-field font-bold">
                <input type="text" id="dev_vendedor" placeholder="Nombre del Vendedor" class="input-field">
            </div>
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <div id="lista-devolucion" class="divide-y divide-slate-50"></div>
                <button onclick="agregarFila('lista-devolucion')" class="w-full p-4 text-orange-600 text-xs font-bold bg-slate-50">+ AÑADIR PRODUCTO</button>
            </div>
            <button onclick="guardarRegistro('DEVOLUCION')" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform uppercase text-sm tracking-widest">Registrar Devolución</button>
        </section>

        <section id="vista-historial" class="space-y-4 hidden">
            <h2 class="text-lg font-black text-slate-800 px-1 italic">🔍 Buscador e Historial</h2>
            <input type="text" id="input-busqueda" onkeyup="renderizarHistorial()" placeholder="Buscar por código, cliente o contenedor..." class="input-field shadow-sm border-none">
            
            <div id="contenedor-historial" class="space-y-3">
                </div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full bg-white/90 backdrop-blur-lg border-t border-slate-100 p-2 pb-6 flex justify-around items-center">
        <button onclick="cambiarVista('vista-ingreso', this)" class="active-tab p-3 flex flex-col items-center flex-1">
            <span class="text-xl">🚢</span>
            <span class="text-[9px] font-bold uppercase mt-1">Ingreso</span>
        </button>
        <button onclick="cambiarVista('vista-devolucion', this)" class="p-3 flex flex-col items-center flex-1 text-slate-400">
            <span class="text-xl">📦</span>
            <span class="text-[9px] font-bold uppercase mt-1">Devolución</span>
        </button>
        <button onclick="cambiarVista('vista-historial', this)" class="p-3 flex flex-col items-center flex-1 text-slate-400">
            <span class="text-xl">📋</span>
            <span class="text-[9px] font-bold uppercase mt-1">Historial</span>
        </button>
    </nav>

    <script>
        // 1. BASE DE DATOS MAESTRA (Conocimiento de productos)
        const maestra = [
            { cod: "ZAP-01", desc: "Zapatilla Deportiva X", pack: "12 und" },
            { cod: "PAN-05", desc: "Pantalon Jean Premium", pack: "20 und" },
            { cod: "GOR-09", desc: "Gorra Trucker Azul", pack: "50 und" }
        ];

        // 2. SISTEMA DE PERSISTENCIA (LocalStorage)
        let baseDeDatos = JSON.parse(localStorage.getItem('logi_records')) || [
            { id: "CONT-778", tipo: "CONTENEDOR", fecha: "2026-03-07", detalle: "Zapatilla Deportiva X (45 und)", estado: "COMPLETO" },
            { id: "DEV-102", tipo: "DEVOLUCION", fecha: "2026-03-08", detalle: "Cliente: Juan Perez - Pantalon Jean (2 und)", estado: "FALLA" }
        ];

        function cambiarVista(id, btn) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab', 'text-blue-600'));
            btn.classList.add('active-tab', 'text-blue-600');
            if(id === 'vista-historial') renderizarHistorial();
        }

        function agregarFila(contenedorId) {
            const div = document.getElementById(contenedorId);
            const fila = document.createElement('div');
            fila.className = "p-4 space-y-2 relative";
            fila.innerHTML = `
                <div class="flex gap-2">
                    <input type="text" placeholder="CÓDIGO" oninput="validarCod(this)" class="w-1/3 p-2 bg-slate-50 border border-slate-100 rounded-lg text-xs font-bold uppercase outline-none">
                    <div class="w-2/3 p-2 text-[10px] text-slate-500 italic bg-slate-50 rounded-lg flex items-center desc-text">Esperando código...</div>
                </div>
                <div class="flex gap-2">
                    <input type="number" placeholder="CANT" class="w-1/2 p-2 bg-blue-50 border-none rounded-lg text-center font-bold text-blue-700 outline-none">
                    <select class="w-1/2 p-2 bg-slate-100 border-none rounded-lg text-[10px] font-bold outline-none">
                        <option>ÓPTIMO</option>
                        <option>DAÑADO</option>
                        <option>FALLA</option>
                        <option>NO VENTA</option>
                    </select>
                </div>
            `;
            div.appendChild(fila);
        }

        function validarCod(input) {
            const val = input.value.toUpperCase();
            const descDiv = input.nextElementSibling;
            const producto = maestra.find(p => p.cod === val);
            if(producto) {
                descDiv.innerText = producto.desc;
                descDiv.classList.add('text-blue-600', 'font-bold', 'not-italic');
            } else {
                descDiv.innerText = "No encontrado";
                descDiv.classList.remove('text-blue-600', 'font-bold', 'not-italic');
            }
        }

        function guardarRegistro(tipo) {
            const idDoc = tipo === 'CONTENEDOR' ? document.getElementById('cont_id').value : document.getElementById('dev_cliente').value;
            const fecha = tipo === 'CONTENEDOR' ? document.getElementById('cont_fecha').value : new Date().toISOString().split('T')[0];

            if(!idDoc) return alert("Por favor completa los datos principales");

            const nuevo = {
                id: idDoc.toUpperCase(),
                tipo: tipo,
                fecha: fecha,
                detalle: "Registro nuevo generado en app",
                estado: "REGISTRADO"
            };

            baseDeDatos.unshift(nuevo);
            localStorage.setItem('logi_records', JSON.stringify(baseDeDatos));
            alert("¡Registro guardado con éxito!\nRevisión autorizada por J. Angelo Nuñez Durand.");
            location.reload(); 
        }

        function renderizarHistorial() {
            const query = document.getElementById('input-busqueda').value.toLowerCase();
            const cont = document.getElementById('contenedor-historial');
            cont.innerHTML = '';

            const filtrados = baseDeDatos.filter(r => 
                r.id.toLowerCase().includes(query) || 
                r.tipo.toLowerCase().includes(query) ||
                r.fecha.includes(query)
            );

            filtrados.forEach(r => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl shadow-sm border-l-4 " + (r.tipo === 'CONTENEDOR' ? 'border-blue-500' : 'border-orange-500');
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] font-black text-slate-400 uppercase">${r.tipo}</span>
                        <span class="text-[10px] font-bold text-slate-400">${r.fecha}</span>
                    </div>
                    <h3 class="font-bold text-slate-800 uppercase mt-1">${r.id}</h3>
                    <p class="text-xs text-slate-500 mt-1">${r.detalle}</p>
                    <div class="mt-2 flex justify-end">
                        <button class="text-[10px] font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase">Ver PDF</button>
                    </div>
                `;
                cont.appendChild(card);
            });
        }

        window.onload = () => {
            agregarFila('lista-ingreso');
            agregarFila('lista-devolucion');
            renderizarHistorial();
        };
    </script>
</body>
</html>
