<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>INTELIGENCIA | Logística</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --accent: #007AFF; --bg: #F2F2F7; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 100px; }
        
        /* Círculo de carga corregido */
        #loader { 
            position: fixed; inset: 0; background: rgba(255,255,255,0.9); 
            z-index: 9999; display: flex; align-items: center; justify-content: center; 
            transition: opacity 0.5s ease;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px);
            padding: 20px; sticky: top; z-index: 1000; border-bottom: 0.5px solid #DDD;
        }
        .brand { font-weight: 800; font-size: 1.4rem; letter-spacing: -1px; }
        .brand span { color: var(--accent); }

        .app-card {
            background: #FFF; border-radius: 20px; padding: 20px;
            margin: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .smart-input {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #DDD;
            margin-bottom: 15px; font-size: 16px; background: #F9F9FB;
        }

        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 85px;
            background: white; display: flex; justify-content: space-around;
            padding-top: 10px; border-top: 0.5px solid #DDD; z-index: 1001;
        }
        .tab-item { background: none; border: none; color: #8E8E93; font-size: 10px; font-weight: 700; }
        .tab-item.active { color: var(--accent); }
        .tab-item i { font-size: 22px; display: block; margin-bottom: 5px; }

        .btn-apple {
            background: var(--accent); color: white; border: none; padding: 16px;
            border-radius: 15px; font-weight: 700; width: 100%;
        }
        .footer-auth { font-size: 9px; color: #8E8E93; text-align: center; margin-top: 15px; border-top: 1px solid #EEE; padding-top: 10px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="text-center">
            <div class="spinner-border text-primary mb-2"></div>
            <div class="small fw-bold">CONECTANDO...</div>
        </div>
    </div>

    <header class="glass-header">
        <div class="d-flex justify-content-between align-items-center">
            <div class="brand">INTELI<span>GENCIA</span></div>
            <div class="text-end" style="font-size: 11px;">
                <b class="d-block">J. Angelo Nuñez</b>
                <span class="text-muted">Inventario Logístico</span>
            </div>
        </div>
    </header>

    <main>
        <section id="v-ret" class="view">
            <div class="app-card">
                <h5 class="fw-bold mb-3"><i class="fas fa-undo text-danger me-2"></i>Retornos</h5>
                <label class="small fw-bold text-muted ms-1">CLIENTE / ÁREA</label>
                <input type="text" id="cli-r" class="smart-input" placeholder="Nombre del cliente" oninput="autoVendor(this.value, 'ven-r')">
                
                <label class="small fw-bold text-muted ms-1">VENDOR RESPONSABLE</label>
                <input type="text" id="ven-r" class="smart-input" placeholder="Vendedor">

                <label class="small fw-bold text-muted ms-1">BUSCAR PRODUCTO</label>
                <input type="text" id="src-r" class="smart-input" placeholder="SKU o Nombre..." oninput="searchP(this.value, 'res-r', 'r')">
                <div id="res-r" class="list-group mb-3 shadow-sm" style="display:none;"></div>

                <div id="form-r" class="d-none bg-light p-3 rounded-4 border mb-3">
                    <div id="p-n-r" class="fw-bold text-primary mb-3"></div>
                    <div class="row g-2 mb-3">
                        <div class="col-6"><input type="number" id="cg-r" class="smart-input mb-0" placeholder="Cant. Guía"></div>
                        <div class="col-6"><input type="number" id="cr-r" class="smart-input mb-0" placeholder="Cant. Real"></div>
                    </div>
                    <select id="st-r" class="smart-input">
                        <option value="MERMA">MERMA / FALLADO</option>
                        <option value="FALLA IMPORTACION">FALLA IMPORTACIÓN</option>
                        <option value="REINGRESO">REINGRESO STOCK</option>
                    </select>
                    <button class="btn-apple" onclick="addP('r')">Añadir a lista</button>
                </div>

                <div id="list-r" class="d-none">
                    <div id="cart-r" class="mb-3"></div>
                    <button class="btn-apple bg-dark" onclick="save('Devoluciones', 'r')">GUARDAR EN HISTORIAL</button>
                </div>
            </div>
        </section>

        <section id="v-his" class="view d-none">
            <div class="px-3 py-2">
                <input type="date" id="h-date" class="smart-input mb-2" onchange="renderH()">
                <input type="text" id="h-search" class="smart-input" placeholder="Buscar cliente..." oninput="renderH()">
            </div>
            <div id="feed-his"></div>
        </section>
    </main>

    <nav class="tab-bar">
        <button class="tab-item active" onclick="nav('ret', this)"><i class="fas fa-box-open"></i>RETORNOS</button>
        <button class="tab-item" onclick="nav('his', this)"><i class="fas fa-history"></i>HISTORIAL</button>
    </nav>

    <script>
        const API = "URL_DE_TU_SCRIPT"; 
        let MASTER = []; let HIS = []; let CART_R = [];

        async function init() {
            // Si en 4 segundos no responde la base de datos, entramos igual
            setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(()=> document.getElementById('loader').style.display='none', 500); }, 4000);

            try {
                const r = await fetch(API, {method:"POST", body: JSON.stringify({action:"load"})});
                const d = await r.json();
                MASTER = d.p; HIS = d.h;
                renderH();
            } catch(e) { console.log("Usando modo offline o error de link"); }
        }

        function searchP(v, b, t) {
            const box = document.getElementById(b);
            if(v.length < 1) { box.style.display='none'; return; }
            const m = MASTER.filter(p => p[1].toLowerCase().includes(v.toLowerCase()) || p[0].toString().includes(v)).slice(0,5);
            box.innerHTML = m.map(p => `<button class="list-group-item list-group-item-action" onclick="pick('${p[0]}','${p[1]}','${t}')"><b>${p[1]}</b><br><small>${p[0]}</small></button>`).join('');
            box.style.display = m.length ? 'block' : 'none';
        }

        function pick(s, n, t) {
            window.active = {s, n};
            document.getElementById(`p-n-${t}`).innerText = n;
            document.getElementById(`form-${t}`).classList.remove('d-none');
            document.getElementById(`res-${t}`).style.display='none';
        }

        function addP(t) {
            const q = document.getElementById('cr-r').value;
            if(!q) return;
            CART_R.push({...window.active, q, cg: document.getElementById('cg-r').value, st: document.getElementById('st-r').value});
            document.getElementById(`form-${t}`).classList.add('d-none');
            renderCart();
        }

        function renderCart() {
            const c = document.getElementById('cart-r');
            document.getElementById('list-r').classList.toggle('d-none', CART_R.length === 0);
            c.innerHTML = CART_R.map((i, idx) => `<div class="p-2 border-bottom d-flex justify-content-between"><span><b>${i.q}</b> x ${i.n}</span><i class="fas fa-times text-danger" onclick="CART_R.splice(${idx},1);renderCart()"></i></div>`).join('');
        }

        async function save(sh, t) {
            const cli = document.getElementById('cli-r').value;
            const ven = document.getElementById('ven-r').value;
            if(!cli || !ven) return Swal.fire("Atención", "Completa Cliente y Vendedor", "warning");

            const payload = CART_R.map(i => [new Date(), "RETORNO", i.s, i.n, i.q, cli, `Guía:${i.cg} | Motivo:${i.st} | V:${ven}`]);
            
            Swal.fire({title:'Guardando...', didOpen:()=>Swal.showLoading()});
            try {
                await fetch(API, {method:"POST", body: JSON.stringify({action:"save", sheet:sh, payload})});
                CART_R = []; renderCart();
                await init();
                Swal.fire("Éxito", "Registrado correctamente", "success");
            } catch(e) { Swal.fire("Error", "No se pudo conectar", "error"); }
        }

        function renderH() {
            const feed = document.getElementById('feed-his');
            const dateV = document.getElementById('h-date').value;
            const searchV = document.getElementById('h-search').value.toLowerCase();

            const filtered = HIS.filter(r => {
                const fecha = new Date(r[0]).toISOString().split('T')[0];
                const matchD = dateV ? fecha === dateV : true;
                const matchS = r[5].toLowerCase().includes(searchV);
                return matchD && matchS;
            }).reverse();

            feed.innerHTML = filtered.map(r => `
                <div class="app-card mb-2" style="padding:15px">
                    <div class="d-flex justify-content-between small mb-1">
                        <span class="badge ${r[1]=='RETORNO'?'bg-danger':'bg-primary'}">${r[1]}</span>
                        <span class="text-muted">${new Date(r[0]).toLocaleDateString()}</span>
                    </div>
                    <div class="fw-bold">${r[5]}</div>
                    <div class="small">${r[4]} uds. - ${r[3]}</div>
                    <div class="footer-auth">Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.</div>
                </div>
            `).join('');
        }

        function autoVendor(v, t) {
            if(v.toUpperCase().includes("GLOBAL")) document.getElementById(t).value = "GLOBAL LOGISTICS CORP";
        }

        function nav(v, btn) {
            document.querySelectorAll('.view').forEach(x => x.classList.add('d-none'));
            document.querySelectorAll('.tab-item').forEach(x => x.classList.remove('active'));
            document.getElementById('v-'+v).classList.remove('d-none');
            btn.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
