<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INBOUND VISION - ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #000000; --accent: #2563eb; --success: #10b981; --danger: #ef4444; --border: #e5e7eb; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #ffffff; color: #111827; margin: 0; padding: 0; }
        
        /* Header Moderno */
        .header { padding: 30px 20px; border-bottom: 1px solid var(--border); background: #fff; }
        .header h1 { font-size: 1.5rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .header p { font-size: 0.8rem; color: #6b7280; margin-top: 5px; text-transform: uppercase; font-weight: 600; }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        /* Carga de Imagen Estilo Apple */
        .upload-zone { border: 2px dashed var(--border); border-radius: 20px; padding: 40px 20px; text-align: center; transition: 0.3s; cursor: pointer; background: #fafafa; }
        .upload-zone:hover { border-color: var(--accent); background: #f0f7ff; }
        .upload-zone p { font-size: 0.9rem; color: #4b5563; font-weight: 500; }

        /* Lista de Productos Extraídos */
        .packing-list { margin-top: 30px; }
        .item-card { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .item-card.complete { border-left: 6px solid var(--success); background: #f0fdf4; }
        .item-card.pending { border-left: 6px solid #fbbf24; }
        
        .item-info { flex: 1; }
        .item-sku { font-weight: 800; font-size: 0.95rem; display: block; }
        .item-desc { font-size: 0.75rem; color: #6b7280; display: block; margin-top: 2px; }
        
        .item-counter { display: flex; align-items: center; gap: 10px; }
        .qty-box { text-align: center; min-width: 60px; }
        .qty-box span { display: block; font-size: 0.6rem; color: #9ca3af; font-weight: 700; }
        .qty-val { font-size: 1.1rem; font-weight: 700; }

        /* Botones de acción */
        .btn-count { background: #f3f4f6; border: none; width: 36px; height: 36px; border-radius: 10px; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        .btn-count:active { background: #e5e7eb; scale: 0.9; }
        
        .footer-actions { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .btn-pdf { background: var(--primary); color: #fff; border: none; flex: 1; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; }

        .hidden { display: none; }
        .badge-check { background: var(--success); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.6rem; margin-left: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h1>INBOUND VISION</h1>
    <p>Asist. Logístico: J. Angelo Nuñez</p>
</div>

<div class="container">
    <div id="step-upload">
        <div class="upload-zone" onclick="document.getElementById('file-in').click()">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">📸</div>
            <p>Sube la foto del Packing List</p>
            <span style="font-size: 0.7rem; color: #9ca3af;">El sistema analizará los SKUs automáticamente</span>
            <input type="file" id="file-in" class="hidden" accept="image/*" onchange="analizarFoto()">
        </div>
    </div>

    <div id="step-conteo" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="font-size: 1rem; letter-spacing: -0.5px;">PRODUCTOS EN CONTENEDOR</h2>
            <span id="cont-label" style="font-size: 0.7rem; font-weight: 800; color: var(--accent);"></span>
        </div>
        
        <div id="lista-items" class="packing-list">
            </div>
        
        <div style="height: 100px;"></div> </div>
</div>

<div class="footer-actions hidden" id="footer">
    <button class="btn-pdf" onclick="generarReporteFinal()">GENERAR REPORTE & CIERRE</button>
</div>

<script>
    const URL_MAESTRO = "https://script.google.com/macros/s/AKfycbwNlrpjV8BS3z0t3liodNkxpiO4HvrowLf9BtEta5cDSUZy_IL-0aPMLnMIhpzCRuwM/exec";
    let maestroData = [];
    let itemsExtraidos = [];

    window.onload = async () => {
        try {
            const res = await fetch(URL_MAESTRO + "?v=" + Date.now());
            const data = await res.json();
            maestroData = data.filter(r => r[0] && r[0] !== "CODIGO");
        } catch (e) { alert("Error al cargar Maestro"); }
    };

    function analizarFoto() {
        // Simulamos la inteligencia de la foto extrayendo datos basados en el Maestro
        // En una versión real, aquí llamaríamos a un OCR
        document.getElementById('step-upload').classList.add('hidden');
        document.getElementById('step-conteo').classList.remove('hidden');
        document.getElementById('footer').classList.remove('hidden');

        // Simulación: Tomamos 5 productos aleatorios del maestro para simular que la foto los leyó
        itemsExtraidos = maestroData.slice(0, 5).map(p => ({
            sku: p[0],
            desc: p[1],
            pck: Math.floor(Math.random() * 50) + 10, // Cantidad que "dice" la foto
            fisico: 0
        }));

        renderLista();
    }

    function renderLista() {
        const lista = document.getElementById('lista-items');
        lista.innerHTML = "";
        
        itemsExtraidos.forEach((item, index) => {
            const isComplete = item.fisico === item.pck;
            lista.innerHTML += `
                <div class="item-card ${isComplete ? 'complete' : 'pending'}">
                    <div class="item-info">
                        <span class="item-sku">${item.sku} ${isComplete ? '<span class="badge-check">EXACTO</span>' : ''}</span>
                        <span class="item-desc">${item.desc}</span>
                    </div>
                    <div class="item-counter">
                        <div class="qty-box">
                            <span>PACKING</span>
                            <div class="qty-val" style="color:#9ca3af">${item.pck}</div>
                        </div>
                        <div class="qty-box">
                            <span>FÍSICO</span>
                            <div class="qty-val">${item.fisico}</div>
                        </div>
                        <button class="btn-count" onclick="cambiarCant(${index}, 1)">+</button>
                        <button class="btn-count" onclick="cambiarCant(${index}, -1)" style="font-size:0.8rem">-</button>
                    </div>
                </div>
            `;
        });
    }

    function cambiarCant(index, val) {
        itemsExtraidos[index].fisico += val;
        if(itemsExtraidos[index].fisico < 0) itemsExtraidos[index].fisico = 0;
        renderLista();
    }

    function generarReporteFinal() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        // Diseño de Reporte Moderno
        doc.setFont("helvetica", "bold");
        doc.setFontSize(22);
        doc.text("REPORTE DE INBOUND", 20, 30);
        
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.setTextColor(100);
        doc.text("SISTEMA DE VERIFICACIÓN LOGÍSTICA V4.0", 20, 38);
        doc.text(`FECHA: ${new Date().toLocaleString()}`, 20, 43);

        const tableBody = itemsExtraidos.map(i => [
            i.sku, 
            i.desc, 
            i.pck, 
            i.fisico, 
            i.fisico === i.pck ? "SÍ" : "NO"
        ]);

        doc.autoTable({
            startY: 55,
            head: [['SKU', 'DESCRIPCIÓN', 'PACKING', 'CONTEO', 'EXACTO']],
            body: tableBody,
            theme: 'striped',
            headStyles: { fillColor: [0, 0, 0], fontSize: 9 },
            styles: { fontSize: 8, cellPadding: 4 },
            didDrawCell: (data) => {
                if (data.section === 'body' && data.column.index === 4) {
                    if (data.cell.raw === "SÍ") doc.setTextColor(16, 185, 129);
                    else doc.setTextColor(239, 68, 68);
                }
            }
        });

        const finalY = doc.lastAutoTable.finalY + 40;
        doc.setTextColor(0);
        doc.line(20, finalY, 90, finalY);
        doc.setFontSize(10);
        doc.setFont("helvetica", "bold");
        doc.text("J. Angelo Nuñez Durand", 20, finalY + 7);
        doc.setFont("helvetica", "normal");
        doc.text("Asist. Inventario Logístico", 20, finalY + 12);

        doc.save("Inbound_Report_Angelo.pdf");
    }
</script>
</body>
</html>
