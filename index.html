<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite - Logística</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .aura-card { border-radius: 24px; transition: all 0.3s ease; }
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 p-4">
        <div class="flex justify-between items-center max-w-lg mx-auto">
            <div>
                <h1 class="font-black text-xl tracking-tighter italic">TWINS <span class="text-blue-600">ELITE</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Control de Contenedores</p>
            </div>
            <button onclick="loadData()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center btn-press">
                <i class="ph-bold ph-arrows-clockwise text-slate-600"></i>
            </button>
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto pb-24">
        
        <div id="view-home">
            <div class="flex gap-2 mb-6 overflow-x-auto pb-2 no-scrollbar">
                <button class="bg-slate-900 text-white px-4 py-2 rounded-full text-xs font-bold">Todos</button>
                <button class="bg-white border border-slate-200 px-4 py-2 rounded-full text-xs font-bold text-slate-500">Enero</button>
                <button class="bg-white border border-slate-200 px-4 py-2 rounded-full text-xs font-bold text-slate-500">Febrero</button>
                <button class="bg-white border border-slate-200 px-4 py-2 rounded-full text-xs font-bold text-slate-500">Marzo</button>
            </div>

            <div id="operations-list" class="space-y-4">
                <div class="text-center py-20">
                    <i class="ph-duotone ph-circle-notch animate-spin text-4xl text-slate-300"></i>
                    <p class="text-slate-400 text-xs mt-2 font-bold uppercase">Sincronizando con Excel...</p>
                </div>
            </div>
        </div>

        <div id="view-counting" class="hidden">
            <button onclick="showHome()" class="mb-4 flex items-center gap-2 text-slate-500 font-bold text-xs uppercase tracking-widest">
                <i class="ph-bold ph-caret-left"></i> Volver
            </button>
            
            <div id="container-header" class="mb-6">
                </div>

            <div id="items-list" class="space-y-3">
                </div>

            <div class="fixed bottom-6 left-4 right-4 max-w-lg mx-auto">
                <button onclick="finalizeProcess()" class="w-full bg-blue-600 text-white py-5 aura-card font-black text-sm uppercase tracking-widest shadow-xl shadow-blue-200 btn-press">
                    Finalizar y Guardar en Excel
                </button>
            </div>
        </div>
    </main>

    <script>
        // URL DE TU WEB APP (APPS SCRIPT)
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-v5b_DkMPqup6Wm4J5KfGKZq9IRs99drhBYFV-MzHa4tcyb8dSn7YRx7KTHAEj1Jp/exec";
        
        let master_history = [];
        let current_container = null;

        async function loadData() {
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                master_history = data.historial;
                renderMasterView();
            } catch (error) {
                alert("Error al conectar con el Excel. Revisa la URL.");
            }
        }

        function renderMasterView() {
            const container = document.getElementById('operations-list');
            
            // Lógica de agrupación (Cód Interno + Fecha)
            const grouped = master_history.reduce((acc, curr) => {
                const id = curr.operacion;
                if (!acc[id]) {
                    acc[id] = { 
                        id: id, 
                        items: [], 
                        done: curr.estado === 'COMPLETADO',
                        canal: curr.canal,
                        fecha: id.split('(')[1]?.replace(')', '') || '--'
                    };
                }
                acc[id].items.push(curr);
                return acc;
            }, {});

            container.innerHTML = Object.values(grouped).map(op => `
                <div class="aura-card p-5 border-l-[10px] ${op.done ? 'border-green-500 bg-green-50/30' : 'border-amber-500 bg-white'} shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Contenedor</span>
                            <h4 class="font-black text-xl text-slate-800">${op.id}</h4>
                        </div>
                        <span class="text-[10px] font-black px-2 py-1 rounded-md ${op.canal === 'ROJO' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                            CANAL ${op.canal}
                        </span>
                    </div>
                    <div class="flex gap-4 text-[10px] font-bold text-slate-500 uppercase mb-4">
                        <span><i class="ph-bold ph-package"></i> ${op.items.length} SKUs</span>
                        <span><i class="ph-bold ph-calendar"></i> Ingreso: ${op.fecha}</span>
                    </div>
                    <button onclick="openContainer('${op.id}')" class="w-full py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest btn-press ${op.done ? 'bg-slate-200 text-slate-500' : 'bg-slate-900 text-white'}">
                        ${op.done ? 'Ver Resumen' : 'Iniciar Conteo de Cajas'}
                    </button>
                </div>
            `).join('');
        }

        function openContainer(id) {
            const allItems = master_history.filter(i => i.operacion === id);
            current_container = { id: id, items: [...allItems] };
            
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-counting').classList.remove('hidden');
            
            document.getElementById('container-header').innerHTML = `
                <h2 class="text-2xl font-black text-slate-900">${id}</h2>
                <p class="text-xs text-slate-400 font-bold uppercase">Verificando cantidad de cajas</p>
            `;
            renderItemList();
        }

        function renderItemList() {
            const list = document.getElementById('items-list');
            list.innerHTML = current_container.items.map(item => `
                <div id="row-${item.sku}" class="aura-card p-4 bg-white border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <div class="pr-4">
                            <p class="text-[10px] font-black text-blue-600 uppercase">${item.sku}</p>
                            <h5 class="font-bold text-sm leading-tight text-slate-700">${item.descripcion}</h5>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-400 uppercase">Meta</p>
                            <p class="font-black text-lg">${item.meta} <span class="text-[10px]">CAJAS</span></p>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between bg-slate-50 rounded-2xl p-2 border border-slate-100">
                        <button onclick="updateCount('${item.sku}', -1)" class="w-12 h-12 bg-white rounded-xl shadow-sm flex items-center justify-center text-xl font-bold btn-press">-</button>
                        <div class="text-center">
                            <span class="block text-[9px] font-black text-slate-400 uppercase">Recibido</span>
                            <span class="text-2xl font-black ${item.real >= item.meta ? 'text-green-600' : 'text-slate-900'}">${item.real}</span>
                        </div>
                        <button onclick="updateCount('${item.sku}', 1)" class="w-12 h-12 bg-slate-900 text-white rounded-xl shadow-sm flex items-center justify-center text-xl font-bold btn-press">+</button>
                    </div>
                </div>
            `).join('');
        }

        function updateCount(sku, val) {
            const item = current_container.items.find(i => i.sku === sku);
            if (item) {
                item.real = Math.max(0, item.real + val);
                renderItemList();
            }
        }

        async function finalizeProcess() {
            if(!confirm("¿Deseas guardar el conteo de estas cajas en el Excel?")) return;
            
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = "Guardando...";

            const payload = {
                action: 'FINALIZE',
                id: current_container.id,
                items: JSON.stringify(current_container.items.map(i => ({sku: i.sku, r: i.real})))
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                alert("¡Datos guardados con éxito en la Columna I y K!");
                showHome();
                loadData();
            } catch (e) {
                alert("Error al guardar.");
                btn.disabled = false;
                btn.innerHTML = "Finalizar y Guardar";
            }
        }

        function showHome() {
            document.getElementById('view-home').classList.remove('hidden');
            document.getElementById('view-counting').classList.add('hidden');
        }

        // Carga inicial
        window.onload = loadData;
    </script>
</body>
</html>
