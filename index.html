<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v56 - Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfd; color: #1a1c21; min-height: 100vh; margin: 0; padding: 0; overflow-x: hidden; }
        .view { display: none; min-height: 100vh; padding: 1.2rem; flex-direction: column; box-sizing: border-box; }
        .view.active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-panel { background: white; border-radius: 2rem; border: 1px solid #f0f1f3; box-shadow: 0 10px 40px rgba(0,0,0,0.04); padding: 1.5rem; }
        
        /* Estilos de Historial y Estados */
        .badge-blue { background: #eff6ff; color: #2563eb; border: 1px solid #dbeafe; padding: 2px 8px; border-radius: 6px; }
        .kpi-success { border-right: 6px solid #10b981 !important; }
        .kpi-warning { border-right: 6px solid #f59e0b !important; }
        .btn-action { background: #f8f9fb; border: 1px solid #eceef2; transition: 0.2s; }

        /* Buscador y Resultados */
        .search-container { position: relative; width: 100%; }
        .results-box { position: absolute; z-index: 100; top: 100%; left: 0; width: 100%; background: white; border-radius: 1.2rem; box-shadow: 0 15px 30px rgba(0,0,0,0.1); border: 1px solid #eee; max-h: 200px; overflow-y: auto; margin-top: 5px; }
        .result-item { padding: 0.8rem 1.2rem; border-bottom: 1px solid #f8f9fa; }

        /* Barra de Progreso y Camión */
        .track { height: 45px; background: #f1f3f7; border-radius: 1rem; position: relative; overflow: hidden; margin: 1rem 0; }
        .track-fill { height: 100%; background: #2563eb; width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .truck-icon { position: absolute; top: 50%; transform: translateY(-50%); transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }

        .footer-action { position: fixed; bottom: 1.5rem; left: 1.2rem; right: 1.2rem; z-index: 50; }
        .btn-black { background: #1a1c21; color: white; border-radius: 1.2rem; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; padding: 1.2rem; width: 100%; }
        
        .input-elite { background: #f8f9fb; border: 2px solid #eceef2; border-radius: 1.2rem; padding: 1rem; font-weight: 700; width: 100%; outline: none; }
        .input-elite:focus { border-color: #2563eb; background: white; }
    </style>
</head>
<body>

    <header class="h-20 px-6 flex justify-between items-center bg-white/80 backdrop-blur-md border-b">
        <div>
            <p class="text-[9px] font-black tracking-[0.3em] text-slate-400 uppercase mb-1">Tajho Asist. Logístico</p>
            <h1 class="text-xl font-black">Logística<span class="text-blue-600">Twins</span></h1>
        </div>
        <button onclick="goHome()" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </button>
    </header>

    <div id="view-home" class="view active">
        <div class="mt-4 mb-8">
            <h2 class="text-3xl font-black text-slate-900 italic">¿Qué hacemos<br><span class="text-blue-600">hoy, Tajho?</span></h2>
        </div>

        <div class="space-y-4">
            <div onclick="navTo('crear')" class="glass-panel flex items-center gap-5 border-l-4 border-l-blue-600">
                <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                </div>
                <div><h3 class="font-black text-slate-900 uppercase text-sm">Nuevo Contenedor</h3><p class="text-[9px] font-bold text-slate-400 uppercase">Gestión de Carga</p></div>
            </div>

            <div onclick="navTo('historial')" class="glass-panel flex items-center gap-5 border-l-4 border-l-slate-900">
                <div class="w-14 h-14 bg-slate-50 text-slate-900 rounded-2xl flex items-center justify-center">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
                </div>
                <div><h3 class="font-black text-slate-900 uppercase text-sm">Historial</h3><p class="text-[9px] font-bold text-slate-400 uppercase">Registros Guardados</p></div>
            </div>
        </div>
    </div>

    <div id="view-crear" class="view">
        <h2 class="text-2xl font-black italic mb-6">Configurar <span class="text-blue-600">Carga</span></h2>
        <div class="glass-panel space-y-4">
            <div class="search-container">
                <input type="text" id="s-sku" oninput="smartSearch()" class="input-elite" placeholder="Buscar SKU o Producto">
                <div id="results" class="results-box hidden"></div>
            </div>
            <div class="flex gap-3">
                <input type="number" id="s-meta" class="input-elite flex-1" placeholder="Meta">
                <button onclick="addMani()" class="w-16 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>
        </div>
        <div class="flex-grow overflow-y-auto mt-6 pb-24" id="pre-list"></div>
        <div class="footer-action">
            <button id="btn-start" onclick="openModal()" class="btn-black hidden !bg-blue-600">Lanzar Operación</button>
        </div>
    </div>

    <div id="view-ops" class="view">
        <div class="glass-panel mb-4">
            <div class="flex justify-between items-center text-[10px] font-black text-slate-400 uppercase mb-2">
                <span>Progreso General</span>
                <span id="global-pc" class="text-blue-600 text-sm">0%</span>
            </div>
            <div class="track">
                <div id="truck-fill" class="track-fill"></div>
                <div id="truck-icon" class="truck-icon" style="left: 0%">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#1a1c21"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-3 mb-6">
            <div class="text-center">
                <select id="sel-sku" onchange="syncItem()" class="text-xl font-black text-slate-900 bg-transparent outline-none italic uppercase border-b-2 border-blue-600 mb-1"></select>
                <p id="live-desc" class="text-[9px] font-bold text-blue-500 uppercase px-4 truncate italic"></p>
            </div>
            <div class="flex items-center justify-center gap-4">
                <input type="number" id="qty-in" class="input-elite w-28 h-16 text-center text-3xl" placeholder="0">
                <button onclick="registrarBulto()" class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>
        </div>

        <div class="flex-grow overflow-y-auto space-y-3 pb-24" id="mini-progress-list"></div>
        
        <div class="footer-action">
            <button id="btn-save-all" onclick="finishAndReport()" class="btn-black !bg-green-600">Finalizar y Reportar</button>
        </div>
    </div>

    <div id="view-historial" class="view">
        <h2 class="text-2xl font-black italic mb-6">Registro de <span class="text-blue-600">Cargas</span></h2>
        <div id="history-list" class="flex-grow overflow-y-auto space-y-4 pb-24"></div>
    </div>

    <div id="modal-choice" class="fixed inset-0 z-[200] bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center p-8">
        <div class="bg-white w-full rounded-[2.5rem] p-8 text-center">
            <h3 class="text-xl font-black italic mb-6">¿INICIAR OPERACIÓN?</h3>
            <button onclick="continuarConteo()" class="btn-black">Sí, empezar ahora</button>
            <button onclick="closeModal()" class="text-[10px] font-black text-slate-300 uppercase mt-4">Cancelar</button>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_items = {};
        let currentMani = JSON.parse(localStorage.getItem('taj_cur')) || [];
        let activeJob = JSON.parse(localStorage.getItem('taj_active')) || null;
        let startTime = null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                const raw = await res.json();
                raw.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().toUpperCase().trim()] = r.DESCRIPCION; });
                
                // RESILIENCIA: Si hay un trabajo guardado, ir directo a la operación
                if (activeJob) {
                    console.log("Recuperando sesión activa...");
                    startOps(activeJob);
                } else {
                    navTo('home');
                }
            } catch (e) { 
                if (activeJob) startOps(activeJob); else navTo('home');
            }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'crear') renderPreList();
            if(v === 'historial') renderHistory();
        }

        function goHome() { navTo('home'); }
        function closeModal() { document.getElementById('modal-choice').style.display = 'none'; }

        // BÚSQUEDA
        function smartSearch() {
            const input = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('results');
            if(input.length < 2) { resDiv.classList.add('hidden'); return; }
            const matches = Object.keys(db_items).filter(sku => sku.includes(input) || db_items[sku].toUpperCase().includes(input)).slice(0, 8);
            resDiv.innerHTML = matches.map(sku => `<div onclick="setProd('${sku}')" class="result-item"><p class="text-[10px] font-black text-blue-600">${sku}</p><p class="text-[9px] font-bold text-slate-500 uppercase">${db_items[sku]}</p></div>`).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(sku) {
            document.getElementById('s-sku').value = sku;
            document.getElementById('results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "GENERICO", meta, real: 0 });
            localStorage.setItem('taj_cur', JSON.stringify(currentMani));
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderPreList() {
            document.getElementById('pre-list').innerHTML = currentMani.map(i => `<div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center mb-2 shadow-sm"><div><p class="text-[11px] font-black">${i.sku}</p><p class="text-[8px] text-slate-400 font-bold uppercase">${i.desc}</p></div><p class="text-[11px] font-black text-blue-600">${i.meta} CJ</p></div>`).join('');
            document.getElementById('btn-start').classList.toggle('hidden', currentMani.length === 0);
        }

        // OPERACIÓN
        function openModal() { document.getElementById('modal-choice').style.display = 'flex'; }

        function continuarConteo() {
            closeModal();
            startTime = new Date();
            activeJob = { 
                id: "ID-" + Date.now().toString().slice(-6), 
                tipo: 'CONTENEDOR', 
                items: [...currentMani], 
                start: startTime.toISOString()
            };
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
            currentMani = []; 
            localStorage.removeItem('taj_cur');
            startOps(activeJob);
        }

        function startOps(job) {
            navTo('ops');
            document.getElementById('sel-sku').innerHTML = job.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem();
        }

        function syncItem() {
            const selectedSku = document.getElementById('sel-sku').value;
            const item = activeJob.items.find(i => i.sku === selectedSku);
            document.getElementById('live-desc').innerText = item.desc;
            
            const totalM = activeJob.items.reduce((a,b) => a + b.meta, 0);
            const totalR = activeJob.items.reduce((a,b) => a + b.real, 0);
            const pc = Math.min(Math.round((totalR / totalM) * 100), 100);
            
            document.getElementById('truck-fill').style.width = pc + "%";
            document.getElementById('truck-icon').style.left = `calc(${pc}% - 15px)`;
            document.getElementById('global-pc').innerText = pc + "%";
            renderMiniBars();
        }

        // MEJORA: REGISTRO Y CAMBIO AUTOMÁTICO DE SKU
        function registrarBulto() {
            const input = document.getElementById('qty-in');
            const q = parseInt(input.value);
            if(!q) return;

            const selector = document.getElementById('sel-sku');
            const item = activeJob.items.find(i => i.sku === selector.value);
            
            item.real += q;
            input.value = '';
            
            // Persistencia inmediata por seguridad (RESILIENCIA)
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
            
            // Sincronización Invisible al Excel
            fetch(CLOUD_URL, {
                method:'POST', 
                mode:'no-cors', 
                body: JSON.stringify({tipo:'REGISTRO_INMEDIATO', id_op: activeJob.id, sku: item.sku, cant: q, total: item.real})
            });

            syncItem();

            // LÓGICA: CAMBIO AUTOMÁTICO AL SIGUIENTE SKU
            if (item.real >= item.meta) {
                const currentIndex = activeJob.items.findIndex(i => i.sku === item.sku);
                if (currentIndex < activeJob.items.length - 1) {
                    const nextSku = activeJob.items[currentIndex + 1].sku;
                    setTimeout(() => {
                        selector.value = nextSku;
                        syncItem();
                        // Pequeño feedback visual de cambio
                        selector.classList.add('scale-110', 'text-blue-600');
                        setTimeout(() => selector.classList.remove('scale-110', 'text-blue-600'), 500);
                    }, 600);
                }
            }
        }

        function renderMiniBars() {
            document.getElementById('mini-progress-list').innerHTML = activeJob.items.map(i => {
                const pc = Math.min(Math.round((i.real / i.meta) * 100), 100);
                const isSel = i.sku === document.getElementById('sel-sku').value;
                return `<div class="bg-white p-3 rounded-2xl border ${isSel ? 'border-blue-500 shadow-md' : 'border-slate-100'}"><div class="flex justify-between items-center mb-1"><span class="text-[10px] font-black uppercase">${i.sku}</span><span class="text-[10px] font-black text-slate-900">${i.real}/${i.meta}</span></div><div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden"><div class="h-full ${pc >= 100 ? 'bg-green-500' : 'bg-blue-600'}" style="width: ${pc}%"></div></div></div>`;
            }).join('');
        }

        // FINALIZACIÓN INSTANTÁNEA
        function finishAndReport() {
            const endTime = new Date();
            const dur = Math.round((endTime - new Date(activeJob.start)) / 60000);
            const totalM = activeJob.items.reduce((a,b) => a + b.meta, 0);
            const totalR = activeJob.items.reduce((a,b) => a + b.real, 0);
            const efici = Math.round((totalR / totalM) * 100);

            const report = {
                id: activeJob.id,
                fecha: endTime.toLocaleString(),
                tipo: 'CONTENEDOR',
                duracion: dur + " min",
                eficiencia: efici + "%",
                items: activeJob.items
            };

            const history = JSON.parse(localStorage.getItem('taj_history')) || [];
            history.unshift(report);
            localStorage.setItem('taj_history', JSON.stringify(history));

            // Disparo invisible final
            fetch(CLOUD_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({tipo:'REPORTE_FINAL', ...report})});
            
            downloadPDF(report);
            localStorage.removeItem('taj_active');
            activeJob = null;
            navTo('home');
        }

        function downloadPDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(16); doc.setFont("helvetica", "bold"); doc.text("TAJHO.OS - REPORTE DE CARGA", 14, 20);
            doc.setFontSize(9); doc.setFont("helvetica", "normal");
            doc.text(`ID: ${data.id} | Eficiencia: ${data.eficiencia} | Tiempo: ${data.duracion}`, 14, 28);
            doc.autoTable({
                startY: 35,
                head: [['SKU', 'META', 'REAL', 'DIF']],
                body: data.items.map(i => [i.sku, i.meta, i.real, i.real - i.meta]),
                theme: 'striped', headStyles: { fillColor: [26, 28, 33] }
            });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 12);
            doc.save(`REPORTE_${data.id}.pdf`);
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('taj_history')) || [];
            const list = document.getElementById('history-list');
            if(history.length === 0) { list.innerHTML = `<div class="py-20 text-center opacity-20 text-[10px] font-black uppercase tracking-[0.2em]">Sin registros</div>`; return; }
            list.innerHTML = history.map(h => {
                const isOk = parseInt(h.eficiencia) >= 100;
                return `<div class="glass-panel ${isOk ? 'kpi-success' : 'kpi-warning'} p-4 mb-4"><div class="flex justify-between items-start mb-3"><span class="badge-blue text-[8px] font-black uppercase">${h.tipo}</span><p class="text-[9px] font-bold text-slate-400">${h.fecha.split(',')[0]}</p></div><div class="flex items-center gap-6 mb-4"><div><p class="text-[8px] font-bold text-slate-400 uppercase mb-1">Precisión</p><p class="text-xl font-black ${isOk ? 'text-green-600' : 'text-orange-500'} italic">${h.eficiencia}</p></div><div class="border-l border-slate-100 pl-6"><p class="text-[8px] font-bold text-slate-400 uppercase mb-1">Duración</p><p class="text-sm font-black text-slate-900">${h.duracion}</p></div></div><button onclick='downloadPDF(${JSON.stringify(h)})' class="btn-action w-full py-3 rounded-xl flex items-center justify-center gap-2"><span class="text-[9px] font-black uppercase">Descargar PDF</span></button></div>`;
            }).join('');
        }

        init();
    </script>
</body>
</html>
