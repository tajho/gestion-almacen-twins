<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA LOGÍSTICO PRO - ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --dark: #0f172a; --accent: #3b82f6; --success: #10b981; --error: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--accent); }
        .status-indicator { font-size: 0.7rem; font-weight: bold; padding: 5px 10px; border-radius: 20px; float: right; }
        .online { background: #dcfce7; color: #166534; }
        .offline { background: #fee2e2; color: #991b1b; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-reg { background: var(--dark); }
        .btn-pdf { background: var(--success); margin-top: 15px; }
        .search-result { background: #eff6ff; padding: 10px; border-radius: 8px; font-weight: bold; color: var(--accent); min-height: 20px; margin: 5px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8rem; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>

    <div class="card">
        <span id="db-status" class="status-indicator offline">SIN CONEXIÓN</span>
        <h2 style="margin:0; font-size: 1.2rem;">Control de Inbound</h2>
        <p style="font-size: 0.8rem; color: #64748b;">Asist. Logístico: J. Angelo Nuñez</p>

        <label style="font-size: 0.7rem; font-weight: bold;">FOTO PACKING LIST</label>
        <input type="file" id="packing-img" accept="image/*">

        <label style="font-size: 0.7rem; font-weight: bold;">N° CONTENEDOR</label>
        <input type="text" id="id-cont" placeholder="Ej: 0116">
    </div>

    <div class="card">
        <label style="font-size: 0.7rem; font-weight: bold;">BUSCADOR MAESTRO (SKU)</label>
        <input type="text" id="sku-input" placeholder="Escriba código SKU..." oninput="validarSKU(this.value)">
        <div id="sku-desc" class="search-result">Esperando código...</div>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label style="font-size: 0.7rem;">CANT. PACKING</label>
                <input type="number" id="c-pack" placeholder="Foto">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 0.7rem;">CANT. CONTEO</label>
                <input type="number" id="c-fis" placeholder="Físico">
            </div>
        </div>

        <button class="btn btn-reg" onclick="agregarItem()">+ Registrar Item</button>
    </div>

    <div class="card">
        <table id="resumen">
            <thead>
                <tr><th>SKU</th><th>Pck</th><th>Fis</th><th>Estado</th></tr>
            </thead>
            <tbody id="resumen-body"></tbody>
        </table>
        <button class="btn btn-pdf" onclick="cerrarYGenerar()">Finalizar y Crear Reporte</button>
    </div>

    <script>
        // REEMPLAZA ESTA URL CON LA QUE TE DÉ AL "IMPLEMENTAR" DE NUEVO
        const URL_API = "https://script.google.com/macros/s/AKfycbxGiHWFnxRctB4ufGHjMw8PQZVec0_HmjAKQX_BdiU1IReWuPYHpaePmjaf-ZSfOwC2/exec";
        let dbMaestra = [];
        let conteoTotal = {};

        // Sincronización con el Excel
        window.onload = async () => {
            const status = document.getElementById('db-status');
            try {
                const response = await fetch(URL_API);
                const data = await response.json();
                // Filtramos la fila de encabezados
                dbMaestra = data.filter(r => r[0] && r[0] !== "CODIGO");
                status.innerText = "CONECTADO: " + dbMaestra.length + " SKU";
                status.className = "status-indicator online";
            } catch (e) {
                status.innerText = "ERROR DE CONEXIÓN";
                console.error(e);
            }
        };

        function validarSKU(val) {
            val = val.trim().toUpperCase();
            const encontrado = dbMaestra.find(p => p[0].toString().toUpperCase() === val);
            const descDiv = document.getElementById('sku-desc');
            if(encontrado) {
                descDiv.innerText = "✓ " + encontrado[1];
                descDiv.style.color = "var(--accent)";
            } else {
                descDiv.innerText = "SKU No existe en Maestro";
                descDiv.style.color = "var(--error)";
            }
        }

        function agregarItem() {
            const sku = document.getElementById('sku-input').value.toUpperCase().trim();
            const pack = parseInt(document.getElementById('c-pack').value) || 0;
            const fis = parseInt(document.getElementById('c-fis').value) || 0;
            const desc = document.getElementById('sku-desc').innerText;

            if(!sku || fis === 0 || desc.includes("No existe")) {
                alert("Verifica el código y las cantidades.");
                return;
            }

            if(!conteoTotal[sku]) {
                conteoTotal[sku] = { packing: pack, fisico: 0, desc: desc.replace("✓ ", "") };
            }
            conteoTotal[sku].fisico += fis;
            if(pack > 0) conteoTotal[sku].packing = pack;

            actualizarTabla();
            
            // Limpieza para el siguiente pallet
            document.getElementById('sku-input').value = "";
            document.getElementById('c-fis').value = "";
            document.getElementById('sku-input').focus();
        }

        function actualizarTabla() {
            const body = document.getElementById('resumen-body');
            body.innerHTML = "";
            for(let s in conteoTotal) {
                const item = conteoTotal[s];
                const diff = item.fisico === item.packing;
                body.innerHTML += `<tr>
                    <td>${s}</td>
                    <td>${item.packing}</td>
                    <td><b>${item.fisico}</b></td>
                    <td style="color: ${diff ? 'green' : 'red'}; font-weight:bold;">${diff ? 'OK' : 'DIF'}</td>
                </tr>`;
            }
        }

        function cerrarYGenerar() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const cont = document.getElementById('id-cont').value || "S/N";

            doc.setFontSize(16).text("REPORTE FINAL DE INGRESO: " + cont, 105, 20, {align: 'center'});
            
            const rows = [];
            for(let s in conteoTotal) {
                const i = conteoTotal[s];
                rows.push([s, i.desc, i.packing, i.fisico, i.fisico - i.packing]);
            }

            doc.autoTable({
                startY: 30,
                head: [['SKU', 'DESCRIPCIÓN', 'PACKING', 'CONTEO', 'DIF']],
                body: rows,
                theme: 'grid',
                headStyles: { fillColor: [15, 23, 42] }
            });

            const finalY = doc.lastAutoTable.finalY + 30;
            doc.setFontSize(10).text("Recepción y conteo realizado por:", 105, finalY, {align: 'center'});
            doc.text("J. Angelo Nuñez Durand", 105, finalY + 7, {align: 'center'});
            doc.text("------------------------------------------", 105, finalY + 12, {align: 'center'});
            doc.text("Asist. Logístico.", 105, finalY + 17, {align: 'center'});

            doc.save(`Recepcion_${cont}.pdf`);
        }
    </script>
</body>
</html>
