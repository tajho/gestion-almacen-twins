<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twins Despacho - Signature Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #1e40af; --bg: #f1f5f9; --slate: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--slate); margin: 0; }
        
        .view { display: none; min-height: 100vh; padding: 1.5rem; flex-direction: column; }
        .view.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Tarjetas Estilo Boutique Industrial */
        .card-premium { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.04), 0 8px 10px -6px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        .btn-signature { background: var(--slate); color: white; border-radius: 1rem; font-weight: 800; padding: 1.2rem; transition: all 0.2s; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-signature:active { transform: translateY(2px); filter: brightness(1.2); }
        
        .input-premium { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 1rem; padding: 1rem; font-weight: 600; width: 100%; outline: none; transition: 0.3s; }
        .input-premium:focus { border-color: var(--brand); background: white; }

        /* Indicador de Estado */
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    </style>
</head>
<body>

    <header class="h-20 px-6 flex justify-between items-center bg-white border-b sticky top-0 z-[100]">
        <div class="flex flex-col">
            <span class="text-[10px] font-black text-blue-600 uppercase tracking-[.2em]">Inventory System</span>
            <span class="text-xl font-extrabold tracking-tighter italic text-slate-900">TWINS <span class="text-slate-400">DESPACHO</span></span>
        </div>
        <button onclick="navTo('historial')" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center border border-slate-100">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </button>
    </header>

    <div id="view-home" class="view active">
        <div class="mt-8 mb-10">
            <h1 class="text-4xl font-black leading-tight text-slate-900">Gestión de<br>Inventario <span class="text-blue-600">Pro.</span></h1>
            <p class="text-slate-500 mt-2 font-medium">Bienvenido, Angelo. ¿Qué procesaremos hoy?</p>
        </div>
        
        <div class="grid gap-4">
            <button onclick="navTo('crear')" class="btn-signature bg-blue-700 flex justify-between items-center shadow-lg shadow-blue-100">
                <span>NUEVO CONTENEDOR</span>
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
            </button>
            <button onclick="navTo('historial')" class="btn-signature flex justify-between items-center">
                <span>REVISAR HISTORIAL</span>
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </button>
        </div>

        <div id="active-notice" class="hidden mt-8 p-4 card-premium bg-blue-50 border-blue-100 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="animate-pulse w-3 h-3 bg-blue-600 rounded-full"></div>
                <span class="text-xs font-bold text-blue-900 uppercase">Carga en curso</span>
            </div>
            <button onclick="navTo('ops')" class="text-xs font-black text-blue-700 underline">CONTINUAR</button>
        </div>
    </div>

    <div id="view-crear" class="view">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-black uppercase italic">Configuración</h2>
            <button onclick="navTo('home')" class="text-[10px] font-bold text-slate-400">CANCELAR</button>
        </div>
        
        <div class="space-y-4 mb-6">
            <input type="text" id="c-id" class="input-premium uppercase" placeholder="N° DE CONTENEDOR / PLACA">
            
            <div class="relative">
                <input type="text" id="s-sku" oninput="smartSearch()" class="input-premium" placeholder="BUSCAR POR NOMBRE O SKU">
                <div id="results" class="absolute z-50 left-0 right-0 bg-white card-premium mt-2 hidden max-h-60 overflow-y-auto shadow-2xl"></div>
            </div>

            <div class="flex gap-2">
                <input type="number" id="s-meta" class="input-premium flex-1" placeholder="CANTIDAD PACK">
                <button onclick="addMani()" class="w-16 h-14 bg-blue-600 text-white rounded-2xl font-black text-2xl">＋</button>
            </div>
        </div>

        <div class="flex-grow card-premium p-5 overflow-y-auto mb-20">
            <h3 class="text-[10px] font-black text-slate-400 mb-4 tracking-widest uppercase">Lista de Manifiesto</h3>
            <div id="pre-list" class="divide-y divide-slate-100"></div>
        </div>

        <div class="fixed bottom-6 left-6 right-6">
            <button onclick="saveAndStart()" class="btn-signature w-full bg-slate-900 shadow-xl">INICIAR OPERACIÓN</button>
        </div>
    </div>

    <div id="view-ops" class="view">
        <div class="card-premium p-6 mb-4 text-center">
            <span id="op-title" class="text-[10px] font-black text-slate-400 uppercase mb-4 block tracking-widest">DESCARGANDO...</span>
            <select id="sel-sku" onchange="syncUI()" class="text-2xl font-black text-slate-900 bg-transparent w-full text-center outline-none mb-6 border-b-2 border-blue-600 pb-2"></select>
            
            <div class="flex justify-center items-center gap-4">
                <input type="number" id="qty-in" class="w-28 h-20 text-center text-4xl font-black bg-slate-50 border-2 border-slate-200 rounded-3xl" placeholder="0">
                <button onclick="registrarBulto()" class="w-20 h-20 bg-blue-600 text-white rounded-3xl font-black text-xl">OK</button>
            </div>
        </div>

        <div id="mini-progress-list" class="space-y-3 pb-32"></div>

        <div class="fixed bottom-6 left-6 right-6">
            <button onclick="finalizarTodo()" class="btn-signature w-full bg-emerald-600 shadow-lg shadow-emerald-100">FINALIZAR Y GENERAR PDF</button>
        </div>
    </div>

    <div id="view-historial" class="view">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-black uppercase italic">Historial</h2>
            <button onclick="navTo('home')" class="text-xs font-bold text-slate-400">VOLVER</button>
        </div>
        <div id="history-list" class="space-y-4 pb-20"></div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_items = {};
        let currentMani = [];
        let activeJob = null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                const raw = await res.json();
                raw.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().trim().toUpperCase()] = r.DESCRIPCION; });
            } catch (e) {}
            
            checkActiveSession();
        }

        function checkActiveSession() {
            activeJob = JSON.parse(localStorage.getItem('tj_active'));
            const notice = document.getElementById('active-notice');
            if (activeJob) {
                notice.classList.remove('hidden');
            } else {
                notice.classList.add('hidden');
            }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'historial') renderHistory();
            if(v === 'home') checkActiveSession();
        }

        function smartSearch() {
            const val = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('results');
            if(val.length < 2) { resDiv.classList.add('hidden'); return; }
            
            const matches = Object.entries(db_items).filter(([sku, desc]) => 
                sku.includes(val) || desc.toUpperCase().includes(val)
            ).slice(0, 8);

            resDiv.innerHTML = matches.map(([sku, desc]) => `
                <div onclick="setProd('${sku}')" class="p-4 border-b border-slate-50 active:bg-slate-50">
                    <p class="font-black text-sm text-slate-900">${sku}</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase truncate">${desc}</p>
                </div>
            `).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(sku) { 
            document.getElementById('s-sku').value = sku; 
            document.getElementById('results').classList.add('hidden'); 
            document.getElementById('s-meta').focus(); 
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "GENERICO", meta, real: 0 });
            renderPreList();
            document.getElementById('s-sku').value = ''; 
            document.getElementById('s-meta').value = '';
        }

        function renderPreList() {
            document.getElementById('pre-list').innerHTML = currentMani.map((i, idx) => `
                <div class="flex justify-between items-center py-4">
                    <div><p class="font-black text-slate-900">${i.sku}</p><p class="text-[10px] text-slate-400 font-bold uppercase">${i.desc}</p></div>
                    <div class="flex items-center gap-4">
                        <span class="font-black text-blue-600">${i.meta} CJ</span>
                        <button onclick="currentMani.splice(${idx},1);renderPreList()" class="text-slate-300">×</button>
                    </div>
                </div>
            `).join('');
        }

        function saveAndStart() {
            if(currentMani.length === 0) return alert("Agrega al menos un producto.");
            const id = document.getElementById('c-id').value.toUpperCase() || "CARGA-" + Date.now().toString().slice(-4);
            activeJob = { id, items: [...currentMani], fecha: new Date().toLocaleString(), status: 'EN PROCESO' };
            
            let history = JSON.parse(localStorage.getItem('tj_history')) || [];
            history.unshift(activeJob);
            localStorage.setItem('tj_history', JSON.stringify(history));
            localStorage.setItem('tj_active', JSON.stringify(activeJob));
            
            currentMani = [];
            navTo('ops');
            syncUI();
        }

        function syncUI() {
            document.getElementById('op-title').innerText = "CONTENEDOR: " + activeJob.id;
            document.getElementById('sel-sku').innerHTML = activeJob.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            renderMiniBars();
        }

        function registrarBulto() {
            const val = parseInt(document.getElementById('qty-in').value);
            if(!val) return;
            const target = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            if(target) target.real += val;
            document.getElementById('qty-in').value = '';
            localStorage.setItem('tj_active', JSON.stringify(activeJob));
            renderMiniBars();
        }

        function renderMiniBars() {
            document.getElementById('mini-progress-list').innerHTML = activeJob.items.map(i => {
                const pc = Math.min(Math.round((i.real / i.meta) * 100), 100);
                const isSel = i.sku === document.getElementById('sel-sku').value;
                return `<div class="card-premium p-4 ${isSel ? 'border-blue-500 bg-blue-50/30' : ''}">
                    <div class="flex justify-between font-black text-[11px] mb-2"><span>${i.sku}</span><span class="${pc>=100?'text-emerald-600':'text-blue-600'}">${i.real}/${i.meta}</span></div>
                    <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-blue-600 transition-all duration-500" style="width:${pc}%"></div></div>
                </div>`;
            }).join('');
        }

        // --- CORRECCIÓN FINALIZAR Y PDF ---
        function finalizarTodo() {
            if(!activeJob) return;
            if(!confirm("¿Deseas finalizar la descarga y generar el reporte?")) return;

            let history = JSON.parse(localStorage.getItem('tj_history')) || [];
            const idx = history.findIndex(h => h.id === activeJob.id && h.status !== 'COMPLETADO');
            activeJob.status = "COMPLETADO";
            if(idx !== -1) history[idx] = activeJob;
            
            localStorage.setItem('tj_history', JSON.stringify(history));
            generarPDF(activeJob); // Descarga directa
            
            localStorage.removeItem('tj_active');
            activeJob = null;
            navTo('home');
        }

        function generarPDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Cabecera Industrial
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(20); doc.setFont("helvetica", "bold");
            doc.text("REPORTE DE INVENTARIO", 14, 25);
            
            doc.setTextColor(100, 100, 100); doc.setFontSize(10);
            doc.text(`ID: ${data.id} | FECHA DE CIERRE: ${data.fecha}`, 14, 50);

            doc.autoTable({
                startY: 60,
                head: [['CÓDIGO SKU', 'DESCRIPCIÓN', 'PACK', 'FISICO', 'ESTADO']],
                body: data.items.map(i => [i.sku, i.desc.slice(0,35), i.meta, i.real, (i.real >= i.meta ? 'OK' : 'FALTANTE')]),
                theme: 'grid',
                headStyles: { fillColor: [30, 64, 175], halign: 'center' },
                styles: { fontSize: 8, cellPadding: 4 }
            });

            doc.setFontSize(9); doc.setTextColor(0,0,0);
            const finalY = doc.lastAutoTable.finalY + 20;
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, finalY);
            
            doc.save(`REPORTE_${data.id}.pdf`);
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('tj_history')) || [];
            const list = document.getElementById('history-list');
            if(history.length === 0) { list.innerHTML = `<p class="text-center text-slate-400 text-xs mt-10">No hay registros guardados.</p>`; return; }

            list.innerHTML = history.map(h => `
                <div class="card-premium p-5 border-l-8 ${h.status==='COMPLETADO'?'border-l-emerald-500':'border-l-blue-500'}">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[9px] font-black text-slate-300 uppercase mb-1">${h.fecha}</p>
                            <h3 class="text-lg font-black text-slate-800">${h.id}</h3>
                        </div>
                        <span class="text-[8px] font-black px-2 py-1 bg-slate-100 rounded uppercase">${h.status}</span>
                    </div>
                    <div class="flex gap-2">
                        ${h.status!=='COMPLETADO' ? `<button onclick="continuarManual('${h.id}')" class="flex-1 bg-blue-600 text-white p-3 rounded-xl text-[10px] font-black">CONTINUAR</button>`:''}
                        <button onclick='descargarReporteManual("${h.id}")' class="flex-1 bg-slate-900 text-white p-3 rounded-xl text-[10px] font-black">DESCARGAR PDF</button>
                    </div>
                </div>
            `).join('');
        }

        function continuarManual(id) {
            activeJob = (JSON.parse(localStorage.getItem('tj_history'))).find(x => x.id === id);
            localStorage.setItem('tj_active', JSON.stringify(activeJob));
            navTo('ops'); syncUI();
        }

        function descargarReporteManual(id) {
            const data = (JSON.parse(localStorage.getItem('tj_history'))).find(x => x.id === id);
            if(data) generarPDF(data);
        }

        init();
    </script>
</body>
</html>
