<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS Intelligence OS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --ios-blue: #007AFF; --ios-bg: #F2F2F7; --ios-card: #FFFFFF; --ios-dark: #1C1C1E; }
        body { background: var(--ios-bg); font-family: -apple-system, system-ui, sans-serif; padding-bottom: 100px; }
        
        /* Header Nativo */
        .app-header { background: var(--ios-dark); color: white; padding: 45px 20px 65px; border-radius: 0 0 40px 40px; }
        .app-header h1 { font-size: 26px; font-weight: 800; margin: 0; }

        /* Contenedores */
        .main-content { margin-top: -45px; padding: 0 16px; }
        .ios-card { background: var(--ios-card); border-radius: 25px; padding: 22px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: none; margin-bottom: 20px; }
        
        /* Buscador Predictivo Inteligente */
        .search-container { position: relative; }
        .search-input { background: #E3E3E8; border: none; border-radius: 14px; padding: 14px 45px; width: 100%; font-size: 16px; }
        .sug-list { position: absolute; width: 100%; background: white; border-radius: 18px; z-index: 1000; box-shadow: 0 15px 40px rgba(0,0,0,0.2); max-height: 250px; overflow-y: auto; display: none; margin-top: 8px; border: 1px solid #DDD; }
        .sug-item { padding: 14px 18px; border-bottom: 1px solid #F2F2F7; cursor: pointer; }
        .sug-item b { display: block; font-size: 14px; }
        .sug-item small { color: var(--ios-blue); font-weight: bold; }

        /* Navegación Inferior */
        .tab-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(28,28,30,0.96); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 15px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); z-index: 1000; }
        .tab-btn { border: none; background: none; color: #8E8E93; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .tab-btn.active { color: white; transform: translateY(-5px); }
        .tab-btn i { font-size: 22px; margin-bottom: 4px; }
        .tab-btn span { font-size: 10px; font-weight: 600; }

        .view { display: none; } .view.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .list-item { background: #F8F9FA; padding: 12px; border-radius: 15px; margin-bottom: 8px; border-left: 5px solid var(--ios-blue); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="d-flex justify-content-between align-items-center">
            <h1>TWINS OS</h1>
            <i class="fas fa-user-circle fa-2x opacity-50"></i>
        </div>
    </header>

    <main class="main-content">
        <section id="v-reg" class="view active">
            <div class="ios-card">
                <h6 class="fw-bold small text-muted mb-3 uppercase">BUSCAR PRODUCTOS</h6>
                <div class="search-container mb-3">
                    <i class="fas fa-search position-absolute" style="left:15px; top:15px; color:#888;"></i>
                    <input type="text" id="mSearch" class="search-input" placeholder="Nombre o SKU..." oninput="doSearch(this.value)">
                    <div id="mSugs" class="sug-list"></div>
                </div>

                <div id="mSelectArea" class="d-none">
                    <div class="p-3 rounded-4 bg-light border-0 mb-3">
                        <div id="mDispN" class="fw-bold"></div>
                        <div id="mDispS" class="text-primary small fw-bold"></div>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-4"><input type="number" id="mCant" class="form-control p-3 rounded-4" placeholder="Cant."></div>
                        <div class="col-8"><button class="btn btn-primary w-100 p-3 rounded-4 fw-bold shadow" onclick="addToCart()">AÑADIR A LISTA</button></div>
                    </div>
                </div>

                <div id="cartArea" class="mt-4 d-none">
                    <h6 class="fw-bold small mb-3">LISTA POR ENTREGAR</h6>
                    <div id="cartItems"></div>
                    <input type="text" id="mWho" class="form-control mt-3 p-3 rounded-4 border-0 bg-light" placeholder="¿Quién solicita?">
                    <select id="mType" class="form-select mt-2 p-3 rounded-4 border-0 bg-light">
                        <option value="MARKETING">MARKETING</option>
                        <option value="OFICINA">OFICINA</option>
                        <option value="VENDEDOR">VENTAS</option>
                    </select>
                    <button class="btn btn-success w-100 p-3 mt-4 rounded-4 fw-bold shadow-lg" onclick="pushToGoogle()">GUARDAR TODO <i class="fas fa-check-circle ms-2"></i></button>
                </div>
            </div>
        </section>

        <section id="v-dev" class="view">
            <div class="ios-card">
                <h6 class="fw-bold text-danger mb-3">REPORTE DE DEVOLUCIÓN</h6>
                <input type="text" id="dCli" class="form-control mb-2 p-3 rounded-4 border-0 bg-light" placeholder="Origen / Cliente">
                <input type="text" id="dPro" class="form-control mb-2 p-3 rounded-4 border-0 bg-light" placeholder="Producto / SKU">
                <div class="row g-2 mb-3">
                    <div class="col-4"><input type="number" id="dCan" class="form-control p-3 rounded-4 border-0 bg-light" placeholder="Cant."></div>
                    <div class="col-8">
                        <select id="dMot" class="form-select p-3 rounded-4 border-0 bg-light">
                            <option>Mal estado</option>
                            <option>Cambio de talla</option>
                            <option>Error Despacho</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-danger w-100 p-3 rounded-4 fw-bold shadow" onclick="handleDev()">GUARDAR Y GENERAR PDF</button>
            </div>
        </section>

        <section id="v-his" class="view">
            <div class="ios-card">
                <h6 class="fw-bold mb-3">HISTORIAL DE HOY</h6>
                <div id="histLog">Cargando datos...</div>
            </div>
        </section>
    </main>

    <nav class="tab-bar">
        <button class="tab-btn active" onclick="nav('reg', this)"><i class="fas fa-plus-square"></i><span>Registro</span></button>
        <button class="tab-btn" onclick="nav('dev', this)"><i class="fas fa-undo"></i><span>Devolver</span></button>
        <button class="tab-btn" onclick="nav('his', this)"><i class="fas fa-history"></i><span>Historial</span></button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxCeMB7Cf1DpA41NEmprwR0XqrvdD_-xTEbl3vKsMlaHIp_r3b5MpMWcbrQKyOiYFF2NQ/exec"; // <--- PEGA TU URL DE GOOGLE UNA ÚLTIMA VEZ
        let DB = []; let CART = [];

        async function init() {
            try {
                const r = await fetch(API_URL, {method: "POST", body: JSON.stringify({action: "load"})});
                const d = await r.json();
                DB = d.p;
                renderHist(d.h);
            } catch(e) { Swal.fire("Error","No se pudo conectar","error"); }
        }

        function doSearch(v) {
            const sug = document.getElementById('mSugs');
            if(v.length < 2) { sug.style.display='none'; return; }
            const f = DB.filter(p => p[0].toString().toLowerCase().includes(v.toLowerCase()) || p[1].toString().toLowerCase().includes(v.toLowerCase())).slice(0,10);
            sug.innerHTML = f.map(p => `<div class="sug-item" onclick="selectItem('${p[0]}','${p[1]}')"><b>${p[1]}</b><small>${p[0]}</small></div>`).join('');
            sug.style.display='block';
        }

        function selectItem(s, n) {
            document.getElementById('mDispN').innerText = n;
            document.getElementById('mDispS').innerText = s;
            document.getElementById('mSelectArea').classList.remove('d-none');
            document.getElementById('mSugs').style.display='none';
            document.getElementById('mSearch').value = s;
        }

        function addToCart() {
            const cant = document.getElementById('mCant').value;
            if(!cant) return;
            CART.push({sku: document.getElementById('mDispS').innerText, name: document.getElementById('mDispN').innerText, cant});
            updateCartUI();
            document.getElementById('mSearch').value = "";
            document.getElementById('mSelectArea').classList.add('d-none');
        }

        function updateCartUI() {
            const area = document.getElementById('cartArea');
            const items = document.getElementById('cartItems');
            if(CART.length > 0) area.classList.remove('d-none');
            items.innerHTML = CART.map((i, idx) => `<div class="list-item"><span>${i.name}</span><b>x${i.cant}</b></div>`).join('');
        }

        async function pushToGoogle() {
            const who = document.getElementById('mWho').value;
            if(!who) return Swal.fire("Datos incompletos","Escribe el solicitante","warning");
            const payload = CART.map(i => [new Date(), document.getElementById('mType').value, i.sku, i.name, i.cant, who, "PENDIENTE SAP"]);
            Swal.fire({title:'Guardando...', didOpen:()=>Swal.showLoading()});
            await fetch(API_URL, {method:"POST", body:JSON.stringify({action:"save", sheet:"Pedidos", payload})});
            Swal.fire("Éxito","Lote guardado","success").then(()=>location.reload());
        }

        async function handleDev() {
            const d = { cli: document.getElementById('dCli').value, pro: document.getElementById('dPro').value, can: document.getElementById('dCan').value, mot: document.getElementById('dMot').value };
            if(!d.cli || !d.pro) return Swal.fire("Error","Faltan datos","warning");
            const payload = [[new Date(), "DEV-"+Date.now(), d.cli, d.pro, d.can, d.mot, "RECIBIDO"]];
            await fetch(API_URL, {method:"POST", body:JSON.stringify({action:"save", sheet:"Devoluciones", payload})});
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("REPORTE DE DEVOLUCIÓN", 20, 20);
            doc.text(`Fecha: ${new Date().toLocaleString()}`, 20, 40);
            doc.text(`Cliente: ${d.cli}`, 20, 50);
            doc.text(`Producto: ${d.pro}`, 20, 60);
            doc.text(`Cant: ${d.can}`, 20, 70);
            doc.save("Devolucion.pdf");
            
            Swal.fire("Guardado","PDF generado","success").then(()=>location.reload());
        }

        function renderHist(l) {
            document.getElementById('histLog').innerHTML = l.map(r => `
                <div class="list-item flex-column align-items-start mb-2">
                    <div class="d-flex justify-content-between w-100"><b>${r[3]}</b> <small>${r[4]} UDS</small></div>
                    <small class="text-muted">${r[1]} | ${r[2]}</small>
                </div>
            `).join('');
        }

        function nav(v, b) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('v-'+v).classList.add('active');
            b.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
