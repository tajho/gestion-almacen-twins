<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGÍSTICA - ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .status { padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; display: inline-block; margin-bottom: 10px; }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #f8d7da; color: #721c24; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; }
        .btn-blue { background: #007bff; }
        .btn-green { background: #28a745; margin-top: 10px; }
        #preview { background: #e9ecef; padding: 10px; border-radius: 5px; margin: 10px 0; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <div id="status-box" class="status offline">PROBANDO CONEXIÓN...</div>
        <h3>Recepción de Contenedor</h3>
        <input type="text" id="cont" placeholder="N° Contenedor (Ej: 0116)">
        <label>Foto Packing:</label>
        <input type="file" id="foto" accept="image/*">
    </div>

    <div class="card">
        <label>Buscador de Producto:</label>
        <input type="text" id="sku" placeholder="Escriba SKU..." oninput="buscar(this.value)">
        <div id="preview">Esperando código...</div>
        
        <div style="display:flex; gap:10px;">
            <input type="number" id="p_pack" placeholder="Cant. Packing">
            <input type="number" id="p_fis" placeholder="Cant. Conteo">
        </div>
        <button class="btn btn-blue" onclick="agregar()">REGISTRAR ITEM</button>
    </div>

    <div id="lista" class="card">
        <table style="width:100%; text-align:left;">
            <thead><tr><th>SKU</th><th>Pack.</th><th>Fis.</th></tr></thead>
            <tbody id="tabla-body"></tbody>
        </table>
        <button class="btn btn-green" onclick="cerrar()">GENERAR REPORTE PDF</button>
    </div>

    <script>
        // PEGA AQUÍ TU URL DE GOOGLE SCRIPTS (EL QUE TERMINA EN /exec)
        const MI_URL = "https://script.google.com/macros/s/AKfycbyhcy51epa-RqZkEtuPiKqZ9qd-4CrUaVtAGgpTsxHuYNM84BlZbld3S5A_kXFdtgh2/exec"; 
        
        let maestro = [];
        let conteo = {};

        window.onload = async () => {
            const s = document.getElementById('status-box');
            try {
                const r = await fetch(MI_URL);
                maestro = await r.json();
                s.innerText = "✓ CONECTADO: " + (maestro.length - 1) + " PRODUCTOS";
                s.className = "status online";
            } catch (e) {
                s.innerText = "X ERROR DE URL O PERMISOS";
                s.className = "status offline";
            }
        };

        function buscar(val) {
            val = val.trim().toUpperCase();
            const f = maestro.find(p => p[0].toString().toUpperCase() === val);
            const p = document.getElementById('preview');
            if(f) {
                p.innerText = "✓ " + f[1];
                p.style.color = "blue";
            } else {
                p.innerText = "PRODUCTO NO EXISTE";
                p.style.color = "red";
            }
        }

        function agregar() {
            const s = document.getElementById('sku').value.toUpperCase().trim();
            const pk = parseInt(document.getElementById('p_pack').value) || 0;
            const fs = parseInt(document.getElementById('p_fis').value) || 0;
            
            if(!s || fs === 0) return;

            if(!conteo[s]) conteo[s] = { p: pk, f: 0 };
            conteo[s].f += fs;
            if(pk > 0) conteo[s].p = pk;

            render();
            document.getElementById('sku').value = "";
            document.getElementById('p_fis').value = "";
            document.getElementById('sku').focus();
        }

        function render() {
            const b = document.getElementById('tabla-body');
            b.innerHTML = "";
            for(let k in conteo) {
                b.innerHTML += `<tr><td>${k}</td><td>${conteo[k].p}</td><td>${conteo[k].f}</td></tr>`;
            }
        }

        function cerrar() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const c = document.getElementById('cont').value;
            doc.text("REPORTE CONTENEDOR: " + c, 20, 20);
            
            const rows = Object.keys(conteo).map(k => [k, conteo[k].p, conteo[k].f, conteo[k].f - conteo[k].p]);
            doc.autoTable({ startY: 30, head: [['SKU', 'PACKING', 'CONTEO', 'DIF']], body: rows });
            
            const y = doc.lastAutoTable.finalY + 30;
            doc.text("Recepción y conteo por: J. Angelo Nuñez Durand", 105, y, {align:'center'});
            doc.text("Asist. Logístico.", 105, y + 10, {align:'center'});
            doc.save(`Recepcion_${c}.pdf`);
        }
    </script>
</body>
</html>
