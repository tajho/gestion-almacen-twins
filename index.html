<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogiMaster - NextGen Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #fdfdfd; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .neo-card { border-radius: 3rem; background: #ffffff; box-shadow: 20px 20px 60px #d9d9d9, -20px -20px 60px #ffffff; }
        .input-scan { border: none; background: transparent; text-align: center; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.05em; }
        .btn-action { background: linear-gradient(145deg, #2563eb, #1d4ed8); box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3); }
        .hidden { display: none !important; }
        .active-nav { color: #2563eb; transform: translateY(-5px); }
        .active-nav::after { content: ''; position: absolute; bottom: -8px; width: 5px; height: 5px; background: #2563eb; border-radius: 50%; }
    </style>
</head>
<body class="pb-36 bg-[#f8fafc]">

    <header class="p-8 pb-4 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-[900] tracking-tighter text-slate-900 italic">LOGI<span class="text-blue-600">MASTER</span></h1>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Auditoría en Tiempo Real</p>
            </div>
        </div>
        <div class="w-12 h-12 neo-card flex items-center justify-center text-xl">👤</div>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-10">

        <section id="vista-auditor" class="animate__animated animate__fadeIn space-y-8">
            <div class="neo-card p-10 text-center space-y-6">
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Escaneo de Carga</p>
                <div class="relative">
                    <input type="text" id="scan-input" oninput="auditarCarga(this)" placeholder="ESPERANDO CÓDIGO" class="input-scan w-full text-blue-600 placeholder:text-slate-200 uppercase">
                    <div class="h-0.5 w-1/2 bg-blue-100 mx-auto mt-2"></div>
                </div>
            </div>

            <div id="status-panel" class="glass rounded-[2.5rem] p-8 min-h-[220px] flex flex-col justify-center items-center text-center space-y-4">
                <img src="https://cdn-icons-png.flaticon.com/512/2312/2312733.png" class="w-20 opacity-20 grayscale" alt="espera">
                <p class="text-slate-400 text-sm font-semibold italic">El sistema está listo. Comience a recibir bultos.</p>
            </div>

            <div class="space-y-4">
                <div id="live-ledger" class="space-y-3">
                    </div>
            </div>

            <button onclick="cerrarSesion()" class="btn-action w-full py-6 rounded-[2rem] text-white font-bold text-sm tracking-widest uppercase transition-all active:scale-90">
                Finalizar Descarga
            </button>
        </section>

        <section id="vista-devoluciones" class="hidden animate__animated animate__fadeIn space-y-6">
            <div class="px-2">
                <h2 class="text-2xl font-black italic">Devoluciones</h2>
                <p class="text-xs text-slate-400">Registro de retornos y estado físico</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="dev-cli" placeholder="Cliente" class="w-full p-5 neo-card border-none text-sm font-bold">
                <input type="text" id="dev-ven" placeholder="Vendedor" class="w-full p-5 neo-card border-none text-sm font-bold text-blue-600">
            </div>
            <div id="dev-rows" class="space-y-4"></div>
            <button onclick="addDevRow()" class="w-full py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">+ Agregar Producto</button>
            <button onclick="saveDev()" class="w-full py-6 bg-slate-900 text-white rounded-[2rem] font-bold uppercase text-xs tracking-widest shadow-2xl">Confirmar Devolución</button>
        </section>

        <section id="vista-historial" class="hidden animate__animated animate__fadeIn space-y-6">
            <h2 class="text-2xl font-black italic px-2">Historial</h2>
            <div id="history-feed" class="space-y-4">
                </div>
        </section>

    </main>

    <nav class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[85%] glass rounded-[2.5rem] p-3 flex justify-around items-center shadow-2xl z-50">
        <button onclick="nav('vista-auditor', this)" class="nav-btn active-nav flex flex-col items-center relative p-3">
            <span class="text-xl">🛠️</span>
            <span class="text-[8px] font-bold uppercase mt-1">Auditor</span>
        </button>
        <button onclick="nav('vista-devoluciones', this)" class="nav-btn flex flex-col items-center relative p-3 text-slate-400">
            <span class="text-xl">🔄</span>
            <span class="text-[8px] font-bold uppercase mt-1">Devolu.</span>
        </button>
        <button onclick="nav('vista-historial', this)" class="nav-btn flex flex-col items-center relative p-3 text-slate-400">
            <span class="text-xl">📊</span>
            <span class="text-[8px] font-bold uppercase mt-1">Reporte</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;

        // Base Maestra (El sistema ya "sabe" el packing)
        const packingList = [
            { id: "101", name: "TAJHO AIR PRO", meta: 120, pack: 12 },
            { id: "102", name: "BOXER COTTON PREMIUM", meta: 48, pack: 24 }
        ];

        let sessionData = {};
        let db = JSON.parse(localStorage.getItem('master_logi_v1')) || [];

        function nav(id, btn) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav', 'text-blue-600'));
            btn.classList.add('active-nav');
            if(id === 'vista-historial') renderHist();
        }

        function auditarCarga(input) {
            const val = input.value.toUpperCase();
            const prod = packingList.find(p => p.id === val);
            const panel = document.getElementById('status-panel');

            if(prod) {
                sessionData[val] = (sessionData[val] || 0) + prod.pack;
                const total = sessionData[val];
                const falta = prod.meta - total;

                panel.className = `animate__animated animate__pulse rounded-[2.5rem] p-8 text-center space-y-2 ${total >= prod.meta ? 'bg-green-50 text-green-600' : 'bg-blue-50 text-blue-600'}`;
                panel.innerHTML = `
                    <p class="text-[10px] font-black uppercase tracking-widest">${prod.name}</p>
                    <h3 class="text-5xl font-black tracking-tighter">${total}</h3>
                    <p class="text-xs font-bold uppercase">${total >= prod.meta ? '¡CONTEO COMPLETADO!' : 'Faltan ' + falta + ' unidades'}</p>
                `;
                input.value = "";
                renderLedger();
            }
        }

        function renderLedger() {
            const ledger = document.getElementById('live-ledger');
            ledger.innerHTML = "";
            for(let key in sessionData) {
                const p = packingList.find(x => x.id === key);
                ledger.innerHTML += `
                    <div class="glass p-5 rounded-3xl flex justify-between items-center animate__animated animate__fadeInLeft">
                        <div>
                            <p class="text-[8px] font-black text-slate-400 uppercase">${key}</p>
                            <p class="text-xs font-bold">${p.name}</p>
                        </div>
                        <span class="text-lg font-black text-blue-600">${sessionData[key]}</span>
                    </div>`;
            }
        }

        function cerrarSesion() {
            if(Object.keys(sessionData).length === 0) return;
            const item = {
                id: "REC-" + Math.random().toString(36).substr(2, 5).toUpperCase(),
                fecha: new Date().toLocaleString(),
                tipo: "INGRESO",
                detalles: {...sessionData}
            };
            db.unshift(item);
            localStorage.setItem('master_logi_v1', JSON.stringify(db));
            sessionData = {};
            location.reload();
        }

        function renderHist() {
            const feed = document.getElementById('history-feed');
            feed.innerHTML = "";
            db.forEach(h => {
                feed.innerHTML += `
                    <div class="neo-card p-6 flex justify-between items-center">
                        <div>
                            <p class="text-[9px] font-black text-slate-400 uppercase">${h.fecha}</p>
                            <h3 class="font-bold text-slate-800">${h.id}</h3>
                        </div>
                        <button onclick="genPDF('${h.id}')" class="w-12 h-12 bg-blue-600 rounded-2xl text-white shadow-lg">📄</button>
                    </div>`;
            });
        }

        function genPDF(id) {
            const h = db.find(x => x.id === id);
            const doc = new jsPDF();
            doc.setFontSize(22); doc.text("REPORTE DE AUDITORÍA", 14, 20);
            doc.setFontSize(10); doc.text(`Registro: ${h.id} | Generado: ${new Date().toLocaleString()}`, 14, 28);
            
            const rows = [];
            for(let k in h.detalles) {
                const p = packingList.find(x => x.id === k);
                rows.push([k, p.name, h.detalles[k], "VERIFICADO"]);
            }

            doc.autoTable({
                startY: 35,
                head: [['CÓDIGO', 'PRODUCTO', 'CONTEO', 'ESTADO']],
                body: rows,
                theme: 'grid',
                headStyles: { fillColor: [37, 99, 235] }
            });

            doc.setFont("helvetica", "italic");
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 20);
            doc.save(`Auditoria_${id}.pdf`);
        }
    </script>
</body>
</html>
