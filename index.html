<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v54</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; height: 100vh; overflow: hidden; margin: 0; }
        
        /* Contenedores de Pantalla Completa */
        .view { display: none; height: 100vh; padding: 1rem; flex-direction: column; box-sizing: border-box; }
        .view.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Iconos y Tipografía Escalada para Móvil */
        .nav-btn { background: white; border-radius: 1.2rem; padding: 0.8rem 1.2rem; display: flex; align-items: center; gap: 0.8rem; border: 1px solid #e2e8f0; height: 26%; transition: 0.2s; }
        .nav-btn:active { transform: scale(0.97); background: #f1f5f9; }
        .icon-box { width: 2.2rem; height: 2.2rem; border-radius: 0.8rem; display: flex; items-center; justify-content: center; flex-shrink: 0; }
        
        /* Animación del Contenedor */
        .truck-track { position: relative; width: 100%; height: 35px; background: #e2e8f0; border-radius: 8px; margin: 10px 0; overflow: hidden; }
        .truck-icon { position: absolute; left: 0; top: 50%; transform: translateY(-50%); transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        .truck-progress { position: absolute; left: 0; top: 0; height: 100%; background: #dbeafe; transition: width 0.8s ease; border-right: 2px solid var(--blue); }

        /* Inputs Compactos */
        .mini-input { background: white; border: 1px solid #cbd5e1; border-radius: 0.7rem; padding: 0.5rem 0.8rem; font-size: 0.85rem; font-weight: 700; width: 100%; outline: none; }
        .mini-input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }

        .btn-blue { background: var(--blue); color: white; border-radius: 0.8rem; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; padding: 0.8rem; text-align: center; width: 100%; }
        
        /* Área de lista con scroll interno limitado */
        .list-area { flex-grow: 1; overflow-y: auto; margin: 0.5rem 0; border-radius: 0.8rem; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full h-12 px-4 flex justify-between items-center bg-white/90 backdrop-blur border-b z-50">
        <button onclick="goHome()" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-100"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></button>
        <span class="text-[10px] font-black italic tracking-tighter uppercase">TAJHO<span class="text-blue-600">.OS</span></span>
    </header>

    <div id="view-home" class="view active pt-14">
        <h1 class="text-xl font-black italic mb-4 leading-tight">MÓDULOS DE<br><span class="text-blue-600 uppercase">INVENTARIO</span></h1>
        
        <div class="flex flex-col gap-3 flex-grow pb-2">
            <div onclick="navTo('crear')" class="nav-btn">
                <div class="icon-box bg-blue-100 text-blue-600"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg></div>
                <div><p class="text-[13px] font-black uppercase">Contenedor</p><p class="text-[9px] font-bold text-slate-400">NUEVA CARGA</p></div>
            </div>

            <div onclick="navTo('historial')" class="nav-btn">
                <div class="icon-box bg-emerald-100 text-emerald-600"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div>
                <div><p class="text-[13px] font-black uppercase">Registros</p><p class="text-[9px] font-bold text-slate-400">HISTORIAL</p></div>
            </div>

            <div class="nav-btn opacity-60">
                <div class="icon-box bg-orange-100 text-orange-600"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m11 17-5-5 5-5"/><path d="M18 17v-3a4 4 0 0 0-4-4H6"/></svg></div>
                <div><p class="text-[13px] font-black uppercase">Devoluciones</p><p class="text-[9px] font-bold text-slate-400">RETORNOS</p></div>
            </div>
        </div>
    </div>

    <div id="view-ops" class="view pt-14">
        <div class="bg-white p-3 rounded-2xl border mb-3">
            <div class="flex justify-between items-center mb-1 px-1">
                <p class="text-[9px] font-black text-blue-600 uppercase tracking-tighter">Progreso de Carga</p>
                <p id="global-pc" class="text-xs font-black italic">0%</p>
            </div>
            <div class="truck-track">
                <div id="truck-fill" class="truck-progress" style="width: 0%"></div>
                <div id="truck-icon" class="truck-icon" style="left: 0%">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="text-blue-600"><path d="M21 8h-2V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v12h1c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h1V8l-3 0zm-14 9c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm11 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm2-7h-2V6h2v4z"/></svg>
                </div>
            </div>
        </div>

        <div class="mb-4">
            <select id="sel-sku" onchange="syncItem()" class="text-lg font-black bg-transparent w-full text-center border-b-2 border-slate-200 outline-none mb-1"></select>
            <p id="live-desc" class="text-[8px] font-bold text-slate-400 uppercase text-center truncate"></p>
        </div>

        <div class="flex flex-col gap-4 flex-grow justify-center pb-2">
            <div class="flex items-center justify-center gap-4">
                <input type="number" id="qty-in" class="mini-input w-24 h-16 text-center text-3xl" placeholder="0">
                <button onclick="registrarBulto()" class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg></button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-50 p-3 rounded-xl border text-center">
                    <p class="text-[7px] font-black text-slate-400 uppercase">Restante</p>
                    <p id="live-rem" class="text-xl font-black">0</p>
                </div>
                <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 text-center">
                    <p class="text-[7px] font-black text-blue-400 uppercase">Real</p>
                    <p id="live-real" class="text-xl font-black text-blue-600">0</p>
                </div>
            </div>

            <div class="px-1">
                <div class="flex justify-between text-[8px] font-black mb-1">
                    <p class="uppercase text-slate-300">Item Status</p>
                    <p id="item-pc" class="text-slate-900">0%</p>
                </div>
                <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                    <div id="item-bar" class="h-full bg-slate-900 transition-all" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <button onclick="finishAndReport()" class="btn-blue bg-slate-900 mb-2">Finalizar y Firmar</button>
    </div>

    <div id="view-crear" class="view pt-14">
        <h2 class="text-sm font-black italic mb-3">LISTA DE <span class="text-blue-600">CARGA</span></h2>
        <div class="bg-white p-3 rounded-xl border space-y-2 mb-3">
            <div class="relative">
                <input type="text" id="s-sku" oninput="smartSearch()" class="mini-input" placeholder="SKU">
                <div id="search-results" class="hidden absolute z-50 w-full bg-white border rounded-lg shadow-xl mt-1 max-h-24 overflow-y-auto"></div>
            </div>
            <div class="flex gap-2">
                <input type="number" id="s-meta" class="mini-input flex-1" placeholder="CANT.">
                <button onclick="addMani()" class="w-10 h-9 bg-blue-600 text-white rounded-lg flex items-center justify-center shadow-md active:scale-90"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg></button>
            </div>
        </div>

        <div class="list-area border-t pt-2">
            <div id="pre-list" class="space-y-1.5"></div>
        </div>

        <button id="btn-done" onclick="openModal()" class="hidden btn-blue mt-2">Comenzar Operación</button>
    </div>

    <div id="view-historial" class="view pt-14">
        <h2 class="text-sm font-black italic mb-4">ARCHIVOS <span class="text-blue-600">LOCALES</span></h2>
        <div id="history-list" class="list-area space-y-2"></div>
    </div>

    <div id="modal-choice" class="fixed inset-0 z-[2000] bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center p-8">
        <div class="bg-white w-full rounded-2xl p-6 text-center shadow-2xl">
            <h3 class="text-xs font-black mb-4 italic uppercase italic">¿Confirmar Inicio?</h3>
            <div class="flex flex-col gap-2">
                <button onclick="continuarConteo()" class="btn-blue py-3">Iniciar Conteo</button>
                <button onclick="guardarMani()" class="btn-blue bg-slate-100 text-slate-500 py-3">Solo Guardar</button>
                <button onclick="closeModal()" class="text-[8px] font-black uppercase text-slate-300 mt-2">Regresar</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_items = {};
        let currentMani = JSON.parse(localStorage.getItem('taj_cur')) || [];
        let history = JSON.parse(localStorage.getItem('taj_his')) || [];
        let activeJob = JSON.parse(localStorage.getItem('taj_active')) || null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                const raw = await res.json();
                raw.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().toUpperCase().trim()] = r.DESCRIPCION; });
                const lastView = localStorage.getItem('taj_view') || 'home';
                if(lastView === 'ops' && activeJob) startOps(activeJob);
                else navTo(lastView);
            } catch (e) { console.warn("Offline"); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            localStorage.setItem('taj_view', v);
            if(v === 'historial') renderHistory();
            if(v === 'crear') renderPreList();
        }

        function goHome() { navTo('home'); }

        function smartSearch() {
            const input = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('search-results');
            if(input.length < 1) { resDiv.classList.add('hidden'); return; }
            const matches = Object.keys(db_items).filter(k => k.includes(input)).slice(0,5);
            resDiv.innerHTML = matches.map(k => `<div onclick="setProd('${k}')" class="p-2 border-b text-[10px] font-bold uppercase">${k}</div>`).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(s) {
            document.getElementById('s-sku').value = s;
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "GENERICO", meta, real: 0 });
            localStorage.setItem('taj_cur', JSON.stringify(currentMani));
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderPreList() {
            const container = document.getElementById('pre-list');
            container.innerHTML = currentMani.map((i, idx) => `
                <div class="flex justify-between items-center bg-white p-2.5 rounded-lg border text-[10px] font-bold">
                    <span class="uppercase">${i.sku}</span>
                    <span class="text-blue-600">${i.meta} CJ</span>
                </div>
            `).join('');
            if(currentMani.length > 0) document.getElementById('btn-done').classList.remove('hidden');
        }

        function openModal() { document.getElementById('modal-choice').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-choice').style.display = 'none'; }

        function continuarConteo() {
            closeModal();
            activeJob = { id: Date.now(), name: "OP-" + new Date().getHours() + new Date().getMinutes(), items: [...currentMani], status: 'PROCESO' };
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
            currentMani = []; localStorage.removeItem('taj_cur');
            startOps(activeJob);
        }

        function startOps(job) {
            navTo('ops');
            document.getElementById('sel-sku').innerHTML = job.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem();
        }

        function syncItem() {
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('live-desc').innerText = item.desc;
            document.getElementById('live-rem').innerText = Math.max(0, item.meta - item.real);
            document.getElementById('live-real').innerText = item.real;

            const itemPc = Math.min(Math.round((item.real / item.meta) * 100), 100);
            document.getElementById('item-bar').style.width = itemPc + "%";
            document.getElementById('item-pc').innerText = itemPc + "%";

            const totalM = activeJob.items.reduce((a,b) => a + b.meta, 0);
            const totalR = activeJob.items.reduce((a,b) => a + b.real, 0);
            const pc = Math.min(Math.round((totalR / totalM) * 100), 100);
            
            // Animación del Camión
            document.getElementById('truck-fill').style.width = pc + "%";
            document.getElementById('truck-icon').style.left = `calc(${pc}% - 12px)`;
            document.getElementById('global-pc').innerText = pc + "%";
            
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
        }

        function registrarBulto() {
            const q = parseInt(document.getElementById('qty-in').value);
            if(!q) return;
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += q;
            document.getElementById('qty-in').value = '';
            syncItem();
            navigator.vibrate(20);
            fetch(CLOUD_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({tipo:'CARGA', datos: [new Date().toLocaleString(), item.sku, q]})});
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="bg-white p-3 rounded-xl flex justify-between items-center border shadow-sm">
                    <div>
                        <p class="text-[7px] font-black text-blue-500 uppercase mb-0.5">${h.status}</p>
                        <p class="text-[10px] font-bold uppercase italic">${h.name}</p>
                    </div>
                    <button onclick="startFromHistory(${h.id})" class="bg-slate-900 text-white text-[8px] font-black px-4 py-2 rounded-lg">ABRIR</button>
                </div>
            `).join('');
        }

        function finishAndReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(14); doc.text("REPORTE TAJHO.OS", 14, 20);
            doc.autoTable({
                startY: 25, head: [['SKU', 'META', 'REAL', 'DIF']],
                body: activeJob.items.map(i => [i.sku, i.meta, i.real, i.meta-i.real]),
                theme: 'grid', headStyles: { fillColor: [37, 99, 235] }
            });
            const finalY = doc.lastAutoTable.finalY + 10;
            doc.setFontSize(8);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, finalY);
            doc.save(`TAJHO_${activeJob.name}.pdf`);
            activeJob.status = 'COMPLETADO';
            localStorage.setItem('taj_his', JSON.stringify(history));
            localStorage.removeItem('taj_active');
            navTo('historial');
        }

        init();
    </script>
</body>
</html>
