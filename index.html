<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twins DESPACHO - Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue-twins: #2563eb; --bg-light: #f8f9fc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); margin: 0; }
        .view { display: none; min-height: 100vh; padding: 1.2rem; flex-direction: column; }
        .view.active { display: flex; }
        .history-card { background: white; border-radius: 1.5rem; border: 1px solid #f1f3f6; padding: 1.25rem; margin-bottom: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .btn-outline { border: 1px solid #e2e8f0; font-size: 0.7rem; font-weight: 700; padding: 0.65rem; border-radius: 0.8rem; flex: 1; text-align: center; }
        .btn-report-green { background: #f0fdf4; color: #16a34a; border-color: #dcfce7; }
    </style>
</head>
<body>

    <header class="h-20 px-6 flex justify-between items-center bg-white border-b border-slate-100">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-xl italic">T</div>
            <div>
                <h1 class="text-lg font-black tracking-tight leading-none uppercase">Twins <span class="text-blue-600">Despacho</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Gestión de Inventario</p>
            </div>
        </div>
        <button onclick="navTo('home')" class="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center text-slate-400">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        </button>
    </header>

    <div id="view-home" class="view active">
        <div class="mt-8 space-y-4">
            <div onclick="navTo('crear')" class="history-card flex items-center gap-4 !py-6 border-l-4 border-l-blue-600">
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center font-bold">N</div>
                <div><h3 class="font-black text-sm uppercase">Nueva Carga</h3></div>
            </div>
            <div onclick="navTo('historial')" class="history-card flex items-center gap-4 !py-6 border-l-4 border-l-slate-800">
                <div class="w-12 h-12 bg-slate-50 text-slate-800 rounded-xl flex items-center justify-center font-bold">H</div>
                <div><h3 class="font-black text-sm uppercase">Historial</h3></div>
            </div>
        </div>
    </div>

    <div id="view-historial" class="view">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black italic">Historial de <br><span class="text-blue-600">Actividad</span></h2>
            <button onclick="limpiarYRecargar()" class="text-[8px] font-bold text-slate-300 uppercase">Limpiar</button>
        </div>
        <div id="history-list" class="flex-grow overflow-y-auto pb-10">
            </div>
    </div>

    <script>
        // FUNCIÓN CLAVE: Inyecta datos si la lista está vacía
        function asegurarDatosFalsos() {
            let history = JSON.parse(localStorage.getItem('taj_history')) || [];
            if (history.length === 0) {
                history = [
                    { 
                        id: "CEP-929", 
                        fecha: "10/3/2026, 12:43:00", 
                        tipo: 'SISTEMA', 
                        duracion: "45 min", 
                        eficiencia: "100%", 
                        items: [{sku: 'AR-03808', real: 247, meta: 247}] 
                    },
                    { 
                        id: "BUL-742", 
                        fecha: "10/3/2026, 13:04:00", 
                        tipo: 'SISTEMA', 
                        duracion: "30 min", 
                        eficiencia: "98%", 
                        items: [{sku: 'AR-00586', real: 124, meta: 126}] 
                    }
                ];
                localStorage.setItem('taj_history', JSON.stringify(history));
            }
            return history;
        }

        function renderHistory() {
            const history = asegurarDatosFalsos();
            const list = document.getElementById('history-list');
            
            list.innerHTML = history.map(h => `
                <div class="history-card">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2 text-[9px] font-black">
                            <span class="text-red-500">📅 ${h.fecha.split(',')[0]}</span>
                            <span class="text-blue-600">🆔 ${h.id}</span>
                        </div>
                        <span class="text-[8px] font-bold text-slate-300 uppercase">${h.tipo}</span>
                    </div>
                    <div class="flex justify-between items-end mb-4">
                        <h4 class="text-3xl font-black text-slate-800">${h.items[0].real} <span class="text-[10px] text-slate-400 font-bold uppercase">Cjs</span></h4>
                        <div class="text-right">
                            <p class="text-[8px] font-bold text-slate-400 uppercase">Precisión</p>
                            <p class="text-sm font-black text-emerald-600">${h.eficiencia}</p>
                        </div>
                    </div>
                    <div class="bg-slate-50 rounded-xl p-3 flex items-center gap-3 mb-4 border border-slate-100">
                        <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                            <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        </div>
                        <p class="text-[9px] font-bold text-slate-500 uppercase">OPERADOR: <span class="text-slate-900">J. ANGELO NUÑEZ</span></p>
                    </div>
                </div>
            `).join('');
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if (v === 'historial') renderHistory();
        }

        function limpiarYRecargar() {
            localStorage.removeItem('taj_history');
            renderHistory();
        }

        // Ejecutar al cargar
        window.onload = () => {
            if (window.location.hash === '#historial') navTo('historial');
        };
    </script>
</body>
</html>
