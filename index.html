<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tajho Aura Prime | Twins Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.95); --accent: #000000; --border: rgba(0,0,0,0.06); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #0f172a; letter-spacing: -0.01em; overflow: hidden; height: 100vh; }
        
        /* Contenedores de vista */
        .view { display: none; height: 100vh; padding: 24px; flex-direction: column; animation: viewIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; padding-bottom: 120px; }
        .view.active { display: flex; }
        @keyframes viewIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .aura-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 32px; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.04); }
        
        /* Navegación Inferior Elegante */
        .nav-dock { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-radius: 35px; border: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 20px; border-radius: 25px; transition: 0.3s; color: #94a3b8; }
        .nav-btn.active { background: #000; color: #fff; }
        .nav-btn i { font-size: 24px; }
        .nav-btn span { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }

        input, select { background: #fff!important; border: 1px solid #e2e8f0!important; border-radius: 20px!important; padding: 16px!important; font-weight: 600!important; outline: none!important; transition: 0.2s; }
        input:focus { border-color: #000!important; box-shadow: 0 0 0 4px rgba(0,0,0,0.05); }

        .btn-prime { background: var(--accent); color: white; padding: 20px; border-radius: 24px; font-weight: 800; text-transform: uppercase; font-size: 11px; letter-spacing: 0.1em; }
        
        /* Buscador Ultra Rápido */
        #search-results { position: absolute; width: 100%; top: 100%; z-index: 100; margin-top: 10px; background: white; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); max-height: 250px; overflow-y: auto; border: 1px solid var(--border); }
        .search-item { padding: 16px 20px; border-bottom: 1px solid #f8fafc; cursor: pointer; transition: 0.2s; }
        .search-item:active { background: #f1f5f9; }

        /* Dialogos Personalizados */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 24px; }
        .modal.active { display: flex; }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="nav-dock">
        <button onclick="navTo('dash')" class="nav-btn active" id="btn-dash"><i class="ph-duotone ph-house"></i><span>Inicio</span></button>
        <button onclick="navTo('create')" class="nav-btn" id="btn-create"><i class="ph-duotone ph-truck-loading"></i><span>Contenedor</span></button>
        <button onclick="navTo('hist')" class="nav-btn" id="btn-hist"><i class="ph-duotone ph-calendar-blank"></i><span>Historial</span></button>
    </nav>

    <div id="v-dash" class="view active">
        <header class="pt-20 pb-16 text-center">
            <h1 class="text-[10px] font-extrabold tracking-[0.8em] text-slate-300 uppercase mb-4">Twins Elite Logistics</h1>
            <h2 class="text-5xl font-light italic tracking-tight text-slate-900">Tajho <span class="font-black not-italic tracking-tighter text-black">Prime</span></h2>
        </header>
        <div class="aura-card p-10 text-center">
            <i class="ph-duotone ph-package text-6xl text-slate-200 mb-6 block"></i>
            <h3 class="font-black text-xl mb-2">Bienvenido, Angelo</h3>
            <p class="text-xs text-slate-400 font-medium">Gestión de inventario de alta precisión.</p>
        </div>
    </div>

    <div id="v-create" class="view">
        <h2 class="text-3xl font-black mb-8 tracking-tighter">Nueva Carga</h2>
        <div class="aura-card p-7 space-y-6">
            <div class="relative">
                <label class="text-[9px] font-extrabold uppercase text-slate-400 ml-2 mb-2 block">Buscador Inteligente</label>
                <input type="text" id="sku-in" oninput="searchMaster(this.value)" class="w-full" placeholder="SKU o Nombre..." autocomplete="off">
                <div id="search-results" class="hidden"></div>
            </div>
            <div class="flex gap-4">
                <input type="number" id="meta-in" class="flex-1 text-center text-xl font-bold" placeholder="Cajas">
                <button onclick="addToQueue()" class="px-8 bg-slate-100 rounded-2xl font-black text-[10px] uppercase">Añadir</button>
            </div>
        </div>
        <div id="queue-list" class="mt-6 space-y-3 flex-1 overflow-y-auto"></div>
        <button onclick="saveContenedor()" class="w-full btn-prime mt-6">Registrar en Sistema</button>
    </div>

    <div id="v-hist" class="view">
        <h2 class="text-3xl font-black mb-8 tracking-tighter">Consulta</h2>
        <div class="aura-card p-6 mb-6">
            <div class="grid grid-cols-2 gap-4 mb-6 pb-6 border-b border-slate-100 text-center">
                <div><p class="text-[8px] font-black text-slate-400 uppercase mb-1">En el Mes</p><p id="stats-cont" class="text-2xl font-black text-black">0</p></div>
                <div><p class="text-[8px] font-black text-slate-400 uppercase mb-1">Cajas Totales</p><p id="stats-cajas" class="text-2xl font-black text-black">0</p></div>
            </div>
            <div class="flex flex-col gap-3">
                <input type="text" id="sku-query" class="w-full text-sm" placeholder="Filtrar por SKU o Producto..." oninput="filterByProduct(this.value)">
                <select id="month-filter" onchange="filterByProduct(document.getElementById('sku-query').value)" class="w-full text-[10px] font-black uppercase">
                    <option value="all">Historial Completo</option>
                    <option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option><option value="3">Abril</option><option value="4">Mayo</option><option value="5">Junio</option><option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option><option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option>
                </select>
            </div>
        </div>
        <div id="product-results" class="space-y-4"></div>
    </div>

    <div id="v-work" class="view">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black tracking-tighter" id="work-title"></h2>
            <button onclick="showModal('m-finish')" class="w-12 h-12 rounded-full bg-red-50 text-red-500 flex items-center justify-center"><i class="ph-bold ph-power"></i></button>
        </div>
        <div class="aura-card p-8 text-center mb-6">
            <select id="work-select" onchange="refreshWorkStats()" class="w-full mb-6 text-xl font-black border-none bg-slate-50"></select>
            <div class="flex items-center justify-center gap-4">
                <input type="number" id="work-input" class="w-28 text-5xl font-black text-center border-none" placeholder="0">
                <button onclick="commitCount()" class="w-20 h-20 rounded-3xl bg-black text-white flex items-center justify-center"><i class="ph-bold ph-plus text-2xl"></i></button>
            </div>
        </div>
        <div id="work-stats" class="space-y-3 flex-1 overflow-y-auto"></div>
    </div>

    <div id="m-finish" class="modal">
        <div class="aura-card p-10 w-full max-w-sm text-center">
            <i class="ph-duotone ph-seal-check text-6xl text-black mb-6 block"></i>
            <h3 class="text-xl font-black mb-4">¿Finalizar Conteo?</h3>
            <button onclick="finalizeWork()" class="w-full btn-prime mb-3">Sí, Generar Reporte</button>
            <button onclick="hideModal('m-finish')" class="text-[10px] font-black uppercase text-slate-400">Cancelar</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let master = [], queue = [], currentOp = null;

        window.onload = async () => { 
            loadMasterData(); 
            checkSession(); 
            document.getElementById('month-filter').value = new Date().getMonth();
            filterByProduct('');
        };

        function navTo(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            if(document.getElementById('btn-' + v)) document.getElementById('btn-' + v).classList.add('active');
            if(v === 'hist') filterByProduct(document.getElementById('sku-query').value);
        }

        async function loadMasterData() { try { const res = await fetch(API_URL); master = await res.json(); } catch(e) {} }

        // BUSCADOR ULTRA RÁPIDO (Hoja 1)
        function searchMaster(q) {
            const resDiv = document.getElementById('search-results');
            if (q.length < 2) { resDiv.classList.add('hidden'); return; }
            const term = q.toLowerCase();
            // Filtrado optimizado
            const matches = master.filter(row => {
                const s = String(row.sku || row.SKU || '').toLowerCase();
                const d = String(row.descripcion || row.DESCRIPCION || '').toLowerCase();
                return s.includes(term) || d.includes(term);
            }).slice(0, 5);

            if(matches.length > 0) {
                resDiv.innerHTML = matches.map(x => `
                    <div onclick="pickSku('${x.sku || x.SKU}', '${x.descripcion || x.DESCRIPCION || ''}')" class="search-item">
                        <p class="font-black text-sm text-black">${x.sku || x.SKU}</p>
                        <p class="text-[9px] text-slate-400 font-bold uppercase">${x.descripcion || x.DESCRIPCION || ''}</p>
                    </div>`).join('');
                resDiv.classList.remove('hidden');
            } else { resDiv.classList.add('hidden'); }
        }

        function pickSku(s, d) { 
            const inp = document.getElementById('sku-in');
            inp.value = s; inp.dataset.desc = d; 
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('meta-in').focus();
        }

        // LÓGICA DE FILTRO HISTORIAL (Hoja 2)
        function filterByProduct(q) {
            const history = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            const resultsDiv = document.getElementById('product-results');
            const selectedMonth = document.getElementById('month-filter').value;
            const term = q.toLowerCase();
            
            let html = ""; let totalCajas = 0; let totalCont = new Set();

            history.forEach((op, idx) => {
                const dateParts = op.date.split(',')[0].split('/');
                const opMonth = new Date(dateParts[2], dateParts[1] - 1, dateParts[0]).getMonth();
                const matchesMonth = (selectedMonth === 'all' || opMonth.toString() === selectedMonth);

                if (matchesMonth) {
                    op.items.forEach(it => { totalCajas += (it.r || 0); if(it.r > 0) totalCont.add(op.id); });
                }

                if (q.length > 0) {
                    op.items.forEach(item => {
                        const s = item.sku.toLowerCase();
                        const d = (item.desc || '').toLowerCase();
                        if ((s.includes(term) || d.includes(term)) && matchesMonth && item.r > 0) {
                            html += `
                            <div class="aura-card p-5 mb-3 border-l-4 border-black">
                                <p class="text-[8px] font-black text-slate-400 uppercase mb-1">${op.id} | ${op.date}</p>
                                <div class="flex justify-between items-center">
                                    <div><p class="text-sm font-black">${item.sku}</p><p class="text-[9px] text-slate-400 uppercase font-bold">${item.desc || ''}</p></div>
                                    <p class="text-xl font-black">${item.r}</p>
                                </div>
                            </div>`;
                        }
                    });
                } else if (matchesMonth) {
                    html += `
                    <div class="aura-card p-6 flex justify-between items-center mb-3">
                        <div><p class="text-[8px] font-black text-slate-300 uppercase">${op.date}</p><p class="text-xl font-extrabold italic tracking-tighter">${op.id}</p></div>
                        ${op.done ? `<button onclick="genPDF(${idx})" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center"><i class="ph-duotone ph-file-pdf text-xl"></i></button>` : 
                        `<button onclick="openWork(${idx})" class="px-5 py-2 rounded-xl bg-black text-white font-black text-[9px] uppercase">Contar</button>`}
                    </div>`;
                }
            });

            document.getElementById('stats-cont').innerText = totalCont.size;
            document.getElementById('stats-cajas').innerText = totalCajas.toLocaleString();
            resultsDiv.innerHTML = html || '<p class="text-center py-10 text-slate-300 uppercase text-[9px] font-bold">Sin registros</p>';
        }

        // SESIÓN Y TRABAJO
        function checkSession() {
            const savedOp = localStorage.getItem('tajho_active_op');
            if (savedOp) {
                currentOp = JSON.parse(savedOp); navTo('work');
                document.getElementById('work-title').innerText = currentOp.id;
                document.getElementById('work-select').innerHTML = currentOp.items.map(x => `<option value="${x.sku}">${x.sku}</option>`).join('');
                refreshWorkStats();
            }
        }

        function addToQueue() {
            const s = document.getElementById('sku-in').value, d = document.getElementById('sku-in').dataset.desc || '', m = parseInt(document.getElementById('meta-in').value);
            if(!s || !m) return;
            queue.push({ sku: s, desc: d, meta: m, r: 0 });
            localStorage.setItem('tajho_pending_queue', JSON.stringify(queue));
            document.getElementById('sku-in').value = ''; document.getElementById('meta-in').value = '';
            renderQueue();
        }

        function renderQueue() {
            document.getElementById('queue-list').innerHTML = queue.map((x, i) => `
                <div class="aura-card p-5 flex justify-between items-center bg-white/50">
                    <div><p class="font-bold text-sm">${x.sku}</p><p class="text-[9px] text-slate-400 font-bold uppercase">${x.desc}</p></div>
                    <button onclick="queue.splice(${i},1);renderQueue()" class="text-red-400"><i class="ph-bold ph-x-circle"></i></button>
                </div>`).join('');
        }

        function saveContenedor() {
            if(queue.length === 0) return;
            const h = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            const lastNum = h.length > 0 ? Math.max(...h.map(op => parseInt(op.id.split('-')[1]) || 0)) : 0;
            const newID = `TWINS-${String(lastNum + 1).padStart(4, '0')}`;
            const op = { id: newID, date: new Date().toLocaleString('es-PE'), items: [...queue], done: false };
            h.unshift(op);
            localStorage.setItem('tajho_v3', JSON.stringify(h));
            localStorage.removeItem('tajho_pending_queue');
            queue = []; renderQueue(); navTo('hist');
        }

        function openWork(idx) {
            const h = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            currentOp = { ...h[idx], localIdx: idx };
            localStorage.setItem('tajho_active_op', JSON.stringify(currentOp));
            navTo('work');
            document.getElementById('work-title').innerText = currentOp.id;
            document.getElementById('work-select').innerHTML = currentOp.items.map(x => `<option value="${x.sku}">${x.sku}</option>`).join('');
            refreshWorkStats();
        }

        function commitCount() {
            const val = parseInt(document.getElementById('work-input').value); if(isNaN(val)) return;
            const item = currentOp.items.find(x => x.sku === document.getElementById('work-select').value);
            item.r += val; document.getElementById('work-input').value = '';
            localStorage.setItem('tajho_active_op', JSON.stringify(currentOp));
            let h = JSON.parse(localStorage.getItem('tajho_v3') || '[]'); h[currentOp.localIdx] = currentOp;
            localStorage.setItem('tajho_v3', JSON.stringify(h));
            refreshWorkStats();
        }

        function refreshWorkStats() {
            document.getElementById('work-stats').innerHTML = currentOp.items.map(x => `
                <div class="aura-card p-5">
                    <div class="flex justify-between text-[10px] font-black uppercase mb-3"><span>${x.sku}</span><span>${x.r} / ${x.meta}</span></div>
                    <div class="h-1 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-black" style="width:${Math.min((x.r/x.meta)*100,100)}%"></div></div>
                </div>`).join('');
        }

        async function finalizeWork() {
            currentOp.done = true;
            let h = JSON.parse(localStorage.getItem('tajho_v3') || '[]'); h[currentOp.localIdx] = currentOp;
            localStorage.setItem('tajho_v3', JSON.stringify(h));
            localStorage.removeItem('tajho_active_op');
            genPDF(currentOp.localIdx);
            hideModal('m-finish');
            navTo('hist');
        }

        function genPDF(idx) {
            const d = JSON.parse(localStorage.getItem('tajho_v3') || '[]')[idx];
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.setFontSize(20); doc.text("TAJHO PRIME | TWINS ELITE", 14, 25);
            doc.setFontSize(9); doc.text(`REPORTE: ${d.id} | ${d.date}`, 14, 32);
            doc.autoTable({ startY: 40, head: [['SKU', 'DESCRIPCION', 'META', 'REAL', 'DIF.']], body: d.items.map(it => [it.sku, it.desc, it.meta, it.r, (it.r - it.meta)]), headStyles: { fillColor: [0,0,0] } });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, doc.lastAutoTable.finalY + 20);
            doc.save(`Reporte_${d.id}.pdf`);
        }

        function showModal(id) { document.getElementById(id).classList.add('active'); }
        function hideModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
