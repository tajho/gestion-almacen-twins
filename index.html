<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v31 Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #0f172a; overflow-x: hidden; }
        .card-modern { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        .input-clean { background: #f1f5f9; border-radius: 1.25rem; border: 2px solid transparent; font-weight: 700; transition: 0.3s; padding: 0.8rem 1.2rem; }
        .input-clean:focus { border-color: var(--blue); background: white; outline: none; }
        #landing { position: fixed; inset: 0; z-index: 500; background: white; padding: 2.5rem; display: flex; flex-direction: column; justify-content: center; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .hide-landing { transform: translateY(-100%); visibility: hidden; }
        .tab-panel { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="landing">
        <header class="mb-12">
            <h1 class="text-5xl font-[800] tracking-tighter leading-tight">¿Qué hacemos<br><span class="text-blue-600">hoy, Tajho?</span></h1>
        </header>
        <div class="space-y-4">
            <button onclick="navTo('contenedor')" class="card-modern w-full p-6 flex items-center gap-5 border-none shadow-xl">
                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/></svg>
                </div>
                <div class="text-left">
                    <p class="text-sm font-black uppercase tracking-widest text-slate-900">Contenedor</p>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Carga Inteligente</p>
                </div>
            </button>
            <button onclick="navTo('devoluciones')" class="card-modern w-full p-6 flex items-center gap-5 border-none shadow-xl">
                <div class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-500">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/><path d="M9 12h12"/></svg>
                </div>
                <div class="text-left">
                    <p class="text-sm font-black uppercase tracking-widest text-slate-900">Devoluciones</p>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Control de Retornos</p>
                </div>
            </button>
        </div>
    </div>

    <header class="h-16 px-6 flex justify-between items-center bg-white/90 backdrop-blur sticky top-0 z-50">
        <button onclick="location.reload()" class="p-2">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <div class="text-center">
            <p id="nav-title" class="text-[8px] font-black uppercase tracking-widest text-slate-400">Operación</p>
            <h3 class="text-xs font-black italic">TAJHO<span class="text-blue-600">.OS</span></h3>
        </div>
        <div id="cloud-indicator" class="w-10 flex justify-end text-slate-300 transition-colors">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        </div>
    </header>

    <main class="p-6 pb-24">
        <div id="view-contenedor" class="tab-panel active space-y-5">
            <div id="setup-card" class="card-modern p-6 space-y-4">
                <h3 class="text-[9px] font-black uppercase text-slate-400">Nuevo Manifiesto Nube</h3>
                <div class="space-y-3">
                    <input type="text" id="s-sku" oninput="autoLookup()" class="input-clean w-full text-sm uppercase" placeholder="SKU / CÓDIGO">
                    <input type="text" id="s-desc" class="input-clean w-full text-xs text-slate-500 italic" placeholder="Cargando desde Sheets..." readonly>
                    <input type="number" id="s-meta" class="input-clean w-full text-sm" placeholder="META TOTAL (CAJAS)">
                </div>
                <button onclick="addMani()" class="w-full bg-slate-900 text-white py-4 rounded-xl text-[10px] font-black uppercase tracking-widest">Añadir al Listado</button>
                <div id="pre-list" class="space-y-2"></div>
                <button id="btn-start" onclick="startWork()" class="hidden w-full bg-blue-600 text-white py-4 rounded-xl text-[11px] font-black uppercase shadow-xl">Iniciar Operación</button>
            </div>

            <div id="ops-card" class="hidden card-modern p-8 space-y-6">
                <div class="text-center space-y-1">
                    <select id="sel-sku" onchange="syncItem()" class="text-3xl font-black bg-transparent outline-none text-slate-900"></select>
                    <p id="live-desc" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest"></p>
                </div>
                <div class="flex flex-col items-center gap-4">
                    <div class="flex items-center gap-3">
                        <input type="number" id="qty-in" class="input-clean w-28 text-center text-3xl h-16" placeholder="0">
                        <button onclick="sumarBulto()" class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg text-3xl font-bold">+</button>
                    </div>
                </div>
                <button onclick="finalizarCarga()" class="w-full py-3 text-[9px] font-black text-slate-300 uppercase tracking-widest">Cerrar Sesión Actual</button>
            </div>
        </div>

        <div id="view-devoluciones" class="tab-panel space-y-4">
            <div class="card-modern p-7 space-y-4">
                <input type="text" id="ret-cli" class="input-clean w-full text-sm uppercase" placeholder="CLIENTE">
                <input type="text" id="ret-sku" oninput="autoLookupRet()" class="input-clean w-full text-sm uppercase" placeholder="SKU RETORNO">
                <input type="text" id="ret-desc" class="input-clean w-full text-xs text-slate-400 italic" placeholder="Desc. automática" readonly>
                <input type="number" id="ret-qty" class="input-clean w-full text-sm" placeholder="CANTIDAD">
                <textarea id="ret-obs" class="input-clean w-full text-sm h-24" placeholder="OBSERVACIONES"></textarea>
                <button onclick="saveRet()" class="w-full bg-orange-500 text-white py-4 rounded-xl text-[10px] font-black uppercase tracking-widest">Enviar Retorno a Nube</button>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN CLOUD
        const URL_GAS = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_ref = {}; 
        let manifest = [];

        // SINCRONIZACIÓN INICIAL
        async function syncFromCloud() {
            const indicator = document.getElementById('cloud-indicator');
            indicator.classList.add('text-blue-600', 'animate-pulse');
            try {
                const res = await fetch(URL_GAS);
                const data = await res.json();
                data.forEach(r => {
                    db_ref[r.CODIGO.toString().toUpperCase()] = { desc: r.DESCRIPCION, um: r.UM || "UND" };
                });
                indicator.classList.remove('animate-pulse');
                indicator.classList.add('text-green-500');
            } catch (e) {
                indicator.classList.replace('text-blue-600', 'text-red-500');
            }
        }

        function navTo(t) {
            document.getElementById('landing').classList.add('hide-landing');
            document.getElementById('nav-title').innerText = t.toUpperCase();
            if(t === 'devoluciones') {
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                document.getElementById('view-devoluciones').classList.add('active');
            }
            syncFromCloud();
        }

        // LÓGICA DE BÚSQUEDA
        function autoLookup() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            if(db_ref[sku]) document.getElementById('s-desc').value = db_ref[sku].desc;
        }

        function autoLookupRet() {
            const sku = document.getElementById('ret-sku').value.toUpperCase().trim();
            if(db_ref[sku]) document.getElementById('ret-desc').value = db_ref[sku].desc;
        }

        // GESTIÓN DE MANIFIESTO
        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!db_ref[sku] || !meta) return;
            manifest.push({ sku, desc: db_ref[sku].desc, um: "CJ", meta, real: 0 });
            document.getElementById('pre-list').innerHTML += `<div class="p-3 bg-slate-50 rounded-xl text-[10px] font-bold">${sku} - ${meta} CJ</div>`;
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('s-sku').value = ''; document.getElementById('s-desc').value = ''; document.getElementById('s-meta').value = '';
        }

        function startWork() {
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('ops-card').classList.remove('hidden');
            const sel = document.getElementById('sel-sku');
            sel.innerHTML = manifest.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem();
        }

        function syncItem() {
            const item = manifest.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('live-desc').innerText = item.desc;
        }

        // ENVÍO DE DATOS A GOOGLE SHEETS
        async function sumarBulto() {
            const qty = parseInt(document.getElementById('qty-in').value);
            const sku = document.getElementById('sel-sku').value;
            const item = manifest.find(i => i.sku === sku);
            if(!qty) return;

            item.real += qty;
            
            await fetch(URL_GAS, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    tipo: 'CARGA',
                    datos: [new Date().toLocaleString(), sku, item.desc, qty, "CJ"]
                })
            });

            document.getElementById('qty-in').value = '';
            navigator.vibrate(30);
        }

        async function saveRet() {
            const sku = document.getElementById('ret-sku').value.toUpperCase();
            const qty = document.getElementById('ret-qty').value;
            if(!sku || !qty) return;

            await fetch(URL_GAS, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    tipo: 'RETORNO',
                    datos: [
                        new Date().toLocaleString(),
                        document.getElementById('ret-cli').value.toUpperCase(),
                        sku,
                        db_ref[sku]?.desc || "N/A",
                        qty,
                        db_ref[sku]?.um || "UND",
                        document.getElementById('ret-obs').value
                    ]
                })
            });
            alert("✅ Devolución enviada a Google Sheet");
            location.reload();
        }

        function finalizarCarga() { location.reload(); }
    </script>
</body>
</html>
