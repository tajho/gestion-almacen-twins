<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite | Smart Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; 
            color: #0F172A; 
            overscroll-behavior: none;
        }

        .glass-header { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(16px); 
            border-bottom: 1px solid rgba(226, 232, 240, 0.6); 
        }

        .card-container { 
            background: white; 
            border-radius: 32px; 
            border: 1px solid #F1F5F9; 
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease;
        }

        .btn-status { 
            @apply flex flex-col items-center justify-center gap-2 p-5 rounded-[26px] transition-all active:scale-95 text-[10px] font-black uppercase tracking-widest border; 
        }

        .month-divider {
            @apply sticky top-[100px] z-40 bg-white/70 backdrop-blur-md py-4 px-2 my-4 text-[10px] font-black text-slate-400 uppercase tracking-[0.25em] flex items-center justify-between;
        }

        .month-divider::after {
            content: ""; flex: 1; height: 1px; background: linear-gradient(to right, #E2E8F0, transparent); margin-left: 15px;
        }

        .work-mode {
            display: none;
            position: fixed;
            inset: 0;
            background: #FFFFFF;
            z-index: 100;
            animation: slideUp 0.3s cubic-bezier(0, 0.55, 0.45, 1);
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .item-row {
            @apply p-5 rounded-[26px] bg-slate-50 border border-slate-100 flex items-center justify-between mb-3;
        }

        .counter-btn {
            @apply w-12 h-12 rounded-2xl flex items-center justify-center text-xl active:scale-90 transition-all;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">

    <div id="view-dashboard">
        <header class="glass-header sticky top-0 z-50 p-6">
            <div class="max-w-xl mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-800 tracking-tighter italic leading-none text-slate-900">TWINS <span class="text-blue-600">ELITE</span></h1>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] italic mt-1">J. Angelo Nuñez Durand</p>
                </div>
                <button onclick="app.sync()" class="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
                    <i id="syncIcon" class="ph-bold ph-arrows-clockwise text-xl"></i>
                </button>
            </div>
        </header>

        <main class="max-w-xl mx-auto p-6">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-white p-6 rounded-[30px] border border-slate-100 shadow-sm">
                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-3">
                        <i class="ph-bold ph-shipping-container text-xl"></i>
                    </div>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Contenedores</p>
                    <p class="text-3xl font-800 text-slate-800" id="dash-total-cont">0</p>
                </div>
                <div class="bg-white p-6 rounded-[30px] border border-slate-100 shadow-sm">
                    <div class="w-10 h-10 bg-green-50 text-green-600 rounded-2xl flex items-center justify-center mb-3">
                        <i class="ph-bold ph-package text-xl"></i>
                    </div>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Cajas Totales</p>
                    <p class="text-3xl font-800 text-slate-800" id="dash-total-cajas">0</p>
                </div>
            </div>

            <div class="space-y-3 mb-10">
                <div class="relative">
                    <input type="text" id="searchInput" oninput="app.render()" placeholder="Buscar contenedor..." 
                    class="w-full pl-14 pr-6 py-5 rounded-[26px] bg-white border border-slate-200 shadow-sm outline-none font-bold text-sm focus:ring-2 focus:ring-blue-100 transition-all">
                    <i class="ph-bold ph-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 text-xl"></i>
                </div>
                
                <div class="relative">
                    <select id="monthFilter" onchange="app.render()" class="w-full p-5 pl-14 rounded-[26px] bg-white border border-slate-200 shadow-sm font-800 text-[10px] uppercase text-slate-500 outline-none appearance-none tracking-widest">
                        <option value="ALL">TODOS LOS MESES</option>
                        <option value="0">ENERO</option><option value="1">FEBRERO</option>
                        <option value="2">MARZO</option><option value="3">ABRIL</option>
                        <option value="4">MAYO</option><option value="5">JUNIO</option>
                        <option value="6">JULIO</option><option value="7">AGOSTO</option>
                        <option value="8">SEPTIEMBRE</option><option value="9">OCTUBRE</option>
                        <option value="10">NOVIEMBRE</option><option value="11">DICIEMBRE</option>
                    </select>
                    <i class="ph-bold ph-calendar-blank absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 text-xl pointer-events-none"></i>
                    <i class="ph-bold ph-caret-down absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none"></i>
                </div>
            </div>

            <div id="feed" class="space-y-4 pb-20"></div>
        </main>
    </div>

    <div id="view-counter" class="work-mode flex-col">
        <header class="p-8 border-b border-slate-50 flex justify-between items-center bg-white">
            <button onclick="app.closeCounter()" class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center active:scale-90 transition-all">
                <i class="ph-bold ph-caret-left text-xl text-slate-900"></i>
            </button>
            <div class="text-center">
                <h2 class="text-lg font-900 uppercase tracking-tighter text-slate-900" id="counter-title">Contenedor</h2>
                <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest leading-none mt-1">Auditoría en Almacén</p>
            </div>
            <div class="w-12"></div>
        </header>

        <div class="grid grid-cols-2 gap-4 p-6 bg-slate-50/50">
            <div class="bg-white p-5 rounded-[26px] border border-slate-100 text-center shadow-sm">
                <p class="text-[9px] font-black text-slate-300 uppercase mb-1">Items SKU</p>
                <p class="text-2xl font-900 text-blue-600 leading-none" id="totalItems">0</p>
            </div>
            <div class="bg-white p-5 rounded-[26px] border border-slate-100 text-center shadow-sm">
                <p class="text-[9px] font-black text-slate-300 uppercase mb-1">Total Cajas</p>
                <p class="text-2xl font-900 text-slate-800 leading-none" id="totalCount">0</p>
            </div>
        </div>

        <div id="counterList" class="flex-1 overflow-y-auto p-6 space-y-3"></div>

        <div class="p-8 bg-white border-t border-slate-100">
            <button onclick="app.saveWork()" class="w-full py-6 bg-slate-900 text-white rounded-[28px] font-900 text-xs uppercase tracking-[0.2em] shadow-xl active:scale-95 transition-all">
                Guardar Inventario
            </button>
            <p class="text-center text-[8px] font-black text-slate-300 uppercase mt-5 tracking-widest italic">
                Revisión autorizada por J. Angelo Nuñez Durand
            </p>
        </div>
    </div>

    <script>
        const app = {
            data: JSON.parse(localStorage.getItem('twins_elite_data')) || [],
            activeId: null,

            // LÓGICA DE FECHA FLEXIBLE 🗓️
            parseFechaAlmacen: function(item) {
                let raw = item["FECHA DE DESCARGA"] || item["almacen"] || item["FECHA"] || "";
                if(!raw) return new Date(0);
                
                let s = raw.toString().split('T')[0];
                let p = s.includes('-') ? s.split('-') : s.split('/');
                let d, m, y;
                
                if(p[0].length === 4) { // YYYY-MM-DD
                    y = parseInt(p[0]); m = parseInt(p[1]) - 1; d = parseInt(p[2]);
                } else { // DD/MM/YYYY
                    d = parseInt(p[0]); m = parseInt(p[1]) - 1; 
                    y = (p[2].length === 2 ? 2000 + parseInt(p[2]) : parseInt(p[2]));
                }
                return new Date(y, m, d);
            },

            sync: async function() {
                const icon = document.getElementById('syncIcon');
                icon.classList.add('animate-spin');
                try {
                    const res = await fetch("https://script.google.com/macros/s/AKfycbycL7jCK_jAwAch6H9DVnpditaxcMnghvhu860tGiCroA_ncf2fTKR6TU-qs1ojqEU/exec");
                    const json = await res.json();
                    this.data = Array.isArray(json) ? json : (json.historial || []);
                    localStorage.setItem('twins_elite_data', JSON.stringify(this.data));
                    this.render();
                } catch(e) { alert("Sin conexión. Datos locales."); }
                finally { icon.classList.remove('animate-spin'); }
            },

            render: function() {
                const feed = document.getElementById('feed');
                const search = document.getElementById('searchInput').value.toLowerCase();
                const monthFilter = document.getElementById('monthFilter').value;

                const groups = this.data.reduce((acc, item) => {
                    // LECTURA FLEXIBLE DE COLUMNAS 🚢
                    const id = (item["CONTENEDORES"] || item["canal"] || item["CONTENEDOR"] || "S/N").toString();
                    const dateObj = this.parseFechaAlmacen(item);
                    const dateStr = dateObj.toLocaleDateString('es-ES');
                    
                    const matchesSearch = JSON.stringify(item).toLowerCase().includes(search);
                    const itemMonth = dateObj.getMonth();
                    const matchesMonth = (monthFilter === "ALL") || (itemMonth.toString() === monthFilter);

                    if (matchesSearch && matchesMonth && dateObj.getFullYear() > 1970) {
                        if (!acc[id]) acc[id] = { id, dateStr, dateObj, items: [] };
                        acc[id].items.push(item);
                    }
                    return acc;
                }, {});

                const sortedGroups = Object.values(groups).sort((a,b) => b.dateObj - a.dateObj);
                
                document.getElementById('dash-total-cont').innerText = sortedGroups.length;
                document.getElementById('dash-total-cajas').innerText = this.data.reduce((s, i) => s + (parseInt(i.cantidad) || 0), 0);

                let html = '';
                let currentMonthName = '';

                sortedGroups.forEach(g => {
                    const months = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
                    const groupMonth = months[g.dateObj.getMonth()] + " " + g.dateObj.getFullYear();

                    if (groupMonth !== currentMonthName) {
                        html += `<div class="month-divider"><span>${groupMonth}</span></div>`;
                        currentMonthName = groupMonth;
                    }

                    const totalCajas = g.items.reduce((s, i) => s + (parseInt(i.cantidad) || 0), 0);
                    const isFinal = totalCajas > 0;
                    
                    html += `
                    <div class="card-container mb-4">
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">ALMACÉN: ${g.dateStr}</p>
                                    <h3 class="text-2xl font-900 text-slate-900 uppercase tracking-tighter">Contenedor ${g.id}</h3>
                                </div>
                                <div class="px-3 py-1 bg-slate-50 border border-slate-100 rounded-xl text-[10px] font-black text-slate-500">${totalCajas} CAJAS</div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <button onclick="app.startWork('${g.id}')" class="btn-status ${isFinal ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-900 border-slate-100'}">
                                    <i class="ph-fill ${isFinal ? 'ph-pencil-simple' : 'ph-play'} text-xl"></i>
                                    ${isFinal ? 'CORREGIR' : 'AUDITAR'}
                                </button>
                                <button onclick="app.generatePDF('${g.id}')" class="btn-status bg-white text-slate-400 border-slate-100">
                                    <i class="ph-fill ph-file-pdf text-xl"></i>
                                    REPORTE
                                </button>
                            </div>
                        </div>
                    </div>`;
                });

                feed.innerHTML = html || '<div class="text-center py-20 opacity-20 font-black text-xs">Sin registros</div>';
            },

            startWork: function(id) {
                this.activeId = id;
                const filtrados = this.data.filter(i => (i["CONTENEDORES"] || i["canal"] || i["CONTENEDOR"] || "").toString() === id);
                document.getElementById('counter-title').innerText = id;
                document.getElementById('totalItems').innerText = filtrados.length;
                this.updateTotalCount(filtrados);

                document.getElementById('counterList').innerHTML = filtrados.map((item, idx) => `
                    <div class="item-row">
                        <div class="flex-1 pr-4">
                            <p class="text-[10px] font-black text-blue-500 leading-none mb-1">${item["ITEM"] || item["codigo"] || 'SKU'}</p>
                            <p class="text-xs font-bold text-slate-800 uppercase leading-tight">${item["DESCRIPCIÓN"] || item["descripcion"] || '...'}</p>
                        </div>
                        <div class="flex items-center gap-4 bg-white p-2 rounded-2xl border border-slate-100">
                            <button class="counter-btn bg-slate-50 text-slate-400" onclick="app.adjust('${id}', ${idx}, -1)"><i class="ph-bold ph-minus"></i></button>
                            <span class="w-8 text-center font-900 text-xl text-slate-900" id="val-${idx}">${item.cantidad || 0}</span>
                            <button class="counter-btn bg-slate-900 text-white" onclick="app.adjust('${id}', ${idx}, 1)"><i class="ph-bold ph-plus"></i></button>
                        </div>
                    </div>`).join('');
                document.getElementById('view-counter').style.display = 'flex';
                document.body.style.overflow = 'hidden';
            },

            adjust: function(contId, idx, val) {
                const el = document.getElementById(`val-${idx}`);
                let current = Math.max(0, parseInt(el.innerText) + val);
                el.innerText = current;
                const filtrados = this.data.filter(i => (i["CONTENEDORES"] || i["canal"] || i["CONTENEDOR"] || "").toString() === contId);
                filtrados[idx].cantidad = current;
                this.updateTotalCount(filtrados);
            },

            updateTotalCount: function(items) {
                document.getElementById('totalCount').innerText = items.reduce((a, b) => a + (parseInt(b.cantidad) || 0), 0);
            },

            saveWork: function() {
                localStorage.setItem('twins_elite_data', JSON.stringify(this.data));
                this.render();
                this.closeCounter();
            },

            closeCounter: function() {
                document.getElementById('view-counter').style.display = 'none';
                document.body.style.overflow = 'auto';
            },

            generatePDF: function(id) {
                alert(`Reporte Contenedor ${id}\nAutorizado por: Angelo Nuñez Durand`);
            }
        };

        window.onload = () => app.render();
    </script>
</body>
</html>
