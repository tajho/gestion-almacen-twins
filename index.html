<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twins Elite - Gestión de Inventario</title>
  <style>
    :root {
      --primary: #002d5a;
      --accent: #0056b3;
      --bg: #121212;
      --card-bg: #ffffff;
      --text-dark: #333;
    }
    
    body { 
      font-family: 'Segoe UI', Roboto, sans-serif; 
      background-color: var(--bg); 
      color: #eee; 
      margin: 0; 
      padding: 0; 
    }

    /* Cabecera y Buscador Sticky */
    .header-container {
      background: #1f1f1f;
      padding: 15px;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .search-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 900px;
      margin: auto;
    }

    input, select {
      background: #2d2d2d;
      color: white;
      border: 1px solid #444;
      padding: 12px;
      border-radius: 8px;
      outline: none;
      flex: 1;
      min-width: 150px;
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover { background: #004494; }

    /* Contenedor de Tarjetas */
    .main-content {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* Estilo de la Tarjeta de Contenedor */
    .card {
      background: var(--card-bg);
      color: var(--text-dark);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      border-left: 10px solid var(--primary);
      transition: transform 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover { transform: translateY(-5px); }

    .card-body { padding: 15px; flex-grow: 1; }

    .card-title {
      font-size: 1.2em;
      font-weight: bold;
      color: var(--primary);
      margin-bottom: 10px;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 5px;
      text-transform: uppercase;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.95em;
    }

    .label { font-weight: bold; color: #666; }
    
    /* Resaltado de Fecha Exacta */
    .date-badge {
      background: #fff3cd;
      color: #856404;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: bold;
      border: 1px solid #ffeeba;
    }

    .vendedor-tag {
      color: var(--accent);
      font-weight: bold;
    }

    .footer-auth {
      background: #f8f9fa;
      padding: 10px;
      font-size: 0.75em;
      color: #777;
      border-top: 1px solid #eee;
      text-align: center;
      font-style: italic;
    }

    .status-bar {
      text-align: center;
      font-size: 0.8em;
      color: #aaa;
      margin-top: 5px;
    }

    /* Animación de carga */
    .loading-shimmer {
      text-align: center;
      padding: 50px;
      font-size: 1.2em;
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="header-container">
    <div class="search-group">
      <select id="mesFiltro" onchange="sincronizar()">
        <option value="1">Enero</option>
        <option value="2">Febrero</option>
        <option value="3">Marzo</option>
        <option value="4">Abril</option>
        <option value="5">Mayo</option>
        <option value="6">Junio</option>
        <option value="7">Julio</option>
        <option value="8">Agosto</option>
        <option value="9">Septiembre</option>
        <option value="10">Octubre</option>
        <option value="11">Noviembre</option>
        <option value="12">Diciembre</option>
      </select>
      <input type="text" id="buscador" placeholder="Buscar cliente o producto..." onkeyup="filtrarLocal()">
      <button onclick="sincronizar()">Actualizar</button>
    </div>
    <div id="status" class="status-bar">Listo</div>
  </div>

  <div class="main-content">
    <div id="loading" class="loading-shimmer" style="display:none;">Sincronizando con Twins Elite...</div>
    <div id="contenedorLista" class="grid"></div>
  </div>

  <script>
    let cacheDatos = [];
    const API_URL = "https://script.google.com/macros/s/AKfycbycL7jCK_jAwAch6H9DVnpditaxcMnghvhu860tGiCroA_ncf2fTKR6TU-qs1ojqEU/exec";

    // Al iniciar, cargar mes actual
    window.onload = () => {
      const fechaActual = new Date();
      document.getElementById('mesFiltro').value = fechaActual.getMonth() + 1;
      sincronizar();
    };

    function sincronizar() {
      const mes = document.getElementById('mesFiltro').value;
      const anio = 2026; // Año configurado
      const status = document.getElementById('status');
      const loader = document.getElementById('loading');
      const lista = document.getElementById('contenedorLista');

      status.innerText = "Sincronizando invisiblemente...";
      loader.style.display = "block";
      lista.innerHTML = "";

      // Conexión directa con Google Apps Script
      google.script.run
        .withSuccessHandler(datos => {
          cacheDatos = datos;
          renderizarTarjetas(datos);
          loader.style.display = "none";
          status.innerText = "Sincronización completada: " + datos.length + " registros.";
        })
        .withFailureHandler(err => {
          status.innerText = "Error de conexión.";
          loader.style.display = "none";
        })
        .obtenerDatosCorregidos(mes, anio);
    }

    function renderizarTarjetas(registros) {
      const lista = document.getElementById('contenedorLista');
      lista.innerHTML = "";

      if (registros.length === 0) {
        lista.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>No hay datos para este periodo.</p>";
        return;
      }

      registros.forEach(item => {
        const tarjeta = document.createElement('div');
        tarjeta.className = 'card';
        tarjeta.innerHTML = `
          <div class="card-body">
            <div class="card-title">${item.CLIENTE || 'Sin Identificar'}</div>
            <div class="info-row">
              <span class="label">Fecha Exacta:</span>
              <span class="date-badge">${item.FECHA}</span>
            </div>
            <div class="info-row">
              <span class="label">Producto:</span>
              <span>${item.PRODUCTO || '---'}</span>
            </div>
            <div class="info-row">
              <span class="label">Cantidad:</span>
              <span style="font-weight:bold;">${item.CANTIDAD || '0'}</span>
            </div>
            <div class="info-row">
              <span class="label">Vendedor:</span>
              <span class="vendedor-tag">${item.VENDEDOR || 'Asignado'}</span>
            </div>
          </div>
          <div class="footer-auth">
            Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.
          </div>
        `;
        lista.appendChild(tarjeta);
      });
    }

    function filtrarLocal() {
      const query = document.getElementById('buscador').value.toLowerCase();
      const filtrados = cacheDatos.filter(d => {
        const nombre = (d.CLIENTE || "").toLowerCase();
        const prod = (d.PRODUCTO || "").toLowerCase();
        return nombre.includes(query) || prod.includes(query);
      });
      renderizarTarjetas(filtrados);
    }
  </script>
</body>
</html>
