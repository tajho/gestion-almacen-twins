<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v49 - Elite Dynamic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --bg: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #0f172a; overflow: hidden; -webkit-font-smoothing: antialiased; }
        
        /* Estética Exacta Captura */
        .card-elite { background: white; border-radius: 2.5rem; padding: 1.5rem; display: flex; align-items: center; gap: 1.25rem; box-shadow: 0 15px 40px -12px rgba(0,0,0,0.08); transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); border: 1px solid #f8fafc; }
        .card-elite:active { transform: scale(0.96); background: #f8fafc; }
        
        .icon-box { width: 3.5rem; height: 3.5rem; background: #eff6ff; border-radius: 1.2rem; display: flex; align-items: center; justify-content: center; color: var(--blue); }
        
        .title-main { font-size: 2.8rem; font-weight: 800; line-height: 0.95; letter-spacing: -0.04em; font-style: italic; }
        .tag-blue { color: var(--blue); font-weight: 900; letter-spacing: 0.4em; font-size: 0.65rem; text-transform: uppercase; margin-bottom: 0.5rem; }

        /* Vistas y Flujo */
        .view { display: none; height: 100vh; overflow-y: auto; padding: 2rem; padding-top: 6rem; }
        .view.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal Moderno */
        #modal-choice { position: fixed; inset: 0; z-index: 2000; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; padding: 2rem; }
        #modal-choice.open { display: flex; }

        /* Inputs Técnicos */
        .input-tech { background: #f1f5f9; border-radius: 1.2rem; border: 2px solid transparent; font-weight: 700; padding: 1rem 1.4rem; font-size: 0.85rem; width: 100%; transition: 0.3s; }
        .input-tech:focus { border-color: var(--blue); background: white; outline: none; }

        /* Barras con Brillo */
        .progress-track { background: #f1f5f9; border-radius: 20px; overflow: hidden; height: 10px; }
        .progress-bar { height: 100%; background: var(--blue); position: relative; transition: width 1s ease; }
        .progress-bar::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shine 2s infinite; }
        @keyframes shine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full h-20 px-8 flex justify-between items-center z-[1000] bg-white/80 backdrop-blur-md">
        <button onclick="goHome()" class="p-2 active:scale-90 transition-all">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <div class="text-right">
            <p class="text-[10px] font-black italic">TAJHO<span class="text-blue-600">.OS</span></p>
        </div>
    </header>

    <div id="view-home" class="view active">
        <p class="tag-blue">Control Logístico</p>
        <h1 class="title-main mb-12">¿Qué hacemos<br><span class="text-blue-600">hoy, Tajho?</span></h1>
        
        <div class="space-y-4">
            <div onclick="navTo('crear')" class="card-elite">
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
                </div>
                <div class="text-left">
                    <p class="text-[11px] font-black uppercase tracking-widest">Contenedor</p>
                    <p class="text-[9px] font-bold text-slate-400 italic uppercase">Logística Elite</p>
                </div>
            </div>

            <div onclick="navTo('historial')" class="card-elite">
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div class="text-left">
                    <p class="text-[11px] font-black uppercase tracking-widest">Historial</p>
                    <p class="text-[9px] font-bold text-slate-400 italic uppercase">Registros Guardados</p>
                </div>
            </div>

            <div class="card-elite opacity-40">
                <div class="icon-box" style="background: #fff7ed; color: #f97316;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m11 17-5-5 5-5"/><path d="M18 17v-3a4 4 0 0 0-4-4H6"/></svg>
                </div>
                <div class="text-left">
                    <p class="text-[11px] font-black uppercase tracking-widest">Devoluciones</p>
                    <p class="text-[9px] font-bold text-slate-400 italic uppercase">Próximamente</p>
                </div>
            </div>
        </div>
    </div>

    <div id="view-crear" class="view">
        <div class="space-y-4">
            <h2 class="text-xl font-black italic mb-4">Configurar <span class="text-blue-600">Manifiesto</span></h2>
            <input type="text" id="s-sku" oninput="smartSearch()" class="input-tech uppercase" placeholder="BUSCAR SKU..." autocomplete="off">
            <div id="search-results" class="hidden bg-white rounded-2xl shadow-xl border p-2 space-y-1"></div>
            <input type="text" id="s-desc" class="input-tech text-blue-600 italic" placeholder="Descripción..." readonly>
            <input type="number" id="s-meta" class="input-tech" placeholder="CANTIDAD META">
            <button onclick="addMani()" class="w-full bg-slate-900 text-white py-4 rounded-2xl text-[11px] font-black uppercase tracking-widest">Vincular al Manifiesto</button>
            <div id="pre-list" class="space-y-2 mt-6"></div>
            <button id="btn-done" onclick="openModal()" class="hidden w-full bg-blue-600 text-white py-5 rounded-3xl text-[11px] font-black uppercase tracking-widest shadow-xl shadow-blue-200 mt-4">Finalizar Manifiesto</button>
        </div>
    </div>

    <div id="view-ops" class="view">
        <div class="space-y-6 text-center">
            <div class="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Progreso Global</p>
                <div class="progress-track"><div id="global-bar" class="progress-bar" style="width: 0%"></div></div>
                <div class="flex justify-between mt-3 px-1"><p id="global-pc" class="text-xs font-black text-blue-600 italic">0%</p><p id="items-count" class="text-[10px] font-bold text-slate-400">0 SKUS</p></div>
            </div>

            <select id="sel-sku" onchange="syncItem()" class="text-3xl font-[900] bg-transparent outline-none text-center italic w-full"></select>
            <p id="live-desc" class="text-[10px] font-black text-blue-600 uppercase tracking-widest opacity-60"></p>

            <div class="flex flex-col items-center gap-6">
                <div class="flex items-center gap-4">
                    <input type="number" id="qty-in" class="input-tech w-28 text-center text-3xl h-20 shadow-inner" placeholder="0">
                    <button onclick="registrarBulto()" class="w-20 h-20 bg-blue-600 text-white rounded-3xl flex items-center justify-center shadow-xl active:scale-75 transition-all">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-4 w-full">
                    <div class="bg-slate-50 p-4 rounded-3xl text-center"><p class="text-[9px] font-black text-slate-300 uppercase mb-1">Faltan</p><p id="live-rem" class="text-2xl font-black">0</p></div>
                    <div class="bg-blue-50 p-4 rounded-3xl text-center"><p class="text-[9px] font-black text-blue-400 uppercase mb-1">Real</p><p id="live-real" class="text-2xl font-black text-blue-600">0</p></div>
                </div>
            </div>
            <button onclick="finishAndReport()" class="w-full bg-slate-900 text-white py-5 rounded-3xl text-[11px] font-black tracking-widest uppercase">Guardar y Generar PDF</button>
        </div>
    </div>

    <div id="view-historial" class="view">
        <h2 class="text-3xl font-black italic mb-8">Registros de <span class="text-blue-600">Descarga</span></h2>
        <div id="history-list" class="space-y-4"></div>
    </div>

    <div id="modal-choice">
        <div class="bg-white w-full max-w-sm p-10 rounded-[3rem] text-center shadow-2xl">
            <h3 class="text-xl font-black italic mb-2 uppercase">Manifiesto Creado</h3>
            <p class="text-[10px] text-slate-400 font-bold mb-8 tracking-widest">¿CUÁL ES EL SIGUIENTE PASO?</p>
            <div class="space-y-3">
                <button onclick="continuarConteo()" class="w-full bg-blue-600 text-white py-5 rounded-3xl text-[11px] font-black uppercase shadow-lg shadow-blue-100">Iniciar Conteo Ahora</button>
                <button onclick="guardarMani()" class="w-full bg-slate-900 text-white py-5 rounded-3xl text-[11px] font-black uppercase">Guardar en Historial</button>
                <button onclick="closeModal()" class="w-full text-slate-400 py-2 text-[10px] font-black uppercase tracking-widest">Regresar</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let raw_data = [];
        let db_items = {};
        let currentMani = JSON.parse(localStorage.getItem('tajho_cur')) || [];
        let history = JSON.parse(localStorage.getItem('tajho_his')) || [];
        let activeJob = JSON.parse(localStorage.getItem('tajho_active')) || null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                raw_data = await res.json();
                raw_data.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().toUpperCase().trim()] = r.DESCRIPCION; });
                
                // Anti-bloqueo al refrescar
                const lastView = localStorage.getItem('tajho_view') || 'home';
                if(lastView === 'ops' && activeJob) startOps(activeJob);
                else navTo(lastView);
            } catch (e) { console.warn("Modo Offline"); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            localStorage.setItem('tajho_view', v);
            if(v === 'historial') renderHistory();
            if(v === 'crear') renderPreList();
        }

        function goHome() { navTo('home'); }

        // Búsqueda Smart
        function smartSearch() {
            const input = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('search-results');
            if(input.length < 1) { resDiv.classList.add('hidden'); return; }
            const matches = raw_data.filter(i => String(i.CODIGO).toUpperCase().includes(input) || String(i.DESCRIPCION).toUpperCase().includes(input)).slice(0,4);
            resDiv.innerHTML = matches.map(m => `<div onclick="setProd('${m.CODIGO}','${m.DESCRIPCION}')" class="p-4 border-b last:border-0 active:bg-blue-50 text-[10px] font-black uppercase">${m.CODIGO} - ${m.DESCRIPCION}</div>`).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(s,d) {
            document.getElementById('s-sku').value = s; document.getElementById('s-desc').value = d;
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        // Crear
        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "GENERICO", meta, real: 0 });
            localStorage.setItem('tajho_cur', JSON.stringify(currentMani));
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderPreList() {
            document.getElementById('pre-list').innerHTML = currentMani.map(i => `<div class="p-4 bg-slate-50 rounded-2xl text-[10px] font-black flex justify-between uppercase"><span>${i.sku}</span><span class="text-blue-600">${i.meta} CJ</span></div>`).join('');
            if(currentMani.length > 0) document.getElementById('btn-done').classList.remove('hidden');
        }

        // Modal Logic
        function openModal() { document.getElementById('modal-choice').classList.add('open'); }
        function closeModal() { document.getElementById('modal-choice').classList.remove('open'); }

        function continuarConteo() {
            closeModal();
            activeJob = { id: Date.now(), name: "CONT-" + new Date().getHours() + ":" + new Date().getMinutes(), items: [...currentMani], status: 'PROCESO' };
            localStorage.setItem('tajho_active', JSON.stringify(activeJob));
            currentMani = []; localStorage.removeItem('tajho_cur');
            startOps(activeJob);
        }

        function guardarMani() {
            closeModal();
            history.push({ id: Date.now(), name: "MANI-" + new Date().toLocaleTimeString(), items: [...currentMani], status: 'PENDIENTE' });
            localStorage.setItem('tajho_his', JSON.stringify(history));
            currentMani = []; localStorage.removeItem('tajho_cur');
            navTo('historial');
        }

        // Historial
        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="card-elite justify-between">
                    <div><p class="text-[8px] font-black ${h.status==='COMPLETADO'?'text-green-500':'text-blue-500'} uppercase mb-1">${h.status}</p><h4 class="text-sm font-black italic uppercase">${h.name}</h4></div>
                    <button onclick="startFromHistory(${h.id})" class="bg-slate-900 text-white px-6 py-3 rounded-2xl text-[9px] font-black uppercase">Operar</button>
                </div>
            `).join('');
        }

        function startFromHistory(id) {
            activeJob = history.find(x => x.id === id);
            localStorage.setItem('tajho_active', JSON.stringify(activeJob));
            startOps(activeJob);
        }

        // Operación (Ops)
        function startOps(job) {
            navTo('ops');
            document.getElementById('sel-sku').innerHTML = job.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem();
        }

        function syncItem() {
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('live-desc').innerText = item.desc;
            document.getElementById('live-rem').innerText = item.meta - item.real;
            document.getElementById('live-real').innerText = item.real;

            const tM = activeJob.items.reduce((a,b)=>a+b.meta,0);
            const tR = activeJob.items.reduce((a,b)=>a+b.real,0);
            const pc = Math.min(Math.round((tR/tM)*100),100);
            document.getElementById('global-bar').style.width = pc + "%";
            document.getElementById('global-pc').innerText = pc + "% COMPLETADO";
            document.getElementById('items-count').innerText = activeJob.items.length + " SKUS";
            localStorage.setItem('tajho_active', JSON.stringify(activeJob));
        }

        function registrarBulto() {
            const q = parseInt(document.getElementById('qty-in').value);
            if(!q) return;
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += q;
            document.getElementById('qty-in').value = '';
            syncItem();
            navigator.vibrate(40);
            fetch(CLOUD_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({tipo:'CARGA', datos: [new Date().toLocaleString(), item.sku, q]})});
        }

        function finishAndReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.text("TAJHO.OS - REPORTE DE DESCARGA", 14, 20);
            doc.autoTable({
                startY: 30, head: [['SKU', 'DESC', 'META', 'REAL', 'DIF']],
                body: activeJob.items.map(i => [i.sku, i.desc, i.meta, i.real, i.meta-i.real]),
                theme: 'grid'
            });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, doc.lastAutoTable.finalY + 15);
            doc.text("Asist. Inventario Logístico", 14, doc.lastAutoTable.finalY + 21);
            doc.save(`REPORTE_${activeJob.name}.pdf`);
            
            activeJob.status = 'COMPLETADO';
            const idx = history.findIndex(h => h.id === activeJob.id);
            if(idx !== -1) history[idx] = activeJob; else history.push(activeJob);
            localStorage.setItem('tajho_his', JSON.stringify(history));
            localStorage.removeItem('tajho_active');
            navTo('historial');
        }

        init();
    </script>
</body>
</html>
