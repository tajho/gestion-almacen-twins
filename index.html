<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite - Logística Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        
        /* SECCIONES POR MES */
        .month-block { margin-bottom: 40px; }
        .month-divider { 
            position: sticky; top: 88px; z-index: 40;
            background: rgba(248, 250, 252, 0.9); backdrop-filter: blur(8px);
            padding: 12px 4px; font-size: 11px; font-weight: 900; 
            color: #64748b; letter-spacing: 0.2em; text-transform: uppercase;
            display: flex; align-items: center; gap: 12px;
        }
        .month-divider::after { content: ""; flex: 1; height: 1px; background: #E2E8F0; }

        .premium-card { background: white; border-radius: 28px; border: 1px solid #F1F5F9; box-shadow: 0 4px 20px -2px rgba(0,0,0,0.02); margin-bottom: 16px; transition: transform 0.2s; }
        .btn-tool { border-radius: 16px; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 14px 4px; transition: all 0.2s; cursor: pointer; border: 1px solid transparent; }
        .btn-tool:active { transform: scale(0.96); background: #f1f5f9; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 p-6">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-[800] tracking-tighter italic">TWINS <span class="text-blue-600">ELITE</span></h1>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">J. Angelo Nuñez Durand</p>
            </div>
            <i class="ph-bold ph-calendar-check text-2xl text-blue-600"></i>
        </div>
    </header>

    <main class="p-5 max-w-xl mx-auto pb-40">
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-tighter">Cajas Procesadas</p>
                <h2 id="dash-boxes" class="text-3xl font-black text-slate-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-tighter">Variedad SKUs</p>
                <h2 id="dash-skus" class="text-3xl font-black text-slate-800">0</h2>
            </div>
        </div>

        <div class="mb-8">
            <div class="relative">
                <i class="ph-bold ph-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                <input type="text" id="search-box" oninput="processAndRender()" placeholder="Buscar contenedor o SKU..." 
                    class="w-full bg-white border border-slate-200 rounded-2xl py-5 pl-14 pr-6 text-sm font-semibold outline-none focus:ring-4 focus:ring-blue-500/5 transition-all">
            </div>
        </div>

        <div id="history-container"></div>

    </main>

    <script>
        const WEB_URL = "https://script.google.com/macros/s/AKfycbw-v5b_DkMPqup6Wm4J5KfGKZq9IRs99drhBYFV-MzHa4tcyb8dSn7YRx7KTHAEj1Jp/exec";
        const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        // Carga inicial desde memoria local para velocidad instantánea
        let rawData = JSON.parse(localStorage.getItem('twins_data')) || [];

        async function fetchInvisible() {
            try {
                const r = await fetch(WEB_URL);
                const d = await r.json();
                rawData = d.historial || d;
                localStorage.setItem('twins_data', JSON.stringify(rawData));
                processAndRender();
            } catch(e) { console.log("Sync background error"); }
        }

        function processAndRender() {
            const query = document.getElementById('search-box').value.toLowerCase();
            const container = document.getElementById('history-container');
            
            // 1. Agrupar items por Contenedor (Operación)
            const groupedOps = rawData.reduce((acc, item) => {
                if(!item.operacion) return acc;
                
                const matchesSearch = item.operacion.toLowerCase().includes(query) || 
                                     (item.sku && item.sku.toLowerCase().includes(query));
                
                if(matchesSearch) {
                    if(!acc[item.operacion]) {
                        // Extraer fecha del nombre (ej: "CONT 14/03/26")
                        const dateMatch = item.operacion.match(/(\d{2})\/(\d{2})\/(\d{2})/);
                        const day = dateMatch ? dateMatch[1] : "01";
                        const month = dateMatch ? parseInt(dateMatch[2]) - 1 : 2; // Default Marzo
                        const year = dateMatch ? "20" + dateMatch[3] : "2026";
                        
                        acc[item.operacion] = { 
                            ...item, 
                            items: [], 
                            totalBoxes: 0, 
                            mIdx: month,
                            y: year,
                            sortKey: `${year}${dateMatch ? dateMatch[2] : '03'}${day}`
                        };
                    }
                    acc[item.operacion].items.push(item);
                    acc[item.operacion].totalBoxes += (Number(item.meta) || 0);
                }
                return acc;
            }, {});

            // 2. Agrupar Operaciones por Mes
            const byMonth = Object.values(groupedOps).reduce((acc, op) => {
                const key = `${op.mIdx}-${op.y}`;
                if(!acc[key]) acc[key] = { label: `${MESES[op.mIdx]} ${op.y}`, ops: [], m: op.mIdx };
                acc[key].ops.push(op);
                return acc;
            }, {});

            // 3. Renderizado Ordenado (Reciente primero)
            let finalHtml = '';
            let totalB = 0, totalS = 0;

            const sortedKeys = Object.keys(byMonth).sort((a,b) => {
                const [mA, yA] = a.split('-').map(Number);
                const [mB, yB] = b.split('-').map(Number);
                return yB !== yA ? yB - yA : mB - mA;
            });

            sortedKeys.forEach(key => {
                finalHtml += `<div class="month-divider">${byMonth[key].label}</div><div class="month-block">`;
                
                byMonth[key].ops.sort((a,b) => b.sortKey.localeCompare(a.sortKey)).forEach(op => {
                    totalB += op.totalBoxes;
                    totalS += op.items.length;
                    finalHtml += `
                        <div class="premium-card p-7">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <p class="text-[9px] font-black uppercase tracking-[0.2em] ${op.estado === 'COMPLETADO' ? 'text-green-500' : 'text-amber-500'} mb-1">
                                        ● ${op.estado || 'EN PROCESO'}
                                    </p>
                                    <h3 class="text-2xl font-[800] text-slate-800 tracking-tighter leading-none">${op.operacion}</h3>
                                </div>
                                <span class="bg-slate-100 text-slate-500 text-[8px] font-black px-2.5 py-1.5 rounded-lg uppercase tracking-widest border border-slate-200">
                                    Canal ${op.canal || 'S/C'}
                                </span>
                            </div>

                            <div class="grid grid-cols-3 gap-3">
                                <div onclick="btnAction('CORREGIR', '${op.operacion}')" class="btn-tool bg-blue-50 text-blue-600 border-blue-100/50 hover:bg-blue-600 hover:text-white">
                                    <i class="ph-bold ph-pencil-simple text-lg"></i>CORREGIR
                                </div>
                                <div onclick="btnAction('LISTA', '${op.operacion}')" class="btn-tool bg-slate-50 text-slate-600 border-slate-100/50 hover:bg-slate-900 hover:text-white">
                                    <i class="ph-bold ph-list-bullets text-lg"></i>LISTA
                                </div>
                                <div onclick="btnAction('PDF', '${op.operacion}')" class="btn-tool bg-red-50 text-red-600 border-red-100/50 hover:bg-red-600 hover:text-white">
                                    <i class="ph-bold ph-file-pdf text-lg"></i>PDF
                                </div>
                            </div>
                        </div>`;
                });
                finalHtml += `</div>`;
            });

            container.innerHTML = finalHtml || `<div class="py-20 text-center opacity-30 font-black uppercase text-xs tracking-[0.3em]">Sin registros</div>`;
            document.getElementById('dash-boxes').innerText = totalB.toLocaleString();
            document.getElementById('dash-skus').innerText = totalS.toLocaleString();
        }

        // CONTROLADOR DE ACCIONES
        function btnAction(type, id) {
            if(type === 'PDF') {
                const sign = "Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.";
                alert(`Generando reporte para: ${id}\n\n${sign}`);
            } else if(type === 'CORREGIR') {
                alert(`Abriendo editor para: ${id}`);
            } else {
                alert(`Mostrando lista de: ${id}`);
            }
        }

        // Inicio
        processAndRender();
        fetchInvisible();
        setInterval(fetchInvisible, 60000);
    </script>
</body>
</html>
