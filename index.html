<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v53 - Titanium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #0f172a; height: 100vh; overflow: hidden; }
        
        /* Layout Dinámico */
        .view { display: none; height: 100vh; padding: 1.2rem; padding-top: 4.8rem; flex-direction: column; justify-content: flex-start; }
        .view.active { display: flex; animation: viewReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes viewReveal { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* Tarjetas de Navegación Estilizadas */
        .nav-card { position: relative; overflow: hidden; background: white; border-radius: 2rem; padding: 1.25rem; display: flex; align-items: center; gap: 1.25rem; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); height: 28%; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .nav-card:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .nav-card::after { content: ''; position: absolute; right: -10%; top: -20%; width: 100px; height: 100px; background: currentColor; opacity: 0.03; border-radius: 50%; }

        .icon-wrap { width: 3.5rem; height: 3.5rem; border-radius: 1.2rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1); }
        
        /* Progress & Controls */
        .progress-rail { background: #e2e8f0; border-radius: 50px; overflow: hidden; height: 10px; position: relative; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #60a5fa); border-radius: 50px; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .input-glass { background: white; border-radius: 1.2rem; border: 1.5px solid #e2e8f0; font-weight: 700; padding: 0.9rem 1.2rem; font-size: 0.9rem; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .input-glass:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); outline: none; }

        .btn-titan { background: #0f172a; color: white; border-radius: 1.4rem; font-weight: 800; font-size: 0.85rem; letter-spacing: 0.05em; text-transform: uppercase; padding: 1.2rem; transition: 0.3s; }
        .btn-titan:active { transform: translateY(2px); opacity: 0.9; }

        .scroll-v { flex-grow: 1; overflow-y: auto; padding-right: 4px; margin-top: 1rem; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full h-20 px-8 flex justify-between items-center z-[2000] bg-white/60 backdrop-blur-xl">
        <button onclick="goHome()" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white shadow-sm border border-slate-100 active:scale-90 transition-transform">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </button>
        <div class="text-right">
            <span class="text-[11px] font-black italic tracking-tight text-slate-400">TAJHO<span class="text-blue-600">.OS</span></span>
            <p class="text-[7px] font-bold text-slate-300 tracking-[0.3em] -mt-1 uppercase">Titanium v53</p>
        </div>
    </header>

    <div id="view-home" class="view active">
        <div class="mb-8">
            <h1 class="text-4xl font-black italic tracking-tighter leading-none">Logística<br><span class="text-blue-600">Central</span></h1>
            <div class="h-1.5 w-12 bg-blue-600 rounded-full mt-2"></div>
        </div>
        
        <div class="flex flex-col gap-4 flex-grow max-h-[70vh]">
            <div onclick="navTo('crear')" class="nav-card text-blue-600">
                <div class="icon-wrap bg-blue-50">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
                </div>
                <div>
                    <h3 class="text-lg font-black uppercase leading-tight">Contenedor</h3>
                    <p class="text-[10px] font-bold text-slate-400 italic">CREAR MANIFIESTO DE CARGA</p>
                </div>
            </div>

            <div onclick="navTo('historial')" class="nav-card text-emerald-500">
                <div class="icon-wrap bg-emerald-50">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                </div>
                <div>
                    <h3 class="text-lg font-black uppercase leading-tight">Registros</h3>
                    <p class="text-[10px] font-bold text-slate-400 italic">HISTORIAL DE OPERACIONES</p>
                </div>
            </div>

            <div class="nav-card text-orange-500">
                <div class="icon-wrap bg-orange-50">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18"/><path d="m15 18 6-6-6-6"/></svg>
                </div>
                <div>
                    <h3 class="text-lg font-black uppercase leading-tight">Devoluciones</h3>
                    <p class="text-[10px] font-bold text-slate-400 italic">GESTIÓN DE RETORNOS</p>
                </div>
            </div>
        </div>
    </div>

    <div id="view-crear" class="view">
        <h2 class="text-2xl font-black italic mb-4">Nueva <span class="text-blue-600">Carga</span></h2>
        <div class="space-y-3 bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
            <div class="relative">
                <input type="text" id="s-sku" oninput="smartSearch()" class="input-glass w-full" placeholder="CÓDIGO SKU">
                <div id="search-results" class="hidden absolute z-50 w-full bg-white rounded-xl shadow-2xl border p-2 mt-2 max-h-32 overflow-y-auto"></div>
            </div>
            <input type="text" id="s-desc" class="input-glass w-full text-blue-600 italic bg-slate-50 border-none text-[10px]" placeholder="PRODUCTO" readonly>
            <div class="flex gap-2">
                <input type="number" id="s-meta" class="input-glass flex-1" placeholder="CANTIDAD">
                <button onclick="addMani()" class="w-14 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center shadow-lg active:scale-90">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>
        </div>

        <div class="scroll-v">
            <div id="pre-list" class="space-y-2"></div>
        </div>

        <button id="btn-done" onclick="openModal()" class="hidden btn-titan mt-4 w-full bg-blue-600">Lanzar Operación</button>
    </div>

    <div id="view-ops" class="view">
        <div class="bg-slate-900 p-6 rounded-[2.5rem] mb-6 shadow-xl shadow-blue-100">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-1">Descarga Total</p>
                    <h4 id="global-pc" class="text-4xl font-black text-white italic">0%</h4>
                </div>
                <div class="text-right">
                    <p id="items-count" class="text-[8px] font-bold text-slate-500"></p>
                </div>
            </div>
            <div class="progress-rail bg-white/10"><div id="global-bar" class="progress-fill" style="width: 0%"></div></div>
        </div>

        <div class="text-center mb-6">
            <select id="sel-sku" onchange="syncItem()" class="text-3xl font-black bg-transparent text-slate-900 border-b-4 border-blue-600 w-full mb-2 text-center outline-none italic"></select>
            <p id="live-desc" class="text-[10px] font-bold text-blue-600 uppercase truncate px-8 tracking-tighter"></p>
        </div>

        <div class="flex flex-col gap-6 flex-grow justify-center pb-8">
            <div class="flex items-center justify-center gap-6">
                <input type="number" id="qty-in" class="input-glass w-28 h-24 text-center text-4xl !rounded-[2rem] border-2 shadow-inner" placeholder="0">
                <button onclick="registrarBulto()" class="w-24 h-24 bg-blue-600 text-white rounded-[2.5rem] flex items-center justify-center shadow-xl shadow-blue-200 active:scale-75 transition-all">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-[2rem] text-center border border-slate-100">
                    <p class="text-[8px] font-black text-slate-300 uppercase mb-1">Restante</p>
                    <p id="live-rem" class="text-3xl font-black text-slate-900 tracking-tighter">0</p>
                </div>
                <div class="bg-blue-50 p-5 rounded-[2rem] text-center border border-blue-100">
                    <p class="text-[8px] font-black text-blue-400 uppercase mb-1">Real</p>
                    <p id="live-real" class="text-3xl font-black text-blue-600 tracking-tighter">0</p>
                </div>
            </div>
            
            <div class="px-2">
                <div class="flex justify-between mb-2">
                    <p class="text-[8px] font-black text-slate-300 uppercase italic">Item Status</p>
                    <p id="item-pc" class="text-[9px] font-black text-slate-900">0%</p>
                </div>
                <div class="progress-rail h-2"><div id="item-bar" class="progress-fill !bg-slate-900" style="width: 0%"></div></div>
            </div>
        </div>

        <button onclick="finishAndReport()" class="btn-titan w-full">Finalizar y Guardar</button>
    </div>

    <div id="view-historial" class="view">
        <h2 class="text-3xl font-black italic mb-6">Archivo <span class="text-blue-600">Local</span></h2>
        <div id="history-list" class="scroll-v space-y-3"></div>
    </div>

    <div id="modal-choice" class="fixed inset-0 z-[3000] bg-slate-900/40 backdrop-blur-md hidden items-center justify-center p-8">
        <div class="bg-white w-full rounded-[3rem] p-10 text-center shadow-2xl animate-viewReveal">
            <h3 class="text-xl font-black italic mb-2">OPERACIÓN LISTA</h3>
            <p class="text-[10px] text-slate-400 font-bold mb-8 uppercase tracking-widest">Elige el destino del manifiesto</p>
            <div class="space-y-3">
                <button onclick="continuarConteo()" class="w-full btn-titan bg-blue-600 !py-5">Iniciar Ahora</button>
                <button onclick="guardarMani()" class="w-full btn-titan bg-slate-100 text-slate-400 !py-5">Solo Archivar</button>
                <button onclick="closeModal()" class="block w-full text-[10px] font-black text-slate-300 uppercase mt-4">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_items = {};
        let currentMani = JSON.parse(localStorage.getItem('taj_cur')) || [];
        let history = JSON.parse(localStorage.getItem('taj_his')) || [];
        let activeJob = JSON.parse(localStorage.getItem('taj_active')) || null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                const raw = await res.json();
                raw.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().toUpperCase().trim()] = r.DESCRIPCION; });
                const lastView = localStorage.getItem('taj_view') || 'home';
                if(lastView === 'ops' && activeJob) startOps(activeJob);
                else navTo(lastView);
            } catch (e) { console.warn("Offline Mode"); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            localStorage.setItem('taj_view', v);
            if(v === 'historial') renderHistory();
            if(v === 'crear') renderPreList();
        }

        function goHome() { navTo('home'); }

        function smartSearch() {
            const input = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('search-results');
            if(input.length < 1) { resDiv.classList.add('hidden'); return; }
            const matches = Object.keys(db_items).filter(k => k.includes(input)).slice(0,5);
            resDiv.innerHTML = matches.map(k => `<div onclick="setProd('${k}','${db_items[k]}')" class="p-4 border-b border-slate-50 text-[11px] font-black uppercase text-slate-600">${k} - <span class="text-blue-600">${db_items[k]}</span></div>`).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(s,d) {
            document.getElementById('s-sku').value = s; document.getElementById('s-desc').value = d;
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "GENERICO", meta, real: 0 });
            localStorage.setItem('taj_cur', JSON.stringify(currentMani));
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
            navigator.vibrate(20);
        }

        function renderPreList() {
            const container = document.getElementById('pre-list');
            container.innerHTML = currentMani.map((i, idx) => `
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl border border-slate-100">
                    <div class="flex-1 truncate pr-4">
                        <p class="text-[11px] font-black text-slate-900 uppercase">${i.sku}</p>
                        <p class="text-[8px] font-bold text-slate-400 italic truncate">${i.desc}</p>
                    </div>
                    <p class="text-[12px] font-black text-blue-600">${i.meta} CJ</p>
                </div>
            `).join('');
            if(currentMani.length > 0) document.getElementById('btn-done').classList.remove('hidden');
        }

        function openModal() { document.getElementById('modal-choice').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-choice').style.display = 'none'; }

        function continuarConteo() {
            closeModal();
            activeJob = { id: Date.now(), name: "OP-" + new Date().getHours() + new Date().getMinutes(), items: [...currentMani], status: 'PROCESO' };
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
            currentMani = []; localStorage.removeItem('taj_cur');
            startOps(activeJob);
        }

        function guardarMani() {
            closeModal();
            history.push({ id: Date.now(), name: "MANI-" + new Date().toLocaleDateString(), items: [...currentMani], status: 'PENDIENTE' });
            localStorage.setItem('taj_his', JSON.stringify(history));
            currentMani = []; localStorage.removeItem('taj_cur');
            navTo('historial');
        }

        function startOps(job) {
            navTo('ops');
            document.getElementById('sel-sku').innerHTML = job.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem();
        }

        function syncItem() {
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('live-desc').innerText = item.desc;
            document.getElementById('live-rem').innerText = Math.max(0, item.meta - item.real);
            document.getElementById('live-real').innerText = item.real;

            const itemPc = Math.min(Math.round((item.real / item.meta) * 100), 100);
            document.getElementById('item-bar').style.width = itemPc + "%";
            document.getElementById('item-pc').innerText = itemPc + "%";

            const totalM = activeJob.items.reduce((a,b) => a + b.meta, 0);
            const totalR = activeJob.items.reduce((a,b) => a + b.real, 0);
            const pc = Math.min(Math.round((totalR / totalM) * 100), 100);
            document.getElementById('global-bar').style.width = pc + "%";
            document.getElementById('global-pc').innerText = pc + "%";
            document.getElementById('items-count').innerText = `${activeJob.items.length} ITEMS CARGADOS`;
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
        }

        function registrarBulto() {
            const q = parseInt(document.getElementById('qty-in').value);
            if(!q) return;
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += q;
            document.getElementById('qty-in').value = '';
            syncItem();
            navigator.vibrate(40);
            fetch(CLOUD_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({tipo:'CARGA', datos: [new Date().toLocaleString(), item.sku, q]})});
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="bg-white p-5 rounded-[1.8rem] flex justify-between items-center border border-slate-100 shadow-sm">
                    <div>
                        <p class="text-[8px] font-black ${h.status==='COMPLETADO'?'text-emerald-500':'text-blue-500'} uppercase mb-1 tracking-widest">${h.status}</p>
                        <h4 class="text-[13px] font-black uppercase italic">${h.name}</h4>
                    </div>
                    <button onclick="startFromHistory(${h.id})" class="bg-slate-900 text-white text-[9px] font-black px-5 py-3 rounded-2xl active:scale-90">OPERAR</button>
                </div>
            `).join('');
        }

        function startFromHistory(id) {
            activeJob = history.find(x => x.id === id);
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
            startOps(activeJob);
        }

        function finishAndReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.setFont("helvetica", "bold"); doc.text("REPORTE TAJHO.OS - TITANIUM", 14, 20);
            doc.autoTable({
                startY: 30, head: [['SKU', 'META', 'REAL', 'DIF']],
                body: activeJob.items.map(i => [i.sku, i.meta, i.real, i.meta-i.real]),
                theme: 'striped', headStyles: { fillColor: [37, 99, 235] }
            });
            const finalY = doc.lastAutoTable.finalY + 15;
            doc.setFontSize(10);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, finalY);
            doc.text("Asist. Inventario Logístico", 14, finalY + 5);
            doc.save(`TAJHO_REPORTE_${activeJob.name}.pdf`);
            activeJob.status = 'COMPLETADO';
            localStorage.setItem('taj_his', JSON.stringify(history));
            localStorage.removeItem('taj_active');
            navTo('historial');
        }

        init();
    </script>
</body>
</html>
