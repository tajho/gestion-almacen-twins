<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue-primary: #2563eb; --bg-light: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #0f172a; margin: 0; }
        
        /* Estilo de Tarjetas Modernas */
        .card-modern { background: #ffffff; border-radius: 2rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; }
        .input-modern { background: #f1f5f9; border-radius: 1.2rem; border: 2px solid transparent; transition: 0.3s; font-weight: 600; padding: 1.2rem; }
        .input-modern:focus { border-color: var(--blue-primary); background: white; outline: none; }

        /* Pantalla de Inicio (Landing) */
        #landing { position: fixed; inset: 0; z-index: 500; background: white; padding: 2.5rem; display: flex; flex-direction: column; justify-content: center; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .hide-landing { transform: translateY(-100%); }

        /* Menú Lateral */
        #side-menu { position: fixed; top: 0; left: -300px; width: 300px; height: 100%; background: white; z-index: 1000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 25px 0 60px rgba(0,0,0,0.05); }
        .menu-active { left: 0 !important; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.1); backdrop-filter: blur(8px); z-index: 900; display: none; }

        /* Header de Trabajo */
        .work-header { position: sticky; top: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid #f1f5f9; }

        /* Botón Confirmar Ingreso (Estilo Captura) */
        .btn-confirm { background: var(--blue-primary); border-radius: 1.5rem; padding: 1.2rem; color: white; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; width: 100%; transition: 0.3s; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.3); }
        .btn-confirm:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleMenu()"></div>

    <aside id="side-menu" class="p-8 flex flex-col">
        <div class="mb-12">
            <h2 class="text-2xl font-[800] tracking-tighter italic">TAJHO<span class="text-blue-600">.OS</span></h2>
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Management System</p>
        </div>
        <nav class="space-y-6">
            <button onclick="navTo('contenedor')" class="flex items-center gap-4 text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                Carga / Contenedor
            </button>
            <button onclick="navTo('historial')" class="flex items-center gap-4 text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                Archivo Historial
            </button>
            <button onclick="navTo('retornos')" class="flex items-center gap-4 text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M8 21H3v-5"/><path d="M12 12 3 21"/><path d="m21 3-9 9"/></svg>
                Devoluciones
            </button>
        </nav>
        <div class="mt-auto">
            <button onclick="location.reload()" class="text-[10px] font-black text-red-400 uppercase tracking-widest">Salir del Sistema</button>
        </div>
    </aside>

    <div id="landing">
        <header class="mb-12">
            <h1 class="text-5xl font-[800] tracking-tighter leading-tight">¿Qué hacemos<br><span class="text-blue-600">hoy, Angelo?</span></h1>
        </header>
        <div class="space-y-4">
            <button onclick="navTo('contenedor')" class="card-modern w-full p-7 flex items-center gap-6">
                <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                </div>
                <div class="text-left">
                    <p class="text-sm font-black uppercase tracking-widest text-slate-900">Contenedor</p>
                    <p class="text-[10px] font-bold text-slate-400">DESPACHO Y LOGÍSTICA</p>
                </div>
            </button>
            <button onclick="navTo('historial')" class="card-modern w-full p-7 flex items-center gap-6">
                <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-500">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/></svg>
                </div>
                <div class="text-left">
                    <p class="text-sm font-black uppercase tracking-widest text-slate-900">Historial</p>
                    <p class="text-[10px] font-bold text-slate-400">REPORTES AUTORIZADOS</p>
                </div>
            </button>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen bg-[#fcfdfe]">
        <header class="work-header px-6 py-4 flex justify-between items-center">
            <button onclick="toggleMenu()" class="p-2 -ml-2">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="text-center">
                <p id="nav-title" class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-400 leading-none">Contenedor</p>
                <h3 class="text-sm font-black tracking-tighter mt-1">TAJHO<span class="text-blue-600">.OS</span></h3>
            </div>
            <div class="w-10"></div>
        </header>

        <div id="status-bar" class="hidden px-6 py-6">
            <div class="bg-[#0f172a] rounded-[2.5rem] p-8 text-white relative overflow-hidden shadow-2xl shadow-blue-200">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-[9px] font-bold text-blue-400 uppercase tracking-widest mb-1">Progreso Global</p>
                        <h4 id="disp-perc" class="text-5xl font-[800] italic leading-none">0%</h4>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] font-bold text-blue-400 uppercase tracking-widest mb-1">Unidades</p>
                        <h4 id="disp-count" class="text-xl font-black leading-none">0 / 0</h4>
                    </div>
                </div>
                <div class="h-2 w-full bg-white/10 rounded-full">
                    <div id="disp-bar" class="h-full bg-blue-500 rounded-full transition-all duration-700" style="width: 0%"></div>
                </div>
                <div id="disp-timer" class="absolute top-4 right-8 text-[10px] font-mono font-bold text-blue-400/50">00:00:00</div>
            </div>
        </div>

        <main class="p-6">
            <div id="view-setup" class="space-y-6">
                <div class="card-modern p-8 space-y-6">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                        </div>
                        <h3 class="text-xs font-black uppercase tracking-widest">Configurar Contenedor</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Código</label>
                            <input type="text" id="in-sku" class="input-modern w-full text-center uppercase" placeholder="XXC">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Total</label>
                            <input type="number" id="in-meta" class="input-modern w-full text-center" placeholder="000">
                        </div>
                    </div>
                    <button onclick="addItem()" class="btn-confirm bg-slate-900">Añadir al Manifiesto</button>
                    <div id="pre-list" class="space-y-2"></div>
                    <button id="btn-start" onclick="startLogistics()" class="hidden btn-confirm">Abrir Despacho Oficial</button>
                </div>
            </div>

            <div id="view-ops" class="hidden space-y-6">
                <div class="card-modern p-10 flex flex-col items-center text-center space-y-8">
                    <select id="sel-sku" onchange="syncDesc()" class="text-3xl font-[800] bg-transparent outline-none text-slate-900"></select>
                    <p id="live-desc" class="text-[10px] font-black text-blue-500 uppercase tracking-widest -mt-4">Sincronizando...</p>
                    
                    <div class="relative py-4">
                        <span id="live-big-count" class="text-8xl font-[800] text-slate-200">0</span>
                    </div>

                    <div class="w-full flex gap-3">
                        <input type="number" id="qty-add" class="input-modern flex-1 text-center text-3xl text-blue-600" placeholder="0">
                        <button onclick="doCommit()" class="w-20 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-3xl shadow-lg">✓</button>
                    </div>
                    <button onclick="doSave()" class="btn-confirm bg-slate-100 !text-slate-400 shadow-none mt-8">Finalizar y Autorizar</button>
                </div>
                <div id="live-feed" class="space-y-3"></div>
            </div>

            <div id="view-historial" class="hidden space-y-4">
                <div id="hist-container" class="space-y-3"></div>
            </div>
        </main>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let manifest = [], time = 0, clock;

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('menu-active');
            const ov = document.getElementById('overlay');
            ov.style.display = ov.style.display === 'block' ? 'none' : 'block';
        }

        function navTo(target) {
            document.getElementById('landing').classList.add('hide-landing');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('nav-title').innerText = target;
            
            ['view-setup', 'view-ops', 'view-historial'].forEach(v => document.getElementById(v).classList.add('hidden'));
            
            if(target === 'contenedor') document.getElementById('view-setup').classList.remove('hidden');
            if(target === 'historial') {
                document.getElementById('view-historial').classList.remove('hidden');
                renderHistory();
            }
            toggleMenu();
        }

        function addItem() {
            const sku = document.getElementById('in-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('in-meta').value);
            if(!sku || !meta) return;
            manifest.push({ sku, meta, real: 0 });
            document.getElementById('in-sku').value = ''; 
            document.getElementById('in-meta').value = '';
            renderPre();
            document.getElementById('btn-start').classList.remove('hidden');
        }

        function renderPre() {
            document.getElementById('pre-list').innerHTML = manifest.map(i => `
                <div class="bg-slate-50 p-4 rounded-2xl flex justify-between border border-white">
                    <span class="font-black text-xs">${i.sku}</span>
                    <span class="font-bold text-xs text-slate-400">${i.meta} UND</span>
                </div>
            `).join('');
        }

        function startLogistics() {
            document.getElementById('view-setup').classList.add('hidden');
            document.getElementById('status-bar').classList.remove('hidden');
            document.getElementById('view-ops').classList.remove('hidden');
            
            const sel = document.getElementById('sel-sku');
            sel.innerHTML = manifest.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            
            clock = setInterval(() => {
                time++;
                const h = Math.floor(time/3600).toString().padStart(2,'0');
                const m = Math.floor((time%3600)/60).toString().padStart(2,'0');
                const s = (time%60).toString().padStart(2,'0');
                document.getElementById('disp-timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
            updateUI();
        }

        function doCommit() {
            const sku = document.getElementById('sel-sku').value;
            const qty = parseInt(document.getElementById('qty-add').value);
            if(!qty) return;
            const item = manifest.find(i => i.sku === sku);
            item.real += qty;
            document.getElementById('qty-add').value = '';
            updateUI();
            navigator.vibrate(40);
        }

        function updateUI() {
            const totalMeta = manifest.reduce((a, b) => a + b.meta, 0);
            const totalReal = manifest.reduce((a, b) => a + b.real, 0);
            const p = Math.round((totalReal / totalMeta) * 100) || 0;
            
            document.getElementById('disp-perc').innerText = p + "%";
            document.getElementById('disp-bar').style.width = p + "%";
            document.getElementById('disp-count').innerText = `${totalReal} / ${totalMeta}`;
            
            const current = manifest.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('live-big-count').innerText = current.real;

            document.getElementById('live-feed').innerHTML = manifest.map(i => `
                <div class="card-modern p-5 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black text-slate-900">${i.sku}</p>
                        <div class="h-1 w-24 bg-slate-100 mt-2 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-600" style="width: ${(i.real/i.meta)*100}%"></div>
                        </div>
                    </div>
                    <span class="text-xs font-black text-blue-600">${i.real} / ${i.meta}</span>
                </div>
            `).join('');
        }

        function doSave() {
            const doc = new jsPDF();
            doc.setFont("helvetica", "bold");
            doc.text("TAJHO.OS - REPORTE DE INVENTARIO", 14, 20);
            doc.autoTable({
                startY: 30,
                head: [['ITEM SKU', 'META', 'INGRESADO', 'ESTADO']],
                body: manifest.map(i => [i.sku, i.meta, i.real, i.real >= i.meta ? 'COMPLETO' : 'PENDIENTE'])
            });
            doc.setFontSize(10);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 15);
            
            const reports = JSON.parse(localStorage.getItem('tajho_reports') || '[]');
            reports.unshift({ id: Date.now(), fecha: new Date().toLocaleString(), data: manifest });
            localStorage.setItem('tajho_reports', JSON.stringify(reports));
            
            doc.save(`TAJHO_Report_${Date.now()}.pdf`);
            location.reload();
        }

        function renderHistory() {
            const reports = JSON.parse(localStorage.getItem('tajho_reports') || '[]');
            document.getElementById('hist-container').innerHTML = reports.map(r => `
                <div class="card-modern p-6 flex justify-between items-center">
                    <div>
                        <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">${r.fecha}</p>
                        <h4 class="text-sm font-extrabold text-slate-900">ID: ${r.id}</h4>
                    </div>
                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
