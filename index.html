<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL LOGÍSTICA | ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; }
        
        /* Header & Status */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: var(--success); box-shadow: 0 0 10px var(--success); }
        
        /* Cards */
        .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #334155; }
        h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* Form Elements */
        label { display: block; font-size: 0.75rem; color: #94a3b8; margin-top: 15px; font-weight: 600; }
        input { width: 100%; background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: white; font-size: 1rem; margin-top: 5px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        
        .search-preview { background: #0f172a; padding: 15px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--accent); font-weight: 500; font-size: 0.9rem; min-height: 20px; color: var(--accent); }
        
        /* Buttons */
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; margin-top: 15px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-finish { background: transparent; border: 2px solid var(--success); color: var(--success); }
        .btn-finish:hover { background: var(--success); color: white; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th { text-align: left; color: #94a3b8; padding: 10px; border-bottom: 1px solid #334155; }
        td { padding: 12px 10px; border-bottom: 1px solid #1e293b; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }
        .badge-ok { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge-diff { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div>
            <h1 style="font-size: 1.2rem; margin: 0;">LOGÍSTICA PRO</h1>
            <p style="font-size: 0.7rem; color: #94a3b8; margin: 2px 0;">J. ANGELO NUÑEZ DURAND</p>
        </div>
        <div id="conn-tag"><span class="status-dot online"></span> <small>SINCRO ON</small></div>
    </div>

    <div class="card">
        <h2>📦 Identificación de Carga</h2>
        <label>N° CONTENEDOR / REFERENCIA</label>
        <input type="text" id="nro_cont" placeholder="Ej: 0116-2026">
        <label>PACKING LIST (IMAGEN)</label>
        <input type="file" id="img_pck" accept="image/*">
    </div>

    <div class="card">
        <h2>🔍 Validación Maestra</h2>
        <input type="text" id="master_search" placeholder="SKU o Nombre del producto..." oninput="filtrarMaestro(this.value)">
        <div id="search_feedback" class="search-preview">Esperando entrada...</div>
        
        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>CANT. PACKING</label>
                <input type="number" id="q_esperada" placeholder="0">
            </div>
            <div style="flex: 1;">
                <label>CANT. FÍSICA</label>
                <input type="number" id="q_conteo" placeholder="0">
            </div>
        </div>
        <button class="btn btn-primary" onclick="registrarBulto()">Registrar Movimiento</button>
    </div>

    <div class="card">
        <h2>📊 Resumen de Auditoría</h2>
        <table id="tabla_main">
            <thead>
                <tr><th>SKU</th><th>PCK</th><th>FIS</th><th>EST</th></tr>
            </thead>
            <tbody id="lista_cuerpo"></tbody>
        </table>
        <button class="btn btn-finish" onclick="generarReporteFinal()">Finalizar y Exportar PDF</button>
    </div>
</div>

<script>
    // URL DE TU GOOGLE APPS SCRIPT
    const API_URL = "TU_URL_AQUI"; 
    
    let baseDatos = [];
    let itemsRegistrados = {};
    let itemActual = null;

    // Carga inicial de datos
    window.onload = async () => {
        try {
            const r = await fetch(API_URL);
            baseDatos = await r.json();
            console.log("Maestro Cargado");
        } catch (e) { document.getElementById('conn-tag').innerHTML = "⚠️ ERROR"; }
    };

    function filtrarMaestro(val) {
        val = val.trim().toUpperCase();
        if(val.length < 2) return;

        const p = baseDatos.find(x => x[0].toString().includes(val) || x[1].toString().includes(val));
        const feedback = document.getElementById('search_feedback');

        if(p) {
            itemActual = { sku: p[0], nombre: p[1] };
            feedback.innerText = `📦 ${p[0]} | ${p[1]}`;
            feedback.style.color = "var(--accent)";
            feedback.style.borderColor = "var(--accent)";
        } else {
            itemActual = null;
            feedback.innerText = "PRODUCTO NO REGISTRADO";
            feedback.style.color = "var(--danger)";
            feedback.style.borderColor = "var(--danger)";
        }
    }

    function registrarBulto() {
        const pck = parseInt(document.getElementById('q_esperada').value) || 0;
        const fis = parseInt(document.getElementById('q_conteo').value) || 0;
        const cont = document.getElementById('nro_cont').value;

        if(!itemActual || fis === 0 || !cont) {
            alert("Complete Contenedor, Producto y Cantidad Física");
            return;
        }

        const sku = itemActual.sku;
        if(!itemsRegistrados[sku]) {
            itemsRegistrados[sku] = { nombre: itemActual.nombre, pck: pck, fis: 0 };
        }
        
        itemsRegistrados[sku].fis += fis;
        if(pck > 0) itemsRegistrados[sku].pck = pck;

        // SINCRONIZACIÓN EN SEGUNDO PLANO (Background Sync)
        fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                contenedor: cont,
                sku: sku,
                cantidad: fis,
                timestamp: new Date().toISOString()
            })
        });

        actualizarUI();
        
        // Reset campos
        document.getElementById('master_search').value = "";
        document.getElementById('q_conteo').value = "";
        document.getElementById('master_search').focus();
    }

    function actualizarUI() {
        const b = document.getElementById('lista_cuerpo');
        b.innerHTML = "";
        for(let s in itemsRegistrados) {
            const it = itemsRegistrados[s];
            const diff = it.fis === it.pck;
            b.innerHTML += `
                <tr>
                    <td><b>${s}</b><br><small style="color:#94a3b8">${it.nombre.substring(0,20)}</small></td>
                    <td>${it.pck}</td>
                    <td>${it.fis}</td>
                    <td><span class="badge ${diff ? 'badge-ok' : 'badge-diff'}">${diff ? 'OK' : 'DIF'}</span></td>
                </tr>`;
        }
    }

    function generarReporteFinal() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const n = document.getElementById('nro_cont').value;

        // Estilo Corporativo PDF
        doc.setFillColor(30, 41, 59);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(20).text("REPORTE DE AUDITORÍA LOGÍSTICA", 105, 20, {align:'center'});
        doc.setFontSize(10).text(`CONTENEDOR: ${n} | FECHA: ${new Date().toLocaleString()}`, 105, 30, {align:'center'});

        const rows = Object.keys(itemsRegistrados).map(s => {
            const i = itemsRegistrados[s];
            return [s, i.nombre, i.pck, i.fis, i.fis - i.pck];
        });

        doc.autoTable({
            startY: 45,
            head: [['SKU', 'DESCRIPCIÓN', 'PACKING', 'CONTEO', 'DIF']],
            body: rows,
            headStyles: { fillColor: [59, 130, 246] },
            theme: 'striped'
        });

        const y = doc.lastAutoTable.finalY + 35;
        doc.setTextColor(0, 0, 0);
        doc.text("Recepción y conteo realizado por:", 105, y, {align:'center'});
        doc.setFont(undefined, 'bold').text("J. Angelo Nuñez Durand", 105, y + 8, {align:'center'});
        doc.setFont(undefined, 'normal').text("--------------------------------------------------", 105, y + 13, {align:'center'});
        doc.text("Asist. Logístico.", 105, y + 18, {align:'center'});

        doc.save(`Auditoria_${n}.pdf`);
    }
</script>
</body>
</html>
