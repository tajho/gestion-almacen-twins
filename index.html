<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twins Despacho | Industrial Signature</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #0a0b10; --surface: #15171f; --accent: #ff5f1f; --text-muted: #64748b; }
        body { font-family: 'Archivo', sans-serif; background-color: var(--main-bg); color: white; margin: 0; -webkit-font-smoothing: antialiased; }
        
        /* Layout Structure */
        .view { display: none; min-height: 100vh; padding: 1.5rem; flex-direction: column; }
        .view.active { display: flex; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Componentes de Diseño Único */
        .card-industrial { background: var(--surface); border-radius: 4px; border-left: 4px solid var(--accent); padding: 1.5rem; }
        .btn-primary { background-color: var(--accent); color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; border-radius: 4px; padding: 1.25rem; transition: 0.2s; }
        .btn-primary:active { background-color: #e04e10; transform: scale(0.98); }
        
        .input-industrial { background: #1f222d; border: 1px solid #2d313f; border-radius: 4px; padding: 1rem; color: white; width: 100%; outline: none; font-size: 1rem; }
        .input-industrial:focus { border-color: var(--accent); }

        .status-badge { font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 2px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Custom Scroll */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>

    <nav class="h-20 px-6 flex justify-between items-center border-b border-white/5 sticky top-0 z-50 bg-[#0a0b10]/95 backdrop-blur-md">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter">TWINS<span class="text-[#ff5f1f]">.</span></h1>
            <p class="text-[8px] font-bold text-slate-500 uppercase tracking-[0.3em]">Logistics Management</p>
        </div>
        <button onclick="navTo('historial')" class="p-2">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
        </button>
    </nav>

    <div id="view-home" class="view active">
        <div class="mt-8 mb-12">
            <h2 class="text-4xl font-black leading-none mb-2">OPERACIONES<br>DISPONIBLES</h2>
            <div class="h-1 w-12 bg-[#ff5f1f]"></div>
        </div>

        <div class="grid gap-4">
            <div onclick="navTo('crear')" class="card-industrial flex justify-between items-center active:bg-white/5 transition-colors">
                <div>
                    <p class="text-[10px] font-black text-[#ff5f1f] mb-1">ACCION RAPIDA</p>
                    <p class="text-xl font-bold">NUEVA CARGA</p>
                </div>
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M12 5v14M5 12h14"/></svg>
            </div>

            <div onclick="navTo('historial')" class="bg-white/5 p-6 rounded border border-white/5 flex justify-between items-center active:bg-white/10 transition-colors">
                <p class="text-lg font-bold">HISTORIAL DE REPORTES</p>
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </div>
        </div>
    </div>

    <div id="view-crear" class="view">
        <div class="flex items-center gap-4 mb-10">
            <button onclick="navTo('home')" class="text-slate-500 text-sm font-bold">← VOLVER</button>
            <h2 class="text-2xl font-black italic">CONFIGURAR DESPACHO</h2>
        </div>

        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Identificador de Contenedor</label>
                <input type="text" id="c-id" class="input-industrial uppercase font-bold text-[#ff5f1f]" placeholder="EJ: CONT-2026-A">
            </div>

            <div class="space-y-2 relative">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Búsqueda de Material</label>
                <input type="text" id="s-sku" oninput="handleSearch()" class="input-industrial" placeholder="SKU o Descripción...">
                <div id="results" class="absolute z-50 left-0 right-0 bg-[#1f222d] border border-[#2d313f] rounded mt-1 hidden max-h-60 overflow-y-auto"></div>
            </div>

            <div class="flex gap-4">
                <div class="flex-1 space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Meta Pack (Cant)</label>
                    <input type="number" id="s-meta" class="input-industrial text-center text-xl font-bold" placeholder="0">
                </div>
                <button onclick="addToList()" class="w-20 bg-white text-black font-black text-2xl mt-6 rounded">＋</button>
            </div>
        </div>

        <div id="manifest-list" class="mt-10 space-y-3 pb-32"></div>

        <div class="fixed bottom-0 left-0 right-0 p-6 bg-[#0a0b10]">
            <button onclick="startOperation()" class="btn-primary w-full">LANZAR OPERACIÓN</button>
        </div>
    </div>

    <div id="view-ops" class="view">
        <div class="card-industrial mb-6">
            <p id="op-header" class="text-[10px] font-black text-[#ff5f1f] mb-4 tracking-[0.2em]"></p>
            <select id="sel-sku" onchange="refreshOps()" class="w-full bg-transparent text-3xl font-black outline-none mb-8 border-b border-white/10 pb-2 appearance-none"></select>
            
            <div class="flex items-center gap-6">
                <input type="number" id="qty-in" class="flex-1 bg-white text-black h-20 text-center text-4xl font-black rounded" placeholder="0">
                <button onclick="recordBox()" class="w-24 h-20 btn-primary">OK</button>
            </div>
        </div>

        <div id="progress-container" class="space-y-4 pb-40"></div>

        <div class="fixed bottom-0 left-0 right-0 p-6 bg-[#0a0b10] flex gap-3">
            <button onclick="confirmAndFinish()" class="btn-primary flex-1 bg-emerald-600">FINALIZAR Y FIRMAR PDF</button>
        </div>
    </div>

    <div id="view-historial" class="view">
        <div class="flex items-center gap-4 mb-10">
            <button onclick="navTo('home')" class="text-slate-500 text-sm font-bold">← VOLVER</button>
            <h2 class="text-2xl font-black italic uppercase">REGISTROS</h2>
        </div>
        <div id="history-content" class="space-y-4"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let localDB = {};
        let currentItems = [];
        let activeOp = null;

        async function init() {
            try {
                const r = await fetch(API_URL);
                const data = await r.json();
                data.forEach(item => { if(item.CODIGO) localDB[item.CODIGO.toString().trim().toUpperCase()] = item.DESCRIPCION; });
            } catch(e) {}
            
            const saved = localStorage.getItem('twins_active');
            if(saved) { activeOp = JSON.parse(saved); navTo('ops'); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'historial') renderHistory();
            if(v === 'ops' && activeOp) refreshOps();
        }

        function handleSearch() {
            const val = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('results');
            if(val.length < 2) { resDiv.classList.add('hidden'); return; }
            
            const matches = Object.entries(localDB).filter(([k, v]) => k.includes(val) || v.toUpperCase().includes(val)).slice(0, 6);
            resDiv.innerHTML = matches.map(([k, v]) => `
                <div onclick="selectItem('${k}')" class="p-4 border-b border-white/5 active:bg-[#ff5f1f]">
                    <p class="font-bold text-sm">${k}</p>
                    <p class="text-[10px] text-slate-400 uppercase">${v}</p>
                </div>
            `).join('');
            resDiv.classList.remove('hidden');
        }

        function selectItem(k) {
            document.getElementById('s-sku').value = k;
            document.getElementById('results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function addToList() {
            const sku = document.getElementById('s-sku').value.toUpperCase();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentItems.push({ sku, desc: localDB[sku] || "S/D", meta, real: 0 });
            renderManifest();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderManifest() {
            document.getElementById('manifest-list').innerHTML = currentItems.map((item, idx) => `
                <div class="bg-white/5 p-4 rounded flex justify-between items-center">
                    <div><p class="font-bold text-sm">${item.sku}</p><p class="text-[9px] text-slate-500 font-bold">${item.meta} UNIDADES</p></div>
                    <button onclick="currentItems.splice(${idx},1);renderManifest()" class="text-red-500 font-black">QUITAR</button>
                </div>
            `).join('');
        }

        function startOperation() {
            if(currentItems.length === 0) return;
            const id = document.getElementById('c-id').value.toUpperCase() || "OP-" + Date.now().toString().slice(-4);
            activeOp = { id, items: [...currentItems], date: new Date().toLocaleString(), status: 'PENDIENTE' };
            localStorage.setItem('twins_active', JSON.stringify(activeOp));
            
            let history = JSON.parse(localStorage.getItem('twins_history')) || [];
            history.unshift(activeOp);
            localStorage.setItem('twins_history', JSON.stringify(history));
            
            currentItems = [];
            navTo('ops');
        }

        function refreshOps() {
            document.getElementById('op-header').innerText = "CONTENEDOR: " + activeOp.id;
            document.getElementById('sel-sku').innerHTML = activeOp.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            renderProgress();
        }

        function recordBox() {
            const val = parseInt(document.getElementById('qty-in').value);
            if(!val) return;
            const target = activeOp.items.find(i => i.sku === document.getElementById('sel-sku').value);
            if(target) target.real += val;
            document.getElementById('qty-in').value = '';
            localStorage.setItem('twins_active', JSON.stringify(activeOp));
            renderProgress();
        }

        function renderProgress() {
            document.getElementById('progress-container').innerHTML = activeOp.items.map(i => {
                const pc = Math.min(Math.round((i.real / i.meta) * 100), 100);
                const isSel = i.sku === document.getElementById('sel-sku').value;
                return `
                <div class="p-4 rounded ${isSel ? 'bg-white/10 border border-[#ff5f1f]' : 'bg-white/5 opacity-50'}">
                    <div class="flex justify-between font-black text-[11px] mb-3"><span>${i.sku}</span><span>${i.real} / ${i.meta}</span></div>
                    <div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden"><div class="h-full bg-[#ff5f1f]" style="width:${pc}%"></div></div>
                </div>`;
            }).join('');
        }

        function confirmAndFinish() {
            if(!confirm("¿CONFIRMAR CIERRE Y GENERAR PDF?")) return;
            
            let history = JSON.parse(localStorage.getItem('twins_history')) || [];
            const idx = history.findIndex(h => h.id === activeOp.id && h.status !== 'COMPLETADO');
            activeOp.status = 'COMPLETADO';
            if(idx !== -1) history[idx] = activeOp;
            
            localStorage.setItem('twins_history', JSON.stringify(history));
            generatePDF(activeOp);
            
            localStorage.removeItem('twins_active');
            activeOp = null;
            navTo('home');
        }

        function generatePDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(10, 11, 16); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.setFont("helvetica", "bold"); doc.text("REPORTE TWINS DESPACHO", 14, 25);
            
            doc.setTextColor(100); doc.setFontSize(10);
            doc.text(`ID: ${data.id} | FECHA: ${data.date}`, 14, 50);

            doc.autoTable({
                startY: 60,
                head: [['CÓDIGO SKU', 'PRODUCTO', 'META', 'REAL', 'ESTADO']],
                body: data.items.map(i => [i.sku, i.desc.slice(0,30), i.meta, i.real, (i.real >= i.meta ? 'OK' : 'FALTANTE')]),
                theme: 'grid',
                headStyles: { fillColor: [255, 95, 31], textColor: [255, 255, 255] }
            });

            doc.setTextColor(0); doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 20);
            doc.save(`Twins_Report_${data.id}.pdf`);
        }

        function renderHistory() {
            const hist = JSON.parse(localStorage.getItem('twins_history')) || [];
            document.getElementById('history-content').innerHTML = hist.map(h => `
                <div class="card-industrial border-l-white/20">
                    <div class="flex justify-between items-start mb-4">
                        <div><p class="text-[10px] text-slate-500 font-bold uppercase">${h.date}</p><h3 class="text-xl font-black">${h.id}</h3></div>
                        <span class="status-badge ${h.status === 'COMPLETADO' ? 'bg-emerald-500/20 text-emerald-500' : 'bg-[#ff5f1f]/20 text-[#ff5f1f]'}">${h.status}</span>
                    </div>
                    <button onclick='generatePDF(${JSON.stringify(h)})' class="w-full bg-white/5 p-3 rounded text-[10px] font-black uppercase tracking-widest">Descargar Reporte</button>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
