<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite | Smart Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; 
            color: #0F172A; 
        }

        .glass-nav { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid #E2E8F0; 
        }

        .card-container { 
            background: white; 
            border-radius: 28px; 
            border: 1px solid #F1F5F9; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        /* Badge de Hora Limpia */
        .time-badge {
            @apply bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md font-bold text-[9px] uppercase tracking-tighter;
        }

        .modal-overlay { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(8px); 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 100; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }

        .btn-action { 
            @apply flex flex-col items-center justify-center gap-2 p-4 rounded-2xl border border-slate-50 bg-white transition-all active:scale-90 text-[9px] font-extrabold uppercase tracking-tight; 
        }
        
        .sync-loading { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-28">

    <div id="modalLista" class="modal-overlay" onclick="closeModal()">
        <div class="bg-white rounded-[32px] w-full max-w-lg max-h-[85vh] flex flex-col shadow-2xl overflow-hidden" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                <div>
                    <h3 class="text-2xl font-800 tracking-tighter text-blue-600 uppercase" id="modalTitle">Detalle</h3>
                    <p id="modalCount" class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic"></p>
                </div>
                <button onclick="closeModal()" class="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center text-slate-400 hover:text-red-500 transition-colors">
                    <i class="ph-bold ph-x text-xl"></i>
                </button>
            </div>
            <div id="modalBody" class="overflow-y-auto p-6 space-y-3 bg-slate-50/50"></div>
            <div class="p-6 border-t border-slate-50">
                <button onclick="closeModal()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-800 text-xs uppercase tracking-[0.2em] shadow-xl active:scale-95 transition-transform">Cerrar Detalle</button>
            </div>
        </div>
    </div>

    <header class="glass-nav sticky top-0 z-50 px-6 py-5">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-800 tracking-tighter italic leading-none">TWINS <span class="text-blue-600">ELITE</span></h1>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Inventory Manager</p>
            </div>
            <div id="syncIndicator" class="flex items-center gap-2 bg-blue-50 text-blue-600 px-4 py-2 rounded-full text-[10px] font-800 border border-blue-100">
                <i id="syncIcon" class="ph-bold ph-check-circle text-sm"></i>
                <span id="syncText">SISTEMA ACTIVO</span>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-6 space-y-6">
        <div class="space-y-3">
            <div class="relative group">
                <input type="text" id="searchInput" oninput="app.render()" placeholder="Buscar por cliente, código o ítem..." 
                class="w-full pl-14 pr-6 py-5 rounded-[24px] bg-white border border-slate-200 shadow-sm focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-sm transition-all placeholder:text-slate-400">
                <i class="ph-bold ph-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 text-xl group-focus-within:text-blue-600"></i>
            </div>
            
            <div class="relative">
                <select id="monthFilter" onchange="app.render()" class="w-full p-5 pl-14 rounded-[24px] bg-white border border-slate-200 shadow-sm font-800 text-xs uppercase text-slate-600 outline-none appearance-none tracking-widest">
                    <option value="ALL">TODOS LOS PERIODOS</option>
                    <option value="0">ENERO</option><option value="1">FEBRERO</option>
                    <option value="2">MARZO</option><option value="3">ABRIL</option>
                    <option value="4">MAYO</option><option value="5">JUNIO</option>
                    <option value="6">JULIO</option><option value="7">AGOSTO</option>
                    <option value="8">SEPTIEMBRE</option><option value="9">OCTUBRE</option>
                    <option value="10">NOVIEMBRE</option><option value="11">DICIEMBRE</option>
                </select>
                <i class="ph-bold ph-calendar-blank absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 text-xl"></i>
                <i class="ph-bold ph-caret-down absolute right-6 top-1/2 -translate-y-1/2 text-slate-300"></i>
            </div>
        </div>

        <div id="feed" class="space-y-6"></div>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-slate-900/95 backdrop-blur-xl rounded-[32px] p-2 flex justify-around items-center shadow-2xl z-50 border border-white/10">
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="p-4 text-blue-400 active:scale-75 transition-transform"><i class="ph-fill ph-house-line text-2xl"></i></button>
        <button onclick="app.sync()" class="p-4 text-white active:scale-75 transition-transform"><i id="btnSyncIcon" class="ph-bold ph-arrows-clockwise text-2xl"></i></button>
        <button class="p-4 text-slate-500 active:scale-75 transition-transform"><i class="ph-bold ph-file-text text-2xl"></i></button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbycL7jCK_jAwAch6H9DVnpditaxcMnghvhu860tGiCroA_ncf2fTKR6TU-qs1ojqEU/exec";

        const app = {
            data: JSON.parse(localStorage.getItem('twins_elite_data')) || [],

            // MEJORA: Lectura de Hora y Fecha Real
            formatLabelDate: function(dateStr) {
                if (!dateStr || dateStr === "SIN FECHA") return "--/--/---- | --:--";
                const d = new Date(dateStr);
                if (isNaN(d)) return dateStr;
                
                const fecha = d.toLocaleDateString('es-PE', { day: '2-digit', month: '2-digit', year: 'numeric' });
                const hora = d.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', hour12: true });
                
                return `${fecha} <span class="time-badge ml-2">${hora}</span>`;
            },

            sync: async function() {
                const icon = document.getElementById('btnSyncIcon');
                const text = document.getElementById('syncText');
                icon.classList.add('sync-loading');
                text.innerText = "ACTUALIZANDO...";
                
                try {
                    const res = await fetch(API_URL);
                    const json = await res.json();
                    this.data = Array.isArray(json) ? json : (json.historial || []);
                    localStorage.setItem('twins_elite_data', JSON.stringify(this.data));
                    this.render();
                    text.innerText = "SISTEMA ACTUALIZADO";
                } catch(e) {
                    text.innerText = "MODO OFFLINE";
                } finally {
                    icon.classList.remove('sync-loading');
                    setTimeout(() => text.innerText = "SISTEMA ACTIVO", 3000);
                }
            },

            render: function() {
                const feed = document.getElementById('feed');
                const search = document.getElementById('searchInput').value.toLowerCase();
                const month = document.getElementById('monthFilter').value;

                const groups = this.data.reduce((acc, item) => {
                    const canal = item.canal || item.CONTENEDOR || "S/N";
                    const dateObj = new Date(item.almacen || item.FECHA);
                    
                    const matchesSearch = JSON.stringify(item).toLowerCase().includes(search);
                    const matchesMonth = month === "ALL" || (!isNaN(dateObj) && dateObj.getMonth().toString() === month);

                    if (matchesSearch && matchesMonth) {
                        if (!acc[canal]) acc[canal] = { id: canal, fecha: item.almacen || item.FECHA, items: [] };
                        acc[canal].items.push(item);
                    }
                    return acc;
                }, {});

                let html = '';
                Object.values(groups).sort((a,b) => b.id - a.id).forEach(g => {
                    html += `
                    <div class="card-container shadow-xl shadow-blue-900/5">
                        <div class="h-2 w-full bg-blue-600"></div>
                        <div class="p-7">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <p class="flex items-center text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">
                                        <i class="ph-bold ph-clock-counter-clockwise mr-1.5 text-blue-500"></i>
                                        ${this.formatLabelDate(g.fecha)}
                                    </p>
                                    <h3 class="text-3xl font-900 text-slate-900 tracking-tighter uppercase leading-none">
                                        Contenedor ${g.id}
                                    </h3>
                                </div>
                                <div class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-black text-xs">
                                    ${g.items.length}
                                </div>
                            </div>

                            <div class="grid grid-cols-3 gap-3">
                                <button onclick="app.action('EDIT', '${g.id}')" class="btn-action border-blue-100 text-blue-600 hover:bg-blue-50">
                                    <i class="ph-fill ph-pencil-simple"></i>EDITAR
                                </button>
                                <button onclick="app.action('LIST', '${g.id}')" class="btn-action border-slate-100 text-slate-700 hover:bg-slate-100">
                                    <i class="ph-fill ph-list-numbers"></i>LISTA
                                </button>
                                <button onclick="app.action('PDF', '${g.id}')" class="btn-action border-red-100 text-red-500 hover:bg-red-50">
                                    <i class="ph-fill ph-file-pdf"></i>REPORTE
                                </button>
                            </div>
                        </div>
                    </div>`;
                });

                feed.innerHTML = html || '<div class="text-center py-20 opacity-30 font-black text-xs uppercase tracking-[0.3em]">Sin registros</div>';
            },

            action: function(type, id) {
                const filtrados = this.data.filter(i => String(i.canal || i.CONTENEDOR) === String(id));

                if (type === 'LIST') {
                    document.getElementById('modalTitle').innerText = `Contenedor ${id}`;
                    document.getElementById('modalCount').innerText = `${filtrados.length} Ítems en inventario`;
                    
                    let content = '';
                    filtrados.forEach(item => {
                        content += `
                        <div class="p-5 rounded-[24px] bg-white border border-slate-100 flex items-center gap-5 shadow-sm">
                            <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                                <i class="ph-bold ph-package text-2xl"></i>
                            </div>
                            <div class="flex-1">
                                <p class="text-[10px] font-black text-blue-600 leading-none mb-1 tracking-tighter">${item.codigo || 'S/C'}</p>
                                <p class="text-sm font-bold text-slate-800 uppercase leading-tight">${item.descripcion || 'Sin descripción'}</p>
                                <p class="text-[9px] font-bold text-slate-400 mt-1 uppercase">Cantidad: ${item.cantidad || '1'}</p>
                            </div>
                        </div>`;
                    });
                    document.getElementById('modalBody').innerHTML = content;
                    document.getElementById('modalLista').style.display = 'flex';
                }

                if (type === 'PDF') {
                    const auth = "Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.";
                    alert(`📄 GENERANDO REPORTE PDF...\n\nContenedor: ${id}\nÍtems: ${filtrados.length}\n\n${auth}`);
                }

                if (type === 'EDIT') {
                    const nuevoNombre = prompt(`EDITAR CONTENEDOR ${id}\nIngrese nuevo nombre o cliente:`, filtrados[0].cliente || "");
                    if(nuevoNombre) alert("Cambios guardados localmente. Sincronice para confirmar.");
                }
            }
        };

        function closeModal() {
            document.getElementById('modalLista').style.display = 'none';
        }

        // Inicio automático
        app.render();
        app.sync();
    </script>
</body>
</html>
