<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v43 | ELITE REFINED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2563eb; --bg: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; overflow: hidden; height: 100vh; }

        /* REFINAMIENTO V33: ESTRUCTURA FUERTE, LETRA PEQUEÑA */
        .card-global { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .input-premium { background: #f1f5f9; border-radius: 0.75rem; border: 2px solid transparent; padding: 0.75rem; font-size: 0.85rem; font-weight: 600; transition: 0.3s; width: 100%; }
        .input-premium:focus { border-color: var(--accent); outline: none; background: white; }

        /* BOTONES DE ALTO IMPACTO PERO ELEGANTES */
        .btn-action { background: var(--bg); color: white; border-radius: 1rem; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; transition: 0.2s; }
        .btn-action:active { transform: scale(0.96); opacity: 0.9; }

        /* NAVEGACIÓN CAPAS */
        #landing { position: fixed; inset: 0; z-index: 1000; background: white; padding: 2rem; display: flex; flex-direction: column; transition: transform 0.6s cubic-bezier(0.8, 0, 0.2, 1); }
        .hide-landing { transform: translateY(-100%); }
        
        .view { display: none; height: calc(100vh - 90px); overflow-y: auto; padding: 1.25rem; }
        .view.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* BARRAS TÉCNICAS */
        .track { height: 6px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .bar { height: 100%; background: var(--accent); transition: width 0.6s ease; }
    </style>
</head>
<body>

    <div id="landing">
        <div class="flex-1 flex flex-col justify-center">
            <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.3em] mb-2">Sistema de Control</p>
            <h1 class="text-4xl font-black tracking-tighter text-slate-900 leading-none mb-10">¿Qué hacemos<br>hoy, <span class="text-blue-600 italic">Tajho?</span></h1>
            
            <div class="space-y-4">
                <button onclick="navTo('contenedor')" class="card-global p-6 flex items-center justify-between active:bg-slate-50 transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
                        </div>
                        <div class="text-left"><p class="text-[13px] font-bold uppercase tracking-tight">Contenedor</p><p class="text-[10px] text-slate-400 font-medium">Nueva descarga técnica</p></div>
                    </div>
                </button>

                <button onclick="navTo('historial')" class="card-global p-6 flex items-center justify-between active:bg-slate-50 transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 20v-6M9 20V10M15 20V4"/></svg>
                        </div>
                        <div class="text-left"><p class="text-[13px] font-bold uppercase tracking-tight">Historial</p><p class="text-[10px] text-slate-400 font-medium">Reportes y pendientes</p></div>
                    </div>
                </button>
            </div>
        </div>
        <p class="text-[9px] text-center font-bold text-slate-300 uppercase tracking-widest">Tajho Elite v43.0</p>
    </div>

    <header class="h-20 px-6 flex justify-between items-center bg-white border-b border-slate-100 sticky top-0 z-50">
        <button onclick="navTo('landing')" class="w-10 h-10 flex items-center justify-center card-global">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div id="header-monitor" class="hidden flex-1 px-8">
            <div class="flex justify-between items-center mb-1.5">
                <span id="timer" class="text-[10px] font-black italic text-blue-600">00:00:00</span>
                <span id="global-pc" class="text-[10px] font-black text-slate-400">0%</span>
            </div>
            <div class="track"><div id="main-bar" class="bar" style="width: 0%"></div></div>
        </div>
        <div class="text-right"><p class="text-[10px] font-black italic">TAJHO<span class="text-blue-600">.OS</span></p></div>
    </header>

    <main>
        <div id="view-contenedor" class="view">
            <div class="card-global p-6 space-y-4">
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1 tracking-widest">Identificación</label>
                    <input type="text" id="c-name" class="input-premium mt-1" placeholder="NOMBRE DEL CONTENEDOR">
                </div>
                <div class="relative">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1 tracking-widest">Buscar Artículo</label>
                    <input type="text" id="s-sku" oninput="searchData()" class="input-premium mt-1" placeholder="SKU o Descripción" autocomplete="off">
                    <div id="search-results" class="hidden absolute z-50 w-full bg-white border border-slate-200 mt-2 rounded-xl shadow-2xl max-h-48 overflow-y-auto"></div>
                </div>
                <div class="bg-slate-50 p-3 rounded-lg"><p id="s-desc" class="text-[10px] font-bold text-blue-600 text-center uppercase h-3"></p></div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1 tracking-widest">Meta</label>
                    <input type="number" id="s-meta" class="input-premium mt-1 text-center" placeholder="CANTIDAD DE CAJAS">
                </div>
                <button onclick="addItem()" class="w-full h-12 btn-action bg-blue-600 shadow-lg shadow-blue-100">Añadir a lista</button>
            </div>
            <div id="pre-list" class="mt-6 space-y-2"></div>
            <button id="btn-save" onclick="saveContenedor()" class="hidden w-full h-14 btn-action mt-6 bg-slate-900 shadow-xl">Confirmar y Guardar</button>
        </div>

        <div id="view-historial" class="view space-y-4">
            <h2 class="text-lg font-black italic tracking-tighter px-1">REGISTROS <span class="text-blue-600">TAJHO</span></h2>
            <div id="history-list" class="space-y-3"></div>
        </div>

        <div id="view-ops" class="view">
            <div class="card-global p-8 space-y-8 text-center relative overflow-hidden">
                <div class="space-y-1">
                    <select id="sel-sku" onchange="syncItem()" class="text-2xl font-black bg-transparent w-full text-center outline-none italic tracking-tighter text-slate-900"></select>
                    <p id="ops-desc" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest"></p>
                </div>
                
                <div class="space-y-3">
                    <div class="flex justify-between text-[9px] font-black text-slate-400 uppercase italic"><span>Avance ítem</span><span id="item-pc">0%</span></div>
                    <div class="track"><div id="item-bar" class="bar" style="width: 0%"></div></div>
                </div>

                <div class="flex items-center justify-center gap-6">
                    <input type="number" id="qty-in" class="w-24 h-16 bg-slate-100 rounded-xl text-center text-2xl font-black outline-none border-2 border-transparent focus:border-blue-600" placeholder="0">
                    <button onclick="doQty()" class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-xl shadow-blue-200 active:scale-75 transition-all">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-4 border-t border-slate-50 pt-8">
                    <div class="card-global bg-slate-50 border-none p-4"><p class="text-[9px] font-black text-slate-400 uppercase mb-1">Restante</p><p id="txt-rem" class="text-xl font-black">0</p></div>
                    <div class="card-global bg-blue-50 border-none p-4"><p class="text-[9px] font-black text-blue-400 uppercase mb-1">Cargado</p><p id="txt-real" class="text-xl font-black text-blue-600">0</p></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db = []; let history = []; let draft = []; let active = null; let tSec = 0; let tInt;

        async function init() { try { const r = await fetch(CLOUD_URL); db = await r.json(); } catch(e) {} }
        
        function navTo(v) {
            if(v === 'landing') { document.getElementById('landing').classList.remove('hide-landing'); return; }
            document.getElementById('landing').classList.add('hide-landing');
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            if(v === 'historial') renderHistory();
            init();
        }

        function searchData() {
            const val = document.getElementById('s-sku').value.toUpperCase();
            const res = document.getElementById('search-results');
            if(val.length < 2) { res.classList.add('hidden'); return; }
            const matches = db.filter(i => String(i.CODIGO).includes(val) || String(i.DESCRIPCION).includes(val)).slice(0, 6);
            res.innerHTML = matches.map(m => `<div onclick="setS('${m.CODIGO}','${m.DESCRIPCION}')" class="p-4 border-b border-slate-50 text-[11px] font-bold active:bg-blue-50"><span>${m.CODIGO}</span> <span class="text-slate-400 font-medium ml-2">— ${m.DESCRIPCION}</span></div>`).join('');
            res.classList.remove('hidden');
        }

        function setS(c,d) { 
            document.getElementById('s-sku').value=c; document.getElementById('s-desc').innerText=d; 
            document.getElementById('search-results').classList.add('hidden'); document.getElementById('s-meta').focus();
        }

        function addItem() {
            const sku = document.getElementById('s-sku').value; const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            draft.push({sku, desc: document.getElementById('s-desc').innerText, meta, real: 0});
            document.getElementById('pre-list').innerHTML += `<div class="card-global p-4 flex justify-between items-center text-[11px] font-bold uppercase italic shadow-sm"><span>${sku}</span><span class="text-blue-600">META: ${meta}</span></div>`;
            document.getElementById('btn-save').classList.remove('hidden');
            document.getElementById('s-sku').value=''; document.getElementById('s-desc').innerText=''; document.getElementById('s-meta').value='';
        }

        function saveContenedor() {
            const name = document.getElementById('c-name').value || "CONT-" + Date.now().toString().slice(-4);
            history.push({id: Date.now(), name, items: [...draft], status: 'ESPERA'});
            draft = []; document.getElementById('pre-list').innerHTML = ''; document.getElementById('btn-save').classList.add('hidden');
            navTo('historial');
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="card-global p-5 flex justify-between items-center">
                    <div><p class="text-[9px] font-black text-blue-600 mb-0.5 tracking-widest uppercase">${h.status}</p><h3 class="text-[13px] font-black uppercase italic">${h.name}</h3></div>
                    <button onclick="startOps(${h.id})" class="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center shadow-lg active:scale-90 transition-all"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
                </div>
            `).join('');
        }

        function startOps(id) {
            active = history.find(h => h.id === id); active.status = 'ACTIVO';
            navTo('ops');
            document.getElementById('header-monitor').classList.remove('hidden');
            document.getElementById('sel-sku').innerHTML = active.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem(); startT();
        }

        function syncItem() {
            const item = active.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('ops-desc').innerText = item.desc;
            document.getElementById('txt-rem').innerText = item.meta - item.real;
            document.getElementById('txt-real').innerText = item.real;
            const itemPc = Math.floor((item.real/item.meta)*100) || 0;
            document.getElementById('item-bar').style.width = itemPc + "%";
            document.getElementById('item-pc').innerText = itemPc + "%";
            const tM = active.items.reduce((a,b) => a+b.meta,0); const tR = active.items.reduce((a,b) => a+b.real,0);
            const globalPc = Math.floor((tR/tM)*100) || 0;
            document.getElementById('main-bar').style.width = globalPc + "%";
            document.getElementById('global-pc').innerText = globalPc + "%";
        }

        function doQty() {
            const q = parseInt(document.getElementById('qty-in').value); if(!q) return;
            const item = active.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += q; document.getElementById('qty-in').value = ''; syncItem();
            navigator.vibrate(15);
            fetch(CLOUD_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({tipo:'CARGA', datos:[active.name, item.sku, q]})});
        }

        function startT() {
            if(tInt) clearInterval(tInt);
            tInt = setInterval(() => {
                tSec++; let h=Math.floor(tSec/3600), m=Math.floor((tSec%3600)/60), s=tSec%60;
                document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }

        init();
    </script>
</body>
</html>
