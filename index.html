<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; -webkit-tap-highlight-color: transparent; }
        .premium-card { background: #FFFFFF; border: 1px solid #F1F5F9; border-radius: 32px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.04); margin-bottom: 16px; }
        .btn-action { border-radius: 16px; font-size: 10px; font-weight: 800; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 14px 8px; transition: all 0.2s; cursor: pointer; border: 1px solid transparent; }
        .btn-action:active { transform: scale(0.95); background-color: #f1f5f9; }
        .month-header { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; color: #94a3b8; margin: 24px 8px 12px 8px; display: flex; align-items: center; gap: 10px; }
        .month-header::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 p-6">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-[800] tracking-tighter italic text-slate-900">TWINS <span class="text-blue-600">ELITE</span></h1>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Angelo Nuñez Durand</p>
            </div>
            <div class="flex flex-col items-end">
                <span id="dash-month" class="text-[10px] font-black text-blue-600 uppercase">MARZO 2026</span>
            </div>
        </div>
    </header>

    <main class="p-5 max-w-xl mx-auto pb-40">
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Cajas Totales</p>
                <h2 id="total-boxes" class="text-3xl font-black text-slate-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Items Únicos</p>
                <h2 id="total-skus" class="text-3xl font-black text-slate-800">0</h2>
            </div>
        </div>

        <div class="mb-4">
            <input type="text" id="search-input" oninput="renderView()" placeholder="Buscar en historial..." 
                class="w-full bg-white border border-slate-200 rounded-2xl py-5 px-6 text-sm font-semibold outline-none focus:ring-4 focus:ring-blue-500/5 transition-all">
        </div>

        <div id="main-content"></div>

    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw-v5b_DkMPqup6Wm4J5KfGKZq9IRs99drhBYFV-MzHa4tcyb8dSn7YRx7KTHAEj1Jp/exec";
        let master_data = JSON.parse(localStorage.getItem('twins_cache')) || [];

        const MONTH_NAMES = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];

        async function syncData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const freshData = data.historial || data;
                if (freshData.length > 0) {
                    master_data = freshData;
                    localStorage.setItem('twins_cache', JSON.stringify(master_data));
                    renderView();
                }
            } catch (e) { console.log("Silent background sync failed"); }
        }

        function renderView() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('main-content');
            
            // 1. Agrupar por Operación primero para sumar metas
            const operations = master_data.reduce((acc, curr) => {
                if(!curr.operacion) return acc;
                
                const matchesSearch = curr.operacion.toLowerCase().includes(query) || 
                                     (curr.sku && curr.sku.toLowerCase().includes(query));
                
                if(matchesSearch) {
                    if(!acc[curr.operacion]) {
                        // Extraer mes (ej: 15/03/26 -> 03)
                        const mMatch = curr.operacion.match(/\/(\d{2})\//);
                        const monthIdx = mMatch ? parseInt(mMatch[1]) - 1 : 2; // Default Marzo
                        acc[curr.operacion] = { ...curr, items: [], totalBoxes: 0, monthIdx };
                    }
                    acc[curr.operacion].items.push(curr);
                    acc[curr.operacion].totalBoxes += (Number(curr.meta) || 0);
                }
                return acc;
            }, {});

            // 2. Agrupar por Meses para el diseño
            const byMonth = Object.values(operations).reduce((acc, op) => {
                if(!acc[op.monthIdx]) acc[op.monthIdx] = [];
                acc[op.monthIdx].push(op);
                return acc;
            }, {});

            // 3. Renderizar
            let html = '';
            let globalBoxes = 0;
            let globalSkus = 0;

            // Ordenar meses descendente
            const sortedMonths = Object.keys(byMonth).sort((a,b) => b - a);

            sortedMonths.forEach(mIdx => {
                html += `<div class="month-header">${MONTH_NAMES[mIdx]}</div>`;
                
                // Ordenar contenedores dentro del mes (recientes primero)
                byMonth[mIdx].sort((a,b) => b.operacion.localeCompare(a.operacion)).forEach(op => {
                    globalBoxes += op.totalBoxes;
                    globalSkus += op.items.length;
                    
                    html += `
                        <div class="premium-card p-7">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <span class="text-[9px] font-black uppercase tracking-widest ${op.estado === 'COMPLETADO' ? 'text-green-500' : 'text-amber-500'}">
                                        ● ${op.estado || 'PENDIENTE'}
                                    </span>
                                    <h3 class="text-2xl font-[800] text-slate-800 tracking-tighter mt-1">${op.operacion}</h3>
                                </div>
                                <span class="bg-slate-900 text-white text-[8px] font-black px-3 py-1.5 rounded-xl uppercase tracking-widest">Canal ${op.canal || 'S/C'}</span>
                            </div>

                            <div class="grid grid-cols-3 gap-3">
                                <div onclick="handleEdit('${op.operacion}')" class="btn-action bg-blue-50 text-blue-600 border border-blue-100">
                                    <i class="ph-bold ph-pencil-simple text-lg"></i>CORREGIR
                                </div>
                                <div onclick="handleView('${op.operacion}')" class="btn-action bg-slate-50 text-slate-600 border border-slate-100">
                                    <i class="ph-bold ph-list-bullets text-lg"></i>LISTA
                                </div>
                                <div onclick="handlePDF('${op.operacion}')" class="btn-action bg-red-50 text-red-600 border border-red-100">
                                    <i class="ph-bold ph-file-pdf text-lg"></i>PDF
                                </div>
                            </div>
                        </div>`;
                });
            });

            container.innerHTML = html || `<div class="py-20 text-center text-slate-400 font-bold uppercase text-[10px] tracking-widest">Sin registros</div>`;
            document.getElementById('total-boxes').innerText = globalBoxes.toLocaleString();
            document.getElementById('total-skus').innerText = globalSkus.toLocaleString();
        }

        // FUNCIONES DE BOTONES
        function handleEdit(id) { console.log("Editando: " + id); }
        function handleView(id) { console.log("Viendo: " + id); }
        function handlePDF(id) { 
            const footer = "Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.";
            alert("Generando PDF para " + id + "\n\n" + footer); 
        }

        // Ejecución inicial rápida (desde memoria)
        renderView();
        // Sincronización invisible (segundo plano)
        syncData();
        setInterval(syncData, 60000);
    </script>
</body>
</html>
