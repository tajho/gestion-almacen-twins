<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v57 - Motion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; height: 100vh; overflow: hidden; margin: 0; }
        
        /* Animación de Carga Dinámica */
        .logistics-road { height: 60px; background: #f1f5f9; border-radius: 1.2rem; position: relative; overflow: hidden; border: 2px solid #e2e8f0; }
        .progress-stream { position: absolute; height: 100%; background: linear-gradient(90deg, #3b82f6, #2563eb); transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 20px rgba(37, 99, 235, 0.3); }
        
        /* El Camión con Estela */
        .truck-unit { position: absolute; top: 50%; transform: translateY(-50%); transition: left 1s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 20; display: flex; align-items: center; }
        .truck-body { background: #1e293b; color: white; padding: 4px 8px; border-radius: 6px; display: flex; gap: 4px; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .truck-trail { width: 40px; height: 2px; background: linear-gradient(90deg, transparent, #3b82f6); margin-right: -2px; opacity: 0.6; }

        /* Etapas de Descarga */
        .stage-label { position: absolute; bottom: 4px; right: 12px; font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; }

        /* Botón Inferior de Seguridad */
        .safe-footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 1.5rem; background: linear-gradient(0deg, #f8fafc 70%, transparent); z-index: 100; }
        .btn-elite { background: #1e293b; color: white; border-radius: 1.2rem; padding: 1.2rem; width: 100%; font-weight: 800; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; box-shadow: 0 10px 25px rgba(30, 41, 59, 0.2); transition: 0.3s; }
        .btn-elite:active { transform: scale(0.95); background: #000; }

        /* Buscador Moderno */
        .search-wrapper { position: relative; }
        .smart-results { position: absolute; top: 105%; left: 0; right: 0; background: white; border-radius: 1rem; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; max-h: 220px; overflow-y: auto; z-index: 200; }
        
        .view { display: none; height: 100vh; padding: 1.2rem; flex-direction: column; }
        .view.active { display: flex; }

        .input-glass { background: #fff; border: 2px solid #e2e8f0; border-radius: 1rem; padding: 1rem; width: 100%; font-weight: 700; outline: none; transition: 0.3s; }
        .input-glass:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body>

    <header class="h-20 px-6 flex justify-between items-center border-b bg-white/50 backdrop-blur-lg">
        <div>
            <p class="text-[8px] font-black text-blue-600 uppercase tracking-[0.3em]">Logistics System</p>
            <h1 class="text-xl font-black italic uppercase">TAJHO<span class="text-slate-400">.OS</span></h1>
        </div>
        <button onclick="goHome()" class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-500"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></button>
    </header>

    <div id="view-home" class="view active">
        <div class="mt-4 mb-8">
            <h2 class="text-3xl font-black text-slate-900 leading-tight">Panel de<br><span class="text-blue-600 uppercase">Operaciones</span></h2>
        </div>

        <div class="grid gap-4">
            <div onclick="navTo('crear')" class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm flex items-center gap-4 active:scale-95 transition-all">
                <div class="w-12 h-12 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg></div>
                <div><h3 class="font-black text-slate-800 uppercase text-sm">Iniciar Descarga</h3><p class="text-[9px] font-bold text-slate-400">NUEVA CARGA DE CONTENEDOR</p></div>
            </div>
        </div>
    </div>

    <div id="view-crear" class="view">
        <h2 class="text-xl font-black italic mb-4">Módulo de <span class="text-blue-600 uppercase">Setup</span></h2>
        
        <div class="bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-sm space-y-3 mb-4">
            <div class="search-wrapper">
                <input type="text" id="s-sku" oninput="smartSearch()" class="input-glass" placeholder="SKU o Descripción del producto">
                <div id="smart-results" class="smart-results hidden"></div>
            </div>
            <div class="flex gap-2">
                <input type="number" id="s-meta" class="input-glass flex-1" placeholder="Meta">
                <button onclick="addMani()" class="w-14 h-14 bg-blue-600 text-white rounded-xl flex items-center justify-center shadow-lg active:scale-90"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg></button>
            </div>
        </div>

        <div class="flex-grow overflow-y-auto pb-32">
            <div id="pre-list" class="space-y-2"></div>
        </div>

        <div class="safe-footer">
            <button id="btn-start" onclick="openModal()" class="btn-elite hidden">Confirmar Manifiesto</button>
        </div>
    </div>

    <div id="view-ops" class="view">
        <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm mb-6">
            <div class="flex justify-between items-end mb-3">
                <span id="status-text" class="text-[10px] font-black text-blue-600 uppercase italic">Esperando inicio...</span>
                <span id="global-pc" class="text-2xl font-black text-slate-900 leading-none">0%</span>
            </div>
            
            <div class="logistics-road">
                <div id="truck-fill" class="progress-stream" style="width: 0%"></div>
                <div id="truck-unit" class="truck-unit" style="left: 0%">
                    <div class="truck-trail"></div>
                    <div class="truck-body">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>
                        <span class="text-[8px] font-black italic uppercase">Tajho</span>
                    </div>
                </div>
                <span id="stage-label" class="stage-label">Fase 1: Apertura</span>
            </div>
        </div>

        <div class="text-center mb-6">
            <select id="sel-sku" onchange="syncItem()" class="text-2xl font-black bg-transparent border-none w-full text-center outline-none italic uppercase text-slate-900"></select>
            <p id="live-desc" class="text-[9px] font-bold text-slate-400 uppercase truncate px-8"></p>
        </div>

        <div class="flex flex-col gap-6 flex-grow justify-center pb-24">
            <div class="flex items-center justify-center gap-4">
                <input type="number" id="qty-in" class="input-glass w-32 h-20 text-center text-4xl border-2 shadow-inner" placeholder="0">
                <button onclick="registrarBulto()" class="w-20 h-20 bg-blue-600 text-white rounded-3xl flex items-center justify-center shadow-xl active:scale-75 transition-all"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg></button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-3xl border border-slate-100 text-center">
                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Restante</p>
                    <p id="live-rem" class="text-2xl font-black">0</p>
                </div>
                <div class="bg-slate-900 p-5 rounded-3xl text-center shadow-lg">
                    <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1">Total Real</p>
                    <p id="live-real" class="text-2xl font-black text-white">0</p>
                </div>
            </div>
        </div>

        <div class="safe-footer">
            <button onclick="finishAndReport()" class="btn-elite">Cerrar y Generar PDF</button>
        </div>
    </div>

    <div id="modal-choice" class="fixed inset-0 z-[500] bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center p-8">
        <div class="bg-white w-full rounded-[2.5rem] p-8 text-center shadow-2xl animate-bounce-short">
            <h3 class="text-xl font-black italic mb-6">¿INICIAR DESCARGA?</h3>
            <div class="flex flex-col gap-3">
                <button onclick="continuarConteo()" class="btn-elite">Comenzar ahora</button>
                <button onclick="closeModal()" class="text-[10px] font-black text-slate-300 uppercase mt-4">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_items = {};
        let currentMani = JSON.parse(localStorage.getItem('taj_cur')) || [];
        let activeJob = JSON.parse(localStorage.getItem('taj_active')) || null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                const raw = await res.json();
                raw.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().toUpperCase().trim()] = r.DESCRIPCION; });
                navTo('home');
            } catch (e) { console.warn("Offline"); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'crear') renderPreList();
        }

        function goHome() { navTo('home'); }

        function smartSearch() {
            const input = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('smart-results');
            if(input.length < 2) { resDiv.classList.add('hidden'); return; }

            const matches = Object.keys(db_items).filter(sku => {
                const desc = db_items[sku].toUpperCase();
                return sku.includes(input) || desc.includes(input);
            }).slice(0, 10);

            resDiv.innerHTML = matches.map(sku => `
                <div onclick="setProd('${sku}')" class="p-4 border-b border-slate-50 flex flex-col">
                    <span class="text-[11px] font-black text-blue-600">${sku}</span>
                    <span class="text-[9px] font-bold text-slate-400 uppercase truncate">${db_items[sku]}</span>
                </div>
            `).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(sku) {
            document.getElementById('s-sku').value = sku;
            document.getElementById('smart-results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "GENERICO", meta, real: 0 });
            localStorage.setItem('taj_cur', JSON.stringify(currentMani));
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderPreList() {
            const container = document.getElementById('pre-list');
            container.innerHTML = currentMani.map(i => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm border-l-4 border-blue-600">
                    <p class="text-[11px] font-black uppercase italic">${i.sku}</p>
                    <p class="text-[11px] font-black text-blue-600">${i.meta} CJ</p>
                </div>
            `).join('');
            if(currentMani.length > 0) document.getElementById('btn-start').classList.remove('hidden');
        }

        function openModal() { document.getElementById('modal-choice').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-choice').style.display = 'none'; }

        function continuarConteo() {
            closeModal();
            activeJob = { id: Date.now(), name: "OP-" + new Date().getHours() + new Date().getMinutes(), items: [...currentMani] };
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
            currentMani = []; localStorage.removeItem('taj_cur');
            startOps(activeJob);
        }

        function startOps(job) {
            navTo('ops');
            document.getElementById('sel-sku').innerHTML = job.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem();
        }

        function syncItem() {
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('live-desc').innerText = item.desc;
            document.getElementById('live-rem').innerText = Math.max(0, item.meta - item.real);
            document.getElementById('live-real').innerText = item.real;

            const totalM = activeJob.items.reduce((a,b) => a + b.meta, 0);
            const totalR = activeJob.items.reduce((a,b) => a + b.real, 0);
            const pc = Math.min(Math.round((totalR / totalM) * 100), 100);
            
            // Lógica de la Barra Dinámica
            const fill = document.getElementById('truck-fill');
            const truck = document.getElementById('truck-unit');
            const statusText = document.getElementById('status-text');
            const stageLabel = document.getElementById('stage-label');

            fill.style.width = pc + "%";
            truck.style.left = `calc(${pc}% - 25px)`;
            document.getElementById('global-pc').innerText = pc + "%";

            if(pc < 30) {
                statusText.innerText = "Descarga Iniciada";
                stageLabel.innerText = "Fase 1: Apertura";
                fill.style.background = "#3b82f6";
            } else if(pc < 70) {
                statusText.innerText = "En Proceso Fluido";
                stageLabel.innerText = "Fase 2: Intermedia";
                fill.style.background = "#2563eb";
            } else if(pc < 100) {
                statusText.innerText = "Cierre de Contenedor";
                stageLabel.innerText = "Fase 3: Crítica";
                fill.style.background = "#1e293b";
            } else {
                statusText.innerText = "Descarga Completada";
                stageLabel.innerText = "Fase Final: Verificado";
                fill.style.background = "#16a34a";
            }

            localStorage.setItem('taj_active', JSON.stringify(activeJob));
        }

        function registrarBulto() {
            const q = parseInt(document.getElementById('qty-in').value);
            if(!q) return;
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += q;
            document.getElementById('qty-in').value = '';
            syncItem();
            navigator.vibrate(20);
            fetch(CLOUD_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({tipo:'CARGA', datos: [new Date().toLocaleString(), item.sku, q]})});
        }

        function finishAndReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(14); doc.setFont("helvetica", "bold");
            doc.text("REPORTE OPERATIVO - TAJHO.OS", 14, 20);
            doc.autoTable({
                startY: 25, head: [['SKU', 'META', 'REAL', 'DIF']],
                body: activeJob.items.map(i => [i.sku, i.meta, i.real, i.meta-i.real]),
                theme: 'striped', headStyles: { fillColor: [30, 41, 59] }
            });
            doc.setFontSize(9);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 12);
            doc.save(`TAJHO_${activeJob.name}.pdf`);
            localStorage.removeItem('taj_active');
            navTo('home');
        }

        init();
    </script>
</body>
</html>
