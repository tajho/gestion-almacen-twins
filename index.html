<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWINS Warehouse Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; --accent: #ef4444; --bg: #f8fafc; }
        body { background-color: var(--bg); font-family: 'Inter', system-ui, sans-serif; }
        .glass-nav { background: var(--primary); color: white; border-radius: 0 0 25px 25px; padding: 20px; }
        .tab-card { border: none; border-radius: 20px; transition: all 0.3s ease; display: none; }
        .active-tab { display: block; animation: fadeIn 0.5s; }
        .nav-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 20px; border-radius: 12px; font-size: 0.9rem; }
        .nav-btn.active { background: white; color: var(--primary); font-weight: bold; }
        .input-group-text { background: white; border-right: none; }
        .form-control { border-left: none; border-radius: 0 12px 12px 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="glass-nav shadow-lg mb-4">
        <div class="container text-center">
            <h4 class="fw-bold mb-3"><i class="fas fa-boxes-stacked"></i> TWINS HUB</h4>
            <div class="d-flex justify-content-center gap-2">
                <button class="nav-btn active" id="btn-p" onclick="switchTab('p')"><i class="fas fa-truck-loading"></i> SALIDAS</button>
                <button class="nav-btn" id="btn-d" onclick="switchTab('d')"><i class="fas fa-undo"></i> DEVOLUCIÓN</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="tab-p" class="tab-card active-tab card p-4 shadow-sm">
            <h5 class="fw-bold text-primary mb-4">Registrar Salida Pendiente</h5>
            
            <label class="small fw-bold mb-2">DESTINO / CANAL</label>
            <div class="d-flex gap-2 mb-4">
                <input type="radio" class="btn-check" name="tipo" id="mkt" value="MARKETING" checked>
                <label class="btn btn-outline-primary w-100" for="mkt">MARKETING</label>
                <input type="radio" class="btn-check" name="tipo" id="oficina" value="OFICINA">
                <label class="btn btn-outline-primary w-100" for="oficina">OFICINA</label>
                <input type="radio" class="btn-check" name="tipo" id="ventas" value="VENDEDOR">
                <label class="btn btn-outline-primary w-100" for="ventas">VENDEDOR</label>
            </div>

            <label class="small fw-bold">SKU PRODUCTO</label>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-search text-muted"></i></span>
                <input type="text" id="sku" class="form-control" placeholder="Escriba SKU..." oninput="intelliSearch()">
            </div>

            <div class="bg-light p-3 rounded-4 mb-3 border border-dashed text-center">
                <span id="desc-display" class="fw-bold text-dark">Esperando SKU...</span>
            </div>

            <div class="row g-3">
                <div class="col-6">
                    <label class="small fw-bold">CANTIDAD</label>
                    <input type="number" id="cant" class="form-control p-3 rounded-3" placeholder="0">
                </div>
                <div class="col-6">
                    <label class="small fw-bold">SOLICITANTE</label>
                    <input type="text" id="quien" class="form-control p-3 rounded-3" placeholder="Nombre">
                </div>
            </div>

            <button class="btn btn-primary btn-lg w-100 mt-4 shadow-sm fw-bold" onclick="enviarPedido()">
                <i class="fas fa-save"></i> REGISTRAR SALIDA
            </button>
        </div>

        <div id="tab-d" class="tab-card card p-4 shadow-sm">
            <h5 class="fw-bold text-danger mb-4">Reporte de Devolución</h5>
            
            <div class="mb-3">
                <label class="small fw-bold">CLIENTE O ORIGEN</label>
                <input type="text" id="dev_cli" class="form-control p-3 rounded-3" placeholder="¿Quién devuelve?">
            </div>
            <div class="mb-3">
                <label class="small fw-bold">PRODUCTO / SKU</label>
                <input type="text" id="dev_prod" class="form-control p-3 rounded-3" placeholder="Detalles del producto">
            </div>
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="small fw-bold">CANTIDAD</label>
                    <input type="number" id="dev_cant" class="form-control p-3 rounded-3">
                </div>
                <div class="col-6">
                    <label class="small fw-bold">ESTADO</label>
                    <select id="dev_mot" class="form-select p-3 rounded-3">
                        <option>Mal estado</option>
                        <option>Error despacho</option>
                        <option>No solicitado</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-danger btn-lg w-100 mt-3 fw-bold" onclick="enviarDev()">
                <i class="fas fa-file-export"></i> GENERAR REPORTE
            </button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwAKMR_Sj3Pw2yglrHSg8L_KUVXWZGVA4bnJHH5vJocgmYGqSPDmR1wXH7xzrUPXTy8Aw/exec"; // REEMPLAZA ESTO

        function switchTab(t) {
            document.querySelectorAll('.tab-card').forEach(c => c.classList.remove('active-tab'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active-tab');
            document.getElementById('btn-'+t).classList.add('active');
        }

        async function intelliSearch() {
            const sku = document.getElementById('sku').value;
            if(sku.length < 5) return;
            const res = await fetch(WEB_APP_URL, {method: "POST", body: JSON.stringify({action:"buscar", sku: sku})});
            const data = await res.json();
            document.getElementById('desc-display').innerText = data.desc;
            document.getElementById('desc-display').className = data.found ? "fw-bold text-primary" : "fw-bold text-danger";
        }

        async function enviarPedido() {
            const d = {
                action: "pedido",
                tipo: document.querySelector('input[name="tipo"]:checked').value,
                sku: document.getElementById('sku').value,
                desc: document.getElementById('desc-display').innerText,
                cant: document.getElementById('cant').value,
                quien: document.getElementById('quien').value
            };
            if(!d.cant || d.desc.includes("NO")) return Swal.fire("Atención", "SKU inválido o falta cantidad", "warning");
            
            Swal.fire({title: 'Guardando...', allowOutsideClick:false, didOpen:()=>Swal.showLoading()});
            await fetch(WEB_APP_URL, {method: "POST", body: JSON.stringify(d)});
            Swal.fire("Éxito", "Guardado para SAP", "success");
            limpiar();
        }

        async function enviarDev() {
            const d = {
                action: "devolucion",
                cliente: document.getElementById('dev_cli').value,
                prod: document.getElementById('dev_prod').value,
                cant: document.getElementById('dev_cant').value,
                motivo: document.getElementById('dev_mot').value
            };
            await fetch(WEB_APP_URL, {method: "POST", body: JSON.stringify(d)});
            Swal.fire("Reporte Creado", "Historial de devolución actualizado", "info");
            limpiar();
        }

        function limpiar() {
            document.querySelectorAll('input').forEach(i => i.value = '');
            document.getElementById('desc-display').innerText = "Esperando SKU...";
        }
    </script>
</body>
</html>
