<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN ELITE | Gestión de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root { --bg: #0A0C10; --card: #12151E; --accent: #00D1FF; --border: #1E2430; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; margin: 0; padding-bottom: 90px; }
        
        .header-app { background: var(--card); padding: 15px 20px; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .status-dot { font-size: 10px; font-weight: 700; text-transform: uppercase; }
        
        .titan-card { background: var(--card); border-radius: 12px; padding: 20px; margin: 15px; border: 1px solid var(--border); }
        .label-audit { font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 8px; display: block; }
        
        .titan-input { background: #080A0F; border: 1px solid var(--border); border-radius: 8px; padding: 12px; width: 100%; color: #fff; margin-bottom: 12px; }
        .titan-input:focus { border-color: var(--accent); outline: none; }

        /* Buscador Flotante Corregido */
        .search-wrapper { position: relative; }
        .search-results { 
            position: absolute; width: 100%; background: #1A1F2B; border: 1px solid var(--accent); 
            border-radius: 0 0 8px 8px; z-index: 2000; max-height: 200px; overflow-y: auto; display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .search-item { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; cursor: pointer; }
        .search-item:hover { background: var(--accent); color: #000; }

        .btn-action { border-radius: 8px; padding: 14px; font-weight: 800; border: none; width: 100%; background: var(--accent); color: #000; text-transform: uppercase; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); }
        .nav-item { background: none; border: none; color: #5F6B7A; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .view { display: none; } .view-active { display: block; }
    </style>
</head>
<body>

    <header class="header-app d-flex justify-content-between align-items-center">
        <div><h1 style="font-size: 16px; font-weight: 900; margin:0; color:var(--accent)">TAJHO | TITAN</h1></div>
        <div id="conn-status" class="status-dot text-danger">● SIN CONEXIÓN</div>
    </header>

    <main>
        <section id="v-ret" class="view view-active">
            <div class="titan-card">
                <span class="label-audit">AUDITORÍA DE RETORNO</span>
                <input type="text" id="cli-r" class="titan-input" placeholder="Cliente Origen">
                
                <div class="search-wrapper">
                    <span class="label-audit">PRODUCTO DEVUELTO</span>
                    <input type="text" id="prod-r" class="titan-input" placeholder="SKU o Nombre..." oninput="findProduct(this.value, 'r')">
                    <div id="res-r" class="search-results"></div>
                </div>

                <div class="row g-2">
                    <div class="col-6"><span class="label-audit">CANT. GUÍA</span><input type="number" id="qg-r" class="titan-input"></div>
                    <div class="col-6"><span class="label-audit">CANT. REAL</span><input type="number" id="qr-r" class="titan-input"></div>
                </div>

                <span class="label-audit">ESTADO QC</span>
                <select id="st-r" class="titan-input">
                    <option value="ESTADO ÓPTIMO">ESTADO ÓPTIMO</option>
                    <option value="FALLA DE FÁBRICA">FALLA DE FÁBRICA</option>
                    <option value="DAÑO POR TRANSPORTE">DAÑO POR TRANSPORTE</option>
                </select>

                <span class="label-audit"><i class="fas fa-pencil-alt"></i> OBSERVACIONES</span>
                <textarea id="obs-r" class="titan-input" style="height: 80px;"></textarea>
                
                <button class="btn-action" onclick="saveItem('r')">REGISTRAR AUDITORÍA</button>
            </div>
        </section>

        <section id="v-del" class="view">
            <div class="titan-card">
                <span class="label-audit">GESTIÓN DE ENTREGA</span>
                <input type="text" id="cli-d" class="titan-input" placeholder="Cliente">
                <div class="search-wrapper">
                    <span class="label-audit">BUSCAR PRODUCTO</span>
                    <input type="text" id="prod-d" class="titan-input" placeholder="SKU o Nombre..." oninput="findProduct(this.value, 'd')">
                    <div id="res-d" class="search-results"></div>
                </div>
                <input type="number" id="qty-d" class="titan-input" placeholder="Cantidad">
                <button class="btn-action" onclick="saveItem('d')">AÑADIR A CARGA</button>
            </div>
        </section>

        <section id="v-his" class="view">
            <div id="history-container"></div>
        </section>
    </main>

    <nav class="nav-bar">
        <button class="nav-item" onclick="showView('del', this)"><i class="fas fa-box"></i>ENTREGA</button>
        <button class="nav-item active" onclick="showView('ret', this)"><i class="fas fa-undo"></i>RETORNO</button>
        <button class="nav-item" onclick="showView('his', this)"><i class="fas fa-history"></i>HISTORIAL</button>
    </nav>

    <script>
        // PEGA TU ENLACE CSV AQUÍ
        const EXCEL_CSV_URL = 'TU_URL_DE_GOOGLE_SHEETS_AQUÍ';
        let INVENTARIO = [];

        function connectExcel() {
            Papa.parse(EXCEL_CSV_URL, {
                download: true, header: true,
                complete: (results) => {
                    INVENTARIO = results.data;
                    const status = document.getElementById('conn-status');
                    status.innerHTML = "● SINCRONIZADO";
                    status.className = "status-dot text-success";
                },
                error: () => {
                    console.log("Error al conectar Excel");
                }
            });
        }
        window.onload = connectExcel;

        function findProduct(val, type) {
            const resultsBox = document.getElementById(`res-${type}`);
            if (val.length < 2) { resultsBox.style.display = 'none'; return; }

            // Filtrado inteligente por SKU o Nombre
            const matches = INVENTARIO.filter(p => 
                (p.SKU && p.SKU.toLowerCase().includes(val.toLowerCase())) || 
                (p.NOMBRE && p.NOMBRE.toLowerCase().includes(val.toLowerCase()))
            );

            if (matches.length > 0) {
                resultsBox.style.display = 'block';
                resultsBox.innerHTML = matches.slice(0, 8).map(p => `
                    <div class="search-item" onclick="selectProduct('${p.SKU}', '${p.NOMBRE}', '${type}')">
                        <b>${p.SKU}</b> - ${p.NOMBRE}
                    </div>
                `).join('');
            } else {
                resultsBox.style.display = 'none';
            }
        }

        function selectProduct(sku, name, type) {
            document.getElementById(`prod-${type}`).value = `${sku} | ${name}`;
            document.getElementById(`res-${type}`).style.display = 'none';
        }

        function saveItem(type) {
            Swal.fire('Guardado', 'El registro se añadió al historial', 'success');
            // Aquí iría tu lógica de guardado en LocalStorage
        }

        function showView(viewId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('v-' + viewId).classList.add('view-active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
