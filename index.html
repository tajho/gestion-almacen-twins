<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v41 | AIR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --apple-blue: #0071e3; --bg: #f5f5f7; }
        body { font-family: 'SF Pro Display', 'Inter', sans-serif; background: var(--bg); color: #1d1d1f; overflow: hidden; height: 100vh; -webkit-font-smoothing: antialiased; }
        
        /* DISEÑO ESTILO APPLE: FROST & RADIUS */
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3); }
        .squircle { border-radius: 2rem; }
        .btn-apple { background: var(--apple-blue); border-radius: 1.2rem; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-apple:active { transform: scale(0.96); opacity: 0.9; }
        
        /* NAVEGACIÓN */
        #landing { position: fixed; inset: 0; z-index: 1000; background: var(--bg); padding: 3rem 2rem; display: flex; flex-direction: column; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .hide-landing { opacity: 0; transform: scale(1.1); pointer-events: none; }
        
        .view { display: none; height: calc(100vh - 100px); overflow-y: auto; padding: 1.2rem; }
        .view.active { display: block; animation: viewAppear 0.5s ease; }
        @keyframes viewAppear { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* INPUTS LIMPIOS */
        .input-air { background: white; border-radius: 1rem; border: 1px solid #d2d2d7; padding: 1rem 1.2rem; font-size: 1rem; font-weight: 500; transition: border-color 0.3s; width: 100%; }
        .input-air:focus { border-color: var(--apple-blue); outline: none; }

        /* BARRAS SUTILES */
        .progress-track { width: 100%; height: 6px; background: #e8e8ed; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--apple-blue); transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body>

    <div id="landing">
        <header class="mb-auto">
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Buen día</p>
            <h1 class="text-5xl font-bold tracking-tight text-slate-900 leading-tight">¿Qué hacemos<br><span class="text-blue-600">hoy, Tajho?</span></h1>
        </header>

        <div class="space-y-4 mb-10">
            <button onclick="navTo('contenedor')" class="glass squircle w-full p-7 flex items-center justify-between shadow-sm active:bg-white/50 transition-all">
                <div class="flex items-center gap-5">
                    <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
                    </div>
                    <div class="text-left"><p class="font-bold text-lg">Contenedor</p><p class="text-xs text-slate-400">Iniciar nueva carga</p></div>
                </div>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d2d2d7" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
            </button>

            <button onclick="navTo('historial')" class="glass squircle w-full p-7 flex items-center justify-between shadow-sm active:bg-white/50 transition-all">
                <div class="flex items-center gap-5">
                    <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20v-6M9 20V10M15 20V4"/></svg>
                    </div>
                    <div class="text-left"><p class="font-bold text-lg">Historial</p><p class="text-xs text-slate-400">Pendientes y reportes</p></div>
                </div>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d2d2d7" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </div>
    </div>

    <header class="h-20 px-6 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200/50">
        <button onclick="navTo('landing')" class="text-blue-600 font-semibold text-sm flex items-center gap-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg>
            Inicio
        </button>
        <div id="nav-monitor" class="hidden flex-1 px-8">
            <div class="progress-track"><div id="main-bar" class="progress-bar" style="width: 0%"></div></div>
            <p id="timer" class="text-[9px] font-bold text-center mt-1 text-slate-400 tracking-widest">00:00:00</p>
        </div>
        <div class="w-10 text-right font-black italic text-[10px] text-blue-600">T.OS</div>
    </header>

    <main>
        <div id="view-contenedor" class="view">
            <div class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-2 tracking-widest">General</label>
                    <input type="text" id="c-name" class="input-air" placeholder="ID Contenedor / Placa">
                </div>
                <div class="relative space-y-2">
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-2 tracking-widest">Búsqueda</label>
                    <input type="text" id="s-sku" oninput="airSearch()" class="input-air" placeholder="SKU o Producto" autocomplete="off">
                    <div id="search-results" class="hidden absolute z-50 w-full bg-white/95 backdrop-blur-xl mt-2 rounded-2xl shadow-2xl border border-slate-200 max-h-56 overflow-y-auto"></div>
                </div>
                <div class="bg-blue-50/50 p-4 rounded-xl">
                    <p id="s-desc" class="text-[11px] font-semibold text-blue-600 text-center uppercase h-4"></p>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-2 tracking-widest">Meta</label>
                    <input type="number" id="s-meta" class="input-air text-center text-xl" placeholder="0">
                </div>
                <button onclick="addItem()" class="w-full btn-apple text-white py-4 font-bold text-sm shadow-lg shadow-blue-200">Añadir ítem</button>
            </div>
            
            <div id="pre-list" class="mt-8 space-y-2"></div>
            <button id="btn-save" onclick="saveContenedor()" class="hidden w-full bg-slate-900 text-white py-5 squircle font-bold text-sm mt-6 shadow-xl active:scale-95 transition-all">Confirmar Contenedor</button>
        </div>

        <div id="view-historial" class="view space-y-4">
            <h2 class="text-3xl font-bold tracking-tight px-2">En espera</h2>
            <div id="history-list" class="space-y-3"></div>
        </div>

        <div id="view-ops" class="view">
            <div class="glass squircle p-8 space-y-8 text-center border-none shadow-xl">
                <div>
                    <select id="sel-sku" onchange="syncItem()" class="text-4xl font-bold bg-transparent w-full text-center outline-none tracking-tighter text-slate-900"></select>
                    <p id="ops-desc" class="text-[11px] font-medium text-slate-400 uppercase mt-2"></p>
                </div>
                
                <div class="space-y-3">
                    <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
                        <span>Progreso ítem</span>
                        <span id="item-pc" class="text-blue-600">0%</span>
                    </div>
                    <div class="progress-track"><div id="item-bar" class="progress-bar" style="width: 0%"></div></div>
                </div>

                <div class="flex items-center justify-center gap-6 py-4">
                    <input type="number" id="qty-in" class="w-28 text-5xl font-bold bg-transparent text-center outline-none border-b-2 border-slate-200 focus:border-blue-600 pb-2" placeholder="0">
                    <button onclick="doQty()" class="w-20 h-20 btn-apple text-white flex items-center justify-center shadow-xl shadow-blue-100">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-6 border-t border-slate-100">
                    <div><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Faltan</p><p id="txt-rem" class="text-2xl font-bold">0</p></div>
                    <div><p class="text-[10px] font-bold text-blue-500 uppercase mb-1">Cargados</p><p id="txt-real" class="text-2xl font-bold text-blue-600">0</p></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db = []; let history = []; let draft = []; let active = null; let tSec = 0; let tInt;

        window.onbeforeunload = () => (draft.length > 0 || active) ? "¿Salir sin guardar?" : null;

        async function init() { try { const r = await fetch(CLOUD_URL); db = await r.json(); } catch(e) {} }
        
        function navTo(v) {
            if(v === 'landing') { document.getElementById('landing').classList.remove('hide-landing'); return; }
            document.getElementById('landing').classList.add('hide-landing');
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            if(v === 'historial') renderHistory();
            init();
        }

        function airSearch() {
            const val = document.getElementById('s-sku').value.toUpperCase();
            const res = document.getElementById('search-results');
            if(val.length < 2) { res.classList.add('hidden'); return; }
            const matches = db.filter(i => String(i.CODIGO).includes(val) || String(i.DESCRIPCION).includes(val)).slice(0, 6);
            res.innerHTML = matches.map(m => `<div onclick="setS('${m.CODIGO}','${m.DESCRIPCION}')" class="p-5 border-b border-slate-100 active:bg-slate-50 font-semibold text-sm uppercase">${m.CODIGO} <span class="text-slate-400 font-normal ml-2">— ${m.DESCRIPCION}</span></div>`).join('');
            res.classList.remove('hidden');
        }

        function setS(c,d) { 
            document.getElementById('s-sku').value=c; 
            document.getElementById('s-desc').innerText=d; 
            document.getElementById('search-results').classList.add('hidden'); 
            document.getElementById('s-meta').focus();
        }

        function addItem() {
            const sku = document.getElementById('s-sku').value; const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            draft.push({sku, desc: document.getElementById('s-desc').innerText, meta, real: 0});
            document.getElementById('pre-list').innerHTML += `<div class="p-4 bg-white rounded-xl shadow-sm border border-slate-100 flex justify-between items-center font-bold text-sm"><span>${sku}</span><span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-xs">${meta}</span></div>`;
            document.getElementById('btn-save').classList.remove('hidden');
            document.getElementById('s-sku').value=''; document.getElementById('s-desc').innerText=''; document.getElementById('s-meta').value='';
        }

        function saveContenedor() {
            const name = document.getElementById('c-name').value || "ID " + Date.now().toString().slice(-4);
            history.push({id: Date.now(), name, items: [...draft], status: 'PENDIENTE'});
            draft = []; document.getElementById('pre-list').innerHTML = ''; document.getElementById('btn-save').classList.add('hidden');
            navTo('historial');
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="glass p-6 rounded-3xl flex justify-between items-center shadow-sm">
                    <div><p class="text-[9px] font-bold text-blue-500 mb-1 tracking-widest uppercase">${h.status}</p><h3 class="font-bold text-lg">${h.name}</h3></div>
                    <button onclick="startOps(${h.id})" class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center active:scale-90 transition-all"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
                </div>
            `).join('');
        }

        function startOps(id) {
            if(!confirm("¿Iniciar conteo oficial?")) return;
            active = history.find(h => h.id === id); active.status = 'EN CURSO';
            navTo('ops');
            document.getElementById('nav-monitor').classList.remove('hidden');
            document.getElementById('sel-sku').innerHTML = active.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem(); startT();
        }

        function syncItem() {
            const item = active.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('ops-desc').innerText = item.desc;
            document.getElementById('txt-rem').innerText = item.meta - item.real;
            document.getElementById('txt-real').innerText = item.real;
            const itemPc = Math.floor((item.real/item.meta)*100) || 0;
            document.getElementById('item-bar').style.width = itemPc + "%";
            document.getElementById('item-pc').innerText = itemPc + "%";
            const tM = active.items.reduce((a,b) => a+b.meta,0); const tR = active.items.reduce((a,b) => a+b.real,0);
            document.getElementById('main-bar').style.width = (Math.floor((tR/tM)*100) || 0) + "%";
        }

        function doQty() {
            const q = parseInt(document.getElementById('qty-in').value); if(!q) return;
            const item = active.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += q; document.getElementById('qty-in').value = ''; syncItem();
            navigator.vibrate(20);
            fetch(CLOUD_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({tipo:'CARGA', datos:[active.name, item.sku, q]})});
        }

        function startT() {
            if(tInt) clearInterval(tInt);
            tInt = setInterval(() => {
                tSec++; let h=Math.floor(tSec/3600), m=Math.floor((tSec%3600)/60), s=tSec%60;
                document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }

        init();
    </script>
</body>
</html>
