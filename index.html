<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajho.OS v13 - Max Density</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #0f172a; overflow: hidden; height: 100vh; font-size: 14px; }
        
        .content-area { height: calc(100vh - 120px); overflow-y: auto; padding-bottom: env(safe-area-inset-bottom); }
        .glass-card { background: white; border-radius: 1.25rem; border: 1px solid #e2e8f0; box-shadow: 0 2px 10px -3px rgba(0,0,0,0.05); }
        
        /* Input Inteligente: Menos altura, más ancho */
        .input-compact { @apply bg-slate-100 border-none rounded-xl p-3 text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none w-full; }
        
        /* Animación de entrada */
        .fade-up { animation: slideUp 0.25s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar invisible para estética pro */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .active-tab { color: #2563eb !important; border-top: 3px solid #2563eb; }
    </style>
</head>
<body class="flex flex-col">

    <header class="px-5 py-3 flex justify-between items-center bg-white border-b border-slate-100 shrink-0">
        <h1 class="text-lg font-black tracking-tighter uppercase leading-none">Tajho<span class="text-blue-600">.OS</span></h1>
        <div class="flex items-center gap-3">
            <div id="timer-box" class="flex items-center gap-1.5 bg-slate-900 px-3 py-1 rounded-full shadow-lg shadow-slate-200">
                <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></div>
                <span id="timer-val" class="text-[10px] font-mono font-black text-white">00:00:00</span>
            </div>
        </div>
    </header>

    <main class="content-area no-scrollbar">
        
        <section id="tab-recepcion" class="tab-content p-4 space-y-3 block">
            
            <div id="stats-panel" class="hidden fade-up">
                <div class="bg-blue-600 rounded-2xl p-4 text-white flex justify-between items-center shadow-lg shadow-blue-100">
                    <div>
                        <p class="text-[8px] font-black uppercase opacity-70">Progreso</p>
                        <h2 id="global-perc" class="text-2xl font-black italic">0%</h2>
                    </div>
                    <div class="flex-1 px-6">
                        <div class="h-1.5 bg-blue-800/50 rounded-full overflow-hidden">
                            <div id="global-bar" class="h-full bg-white duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="text-right">
                        <p id="global-counter" class="text-xs font-bold font-mono">0/0</p>
                        <p class="text-[7px] font-black uppercase opacity-70">Cajas</p>
                    </div>
                </div>
            </div>

            <div id="config-card" class="glass-card p-4 space-y-3">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Configuración Rápida</p>
                <div class="flex gap-2">
                    <input type="text" id="in-cod" placeholder="CÓDIGO" class="input-compact flex-[2] uppercase text-center">
                    <input type="number" id="in-meta" placeholder="CANT" class="input-compact flex-1 text-center">
                    <button onclick="addPackingItem()" class="bg-blue-600 text-white w-12 h-11 rounded-xl font-bold text-xl">+</button>
                </div>
                
                <div id="mini-list" class="flex flex-wrap gap-1.5"></div>
                
                <button id="btn-start-ops" onclick="startOperations()" class="hidden w-full bg-slate-900 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-xl">Abrir Contenedor</button>
            </div>

            <div id="ops-panel" class="hidden space-y-3 fade-up">
                <div class="glass-card p-4 flex items-center gap-3 border-2 border-blue-50">
                    <div class="flex-1">
                        <p class="text-[8px] font-black text-slate-400 uppercase ml-1">Producto</p>
                        <select id="op-select" class="w-full bg-transparent font-black text-slate-800 text-base outline-none truncate"></select>
                    </div>
                    <div class="w-24">
                        <p class="text-[8px] font-black text-slate-400 uppercase ml-1">Cant.</p>
                        <input type="number" id="op-input" placeholder="0" class="w-full text-2xl font-black text-blue-600 bg-slate-50 rounded-lg p-1 text-center outline-none border border-slate-100">
                    </div>
                    <button onclick="submitCount()" class="bg-blue-600 text-white p-4 rounded-xl font-bold">Sumar</button>
                </div>

                <div id="items-grid" class="grid grid-cols-2 gap-2 pb-4"></div>
                
                <button onclick="closeContainerReport()" class="w-full py-3 text-slate-400 font-bold text-[8px] uppercase border border-slate-200 rounded-xl">Finalizar Operación</button>
            </div>
        </section>

        <section id="tab-devolucion" class="tab-content p-4 space-y-3 hidden">
            <div class="glass-card p-5 space-y-3">
                <input type="text" id="dev-cli" placeholder="Vendedor / Cliente" class="input-compact">
                <div class="flex gap-2">
                    <input type="text" id="dev-sku" placeholder="Código" class="input-compact uppercase text-center">
                    <input type="number" id="dev-qty" placeholder="Cant" class="input-compact text-center">
                </div>
                <textarea id="dev-note" placeholder="Motivo del retorno..." class="input-compact h-20"></textarea>
                <button onclick="saveDevolution()" class="w-full bg-orange-600 text-white py-4 rounded-xl font-black text-[10px] uppercase">Registrar Devolución</button>
            </div>
        </section>

        <section id="tab-historial" class="tab-content p-4 space-y-3 hidden">
            <input type="text" id="hist-search" oninput="filterHistory()" placeholder="🔍 Buscar por código o ID..." class="input-compact shadow-sm">
            <div id="hist-container" class="space-y-2"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-100 h-16 flex justify-around items-center z-50">
        <button onclick="switchTab('tab-recepcion', this)" class="flex flex-col items-center flex-1 py-2 active-tab">
            <span class="text-lg">📥</span>
            <span class="text-[7px] font-black uppercase mt-1">Carga</span>
        </button>
        <button onclick="switchTab('tab-devolucion', this)" class="flex flex-col items-center flex-1 py-2 text-slate-400">
            <span class="text-lg">📤</span>
            <span class="text-[7px] font-black uppercase mt-1">Devol.</span>
        </button>
        <button onclick="switchTab('tab-historial', this)" class="flex flex-col items-center flex-1 py-2 text-slate-400">
            <span class="text-lg">📁</span>
            <span class="text-[7px] font-black uppercase mt-1">Historial</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;
        let pList = [];
        let sec = 0, timer;

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab', 'text-slate-400'));
            el.classList.add('active-tab');
            if(id === 'tab-historial') renderHistory();
        }

        function addPackingItem() {
            const cod = document.getElementById('in-cod').value.toUpperCase();
            const meta = parseInt(document.getElementById('in-meta').value);
            if(!cod || !meta) return;
            pList.push({ cod, meta, real: 0 });
            renderMiniList();
            document.getElementById('in-cod').value = "";
            document.getElementById('in-meta').value = "";
            document.getElementById('btn-start-ops').classList.remove('hidden');
        }

        function renderMiniList() {
            const cont = document.getElementById('mini-list');
            cont.innerHTML = pList.map((p, idx) => `
                <div class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-[9px] font-black flex items-center gap-2 border border-blue-100">
                    ${p.cod} (${p.meta})
                    <button onclick="pList.splice(${idx},1);renderMiniList()" class="text-blue-300">✕</button>
                </div>
            `).join('');
        }

        function startOperations() {
            document.getElementById('config-card').classList.add('hidden');
            document.getElementById('stats-panel').classList.remove('hidden');
            document.getElementById('ops-panel').classList.remove('hidden');
            document.getElementById('op-select').innerHTML = pList.map(p => `<option value="${p.cod}">${p.cod}</option>`).join('');
            timer = setInterval(() => {
                sec++;
                const h = Math.floor(sec/3600).toString().padStart(2,'0');
                const m = Math.floor((sec%3600)/60).toString().padStart(2,'0');
                const s = (sec%60).toString().padStart(2,'0');
                document.getElementById('timer-val').innerText = `${h}:${m}:${s}`;
            }, 1000);
            updateView();
        }

        function submitCount() {
            const cod = document.getElementById('op-select').value;
            const cant = parseInt(document.getElementById('op-input').value);
            if(!cant) return;
            pList.find(p => p.cod === cod).real += cant;
            document.getElementById('op-input').value = "";
            updateView();
            navigator.vibrate(40);
        }

        function updateView() {
            const tPlan = pList.reduce((a,b) => a + b.meta, 0);
            const tReal = pList.reduce((a,b) => a + b.real, 0);
            const perc = Math.round((tReal / tPlan) * 100) || 0;
            document.getElementById('global-perc').innerText = perc + "%";
            document.getElementById('global-bar').style.width = Math.min(perc, 100) + "%";
            document.getElementById('global-counter').innerText = `${tReal}/${tPlan}`;
            
            const grid = document.getElementById('items-grid');
            grid.innerHTML = pList.map(p => `
                <div class="glass-card p-3 space-y-1.5 border-l-4 ${p.real >= p.meta ? 'border-l-green-500' : 'border-l-blue-600'}">
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] font-black text-slate-800">${p.cod}</span>
                        <span class="text-[8px] font-mono font-bold">${p.real}/${p.meta}</span>
                    </div>
                    <div class="h-1 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-600" style="width: ${Math.min((p.real/p.meta)*100, 100)}%"></div>
                    </div>
                </div>`).join('');
        }

        function closeContainerReport() {
            clearInterval(timer);
            const reportID = "TJ-" + Math.floor(1000 + Math.random() * 9000);
            const time = document.getElementById('timer-val').innerText;
            const storage = JSON.parse(localStorage.getItem('tajho_v13_data') || '[]');
            storage.unshift({ id: reportID, tipo: 'RECEPCIÓN', fecha: new Date().toLocaleString(), tiempo: time, data: [...pList] });
            localStorage.setItem('tajho_v13_data', JSON.stringify(storage));
            
            const doc = new jsPDF();
            doc.text("REPORTE TAJHO.OS v13", 14, 20);
            doc.autoTable({ startY: 30, head: [['COD', 'PLAN', 'REAL', 'ST']], body: pList.map(i => [i.cod, i.meta, i.real, i.real >= i.meta ? 'OK' : 'F']) });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 15);
            doc.save(`${reportID}_Tajho.pdf`);
            location.reload();
        }

        function renderHistory(filter = "") {
            const cont = document.getElementById('hist-container');
            const storage = JSON.parse(localStorage.getItem('tajho_v13_data') || '[]');
            const filtered = storage.filter(h => h.id.includes(filter) || h.tipo.includes(filter) || (h.data && h.data.some(d => d.cod.includes(filter))));
            
            cont.innerHTML = filtered.map(h => `
                <div class="glass-card p-3 flex justify-between items-center border-l-4 ${h.tipo === 'RECEPCIÓN' ? 'border-l-blue-600' : 'border-l-orange-500'}">
                    <div>
                        <p class="text-[7px] font-black text-slate-400">${h.id} • ${h.fecha.split(',')[0]}</p>
                        <h4 class="font-bold text-slate-800 text-[11px]">${h.tipo}</h4>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-black text-blue-600 font-mono italic">${h.tiempo}</p>
                    </div>
                </div>`).join('') || "<p class='text-center py-10 text-[8px] font-bold text-slate-300'>VACÍO</p>";
        }

        function filterHistory() { renderHistory(document.getElementById('hist-search').value.toUpperCase()); }
        
        function saveDevolution() {
            const cli = document.getElementById('dev-cli').value;
            if(!cli) return;
            const storage = JSON.parse(localStorage.getItem('tajho_v13_data') || '[]');
            storage.unshift({ id: "DEV-" + Math.floor(Math.random()*99), tipo: 'DEVOLUCIÓN', fecha: new Date().toLocaleString(), tiempo: 'N/A', data: [{cod: document.getElementById('dev-sku').value}] });
            localStorage.setItem('tajho_v13_data', JSON.stringify(storage));
            alert("Guardado"); switchTab('tab-historial', document.querySelectorAll('nav button')[2]);
        }
    </script>
</body>
</html>
