<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tajho Aura Prime</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #f8fafc; 
            --glass: rgba(255, 255, 255, 0.9);
            --accent: #000000;
            --shadow-soft: 0 10px 40px -10px rgba(0,0,0,0.05);
            --border: rgba(0,0,0,0.06);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #0f172a; letter-spacing: -0.01em; }
        
        .view { display: none; min-height: 100vh; padding: 24px; flex-direction: column; animation: viewIn 0.5s ease; }
        .view.active { display: flex; }
        @keyframes viewIn { from { opacity: 0; filter: blur(10px); transform: translateY(10px); } to { opacity: 1; filter: blur(0); transform: translateY(0); } }

        .aura-card { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: var(--shadow-soft);
        }

        .nav-card {
            background: #fff;
            border-radius: 35px;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-card:active { transform: scale(0.95); background: #f1f5f9; }
        .nav-card i { font-size: 3.2rem; margin-bottom: 1rem; color: var(--accent); }

        input, select {
            background: #fff!important;
            border: 1px solid #e2e8f0!important;
            border-radius: 20px!important;
            padding: 18px!important;
            font-weight: 600!important;
            outline: none!important;
            transition: 0.3s;
        }

        .btn-prime {
            background: var(--accent);
            color: white;
            padding: 20px;
            border-radius: 24px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.1em;
            transition: 0.3s;
        }

        #search-results {
            position: absolute; width: 100%; top: 100%; z-index: 50; margin-top: 10px;
            background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-height: 200px; overflow-y: auto;
        }
        .search-item { padding: 16px; border-bottom: 1px solid #f8fafc; font-weight: 700; font-size: 14px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="v-dash" class="view active">
        <header class="pt-20 pb-16 text-center">
            <h1 class="text-[10px] font-extrabold tracking-[0.8em] text-slate-300 uppercase mb-4">Logistics Management</h1>
            <h2 class="text-5xl font-light italic tracking-tight text-slate-900">Tajho <span class="font-black not-italic tracking-tighter text-black">Prime</span></h2>
        </header>

        <div class="grid grid-cols-2 gap-6 px-2">
            <button onclick="navTo('create')" class="nav-card">
                <i class="ph-thin ph-truck"></i>
                <span class="text-[10px] font-extrabold uppercase tracking-widest text-slate-500">Nuevo<br>Contenedor</span>
            </button>
            <button onclick="navTo('hist')" class="nav-card">
                <i class="ph-thin ph-magnifying-glass"></i>
                <span class="text-[10px] font-extrabold uppercase tracking-widest text-slate-500">Consultar<br>Ingresos</span>
            </button>
        </div>
    </div>

    <div id="v-create" class="view">
        <nav class="flex items-center justify-between mb-10">
            <button onclick="navTo('dash')" class="w-12 h-12 rounded-full bg-white flex items-center justify-center border border-slate-100"><i class="ph-bold ph-arrow-left"></i></button>
            <span class="text-xs font-black uppercase tracking-widest">Planificar Carga</span>
            <div class="w-12"></div>
        </nav>

        <div class="aura-card p-8 mb-8 space-y-6">
            <div class="relative">
                <label class="text-[9px] font-extrabold uppercase text-slate-400 ml-2 mb-2 block">Buscador SKU</label>
                <input type="text" id="sku-in" oninput="searchMaster(this.value)" class="w-full" placeholder="Buscar producto..." autocomplete="off">
                <div id="search-results" class="hidden"></div>
            </div>
            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="text-[9px] font-extrabold uppercase text-slate-400 ml-2 mb-2 block">Meta de Cajas</label>
                    <input type="number" id="meta-in" class="w-full text-center text-xl font-bold" placeholder="0">
                </div>
                <button onclick="addToQueue()" class="mt-6 px-8 btn-prime !bg-slate-100 !text-black">Añadir</button>
            </div>
        </div>

        <div id="queue-list" class="space-y-3 flex-1 overflow-y-auto"></div>
        <button onclick="saveContenedor()" class="w-full btn-prime mt-6">Registrar en Historial</button>
    </div>

    <div id="v-hist" class="view">
        <nav class="flex items-center justify-between mb-8">
            <button onclick="navTo('dash')" class="w-12 h-12 rounded-full bg-white flex items-center justify-center border border-slate-100"><i class="ph-bold ph-arrow-left"></i></button>
            <span class="text-xs font-black uppercase tracking-widest">Consulta de Ingresos</span>
            <div class="w-12"></div>
        </nav>

        <div class="aura-card p-6 mb-8">
            <p class="text-[9px] font-black uppercase text-slate-400 mb-3 tracking-widest">Buscar por Código o Descripción</p>
            <input type="text" id="sku-query" class="w-full !p-4 text-sm" placeholder="Ej: SKU-001..." oninput="filterByProduct(this.value)">
        </div>

        <div id="product-results" class="space-y-4 overflow-y-auto flex-1 pr-2"></div>
    </div>

    <div id="v-work" class="view">
        <header class="flex justify-between items-end mb-10">
            <div>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Operación</p>
                <h2 class="text-4xl font-black tracking-tighter" id="work-title"></h2>
            </div>
            <button onclick="finalizeWork()" class="px-6 py-3 rounded-2xl bg-black text-white font-bold text-[10px] uppercase">Finalizar</button>
        </header>

        <div class="aura-card p-10 text-center mb-8">
            <select id="work-select" onchange="refreshWorkStats()" class="w-full mb-8 text-center text-xl font-black border-none bg-slate-50"></select>
            <div class="flex items-center justify-center gap-6">
                <input type="number" id="work-input" class="w-32 text-6xl font-black text-center border-none" placeholder="0">
                <button onclick="commitCount()" class="w-20 h-20 rounded-[28px] bg-black text-white flex items-center justify-center shadow-2xl">
                    <i class="ph-bold ph-plus text-3xl"></i>
                </button>
            </div>
        </div>
        <div id="work-stats" class="space-y-4 flex-1 overflow-y-auto"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let master = [], queue = [], currentOp = null;

        window.onload = async () => {
            filterByProduct('');
            try { 
                const res = await fetch(API_URL); 
                master = await res.json(); 
            } catch(e) { console.error("Error Master"); }
        };

        function navTo(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            if(v === 'hist') filterByProduct('');
        }

        // --- CREACIÓN ---
        function searchMaster(q) {
            const resDiv = document.getElementById('search-results');
            if (q.length < 2) { resDiv.classList.add('hidden'); return; }
            const m = master.filter(p => p.sku.toLowerCase().includes(q.toLowerCase())).slice(0, 5);
            resDiv.innerHTML = m.map(x => `<div onclick="pickSku('${x.sku}')" class="search-item">${x.sku}</div>`).join('');
            resDiv.classList.remove('hidden');
        }
        function pickSku(s) { document.getElementById('sku-in').value = s; document.getElementById('search-results').classList.add('hidden'); }

        function addToQueue() {
            const s = document.getElementById('sku-in').value, m = parseInt(document.getElementById('meta-in').value);
            if(!s || !m) return;
            queue.push({ sku: s, meta: m, r: 0 });
            document.getElementById('sku-in').value = ''; document.getElementById('meta-in').value = '';
            renderQueue();
        }

        function renderQueue() {
            document.getElementById('queue-list').innerHTML = queue.map((x, i) => `
                <div class="aura-card p-5 flex justify-between items-center bg-white">
                    <span class="font-bold text-sm">${x.sku} <span class="ml-3 text-slate-400">OBJ: ${x.meta}</span></span>
                    <button onclick="queue.splice(${i},1);renderQueue()" class="text-slate-300"><i class="ph-bold ph-trash text-xl"></i></button>
                </div>`).join('');
        }

        function saveContenedor() {
            if(queue.length === 0) return;
            const op = { id: `TJ-${Math.floor(Math.random()*900+100)}`, date: new Date().toLocaleString(), items: [...queue], done: false };
            let history = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            history.unshift(op);
            localStorage.setItem('tajho_v3', JSON.stringify(history));
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ accion: 'guardar_contenedor', ...op }) });
            queue = []; renderQueue(); navTo('hist');
        }

        // --- BUSCADOR ESPECÍFICO POR PRODUCTO Y FECHA ---
        function filterByProduct(q) {
            const history = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            const resultsDiv = document.getElementById('product-results');
            let html = "";

            if (q.length > 0) {
                // Modo búsqueda: Filtrar por producto específico
                history.forEach(op => {
                    op.items.forEach(item => {
                        if (item.sku.toLowerCase().includes(q.toLowerCase()) && item.r > 0) {
                            html += `
                            <div class="aura-card p-6 flex justify-between items-center border-l-4 border-black">
                                <div>
                                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">${op.date}</p>
                                    <p class="text-sm font-black text-black">${item.sku}</p>
                                    <p class="text-[10px] text-slate-500 uppercase font-bold">OP: ${op.id}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-2xl font-black tracking-tighter">${item.r}</p>
                                    <p class="text-[8px] font-bold text-slate-400 uppercase">Cajas</p>
                                </div>
                            </div>`;
                        }
                    });
                });
            } else {
                // Modo historial: Mostrar reportes generales
                history.forEach((op, i) => {
                    html += `
                    <div class="aura-card p-6 flex justify-between items-center">
                        <div>
                            <p class="text-[8px] font-black text-slate-300 mb-1 uppercase tracking-widest">${op.date}</p>
                            <p class="text-xl font-extrabold italic tracking-tighter">${op.id}</p>
                        </div>
                        ${op.done ? 
                            `<button onclick="genPDF(${i})" class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center"><i class="ph-bold ph-file-pdf text-xl"></i></button>` : 
                            `<button onclick="openWork(${i})" class="px-6 py-3 rounded-2xl bg-black text-white font-black text-[9px] uppercase">Contar</button>`
                        }
                    </div>`;
                });
            }

            resultsDiv.innerHTML = html || '<p class="text-center py-10 text-slate-300 uppercase text-[10px] font-bold">Sin registros encontrados</p>';
        }

        // --- TERMINAL ---
        function openWork(idx) {
            const h = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            currentOp = { ...h[idx], localIdx: idx };
            navTo('work');
            document.getElementById('work-title').innerText = currentOp.id;
            document.getElementById('work-select').innerHTML = currentOp.items.map(x => `<option value="${x.sku}">${x.sku}</option>`).join('');
            refreshWorkStats();
        }

        function commitCount() {
            const val = parseInt(document.getElementById('work-input').value);
            if(!val && val !== 0) return;
            const sku = document.getElementById('work-select').value;
            const item = currentOp.items.find(x => x.sku === sku);
            item.r += val;
            document.getElementById('work-input').value = '';
            refreshWorkStats();
            let h = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            h[currentOp.localIdx] = currentOp;
            localStorage.setItem('tajho_v3', JSON.stringify(h));
        }

        function refreshWorkStats() {
            document.getElementById('work-stats').innerHTML = currentOp.items.map(x => `
                <div class="aura-card p-5">
                    <div class="flex justify-between text-[10px] font-black uppercase mb-3">
                        <span>${x.sku}</span>
                        <span>${x.r} / ${x.meta}</span>
                    </div>
                    <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-black transition-all" style="width:${Math.min((x.r/x.meta)*100,100)}%"></div>
                    </div>
                </div>`).join('');
        }

        async function finalizeWork() {
            currentOp.done = true;
            let h = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            h[currentOp.localIdx] = currentOp;
            localStorage.setItem('tajho_v3', JSON.stringify(h));
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ accion: 'finalizar_conteo', ...currentOp }) });
            navTo('hist');
        }

        function genPDF(idx) {
            const d = JSON.parse(localStorage.getItem('tajho_v3') || '[]')[idx];
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(22); doc.text("TAJHO PRIME", 14, 25);
            doc.setFontSize(9); doc.text(`REPORTE: ${d.id} | ${d.date}`, 14, 32);
            doc.autoTable({
                startY: 40,
                head: [['PRODUCTO', 'META', 'REAL', 'DIF.']],
                body: d.items.map(it => [it.sku, it.meta, it.r, (it.r - it.meta)]),
                headStyles: { fillColor: [0,0,0] }
            });
            const y = doc.lastAutoTable.finalY + 20;
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, y);
            doc.text("Asistente de Inventario Logístico", 14, y + 5);
            doc.save(`Reporte_${d.id}.pdf`);
        }
    </script>
</body>
</html>
