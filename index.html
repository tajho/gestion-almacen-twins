<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Almacen Tajho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfd; color: #1a1c21; height: 100vh; overflow: hidden; margin: 0; padding: 0; }
        
        /* Layout Anti-Corte para Móvil */
        .view { display: none; height: 100vh; padding: 1.2rem; flex-direction: column; box-sizing: border-box; }
        .view.active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Tarjeta de Contenedor Elevada */
        .glass-panel { background: white; border-radius: 2rem; border: 1px solid #f0f1f3; box-shadow: 0 10px 40px rgba(0,0,0,0.04); padding: 1.5rem; }
        
        /* Buscador Inteligente */
        .search-container { position: relative; width: 100%; }
        .results-box { position: absolute; z-index: 100; top: 100%; left: 0; width: 100%; background: white; border-radius: 1.2rem; box-shadow: 0 15px 30px rgba(0,0,0,0.1); border: 1px solid #eee; max-h: 200px; overflow-y: auto; margin-top: 5px; }
        .result-item { padding: 0.8rem 1.2rem; border-bottom: 1px solid #f8f9fa; cursor: pointer; }
        .result-item:last-child { border-bottom: none; }

        /* Botón Inferior Fijo con Espaciado de Seguridad */
        .footer-action { position: fixed; bottom: 1.5rem; left: 1.2rem; right: 1.2rem; z-index: 50; }
        .btn-black { background: #1a1c21; color: white; border-radius: 1.2rem; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; padding: 1.2rem; width: 100%; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .btn-black:active { transform: scale(0.96); }

        /* Animación del Camión */
        .track { height: 45px; background: #f1f3f7; border-radius: 1rem; position: relative; overflow: hidden; margin: 1rem 0; }
        .track-fill { height: 100%; background: #2563eb; width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .truck-icon { position: absolute; top: 50%; transform: translateY(-50%); transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; color: #1a1c21; }

        .input-elite { background: #f8f9fb; border: 2px solid #eceef2; border-radius: 1.2rem; padding: 1rem; font-weight: 700; width: 100%; outline: none; transition: 0.3s; }
        .input-elite:focus { border-color: #2563eb; background: white; }
    </style>
</head>
<body>

    <header class="h-20 px-6 flex justify-between items-center bg-white/80 backdrop-blur-md border-b">
        <div>
            <p class="text-[9px] font-black tracking-[0.3em] text-slate-400 uppercase leading-none mb-1">Intelligence</p>
            <h1 class="text-xl font-black">TAJHO<span class="text-blue-600">Almacen</span></h1>
        </div>
        <button onclick="goHome()" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></button>
    </header>

    <div id="view-home" class="view active">
        <div class="mt-4 mb-8">
            <p class="text-blue-600 font-bold text-xs uppercase tracking-widest mb-1">Control Logístico</p>
            <h2 class="text-3xl font-black text-slate-900 leading-tight italic">¿Qué hacemos<br><span class="text-blue-600">hoy, Angelo?</span></h2>
        </div>

        <div onclick="navTo('crear')" class="glass-panel flex items-center gap-5 active:scale-95 transition-transform">
            <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
            </div>
            <div>
                <h3 class="font-black text-slate-900 uppercase">Nuevo Contenedor</h3>
                <p class="text-[9px] font-bold text-slate-400 uppercase italic">Logística Twins</p>
            </div>
        </div>
    </div>

    <div id="view-crear" class="view">
        <h2 class="text-2xl font-black italic mb-6">Configurar <span class="text-blue-600">Carga</span></h2>
        
        <div class="glass-panel space-y-4">
            <div class="search-container">
                <input type="text" id="s-sku" oninput="smartSearch()" class="input-elite" placeholder="Buscar SKU, Nombre o Iniciales">
                <div id="results" class="results-box hidden"></div>
            </div>
            <div class="flex gap-3">
                <input type="number" id="s-meta" class="input-elite flex-1" placeholder="Cant. Meta">
                <button onclick="addMani()" class="w-16 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 active:scale-90"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg></button>
            </div>
        </div>

        <div class="flex-grow overflow-y-auto mt-6 pb-24">
            <div id="pre-list" class="space-y-3"></div>
        </div>

        <div class="footer-action">
            <button id="btn-start" onclick="openModal()" class="btn-black hidden">Lanzar Operación</button>
        </div>
    </div>

    <div id="view-ops" class="view">
        <div class="glass-panel mb-6">
            <div class="flex justify-between items-center text-[10px] font-black text-slate-400 uppercase italic tracking-widest mb-2">
                <span>Avance General</span>
                <span id="global-pc" class="text-blue-600 text-sm">0%</span>
            </div>
            <div class="track">
                <div id="truck-fill" class="track-fill"></div>
                <div id="truck-icon" class="truck-icon" style="left: 0%">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>
                </div>
            </div>
        </div>

        <div class="text-center mb-8">
            <select id="sel-sku" onchange="syncItem()" class="text-2xl font-black text-slate-900 bg-transparent outline-none italic uppercase"></select>
            <p id="live-desc" class="text-[9px] font-bold text-blue-600 uppercase px-4"></p>
        </div>

        <div class="flex flex-col gap-6 justify-center">
            <div class="flex items-center justify-center gap-5">
                <input type="number" id="qty-in" class="input-elite w-32 h-20 text-center text-4xl !rounded-3xl border-2" placeholder="0">
                <button onclick="registrarBulto()" class="w-20 h-20 bg-blue-600 text-white rounded-[2rem] flex items-center justify-center shadow-xl shadow-blue-100 active:scale-75 transition-all"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg></button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-3xl border border-slate-100 text-center">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-1 tracking-widest">Restante</p>
                    <p id="live-rem" class="text-2xl font-black">0</p>
                </div>
                <div class="bg-blue-50/50 p-5 rounded-3xl border border-blue-50 text-center">
                    <p class="text-[8px] font-black text-blue-400 uppercase mb-1 tracking-widest">Confirmado</p>
                    <p id="live-real" class="text-2xl font-black text-blue-600">0</p>
                </div>
            </div>
        </div>

        <div class="footer-action">
            <button onclick="finishAndReport()" class="btn-black">Finalizar y Guardar Reporte</button>
        </div>
    </div>

    <div id="modal-choice" class="fixed inset-0 z-[200] bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center p-8">
        <div class="bg-white w-full rounded-[2.5rem] p-8 text-center shadow-2xl">
            <h3 class="text-xl font-black italic mb-6 uppercase">¿Iniciar Conteo?</h3>
            <div class="flex flex-col gap-3">
                <button onclick="continuarConteo()" class="btn-black">Sí, iniciar ahora</button>
                <button onclick="closeModal()" class="text-[10px] font-black text-slate-300 uppercase mt-4">Regresar</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_items = {};
        let currentMani = JSON.parse(localStorage.getItem('taj_cur')) || [];
        let activeJob = JSON.parse(localStorage.getItem('taj_active')) || null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                const raw = await res.json();
                raw.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().toUpperCase().trim()] = r.DESCRIPCION; });
                navTo('home');
            } catch (e) { console.warn("Offline"); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'crear') renderPreList();
        }

        function goHome() { navTo('home'); }

        // BUSCADOR MEJORADO (Nombre, SKU o Iniciales)
        function smartSearch() {
            const input = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('results');
            if(input.length < 2) { resDiv.classList.add('hidden'); return; }

            const matches = Object.keys(db_items).filter(sku => {
                const desc = db_items[sku].toUpperCase();
                return sku.includes(input) || desc.includes(input);
            }).slice(0, 8);

            resDiv.innerHTML = matches.map(sku => `
                <div onclick="setProd('${sku}')" class="result-item">
                    <p class="text-[10px] font-black text-blue-600 mb-0.5">${sku}</p>
                    <p class="text-[9px] font-bold text-slate-500 uppercase leading-tight">${db_items[sku]}</p>
                </div>
            `).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(sku) {
            document.getElementById('s-sku').value = sku;
            document.getElementById('results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "GENERICO", meta, real: 0 });
            localStorage.setItem('taj_cur', JSON.stringify(currentMani));
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
            navigator.vibrate(20);
        }

        function renderPreList() {
            const container = document.getElementById('pre-list');
            container.innerHTML = currentMani.map(i => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm">
                    <p class="text-[11px] font-black text-slate-900 italic tracking-tighter uppercase">${i.sku}</p>
                    <p class="text-[11px] font-black text-blue-600">${i.meta} CJ</p>
                </div>
            `).join('');
            if(currentMani.length > 0) document.getElementById('btn-start').classList.remove('hidden');
        }

        function openModal() { document.getElementById('modal-choice').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-choice').style.display = 'none'; }

        function continuarConteo() {
            closeModal();
            activeJob = { id: Date.now(), name: "L-" + new Date().getHours() + new Date().getMinutes(), items: [...currentMani], status: 'PROCESO' };
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
            currentMani = []; localStorage.removeItem('taj_cur');
            startOps(activeJob);
        }

        function startOps(job) {
            navTo('ops');
            document.getElementById('sel-sku').innerHTML = job.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem();
        }

        function syncItem() {
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('live-desc').innerText = item.desc;
            document.getElementById('live-rem').innerText = Math.max(0, item.meta - item.real);
            document.getElementById('live-real').innerText = item.real;

            const totalM = activeJob.items.reduce((a,b) => a + b.meta, 0);
            const totalR = activeJob.items.reduce((a,b) => a + b.real, 0);
            const pc = Math.min(Math.round((totalR / totalM) * 100), 100);
            
            document.getElementById('truck-fill').style.width = pc + "%";
            document.getElementById('truck-icon').style.left = `calc(${pc}% - 12px)`;
            document.getElementById('global-pc').innerText = pc + "%";
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
        }

        function registrarBulto() {
            const q = parseInt(document.getElementById('qty-in').value);
            if(!q) return;
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += q;
            document.getElementById('qty-in').value = '';
            syncItem();
            navigator.vibrate(15);
            fetch(CLOUD_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({tipo:'CARGA', datos: [new Date().toLocaleString(), item.sku, q]})});
        }

        function finishAndReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(14); doc.setFont("helvetica", "bold"); doc.text("REPORTE OPERATIVO TAJHO.OS", 14, 20);
            doc.autoTable({
                startY: 25, head: [['SKU', 'META', 'REAL', 'DIF']],
                body: activeJob.items.map(i => [i.sku, i.meta, i.real, i.meta-i.real]),
                theme: 'striped', headStyles: { fillColor: [26, 28, 33] }
            });
            doc.setFontSize(9);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 12);
            doc.save(`TAJHO_${activeJob.name}.pdf`);
            localStorage.removeItem('taj_active');
            navTo('home');
        }

        init();
    </script>
</body>
</html>
