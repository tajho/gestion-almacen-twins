<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajho - Warehouse OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #fcfcfd; color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.05); }
        .card-neo { border-radius: 2.5rem; background: #ffffff; box-shadow: 0 15px 35px -5px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .input-minimal { @apply w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 font-bold transition-all text-sm; }
        .hidden { display: none !important; }
        .progress-bar { transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="pb-32">

    <header class="p-8 pt-12 flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-[900] tracking-tighter leading-none">TAJHO<span class="text-blue-600 italic">.ALMACÉN</span></h1>
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em] mt-2 text-center">Gestión de Contenedores</p>
        </div>
        <div class="h-10 w-10 rounded-xl bg-slate-900 flex items-center justify-center text-white shadow-lg">📦</div>
    </header>

    <main class="max-w-md mx-auto px-6 space-y-8">

        <section id="vista-manifiesto" class="space-y-6">
            <div class="px-2">
                <h2 class="text-xl font-black italic">Preparar Contenedor</h2>
                <p class="text-xs text-slate-400">Ingresa los códigos y cantidades del packing list.</p>
            </div>

            <div class="card-neo p-6 space-y-3">
                <input type="text" id="pack-cod" placeholder="Código (Ej: 1010)" class="input-minimal uppercase">
                <div class="flex gap-2">
                    <input type="number" id="pack-cant" placeholder="Total Esperado" class="input-minimal">
                    <button onclick="agregarAlManifiesto()" class="bg-blue-600 text-white px-6 rounded-2xl font-bold text-xl">+</button>
                </div>
            </div>

            <div id="contenedor-lista-previa" class="space-y-3">
                </div>

            <button id="btn-iniciar" onclick="congelarYContar()" class="w-full py-5 bg-slate-900 text-white rounded-[1.8rem] font-bold text-xs uppercase tracking-widest hidden shadow-xl active:scale-95 transition-all">
                Crear Contenedor e Iniciar Conteo
            </button>
        </section>

        <section id="vista-conteo" class="hidden space-y-8">
            <div class="px-2 flex justify-between items-center">
                <h2 class="text-xl font-black italic">Conteo en Piso</h2>
                <span class="text-[10px] font-black bg-blue-50 text-blue-600 px-3 py-1 rounded-full uppercase">Contenedor Abierto</span>
            </div>

            <div class="card-neo p-8 text-center space-y-4">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Ingresar Código de Producto</p>
                <input type="text" id="scan-cod" placeholder="----" class="w-full text-5xl font-black text-center text-slate-900 outline-none bg-transparent uppercase">
                <div class="flex gap-2 mt-4">
                    <input type="number" id="scan-cant" placeholder="Cant. Bulto/Pallet" class="input-minimal text-center">
                    <button onclick="registrarConteo()" class="bg-blue-600 text-white px-8 rounded-2xl font-bold text-xs uppercase">Sumar</button>
                </div>
            </div>

            <div id="feedback-audit" class="text-center p-4 min-h-[50px]">
                </div>

            <div id="progreso-auditoria" class="space-y-4">
                </div>

            <button onclick="guardarTodo()" class="w-full py-6 bg-blue-600 text-white rounded-[2rem] font-bold text-xs uppercase tracking-widest shadow-2xl">
                Cerrar Contenedor y Generar PDF
            </button>
        </section>

        <section id="vista-historial" class="hidden space-y-6">
            <h2 class="text-xl font-black italic px-2">Reportes Finalizados</h2>
            <div id="feed-historial" class="space-y-4"></div>
        </section>

    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] glass rounded-[2.5rem] p-2 flex justify-around items-center shadow-2xl z-50">
        <button onclick="nav('vista-manifiesto', this)" class="flex-1 py-4 flex flex-col items-center text-blue-600 font-bold">
            <span class="text-xl">📋</span>
            <span class="text-[8px] uppercase mt-1">Planificar</span>
        </button>
        <button onclick="nav('vista-historial', this)" class="flex-1 py-4 flex flex-col items-center text-slate-300">
            <span class="text-xl">📁</span>
            <span class="text-[8px] uppercase mt-1">Reportes</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;
        let manifiesto = [];
        let conteoTotal = {};

        // Datos de prueba para ver la app funcionando al 100%
        let db = JSON.parse(localStorage.getItem('tajho_db')) || [
            { id: "CONT-991", fecha: "08/03/2026", items: [{cod: "1010", plan: 100, real: 100}, {cod: "2020", plan: 50, real: 48}] }
        ];

        function agregarAlManifiesto() {
            const cod = document.getElementById('pack-cod').value.toUpperCase();
            const cant = parseInt(document.getElementById('pack-cant').value);
            if(!cod || !cant) return;

            manifiesto.push({ cod, plan: cant, real: 0 });
            renderPrevia();
            document.getElementById('pack-cod').value = "";
            document.getElementById('pack-cant').value = "";
            document.getElementById('btn-iniciar').classList.remove('hidden');
        }

        function renderPrevia() {
            const cont = document.getElementById('contenedor-lista-previa');
            cont.innerHTML = "";
            manifiesto.forEach(m => {
                cont.innerHTML += `
                    <div class="card-neo p-4 flex justify-between items-center text-xs animate__animated animate__fadeInUp">
                        <span class="font-black">${m.cod}</span>
                        <span class="bg-slate-100 px-3 py-1 rounded-full font-bold text-slate-500">${m.plan} UNIDADES</span>
                    </div>`;
            });
        }

        function congelarYContar() {
            document.getElementById('vista-manifiesto').classList.add('hidden');
            document.getElementById('vista-conteo').classList.remove('hidden');
            renderProgreso();
        }

        function registrarConteo() {
            const cod = document.getElementById('scan-cod').value.toUpperCase();
            const cant = parseInt(document.getElementById('scan-cant').value);
            const item = manifiesto.find(m => m.cod === cod);
            const feedback = document.getElementById('feedback-audit');

            if(item && cant) {
                item.real += cant;
                feedback.innerHTML = `<p class="text-blue-600 font-bold text-xs animate-bounce">+${cant} ingresados a ${cod}</p>`;
                document.getElementById('scan-cod').value = "";
                document.getElementById('scan-cant').value = "";
                renderProgreso();
                
                if(item.real >= item.plan) {
                    feedback.innerHTML = `<p class="text-green-500 font-black text-xs uppercase tracking-widest">¡CÓDIGO ${cod} COMPLETADO!</p>`;
                }
            } else {
                alert("El código no existe en el manifiesto actual.");
            }
        }

        function renderProgreso() {
            const cont = document.getElementById('progreso-auditoria');
            cont.innerHTML = "";
            manifiesto.forEach(m => {
                const porc = (m.real / m.plan) * 100;
                cont.innerHTML += `
                    <div class="card-neo p-5 space-y-3">
                        <div class="flex justify-between items-end">
                            <div><p class="text-[9px] font-black text-slate-400 uppercase">PRODUCTO</p><p class="font-black text-sm">${m.cod}</p></div>
                            <div class="text-right"><p class="text-lg font-black ${m.real >= m.plan ? 'text-green-500' : 'text-blue-600'}">${m.real} <span class="text-slate-300 text-xs">/ ${m.plan}</span></p></div>
                        </div>
                        <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div class="progress-bar h-full bg-blue-600" style="width: ${Math.min(porc, 100)}%"></div>
                        </div>
                    </div>`;
            });
        }

        function guardarTodo() {
            const registro = {
                id: "CONT-" + Math.floor(1000 + Math.random() * 9000),
                fecha: new Date().toLocaleDateString(),
                items: [...manifiesto]
            };
            db.unshift(registro);
            localStorage.setItem('tajho_db', JSON.stringify(db));
            alert("Contenedor guardado correctamente.");
            location.reload();
        }

        function nav(id, btn) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'vista-historial') renderHistorial();
        }

        function renderHistorial() {
            const feed = document.getElementById('feed-historial');
            feed.innerHTML = "";
            db.forEach(r => {
                feed.innerHTML += `
                    <div class="card-neo p-6 flex justify-between items-center">
                        <div><p class="text-[10px] font-black text-slate-300 uppercase">${r.fecha}</p><h3 class="text-lg font-black">${r.id}</h3></div>
                        <button onclick="generarPDF('${r.id}')" class="w-14 h-14 bg-slate-900 rounded-[1.5rem] flex items-center justify-center shadow-xl">📄</button>
                    </div>`;
            });
        }

        function generarPDF(id) {
            const r = db.find(x => x.id === id);
            const doc = new jsPDF();
            doc.setFontSize(22); doc.text("REPORTE ALMACÉN TAJHO", 14, 20);
            doc.setFontSize(10); doc.text(`Identificador: ${r.id} | Fecha de Operación: ${r.fecha}`, 14, 28);
            
            const rows = r.items.map(i => [i.cod, "PRODUCTO TAJHO", i.plan, i.real, (i.real >= i.plan ? 'COMPLETO' : 'FALTANTE')]);
            
            doc.autoTable({
                startY: 35,
                head: [['CÓDIGO', 'DESCRIPCIÓN', 'PLANEADO', 'CONTADO', 'ESTADO']],
                body: rows,
                theme: 'grid',
                headStyles: { fillColor: [15, 23, 42] }
            });

            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 20);
            doc.save(`Tajho_${id}.pdf`);
        }
    </script>
</body>
</html>
