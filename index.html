<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v40 | ELITE PRECISION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0066ff; --surface: #ffffff; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: #fcfcfc; color: #0f172a; overflow: hidden; height: 100vh; }
        
        /* DISEÑO DE ALTA PRECISIÓN */
        .card-elite { background: var(--surface); border: 1px solid var(--border); border-radius: 1.5rem; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .input-elite { border-bottom: 2px solid #e2e8f0; border-radius: 0; padding: 1rem 0.5rem; font-weight: 600; font-size: 1.1rem; transition: all 0.3s; width: 100%; background: transparent; }
        .input-elite:focus { outline: none; border-color: var(--accent); }
        
        /* SISTEMA DE CAPAS */
        #landing { position: fixed; inset: 0; z-index: 1000; background: #ffffff; padding: 2.5rem; display: flex; flex-direction: column; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .hide-landing { transform: translateX(-100%); }
        
        .view { display: none; height: calc(100vh - 100px); overflow-y: auto; padding: 1.5rem; }
        .view.active { display: block; animation: fadeSlide 0.4s ease-out; }
        @keyframes fadeSlide { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* BARRAS DE PROGRESO MÉDICAS */
        .progress-track { width: 100%; height: 4px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); transition: width 0.6s ease; }

        /* NAV LATERAL */
        #side-menu { position: fixed; inset: 0; z-index: 2000; visibility: hidden; pointer-events: none; }
        #menu-content { width: 80%; max-width: 320px; height: 100%; background: #0f172a; color: white; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding: 4rem 2rem; }
        #side-menu.open { visibility: visible; pointer-events: auto; }
        #side-menu.open #menu-content { transform: translateX(0); }
        #menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.2); opacity: 0; transition: 0.4s; backdrop-filter: blur(4px); }
        #side-menu.open #menu-overlay { opacity: 1; }
    </style>
</head>
<body>

    <div id="side-menu">
        <div id="menu-overlay" onclick="toggleMenu()"></div>
        <div id="menu-content" class="flex flex-col">
            <h2 class="text-xs font-black tracking-[0.5em] text-blue-500 mb-10 italic uppercase">Tajho<span class="text-white">.OS</span></h2>
            <nav class="space-y-6 flex-1">
                <button onclick="navTo('landing')" class="w-full text-left text-2xl font-light opacity-60 active:opacity-100 transition-opacity">Escritorio</button>
                <button onclick="navTo('historial')" class="w-full text-left text-2xl font-light opacity-60 active:opacity-100 transition-opacity">Historial</button>
                <button onclick="navTo('devoluciones')" class="w-full text-left text-2xl font-light opacity-60 active:opacity-100 transition-opacity">Devoluciones</button>
            </nav>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">v40 | Logistics Pro</p>
        </div>
    </div>

    <div id="landing">
        <div class="flex-1 flex flex-col justify-end pb-12">
            <h1 class="text-6xl font-black tracking-tighter italic leading-[0.85] mb-12">
                ¿Qué hacemos<br><span class="text-blue-600">hoy, Tajho?</span>
            </h1>
            
            <div class="space-y-3">
                <button onclick="navTo('contenedor')" class="w-full h-24 card-elite flex items-center justify-between px-8 active:bg-slate-50">
                    <span class="text-xl font-black italic uppercase tracking-tighter">Contenedor</span>
                    <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </div>
                </button>

                <button onclick="navTo('historial')" class="w-full h-24 card-elite flex items-center justify-between px-8 active:bg-slate-50">
                    <span class="text-xl font-black italic uppercase tracking-tighter">Historial</span>
                    <div class="w-12 h-12 border-2 border-slate-900 rounded-full flex items-center justify-center">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 20v-6M9 20V10M15 20V4"/></svg>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <header class="h-24 px-8 flex justify-between items-center bg-white sticky top-0 z-50">
        <button onclick="toggleMenu()" class="w-10 h-10 flex flex-col justify-center gap-1">
            <div class="w-7 h-0.5 bg-slate-900"></div>
            <div class="w-7 h-0.5 bg-slate-900"></div>
        </button>
        <div id="monitor-global" class="hidden flex-1 px-8 text-center">
            <p id="timer" class="text-[11px] font-black italic text-blue-600 mb-1">00:00:00</p>
            <div class="progress-track"><div id="main-bar" class="progress-bar" style="width: 0%"></div></div>
        </div>
        <div class="text-right">
            <p class="text-[10px] font-black italic uppercase tracking-[0.2em]">Tajho<span class="text-blue-600">.OS</span></p>
        </div>
    </header>

    <main>
        <div id="view-contenedor" class="view space-y-10">
            <div class="space-y-6">
                <input type="text" id="c-name" class="input-elite" placeholder="NOMBRE DEL CONTENEDOR">
                <div class="relative">
                    <input type="text" id="s-sku" oninput="precisionSearch()" class="input-elite" placeholder="SKU O DESCRIPCIÓN" autocomplete="off">
                    <div id="search-results" class="hidden absolute z-50 w-full bg-white mt-1 border border-slate-200 shadow-xl max-h-60 overflow-y-auto rounded-xl"></div>
                </div>
                <p id="s-desc" class="text-[10px] font-black text-blue-600 uppercase italic px-1 h-4"></p>
                <input type="number" id="s-meta" class="input-elite" placeholder="CANTIDAD META">
                <button onclick="addItem()" class="w-full bg-slate-900 text-white py-5 rounded-full font-black text-xs uppercase tracking-widest active:scale-95 transition-all">Añadir a la descarga</button>
            </div>
            
            <div id="pre-list" class="space-y-3"></div>
            <button id="btn-save" onclick="saveContenedor()" class="hidden w-full bg-blue-600 text-white py-6 rounded-full font-black uppercase text-xs tracking-[0.3em] shadow-lg">Confirmar Inventario</button>
        </div>

        <div id="view-historial" class="view space-y-8">
            <h2 class="text-4xl font-black italic tracking-tighter">En <span class="text-blue-600">espera</span></h2>
            <div id="history-list" class="space-y-4"></div>
        </div>

        <div id="view-ops" class="view">
            <div class="space-y-12">
                <div class="text-center space-y-2">
                    <select id="sel-sku" onchange="syncItem()" class="text-5xl font-black bg-transparent w-full text-center outline-none italic tracking-tighter"></select>
                    <p id="ops-desc" class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic"></p>
                </div>
                
                <div class="space-y-4 px-4">
                    <div class="flex justify-between text-[10px] font-black uppercase italic text-slate-400">
                        <span>Avance ítem</span>
                        <span id="item-pc" class="text-blue-600">0%</span>
                    </div>
                    <div class="progress-track"><div id="item-bar" class="progress-bar" style="width: 0%"></div></div>
                </div>

                <div class="flex items-center justify-center gap-10">
                    <input type="number" id="qty-in" class="text-7xl font-black w-32 bg-transparent text-center outline-none border-b-4 border-slate-100 focus:border-blue-600" placeholder="0">
                    <button onclick="doQty()" class="w-24 h-24 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-2xl active:scale-75 transition-all">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-px bg-slate-100">
                    <div class="bg-white p-8 text-center"><p class="text-[10px] font-black text-slate-400 uppercase mb-2">Restante</p><p id="txt-rem" class="text-4xl font-black tracking-tighter">0</p></div>
                    <div class="bg-white p-8 text-center"><p class="text-[10px] font-black text-blue-400 uppercase mb-2">Logrado</p><p id="txt-real" class="text-4xl font-black tracking-tighter text-blue-600">0</p></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db = []; let history = []; let draft = []; let active = null; let tSec = 0; let tInt;

        window.onbeforeunload = () => (draft.length > 0 || active) ? "¿Perder cambios?" : null;

        async function init() { try { const r = await fetch(CLOUD_URL); db = await r.json(); } catch(e) {} }
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
        
        function navTo(v) {
            if(v === 'landing') { document.getElementById('landing').classList.remove('hide-landing'); return; }
            document.getElementById('landing').classList.add('hide-landing');
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            if(v === 'historial') renderHistory();
            if(document.getElementById('side-menu').classList.contains('open')) toggleMenu();
            init();
        }

        function precisionSearch() {
            const val = document.getElementById('s-sku').value.toUpperCase();
            const res = document.getElementById('search-results');
            if(val.length < 2) { res.classList.add('hidden'); return; }
            const matches = db.filter(i => String(i.CODIGO).includes(val) || String(i.DESCRIPCION).includes(val)).slice(0, 8);
            res.innerHTML = matches.map(m => `<div onclick="setS('${m.CODIGO}','${m.DESCRIPCION}')" class="p-4 border-b border-slate-50 active:bg-slate-50 transition-colors text-xs font-bold uppercase">${m.CODIGO} - ${m.DESCRIPCION}</div>`).join('');
            res.classList.remove('hidden');
        }

        function setS(c,d) { 
            document.getElementById('s-sku').value=c; 
            document.getElementById('s-desc').innerText=d; 
            document.getElementById('search-results').classList.add('hidden'); 
            document.getElementById('s-meta').focus();
        }

        function addItem() {
            const sku = document.getElementById('s-sku').value; const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            draft.push({sku, desc: document.getElementById('s-desc').innerText, meta, real: 0});
            document.getElementById('pre-list').innerHTML += `<div class="p-6 bg-white border border-slate-100 rounded-2xl font-black text-xs uppercase flex justify-between"><span>${sku}</span><span class="text-blue-600">${meta} CJ</span></div>`;
            document.getElementById('btn-save').classList.remove('hidden');
            document.getElementById('s-sku').value=''; document.getElementById('s-desc').innerText=''; document.getElementById('s-meta').value='';
        }

        function saveContenedor() {
            const name = document.getElementById('c-name').value || "ELITE-" + Date.now().toString().slice(-4);
            history.push({id: Date.now(), name, items: [...draft], status: 'ESPERA'});
            draft = []; document.getElementById('pre-list').innerHTML = ''; document.getElementById('btn-save').classList.add('hidden');
            navTo('historial');
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="card-elite p-8 flex justify-between items-center">
                    <div><p class="text-[9px] font-black text-blue-600 italic mb-1 uppercase">${h.status}</p><h3 class="font-black uppercase italic text-xl">${h.name}</h3></div>
                    <button onclick="startOps(${h.id})" class="w-12 h-12 bg-slate-900 text-white rounded-full flex items-center justify-center active:scale-90 transition-all"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
                </div>
            `).join('');
        }

        function startOps(id) {
            if(!confirm("Comenzar descarga oficial?")) return;
            active = history.find(h => h.id === id); active.status = 'EN PROCESO';
            navTo('ops');
            document.getElementById('monitor-global').classList.remove('hidden');
            document.getElementById('sel-sku').innerHTML = active.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem(); startT();
        }

        function syncItem() {
            const item = active.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('ops-desc').innerText = item.desc;
            document.getElementById('txt-rem').innerText = item.meta - item.real;
            document.getElementById('txt-real').innerText = item.real;
            const itemPc = Math.floor((item.real/item.meta)*100);
            document.getElementById('item-bar').style.width = itemPc + "%";
            document.getElementById('item-pc').innerText = itemPc + "%";
            const tM = active.items.reduce((a,b) => a+b.meta,0); const tR = active.items.reduce((a,b) => a+b.real,0);
            document.getElementById('main-bar').style.width = Math.floor((tR/tM)*100) + "%";
        }

        function doQty() {
            const q = parseInt(document.getElementById('qty-in').value); if(!q) return;
            const item = active.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += q; document.getElementById('qty-in').value = ''; syncItem();
            navigator.vibrate(40);
            fetch(CLOUD_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({tipo:'CARGA', datos:[active.name, item.sku, q]})});
        }

        function startT() {
            if(tInt) clearInterval(tInt);
            tInt = setInterval(() => {
                tSec++; let h=Math.floor(tSec/3600), m=Math.floor((tSec%3600)/60), s=tSec%60;
                document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }

        init();
    </script>
</body>
</html>
