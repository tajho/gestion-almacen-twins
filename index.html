<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite | Smart Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; 
            color: #0F172A; 
            overscroll-behavior: none;
        }

        .glass-header { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid #E2E8F0; 
        }

        .card-container { 
            background: white; 
            border-radius: 28px; 
            border: 1px solid #E2E8F0; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-status { 
            @apply flex flex-col items-center justify-center gap-2 p-5 rounded-[24px] transition-all active:scale-90 text-[10px] font-black uppercase tracking-widest border; 
        }

        /* Dash Stats */
        .stat-card {
            @apply bg-white p-5 rounded-[26px] border border-slate-200 shadow-sm flex flex-col items-center justify-center text-center;
        }

        /* Modo Trabajo */
        .work-mode {
            display: none;
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .item-row {
            @apply p-5 rounded-[22px] bg-slate-50 border border-slate-100 flex items-center justify-between shadow-sm mb-3;
        }

        .counter-btn {
            @apply w-12 h-12 rounded-xl flex items-center justify-center text-xl active:scale-75 transition-all;
        }
    </style>
</head>
<body class="antialiased">

    <div id="view-dashboard">
        <header class="glass-header sticky top-0 z-50 p-6">
            <div class="max-w-xl mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-800 tracking-tighter italic leading-none">TWINS <span class="text-blue-600">ELITE</span></h1>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic mt-1">J. Angelo Nuñez Durand</p>
                </div>
                <button onclick="app.sync()" class="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center shadow-lg active:rotate-180 transition-transform duration-500">
                    <i id="syncIcon" class="ph-bold ph-arrows-clockwise text-xl"></i>
                </button>
            </div>
        </header>

        <main class="max-w-xl mx-auto p-6 space-y-6">
            
            <div class="grid grid-cols-2 gap-4">
                <div class="stat-card">
                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-2">
                        <i class="ph-bold ph-shipping-container text-xl"></i>
                    </div>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Contenedores</p>
                    <p class="text-2xl font-900 text-slate-800" id="dash-total-cont">0</p>
                </div>
                <div class="stat-card">
                    <div class="w-10 h-10 bg-green-50 text-green-600 rounded-full flex items-center justify-center mb-2">
                        <i class="ph-bold ph-package text-xl"></i>
                    </div>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Cajas Totales</p>
                    <p class="text-2xl font-900 text-slate-800" id="dash-total-cajas">0</p>
                </div>
            </div>

            <div class="space-y-3">
                <div class="relative">
                    <input type="text" id="searchInput" oninput="app.render()" placeholder="Buscar contenedor o código..." 
                    class="w-full pl-14 pr-6 py-5 rounded-[24px] bg-white border border-slate-200 shadow-sm outline-none font-bold text-sm">
                    <i class="ph-bold ph-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 text-xl"></i>
                </div>
                
                <div class="relative">
                    <select id="monthFilter" onchange="app.render()" class="w-full p-5 pl-14 rounded-[24px] bg-white border border-slate-200 shadow-sm font-800 text-[10px] uppercase text-slate-500 outline-none appearance-none tracking-widest">
                        <option value="ALL">TODOS LOS MESES</option>
                        <option value="0">ENERO</option><option value="1">FEBRERO</option>
                        <option value="2">MARZO</option><option value="3">ABRIL</option>
                        <option value="4">MAYO</option><option value="5">JUNIO</option>
                        <option value="6">JULIO</option><option value="7">AGOSTO</option>
                        <option value="8">SEPTIEMBRE</option><option value="9">OCTUBRE</option>
                        <option value="10">NOVIEMBRE</option><option value="11">DICIEMBRE</option>
                    </select>
                    <i class="ph-bold ph-calendar-blank absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 text-xl"></i>
                    <i class="ph-bold ph-caret-down absolute right-6 top-1/2 -translate-y-1/2 text-slate-300"></i>
                </div>
            </div>

            <div id="feed" class="space-y-6 pb-10"></div>
        </main>
    </div>

    <div id="view-counter" class="work-mode flex-col">
        <header class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-900 text-white">
            <div>
                <h2 class="text-xl font-900 uppercase tracking-tighter" id="counter-title">Contenedor</h2>
                <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Conteo de Cajas en Almacén</p>
            </div>
            <button onclick="app.closeCounter()" class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center">
                <i class="ph-bold ph-x text-xl text-white"></i>
            </button>
        </header>

        <div class="grid grid-cols-2 gap-4 p-6 bg-slate-50 border-b border-slate-100">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">SKU Distintos</p>
                <p class="text-2xl font-900 text-blue-600 leading-none" id="totalItems">0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Cajas Contadas</p>
                <p class="text-2xl font-900 text-slate-800 leading-none" id="totalCount">0</p>
            </div>
        </div>

        <div id="counterList" class="flex-1 overflow-y-auto p-6"></div>

        <div class="p-6 bg-white border-t border-slate-100">
            <button onclick="app.saveWork()" class="w-full py-5 bg-blue-600 text-white rounded-[24px] font-900 text-xs uppercase tracking-[0.2em] shadow-xl shadow-blue-200">
                Finalizar Conteo
            </button>
            <p class="text-center text-[8px] font-bold text-slate-400 uppercase mt-4 tracking-widest italic">
                Revisión autorizada por J. Angelo Nuñez Durand
            </p>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbycL7jCK_jAwAch6H9DVnpditaxcMnghvhu860tGiCroA_ncf2fTKR6TU-qs1ojqEU/exec";

        const app = {
            data: JSON.parse(localStorage.getItem('twins_elite_data')) || [],
            activeId: null,

            sync: async function() {
                const icon = document.getElementById('syncIcon');
                icon.classList.add('animate-spin');
                try {
                    const res = await fetch(API_URL);
                    const json = await res.json();
                    this.data = Array.isArray(json) ? json : (json.historial || []);
                    localStorage.setItem('twins_elite_data', JSON.stringify(this.data));
                    this.render();
                } catch(e) { console.error(e); }
                finally { icon.classList.remove('animate-spin'); }
            },

            render: function() {
                const feed = document.getElementById('feed');
                const search = document.getElementById('searchInput').value.toLowerCase();
                const month = document.getElementById('monthFilter').value;

                // FILTRADO POR FECHA Y BÚSQUEDA
                const groups = this.data.reduce((acc, item) => {
                    const id = item.canal || item.CONTENEDOR || "S/N";
                    const dateVal = item.almacen || item.FECHA;
                    const dateObj = new Date(dateVal);
                    
                    const matchesSearch = JSON.stringify(item).toLowerCase().includes(search);
                    
                    // Lógica estricta de mes
                    let matchesMonth = true;
                    if(month !== "ALL") {
                        matchesMonth = !isNaN(dateObj) && dateObj.getMonth().toString() === month;
                    }

                    if (matchesSearch && matchesMonth) {
                        if (!acc[id]) acc[id] = { id, fecha: dateVal, items: [] };
                        acc[id].items.push(item);
                    }
                    return acc;
                }, {});

                const filteredGroups = Object.values(groups).sort((a,b) => b.id - a.id);
                
                // ACTUALIZAR CUADROS ESTADÍSTICOS DASHBOARD
                document.getElementById('dash-total-cont').innerText = filteredGroups.length;
                const globalCajas = filteredGroups.reduce((sum, g) => sum + g.items.reduce((s, i) => s + (parseInt(i.cantidad) || 0), 0), 0);
                document.getElementById('dash-total-cajas').innerText = globalCajas;

                let html = '';
                filteredGroups.forEach(g => {
                    const totalCajasCont = g.items.reduce((s, i) => s + (parseInt(i.cantidad) || 0), 0);
                    const isFinal = totalCajasCont > 0;
                    
                    html += `
                    <div class="card-container shadow-xl shadow-slate-900/5">
                        <div class="p-7">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">
                                        LLEGADA: ${g.fecha}
                                    </p>
                                    <h3 class="text-3xl font-900 text-slate-900 tracking-tighter uppercase leading-none">
                                        Contenedor ${g.id}
                                    </h3>
                                </div>
                                <span class="bg-blue-600 text-white px-3 py-1 rounded-full font-black text-[10px]">
                                    ${totalCajasCont} CAJAS
                                </span>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <button onclick="app.startWork('${g.id}')" class="btn-status ${isFinal ? 'border-blue-100 text-blue-600 bg-blue-50/30' : 'border-green-100 text-green-600 bg-green-50/50'}">
                                    <i class="ph-fill ${isFinal ? 'ph-pencil-simple' : 'ph-play'} text-2xl"></i>
                                    ${isFinal ? 'CORREGIR' : 'EMPEZAR'}
                                </button>
                                <button onclick="app.generatePDF('${g.id}')" class="btn-status border-slate-100 text-slate-400">
                                    <i class="ph-fill ph-file-pdf text-2xl"></i>
                                    REPORTE
                                </button>
                            </div>
                        </div>
                    </div>`;
                });

                feed.innerHTML = html || '<div class="text-center py-20 opacity-20 font-black text-xs uppercase tracking-widest">No hay registros en este periodo</div>';
            },

            startWork: function(id) {
                this.activeId = id;
                const filtrados = this.data.filter(i => (i.canal || i.CONTENEDOR) == id);
                document.getElementById('counter-title').innerText = `CONTENEDOR ${id}`;
                document.getElementById('totalItems').innerText = filtrados.length;
                this.updateTotalCount(filtrados);

                document.getElementById('counterList').innerHTML = filtrados.map((item, idx) => `
                    <div class="item-row">
                        <div class="flex-1 pr-4">
                            <p class="text-[10px] font-black text-blue-600 leading-none mb-1">${item.codigo || 'S/C'}</p>
                            <p class="text-xs font-bold text-slate-800 uppercase leading-tight">${item.descripcion || 'Sin descripción'}</p>
                        </div>
                        <div class="flex items-center gap-4 bg-white p-2 rounded-2xl border border-slate-100 shadow-sm">
                            <button class="counter-btn bg-slate-100 text-slate-600" onclick="app.adjust(${idx}, -1)">
                                <i class="ph-bold ph-minus"></i>
                            </button>
                            <span class="w-8 text-center font-900 text-xl text-blue-600" id="val-${idx}">${item.cantidad || 0}</span>
                            <button class="counter-btn bg-blue-600 text-white" onclick="app.adjust(${idx}, 1)">
                                <i class="ph-bold ph-plus"></i>
                            </button>
                        </div>
                    </div>
                `).join('');

                document.getElementById('view-counter').style.display = 'flex';
                document.body.style.overflow = 'hidden';
            },

            adjust: function(idx, val) {
                const el = document.getElementById(`val-${idx}`);
                let current = parseInt(el.innerText);
                current = Math.max(0, current + val);
                el.innerText = current;

                const filtrados = this.data.filter(i => (i.canal || i.CONTENEDOR) == this.activeId);
                filtrados[idx].cantidad = current;
                this.updateTotalCount(filtrados);
            },

            updateTotalCount: function(items) {
                const sum = items.reduce((a, b) => a + (parseInt(b.cantidad) || 0), 0);
                document.getElementById('totalCount').innerText = sum;
            },

            saveWork: function() {
                localStorage.setItem('twins_elite_data', JSON.stringify(this.data));
                this.render();
                this.closeCounter();
            },

            closeCounter: function() {
                document.getElementById('view-counter').style.display = 'none';
                document.body.style.overflow = 'auto';
            },

            generatePDF: function(id) {
                alert(`Generando reporte para Contenedor ${id}.\nAutorizado por Angelo Nuñez Durand.`);
            }
        };

        window.onload = () => app.render();
    </script>
</body>
</html>
