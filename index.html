<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajho OS - Global Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; }
        .card-analytics { @apply bg-slate-900 text-white rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden; }
        .progress-global { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .input-pro { @apply w-full p-5 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-600 font-bold text-sm shadow-sm; }
        .btn-action { @apply py-5 bg-blue-600 text-white rounded-3xl font-bold text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-32">

    <header class="p-8 pt-10">
        <h1 class="text-3xl font-[900] tracking-tighter text-slate-900 uppercase">Tajho<span class="text-blue-600 italic">.OS</span></h1>
        <p class="text-[10px] font-black text-slate-400 tracking-[0.3em] uppercase">Control Operativo de Alto Nivel</p>
    </header>

    <main class="max-w-md mx-auto px-6 space-y-8">

        <section id="fase-setup" class="space-y-6">
            <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 space-y-4">
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Definir Packing List</h2>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="setup-cod" placeholder="CÓDIGO" class="input-pro uppercase">
                    <input type="number" id="setup-meta" placeholder="CANT. TOTAL" class="input-pro">
                </div>
                <input type="text" id="setup-desc" placeholder="DESCRIPCIÓN DEL PRODUCTO" class="input-pro">
                <button onclick="agregarItem()" class="w-full py-3 bg-slate-50 text-slate-500 rounded-xl font-black text-[10px] uppercase">+ Añadir Item</button>
            </div>
            <div id="lista-previa" class="space-y-2"></div>
            <button id="btn-iniciar" onclick="iniciarDescarga()" class="w-full py-6 bg-slate-900 text-white rounded-[2rem] font-bold text-xs uppercase tracking-[0.2em] hidden">Abrir Contenedor</button>
        </section>

        <section id="fase-operacion" class="hidden space-y-6">
            
            <div class="card-analytics">
                <div class="relative z-10 space-y-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] font-black text-blue-300 uppercase tracking-widest">Progreso del Contenedor</p>
                            <h3 id="txt-porcentaje" class="text-4xl font-black mt-1">0%</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-blue-300 uppercase tracking-widest">Fecha</p>
                            <p class="text-xs font-bold mt-1">08/03/2026</p>
                        </div>
                    </div>

                    <div class="w-full h-3 bg-slate-800 rounded-full overflow-hidden">
                        <div id="bar-global" class="progress-global h-full bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)]" style="width: 0%"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-800">
                        <div class="text-center">
                            <p id="total-cajas" class="text-2xl font-black text-white">0</p>
                            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Unidades Totales</p>
                        </div>
                        <div class="text-center border-l border-slate-800">
                            <p id="total-items" class="text-2xl font-black text-white">0</p>
                            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Items Registrados</p>
                        </div>
                    </div>
                </div>
                <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-blue-600/10 rounded-full blur-3xl"></div>
            </div>

            <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 space-y-4">
                <p class="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Registro de Ingreso</p>
                <select id="sel-prod" class="input-pro appearance-none text-center cursor-pointer bg-slate-50"></select>
                <input type="number" id="input-cant" placeholder="CANTIDAD DE CAJAS" class="w-full text-5xl font-black text-center text-slate-900 outline-none py-4">
                <button onclick="registrarIngreso()" class="btn-action w-full">Sumar al Inventario</button>
            </div>

            <div id="items-progreso" class="space-y-3">
                </div>

            <button onclick="finalizarOperacion()" class="w-full py-6 bg-slate-900 text-white rounded-[2rem] font-bold text-xs uppercase tracking-widest">Cerrar y Exportar Reportes</button>
        </section>

    </main>

    <script>
        const { jsPDF } = window.jspdf;
        let dbPacking = [];
        let globalTotalPlan = 0;
        let globalTotalReal = 0;

        function agregarItem() {
            const cod = document.getElementById('setup-cod').value.toUpperCase();
            const meta = parseInt(document.getElementById('setup-meta').value);
            const desc = document.getElementById('setup-desc').value || "Producto Tajho";

            if(!cod || !meta) return;

            dbPacking.push({ cod, meta, desc, real: 0 });
            globalTotalPlan += meta;
            
            renderPrevia();
            document.getElementById('setup-cod').value = "";
            document.getElementById('setup-meta').value = "";
            document.getElementById('setup-desc').value = "";
            document.getElementById('btn-iniciar').classList.remove('hidden');
        }

        function renderPrevia() {
            const cont = document.getElementById('lista-previa');
            cont.innerHTML = dbPacking.map(p => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center text-xs shadow-sm border border-slate-50">
                    <span class="font-black">${p.cod}</span>
                    <span class="font-bold text-slate-400">${p.meta} UNIDADES</span>
                </div>`).join('');
        }

        function iniciarDescarga() {
            document.getElementById('fase-setup').classList.add('hidden');
            document.getElementById('fase-operacion').classList.remove('hidden');
            
            const sel = document.getElementById('sel-prod');
            sel.innerHTML = dbPacking.map(p => `<option value="${p.cod}">${p.cod} - ${p.desc}</option>`).join('');
            
            actualizarMetricas();
        }

        function registrarIngreso() {
            const cod = document.getElementById('sel-prod').value;
            const cant = parseInt(document.getElementById('input-cant').value);

            if(!cant || cant <= 0) return;

            const item = dbPacking.find(p => p.cod === cod);
            item.real += cant;
            globalTotalReal += cant;

            document.getElementById('input-cant').value = "";
            actualizarMetricas();
            
            if(item.real >= item.meta) navigator.vibrate([200, 100, 200]);
        }

        function actualizarMetricas() {
            // Actualizar Porcentaje y Barra Global
            const porcentaje = Math.round((globalTotalReal / globalTotalPlan) * 100);
            document.getElementById('txt-porcentaje').innerText = porcentaje + "%";
            document.getElementById('bar-global').style.width = Math.min(porcentaje, 100) + "%";

            // Actualizar Cuadro de Métricas
            document.getElementById('total-cajas').innerText = globalTotalReal;
            document.getElementById('total-items').innerText = dbPacking.length;

            // Renderizar Lista de Progreso Individual
            const cont = document.getElementById('items-progreso');
            cont.innerHTML = dbPacking.map(p => {
                const itemPorc = Math.min((p.real / p.meta) * 100, 100);
                return `
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-50 space-y-2">
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[9px] font-black text-slate-300 uppercase">${p.cod}</p>
                            <p class="font-bold text-slate-700 text-xs">${p.desc}</p>
                        </div>
                        <div class="text-right font-black text-blue-600">${p.real} <span class="text-slate-300 text-[10px]">/ ${p.meta}</span></div>
                    </div>
                    <div class="w-full h-1.5 bg-slate-50 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-600 progress-global" style="width: ${itemPorc}%"></div>
                    </div>
                </div>`;
            }).join('');
        }

        function finalizarOperacion() {
            const reportID = "TJ-" + Math.floor(1000 + Math.random() * 9000);
            
            // PDF
            const doc = new jsPDF();
            doc.setFontSize(22); doc.text("AUDITORÍA FINAL - ALMACÉN TAJHO", 14, 20);
            const rows = dbPacking.map(i => [i.cod, i.desc, i.meta, i.real, (i.real >= i.meta ? 'OK' : 'INCOMPLETO')]);
            doc.autoTable({ startY: 35, head: [['COD', 'DESC', 'PLAN', 'REAL', 'ST']], body: rows, theme: 'grid', headStyles: { fillColor: [15, 23, 42] } });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 15);
            doc.save(`${reportID}_Tajho.pdf`);

            // CSV EXCEL
            let csv = "data:text/csv;charset=utf-8,CÓDIGO,DESCRIPCIÓN,PLANEADO,REAL,ESTADO\n";
            dbPacking.forEach(p => { csv += `${p.cod},${p.desc},${p.meta},${p.real},${p.real >= p.meta ? 'OK' : 'FALTANTE'}\n`; });
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csv));
            link.setAttribute("download", `${reportID}_Datos.csv`);
            link.click();

            setTimeout(() => location.reload(), 2000);
        }
    </script>
</body>
</html>
