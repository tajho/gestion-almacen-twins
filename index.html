<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite - Flujo Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .aura-card { border-radius: 24px; border: 1px solid #f1f5f9; }
        .btn-press:active { transform: scale(0.96); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bg-blur { backdrop-filter: blur(12px); background: rgba(255,255,255,0.8); }
    </style>
</head>
<body class="bg-[#FDFDFD] text-slate-900">

    <header class="sticky top-0 z-50 bg-blur border-b border-slate-100 p-5">
        <div class="flex justify-between items-center max-w-xl mx-auto">
            <div>
                <h1 class="font-extrabold text-xl tracking-tighter">TWINS <span class="text-blue-600">ELITE</span></h1>
                <div class="flex items-center gap-1.5">
                    <span id="sync-dot" class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                    <span id="sync-text" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Sincronizado</span>
                </div>
            </div>
            <div id="week-indicator" class="bg-slate-900 text-white px-3 py-1.5 rounded-full text-[10px] font-black uppercase tracking-tighter">
                Cargando Semana...
            </div>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto pb-32">
        
        <div class="mb-8 relative">
            <i class="ph-bold ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="search-input" oninput="handleSearch()" placeholder="Buscar por código, descripción o fecha..." 
                class="w-full bg-slate-100 border-none rounded-2xl py-4 pl-12 pr-4 text-sm font-semibold focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>

        <div class="flex items-center justify-between mb-4 px-1">
            <h2 id="section-title" class="text-xs font-black text-slate-400 uppercase tracking-widest">Semana Actual</h2>
            <i class="ph-bold ph-calendar-blank text-slate-300"></i>
        </div>

        <div id="operations-list" class="space-y-4">
            </div>

    </main>

    <div id="view-counting" class="fixed inset-0 bg-white z-[60] hidden overflow-y-auto p-4">
        <div class="max-w-xl mx-auto">
            <button onclick="closeCounting()" class="mb-6 flex items-center gap-2 text-slate-400 font-black text-[10px] uppercase tracking-widest">
                <i class="ph-bold ph-arrow-left"></i> Volver
            </button>
            <div id="container-header" class="mb-8"></div>
            <div id="items-list" class="space-y-4 pb-40"></div>
            <div id="footer-action" class="fixed bottom-0 left-0 right-0 p-6 bg-blur border-t border-slate-50 hidden">
                <div class="max-w-xl mx-auto">
                    <button id="save-btn" onclick="finalizeProcess()" class="w-full bg-blue-600 text-white py-5 rounded-[24px] font-black text-sm uppercase tracking-widest shadow-xl shadow-blue-200 btn-press">
                        Guardar en Almacén
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-v5b_DkMPqup6Wm4J5KfGKZq9IRs99drhBYFV-MzHa4tcyb8dSn7YRx7KTHAEj1Jp/exec";
        let master_data = [];
        let isSearchActive = false;

        // 1. OBTENER NÚMERO DE SEMANA
        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            return Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
        }

        // 2. CARGA INVISIBLE
        async function loadData(silent = false) {
            const dot = document.getElementById('sync-dot');
            const text = document.getElementById('sync-text');
            
            if(!silent) dot.classList.replace('bg-green-500', 'bg-amber-500');
            
            try {
                const res = await fetch(WEB_APP_URL);
                const data = await res.json();
                master_data = data.historial;
                dot.classList.replace('bg-amber-500', 'bg-green-500');
                text.innerText = "Sincronizado";
                if(!isSearchActive) renderDefaultView();
            } catch (e) {
                dot.classList.replace('bg-green-500', 'bg-red-500');
                text.innerText = "Modo Offline";
                console.log("Error de conexión silencioso");
            }
        }

        // 3. LÓGICA DE VISUALIZACIÓN POR SEMANAS
        function renderDefaultView() {
            const list = document.getElementById('operations-list');
            const title = document.getElementById('section-title');
            const weekIndicator = document.getElementById('week-indicator');

            // Agrupamos por semana
            const groupedByWeek = master_data.reduce((acc, curr) => {
                const [d, m, y] = curr.operacion.match(/\d{2}\/\d{2}/)[0].split('/');
                const dateObj = new Date(2026, parseInt(m)-1, parseInt(d));
                const week = getWeekNumber(dateObj);
                if(!acc[week]) acc[week] = [];
                acc[week].push(curr);
                return acc;
            }, {});

            const currentWeek = getWeekNumber(new Date());
            const availableWeeks = Object.keys(groupedByWeek).sort((a,b) => b-a);
            
            // Si la semana actual no tiene nada, tomamos la última disponible
            const weekToShow = groupedByWeek[currentWeek] ? currentWeek : availableWeeks[0];
            
            weekIndicator.innerText = `Semana ${weekToShow}`;
            title.innerText = weekToShow == currentWeek ? "Ingresos de esta semana" : "Últimos ingresos registrados";

            renderCards(groupById(groupedByWeek[weekToShow]));
        }

        function groupById(flatArray) {
            return Object.values(flatArray.reduce((acc, curr) => {
                if(!acc[curr.operacion]) acc[curr.operacion] = { ...curr, items: [] };
                acc[curr.operacion].items.push(curr);
                return acc;
            }, {}));
        }

        function handleSearch() {
            const val = document.getElementById('search-input').value.toLowerCase();
            const list = document.getElementById('operations-list');
            const title = document.getElementById('section-title');

            if(val.length > 0) {
                isSearchActive = true;
                title.innerText = "Resultados de búsqueda";
                const filtered = master_data.filter(i => 
                    i.operacion.toLowerCase().includes(val) || 
                    i.sku.toLowerCase().includes(val) || 
                    i.descripcion.toLowerCase().includes(val)
                );
                renderCards(groupById(filtered));
            } else {
                isSearchActive = false;
                renderDefaultView();
            }
        }

        function renderCards(data) {
            const list = document.getElementById('operations-list');
            list.innerHTML = data.map(op => `
                <div class="aura-card bg-white p-5 shadow-sm active:bg-slate-50 transition-colors" onclick="openAction('${op.operacion}', '${op.estado === 'COMPLETADO' ? 'VIEW' : 'COUNT'}')">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h3 class="font-extrabold text-lg text-slate-800 leading-tight">${op.operacion}</h3>
                            <div class="flex gap-3 mt-1">
                                <span class="text-[9px] font-black uppercase text-slate-400">${op.items.length} SKUs</span>
                                <span class="text-[9px] font-black uppercase ${op.canal === 'ROJO' ? 'text-red-500' : 'text-green-500'}">● Canal ${op.canal}</span>
                            </div>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="px-2 py-1 rounded-md text-[8px] font-black uppercase tracking-tighter ${op.estado === 'COMPLETADO' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                                ${op.estado}
                            </span>
                        </div>
                    </div>
                    ${op.estado === 'COMPLETADO' ? `
                        <div class="flex gap-2 mt-4 pt-4 border-t border-slate-50">
                            <button class="flex-1 bg-slate-50 text-slate-500 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest">Corregir</button>
                            <button class="flex-1 bg-red-50 text-red-600 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest">Reporte PDF</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // (Las funciones openAction, renderItems, updateQty y finalizeProcess son iguales a la versión anterior, solo asegúrate de pegarlas aquí)
        // ... (Insertar aquí las funciones del mensaje anterior para manejar el conteo) ...

        // AUTO-SYNC CADA 30 SEGUNDOS
        setInterval(() => loadData(true), 30000);
        window.onload = () => loadData();
    </script>
</body>
</html>
