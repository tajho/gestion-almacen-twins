<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA LOGÍSTICO PRO | ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --success: #10b981; --warn: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        
        /* Navegación Inferior */
        .navbar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid #334155; z-index: 1000; }
        .nav-item { flex: 1; padding: 15px; text-align: center; color: #94a3b8; font-size: 0.7rem; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .nav-item.active { color: var(--accent); border-top: 3px solid var(--accent); background: rgba(59, 130, 246, 0.1); }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .section { display: none; animation: slideIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* Inputs y Buscador */
        .card { background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: white; box-sizing: border-box; }
        .search-res { background: rgba(59, 130, 246, 0.1); padding: 12px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 10px; font-weight: bold; }

        /* TARJETAS DE ITEM (Lo que pediste) */
        .item-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 6px solid #475569; position: relative; transition: 0.3s; }
        .item-card.complete { border-left-color: var(--success); background: rgba(16, 185, 129, 0.05); }
        .item-card.mismatch { border-left-color: var(--warn); }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .item-sku { font-size: 0.8rem; font-weight: 800; color: var(--accent); }
        .item-name { font-size: 0.75rem; color: #94a3b8; display: block; margin-top: 2px; }
        .stats-grid { display: flex; gap: 15px; background: #0f172a; padding: 10px; border-radius: 8px; }
        .stat-val { font-size: 1rem; font-weight: bold; display: block; }
        .stat-lbl { font-size: 0.6rem; color: #64748b; text-transform: uppercase; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-add { background: var(--accent); color: white; }
        .btn-pdf { background: var(--success); color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div id="sec-config" class="section active">
            <div class="card">
                <h3 style="margin:0 0 15px 0; font-size: 1rem;">1. DATOS DE ARRIBO</h3>
                <label style="font-size: 0.7rem;">N° CONTENEDOR / REFERENCIA</label>
                <input type="text" id="id_cont" placeholder="Ej: CONT-0116">
                <label style="font-size: 0.7rem;">EVIDENCIA PACKING (FOTO)</label>
                <input type="file" id="foto_pck" accept="image/*">
                <button class="btn btn-add" onclick="go(1)">Comenzar Conteo</button>
            </div>
        </div>

        <div id="sec-conteo" class="section">
            <div class="card">
                <input type="text" id="buscador" placeholder="Buscar por SKU o Nombre..." oninput="doSearch(this.value)">
                <div id="search_feedback" class="search-res">Esperando SKU...</div>
                
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="c_pck" placeholder="Cant. Packing">
                    <input type="number" id="c_fis" placeholder="Bultos/Físico">
                </div>
                <button class="btn btn-add" onclick="addItem()">Registrar Item</button>
            </div>

            <div id="contenedor-items">
                </div>
        </div>

        <div id="sec-reporte" class="section">
            <div class="card" style="text-align: center;">
                <h3 style="margin:0;">FINALIZAR RECEPCIÓN</h3>
                <p style="font-size: 0.8rem; color: #94a3b8;">Se generará el reporte oficial firmado.</p>
                <button class="btn btn-pdf" onclick="makePDF()">Generar PDF Profesional</button>
            </div>
        </div>
    </div>

    <div class="navbar">
        <div class="nav-item active" onclick="go(0)">Inicio</div>
        <div class="nav-item" onclick="go(1)">Conteo</div>
        <div class="nav-item" onclick="go(2)">Reporte</div>
    </div>

<script>
    const API = "TU_URL_AQUI"; 
    let maestro = [];
    let items = {};
    let selected = null;

    window.onload = async () => {
        try {
            const r = await fetch(API);
            maestro = await r.json();
            console.log("Conectado");
        } catch (e) { alert("Error de conexión"); }
    };

    function go(idx) {
        const sections = document.querySelectorAll('.section');
        const navs = document.querySelectorAll('.nav-item');
        sections.forEach((s, i) => s.classList.toggle('active', i === idx));
        navs.forEach((n, i) => n.classList.toggle('active', i === idx));
    }

    function doSearch(v) {
        v = v.trim().toUpperCase();
        const p = maestro.find(x => x[0].toString().includes(v) || x[1].toString().includes(v));
        const f = document.getElementById('search_feedback');
        if(p) {
            selected = { sku: p[0], nombre: p[1] };
            f.innerText = `📦 ${p[1]}`;
            f.style.color = "var(--accent)";
        } else {
            selected = null;
            f.innerText = "NO ENCONTRADO";
            f.style.color = "var(--danger)";
        }
    }

    function addItem() {
        const pk = parseInt(document.getElementById('c_pck').value) || 0;
        const fs = parseInt(document.getElementById('c_fis').value) || 0;
        const cont = document.getElementById('id_cont').value;

        if(!selected || fs === 0 || !cont) return alert("Complete los datos");

        const sku = selected.sku;
        if(!items[sku]) {
            items[sku] = { nombre: selected.nombre, p: pk, f: 0 };
        }
        items[sku].f += fs;
        if(pk > 0) items[sku].p = pk;

        // Sincronización Invisible
        fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ contenedor: cont, sku: sku, cantidad: fs }) });

        renderItems();
        document.getElementById('buscador').value = "";
        document.getElementById('c_fis').value = "";
        document.getElementById('buscador').focus();
    }

    function renderItems() {
        const container = document.getElementById('contenedor-items');
        container.innerHTML = "";
        
        // Mostrar primero el último agregado
        const keys = Object.keys(items).reverse();
        
        keys.forEach(k => {
            const it = items[k];
            const isOk = it.f === it.p;
            const diff = it.f - it.p;
            
            container.innerHTML += `
                <div class="item-card ${isOk ? 'complete' : 'mismatch'}">
                    <div class="item-header">
                        <div>
                            <span class="item-sku">${k}</span>
                            <span class="item-name">${it.nombre}</span>
                        </div>
                        <span style="font-size:0.7rem; font-weight:bold; color:${isOk ? 'var(--success)' : 'var(--warn)'}">
                            ${isOk ? 'CUADRADO ✓' : 'PENDIENTE'}
                        </span>
                    </div>
                    <div class="stats-grid">
                        <div style="flex:1"><span class="stat-lbl">Packing</span><span class="stat-val">${it.p}</span></div>
                        <div style="flex:1"><span class="stat-lbl">Físico</span><span class="stat-val">${it.f}</span></div>
                        <div style="flex:1"><span class="stat-lbl">Diferencia</span><span class="stat-val" style="color:${diff === 0 ? 'white' : 'var(--danger)'}">${diff}</span></div>
                    </div>
                </div>
            `;
        });
    }

    function makePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const c = document.getElementById('id_cont').value;

        doc.setFontSize(18).text("RECEPCIÓN DE INVENTARIO", 105, 20, {align:'center'});
        doc.setFontSize(10).text(`RECEPCIÓN: ${c} | FECHA: ${new Date().toLocaleString()}`, 105, 28, {align:'center'});

        const rows = Object.keys(items).map(s => [s, items[s].nombre, items[s].p, items[s].f, items[s].f - items[s].p]);

        doc.autoTable({
            startY: 35,
            head: [['COD', 'DESCRIPCIÓN', 'PACKING', 'CONTEO', 'DIF']],
            body: rows,
            theme: 'striped',
            headStyles: { fillColor: [15, 23, 42] }
        });

        const y = doc.lastAutoTable.finalY + 30;
        doc.text("Revisión autorizada por:", 105, y, {align:'center'});
        doc.setFont(undefined, 'bold').text("J. Angelo Nuñez Durand", 105, y + 8, {align:'center'});
        doc.setFont(undefined, 'normal').text("Asist. Inventario Logístico", 105, y + 14, {align:'center'});
        doc.save(`Ingreso_${c}.pdf`);
    }
</script>
</body>
</html>
