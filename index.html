<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite | Smart Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F1F5F9; color: #0F172A; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #E2E8F0; }
        .card-container { background: white; border-radius: 24px; border: 1px solid #E2E8F0; transition: all 0.3s ease; }
        .card-container:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        
        /* Modal Design */
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; border-radius: 28px; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .btn-action { @apply flex flex-col items-center justify-center gap-2 p-4 rounded-2xl border border-slate-100 bg-white transition-all active:scale-95 text-[10px] font-bold uppercase; }
        .btn-action i { @apply text-xl; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <div id="modalLista" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content p-6" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-800 tracking-tighter uppercase" id="modalTitle">Detalle de Carga</h3>
                <button onclick="closeModal()" class="text-slate-400 text-2xl"><i class="ph-bold ph-x"></i></button>
            </div>
            <div id="modalBody" class="space-y-3">
                </div>
        </div>
    </div>

    <header class="glass-nav sticky top-0 z-50 p-5">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-800 tracking-tighter italic">TWINS <span class="text-blue-600">ELITE</span></h1>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic">J. Angelo Nuñez Durand</p>
            </div>
            <div class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-[10px] font-800" id="syncTag">SINCRONIZADO</div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-5">
        
        <div class="space-y-3 mb-8">
            <div class="relative">
                <input type="text" id="searchInput" oninput="renderApp()" placeholder="Buscar código o descripción..." 
                class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white border border-slate-200 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none font-semibold text-sm">
                <i class="ph-bold ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            </div>
            
            <select id="monthFilter" onchange="renderApp()" class="w-full p-4 rounded-2xl bg-white border border-slate-200 shadow-sm font-bold text-xs uppercase text-slate-600 outline-none">
                <option value="ALL">Todos los meses</option>
                <option value="0">Enero</option>
                <option value="1">Febrero</option>
                <option value="2">Marzo</option>
                <option value="3">Abril</option>
                <option value="4">Mayo</option>
                <option value="5">Junio</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Contenedores</p>
                <h2 id="statCanales" class="text-3xl font-800">0</h2>
            </div>
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Total SKUs</p>
                <h2 id="statSkus" class="text-3xl font-800 text-blue-600">0</h2>
            </div>
        </div>

        <div id="feed" class="space-y-4">
            </div>
    </main>

    <script>
        const API_URL = "TU_URL_DE_APPS_SCRIPT";
        let rawData = JSON.parse(localStorage.getItem('twins_db_v13')) || [];

        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        async function sync() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                rawData = data.historial || data;
                localStorage.setItem('twins_db_v13', JSON.stringify(rawData));
                renderApp();
                document.getElementById('syncTag').innerText = "ACTUALIZADO";
            } catch(e) { 
                document.getElementById('syncTag').innerText = "MODO OFFLINE";
            }
        }

        function formatDate(dateStr) {
            if (!dateStr || dateStr === "SIN FECHA") return "FECHA NO DEFINIDA";
            const date = new Date(dateStr);
            if (isNaN(date)) return dateStr;
            return `${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()}`;
        }

        function renderApp() {
            const feed = document.getElementById('feed');
            const query = document.getElementById('searchInput').value.toLowerCase();
            const monthVal = document.getElementById('monthFilter').value;

            // Agrupación por Canal
            const groups = rawData.reduce((acc, curr) => {
                const canal = curr.canal || "S/N";
                const dateObj = new Date(curr.almacen);
                
                // Filtros
                const matchesSearch = (curr.codigo?.toLowerCase().includes(query) || curr.descripcion?.toLowerCase().includes(query));
                const matchesMonth = (monthVal === "ALL" || (!isNaN(dateObj) && dateObj.getMonth().toString() === monthVal));

                if (matchesSearch && matchesMonth) {
                    if (!acc[canal]) {
                        acc[canal] = { id: canal, date: curr.almacen, items: [] };
                    }
                    acc[canal].items.push(curr);
                }
                return acc;
            }, {});

            let html = '';
            const channels = Object.values(groups).sort((a, b) => b.id - a.id);

            channels.forEach(group => {
                html += `
                <div class="card-container overflow-hidden">
                    <div class="h-1.5 w-full bg-blue-500"></div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-5">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="px-2 py-0.5 rounded-lg bg-slate-900 text-white text-[9px] font-900">CANAL ${group.id}</span>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase">${formatDate(group.date)}</span>
                                </div>
                                <h3 class="text-xl font-800 tracking-tighter uppercase">CONTENEDOR ${group.id}</h3>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="openCorrect('${group.id}')" class="btn-action border-blue-100 text-blue-600">
                                <i class="ph-bold ph-pencil-simple"></i>CORREGIR
                            </button>
                            <button onclick="openLista('${group.id}')" class="btn-action border-slate-100 text-slate-700">
                                <i class="ph-bold ph-list-magnifying"></i>VER LISTA
                            </button>
                            <button onclick="genPDF('${group.id}')" class="btn-action border-red-100 text-red-500">
                                <i class="ph-bold ph-file-pdf"></i>PDF
                            </button>
                        </div>
                    </div>
                </div>`;
            });

            feed.innerHTML = html || '<div class="text-center py-10 text-slate-400 font-bold uppercase text-xs">No se encontraron resultados</div>';
            document.getElementById('statCanales').innerText = channels.length;
            document.getElementById('statSkus').innerText = rawData.length;
        }

        // ACCIONES CON DISEÑO
        function openLista(canalId) {
            const group = rawData.filter(i => String(i.canal) === String(canalId));
            document.getElementById('modalTitle').innerText = `ITEMS CANAL ${canalId}`;
            let html = '';
            group.forEach(i => {
                html += `
                <div class="p-4 rounded-2xl bg-slate-50 border border-slate-100">
                    <p class="text-[10px] font-black text-blue-600 leading-none mb-1">${i.codigo}</p>
                    <p class="text-xs font-bold text-slate-700 uppercase leading-snug">${i.descripcion}</p>
                </div>`;
            });
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalLista').style.display = 'flex';
        }

        function closeModal(e) {
            document.getElementById('modalLista').style.display = 'none';
        }

        function genPDF(canalId) {
            const footer = "Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.";
            alert(`GENERANDO PDF PROFESIONAL PARA CANAL ${canalId}\n\n${footer}\n\nEnviando a procesador de reportes...`);
        }

        function openCorrect(canalId) {
            alert(`Abriendo Panel de Edición Inteligente para el Canal ${canalId}\nConexión con Excel establecida.`);
        }

        // Inicio
        renderApp();
        sync();
        setInterval(sync, 60000);
    </script>
</body>
</html>
