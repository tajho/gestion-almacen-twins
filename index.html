<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tajho - Gestión Logística</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue-vivid: #2563eb; --slate-900: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; margin: 0; }
        .view { display: none; min-height: 100vh; padding: 1.2rem; flex-direction: column; }
        .view.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .side-menu { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: var(--slate-900); z-index: 200; transition: 0.4s; padding: 2rem; }
        .side-menu.open { left: 0; box-shadow: 20px 0 60px rgba(0,0,0,0.5); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 150; display: none; backdrop-filter: blur(4px); }

        .input-row { background: white; border: 1.5px solid #e2e8f0; border-radius: 0.8rem; padding: 0.8rem; font-weight: 600; width: 100%; outline: none; }
        .btn-main { background: var(--slate-900); color: white; border-radius: 1rem; font-weight: 700; padding: 1.1rem; width: 100%; text-align: center; border: none; cursor: pointer; }
        .btn-blue { background: var(--blue-vivid); }
        .card-hist { background: white; border-radius: 1.5rem; padding: 1.25rem; border: 1px solid #edf2f7; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 1rem; }
        #results div:active { background: #f1f5f9; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>
    
    <header class="h-16 px-6 flex justify-between items-center bg-white border-b sticky top-0 z-[100]">
        <button onclick="toggleMenu()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"/></svg></button>
        <span class="font-black text-[10px] tracking-tighter italic uppercase text-slate-400">Inventory Asst. / A. Nuñez</span>
    </header>

    <nav id="side-menu" class="side-menu text-white">
        <h2 class="text-2xl font-black italic mb-10 uppercase">Tajho <span class="text-blue-500">Log</span></h2>
        <div class="flex flex-col gap-6 font-bold uppercase text-xs tracking-widest">
            <button onclick="navTo('home')">Inicio</button>
            <button onclick="navTo('crear')">Configurar Carga</button>
            <button onclick="navTo('historial')">Historial</button>
        </div>
    </nav>

    <div id="view-home" class="view active">
        <div class="mt-10 mb-10">
            <h1 class="text-4xl font-extrabold tracking-tighter italic leading-none">Gestión de<br><span class="text-blue-600 underline">Contenedores</span></h1>
        </div>
        <div class="grid gap-3">
            <button onclick="navTo('crear')" class="btn-main btn-blue">📦 NUEVA CARGA</button>
            <button onclick="navTo('historial')" class="btn-main">📜 HISTORIAL</button>
        </div>
    </div>

    <div id="view-crear" class="view">
        <h2 class="text-xl font-black mb-6 uppercase italic">Configuración</h2>
        <div class="bg-white p-4 rounded-2xl border mb-6 space-y-3 shadow-sm">
            <input type="text" id="c-id" class="input-row !bg-slate-50 border-none text-xs" placeholder="N° CONTENEDOR">
            
            <div class="relative">
                <input type="text" id="s-sku" oninput="smartSearch()" class="input-row" placeholder="CÓDIGO O DESCRIPCIÓN...">
                <p id="live-desc-preview" class="text-[9px] text-blue-600 font-bold mt-1 uppercase"></p>
                <div id="results" class="absolute z-50 left-0 right-0 bg-white shadow-2xl rounded-xl mt-1 hidden border max-h-48 overflow-y-auto"></div>
            </div>

            <div class="flex gap-2">
                <input type="number" id="s-meta" class="input-row flex-1" placeholder="CANT. PACK">
                <button onclick="addMani()" class="w-14 h-12 bg-blue-600 text-white rounded-lg font-bold">ADD</button>
            </div>
        </div>

        <div class="flex-grow bg-white rounded-3xl p-5 shadow-inner overflow-y-auto mb-4">
            <h3 class="font-black text-slate-900 uppercase italic text-xs mb-4">Ítems programados</h3>
            <div id="pre-list" class="divide-y divide-slate-50"></div>
        </div>
        <button onclick="finalizarCargaConfig()" class="btn-main btn-blue">GUARDAR CONTENEDOR</button>
    </div>

    <div id="view-ops" class="view">
        <div class="bg-white p-6 rounded-3xl border mb-4 text-center shadow-sm">
            <p id="op-title" class="text-[9px] font-bold text-slate-400 uppercase mb-2"></p>
            <select id="sel-sku" onchange="syncItem()" class="text-xl font-black text-slate-900 bg-transparent outline-none border-b-2 border-blue-600 w-full text-center mb-6 uppercase"></select>
            <div class="flex items-center justify-center gap-4">
                <input type="number" id="qty-in" class="input-row w-24 h-16 text-center text-3xl font-black" placeholder="0">
                <button onclick="registrarBulto()" class="w-16 h-16 bg-blue-600 text-white rounded-2xl font-bold text-xl shadow-lg">OK</button>
            </div>
        </div>
        <div id="mini-progress-list" class="space-y-2 pb-24 overflow-y-auto"></div>
        <div class="fixed bottom-6 left-6 right-6">
            <button onclick="cerrarOperacionOficial()" class="btn-main !bg-emerald-600 shadow-xl shadow-emerald-100">FINALIZAR DESCARGA</button>
        </div>
    </div>

    <div id="view-historial" class="view">
        <h2 class="text-2xl font-black italic mb-6 uppercase tracking-tighter">Historial de <span class="text-blue-600">Actividad</span></h2>
        <div id="history-list" class="pb-20"></div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_items = {};
        let currentMani = [];
        let activeJob = null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                const raw = await res.json();
                raw.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().trim().toUpperCase()] = r.DESCRIPCION; });
            } catch (e) { console.warn("Modo offline o error de DB"); }
            
            activeJob = JSON.parse(localStorage.getItem('tj_active'));
            if (activeJob) resumeOps();
        }

        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('overlay');
            menu.classList.toggle('open');
            overlay.style.display = menu.classList.contains('open') ? 'block' : 'none';
        }

        function navTo(v) {
            toggleMenu();
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'historial') renderHistory();
        }

        function smartSearch() {
            const val = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('results');
            if(val.length < 2) { resDiv.classList.add('hidden'); return; }
            
            const matches = Object.entries(db_items).filter(([sku, desc]) => 
                sku.includes(val) || desc.toUpperCase().includes(val)
            ).slice(0, 8);

            resDiv.innerHTML = matches.map(([sku, desc]) => `
                <div onclick="setProd('${sku}')" class="p-3 border-b border-slate-50 flex flex-col">
                    <span class="font-black text-xs">${sku}</span>
                    <span class="text-[9px] text-slate-400 uppercase truncate">${desc}</span>
                </div>
            `).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(sku) { 
            document.getElementById('s-sku').value = sku; 
            document.getElementById('live-desc-preview').innerText = db_items[sku];
            document.getElementById('results').classList.add('hidden'); 
            document.getElementById('s-meta').focus(); 
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "S/D", meta, real: 0 });
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderPreList() {
            document.getElementById('pre-list').innerHTML = currentMani.map((i, idx) => `
                <div class="flex justify-between items-center py-3 text-xs">
                    <div class="flex-1"><p class="font-bold">${i.sku}</p><p class="text-[8px] text-slate-400 uppercase">${i.desc}</p></div>
                    <p class="font-black text-blue-600">${i.meta} CJ</p>
                    <button onclick="currentMani.splice(${idx},1);renderPreList()" class="ml-4 text-slate-300">×</button>
                </div>
            `).join('');
        }

        function finalizarCargaConfig() {
            const id = document.getElementById('c-id').value || "CONT-" + Date.now().toString().slice(-4);
            const obj = { id, items: [...currentMani], fecha: new Date().toLocaleString(), status: 'PENDIENTE' };
            let history = JSON.parse(localStorage.getItem('tj_history')) || [];
            history.unshift(obj);
            localStorage.setItem('tj_history', JSON.stringify(history));
            currentMani = []; renderPreList(); navTo('historial');
        }

        function loadForOps(id) {
            let history = JSON.parse(localStorage.getItem('tj_history'));
            activeJob = history.find(h => h.id === id);
            activeJob.status = "EN DESCARGA";
            localStorage.setItem('tj_active', JSON.stringify(activeJob));
            resumeOps();
        }

        function resumeOps() {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-ops').classList.add('active');
            document.getElementById('op-title').innerText = "TRABAJANDO EN: " + activeJob.id;
            document.getElementById('sel-sku').innerHTML = activeJob.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            renderMiniBars();
        }

        function registrarBulto() {
            const val = parseInt(document.getElementById('qty-in').value);
            if(!val) return;
            activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value).real += val;
            document.getElementById('qty-in').value = '';
            localStorage.setItem('tj_active', JSON.stringify(activeJob));
            renderMiniBars();
        }

        function renderMiniBars() {
            document.getElementById('mini-progress-list').innerHTML = activeJob.items.map(i => {
                const pc = Math.min(Math.round((i.real / i.meta) * 100), 100);
                return `<div class="bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                    <div class="flex justify-between text-[10px] font-bold mb-1"><span>${i.sku}</span><span>${i.real}/${i.meta}</span></div>
                    <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-blue-600" style="width:${pc}%"></div></div>
                </div>`;
            }).join('');
        }

        // --- CORRECCIÓN FINALIZAR Y PDF ---
        function cerrarOperacionOficial() {
            if(!activeJob) return;
            
            // 1. Guardar en Historial como Completado
            let history = JSON.parse(localStorage.getItem('tj_history')) || [];
            const idx = history.findIndex(h => h.id === activeJob.id);
            activeJob.status = "COMPLETADO";
            if(idx !== -1) history[idx] = activeJob; else history.unshift(activeJob);
            localStorage.setItem('tj_history', JSON.stringify(history));

            // 2. Generar Reporte PDF
            generarPDF(activeJob);

            // 3. Limpiar y Salir
            localStorage.removeItem('tj_active');
            activeJob = null;
            navTo('home');
        }

        function generarPDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 35, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(18); doc.text("REPORTE DE CARGA", 14, 22);
            
            doc.setTextColor(0,0,0); doc.setFontSize(9);
            doc.text(`CONTENEDOR: ${data.id}`, 14, 45);
            doc.text(`FECHA: ${data.fecha}`, 14, 50);

            doc.autoTable({
                startY: 60,
                head: [['CÓDIGO', 'PRODUCTO', 'CAJAS PACK', 'CAJAS FISICO', 'OK']],
                body: data.items.map(i => [
                    i.sku, i.desc.slice(0, 30), i.meta, i.real, (i.real === i.meta ? 'OK' : 'X')
                ]),
                theme: 'grid',
                headStyles: { fillColor: [37, 99, 235] }
            });

            doc.setFontSize(8); 
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 15);
            doc.save(`REPORTE_${data.id}.pdf`);
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('tj_history')) || [];
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="card-hist">
                    <div class="flex justify-between mb-2">
                        <span class="text-[8px] font-bold uppercase px-2 py-0.5 rounded bg-slate-50">${h.status}</span>
                        <span class="text-[9px] text-slate-300">${h.fecha}</span>
                    </div>
                    <h3 class="font-black uppercase text-slate-800">${h.id}</h3>
                    <div class="flex gap-2 mt-4">
                        ${h.status !== 'COMPLETADO' ? `<button onclick="loadForOps('${h.id}')" class="btn-main !py-2 !text-[10px] btn-blue flex-1">CONTINUAR</button>` : ''}
                        <button onclick='generarPDF(${JSON.stringify(h)})' class="btn-main !py-2 !text-[10px] !bg-slate-100 !text-slate-800 flex-1">DESCARGAR PDF</button>
                    </div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
