<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Devoluciones - Twins Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .active-tab { border-bottom: 4px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-white shadow-md sticky top-0 z-10">
        <div class="flex justify-around p-4">
            <button onclick="showSection('devolucion')" id="tab-devolucion" class="font-bold pb-2 active-tab text-lg">📦 Devolución</button>
            <button onclick="showSection('historial')" id="tab-historial" class="font-bold pb-2 text-gray-500 text-lg">📜 Historial</button>
        </div>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">

        <section id="sec-devolucion" class="space-y-4">
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-bold mb-4 text-gray-700">Nueva Devolución</h2>
                
                <div class="space-y-3">
                    <label class="block">
                        <span class="text-gray-600 italic">Nombre del Cliente</span>
                        <input type="text" id="cliente" oninput="sugerirVendedor()" placeholder="Escribe el nombre del cliente..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </label>

                    <label class="block">
                        <span class="text-gray-600 italic">Vendedor Asignado</span>
                        <select id="vendedor" class="w-full p-3 border rounded-lg bg-gray-50">
                            <option value="">Selecciona un vendedor</option>
                            <option value="Elias Ávila">Elias Ávila</option>
                            <option value="Evelyn Muro">Evelyn Muro</option>
                            <option value="Regulo Antezana">Regulo Antezana</option>
                            <option value="Paula García">Paula García</option>
                            <option value="Jhayro Mauricio">Jhayro Mauricio</option>
                        </select>
                    </label>

                    <hr class="my-4">

                    <label class="block">
                        <span class="text-gray-600 italic">Producto (Datos de tu Excel)</span>
                        <input type="text" id="producto" placeholder="Código o nombre del producto..." class="w-full p-3 border rounded-lg">
                    </label>

                    <div class="grid grid-cols-2 gap-4">
                        <label>
                            <span class="text-gray-600 italic">Cant. Recibida</span>
                            <input type="number" id="cantRecibida" class="w-full p-3 border rounded-lg">
                        </label>
                        <label>
                            <span class="text-gray-600 italic">Cant. Aprobada</span>
                            <input type="number" id="cantAprobada" class="w-full p-3 border rounded-lg">
                        </label>
                    </div>

                    <label class="flex items-center space-x-3 mt-4">
                        <input type="checkbox" id="estadoFisico" class="w-5 h-5">
                        <span class="text-gray-700 font-medium text-sm">¿Producto completo y revisado?</span>
                    </label>
                </div>

                <button onclick="guardarDevolucion()" class="w-full mt-6 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                    Finalizar y Generar Reporte
                </button>
            </div>
        </section>

        <section id="sec-historial" class="hidden space-y-4">
            <h2 class="text-xl font-bold text-gray-700">Historial de Reportes</h2>
            <div id="lista-historial" class="space-y-3">
                <p class="text-gray-500 text-center italic">No hay registros aún.</p>
            </div>
        </section>

    </main>

    <script>
        // Lógica simple para sugerir vendedor (Memoria Temporal)
        const memoriaClientes = {
            "Cliente A": "Elias Ávila",
            "Cliente B": "Evelyn Muro"
        };

        function sugerirVendedor() {
            const cliente = document.getElementById('cliente').value;
            const selectVendedor = document.getElementById('vendedor');
            if (memoriaClientes[cliente]) {
                selectVendedor.value = memoriaClientes[cliente];
            }
        }

        function showSection(section) {
            document.getElementById('sec-devolucion').classList.toggle('hidden', section !== 'devolucion');
            document.getElementById('sec-historial').classList.toggle('hidden', section !== 'historial');
            
            document.getElementById('tab-devolucion').classList.toggle('active-tab', section === 'devolucion');
            document.getElementById('tab-historial').classList.toggle('active-tab', section === 'historial');
        }

        const historial = [];

        function guardarDevolucion() {
            const data = {
                id: Date.now(),
                fecha: new Date().toLocaleDateString(),
                cliente: document.getElementById('cliente').value,
                vendedor: document.getElementById('vendedor').value,
                producto: document.getElementById('producto').value,
                aprobado: document.getElementById('cantAprobada').value
            };

            if(!data.cliente || !data.producto) return alert("Por favor completa los datos básicos.");

            historial.unshift(data);
            actualizarHistorial();
            alert("Reporte guardado. Revisión autorizada por J. Angelo Nuñez Durand.");
            limpiarFormulario();
            showSection('historial');
        }

        function actualizarHistorial() {
            const contenedor = document.getElementById('lista-historial');
            contenedor.innerHTML = historial.map(item => `
                <div class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-500">
                    <p class="text-sm text-gray-400">${item.fecha}</p>
                    <p class="font-bold">${item.cliente}</p>
                    <p class="text-sm text-gray-600">Prod: ${item.producto} | Aprobado: ${item.aprobado}</p>
                    <p class="text-xs text-blue-600 font-semibold mt-1">Vendedor: ${item.vendedor}</p>
                </div>
            `).join('');
        }

        function limpiarFormulario() {
            document.getElementById('cliente').value = '';
            document.getElementById('producto').value = '';
            document.getElementById('cantRecibida').value = '';
            document.getElementById('cantAprobada').value = '';
        }
    </script>
</body>
</html>
