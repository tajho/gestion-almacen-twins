<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twins Logistics | Aura Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f7ff; --surface: #0a0a0f; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--surface); color: #fff; overflow-y: auto; min-height: 100vh; }
        
        .view { display: none; min-height: 100vh; flex-direction: column; padding: 24px; padding-bottom: 140px; }
        .view.active { display: flex; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-panel { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 28px; }
        
        .dock { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); padding: 8px; border-radius: 40px; border: 1px solid var(--border); display: flex; gap: 8px; z-index: 1000; }
        .dock-item { display: flex; align-items: center; gap: 10px; padding: 14px 24px; border-radius: 32px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: rgba(255,255,255,0.4); }
        .dock-item.active { background: #fff; color: #000; }

        input, select { background: rgba(255,255,255,0.05)!important; border: 1px solid var(--border)!important; color: #fff!important; border-radius: 16px!important; padding: 16px!important; outline: none!important; }
        #suggestions { position: absolute; width: 100%; top: 100%; z-index: 100; max-height: 200px; overflow-y: auto; margin-top: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .suggestion-item { padding: 14px; background: #16161e; border-bottom: 1px solid var(--border); cursor: pointer; }
    </style>
</head>
<body>

    <nav class="dock">
        <button onclick="navTo('dash')" class="dock-item active" id="n-dash"><i class="ph-duotone ph-house"></i> Hoy</button>
        <button onclick="navTo('work')" class="dock-item" id="n-work"><i class="ph-duotone ph-scan"></i> Carga</button>
    </nav>

    <div id="v-dash" class="view active">
        <header class="pt-10 pb-8 text-center">
            <h1 class="text-4xl font-black italic">TWINS <span style="color:var(--accent)">LOGISTICS</span></h1>
            <p class="text-[8px] font-bold text-white/30 uppercase tracking-[0.5em] mt-1">Revisión Autorizada por J. Angelo</p>
        </header>
        
        <h3 class="text-[10px] font-black uppercase text-white/20 mb-4 ml-2">Historial de Descargas</h3>
        <div id="history-feed" class="space-y-3">
            </div>
    </div>

    <div id="v-work" class="view">
        <div id="setup-panel">
            <h2 class="text-3xl font-black mb-6">Nuevo Contenedor</h2>
            <div class="glass-panel p-6 space-y-4 relative">
                <div class="relative">
                    <label class="text-[9px] font-black uppercase text-white/30 ml-2 mb-2 block">Buscar en Maestra (Hoja 1)</label>
                    <input type="text" id="sku-in" oninput="searchInSheet1(this.value)" class="w-full font-bold" placeholder="Escribe SKU..." autocomplete="off">
                    <div id="suggestions" class="glass-panel hidden overflow-hidden"></div>
                </div>
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="text-[9px] font-black uppercase text-white/30 ml-2 mb-2 block">Meta de Carga</label>
                        <input type="number" id="meta-in" class="w-full text-center font-black" placeholder="0">
                    </div>
                    <button onclick="addItem()" class="mt-6 px-6 rounded-xl bg-white text-black font-black uppercase text-[10px]">Añadir</button>
                </div>
            </div>
            <div id="q-list" class="mt-6 space-y-2"></div>
            <button onclick="startCounting()" class="w-full py-5 rounded-2xl font-black text-xs uppercase mt-8 text-white bg-gradient-to-r from-blue-600 to-cyan-500 shadow-lg">
                Iniciar Conteo de Contenedor
            </button>
        </div>

        <div id="terminal-panel" class="hidden flex-1 flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p id="disp-id" class="text-[10px] font-bold text-accent uppercase mb-1"></p>
                    <h2 class="text-2xl font-black">Descarga en Curso</h2>
                </div>
                <button onclick="openSaveModal()" class="w-12 h-12 glass-panel flex items-center justify-center text-green-400">
                    <i class="ph-bold ph-floppy-disk"></i>
                </button>
            </div>
            
            <div class="glass-panel p-6 mb-6 text-center">
                <select id="sku-sel" onchange="updateUI()" class="bg-transparent text-white w-full p-2 mb-4 text-xl font-black outline-none"></select>
                <div class="flex items-center gap-4 justify-center">
                    <input type="number" id="count-in" class="w-28 p-4 rounded-xl text-4xl font-black text-center" placeholder="0">
                    <button onclick="addCount()" class="w-16 h-16 rounded-2xl bg-accent text-black flex items-center justify-center shadow-lg">
                        <i class="ph-bold ph-plus text-2xl"></i>
                    </button>
                </div>
            </div>
            <div id="stat-list" class="space-y-2 overflow-y-auto"></div>
        </div>
    </div>

    <div id="m-final" class="fixed inset-0 z-[2000] bg-black/90 backdrop-blur-md hidden flex items-center justify-center p-6 text-center">
        <div class="glass-panel p-8 max-w-sm w-full">
            <i class="ph-duotone ph-database text-5xl text-accent mb-4 block"></i>
            <h3 class="text-xl font-black mb-2 text-white">¿Guardar y Finalizar?</h3>
            <p class="text-[10px] text-white/40 mb-6 uppercase">Se registrará en el historial y Hoja 2</p>
            <button id="save-btn" onclick="saveToHoja2()" class="w-full py-4 rounded-xl bg-white text-black font-black uppercase text-xs mb-3">Guardar Registro</button>
            <button onclick="closeSaveModal()" class="text-white/30 text-[10px] font-bold uppercase">Continuar Conteo</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let hoja1Products = [];
        let checklist = [], currentOp = null;

        // INICIO
        window.onload = async () => {
            const saved = localStorage.getItem('aura_current');
            if(saved) { currentOp = JSON.parse(saved); showTerminal(); }
            renderHistory();
            loadSheet1();
        };

        async function loadSheet1() {
            try {
                const res = await fetch(API_URL);
                hoja1Products = await res.json();
            } catch(e) { console.error("Error Hoja 1"); }
        }

        // BUSCADOR (HOJA 1)
        function searchInSheet1(query) {
            const div = document.getElementById('suggestions');
            if (query.length < 2) { div.classList.add('hidden'); return; }
            const matches = hoja1Products.filter(p => p.sku.toLowerCase().includes(query.toLowerCase())).slice(0, 5);
            div.innerHTML = matches.map(m => `<div class="suggestion-item" onclick="selectSku('${m.sku}')"><p class="font-bold text-accent text-sm">${m.sku}</p></div>`).join('');
            div.classList.toggle('hidden', matches.length === 0);
        }

        function selectSku(sku) {
            document.getElementById('sku-in').value = sku;
            document.getElementById('suggestions').classList.add('hidden');
        }

        function addItem() {
            const sku = document.getElementById('sku-in').value;
            const meta = parseInt(document.getElementById('meta-in').value);
            if(!sku || !meta) return;
            checklist.push({ sku, meta, r: 0 });
            document.getElementById('sku-in').value = '';
            document.getElementById('meta-in').value = '';
            renderChecklist();
        }

        function renderChecklist() {
            document.getElementById('q-list').innerHTML = checklist.map((it, i) => `
                <div class="glass-panel p-4 flex justify-between items-center text-sm font-bold">
                    <span>${it.sku} <span class="text-accent ml-2">META: ${it.meta}</span></span>
                    <button onclick="checklist.splice(${i},1);renderChecklist()" class="text-red-500"><i class="ph-bold ph-trash"></i></button>
                </div>`).join('');
        }

        // PÁGINA 3: CONTEO
        function startCounting() {
            if(checklist.length === 0) return alert("Agrega ítems");
            currentOp = { 
                id: `TW-${Date.now().toString().slice(-4)}`, 
                items: [...checklist], 
                date: new Date().toLocaleString() 
            };
            checklist = [];
            localStorage.setItem('aura_current', JSON.stringify(currentOp));
            showTerminal();
        }

        function showTerminal() {
            document.getElementById('setup-panel').classList.add('hidden');
            document.getElementById('terminal-panel').classList.remove('hidden');
            document.getElementById('disp-id').innerText = currentOp.id;
            document.getElementById('sku-sel').innerHTML = currentOp.items.map(x => `<option value="${x.sku}">${x.sku}</option>`).join('');
            updateUI();
        }

        function addCount() {
            const val = parseInt(document.getElementById('count-in').value);
            if(!val && val !== 0) return;
            const sku = document.getElementById('sku-sel').value;
            const item = currentOp.items.find(x => x.sku === sku);
            if(item) { item.r += val; document.getElementById('count-in').value = ''; updateUI(); localStorage.setItem('aura_current', JSON.stringify(currentOp)); }
        }

        function updateUI() {
            document.getElementById('stat-list').innerHTML = currentOp.items.map(x => `
                <div class="glass-panel p-4 mb-2">
                    <div class="flex justify-between text-[10px] font-black uppercase mb-2">
                        <span>${x.sku}</span><span class="text-accent">${x.r} / ${x.meta}</span>
                    </div>
                    <div class="h-1 bg-white/5 rounded-full overflow-hidden"><div class="h-full bg-accent" style="width:${Math.min((x.r/x.meta)*100,100)}%"></div></div>
                </div>`).join('');
        }

        // GUARDAR (HOJA 2)
        function openSaveModal() { document.getElementById('m-final').classList.remove('hidden'); }
        function closeSaveModal() { document.getElementById('m-final').classList.add('hidden'); }

        async function saveToHoja2() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "REGISTRANDO EN HOJA 2...";
            btn.disabled = true;

            try {
                await fetch(API_URL, {
                    method: "POST", mode: "no-cors",
                    body: JSON.stringify({ accion: "guardar_contenedor", id: currentOp.id, fecha: currentOp.date, detalles: currentOp.items })
                });

                let history = JSON.parse(localStorage.getItem('aura_history') || '[]');
                history.unshift(currentOp);
                localStorage.setItem('aura_history', JSON.stringify(history));
                localStorage.removeItem('aura_current');
                
                alert("Guardado en Hoja 2. Ve al historial para descargar el PDF.");
                location.reload();
            } catch(e) { alert("Error de conexión"); btn.disabled = false; btn.innerText = "Guardar Registro"; }
        }

        // PÁGINA 1: HISTORIAL Y PDF
        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('aura_history') || '[]');
            const feed = document.getElementById('history-feed');
            
            feed.innerHTML = history.map((h, i) => `
                <div class="glass-panel p-5 flex justify-between items-center">
                    <div>
                        <p class="text-[8px] text-white/20 font-black uppercase">${h.date}</p>
                        <p class="font-black text-sm">${h.id}</p>
                    </div>
                    <button onclick='createPDF(${i})' class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center shadow-lg">
                        <i class="ph-bold ph-file-pdf text-xl"></i>
                    </button>
                </div>`).join('') || '<p class="text-center py-10 text-white/10 uppercase font-bold text-xs">Sin registros</p>';
        }

        function createPDF(index) {
            const history = JSON.parse(localStorage.getItem('aura_history') || '[]');
            const d = history[index];
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Estética del PDF
            doc.setFillColor(15, 15, 25);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text("TWINS LOGISTICS", 14, 25);
            doc.setFontSize(8);
            doc.text("SISTEMA DE GESTIÓN DE INVENTARIOS", 14, 32);

            doc.setTextColor(0);
            doc.setFontSize(10);
            doc.text(`ID OPERACIÓN: ${d.id}`, 14, 50);
            doc.text(`FECHA DE REPORTE: ${d.date}`, 14, 55);

            doc.autoTable({
                startY: 65,
                head: [['SKU', 'META', 'REAL', 'DIFERENCIA']],
                body: d.items.map(it => [it.sku, it.meta, it.r, (it.r - it.meta)]),
                theme: 'grid',
                headStyles: { fillColor: [0, 247, 255], textColor: [0, 0, 0] }
            });

            const finalY = doc.lastAutoTable.finalY + 20;
            doc.text("_______________________________________", 14, finalY);
            doc.setFont("helvetica", "bold");
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, finalY + 7);
            doc.setFont("helvetica", "normal");
            doc.text("Asist. Inventario Logístico", 14, finalY + 12);

            // Descarga segura
            doc.save(`Twins_${d.id}.pdf`);
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.dock-item').forEach(e => e.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            document.getElementById('n-' + v).classList.add('active');
            if(v === 'dash') renderHistory();
        }
    </script>
</body>
</html>
