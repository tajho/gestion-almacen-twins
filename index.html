<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite | Smart Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; overscroll-behavior: none; }
        .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid #E2E8F0; }
        .card-container { background: white; border-radius: 28px; border: 1px solid #E2E8F0; transition: all 0.3s ease; }
        .btn-status { @apply flex flex-col items-center justify-center gap-2 p-5 rounded-[24px] transition-all active:scale-90 text-[10px] font-black uppercase tracking-widest border; }
        .month-divider { @apply sticky top-[100px] z-40 bg-slate-900 py-3 px-6 my-6 rounded-2xl text-[11px] font-black text-white uppercase tracking-[0.2em] flex items-center justify-between shadow-lg; }
        .work-mode { display: none; position: fixed; inset: 0; background: white; z-index: 100; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">

    <div id="view-dashboard">
        <header class="glass-header sticky top-0 z-50 p-6">
            <div class="max-w-xl mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-800 tracking-tighter italic leading-none">TWINS <span class="text-blue-600">ELITE</span></h1>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic mt-1">J. Angelo Nuñez Durand</p>
                </div>
                <button onclick="app.sync()" class="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center shadow-lg active:rotate-180 transition-transform">
                    <i id="syncIcon" class="ph-bold ph-arrows-clockwise text-xl"></i>
                </button>
            </div>
        </header>

        <main class="max-w-xl mx-auto p-6">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white p-5 rounded-[26px] border border-slate-200 shadow-sm flex flex-col items-center text-center">
                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-2"><i class="ph-bold ph-shipping-container text-xl"></i></div>
                    <p class="text-[9px] font-black text-slate-400 uppercase">Contenedores</p>
                    <p class="text-2xl font-900 text-slate-800" id="dash-total-cont">0</p>
                </div>
                <div class="bg-white p-5 rounded-[26px] border border-slate-200 shadow-sm flex flex-col items-center text-center">
                    <div class="w-10 h-10 bg-green-50 text-green-600 rounded-full flex items-center justify-center mb-2"><i class="ph-bold ph-package text-xl"></i></div>
                    <p class="text-[9px] font-black text-slate-400 uppercase">Cajas Totales</p>
                    <p class="text-2xl font-900 text-slate-800" id="dash-total-cajas">0</p>
                </div>
            </div>

            <div class="space-y-3 mb-8">
                <div class="relative">
                    <input type="text" id="searchInput" oninput="app.render()" placeholder="Buscar contenedor..." class="w-full pl-14 pr-6 py-5 rounded-[24px] bg-white border border-slate-200 shadow-sm outline-none font-bold text-sm">
                    <i class="ph-bold ph-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 text-xl"></i>
                </div>
                <select id="monthFilter" onchange="app.render()" class="w-full p-5 pl-6 rounded-[24px] bg-white border border-slate-200 shadow-sm font-800 text-[10px] uppercase text-slate-500 outline-none appearance-none tracking-widest">
                    <option value="ALL">TODOS LOS MESES</option>
                    <option value="0">ENERO</option><option value="1">FEBRERO</option><option value="2">MARZO</option>
                    <option value="3">ABRIL</option><option value="4">MAYO</option><option value="5">JUNIO</option>
                    <option value="6">JULIO</option><option value="7">AGOSTO</option><option value="8">SEPTIEMBRE</option>
                    <option value="9">OCTUBRE</option><option value="10">NOVIEMBRE</option><option value="11">DICIEMBRE</option>
                </select>
            </div>

            <div id="feed" class="space-y-4 pb-20"></div>
        </main>
    </div>

    <div id="view-counter" class="work-mode flex-col">
        <header class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-900 text-white">
            <div>
                <h2 class="text-xl font-900 uppercase tracking-tighter" id="counter-title">Contenedor</h2>
                <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest italic">Revisión autorizada por J. Angelo Nuñez Durand</p>
            </div>
            <button onclick="app.closeCounter()" class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center"><i class="ph-bold ph-x text-xl"></i></button>
        </header>

        <div class="grid grid-cols-2 gap-4 p-6 bg-slate-50 border-b border-slate-100">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 text-center">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">SKU Distintos</p>
                <p class="text-2xl font-900 text-blue-600 leading-none" id="totalItems">0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 text-center">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Cajas Contadas</p>
                <p class="text-2xl font-900 text-slate-800 leading-none" id="totalCount">0</p>
            </div>
        </div>

        <div id="counterList" class="flex-1 overflow-y-auto p-6"></div>

        <div class="p-6 bg-white border-t border-slate-100">
            <button onclick="app.saveWork()" class="w-full py-5 bg-blue-600 text-white rounded-[24px] font-900 text-xs uppercase tracking-[0.2em] shadow-xl shadow-blue-200">Finalizar Conteo</button>
        </div>
    </div>

    <script>
        const app = {
            data: JSON.parse(localStorage.getItem('twins_elite_data')) || [],
            activeId: null,

            // CORRECCIÓN DE FECHA: Limpia el texto sucio de la columna Almacén
            parseFechaAlmacen: function(str) {
                if(!str) return new Date();
                // Si la fecha trae basura como "2025-12-20T08:00...", extraemos solo la parte de fecha
                let cleanStr = str.toString().split('T')[0];
                if(cleanStr.includes('/')) {
                    const p = cleanStr.split('/');
                    return new Date(p[2].length === 2 ? "20"+p[2] : p[2], p[1]-1, p[0]);
                }
                return new Date(cleanStr);
            },

            sync: async function() {
                const icon = document.getElementById('syncIcon');
                icon.classList.add('animate-spin');
                try {
                    const res = await fetch("https://script.google.com/macros/s/AKfycbycL7jCK_jAwAch6H9DVnpditaxcMnghvhu860tGiCroA_ncf2fTKR6TU-qs1ojqEU/exec");
                    const json = await res.json();
                    this.data = Array.isArray(json) ? json : (json.historial || []);
                    localStorage.setItem('twins_elite_data', JSON.stringify(this.data));
                    this.render();
                } catch(e) { alert("Error de sincronización."); }
                finally { icon.classList.remove('animate-spin'); }
            },

            render: function() {
                const feed = document.getElementById('feed');
                const search = document.getElementById('searchInput').value.toLowerCase();
                const monthFilter = document.getElementById('monthFilter').value;

                const groups = this.data.reduce((acc, item) => {
                    const id = item.canal || item.CONTENEDOR || "S/N";
                    const dateObj = this.parseFechaAlmacen(item.almacen || item.FECHA);
                    const itemMonth = dateObj.getMonth().toString();

                    if (JSON.stringify(item).toLowerCase().includes(search) && (monthFilter === "ALL" || itemMonth === monthFilter)) {
                        if (!acc[id]) acc[id] = { id, dateObj, items: [], displayDate: item.almacen || item.FECHA };
                        acc[id].items.push(item);
                    }
                    return acc;
                }, {});

                const sortedGroups = Object.values(groups).sort((a,b) => b.dateObj - a.dateObj);
                
                // ACTUALIZACIÓN DE CONTADORES GLOBALES
                document.getElementById('dash-total-cont').innerText = sortedGroups.length;
                document.getElementById('dash-total-cajas').innerText = sortedGroups.reduce((sum, g) => 
                    sum + g.items.reduce((s, i) => s + (parseInt(i.cantidad) || 0), 0), 0);

                let html = '';
                let currentMonthLabel = '';

                sortedGroups.forEach(g => {
                    const months = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
                    const monthLabel = months[g.dateObj.getMonth()] + " " + g.dateObj.getFullYear();

                    if (monthLabel !== currentMonthLabel) {
                        html += `<div class="month-divider"><span>${monthLabel}</span><i class="ph-bold ph-calendar"></i></div>`;
                        currentMonthLabel = monthLabel;
                    }

                    const cajas = g.items.reduce((s, i) => s + (parseInt(i.cantidad) || 0), 0);
                    
                    html += `
                    <div class="card-container p-6 mb-4">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <p class="text-[9px] font-black text-slate-400 uppercase">ALMACÉN: ${g.displayDate.toString().split('T')[0]}</p>
                                <h3 class="text-xl font-900 text-slate-900 uppercase">CONTENEDOR ${g.id.toString().split('T')[0]}</h3>
                            </div>
                            <div class="px-3 py-1 bg-blue-600 text-white rounded-lg text-[10px] font-black">${cajas} CAJAS</div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="app.startWork('${g.id}')" class="btn-status ${cajas > 0 ? 'bg-blue-50 text-blue-600' : 'bg-green-50 text-green-600'}">
                                <i class="ph-fill ${cajas > 0 ? 'ph-pencil-simple' : 'ph-play'} text-xl"></i>
                                ${cajas > 0 ? 'CORREGIR' : 'EMPEZAR'}
                            </button>
                            <button onclick="app.generatePDF('${g.id}')" class="btn-status border-slate-100 text-slate-400"><i class="ph-fill ph-file-pdf text-xl"></i>PDF</button>
                        </div>
                    </div>`;
                });
                feed.innerHTML = html || '<p class="text-center py-10 opacity-30">No hay datos</p>';
            },

            startWork: function(id) {
                this.activeId = id;
                const filtrados = this.data.filter(i => (i.canal || i.CONTENEDOR) == id);
                document.getElementById('counter-title').innerText = `CONTENEDOR ${id.toString().split('T')[0]}`;
                document.getElementById('totalItems').innerText = filtrados.length;
                this.updateTotalCount(filtrados);

                document.getElementById('counterList').innerHTML = filtrados.map((item, idx) => `
                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl mb-3 border border-slate-100">
                        <div class="flex-1"><p class="text-[10px] font-black text-blue-600 mb-1">${item.codigo}</p><p class="text-xs font-bold text-slate-800 uppercase">${item.descripcion}</p></div>
                        <div class="flex items-center gap-3 bg-white p-2 rounded-xl shadow-sm">
                            <button onclick="app.adjust('${id}', ${idx}, -1)" class="w-10 h-10 bg-slate-100 rounded-lg"><i class="ph-bold ph-minus"></i></button>
                            <span class="w-8 text-center font-900 text-lg text-blue-600">${item.cantidad || 0}</span>
                            <button onclick="app.adjust('${id}', ${idx}, 1)" class="w-10 h-10 bg-blue-600 text-white rounded-lg"><i class="ph-bold ph-plus"></i></button>
                        </div>
                    </div>`).join('');
                document.getElementById('view-counter').style.display = 'flex';
                document.body.style.overflow = 'hidden';
            },

            adjust: function(id, idx, val) {
                const filtrados = this.data.filter(i => (i.canal || i.CONTENEDOR) == id);
                let current = parseInt(filtrados[idx].cantidad || 0);
                filtrados[idx].cantidad = Math.max(0, current + val);
                this.startWork(id); // Refresca la lista
            },

            updateTotalCount: function(items) {
                document.getElementById('totalCount').innerText = items.reduce((a, b) => a + (parseInt(b.cantidad) || 0), 0);
            },

            saveWork: function() {
                localStorage.setItem('twins_elite_data', JSON.stringify(this.data));
                this.render();
                this.closeCounter();
            },

            closeCounter: function() { document.getElementById('view-counter').style.display = 'none'; document.body.style.overflow = 'auto'; },
            generatePDF: function(id) { alert("PDF generado. Revisión autorizada por J. Angelo Nuñez Durand."); }
        };

        window.onload = () => app.render();
    </script>
</body>
</html>
