<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v55 - Hyper-Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; height: 100vh; overflow: hidden; margin: 0; }
        
        /* Contenedores de Pantalla Completa sin Scroll */
        .view { display: none; height: 100vh; padding: 1.2rem; flex-direction: column; box-sizing: border-box; }
        .view.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Tarjetas Estilo App Premium */
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        
        .nav-btn { background: var(--card); border-radius: 1.5rem; padding: 1rem; display: flex; align-items: center; gap: 1rem; border: 1px solid rgba(255,255,255,0.03); height: 28%; position: relative; overflow: hidden; transition: 0.2s; }
        .nav-btn:active { transform: scale(0.96); background: #334155; }
        .nav-btn::after { content: ''; position: absolute; right: -10px; bottom: -10px; width: 60px; height: 60px; background: var(--accent); opacity: 0.1; border-radius: 50%; }

        /* Animación del Contenedor Avanzada */
        .logistics-track { height: 50px; background: rgba(255,255,255,0.03); border-radius: 1rem; position: relative; overflow: hidden; border: 1px dashed rgba(255,255,255,0.1); }
        .truck-glow { position: absolute; height: 100%; background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.2)); transition: width 0.8s ease; }
        .truck-icon { position: absolute; top: 50%; transform: translateY(-50%); transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); filter: drop-shadow(0 0 8px var(--accent)); }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateY(-50%) translateX(0); } 25% { transform: translateY(-50%) translateX(-2px); } 75% { transform: translateY(-50%) translateX(2px); } }

        /* Inputs de Alta Tecnología */
        .tech-input { background: #0f172a; border: 1px solid #334155; border-radius: 1rem; padding: 0.7rem 1rem; font-size: 0.9rem; font-weight: 700; color: white; width: 100%; outline: none; transition: 0.3s; }
        .tech-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        .btn-action { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border-radius: 1.2rem; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; padding: 1.2rem; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        .btn-action:active { transform: scale(0.92); }

        .scroll-list { flex-grow: 1; overflow-y: auto; margin: 0.5rem 0; padding-right: 5px; }
        .scroll-list::-webkit-scrollbar { width: 3px; }
        .scroll-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="fixed top-4 left-4 right-4 h-14 glass-card px-5 flex justify-between items-center z-[1000]">
        <button onclick="goHome()" class="text-blue-400 p-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></button>
        <div class="text-center">
            <p class="text-[10px] font-black italic tracking-[0.2em] text-white">TAJHO<span class="text-blue-500">.OS</span></p>
        </div>
        <div class="w-8"></div>
    </header>

    <div id="view-home" class="view pt-24">
        <h1 class="text-2xl font-black italic mb-6 leading-none">PANEL DE<br><span class="text-blue-500 uppercase text-3xl">COMANDO</span></h1>
        
        <div class="flex flex-col gap-4 flex-grow max-h-[65vh]">
            <div onclick="navTo('crear')" class="nav-btn">
                <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg></div>
                <div><p class="text-[14px] font-black uppercase">Contenedor</p><p class="text-[9px] font-bold text-slate-500 italic">NUEVA OPERACIÓN</p></div>
            </div>

            <div onclick="navTo('historial')" class="nav-btn">
                <div class="w-12 h-12 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-emerald-500"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div>
                <div><p class="text-[14px] font-black uppercase text-emerald-400">Registros</p><p class="text-[9px] font-bold text-slate-500 italic">HISTORIAL LOCAL</p></div>
            </div>

            <div class="nav-btn">
                <div class="w-12 h-12 bg-orange-500/10 rounded-2xl flex items-center justify-center text-orange-500"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M15 18l6-6-6-6"/></svg></div>
                <div><p class="text-[14px] font-black uppercase text-orange-400">Devoluciones</p><p class="text-[9px] font-bold text-slate-500 italic">LOGÍSTICA INVERSA</p></div>
            </div>
        </div>
    </div>

    <div id="view-ops" class="view pt-24">
        <div class="glass-card p-4 mb-6 relative overflow-hidden">
            <div class="flex justify-between items-end mb-2 relative z-10">
                <span class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Carga General</span>
                <span id="global-pc" class="text-2xl font-black italic text-white">0%</span>
            </div>
            <div class="logistics-track">
                <div id="truck-fill" class="truck-glow" style="width: 0%"></div>
                <div id="truck-icon" class="truck-icon" style="left: 0%">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" class="text-blue-500"><path d="M17 11h2v2h-2v-2zm-2-2v2h2v2h-2v2h2v2h-2v2h2v1c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2v4h-2zm-4 4H5v2h6v-2zm0-4H5v2h6v-2zm0-4H5v2h6V5z"/></svg>
                </div>
            </div>
        </div>

        <div class="text-center mb-6">
            <select id="sel-sku" onchange="syncItem()" class="text-2xl font-black bg-transparent text-white border-b-2 border-blue-500 w-full mb-1 text-center outline-none uppercase italic"></select>
            <p id="live-desc" class="text-[9px] font-bold text-blue-300 uppercase truncate px-5"></p>
        </div>

        <div class="flex flex-col gap-6 flex-grow justify-center pb-10">
            <div class="flex items-center justify-center gap-6">
                <div class="relative">
                    <input type="number" id="qty-in" class="tech-input w-28 h-20 text-center text-4xl !rounded-3xl" placeholder="0">
                    <span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-blue-600 text-[8px] px-2 py-0.5 rounded-full font-black">CANT</span>
                </div>
                <button onclick="registrarBulto()" class="w-20 h-20 bg-blue-600 text-white rounded-[2rem] flex items-center justify-center shadow-[0_0_20px_rgba(59,130,246,0.5)] active:scale-75 transition-all">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-4 text-center">
                    <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Diferencia</p>
                    <p id="live-rem" class="text-2xl font-black text-white">0</p>
                </div>
                <div class="glass-card p-4 text-center border-l-4 border-blue-500">
                    <p class="text-[8px] font-black text-blue-400 uppercase mb-1">Contado</p>
                    <p id="live-real" class="text-2xl font-black text-blue-400">0</p>
                </div>
            </div>

            <div class="px-2">
                <div class="flex justify-between mb-2">
                    <p class="text-[8px] font-black text-slate-500 uppercase italic">Progreso Item</p>
                    <p id="item-pc" class="text-[9px] font-black text-white">0%</p>
                </div>
                <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden">
                    <div id="item-bar" class="h-full bg-blue-500 transition-all duration-500 shadow-[0_0_10px_#3b82f6]" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <button onclick="finishAndReport()" class="btn-action w-full mt-auto">Firmar Manifiesto</button>
    </div>

    <div id="view-crear" class="view pt-24">
        <h2 class="text-xl font-black italic mb-4">SETUP <span class="text-blue-500">CARGA</span></h2>
        <div class="glass-card p-4 space-y-3">
            <div class="relative">
                <input type="text" id="s-sku" oninput="smartSearch()" class="tech-input" placeholder="BUSCAR SKU...">
                <div id="search-results" class="hidden absolute z-50 w-full bg-slate-800 border border-slate-700 rounded-xl shadow-2xl mt-2 max-h-24 overflow-y-auto"></div>
            </div>
            <div class="flex gap-3">
                <input type="number" id="s-meta" class="tech-input flex-1" placeholder="META">
                <button onclick="addMani()" class="w-14 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center active:scale-90"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg></button>
            </div>
        </div>

        <div class="scroll-list mt-4">
            <div id="pre-list" class="space-y-2"></div>
        </div>

        <button id="btn-done" onclick="openModal()" class="hidden btn-action w-full mt-2">Iniciar Operación</button>
    </div>

    <div id="view-historial" class="view pt-24">
        <h2 class="text-xl font-black italic mb-6">REGISTROS <span class="text-blue-500">RECIENTES</span></h2>
        <div id="history-list" class="scroll-list space-y-3"></div>
    </div>

    <div id="modal-choice" class="fixed inset-0 z-[2000] bg-black/60 backdrop-blur-sm hidden items-center justify-center p-8">
        <div class="glass-card w-full p-8 text-center animate-bounce-short">
            <h3 class="text-lg font-black mb-6 italic">¿INICIAR DESCARGA?</h3>
            <div class="flex flex-col gap-3">
                <button onclick="continuarConteo()" class="btn-action">Confirmar y Abrir</button>
                <button onclick="guardarMani()" class="btn-action !bg-slate-700 !shadow-none">Solo Guardar</button>
                <button onclick="closeModal()" class="text-[10px] font-black text-slate-500 uppercase mt-4">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_items = {};
        let currentMani = JSON.parse(localStorage.getItem('taj_cur')) || [];
        let history = JSON.parse(localStorage.getItem('taj_his')) || [];
        let activeJob = JSON.parse(localStorage.getItem('taj_active')) || null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                const raw = await res.json();
                raw.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().toUpperCase().trim()] = r.DESCRIPCION; });
                const lastView = localStorage.getItem('taj_view') || 'home';
                if(lastView === 'ops' && activeJob) startOps(activeJob);
                else navTo(lastView);
            } catch (e) { console.warn("Offline Mode"); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            localStorage.setItem('taj_view', v);
            if(v === 'historial') renderHistory();
            if(v === 'crear') renderPreList();
        }

        function goHome() { navTo('home'); }

        function smartSearch() {
            const input = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('search-results');
            if(input.length < 1) { resDiv.classList.add('hidden'); return; }
            const matches = Object.keys(db_items).filter(k => k.includes(input)).slice(0,5);
            resDiv.innerHTML = matches.map(k => `<div onclick="setProd('${k}')" class="p-3 border-b border-white/5 text-[10px] font-black uppercase text-blue-400">${k}</div>`).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(s) {
            document.getElementById('s-sku').value = s;
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "GENERICO", meta, real: 0 });
            localStorage.setItem('taj_cur', JSON.stringify(currentMani));
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
            navigator.vibrate(20);
        }

        function renderPreList() {
            const container = document.getElementById('pre-list');
            container.innerHTML = currentMani.map((i, idx) => `
                <div class="glass-card p-3 flex justify-between items-center text-[10px] font-black border-l-4 border-blue-500">
                    <span class="uppercase tracking-widest">${i.sku}</span>
                    <span class="text-blue-500">${i.meta} CJ</span>
                </div>
            `).join('');
            if(currentMani.length > 0) document.getElementById('btn-done').classList.remove('hidden');
        }

        function openModal() { document.getElementById('modal-choice').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-choice').style.display = 'none'; }

        function continuarConteo() {
            closeModal();
            activeJob = { id: Date.now(), name: "LOG-" + new Date().getHours() + new Date().getMinutes(), items: [...currentMani], status: 'PROCESO' };
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
            currentMani = []; localStorage.removeItem('taj_cur');
            startOps(activeJob);
        }

        function startOps(job) {
            navTo('ops');
            document.getElementById('sel-sku').innerHTML = job.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem();
        }

        function syncItem() {
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('live-desc').innerText = item.desc;
            document.getElementById('live-rem').innerText = Math.max(0, item.meta - item.real);
            document.getElementById('live-real').innerText = item.real;

            const itemPc = Math.min(Math.round((item.real / item.meta) * 100), 100);
            document.getElementById('item-bar').style.width = itemPc + "%";
            document.getElementById('item-pc').innerText = itemPc + "%";

            const totalM = activeJob.items.reduce((a,b) => a + b.meta, 0);
            const totalR = activeJob.items.reduce((a,b) => a + b.real, 0);
            const pc = Math.min(Math.round((totalR / totalM) * 100), 100);
            
            // Animación Interactiva
            document.getElementById('truck-fill').style.width = pc + "%";
            document.getElementById('truck-icon').style.left = `calc(${pc}% - 14px)`;
            document.getElementById('global-pc').innerText = pc + "%";
            
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
        }

        function registrarBulto() {
            const q = parseInt(document.getElementById('qty-in').value);
            if(!q) return;
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += q;
            
            // Efecto visual de sacudida al icono de carga
            const icon = document.getElementById('truck-icon');
            icon.classList.add('shake');
            setTimeout(() => icon.classList.remove('shake'), 400);

            document.getElementById('qty-in').value = '';
            syncItem();
            navigator.vibrate([30, 10, 30]);
            fetch(CLOUD_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({tipo:'CARGA', datos: [new Date().toLocaleString(), item.sku, q]})});
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="glass-card p-4 flex justify-between items-center border-r-4 ${h.status==='COMPLETADO'?'border-emerald-500':'border-blue-500'}">
                    <div>
                        <p class="text-[8px] font-black text-slate-500 uppercase mb-1">${h.status}</p>
                        <p class="text-[11px] font-black uppercase italic text-white">${h.name}</p>
                    </div>
                    <button onclick="startFromHistory(${h.id})" class="bg-white/5 text-white text-[9px] font-black px-4 py-2 rounded-xl border border-white/10 active:bg-blue-600">ABRIR</button>
                </div>
            `).join('');
        }

        function finishAndReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(14); doc.text("TAJHO.OS - REPORTE DE INVENTARIO", 14, 20);
            doc.autoTable({
                startY: 25, head: [['SKU', 'META', 'REAL', 'DIF']],
                body: activeJob.items.map(i => [i.sku, i.meta, i.real, i.meta-i.real]),
                theme: 'striped', headStyles: { fillColor: [30, 41, 59] }
            });
            const finalY = doc.lastAutoTable.finalY + 10;
            doc.setFontSize(8);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, finalY);
            doc.save(`REPORTE_${activeJob.name}.pdf`);
            activeJob.status = 'COMPLETADO';
            localStorage.setItem('taj_his', JSON.stringify(history));
            localStorage.removeItem('taj_active');
            navTo('historial');
        }

        init();
    </script>
</body>
</html>
