<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJHO Logistics Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfd; color: #1a1c21; height: 100vh; overflow: hidden; }
        
        /* Sistema de Capas Profesionales */
        .view { display: none; height: 100vh; padding: 1.5rem; flex-direction: column; }
        .view.active { display: flex; animation: reveal 0.5s cubic-bezier(0, 0, 0.2, 1); }
        @keyframes reveal { from { opacity: 0; transform: scale(0.99); } to { opacity: 1; transform: scale(1); } }

        /* Tarjetas de Navegación Premium */
        .nav-card { background: white; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #f0f1f3; box-shadow: 0 10px 30px rgba(0,0,0,0.03); display: flex; align-items: center; gap: 1.2rem; height: 26%; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .nav-card:active { transform: translateY(3px); box-shadow: 0 4px 10px rgba(0,0,0,0.02); background: #fbfbfc; }
        
        /* Iconografía Refinada */
        .icon-circle { width: 3.2rem; height: 3.2rem; border-radius: 1rem; display: flex; align-items: center; justify-content: center; background: #f5f7ff; color: #2563eb; }

        /* Contenedor Animado (Versión Ejecutiva) */
        .track-container { height: 40px; background: #f1f3f7; border-radius: 12px; position: relative; overflow: hidden; }
        .track-progress { height: 100%; background: #2563eb; width: 0%; transition: 1s cubic-bezier(0.65, 0, 0.35, 1); }
        .truck-overlay { position: absolute; top: 50%; transform: translateY(-50%); transition: left 1s cubic-bezier(0.65, 0, 0.35, 1); z-index: 20; color: #1a1c21; }

        /* Formulario Estilizado */
        .input-pro { background: #f8f9fb; border: 1.5px solid #eceef2; border-radius: 1rem; padding: 0.8rem 1.2rem; font-weight: 700; width: 100%; transition: 0.3s; font-size: 0.9rem; }
        .input-pro:focus { background: white; border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08); outline: none; }

        .btn-primary { background: #1a1c21; color: white; border-radius: 1rem; font-weight: 800; font-size: 0.8rem; letter-spacing: 0.05rem; text-transform: uppercase; padding: 1.2rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.3s; }
        .btn-primary:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full h-20 px-6 flex justify-between items-center z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div>
            <p class="text-[10px] font-black tracking-[0.3em] text-slate-400 uppercase leading-none">Intelligence</p>
            <h1 class="text-xl font-black italic">TAJHO<span class="text-blue-600">.OS</span></h1>
        </div>
        <button onclick="goHome()" class="p-3 bg-slate-50 rounded-2xl text-slate-400 active:text-blue-600 transition-colors">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </button>
    </header>

    <div id="view-home" class="view active pt-24">
        <div class="mb-8">
            <p class="text-blue-600 font-bold text-xs uppercase tracking-widest mb-1">Bienvenido, Angelo</p>
            <h2 class="text-3xl font-black text-slate-900 leading-tight">Gestión de<br>Inventarios</h2>
        </div>

        <div class="flex flex-col gap-4 flex-grow">
            <div onclick="navTo('crear')" class="nav-card">
                <div class="icon-circle">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
                </div>
                <div>
                    <h3 class="text-lg font-black text-slate-800 uppercase leading-none mb-1">Contenedor</h3>
                    <p class="text-[10px] font-bold text-slate-400 italic">CREAR NUEVO MANIFIESTO</p>
                </div>
                <div class="ml-auto text-slate-300"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg></div>
            </div>

            <div onclick="navTo('historial')" class="nav-card">
                <div class="icon-circle" style="background: #f0fdf4; color: #16a34a;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                </div>
                <div>
                    <h3 class="text-lg font-black text-slate-800 uppercase leading-none mb-1">Registros</h3>
                    <p class="text-[10px] font-bold text-slate-400 italic">HISTORIAL DE DESCARGAS</p>
                </div>
                <div class="ml-auto text-slate-300"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg></div>
            </div>

            <div class="nav-card">
                <div class="icon-circle" style="background: #fff7ed; color: #f97316;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m11 17-5-5 5-5"/><path d="M18 17v-3a4 4 0 0 0-4-4H6"/></svg>
                </div>
                <div>
                    <h3 class="text-lg font-black text-slate-800 uppercase leading-none mb-1">Devoluciones</h3>
                    <p class="text-[10px] font-bold text-slate-400 italic">LOGÍSTICA DE RETORNO</p>
                </div>
                <div class="ml-auto text-slate-300"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg></div>
            </div>
        </div>
    </div>

    <div id="view-ops" class="view pt-24">
        <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm mb-6">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Avance General</span>
                <span id="global-pc" class="text-xl font-black text-blue-600">0%</span>
            </div>
            <div class="track-container">
                <div id="truck-fill" class="track-progress"></div>
                <div id="truck-icon" class="truck-overlay" style="left: 0%">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm12 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
                </div>
            </div>
        </div>

        <div class="text-center mb-8 px-4">
            <select id="sel-sku" onchange="syncItem()" class="text-2xl font-black text-slate-900 bg-transparent border-none w-full text-center outline-none italic"></select>
            <p id="live-desc" class="text-[9px] font-bold text-blue-600 uppercase tracking-tighter opacity-70"></p>
        </div>

        <div class="flex flex-col gap-6 flex-grow justify-center pb-8">
            <div class="flex items-center justify-center gap-6">
                <input type="number" id="qty-in" class="input-pro w-32 h-20 text-center text-4xl shadow-inner border-2" placeholder="0">
                <button onclick="registrarBulto()" class="w-20 h-20 bg-blue-600 text-white rounded-3xl flex items-center justify-center shadow-lg shadow-blue-200 active:scale-90 transition-transform">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-3xl border border-slate-100 text-center">
                    <p class="text-[8px] font-black text-slate-300 uppercase mb-1">Restante</p>
                    <p id="live-rem" class="text-2xl font-black text-slate-900">0</p>
                </div>
                <div class="bg-blue-50/50 p-5 rounded-3xl border border-blue-50 text-center">
                    <p class="text-[8px] font-black text-blue-400 uppercase mb-1">Confirmado</p>
                    <p id="live-real" class="text-2xl font-black text-blue-600">0</p>
                </div>
            </div>

            <div class="px-2">
                <div class="flex justify-between mb-2">
                    <p class="text-[8px] font-black text-slate-300 uppercase italic">Status Item</p>
                    <p id="item-pc" class="text-[10px] font-black text-slate-900">0%</p>
                </div>
                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div id="item-bar" class="h-full bg-slate-900 transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <button onclick="finishAndReport()" class="btn-primary w-full">Finalizar y Guardar Reporte</button>
    </div>

    <div id="view-crear" class="view pt-24">
        <h2 class="text-2xl font-black text-slate-900 mb-6 italic">Configurar <span class="text-blue-600">Carga</span></h2>
        <div class="bg-white p-5 rounded-3xl border border-slate-100 space-y-3 shadow-sm">
            <div class="relative">
                <input type="text" id="s-sku" oninput="smartSearch()" class="input-pro" placeholder="Ingresar Código SKU">
                <div id="search-results" class="hidden absolute z-50 w-full bg-white border border-slate-100 rounded-2xl shadow-2xl mt-2 max-h-32 overflow-y-auto"></div>
            </div>
            <div class="flex gap-3">
                <input type="number" id="s-meta" class="input-pro flex-1" placeholder="Cant. Meta">
                <button onclick="addMani()" class="w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center active:scale-95 transition-transform shadow-lg shadow-blue-100">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>
        </div>

        <div class="flex-grow overflow-y-auto mt-6 px-1">
            <div id="pre-list" class="space-y-3"></div>
        </div>

        <button id="btn-done" onclick="openModal()" class="hidden btn-primary w-full mt-4">Lanzar Operación</button>
    </div>

    <div id="view-historial" class="view pt-24">
        <h2 class="text-2xl font-black text-slate-900 mb-6 italic">Archivo <span class="text-blue-600">Histórico</span></h2>
        <div id="history-list" class="flex-grow overflow-y-auto space-y-3"></div>
    </div>

    <div id="modal-choice" class="fixed inset-0 z-[2000] bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center p-8">
        <div class="bg-white w-full rounded-[2.5rem] p-10 text-center shadow-2xl">
            <h3 class="text-xl font-black text-slate-900 mb-8 italic">¿INICIAR CARGA?</h3>
            <div class="flex flex-col gap-3">
                <button onclick="continuarConteo()" class="btn-primary">Sí, comenzar ahora</button>
                <button onclick="guardarMani()" class="btn-primary !bg-slate-100 !text-slate-400 !shadow-none">Solo archivar</button>
                <button onclick="closeModal()" class="text-[10px] font-black text-slate-300 uppercase mt-4">Regresar</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_items = {};
        let currentMani = JSON.parse(localStorage.getItem('taj_cur')) || [];
        let history = JSON.parse(localStorage.getItem('taj_his')) || [];
        let activeJob = JSON.parse(localStorage.getItem('taj_active')) || null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                const raw = await res.json();
                raw.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().toUpperCase().trim()] = r.DESCRIPCION; });
                const lastView = localStorage.getItem('taj_view') || 'home';
                if(lastView === 'ops' && activeJob) startOps(activeJob);
                else navTo(lastView);
            } catch (e) { console.warn("Offline"); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            localStorage.setItem('taj_view', v);
            if(v === 'historial') renderHistory();
            if(v === 'crear') renderPreList();
        }

        function goHome() { navTo('home'); }

        function smartSearch() {
            const input = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('search-results');
            if(input.length < 1) { resDiv.classList.add('hidden'); return; }
            const matches = Object.keys(db_items).filter(k => k.includes(input)).slice(0,5);
            resDiv.innerHTML = matches.map(k => `<div onclick="setProd('${k}')" class="p-4 border-b border-slate-50 text-[11px] font-bold text-slate-700 uppercase">${k}</div>`).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(s) {
            document.getElementById('s-sku').value = s;
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "GENERICO", meta, real: 0 });
            localStorage.setItem('taj_cur', JSON.stringify(currentMani));
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
            navigator.vibrate(20);
        }

        function renderPreList() {
            const container = document.getElementById('pre-list');
            container.innerHTML = currentMani.map((i, idx) => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm">
                    <p class="text-[11px] font-black text-slate-900 uppercase tracking-widest">${i.sku}</p>
                    <p class="text-[11px] font-black text-blue-600">${i.meta} CJ</p>
                </div>
            `).join('');
            if(currentMani.length > 0) document.getElementById('btn-done').classList.remove('hidden');
        }

        function openModal() { document.getElementById('modal-choice').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-choice').style.display = 'none'; }

        function continuarConteo() {
            closeModal();
            activeJob = { id: Date.now(), name: "L-" + new Date().getHours() + new Date().getMinutes(), items: [...currentMani], status: 'PROCESO' };
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
            currentMani = []; localStorage.removeItem('taj_cur');
            startOps(activeJob);
        }

        function guardarMani() {
            closeModal();
            history.push({ id: Date.now(), name: "REC-" + new Date().toLocaleDateString(), items: [...currentMani], status: 'PENDIENTE' });
            localStorage.setItem('taj_his', JSON.stringify(history));
            currentMani = []; localStorage.removeItem('taj_cur');
            navTo('historial');
        }

        function startOps(job) {
            navTo('ops');
            document.getElementById('sel-sku').innerHTML = job.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem();
        }

        function syncItem() {
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('live-desc').innerText = item.desc;
            document.getElementById('live-rem').innerText = Math.max(0, item.meta - item.real);
            document.getElementById('live-real').innerText = item.real;

            const itemPc = Math.min(Math.round((item.real / item.meta) * 100), 100);
            document.getElementById('item-bar').style.width = itemPc + "%";
            document.getElementById('item-pc').innerText = itemPc + "%";

            const totalM = activeJob.items.reduce((a,b) => a + b.meta, 0);
            const totalR = activeJob.items.reduce((a,b) => a + b.real, 0);
            const pc = Math.min(Math.round((totalR / totalM) * 100), 100);
            
            // Animación Profesional
            document.getElementById('truck-fill').style.width = pc + "%";
            document.getElementById('truck-icon').style.left = `calc(${pc}% - 12px)`;
            document.getElementById('global-pc').innerText = pc + "%";
            
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
        }

        function registrarBulto() {
            const q = parseInt(document.getElementById('qty-in').value);
            if(!q) return;
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += q;
            document.getElementById('qty-in').value = '';
            syncItem();
            navigator.vibrate(15);
            fetch(CLOUD_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({tipo:'CARGA', datos: [new Date().toLocaleString(), item.sku, q]})});
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="bg-white p-5 rounded-3xl flex justify-between items-center border border-slate-100 shadow-sm">
                    <div>
                        <p class="text-[8px] font-black text-slate-400 uppercase mb-1 tracking-widest">${h.status}</p>
                        <p class="text-[11px] font-black text-slate-900 uppercase italic">${h.name}</p>
                    </div>
                    <button onclick="startFromHistory(${h.id})" class="bg-slate-50 text-slate-900 text-[9px] font-black px-5 py-3 rounded-2xl active:bg-blue-600 active:text-white transition-colors">ABRIR</button>
                </div>
            `).join('');
        }

        function startFromHistory(id) {
            activeJob = history.find(x => x.id === id);
            localStorage.setItem('taj_active', JSON.stringify(activeJob));
            startOps(activeJob);
        }

        function finishAndReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(14); doc.setFont("helvetica", "bold"); doc.text("REPORTE OPERATIVO TAJHO.OS", 14, 20);
            doc.autoTable({
                startY: 25, head: [['SKU', 'META', 'REAL', 'DIF']],
                body: activeJob.items.map(i => [i.sku, i.meta, i.real, i.meta-i.real]),
                theme: 'striped', headStyles: { fillColor: [26, 28, 33] }
            });
            const finalY = doc.lastAutoTable.finalY + 12;
            doc.setFontSize(9);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, finalY);
            doc.save(`TAJHO_${activeJob.name}.pdf`);
            activeJob.status = 'COMPLETADO';
            localStorage.setItem('taj_his', JSON.stringify(history));
            localStorage.removeItem('taj_active');
            navTo('historial');
        }

        init();
    </script>
</body>
</html>
