<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiMaster - Control Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s ease;
        }
        .glass-card:active { transform: scale(0.98); }
        .primary-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body>

    <header class="primary-gradient text-white p-6 shadow-lg rounded-b-3xl">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-2xl font-bold italic">LOGIMASTER PRO</h1>
            <p class="text-blue-100 text-sm opacity-80">Gestión Logística de Alta Precisión</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 space-y-6">
        
        <div class="relative">
            <input type="text" placeholder="Buscar producto o contenedor..." 
                   class="w-full p-4 rounded-2xl shadow-sm border-none focus:ring-2 focus:ring-blue-500 outline-none text-gray-600">
            <span class="absolute right-4 top-4 opacity-30">🔍</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <button onclick="alert('Abriendo Ingreso de Contenedores...')" 
                    class="glass-card p-8 rounded-3xl shadow-md text-left flex flex-col items-start space-y-4 hover:shadow-xl">
                <div class="p-4 bg-blue-100 rounded-2xl">
                    <span class="text-3xl">🚢</span>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-gray-800">Ingreso de Contenedor</h2>
                    <p class="text-gray-500 text-sm">Registro de conteo, packing y estado de mercadería.</p>
                </div>
                <span class="text-blue-600 font-semibold text-sm">Empezar registro →</span>
            </button>

            <button onclick="alert('Abriendo Gestión de Devoluciones...')" 
                    class="glass-card p-8 rounded-3xl shadow-md text-left flex flex-col items-start space-y-4 hover:shadow-xl">
                <div class="p-4 bg-orange-100 rounded-2xl">
                    <span class="text-3xl">📦</span>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-gray-800">Devoluciones</h2>
                    <p class="text-gray-500 text-sm">Gestión de clientes, vendedores y motivos de retorno.</p>
                </div>
                <span class="text-orange-600 font-semibold text-sm">Gestionar retornos →</span>
            </button>

        </div>

        <div class="mt-8">
            <h3 class="text-gray-700 font-bold mb-4 px-2">Actividad Reciente</h3>
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                <div class="p-4 border-b border-gray-50 flex justify-between items-center italic text-gray-400 text-xs">
                    <span>No hay registros hoy</span>
                    <span>08 Mar 2026</span>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 p-4 flex justify-around items-center md:hidden">
        <button class="text-blue-600 font-bold uppercase text-[10px]">Inicio</button>
        <button class="text-gray-400 font-bold uppercase text-[10px]">Historial</button>
        <button class="text-gray-400 font-bold uppercase text-[10px]">Reportes</button>
    </nav>

</body>
</html>
