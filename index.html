<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS TITAN | QC System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #050505; --panel: #121417; --accent: #007AFF; --danger: #FF3B30; --success: #34C759; --warning: #FF9F0A;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', system-ui; padding-bottom: 100px; }
        .app-header { padding: 40px 20px 20px; background: linear-gradient(180deg, rgba(0,122,255,0.1), transparent); }
        .glass-card { background: var(--panel); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 20px; margin: 0 15px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        
        /* Inputs Estilo Logística Pro */
        .field-group { background: #1c1f24; border-radius: 15px; padding: 12px; margin-bottom: 12px; border: 1px solid transparent; }
        .field-group:focus-within { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,122,255,0.2); }
        .field-group label { display: block; font-size: 10px; color: #8E8E93; text-transform: uppercase; font-weight: 800; margin-bottom: 4px; }
        .field-group input, .field-group select { background: transparent; border: none; color: white; width: 100%; font-weight: 600; font-size: 15px; outline: none; }
        
        /* Botones y Badges */
        .btn-titan { border-radius: 15px; padding: 16px; font-weight: 800; border: none; width: 100%; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-red { background: var(--danger); color: white; }
        .btn-green { background: var(--success); color: black; }
        .btn-titan:active { transform: scale(0.96); }

        /* Buscador Inteligente */
        .search-pro { position: relative; }
        .search-input { background: #1c1f24; border-radius: 15px; padding: 15px 15px 15px 45px; color: white; width: 100%; border: 1px solid rgba(255,255,255,0.1); }
        .sug-box { position: absolute; width: 100%; background: #1c1f24; border-radius: 15px; z-index: 100; border: 1px solid #333; display: none; margin-top: 5px; }
        .sug-item { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; }

        /* Lista de Items */
        .item-row { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--danger); }
        .diff-alert { color: var(--danger); font-size: 11px; font-weight: 800; }

        .nav-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(18,20,23,0.9); backdrop-filter: blur(20px); border-radius: 25px; display: flex; justify-content: space-around; padding: 12px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-btn { background: none; border: none; color: #636366; flex-direction: column; display: flex; align-items: center; font-size: 10px; font-weight: 700; }
        .nav-btn.active { color: var(--accent); }
    </style>
</head>
<body>

<header class="app-header">
    <h1 class="h4 fw-bold mb-0">TWINS TITAN OS</h1>
    <small class="text-info fw-bold">QC & LOGISTICS SYSTEM</small>
</header>

<main>
    <section id="v-dev" class="view">
        <div class="glass-card">
            <h6 class="fw-bold mb-3 text-danger"><i class="fas fa-microscope me-2"></i>REVISIÓN TÉCNICA DE RETORNO</h6>
            
            <div class="row g-2">
                <div class="col-6"><div class="field-group"><label>Cliente</label><input type="text" id="cli-name" placeholder="..."></div></div>
                <div class="col-6"><div class="field-group"><label>Vendedor</label><input type="text" id="ven-name" placeholder="..."></div></div>
            </div>

            <div class="search-pro mb-3">
                <i class="fas fa-search position-absolute" style="left:15px; top:18px; color:var(--accent)"></i>
                <input type="text" id="dev-search" class="search-input" placeholder="Buscar Producto..." oninput="searchProd(this.value)">
                <div id="dev-sug" class="sug-box"></div>
            </div>

            <div id="inspeccion-panel" class="d-none">
                <div class="p-3 mb-3" style="background: rgba(255,255,255,0.05); border-radius: 15px;">
                    <b id="prod-sel-name"></b><br><small id="prod-sel-sku" class="text-accent"></small>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6"><div class="field-group"><label>Cant. Guía</label><input type="number" id="cant-guia" oninput="checkDiff()"></div></div>
                    <div class="col-6"><div class="field-group"><label>Cant. Real</label><input type="number" id="cant-real" oninput="checkDiff()"></div></div>
                </div>
                <div id="diff-msg" class="mb-3 px-2"></div>

                <div class="field-group">
                    <label>Estado / Detalle de Revisión</label>
                    <select id="det-revision">
                        <option value="FALLADO A MERMA">FALLADO A MERMA (Descarte)</option>
                        <option value="SE ARREGLO EL PRODUCTO">SE ARREGLO EL PRODUCTO (Re-venta)</option>
                        <option value="PRODUCTO FALLA DE IMPORTACION">FALLA DE IMPORTACIÓN (Garantía)</option>
                    </select>
                </div>
                <button class="btn-titan btn-red" onclick="addToList()">AÑADIR A INSPECCIÓN <i class="fas fa-plus"></i></button>
            </div>

            <div id="dev-list-area" class="d-none mt-4 border-top pt-3">
                <div id="dev-items"></div>
                <button class="btn-titan btn-green mt-3" onclick="saveDevolucion()">FINALIZAR Y GENERAR REPORTE QC</button>
            </div>
        </div>
    </section>
</main>

<nav class="nav-bar">
    <button class="nav-btn" onclick="location.reload()"><i class="fas fa-truck-loading"></i><span>Salida</span></button>
    <button class="nav-btn active"><i class="fas fa-file-signature"></i><span>Retorno QC</span></button>
    <button class="nav-btn"><i class="fas fa-history"></i><span>Historial</span></button>
</nav>

<script>
    const API = "https://script.google.com/macros/s/AKfycbxCeMB7Cf1DpA41NEmprwR0XqrvdD_-xTEbl3vKsMlaHIp_r3b5MpMWcbrQKyOiYFF2NQ/exec";
    let DB = []; let LISTA_QC = []; let SEL = null;

    async function init() {
        const r = await fetch(API, {method: "POST", body: JSON.stringify({action: "load"})});
        const d = await r.json(); DB = d.p;
    }

    function searchProd(v) {
        const b = document.getElementById('dev-sug');
        if(v.length < 2) { b.style.display='none'; return; }
        const m = DB.filter(p => p[1].toLowerCase().includes(v.toLowerCase()) || p[0].toString().includes(v)).slice(0,5);
        b.innerHTML = m.map(p => `<div class="sug-item" onclick="selectProd('${p[0]}','${p[1]}')"><b>${p[1]}</b><br><small>${p[0]}</small></div>`).join('');
        b.style.display='block';
    }

    function selectProd(sku, name) {
        SEL = {sku, name};
        document.getElementById('prod-sel-name').innerText = name;
        document.getElementById('prod-sel-sku').innerText = "SKU: " + sku;
        document.getElementById('inspeccion-panel').classList.remove('d-none');
        document.getElementById('dev-sug').style.display='none';
    }

    function checkDiff() {
        const g = parseInt(document.getElementById('cant-guia').value) || 0;
        const r = parseInt(document.getElementById('cant-real').value) || 0;
        const msg = document.getElementById('diff-msg');
        if (r < g) msg.innerHTML = `<span class="diff-alert"><i class="fas fa-exclamation-triangle"></i> FALTANTE: ${g-r} unidades detectadas</span>`;
        else if (r > g) msg.innerHTML = `<span class="text-info small fw-bold">SOBRANTE: ${r-g} unidades</span>`;
        else msg.innerHTML = "";
    }

    function addToList() {
        const g = document.getElementById('cant-guia').value;
        const r = document.getElementById('cant-real').value;
        if(!g || !r) return;
        
        LISTA_QC.push({
            ...SEL, 
            guia: g, 
            real: r, 
            det: document.getElementById('det-revision').value,
            diff: r - g
        });
        
        renderUI();
        document.getElementById('inspeccion-panel').classList.add('d-none');
        document.getElementById('dev-search').value = "";
    }

    function renderUI() {
        const area = document.getElementById('dev-list-area');
        area.classList.remove('d-none');
        document.getElementById('dev-items').innerHTML = LISTA_QC.map(i => `
            <div class="item-row">
                <div class="d-flex justify-content-between"><b>${i.name}</b> <span class="badge bg-danger">${i.real} Uds</span></div>
                <div class="small opacity-75 mt-1">Guía: ${i.guia} | Estado: ${i.det}</div>
                ${i.diff < 0 ? `<div class="diff-alert">Faltan ${Math.abs(i.diff)} unidades</div>` : ''}
            </div>
        `).join('');
    }

    async function saveDevolucion() {
        const cli = document.getElementById('cli-name').value;
        const ven = document.getElementById('ven-name').value;
        if(!cli || !ven) return Swal.fire("Datos Faltantes","Ingresa Cliente y Vendedor","warning");

        const payload = LISTA_QC.map(i => [new Date(), "QC-DEV", i.sku, i.name, i.real, cli, `Vendedor: ${ven} | Guia: ${i.guia} | Rev: ${i.det}`]);
        
        Swal.fire({title: 'Procesando QC...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
        await fetch(API, {method: "POST", body: JSON.stringify({action: "save", sheet: "Devoluciones", payload})});
        
        genPDF(cli, ven);
        Swal.fire("Éxito","Reporte de Inspección Guardado","success").then(()=>location.reload());
    }

    function genPDF(cli, ven) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(18); doc.text("REPORTE TÉCNICO DE INSPECCIÓN (QC)", 14, 20);
        doc.setFontSize(10);
        doc.text(`CLIENTE: ${cli.toUpperCase()}`, 14, 30);
        doc.text(`VENDEDOR: ${ven.toUpperCase()}`, 14, 35);
        doc.text(`FECHA: ${new Date().toLocaleString()}`, 14, 40);

        const rows = LISTA_QC.map(i => [i.sku, i.name, i.guia, i.real, i.det]);
        doc.autoTable({
            head: [['SKU', 'ARTÍCULO', 'CANT. GUÍA', 'CANT. REAL', 'ESTADO REVISIÓN']],
            body: rows,
            startY: 50,
            theme: 'striped',
            headStyles: { fillColor: [220, 53, 69] }
        });
        
        doc.save(`QC_${cli}.pdf`);
    }

    window.onload = init;
</script>
</body>
</html>
