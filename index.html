<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TITAN NEURAL FLOW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --apple-blue: #007AFF;
            --apple-red: #FF3B30;
            --apple-green: #34C759;
            --apple-bg: #F2F2F7;
            --glass: rgba(255, 255, 255, 0.85);
            --safe-top: env(safe-area-inset-top);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body { 
            background: var(--apple-bg); 
            font-family: 'Outfit', sans-serif;
            color: #000; margin: 0; padding-top: var(--safe-top);
            overflow-x: hidden; height: 100vh;
        }

        /* Header de Cristal */
        .neural-nav {
            position: sticky; top: 0; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 20px; border-bottom: 0.5px solid rgba(0,0,0,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand { font-weight: 800; font-size: 24px; letter-spacing: -1px; }
        .ai-status { font-size: 10px; font-weight: 700; color: var(--apple-green); text-transform: uppercase; }

        /* Contenedores con Animación de Entrada */
        .view-container { padding: 10px 16px 120px; }
        .ios-card {
            background: #fff; border-radius: 28px; padding: 22px;
            margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 0.5px solid rgba(0,0,0,0.05);
        }

        /* Inputs Didácticos */
        .group-label { font-size: 11px; font-weight: 800; color: #8e8e93; margin: 0 0 8px 10px; text-transform: uppercase; }
        .smart-field {
            background: #F2F2F7; border: 2px solid transparent;
            border-radius: 18px; padding: 16px; width: 100%;
            font-size: 16px; margin-bottom: 15px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .smart-field:focus { background: #fff; border-color: var(--apple-blue); outline: none; box-shadow: 0 8px 20px rgba(0,122,255,0.1); }

        /* Listas de Sugerencia Inteligentes */
        .search-engine { position: relative; }
        .neural-results {
            position: absolute; width: 100%; background: #fff;
            border-radius: 20px; z-index: 1100; margin-top: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); display: none; overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .result-item { padding: 16px 20px; border-bottom: 0.5px solid #F2F2F7; cursor: pointer; }
        .result-item:active { background: #F2F2F7; }

        /* Botones Pro */
        .btn-neural {
            border-radius: 20px; padding: 18px; font-weight: 700; border: none; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-delivery { background: var(--apple-blue); color: white; }
        .btn-return { background: var(--apple-red); color: white; }
        .btn-neural:active { transform: scale(0.92); }

        /* Historial - Diseño de Ticket */
        .ticket {
            background: #fff; border-radius: 24px; padding: 18px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 0.5px solid rgba(0,0,0,0.05); animation: fadeInUp 0.5s ease forwards;
        }
        .stamp-icon { 
            width: 45px; height: 45px; border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .bg-del { background: #E1EFFF; color: var(--apple-blue); }
        .bg-ret { background: #FFE5E5; color: var(--apple-red); }

        /* Tab Bar Flotante (iOS 18) */
        .neural-tabs {
            position: fixed; bottom: 30px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            border-radius: 35px; padding: 12px 10px; display: flex;
            justify-content: space-around; z-index: 2000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .tab-trigger { border: none; background: none; color: #777; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .tab-trigger.active { color: #fff; transform: translateY(-5px); }
        .tab-trigger i { font-size: 22px; margin-bottom: 4px; }
        .tab-trigger span { font-size: 10px; font-weight: 700; }

        .view { display: none; }
        .active-view { display: block; animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <nav class="neural-nav">
        <div class="brand">TITAN <span style="color:var(--apple-blue)">OS</span></div>
        <div class="ai-status"><i class="fas fa-brain"></i> Neural Link Active</div>
    </nav>

    <div class="view-container">
        <section id="view-delivery" class="view active-view">
            <div class="ios-card">
                <h6 class="group-label">Información de Destino</h6>
                <div class="row g-2">
                    <div class="col-6"><input type="text" id="cli-d" class="smart-field" placeholder="Cliente" oninput="iaPredict(this.value, 'ven-d')"></div>
                    <div class="col-6"><input type="text" id="ven-d" class="smart-field" placeholder="Vendedor"></div>
                </div>
                <h6 class="group-label">Despacho de Productos</h6>
                <div class="search-engine">
                    <input type="text" id="search-d" class="smart-field" placeholder="🔍 Buscar SKU o Nombre..." oninput="smartSearch(this.value, 'box-d', 'd')">
                    <div id="box-d" class="neural-results"></div>
                </div>

                <div id="panel-d" class="d-none animate__animated animate__fadeIn">
                    <div class="p-3 mb-3 rounded-4 bg-light border">
                        <b id="name-d"></b><br><small id="sku-d" class="text-primary"></small>
                    </div>
                    <input type="number" id="q-d" class="smart-field" placeholder="Cantidad a Entregar">
                    <button class="btn-neural btn-delivery" onclick="addToList('d')">Agregar al Lote <i class="fas fa-plus"></i></button>
                </div>

                <div id="queue-d" class="mt-4 d-none">
                    <div id="list-d" class="mb-3"></div>
                    <button class="btn-neural btn-delivery shadow-lg" onclick="saveToSheets('Pedidos', 'd')">FINALIZAR ENTREGA <i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </section>

        <section id="view-return" class="view">
            <div class="ios-card">
                <h6 class="group-label text-danger">Módulo de Calidad & Retornos</h6>
                <div class="row g-2">
                    <div class="col-6"><input type="text" id="cli-r" class="smart-field" placeholder="Cliente" oninput="iaPredict(this.value, 'ven-r')"></div>
                    <div class="col-6"><input type="text" id="ven-r" class="smart-field" placeholder="Vendedor"></div>
                </div>
                <div class="search-engine">
                    <input type="text" id="search-r" class="smart-field" placeholder="🔍 Buscar Producto con Falla..." oninput="smartSearch(this.value, 'box-r', 'r')">
                    <div id="box-r" class="neural-results"></div>
                </div>

                <div id="panel-r" class="d-none animate__animated animate__fadeIn">
                    <div class="p-3 mb-3 bg-light rounded-4 border"><b id="name-r"></b></div>
                    <div class="row g-2 mb-3">
                        <div class="col-6"><label class="group-label">Guía</label><input type="number" id="cg-r" class="smart-field"></div>
                        <div class="col-6"><label class="group-label">Real</label><input type="number" id="cr-r" class="smart-field"></div>
                    </div>
                    <select id="st-r" class="smart-field mb-3">
                        <option>FALLADO A MERMA</option>
                        <option>SE ARREGLO EL PRODUCTO</option>
                        <option>PRODUCTO FALLA DE IMPORTACION</option>
                    </select>
                    <button class="btn-neural btn-return" onclick="addToList('r')">Validar Falla <i class="fas fa-microscope"></i></button>
                </div>

                <div id="queue-r" class="mt-4 d-none">
                    <div id="list-r" class="mb-3"></div>
                    <button class="btn-neural btn-return shadow-lg" onclick="saveToSheets('Devoluciones', 'r')">CONFIRMAR QC & PDF <i class="fas fa-file-signature"></i></button>
                </div>
            </div>
        </section>

        <section id="view-history" class="view">
            <div class="px-2">
                <h6 class="group-label">Actividad del Sistema</h6>
                <div id="logs"></div>
            </div>
        </section>
    </div>

    <nav class="neural-tabs">
        <button class="tab-trigger active" onclick="changeTab('delivery', this)"><i class="fas fa-truck-loading"></i><span>Entrega</span></button>
        <button class="tab-trigger" onclick="changeTab('return', this)"><i class="fas fa-sync-alt"></i><span>Retorno</span></button>
        <button class="tab-trigger" onclick="changeTab('history', this)"><i class="fas fa-database"></i><span>Historial</span></button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCeMB7Cf1DpA41NEmprwR0XqrvdD_-xTEbl3vKsMlaHIp_r3b5MpMWcbrQKyOiYFF2NQ/exec";
        let MASTER_DB = []; let MEMORY = {}; let Q_D = []; let Q_R = []; let TEMP = null;

        async function init() {
            try {
                const res = await fetch(API, {method: "POST", body: JSON.stringify({action: "load"})});
                const data = await res.json();
                MASTER_DB = data.p;
                data.h.forEach(r => { if(r[5]) MEMORY[r[5].toLowerCase()] = r[6].split('| Vend: ')[1] || r[6]; });
                renderLogs(data.h);
            } catch(e) { Swal.fire("Modo Offline", "Los datos locales están activos", "info"); }
        }

        function iaPredict(v, targetId) {
            const match = MEMORY[v.toLowerCase()];
            if(match) document.getElementById(targetId).value = match;
        }

        function smartSearch(v, boxId, type) {
            const box = document.getElementById(boxId);
            if(v.length < 1) { box.style.display='none'; return; }
            const matches = MASTER_DB.filter(p => p[1].toLowerCase().includes(v.toLowerCase()) || p[0].toString().includes(v)).slice(0,5);
            box.innerHTML = matches.map(p => `<div class="result-item" onclick="pickItem('${p[0]}','${p[1]}','${type}')"><b>${p[1]}</b><br><small class="text-muted">${p[0]}</small></div>`).join('');
            box.style.display = matches.length ? 'block' : 'none';
        }

        function pickItem(sku, name, type) {
            TEMP = {sku, name};
            document.getElementById(`name-${type}`).innerText = name;
            if(type==='d') document.getElementById(`sku-d`).innerText = sku;
            document.getElementById(`panel-${type}`).classList.remove('d-none');
            document.querySelectorAll('.neural-results').forEach(b => b.style.display='none');
        }

        function addToList(type) {
            const qArea = document.getElementById(`queue-${type}`);
            const lArea = document.getElementById(`list-${type}`);
            
            if(type==='d') {
                const val = document.getElementById('q-d').value;
                if(!val) return;
                Q_D.push({...TEMP, c: val});
            } else {
                const cg = document.getElementById('cg-r').value;
                const cr = document.getElementById('cr-r').value;
                if(!cg || !cr) return;
                Q_R.push({...TEMP, cg, cr, st: document.getElementById('st-r').value});
            }

            qArea.classList.remove('d-none');
            const list = type==='d' ? Q_D : Q_R;
            lArea.innerHTML = list.map(i => `
                <div class="p-3 mb-2 rounded-4 border bg-white d-flex justify-content-between align-items-center">
                    <div><b>${i.name}</b><br><small class="opacity-50">${i.st || 'Entrega'}</small></div>
                    <span class="badge rounded-pill bg-primary">x${i.c || i.cr}</span>
                </div>
            `).join('');
            document.getElementById(`panel-${type}`).classList.add('d-none');
            document.getElementById(`search-${type}`).value = "";
        }

        async function saveToSheets(sheet, type) {
            const cli = document.getElementById(`cli-${type}`).value;
            const ven = document.getElementById(`ven-${type}`).value;
            if(!cli || !ven) return Swal.fire("Campo vacío", "Completa Cliente y Vendedor", "warning");

            const list = type==='d' ? Q_D : Q_R;
            const payload = list.map(i => [new Date(), type==='d'?'ENTREGA':'DEVOLUCION', i.sku, i.name, i.c || i.cr, cli, type==='d' ? `Vend: ${ven}` : `Guia: ${i.cg} | Rev: ${i.st} | Vend: ${ven}`]);

            Swal.fire({title:'Sincronizando Cerebro...', didOpen:()=>Swal.showLoading()});
            await fetch(API, {method: "POST", body: JSON.stringify({action: "save", sheet, payload})});
            
            if(type==='r') {
                createPDF(cli, ven, list);
                sendWhatsApp(cli, ven, list);
            }

            Swal.fire("Sincronizado", "Los datos están en la nube", "success").then(()=>location.reload());
        }

        function renderLogs(h) {
            document.getElementById('logs').innerHTML = h.slice(0,25).map(r => `
                <div class="ticket">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stamp-icon ${r[1]==='ENTREGA'?'bg-del':'bg-ret'}">
                            <i class="fas ${r[1]==='ENTREGA'?'fa-arrow-up':'fa-arrow-down'}"></i>
                        </div>
                        <div>
                            <div class="fw-bold">${r[5]}</div>
                            <small class="opacity-50">${r[3]}</small>
                        </div>
                    </div>
                    <div class="text-end">
                        <div class="fw-bold text-primary">x${r[4]}</div>
                        <div style="font-size:9px" class="opacity-30">${new Date(r[0]).toLocaleDateString()}</div>
                    </div>
                </div>
            `).join('');
        }

        function createPDF(cli, ven, list) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(0, 122, 255); doc.rect(0, 0, 210, 45, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("REPORTE OFICIAL DE INSPECCIÓN", 14, 25);
            doc.setFontSize(10); doc.text(`CLIENTE: ${cli.toUpperCase()} | VENDEDOR: ${ven.toUpperCase()}`, 14, 35);
            
            doc.autoTable({
                head: [['SKU', 'PRODUCTO', 'GUÍA', 'REAL', 'DIAGNÓSTICO']],
                body: list.map(i => [i.sku, i.name, i.cg, i.cr, i.st]),
                startY: 50, theme: 'grid', headStyles: {fillColor: [30, 30, 30]}
            });

            const fY = doc.lastAutoTable.finalY + 30;
            doc.setTextColor(0); doc.line(14, fY, 100, fY);
            doc.setFontSize(10); doc.setFont(undefined, 'bold');
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, fY + 7);
            doc.setFont(undefined, 'normal');
            doc.text("Asist. Inventario Logístico", 14, fY + 12);
            doc.save(`QC_${cli}.pdf`);
        }

        function sendWhatsApp(cli, ven, list) {
            let msg = `*REPORTE QC - TITAN OS*%0A*Cliente:* ${cli}%0A*Vendedor:* ${ven}%0A---%0A`;
            list.forEach(i => { msg += `• ${i.name} (Real: ${i.cr}/Guia: ${i.cg})%0A  _Estado: ${i.st}_%0A`; });
            msg += `%0A*Autorizado por:* J. Angelo Nuñez Durand`;
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }

        function changeTab(viewId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.querySelectorAll('.tab-trigger').forEach(t => t.classList.remove('active'));
            document.getElementById('view-'+viewId).classList.add('active-view');
            btn.classList.add('active');
            window.scrollTo(0,0);
        }

        window.onload = init;
    </script>
</body>
</html>
