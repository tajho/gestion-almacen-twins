<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite | Gestión de Inventario</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            color: #0f172a;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
        }

        .container-card {
            background: white;
            border-radius: 28px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-box {
            background: white;
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-body { overflow-y: auto; padding: 20px; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="pb-24">

    <div id="modalApp" class="modal-overlay" onclick="closeAppModal()">
        <div class="modal-box shadow-2xl" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <div>
                    <h3 id="modalTitle" class="text-lg font-800 tracking-tighter uppercase text-blue-600">Items del Contenedor</h3>
                    <p id="modalSubtitle" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest"></p>
                </div>
                <button onclick="closeAppModal()" class="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center">
                    <i class="ph-bold ph-x text-slate-400"></i>
                </button>
            </div>
            <div id="modalContent" class="modal-body space-y-3"></div>
            <div class="p-5 border-t border-slate-50">
                <button onclick="closeAppModal()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-xs uppercase tracking-widest">Cerrar</button>
            </div>
        </div>
    </div>

    <header class="glass-header sticky top-0 z-50 p-5">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-800 tracking-tighter italic">TWINS <span class="text-blue-600">ELITE</span></h1>
                <p class="text-[9px] font-black text-slate-400 uppercase italic">J. Angelo Nuñez Durand</p>
            </div>
            <div id="syncTag" class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-[9px] font-800">CONECTADO</div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-5">
        
        <div class="space-y-3 mb-6">
            <div class="relative">
                <input type="text" id="searchInput" oninput="logic.render()" 
                    class="w-full bg-white border border-slate-200 rounded-2xl py-4 pl-12 pr-4 text-sm font-semibold shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                    placeholder="Buscar por código o descripción...">
                <i class="ph-bold ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            </div>
            
            <select id="monthFilter" onchange="logic.render()" 
                class="w-full bg-white border border-slate-200 rounded-2xl py-4 px-4 text-[10px] font-bold uppercase text-slate-500 shadow-sm outline-none">
                <option value="ALL">TODOS LOS MESES</option>
                <option value="0">ENERO</option><option value="1">FEBRERO</option>
                <option value="2">MARZO</option><option value="3">ABRIL</option>
                <option value="4">MAYO</option><option value="5">JUNIO</option>
                <option value="6">JULIO</option><option value="7">AGOSTO</option>
                <option value="8">SEPTIEMBRE</option><option value="9">OCTUBRE</option>
                <option value="10">NOVIEMBRE</option><option value="11">DICIEMBRE</option>
            </select>
        </div>

        <div id="app-feed" class="space-y-4"></div>

    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass-header rounded-3xl p-2 flex justify-around items-center shadow-xl border border-white z-50">
        <button class="p-3 text-blue-600"><i class="ph-bold ph-house-line text-2xl"></i></button>
        <button onclick="logic.sync()" class="p-3 text-slate-400"><i class="ph-bold ph-arrows-clockwise text-2xl"></i></button>
        <button class="p-3 text-slate-400"><i class="ph-bold ph-gear text-2xl"></i></button>
    </nav>

    <script>
        const API_URL = "TU_URL_DE_APPS_SCRIPT";

        const logic = {
            db: JSON.parse(localStorage.getItem('twins_db')) || [],

            init: function() {
                this.render();
                this.sync();
            },

            sync: async function() {
                try {
                    const response = await fetch(API_URL);
                    const data = await response.json();
                    this.db = data.historial || data;
                    localStorage.setItem('twins_db', JSON.stringify(this.db));
                    this.render();
                    document.getElementById('syncTag').innerText = "ACTUALIZADO";
                } catch(e) {
                    document.getElementById('syncTag').innerText = "LOCAL";
                }
            },

            // Formato de fecha solicitado: FECHA CONTENEDOR DD/MM/AAAA
            simpleDate: function(dateStr) {
                if (!dateStr || dateStr === "SIN FECHA") return "FECHA CONTENEDOR: --/--/----";
                const d = new Date(dateStr);
                if (isNaN(d)) return "FECHA CONTENEDOR: " + dateStr;
                const dia = String(d.getDate()).padStart(2, '0');
                const mes = String(d.getMonth() + 1).padStart(2, '0');
                const anio = d.getFullYear();
                return `FECHA CONTENEDOR: ${dia}/${mes}/${anio}`;
            },

            render: function() {
                const feed = document.getElementById('app-feed');
                const query = document.getElementById('searchInput').value.toLowerCase();
                const selectedMonth = document.getElementById('monthFilter').value;

                // AGRUPAR POR SECCIÓN "ALMACEN"
                const groups = this.db.reduce((acc, item) => {
                    const canal = item.canal || "S/N";
                    const itemDate = new Date(item.almacen); // Se usa 'almacen' para la fecha
                    
                    const matchesSearch = (item.codigo || "").toLowerCase().includes(query) || (item.descripcion || "").toLowerCase().includes(query);
                    const matchesMonth = selectedMonth === "ALL" || (!isNaN(itemDate) && itemDate.getMonth().toString() === selectedMonth);

                    if (matchesSearch && matchesMonth) {
                        if (!acc[canal]) {
                            acc[canal] = { id: canal, fechaRaw: item.almacen, items: [] };
                        }
                        acc[canal].items.push(item);
                    }
                    return acc;
                }, {});

                let html = '';
                // Ordenar por canal descendente
                const sorted = Object.values(groups).sort((a, b) => b.id - a.id);

                sorted.forEach(group => {
                    html += `
                    <div class="container-card overflow-hidden">
                        <div class="p-6">
                            <div class="mb-4">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">${this.simpleDate(group.fechaRaw)}</p>
                                <h3 class="text-xl font-800 text-slate-800 uppercase tracking-tighter">CONTENEDOR ${group.id}</h3>
                            </div>

                            <div class="flex gap-2">
                                <button onclick="logic.action('LIST', '${group.id}')" class="flex-1 py-3 bg-slate-50 border border-slate-100 rounded-xl text-[9px] font-900 uppercase text-slate-600 flex items-center justify-center gap-2">
                                    <i class="ph-bold ph-list-magnifying text-lg"></i> LISTA
                                </button>
                                <button onclick="logic.action('EDIT', '${group.id}')" class="flex-1 py-3 bg-slate-50 border border-slate-100 rounded-xl text-[9px] font-900 uppercase text-slate-600 flex items-center justify-center gap-2">
                                    <i class="ph-bold ph-pencil-simple text-lg"></i> CORREGIR
                                </button>
                                <button onclick="logic.action('PDF', '${group.id}')" class="p-3 bg-red-50 border border-red-100 rounded-xl text-red-600 flex items-center justify-center">
                                    <i class="ph-bold ph-file-pdf text-xl"></i>
                                </button>
                            </div>
                        </div>
                    </div>`;
                });

                feed.innerHTML = html || '<p class="text-center py-10 text-slate-400 font-bold uppercase text-[10px]">Sin resultados</p>';
            },

            action: function(type, id) {
                const groupItems = this.db.filter(i => String(i.canal) === String(id));
                
                if(type === 'LIST') {
                    document.getElementById('modalTitle').innerText = `CONTENEDOR ${id}`;
                    document.getElementById('modalSubtitle').innerText = `${groupItems.length} SKUS EN TOTAL`;
                    let content = '';
                    groupItems.forEach(i => {
                        content += `
                        <div class="p-4 rounded-xl bg-slate-50 border border-slate-100">
                            <p class="text-[10px] font-black text-blue-600 mb-1">${i.codigo}</p>
                            <p class="text-[11px] font-bold text-slate-700 uppercase leading-tight">${i.descripcion}</p>
                        </div>`;
                    });
                    document.getElementById('modalContent').innerHTML = content;
                    document.getElementById('modalApp').style.display = 'flex';
                }

                if(type === 'PDF') {
                    const firma = "Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.";
                    alert(`Generando PDF...\nCanal: ${id}\n\n${firma}`);
                }

                if(type === 'EDIT') {
                    alert(`Función Corregir para Canal ${id} activada.`);
                }
            }
        };

        function closeAppModal() { document.getElementById('modalApp').style.display = 'none'; }

        logic.init();
    </script>
</body>
</html>
