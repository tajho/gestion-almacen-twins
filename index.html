<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite | Smart Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid #E2E8F0; }
        .card-container { background: white; border-radius: 28px; border: 1px solid #E2E8F0; }
        .month-divider { @apply sticky top-[100px] z-40 bg-slate-900 py-3 px-6 my-4 rounded-2xl text-[10px] font-black text-white uppercase tracking-[0.2em] flex items-center justify-between shadow-lg; }
    </style>
</head>
<body class="antialiased">

    <header class="glass-header sticky top-0 z-50 p-6">
        <div class="max-w-xl mx-auto">
            <h1 class="text-2xl font-800 tracking-tighter italic leading-none">TWINS <span class="text-blue-600">ELITE</span></h1>
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic mt-1">J. Angelo Nuñez Durand</p>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-6">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-5 rounded-[26px] border border-slate-200 shadow-sm flex flex-col items-center">
                <i class="ph-bold ph-shipping-container text-blue-600 text-xl mb-2"></i>
                <p class="text-[9px] font-black text-slate-400 uppercase">Contenedores</p>
                <p class="text-2xl font-900 text-slate-800" id="stat-cont">0</p>
            </div>
            <div class="bg-white p-5 rounded-[26px] border border-slate-200 shadow-sm flex flex-col items-center">
                <i class="ph-bold ph-package text-green-600 text-xl mb-2"></i>
                <p class="text-[9px] font-black text-slate-400 uppercase">Cajas Totales</p>
                <p class="text-2xl font-900 text-slate-800" id="stat-cajas">0</p>
            </div>
        </div>

        <div class="space-y-3 mb-8">
            <input type="text" id="searchInput" oninput="app.render()" placeholder="Buscar contenedor o código..." class="w-full px-6 py-5 rounded-[24px] bg-white border border-slate-200 shadow-sm outline-none font-bold text-sm">
        </div>

        <div id="feed" class="space-y-4 pb-20"></div>
    </main>

    <script>
        const app = {
            data: [],
            // URL de tu Script actualizado
            url: "https://script.google.com/macros/s/AKfycbwyaW2P0aK17COlZtYElUCj_8sgiZ3j9cvjXbhbjEWpAA3e-puqRwlTXlbAj-e_9D8H/exec",

            parseFecha: function(str) {
                if(!str || str === "") return { label: "PENDIENTE", sort: 9999999999999, m: -1 };
                const f = new Date(str);
                const hoy = new Date();
                hoy.setHours(0,0,0,0);
                
                if(isNaN(f.getTime()) || f > hoy) return { label: "PENDIENTE", sort: f.getTime() || 8888888888888, m: -1 };
                
                return { 
                    label: f.toLocaleDateString('es-PE'), 
                    sort: f.getTime(),
                    m: f.getMonth(),
                    y: f.getFullYear()
                };
            },

            sync: async function() {
                try {
                    const res = await fetch(this.url);
                    this.data = await res.json();
                    this.render();
                } catch(e) { console.log("Silent sync error"); }
            },

            render: function() {
                const search = document.getElementById('searchInput').value.toLowerCase();
                const mNames = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
                
                const groups = this.data.reduce((acc, item) => {
                    const id = (item.contenedor || "S/N").toString();
                    const f = this.parseFecha(item.descarga);
                    if(id.toLowerCase().includes(search) || item.codigo.toLowerCase().includes(search)) {
                        if(!acc[id]) acc[id] = { id, f, items: [] };
                        acc[id].items.push(item);
                    }
                    return acc;
                }, {});

                const sorted = Object.values(groups).sort((a,b) => b.f.sort - a.f.sort);
                
                document.getElementById('stat-cont').innerText = sorted.length;
                document.getElementById('stat-cajas').innerText = this.data.reduce((s, i) => s + i.cajas, 0);

                let html = '';
                let lastHeader = '';

                sorted.forEach(g => {
                    const header = g.f.m === -1 ? "PRÓXIMAS / PENDIENTES" : `${mNames[g.f.m]} ${g.f.y}`;
                    if(header !== lastHeader) {
                        html += `<div class="month-divider"><span>${header}</span><i class="ph-bold ph-calendar"></i></div>`;
                        lastHeader = header;
                    }

                    const tCajas = g.items.reduce((s, i) => s + i.cajas, 0);
                    html += `
                    <div class="card-container p-6 mb-4">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-[9px] font-black text-slate-400 uppercase">DESCARGA: ${g.f.label}</p>
                                <h3 class="text-xl font-900 text-slate-900 uppercase">CONTENEDOR ${g.id}</h3>
                            </div>
                            <div class="px-3 py-1 bg-blue-600 text-white rounded-lg text-[10px] font-black">${tCajas} CAJAS</div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button class="py-4 bg-blue-50 text-blue-600 rounded-2xl text-[10px] font-black uppercase">REVISAR</button>
                            <button class="py-4 bg-slate-50 text-slate-400 rounded-2xl text-[10px] font-black uppercase">REPORTE</button>
                        </div>
                    </div>`;
                });
                document.getElementById('feed').innerHTML = html;
            }
        };

        window.onload = () => { app.sync(); setInterval(() => app.sync(), 30000); };
    </script>
</body>
</html>
