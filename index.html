<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE INGRESO LOGÍSTICO - ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --dark-bg: #0f172a; --card-bg: #1e293b; --accent: #3b82f6; --success: #10b981; --text: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--dark-bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 25px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; background: #334155; border: 1px solid #475569; padding: 12px; border-radius: 8px; color: white; font-size: 1rem; margin-bottom: 15px; box-sizing: border-box; }
        input:focus { outline: 2px solid var(--accent); border-color: transparent; }
        .product-info { background: #0f172a; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 15px; font-weight: 600; color: var(--accent); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-add { background: var(--accent); color: white; }
        .btn-pdf { background: var(--success); color: white; margin-top: 15px; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; font-size: 0.9rem; }
        th { background: #334155; color: #94a3b8; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .badge-ok { background: #064e3b; color: #6ee7b7; }
        .badge-diff { background: #7f1d1d; color: #fca5a5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="font-size: 1.4rem; margin: 0;">CONTROL DE INGRESOS LOGÍSTICOS</h1>
        <p style="font-size: 0.8rem; color: #94a3b8;">Gestión de Almacén - J. Angelo Nuñez Durand</p>
    </div>

    <div id="setup-section" class="card">
        <label>Identificación de Contenedor</label>
        <input type="text" id="nro_contenedor" placeholder="Ej: CONT-2026-0116">
        <label>Documentación (Cargar Packing List)</label>
        <input type="file" id="packing_photo" accept="image/*">
        <button class="btn btn-add" onclick="iniciarConteo()">Iniciar Proceso de Recepción</button>
    </div>

    <div id="conteo-section" class="card hidden">
        <div id="info-cont" style="margin-bottom: 15px; font-weight: bold; color: var(--success);"></div>
        <label>Código de Producto (SKU)</label>
        <input type="text" id="sku_input" placeholder="Escriba o escanee..." oninput="autoBusqueda(this.value)">
        <div id="display_nombre" class="product-info">Esperando código...</div>
        
        <label>Cantidad de Packing (Esperada)</label>
        <input type="number" id="cant_packing" placeholder="Según documento">
        
        <label>Cantidad de Pallet (Contado)</label>
        <input type="number" id="cant_pallet" placeholder="Cantidad física actual">
        
        <button class="btn btn-add" onclick="registrarItem()">Registrar y Sumar</button>

        <table>
            <thead>
                <tr>
                    <th>SKU</th>
                    <th>Packing</th>
                    <th>Conteo</th>
                    <th>Dif.</th>
                </tr>
            </thead>
            <tbody id="lista_cuerpo"></tbody>
        </table>
        
        <button class="btn btn-pdf" onclick="generarReporteProfesional()">Cerrar Contenedor y Generar PDF</button>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbwNlrpjV8BS3z0t3liodNkxpiO4HvrowLf9BtEta5cDSUZy_IL-0aPMLnMIhpzCRuwM/exec";
    let maestroProductos = [];
    let registroContenedor = {};

    window.onload = async () => {
        try {
            const res = await fetch(URL_API);
            const data = await res.json();
            // Limpieza: Asumimos que la columna 0 es SKU y la 1 es Nombre
            maestroProductos = data.slice(1); 
            console.log("Maestro cargado exitosamente.");
        } catch(e) { alert("Error de conexión con la base de datos maestra."); }
    };

    function iniciarConteo() {
        const cont = document.getElementById('nro_contenedor').value;
        if(!cont) return alert("Ingrese N° de Contenedor");
        document.getElementById('info-cont').innerText = "TRABAJANDO: " + cont;
        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('conteo-section').classList.remove('hidden');
    }

    function autoBusqueda(sku) {
        sku = sku.trim().toUpperCase();
        const found = maestroProductos.find(p => p[0].toString().toUpperCase() === sku);
        const display = document.getElementById('display_nombre');
        if(found) {
            display.innerText = "PROD: " + found[1];
            display.style.color = "#3b82f6";
        } else {
            display.innerText = "SKU NO ENCONTRADO EN MAESTRO";
            display.style.color = "#ef4444";
        }
    }

    function registrarItem() {
        const sku = document.getElementById('sku_input').value.toUpperCase();
        const pack = parseInt(document.getElementById('cant_packing').value) || 0;
        const pal = parseInt(document.getElementById('cant_pallet').value) || 0;

        if(!sku || isNaN(pal)) return alert("Datos incompletos");

        if(!registroContenedor[sku]) {
            registroContenedor[sku] = { packing: pack, contado: 0 };
        }
        
        registroContenedor[sku].contado += pal;
        // Si se actualiza el packing en el registro, lo mantenemos
        if(pack > 0) registroContenedor[sku].packing = pack;

        actualizarTabla();
        
        // Reset campos específicos
        document.getElementById('sku_input').value = "";
        document.getElementById('cant_pallet').value = "";
        document.getElementById('display_nombre').innerText = "Esperando código...";
        document.getElementById('sku_input').focus();
    }

    function actualizarTabla() {
        const tbody = document.getElementById('lista_cuerpo');
        tbody.innerHTML = "";
        for(let sku in registroContenedor) {
            const item = registroContenedor[sku];
            const dif = item.contado - item.packing;
            tbody.innerHTML += `
                <tr>
                    <td>${sku}</td>
                    <td>${item.packing}</td>
                    <td><b>${item.contado}</b></td>
                    <td><span class="badge ${dif === 0 ? 'badge-ok' : 'badge-diff'}">${dif}</span></td>
                </tr>`;
        }
    }

    function generarReporteProfesional() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const cont = document.getElementById('nro_contenedor').value;

        // Cabecera
        doc.setFontSize(18).text("REPORTE DE RECEPCIÓN DE MERCADERÍA", 105, 20, {align: 'center'});
        doc.setFontSize(10).text(`Contenedor: ${cont} | Fecha: ${new Date().toLocaleString()}`, 105, 28, {align: 'center'});

        // Tabla de Datos
        const bodyData = [];
        for(let sku in registroContenedor) {
            const item = registroContenedor[sku];
            bodyData.push([sku, item.packing, item.contado, item.contado === item.packing ? "CUADRA" : "DIFERENCIA"]);
        }

        doc.autoTable({
            startY: 35,
            head: [['CÓDIGO', 'CANT. PACKING', 'CANT. CONTEO', 'ESTADO']],
            body: bodyData,
            theme: 'striped',
            headStyles: { fillColor: [15, 23, 42] }
        });

        // Pie de página centralizado
        const finalY = doc.lastAutoTable.finalY + 30;
        doc.setFontSize(10);
        doc.text("Recepción y conteo realizado por:", 105, finalY, {align: 'center'});
        doc.text("J. Angelo Nuñez Durand", 105, finalY + 7, {align: 'center'});
        doc.text("------------------------------------------", 105, finalY + 12, {align: 'center'});
        doc.text("Asist. Logístico.", 105, finalY + 17, {align: 'center'});

        doc.save(`Recepción_${cont}.pdf`);
    }
</script>
</body>
</html>
