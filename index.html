<div id="sistema-inventario">
    <section id="registro-seccion">
        <label>Cliente:</label>
        <select id="cliente" onchange="sugerirVendor()">
            <option value="">Seleccione...</option>
            <option value="Cliente_A">Cliente A</option>
            <option value="Cliente_B">Cliente B</option>
        </select>

        <label>Proveedor Sugerido:</label>
        <input type="text" id="vendor" readonly>

        <label>Tipo:</label>
        <select id="tipo_movimiento">
            <option value="ENTRADA">Entrada</option>
            <option value="DEVOLUCION">Devolución</option>
        </select>

        <div class="control-personal">
            <label>Operador:</label>
            <input type="text" id="operador" value="Operador Actual" readonly>
            <button onclick="confirmarCambioEmergencia()">⚠️ Cambiar Personal</button>
        </div>

        <button onclick="guardarRegistro()">Guardar en Historial</button>
    </section>

    <hr>

    <div id="historial-contenedor">
        </div>
</div>

<script>
// --- LOGICA DE NEGOCIO PERSONALIZADA ---

const sugerencias = {
    "Cliente_A": "Vendor Logística Norte",
    "Cliente_B": "Vendor Distribución Sur"
};

function sugerirVendor() {
    const c = document.getElementById('cliente').value;
    document.getElementById('vendor').value = sugerencias[c] || "";
}

function confirmarCambioEmergencia() {
    if(confirm("¿Desea realizar un cambio de conductor/asistente por emergencia?")) {
        document.getElementById('operador').readOnly = false;
        document.getElementById('operador').style.backgroundColor = "#fff3cd";
    }
}

// --- REPARACIÓN DEL HISTORIAL PARA DEVOLUCIONES ---
let historialData = []; 

function guardarRegistro() {
    const data = {
        cliente: document.getElementById('cliente').value,
        vendor: document.getElementById('vendor').value,
        tipo: document.getElementById('tipo_movimiento').value,
        operador: document.getElementById('operador').value,
        fecha: new Date().toLocaleString()
    };

    historialData.push(data);
    actualizarVistaHistorial();
}

function actualizarVistaHistorial() {
    const lista = document.getElementById('historial-contenedor');
    lista.innerHTML = ""; // Limpiamos pero mantenemos los datos

    historialData.forEach(item => {
        // Creamos la tarjeta manteniendo tu estilo preferido
        const card = document.createElement('div');
        card.className = `tarjeta-historial ${item.tipo === 'DEVOLUCION' ? 'border-devolucion' : ''}`;
        
        card.innerHTML = `
            <div class="card-body">
                <h4>${item.tipo} - ${item.cliente}</h4>
                <p>Proveedor: ${item.vendor}</p>
                <p>Registrado por: ${item.operador}</p>
                <small>${item.fecha}</small>
                
                <div class="footer-reporte" style="margin-top:10px; font-weight:bold; border-top:1px solid #ccc;">
                    Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.
                </div>
            </div>
        `;
        lista.appendChild(card);
    });
}
</script>

<style>
/* Solo agregamos lo necesario para que las devoluciones resalten */
.tarjeta-historial {
    padding: 15px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
}
.border-devolucion {
    border-left: 8px solid #ffc107 !important; /* Color ámbar para devoluciones */
    background: #fffdf5;
}
.footer-reporte {
    font-size: 0.8rem;
    color: #555;
    padding-top: 5px;
}
</style>
