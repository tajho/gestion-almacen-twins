<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWINS Almacén - GitHub Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary shadow">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1">TWINS - CONTROL DE SALIDAS</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow-sm p-3 mb-4">
            <label class="fw-bold text-muted small">CONSULTA SKU</label>
            <div class="input-group mb-2">
                <input type="text" id="sku" class="form-control" placeholder="AR-XXXXXX" oninput="consultar()">
            </div>
            <input type="text" id="desc" class="form-control bg-white fw-bold text-primary" readonly placeholder="Descripción del SAP...">
        </div>

        <div class="card shadow-sm p-3">
            <div class="row g-2">
                <div class="col-6">
                    <label class="small fw-bold">TIPO</label>
                    <select id="tipo" class="form-select"><option>MKT</option><option>OFICINA</option></select>
                </div>
                <div class="col-6">
                    <label class="small fw-bold">CANTIDAD</label>
                    <input type="number" id="cant" class="form-control">
                </div>
                <div class="col-12">
                    <label class="small fw-bold">SOLICITANTE</label>
                    <input type="text" id="quien" class="form-control" placeholder="Nombre">
                </div>
            </div>
            <button class="btn btn-primary w-100 mt-4 fw-bold" onclick="registrar()">REGISTRAR PENDIENTE SAP</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx08sfTVde3MQoXSpOX7qMJwYk1ynxfnsgciEdyfhpVGwFSRLHaamUSHOkeRKgxdfI2Yw/exec"; // <--- PEGA TU URL AQUÍ

        async function consultar() {
            const sku = document.getElementById('sku').value;
            if(sku.length < 6) return;
            
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({action: "buscar", sku: sku})
            });
            const data = await response.json();
            document.getElementById('desc').value = data.res;
        }

        async function registrar() {
            const d = {
                action: "pedido",
                tipo: document.getElementById('tipo').value,
                sku: document.getElementById('sku').value,
                desc: document.getElementById('desc').value,
                cant: document.getElementById('cant').value,
                quien: document.getElementById('quien').value
            };

            if(!d.cant || d.desc.includes("❌")) return Swal.fire("Error", "Datos incompletos", "error");

            Swal.fire({title: 'Registrando...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});

            await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(d) });
            
            Swal.fire("Éxito", "Registrado para SAP", "success");
            document.querySelectorAll('input').forEach(i => i.value = '');
        }
    </script>
</body>
</html>
