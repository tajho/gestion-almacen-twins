<main>
    <section id="v-del" class="view active-view">
        <div class="card-elite">
            <span class="label-tech">Tipo de Movimiento</span>
            <div class="d-flex gap-2 mb-3">
                <button class="v-chip flex-fill text-center active" id="m-VENTA" onclick="setM('VENTA')">VENTA</button>
                <button class="v-chip flex-fill text-center" id="m-MARKETING" onclick="setM('MARKETING')">MKT</button>
                <button class="v-chip flex-fill text-center" id="m-OFICINA" onclick="setM('OFICINA')">OFICINA</button>
            </div>

            <input type="text" id="cli-d" class="input-elite" placeholder="Nombre del Solicitante / Cliente" oninput="autoSave()">
            
            <div class="position-relative mt-2">
                <span class="label-tech">1. Busca el Producto</span>
                <input type="text" id="src-d" class="input-elite" placeholder="🔍 SKU o Nombre..." oninput="find(this.value, 'res-d', 'd')">
                <div id="res-d" class="search-results"></div>
            </div>

            <div id="form-d" class="d-none mt-3 animate__animated animate__fadeIn" style="border-top: 2px dashed var(--border); pt-3">
                <div class="p-3 mb-3 rounded-3" style="background: var(--bg); border-left: 4px solid var(--accent)">
                    <b id="p-n-d" class="d-block" style="color: var(--accent); font-size: 14px;"></b>
                    <small class="text-muted" id="p-s-d"></small>
                </div>
                
                <span class="label-tech">2. Ingresa Cantidad</span>
                <input type="number" id="q-d" class="input-elite" placeholder="¿Cuántos salen?">
                
                <button class="btn-elite btn-blue w-100" onclick="addItem('d')">
                    ANADIR ITEM <i class="fas fa-plus-circle ms-2"></i>
                </button>
            </div>

            <div id="list-d" class="mt-4 d-none">
                <span class="label-tech">Items por Procesar</span>
                <div id="items-d"></div>
                <button class="btn-elite btn-blue mt-3 w-100 shadow" onclick="sync('Pedidos', 'd')">
                    CONFIRMAR SALIDA <i class="fas fa-check-double ms-2"></i>
                </button>
            </div>
        </div>
    </section>

    <section id="v-ret" class="view">
        <div class="card-elite">
            <span class="label-tech">¿Quién devuelve?</span>
            <input type="text" id="cli-r" class="input-elite" placeholder="Nombre del Cliente" oninput="autoSave()">
            
            <span class="label-tech">Vendedor que recibe</span>
            <div class="vendor-scroller mb-3" id="vend-r">
                <div class="v-chip" onclick="setV('ELIAS AVILA','r')">ELIAS</div>
                <div class="v-chip" onclick="setV('EVELYN MURO','r')">EVELYN</div>
                <div class="v-chip" onclick="setV('JHAYRO MAURICIO','r')">JHAYRO</div>
                <div class="v-chip" onclick="setV('PAULA GARCIA','r')">PAULA</div>
                <div class="v-chip" onclick="setV('REGULO ANTEZA','r')">REGULO</div>
            </div>

            <div class="position-relative">
                <span class="label-tech">1. Busca el Producto Devuelto</span>
                <input type="text" id="src-r" class="input-elite" placeholder="🔍 SKU con falla..." oninput="find(this.value, 'res-r', 'r')">
                <div id="res-r" class="search-results"></div>
            </div>

            <div id="form-r" class="d-none mt-3 animate__animated animate__fadeIn" style="border-top: 2px dashed var(--danger); pt-3">
                <div class="p-3 mb-3 rounded-3" style="background: #fff5f5; border-left: 4px solid var(--danger)">
                    <b id="p-n-r" class="d-block" style="color: var(--danger); font-size: 14px;"></b>
                </div>

                <div class="row g-2">
                    <div class="col-6">
                        <span class="label-tech">Cant. Guía</span>
                        <input type="number" id="cg-r" class="input-elite" placeholder="En papel">
                    </div>
                    <div class="col-6">
                        <span class="label-tech">Cant. Real</span>
                        <input type="number" id="cr-r" class="input-elite" placeholder="Físico">
                    </div>
                </div>

                <span class="label-tech">Estado Técnico</span>
                <select id="st-r" class="input-elite">
                    <option value="MERMA">FALLADO A MERMA</option>
                    <option value="ARREGLO">SE ARREGLO EL PRODUCTO</option>
                    <option value="FALLA IMPORTACION">FALLA DE IMPORTACION</option>
                </select>

                <span class="label-tech">Observaciones (Lápiz)</span>
                <textarea id="obs-r" class="input-elite" style="height: 80px;" placeholder="¿Qué tiene el producto?"></textarea>
                
                <button class="btn-elite btn-green w-100" onclick="addItem('r')">
                    VALIDAR RETORNO <i class="fas fa-arrow-down ms-2"></i>
                </button>
            </div>

            <div id="list-r" class="mt-4 d-none">
                <div id="items-r"></div>
                <button class="btn-elite btn-green mt-3 w-100 shadow" onclick="sync('Devoluciones', 'r')">
                    ENVIAR A SAP <i class="fas fa-cloud-upload-alt ms-2"></i>
                </button>
            </div>
        </div>
    </section>
</main>
