<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INTELIGENCIA | Logística Avanzada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --accent: #0071E3;
            --bg: #F5F5F7;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text: #1D1D1F;
            --sub: #86868B;
        }

        body { 
            background: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text);
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        /* GLASSMORPHISM HEADER */
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .brand-logo { font-weight: 800; font-size: 1.4rem; letter-spacing: -1px; }
        .brand-logo span { color: var(--accent); }

        /* KPI CARDS */
        .kpi-container { display: flex; gap: 10px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .kpi-card {
            background: #FFF; padding: 15px; border-radius: 20px;
            min-width: 140px; border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
        }
        .kpi-val { font-weight: 800; font-size: 1.2rem; display: block; }
        .kpi-label { font-size: 10px; color: var(--sub); text-transform: uppercase; font-weight: 600; }

        /* MAIN CONTENT */
        .smart-card {
            background: #FFF; border-radius: 24px; padding: 25px;
            margin: 0 15px 20px; border: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
        }

        .form-label { font-size: 12px; font-weight: 700; color: var(--sub); margin-left: 5px; margin-bottom: 8px; }
        
        .smart-input {
            width: 100%; padding: 15px; border-radius: 16px; border: 1.5px solid #E5E5E7;
            background: #FBFBFD; margin-bottom: 15px; font-size: 16px; transition: 0.3s;
        }
        .smart-input:focus { border-color: var(--accent); background: #FFF; outline: none; box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }

        /* SEARCH SUGGESTIONS */
        .search-float {
            position: absolute; width: 100%; background: #FFF; border-radius: 16px;
            z-index: 100; box-shadow: 0 15px 30px rgba(0,0,0,0.15); border: 1px solid #E5E5E7;
            max-height: 250px; overflow-y: auto; display: none; margin-top: -10px;
        }
        .search-item { padding: 12px 15px; border-bottom: 1px solid #F5F5F7; cursor: pointer; }
        .search-item:last-child { border: none; }

        /* HISTORIAL TIMELINE */
        .timeline-item {
            background: #FFF; border-radius: 20px; padding: 20px;
            margin: 0 15px 12px; position: relative;
            border: 1px solid rgba(0,0,0,0.03); transition: 0.3s;
        }
        .timeline-item:active { transform: scale(0.97); }
        .type-tag {
            font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 8px;
            position: absolute; top: 20px; right: 20px;
        }
        .tag-retorno { background: #FFF2F2; color: #FF3B30; }
        .tag-salida { background: #F2F7FF; color: #0071E3; }

        .footer-authorized {
            font-size: 10px; color: #AEAEB2; text-align: center;
            margin-top: 15px; border-top: 1px solid #F2F2F7; padding-top: 10px;
            font-weight: 500; font-style: italic;
        }

        /* TAB BAR */
        .tab-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(29, 29, 31, 0.95); backdrop-filter: blur(15px);
            border-radius: 25px; display: flex; padding: 10px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3); z-index: 1001;
        }
        .tab-btn {
            flex: 1; background: none; border: none; color: #86868B;
            font-size: 10px; font-weight: 600; text-align: center;
        }
        .tab-btn.active { color: #FFF; }
        .tab-btn i { font-size: 20px; display: block; margin-bottom: 4px; }

        .btn-action {
            padding: 12px; border-radius: 14px; font-weight: 700; font-size: 14px;
            border: none; width: 100%; transition: 0.2s;
        }
        .btn-primary-apple { background: var(--accent); color: white; }
        .btn-secondary-apple { background: var(--bg); color: var(--text); }
        
        #h-filter-bar {
            padding: 10px 15px; position: sticky; top: 82px; z-index: 998;
            background: var(--bg);
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <div class="d-flex justify-content-between align-items-center">
            <div class="brand-logo"><span>INTELI</span>GENCIA</div>
            <div class="text-end">
                <div style="font-size: 10px; color: var(--sub); font-weight: 700;">LOGÍSTICA MGR</div>
                <div style="font-size: 12px; font-weight: 600;">J. Angelo Nuñez</div>
            </div>
        </div>
    </header>

    <div class="kpi-container">
        <div class="kpi-card">
            <span class="kpi-label">Entregas</span>
            <span class="kpi-val" id="kpi-ent">0</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Retornos</span>
            <span class="kpi-val text-danger" id="kpi-dev">0</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Items Hoy</span>
            <span class="kpi-val text-primary" id="kpi-items">0</span>
        </div>
    </div>

    <main>
        <section id="v-dev" class="view">
            <div class="smart-card">
                <h5 class="fw-bold mb-4">Recepción de Devoluciones</h5>
                
                <label class="form-label">Origen (Cliente)</label>
                <input type="text" id="cli-d" class="smart-input" placeholder="Nombre de quien entrega..." oninput="autoVendor(this.value, 'ven-d')">
                
                <label class="form-label">Responsable (Vendedor)</label>
                <input type="text" id="ven-d" class="smart-input" placeholder="Vendor asignado">

                <label class="form-label">Producto a Devolver</label>
                <div class="position-relative">
                    <input type="text" id="src-d" class="smart-input" placeholder="Escriba SKU o nombre..." oninput="liveSearch(this.value, 'res-d', 'd')">
                    <div id="res-d" class="search-float"></div>
                </div>

                <div id="form-d" class="d-none bg-light p-3 rounded-4 mb-3 border">
                    <div id="p-n-d" class="fw-bold text-primary mb-3"></div>
                    <div class="row g-2 mb-3">
                        <div class="col-6"><label class="form-label">Cant. Guía</label><input type="number" id="cg-d" class="smart-input mb-0"></div>
                        <div class="col-6"><label class="form-label">Cant. Real</label><input type="number" id="cr-d" class="smart-input mb-0"></div>
                    </div>
                    <label class="form-label">Estado de Recepción</label>
                    <select id="st-d" class="smart-input">
                        <option value="MERMA">MERMA / DEFECTUOSO</option>
                        <option value="FALLA IMPORTACION">FALLA DE ORIGEN</option>
                        <option value="REINGRESO">REINGRESO STOCK</option>
                        <option value="REPARADO">SE REPARÓ EN ALMACÉN</option>
                    </select>
                    <textarea id="obs-d" class="smart-input" placeholder="Notas técnicas del estado..."></textarea>
                    <button class="btn-action btn-primary-apple" onclick="addItem('d')">Agregar a la Lista</button>
                </div>

                <div id="cart-d" class="d-none border-top pt-3">
                    <div id="items-d" class="mb-4"></div>
                    <button class="btn-action btn-primary-apple shadow-lg py-3" onclick="saveData('Devoluciones', 'd')">REGISTRAR EN BASE DE DATOS</button>
                </div>
            </div>
        </section>

        <section id="v-ent" class="view d-none">
            <div class="smart-card">
                <h5 class="fw-bold mb-4">Orden de Salida</h5>
                <label class="form-label">Destino</label>
                <input type="text" id="cli-e" class="smart-input" placeholder="Área o Cliente" oninput="autoVendor(this.value, 'ven-e')">
                <label class="form-label">Vendedor</label>
                <input type="text" id="ven-e" class="smart-input">
                
                <label class="form-label">Agregar Producto</label>
                <div class="position-relative">
                    <input type="text" id="src-e" class="smart-input" placeholder="Buscar SKU..." oninput="liveSearch(this.value, 'res-e', 'e')">
                    <div id="res-e" class="search-float"></div>
                </div>

                <div id="form-e" class="d-none bg-light p-3 rounded-4 mb-3">
                    <div id="p-n-e" class="fw-bold mb-2"></div>
                    <div class="d-flex gap-2">
                        <input type="number" id="q-e" class="smart-input m-0" placeholder="Cantidad">
                        <button class="btn-action btn-primary-apple w-auto px-4" onclick="addItem('e')">Añadir</button>
                    </div>
                </div>

                <div id="cart-e" class="d-none">
                    <div id="items-e" class="mb-3"></div>
                    <button class="btn-action btn-primary-apple py-3" onclick="saveData('Pedidos', 'e')">PROCESAR SALIDA</button>
                </div>
            </div>
        </section>

        <section id="v-his" class="view d-none">
            <div id="h-filter-bar">
                <input type="text" id="h-query" class="smart-input mb-2" placeholder="Buscar por cliente o producto..." oninput="renderHistory()">
                <div class="d-flex gap-2">
                    <input type="date" id="h-date" class="smart-input m-0 py-2 fs-6" style="flex:2" onchange="renderHistory()">
                    <button class="btn-action btn-secondary-apple" style="flex:1" onclick="resetFilters()">Limpiar</button>
                </div>
            </div>
            <div id="feed-his"></div>
        </section>
    </main>

    <div class="tab-bar">
        <button class="tab-btn" onclick="nav('ent', this)"><i class="fas fa-arrow-up"></i>SALIDAS</button>
        <button class="tab-btn active" onclick="nav('dev', this)"><i class="fas fa-arrow-down"></i>RETORNOS</button>
        <button class="tab-btn" onclick="nav('his', this)"><i class="fas fa-clock-rotate-left"></i>HISTORIAL</button>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCeMB7Cf1DpA41NEmprwR0XqrvdD_-xTEbl3vKsMlaHIp_r3b5MpMWcbrQKyOiYFF2NQ/exec";
        let MASTER_P = []; let HISTORY = []; let CART_E = []; let CART_D = [];

        async function loadCore() {
            try {
                const res = await fetch(API, {method: "POST", body: JSON.stringify({action: "load"})});
                const data = await res.json();
                MASTER_P = data.p;
                HISTORY = data.h;
                updateKPIs();
                renderHistory();
            } catch(e) { console.error("Error de conexión"); }
        }

        function liveSearch(val, boxId, type) {
            const box = document.getElementById(boxId);
            if(val.length < 1) { box.style.display='none'; return; }
            const match = MASTER_P.filter(p => p[1].toLowerCase().includes(val.toLowerCase()) || p[0].toString().includes(val)).slice(0,6);
            box.innerHTML = match.map(p => `<div class="search-item" onclick="selectProd('${p[0]}','${p[1]}','${type}')"><b>${p[1]}</b><br><small class="text-muted">SKU: ${p[0]}</small></div>`).join('');
            box.style.display = match.length ? 'block' : 'none';
        }

        function selectProd(sku, name, type) {
            window.activeItem = {sku, name};
            document.getElementById(`p-n-${type}`).innerText = name;
            document.getElementById(`form-${type}`).classList.remove('d-none');
            document.querySelectorAll('.search-float').forEach(el => el.style.display='none');
        }

        function addItem(t) {
            const cart = t === 'e' ? CART_E : CART_D;
            const q = t === 'e' ? document.getElementById('q-e').value : document.getElementById('cr-d').value;
            if(!q || q <= 0) return;

            const entry = { ...window.activeItem, q: q };
            if(t === 'd') {
                entry.cg = document.getElementById('cg-d').value;
                entry.st = document.getElementById('st-d').value;
                entry.obs = document.getElementById('obs-d').value || "S/O";
                entry.type = "RETORNO";
            } else { entry.type = "SALIDA"; }

            cart.push(entry);
            document.getElementById(`form-${t}`).classList.add('d-none');
            document.getElementById(`src-${t}`).value = '';
            renderMiniCart(t);
        }

        function renderMiniCart(t) {
            const cart = t === 'e' ? CART_E : CART_D;
            const container = document.getElementById(`cart-${t}`);
            const itemsDiv = document.getElementById(`items-${t}`);
            container.classList.toggle('d-none', cart.length === 0);
            itemsDiv.innerHTML = cart.map((i, idx) => `
                <div class="d-flex justify-content-between align-items-center p-3 mb-2 bg-light rounded-4">
                    <span class="fs-6"><b>${i.q}</b> <small class="text-muted">x</small> ${i.name}</span>
                    <button class="btn btn-sm text-danger" onclick="((${t==='e'?'CART_E':'CART_D'}).splice(${idx},1)); renderMiniCart('${t}');">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        async function saveData(sheet, t) {
            const cli = document.getElementById(`cli-${t}`).value;
            const ven = document.getElementById(`ven-${t}`).value;
            if(!cli || !ven) return Swal.fire("Datos Faltantes", "Cliente y Responsable son obligatorios.", "error");

            const cart = t === 'e' ? CART_E : CART_D;
            const payload = cart.map(i => [
                new Date(), i.type, i.sku, i.name, i.q, cli, 
                t === 'e' ? `Responsable: ${ven}` : `Guía: ${i.cg} | Motivo: ${i.st} | Obs: ${i.obs} | Resp: ${ven}`
            ]);

            Swal.fire({ title: 'Sincronizando...', didOpen: () => Swal.showLoading() });
            try {
                await fetch(API, {method: "POST", body: JSON.stringify({action: "save", sheet, payload})});
                if(t==='e') CART_E = []; else CART_D = [];
                renderMiniCart(t);
                document.getElementById(`cli-${t}`).value = '';
                document.getElementById(`ven-${t}`).value = '';
                await loadCore();
                Swal.fire("Sincronizado", "Registro completado con éxito", "success");
            } catch(e) { Swal.fire("Error", "Fallo de conexión", "error"); }
        }

        // --- HISTORIAL AVANZADO ---
        function renderHistory() {
            const feed = document.getElementById('feed-his');
            const q = document.getElementById('h-query').value.toLowerCase();
            const date = document.getElementById('h-date').value;
            
            const groups = {};
            HISTORY.forEach(r => {
                const fObj = new Date(r[0]);
                const isoD = fObj.toISOString().split('T')[0];
                const hora = fObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const cli = r[5];
                
                if(date && isoD !== date) return;
                if(q && !cli.toLowerCase().includes(q) && !r[3].toLowerCase().includes(q)) return;

                const key = cli + "_" + hora + "_" + isoD;
                if(!groups[key]) {
                    groups[key] = { cli, hora, fecha: isoD, tipo: r[1], items: [], vendor: r[6].split('|').pop() };
                }
                groups[key].items.push({ n: r[3], q: r[4], s: r[2], obs: r[6] });
            });

            const data = Object.values(groups).reverse();
            document.getElementById('h-count').innerText = `${data.length} MOVIMIENTOS`;

            feed.innerHTML = data.map(g => `
                <div class="timeline-item">
                    <span class="type-tag ${g.tipo === 'SALIDA' ? 'tag-salida' : 'tag-retorno'}">${g.tipo}</span>
                    <div class="text-muted mb-1" style="font-size:11px; font-weight:700;">${g.fecha} • ${g.hora}</div>
                    <div class="fw-bold fs-5 mb-1">${g.cli}</div>
                    <div class="text-muted small mb-3"><i class="far fa-id-badge me-1"></i> ${g.vendor}</div>
                    
                    <div class="d-flex gap-2">
                        <button class="btn-action btn-secondary-apple" onclick="showPopup('${btoa(JSON.stringify(g))}')">VER LISTA</button>
                        <button class="btn-action btn-primary-apple" style="background:#000" onclick="printDoc(${JSON.stringify(g).replace(/"/g, '&quot;')})">PDF</button>
                    </div>
                    <div class="footer-authorized">Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.</div>
                </div>
            `).join('');
        }

        function showPopup(base64) {
            const g = JSON.parse(atob(base64));
            Swal.fire({
                title: g.cli,
                html: `<div class="text-start p-2" style="font-size:13px">${g.items.map(i => `<div class="mb-2 border-bottom pb-2"><b>${i.q}</b> x ${i.n}<br><small class="text-muted">${i.obs}</small></div>`).join('')}</div>`,
                confirmButtonText: 'Cerrar',
                confirmButtonColor: '#0071E3'
            });
        }

        function printDoc(g) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("helvetica", "bold");
            doc.text("INTELIGENCIA LOGÍSTICA - REPORTE", 14, 20);
            doc.setFontSize(10); doc.setFont("helvetica", "normal");
            doc.text(`CLIENTE: ${g.cli} | FECHA: ${g.fecha} | ${g.hora}`, 14, 30);
            
            doc.autoTable({
                startY: 40,
                head: [['Cant', 'Producto', 'Referencia']],
                body: g.items.map(i => [i.q, i.n, i.obs]),
                theme: 'striped', headStyles: { fillColor: [0, 113, 227] }
            });

            doc.setFontSize(8);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 105, doc.lastAutoTable.finalY + 20, {align: 'center'});
            doc.save(`INT_${g.cli}_${g.fecha}.pdf`);
        }

        function updateKPIs() {
            const hoy = new Date().toISOString().split('T')[0];
            const tHoy = HISTORY.filter(r => new Date(r[0]).toISOString().split('T')[0] === hoy);
            document.getElementById('kpi-ent').innerText = tHoy.filter(r => r[1] === 'SALIDA').length;
            document.getElementById('kpi-dev').innerText = tHoy.filter(r => r[1] === 'RETORNO').length;
            document.getElementById('kpi-items').innerText = tHoy.reduce((acc, r) => acc + parseInt(r[4]), 0);
        }

        function autoVendor(val, target) {
            const v = val.toUpperCase();
            const input = document.getElementById(target);
            if(v.includes("GLOBAL")) input.value = "GLOBAL LOGISTICS CORP";
            else if(v.includes("TIENDA")) input.value = "VENTA DIRECTA";
        }

        function nav(v, btn) {
            document.querySelectorAll('.view').forEach(x => x.classList.add('d-none'));
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('v-'+v).classList.remove('d-none');
            btn.classList.add('active');
            if(v === 'his') renderHistory();
        }

        function resetFilters() {
            document.getElementById('h-query').value = '';
            document.getElementById('h-date').value = '';
            renderHistory();
        }

        window.onload = loadCore;
    </script>
</body>
</html>
