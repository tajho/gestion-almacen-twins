<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tajho Aura Prime | Twins Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #f8fafc; --accent: #007AFF; --success: #34C759; --danger: #FF3B30; --header-h: 70px; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #0f172a; margin: 0; overflow: hidden; height: 100vh; }
        
        /* HEADER FIJO */
        .main-header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }

        /* MENÚ LATERAL (HAMBURGUESA) */
        .side-menu { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: #fff; z-index: 3000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.1); display: flex; flex-direction: column; padding: 40px 20px; }
        .side-menu.active { left: 0; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 2500; display: none; }
        .menu-overlay.active { display: block; }

        .menu-link { display: flex; align-items: center; gap: 15px; padding: 18px; border-radius: 20px; color: #64748b; font-weight: 700; transition: 0.3s; margin-bottom: 8px; border: none; background: transparent; width: 100%; }
        .menu-link.active { background: var(--accent); color: #fff; }
        .menu-link i { font-size: 24px; }

        /* VISTAS */
        .view { display: none; height: 100vh; padding: 20px; padding-top: calc(var(--header-h) + 20px); flex-direction: column; overflow-y: auto; animation: viewIn 0.4s ease; }
        .view.active { display: flex; }
        @keyframes viewIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        .aura-card { background: #fff; border-radius: 30px; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        input, select { background: #fff!important; border: 1px solid #e2e8f0!important; border-radius: 18px!important; padding: 15px!important; font-weight: 700!important; outline: none!important; }
        
        .item-row { background: white; border-radius: 22px; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-left: 6px solid var(--accent); margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.01); }
        .btn-ok { width: 80px; height: 80px; background: #fff; color: var(--accent); border: 3px solid var(--accent); border-radius: 30px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-ok:active { transform: scale(0.9); background: var(--accent); color: #fff; }

        ::-webkit-scrollbar { display: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: 4000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <header class="main-header">
        <button onclick="toggleMenu()" class="text-3xl text-slate-900"><i class="ph-bold ph-list"></i></button>
        <h2 class="text-xl font-black italic tracking-tighter">Tajho <span class="text-accent not-italic">Prime</span></h2>
        <div class="w-8"></div> </header>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="side-menu" id="side-menu">
        <div class="mb-10 px-4">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Menú Principal</p>
        </div>
        <button onclick="navTo('dash')" class="menu-link active" id="m-dash"><i class="ph-duotone ph-house"></i><span>Inicio</span></button>
        <button onclick="navTo('create')" class="menu-link" id="m-create"><i class="ph-duotone ph-package"></i><span>Carga</span></button>
        <button onclick="navTo('hist')" class="menu-link" id="m-hist"><i class="ph-duotone ph-folders"></i><span>Archivo</span></button>
        <div class="mt-auto border-t pt-6">
            <p class="text-[9px] font-black text-slate-300 text-center uppercase tracking-tighter">J. Angelo Nuñez Durand<br>Logística Twins Elite</p>
        </div>
    </nav>

    <div id="v-dash" class="view active">
        <div class="aura-card p-10 text-center relative overflow-hidden mt-10">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-accent/5 rounded-full blur-3xl"></div>
            <i class="ph-duotone ph-identification-card text-7xl text-accent mb-6 block"></i>
            <h3 class="font-black text-2xl uppercase tracking-tighter">Inventory Manager</h3>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-2">Acceso Autorizado</p>
        </div>
    </div>

    <div id="v-create" class="view">
        <h2 class="text-2xl font-black mb-6 tracking-tighter">Nueva Carga</h2>
        <div class="aura-card p-6 mb-6 relative" style="z-index: 10;">
            <div class="relative mb-4">
                <input type="text" id="sku-in" oninput="searchMaster(this.value)" class="w-full" placeholder="Buscar SKU..." autocomplete="off">
                <div id="search-results" class="hidden absolute w-full mt-2 bg-white rounded-2xl shadow-2xl border z-50"></div>
            </div>
            <div class="flex gap-3">
                <input type="number" id="meta-in" class="flex-1 text-center text-xl font-black" placeholder="Meta">
                <button onclick="addToQueue()" class="bg-accent text-white px-8 rounded-2xl font-black text-xs uppercase">Añadir</button>
            </div>
        </div>
        <div id="queue-list" class="space-y-1 flex-1"></div>
        <button onclick="saveContenedor()" id="btn-save-all" class="w-full py-5 bg-accent text-white rounded-2xl font-black text-xs uppercase mt-4 hidden shadow-xl shadow-accent/20">Registrar Contenedor</button>
    </div>

    <div id="v-hist" class="view">
        <h2 class="text-2xl font-black mb-6 tracking-tighter text-slate-900">Historial de Descargas</h2>
        <div class="aura-card p-6 mb-6">
            <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                <div class="bg-slate-50 p-4 rounded-2xl border-l-4 border-accent">
                    <p class="text-[8px] font-black text-slate-400 uppercase">Envíos</p>
                    <p id="stats-cont" class="text-3xl font-black text-accent">0</p>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl border-l-4 border-success">
                    <p class="text-[8px] font-black text-slate-400 uppercase">Cajas</p>
                    <p id="stats-cajas" class="text-3xl font-black text-success">0</p>
                </div>
            </div>
            <select id="month-filter" onchange="filterByProduct('')" class="w-full text-[10px] font-black uppercase mb-4 text-accent"></select>
            <input type="text" id="sku-query" class="w-full text-sm" placeholder="Buscar SKU..." oninput="filterByProduct(this.value)">
        </div>
        <div id="product-results" class="space-y-3 pb-10"></div>
    </div>

    <div id="v-work" class="view">
        <div class="flex justify-between items-end mb-6">
            <h2 class="text-3xl font-black tracking-tighter" id="work-title"></h2>
            <p id="work-perc-title" class="text-4xl font-black tracking-tighter text-accent">0%</p>
        </div>

        <div class="aura-card p-6 mb-6 text-white" style="background: linear-gradient(135deg, #0047AB, #007AFF);">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <p class="text-[9px] font-black text-cyan-100 uppercase tracking-widest mb-1">Cajas Totales</p>
                    <p id="work-cajas-total" class="text-3xl font-black tracking-tighter">0 / 0</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] font-black text-cyan-100 uppercase tracking-widest mb-1">SKU Completos</p>
                    <p id="work-skus" class="text-xl font-black">0 / 0</p>
                </div>
            </div>
            <div class="h-2.5 bg-white/20 rounded-full overflow-hidden">
                <div id="work-progress-bar" class="h-full bg-white transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <div class="aura-card p-8 text-center mb-6">
            <select id="work-select" onchange="refreshWorkStats()" class="w-full mb-6 text-center text-xl font-black border-none bg-accent/5 text-accent"></select>
            <div class="flex items-center justify-center gap-6">
                <input type="number" id="work-input" class="w-32 text-7xl font-black text-center border-none p-0 text-accent bg-transparent" placeholder="0">
                <button onclick="commitCount()" class="btn-ok shadow-lg"><i class="ph-duotone ph-check-circle text-5xl"></i></button>
            </div>
        </div>

        <div id="work-stats" class="space-y-3 flex-1 overflow-y-auto mb-6"></div>

        <button onclick="showModal('m-finish')" class="w-full h-16 rounded-2xl font-black text-xs uppercase tracking-widest text-white shadow-xl" style="background: linear-gradient(90deg, #FF3B30, #a855f7);">
            Finalizar Operación
        </button>
    </div>

    <div id="m-finish" class="modal">
        <div class="aura-card p-10 w-full max-w-sm text-center">
            <i class="ph-duotone ph-warning-circle text-7xl text-danger mb-6 block"></i>
            <h3 class="text-2xl font-black mb-6 tracking-tight">¿Cerrar Descarga?</h3>
            <button onclick="finalizeWork()" class="w-full h-14 bg-danger text-white rounded-2xl font-black text-xs uppercase mb-3">Sí, Generar Reporte</button>
            <button onclick="hideModal('m-finish')" class="text-[10px] font-black text-slate-300 uppercase">Cancelar</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let master = [], queue = [], currentOp = null;

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.menu-link').forEach(b => b.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            if(document.getElementById('m-' + v)) document.getElementById('m-' + v).classList.add('active');
            if(v === 'hist') filterByProduct(document.getElementById('sku-query').value);
            toggleMenu();
        }

        window.onload = async () => { 
            loadMasterData(); 
            const months = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
            document.getElementById('month-filter').innerHTML = '<option value="all">Ver Todo</option>' + months.map((m, i) => `<option value="${i}">${m}</option>`).join('');
            document.getElementById('month-filter').value = new Date().getMonth();
            checkSession(); 
        };

        async function loadMasterData() { try { const res = await fetch(API_URL); master = await res.json(); } catch(e) {} }

        function searchMaster(q) {
            const resDiv = document.getElementById('search-results');
            if (q.length < 2) { resDiv.classList.add('hidden'); return; }
            const term = q.toLowerCase();
            const matches = master.filter(row => String(row.sku || row.SKU || '').toLowerCase().includes(term) || String(row.descripcion || row.DESCRIPCION || '').toLowerCase().includes(term)).slice(0, 5);
            if(matches.length > 0) {
                resDiv.innerHTML = matches.map(x => `<div onclick="pickSku('${x.sku || x.SKU}', '${x.descripcion || x.DESCRIPCION || ''}')" class="p-4 border-b last:border-0"><p class="font-black text-sm text-accent">${x.sku || x.SKU}</p><p class="text-[9px] text-slate-400 font-bold uppercase truncate">${x.descripcion || x.DESCRIPCION || ''}</p></div>`).join('');
                resDiv.classList.remove('hidden');
            } else { resDiv.classList.add('hidden'); }
        }

        function pickSku(s, d) { 
            document.getElementById('sku-in').value = s; 
            document.getElementById('sku-in').dataset.desc = d; 
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('meta-in').focus();
        }

        function addToQueue() {
            const s = document.getElementById('sku-in').value, d = document.getElementById('sku-in').dataset.desc || '', m = parseInt(document.getElementById('meta-in').value);
            if(!s || !m) return;
            queue.push({ sku: s, desc: d, meta: m, r: 0 });
            document.getElementById('sku-in').value = ''; document.getElementById('meta-in').value = '';
            renderQueue();
        }

        function renderQueue() {
            document.getElementById('btn-save-all').classList.toggle('hidden', queue.length === 0);
            document.getElementById('queue-list').innerHTML = queue.map((x, i) => `<div class="item-row"><div><p class="font-black text-sm">${x.sku}</p><p class="text-[9px] text-slate-400 font-bold uppercase">${x.desc}</p></div><span class="font-black text-xs bg-slate-100 px-3 py-1 rounded-lg">${x.meta}</span></div>`).join('');
        }

        function saveContenedor() {
            const h = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            const id = `TWINS-${String(h.length + 1).padStart(4, '0')}`;
            h.unshift({ id, date: new Date().toLocaleString('es-PE'), items: [...queue], done: false });
            localStorage.setItem('tajho_v3', JSON.stringify(h));
            queue = []; renderQueue(); 
            // Abrimos directamente el menú para ir al historial o dejamos que el usuario elija
            navTo('hist');
        }

        function filterByProduct(q) {
            const history = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            const selectedMonth = document.getElementById('month-filter').value;
            const term = q.toLowerCase();
            let html = "", totalCajas = 0, totalCont = new Set();

            history.forEach((op, idx) => {
                const dateParts = op.date.split(',')[0].split('/');
                const opMonth = new Date(dateParts[2], dateParts[1] - 1, dateParts[0]).getMonth();
                const matchesMonth = (selectedMonth === 'all' || opMonth.toString() === selectedMonth);
                if (matchesMonth) { op.items.forEach(it => { totalCajas += it.r; if(it.r > 0) totalCont.add(op.id); }); }

                if (term.length > 0) {
                    op.items.forEach(item => {
                        if ((item.sku.toLowerCase().includes(term) || (item.desc || '').toLowerCase().includes(term)) && matchesMonth && item.r > 0) {
                            html += `<div class="aura-card p-5 mb-2 border-l-4 border-accent flex justify-between items-center"><div class="flex-1"><p class="text-[8px] font-black text-slate-400 uppercase">${op.id}</p><p class="text-sm font-black">${item.sku}</p></div><p class="text-xl font-black text-accent">${item.r}</p></div>`;
                        }
                    });
                } else if (matchesMonth) {
                    html += `<div class="aura-card p-6 flex justify-between items-center mb-3"><div><p class="text-[8px] font-black text-slate-300 uppercase">${op.date}</p><p class="text-xl font-black">${op.id}</p></div>${op.done ? `<button onclick="genPDF(${idx})" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-accent"><i class="ph-duotone ph-file-pdf"></i></button>` : `<button onclick="openWork(${idx})" class="bg-accent text-white py-2 px-6 rounded-xl text-[10px] font-black uppercase">Contar</button>`}</div>`;
                }
            });
            document.getElementById('stats-cont').innerText = totalCont.size;
            document.getElementById('stats-cajas').innerText = totalCajas.toLocaleString();
            document.getElementById('product-results').innerHTML = html || '<p class="text-center py-10 text-slate-300 text-[10px] font-black">SIN REGISTROS</p>';
        }

        function checkSession() {
            const savedOp = localStorage.getItem('tajho_active_op');
            if (savedOp) {
                currentOp = JSON.parse(savedOp); 
                document.getElementById('v-dash').classList.remove('active');
                document.getElementById('v-work').classList.add('active');
                document.getElementById('work-title').innerText = currentOp.id;
                document.getElementById('work-select').innerHTML = currentOp.items.map(x => `<option value="${x.sku}">${x.sku}</option>`).join('');
                refreshWorkStats();
            }
        }

        function openWork(idx) {
            const h = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            currentOp = { ...h[idx], localIdx: idx };
            localStorage.setItem('tajho_active_op', JSON.stringify(currentOp));
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.getElementById('v-work').classList.add('active');
            document.getElementById('work-title').innerText = currentOp.id;
            document.getElementById('work-select').innerHTML = currentOp.items.map(x => `<option value="${x.sku}">${x.sku}</option>`).join('');
            refreshWorkStats();
        }

        function commitCount() {
            const val = parseInt(document.getElementById('work-input').value); if(isNaN(val)) return;
            const item = currentOp.items.find(x => x.sku === document.getElementById('work-select').value);
            item.r += val; document.getElementById('work-input').value = '';
            localStorage.setItem('tajho_active_op', JSON.stringify(currentOp));
            let h = JSON.parse(localStorage.getItem('tajho_v3') || '[]'); h[currentOp.localIdx] = currentOp;
            localStorage.setItem('tajho_v3', JSON.stringify(h));
            refreshWorkStats();
        }

        function refreshWorkStats() {
            let totalMeta = 0, totalReal = 0, skusCompletos = 0;
            currentOp.items.forEach(x => { totalMeta += x.meta; totalReal += x.r; if(x.r >= x.meta) skusCompletos++; });
            const porcTotal = totalMeta > 0 ? Math.min(Math.round((totalReal / totalMeta) * 100), 100) : 0;
            document.getElementById('work-perc-title').innerText = porcTotal + "%";
            document.getElementById('work-skus').innerText = `${skusCompletos} / ${currentOp.items.length}`;
            document.getElementById('work-cajas-total').innerText = `${totalReal.toLocaleString()} / ${totalMeta.toLocaleString()}`;
            document.getElementById('work-progress-bar').style.width = porcTotal + "%";
            document.getElementById('work-stats').innerHTML = currentOp.items.map(x => `
                <div class="aura-card p-5 ${x.r >= x.meta ? 'border-l-4 border-success bg-success/5' : ''}">
                    <div class="flex justify-between text-[10px] font-black uppercase mb-3">
                        <span class="max-w-[150px] truncate ${x.r >= x.meta ? 'text-success' : ''}">${x.sku}</span>
                        <span class="${x.r >= x.meta ? 'text-success' : 'text-slate-400'}">${x.r.toLocaleString()} / ${x.meta.toLocaleString()}</span>
                    </div>
                    <div class="h-1 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full ${x.r >= x.meta ? 'bg-success' : 'bg-accent'} transition-all duration-500" style="width:${Math.min((x.r/x.meta)*100,100)}%"></div>
                    </div>
                </div>`).join('');
        }

        async function finalizeWork() {
            currentOp.done = true;
            let h = JSON.parse(localStorage.getItem('tajho_v3') || '[]'); h[currentOp.localIdx] = currentOp;
            localStorage.setItem('tajho_v3', JSON.stringify(h));
            localStorage.removeItem('tajho_active_op');
            genPDF(currentOp.localIdx);
            hideModal('m-finish'); navTo('hist');
        }

        function genPDF(idx) {
            const d = JSON.parse(localStorage.getItem('tajho_v3') || '[]')[idx];
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.setFontSize(22); doc.text("TAJHO PRIME | TWINS ELITE", 14, 25);
            doc.setFontSize(10); doc.text(`REPORTE: ${d.id} | ${d.date}`, 14, 32);
            doc.autoTable({ startY: 45, head: [['SKU', 'DESCRIPCION', 'META', 'REAL', 'DIF.']], body: d.items.map(it => [it.sku, it.desc, it.meta, it.r, (it.r - it.meta)]), headStyles: { fillColor: [0,0,0] } });
            doc.setFontSize(9); doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, doc.lastAutoTable.finalY + 20);
            doc.text("Asistente de Inventario Logístico", 14, doc.lastAutoTable.finalY + 25);
            doc.save(`Reporte_${d.id}.pdf`);
        }

        function showModal(id) { document.getElementById(id).classList.add('active'); }
        function hideModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
