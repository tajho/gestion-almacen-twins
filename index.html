<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS OS | Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #007AFF; --dark: #1C1C1E; --bg: #F2F2F7; --card: #FFFFFF; }
        body { background: var(--bg); font-family: -apple-system, system-ui, sans-serif; padding-bottom: 90px; overflow-x: hidden; }
        
        /* Header Nativo */
        .app-header { background: var(--dark); color: white; padding: 40px 20px 60px; border-radius: 0 0 35px 35px; text-align: left; }
        .app-header h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        
        /* Contenedor Principal */
        .main-content { margin-top: -35px; padding: 0 15px; }
        .ios-card { background: var(--card); border-radius: 24px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); border: none; margin-bottom: 20px; }
        
        /* Buscador Inteligente */
        .search-group { position: relative; }
        .search-input { background: #E9E9EB; border: none; border-radius: 14px; padding: 15px 15px 15px 45px; font-size: 16px; transition: 0.3s; width: 100%; }
        .search-input:focus { background: #FFFFFF; box-shadow: 0 0 0 3px rgba(0,122,255,0.2); outline: none; }
        .search-icon { position: absolute; left: 15px; top: 16px; color: #8E8E93; }
        
        /* Lista de Sugerencias */
        .autocomplete-list { position: absolute; top: 60px; width: 100%; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 1000; max-height: 250px; overflow-y: auto; display: none; border: 1px solid #E5E5EA; }
        .sug-item { padding: 14px 18px; border-bottom: 1px solid #F2F2F7; cursor: pointer; }
        .sug-item:active { background: #F2F2F7; }
        .sug-name { display: block; font-weight: 600; color: var(--dark); font-size: 14px; }
        .sug-sku { font-size: 12px; color: var(--primary); font-weight: 700; }

        /* Botones Estilo Nativo */
        .btn-ios { background: var(--primary); color: white; border: none; border-radius: 16px; padding: 18px; font-weight: 700; width: 100%; font-size: 17px; transition: 0.2s; }
        .btn-ios:active { opacity: 0.7; transform: scale(0.98); }
        
        /* Navegación Inferior */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.85); backdrop-filter: saturate(180%) blur(20px); display: flex; justify-content: space-around; padding: 12px 10px 30px; border-top: 0.5px solid #C6C6C8; }
        .tab-item { border: none; background: none; color: #8E8E93; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 500; }
        .tab-item i { font-size: 22px; margin-bottom: 4px; }
        .tab-item.active { color: var(--primary); }

        .view { display: none; } .view.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <header class="app-header">
        <small class="opacity-50 fw-bold">TWINS WAREHOUSE</small>
        <h1>Gestión de Salidas</h1>
    </header>

    <main class="main-content">
        <section id="view-reg" class="view active">
            <div class="ios-card">
                <div class="search-group mb-4">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="masterSearch" class="search-input" placeholder="Nombre o SKU del producto..." oninput="handleSearch(this.value)">
                    <div id="sugBox" class="autocomplete-list"></div>
                </div>

                <div id="selectionPanel" class="d-none animate__animated animate__fadeIn">
                    <div class="p-3 rounded-4 mb-4" style="background: #F2F2F7; border-left: 5px solid var(--primary);">
                        <div id="selName" class="fw-bold text-dark mb-1"></div>
                        <div id="selSku" class="text-primary small fw-bold"></div>
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-12">
                            <select id="regDestino" class="form-select border-0 p-3 rounded-4" style="background:#F2F2F7">
                                <option value="MARKETING">MARKETING</option>
                                <option value="OFICINA">OFICINA</option>
                                <option value="VENDEDOR">VENDEDOR</option>
                            </select>
                        </div>
                        <div class="col-4">
                            <input type="number" id="regCant" class="form-control border-0 p-3 rounded-4" style="background:#F2F2F7" placeholder="Cant.">
                        </div>
                        <div class="col-8">
                            <input type="text" id="regQuien" class="form-control border-0 p-3 rounded-4" style="background:#F2F2F7" placeholder="Responsable">
                        </div>
                    </div>
                    
                    <button class="btn-ios" onclick="processRegistration()">Confirmar Salida</button>
                </div>
            </div>
        </section>

        <section id="view-hist" class="view">
            <div id="histContent"></div>
        </section>
    </main>

    <nav class="tab-bar">
        <button class="tab-item active" onclick="nav('reg', this)"><i class="fas fa-plus-circle"></i><span>Registro</span></button>
        <button class="tab-item" onclick="nav('hist', this)"><i class="fas fa-clock"></i><span>Historial</span></button>
        <button class="tab-item" onclick="location.reload()"><i class="fas fa-sync"></i><span>Actualizar</span></button>
    </nav>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzlpdRrEfbOBVwXJkjhc8lEJutgdpTEbdFrb9G3MskM54ogh-FVL9QbX1B0puTYvZDO3A/exec"; // <--- PEGA TU URL AQUÍ
        let PRODUCTOS = [];

        async function initApp() {
            const r = await fetch(WEB_APP_URL, {method: "POST", body: JSON.stringify({action: "loadAll"})});
            const d = await r.json();
            PRODUCTOS = d.p;
            renderHistorial(d.h);
        }

        function handleSearch(val) {
            const box = document.getElementById('sugBox');
            if(val.length < 2) { box.style.display = 'none'; return; }
            
            const term = val.toLowerCase();
            const matches = PRODUCTOS.filter(p => 
                p[0].toString().toLowerCase().includes(term) || 
                p[1].toString().toLowerCase().includes(term)
            ).slice(0, 8);

            if(matches.length > 0) {
                box.innerHTML = matches.map(p => `
                    <div class="sug-item" onclick="selectProduct('${p[0]}', '${p[1]}')">
                        <span class="sug-sku">${p[0]}</span>
                        <span class="sug-name">${p[1]}</span>
                    </div>
                `).join('');
                box.style.display = 'block';
            } else { box.style.display = 'none'; }
        }

        function selectProduct(sku, name) {
            document.getElementById('selName').innerText = name;
            document.getElementById('selSku').innerText = "SKU: " + sku;
            document.getElementById('selectionPanel').classList.remove('d-none');
            document.getElementById('sugBox').style.display = 'none';
            document.getElementById('masterSearch').value = sku;
        }

        async function processRegistration() {
            const payload = [
                new Date(),
                document.getElementById('regDestino').value,
                document.getElementById('selSku').innerText.replace('SKU: ', ''),
                document.getElementById('selName').innerText,
                document.getElementById('regCant').value,
                document.getElementById('regQuien').value,
                "PENDIENTE SAP"
            ];

            if(!payload[4] || !payload[5]) return Swal.fire("Atención", "Completa cantidad y responsable", "warning");

            Swal.fire({title: 'Procesando...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            await fetch(WEB_APP_URL, {method: "POST", body: JSON.stringify({action: "save", sheet: "Pedidos", payload})});
            
            Swal.fire({icon: 'success', title: 'Registrado', showConfirmButton: false, timer: 1500}).then(() => location.reload());
        }

        function renderHistorial(list) {
            document.getElementById('histContent').innerHTML = list.map(h => `
                <div class="ios-card p-3 mb-2 d-flex justify-content-between align-items-center animate__animated animate__fadeIn">
                    <div style="max-width: 70%;">
                        <div class="fw-bold" style="font-size:13px; line-height:1.2;">${h[3]}</div>
                        <small class="text-muted" style="font-size:11px;">${h[1]} • ${h[2]}</small>
                    </div>
                    <div class="text-end">
                        <div class="fw-bold text-primary">${h[4]} UDS</div>
                        <span class="badge rounded-pill" style="background:#FFF9E6; color:#FFB800; font-size:9px;">SAP PENDIENTE</span>
                    </div>
                </div>
            `).join('');
        }

        function nav(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active');
            btn.classList.add('active');
        }

        window.onload = initApp;
    </script>
</body>
</html>
