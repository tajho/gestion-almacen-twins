<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANGELO NUÑEZ | LOGISTICS PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #020617; --card: #1e293b; --success: #10b981; --danger: #ef4444; --text-main: #f8fafc; --text-dim: #94a3b8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 0; overflow-x: hidden; }

        /* App Shell */
        .app-header { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); padding: 20px; sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 40px; height: 40px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        
        .nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(15px); padding: 8px; border-radius: 24px; display: flex; gap: 8px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 1000; width: 90%; max-width: 400px; }
        .nav-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--text-dim); font-size: 0.75rem; font-weight: 600; cursor: pointer; border-radius: 18px; transition: 0.3s; }
        .nav-btn.active { background: var(--primary); color: white; }

        .container { padding: 20px; padding-bottom: 100px; max-width: 600px; margin: 0 auto; }
        .view { display: none; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .view.active { display: block; }

        /* Estilos de Componentes */
        .glass-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 24px; margin-bottom: 20px; }
        label { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: block; }
        
        input { width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 16px; color: white; font-size: 1rem; margin-bottom: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); }

        .search-feedback { padding: 16px; border-radius: 16px; background: rgba(59, 130, 246, 0.15); border-left: 4px solid var(--primary); margin-bottom: 20px; font-weight: 600; min-height: 56px; display: flex; align-items: center; }

        /* Tarjetas de Producto Modernas */
        .item-row { background: var(--card); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; position: relative; overflow: hidden; }
        .item-row.matched { border-left: 6px solid var(--success); background: linear-gradient(90deg, rgba(16, 185, 129, 0.1) 0%, rgba(30, 41, 59, 1) 100%); }
        .item-row.error { border-left: 6px solid var(--danger); }
        
        .data-grid { display: flex; justify-content: space-between; margin-top: 12px; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; }
        .data-box { text-align: center; }
        .data-label { font-size: 0.6rem; color: var(--text-dim); display: block; margin-bottom: 4px; }
        .data-value { font-size: 1.1rem; font-weight: 800; }

        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 18px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
        .btn-blue { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .btn-green { background: var(--success); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="user-profile">
            <div class="avatar">AN</div>
            <div>
                <div style="font-weight: 800; font-size: 0.9rem;">J. ANGELO NUÑEZ DURAND</div>
                <div style="font-size: 0.7rem; color: var(--text-dim);">Asist. Inventario Logístico</div>
            </div>
        </div>
    </header>

    <div class="container">
        
        <div id="view-setup" class="view active">
            <div class="glass-card">
                <label>Paso 01</label>
                <h2 style="margin: 0 0 20px 0;">Configurar Arribo</h2>
                <input type="text" id="cont_id" placeholder="N° Contenedor / Código Guía">
                <label>Documentación</label>
                <input type="file" id="pck_file" accept="image/*">
                <button class="btn-main btn-blue" onclick="switchView(1)">Iniciar Operación</button>
            </div>
        </div>

        <div id="view-scan" class="view">
            <div class="glass-card">
                <label>Buscador Inteligente</label>
                <input type="text" id="m_search" placeholder="Escribe SKU o Producto..." oninput="searchMaster(this.value)">
                <div id="search_res" class="search-feedback">Esperando entrada de datos...</div>
                
                <div style="display: flex; gap: 12px;">
                    <div style="flex:1"><label>Packing</label><input type="number" id="q_pck" placeholder="0"></div>
                    <div style="flex:1"><label>Físico</label><input type="number" id="q_fis" placeholder="0"></div>
                </div>
                <button class="btn-main btn-blue" onclick="addRecord()">Registrar en Inventario</button>
            </div>

            <div id="records_container">
                </div>
        </div>

        <div id="view-report" class="view">
            <div class="glass-card" style="text-align: center;">
                <h2 style="margin-top:0;">Cierre de Auditoría</h2>
                <p style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 24px;">Verifica que todos los ítems estén marcados en verde antes de exportar.</p>
                <button class="btn-main btn-green" onclick="generateReport()">Generar PDF Profesional</button>
            </div>
        </div>

    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="switchView(0)">Arribo</button>
        <button class="nav-btn" onclick="switchView(1)">Conteo</button>
        <button class="nav-btn" onclick="switchView(2)">Cierre</button>
    </nav>

<script>
    const API_URL = "TU_URL_AQUI"; 
    let masterData = [];
    let log = {};
    let activeItem = null;

    window.onload = async () => {
        try {
            const r = await fetch(API_URL);
            masterData = await r.json();
            console.log("Conectado con Maestro");
        } catch (e) { console.error("Error de enlace"); }
    };

    function switchView(idx) {
        const views = document.querySelectorAll('.view');
        const btns = document.querySelectorAll('.nav-btn');
        views.forEach((v, i) => v.classList.toggle('active', i === idx));
        btns.forEach((b, i) => b.classList.toggle('active', i === idx));
    }

    function searchMaster(val) {
        val = val.trim().toUpperCase();
        if(val.length < 2) return;
        const p = masterData.find(x => x[0].toString().includes(val) || x[1].toString().includes(val));
        const fb = document.getElementById('search_res');
        if(p) {
            activeItem = { sku: p[0], nombre: p[1] };
            fb.innerText = `✅ [${p[0]}] ${p[1]}`;
            fb.style.color = "var(--primary)";
        } else {
            activeItem = null;
            fb.innerText = "❌ Producto no existe";
            fb.style.color = "var(--danger)";
        }
    }

    function addRecord() {
        const pck = parseInt(document.getElementById('q_pck').value) || 0;
        const fis = parseInt(document.getElementById('q_fis').value) || 0;
        const cont = document.getElementById('cont_id').value;

        if(!activeItem || fis === 0 || !cont) return alert("Completa los datos mínimos");

        const sku = activeItem.sku;
        if(!log[sku]) log[sku] = { nombre: activeItem.nombre, p: pck, f: 0 };
        log[sku].f += fis;
        if(pck > 0) log[sku].p = pck;

        // Sincronización Invisible (POST)
        fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ contenedor: cont, sku: sku, cantidad: fis }) });

        renderUI();
        document.getElementById('m_search').value = "";
        document.getElementById('q_fis').value = "";
        document.getElementById('m_search').focus();
    }

    function renderUI() {
        const container = document.getElementById('records_container');
        container.innerHTML = "";
        
        Object.keys(log).reverse().forEach(k => {
            const i = log[k];
            const isMatch = i.f === i.p;
            const diff = i.f - i.p;
            
            container.innerHTML += `
                <div class="item-row ${isMatch ? 'matched' : (i.p > 0 && i.f != i.p ? 'error' : '')}">
                    <div style="font-weight: 800; font-size: 0.85rem; color: var(--primary);">${k}</div>
                    <div style="font-size: 0.75rem; color: var(--text-dim); margin-top: 4px;">${i.nombre}</div>
                    <div class="data-grid">
                        <div class="data-box"><span class="data-label">Packing</span><span class="data-value">${i.p}</span></div>
                        <div class="data-box"><span class="data-label">Físico</span><span class="data-value">${i.f}</span></div>
                        <div class="data-box"><span class="data-label">Diferencia</span><span class="data-value" style="color:${diff < 0 ? 'var(--danger)' : (diff > 0 ? 'var(--warn)' : 'white')}">${diff}</span></div>
                    </div>
                </div>
            `;
        });
    }

    function generateReport() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const cont = document.getElementById('cont_id').value;

        // Estética PDF Corporativa
        doc.setFillColor(15, 23, 42);
        doc.rect(0, 0, 210, 50, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22).text("REPORTE DE INVENTARIO", 105, 25, {align:'center'});
        doc.setFontSize(10).text(`CONTENEDOR: ${cont} | FECHA: ${new Date().toLocaleString()}`, 105, 35, {align:'center'});

        const rows = Object.keys(log).map(s => [s, log[s].nombre, log[s].p, log[s].f, log[s].f - log[s].p]);

        doc.autoTable({
            startY: 55,
            head: [['SKU', 'DESCRIPCIÓN', 'PACKING', 'CONTEO', 'DIF']],
            body: rows,
            theme: 'striped',
            headStyles: { fillColor: [59, 130, 246] },
            styles: { fontSize: 8 }
        });

        const y = doc.lastAutoTable.finalY + 30;
        doc.setTextColor(0, 0, 0);
        doc.setFontSize(10).text("Revisión autorizada por:", 105, y, {align:'center'});
        doc.setFont(undefined, 'bold').text("J. Angelo Nuñez Durand", 105, y + 7, {align:'center'});
        doc.setFont(undefined, 'normal').text("Asist. Inventario Logístico", 105, y + 13, {align:'center'});
        
        doc.save(`Ingreso_${cont}.pdf`);
    }
</script>
</body>
</html>
