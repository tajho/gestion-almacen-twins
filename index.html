<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística - Twins Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        
        .container-card { background: white; border-radius: 32px; border: 1px solid #F1F5F9; box-shadow: 0 4px 20px rgba(0,0,0,0.02); margin-bottom: 20px; overflow: hidden; }
        .btn-tool { border-radius: 16px; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 14px 2px; transition: all 0.2s; cursor: pointer; border: 1px solid #F1F5F9; }
        .btn-tool:active { transform: scale(0.95); background: #f8fafc; }
        
        /* Indicador visual de color de texto según Excel */
        .txt-red { color: #ef4444; }
        .txt-green { color: #22c55e; }
        .txt-blue { color: #3b82f6; }
        .txt-orange { color: #f97316; }
        .txt-purple { color: #a855f7; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 p-6">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-[800] tracking-tighter italic">TWINS <span class="text-blue-600">ELITE</span></h1>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Angelo Nuñez Durand</p>
            </div>
            <div id="sync-indicator" class="text-green-500"><i class="ph-bold ph-check-circle text-2xl"></i></div>
        </div>
    </header>

    <main class="p-5 max-w-xl mx-auto pb-40">
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Cajas Analizadas</p>
                <h2 id="total-boxes" class="text-3xl font-black text-slate-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Productos SKU</p>
                <h2 id="total-skus" class="text-3xl font-black text-slate-800">0</h2>
            </div>
        </div>

        <div id="main-content"></div>

    </main>

    <script>
        const API_URL = "TU_URL_DE_APPS_SCRIPT";
        // Carga inmediata desde la memoria del teléfono
        let masterData = JSON.parse(localStorage.getItem('twins_v12_cache')) || [];

        async function fetchUpdate() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                masterData = data.historial || data;
                localStorage.setItem('twins_v12_cache', JSON.stringify(masterData));
                renderApp();
            } catch(e) { console.log("Sincronización invisible fallida"); }
        }

        function renderApp() {
            const container = document.getElementById('main-content');
            
            // AGRUPACIÓN POR COLOR DE LETRA (Atributo 'fontColor' desde el Excel)
            const grouped = masterData.reduce((acc, item) => {
                if(!item.operacion) return acc;
                
                // Usamos el color de letra como identificador de contenedor
                const colorID = item.fontColor || 'blue'; 
                if(!acc[colorID]) {
                    acc[colorID] = { 
                        color: colorID, 
                        label: item.operacion, 
                        items: [], 
                        cajasSum: 0 
                    };
                }
                acc[colorID].items.push(item);
                acc[colorID].cajasSum += (Number(item.meta) || 0);
                return acc;
            }, {});

            let html = '';
            let globalCajas = 0;
            let globalSkus = 0;

            Object.values(grouped).forEach(group => {
                globalCajas += group.cajasSum;
                globalSkus += group.items.length;

                html += `
                <div class="container-card p-7">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[9px] font-black uppercase tracking-widest text-slate-400">Contenedor Identificado</span>
                            <h3 class="text-2xl font-[900] tracking-tighter uppercase" style="color: ${group.color}">
                                ${group.label}
                            </h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-900">${group.cajasSum} CJ</p>
                            <p class="text-[8px] font-bold text-slate-400 uppercase">${group.items.length} SKUS</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <div onclick="btnControl('CORREGIR', '${group.color}')" class="btn-tool bg-white text-slate-600">
                            <i class="ph-bold ph-pencil-simple text-lg text-blue-500"></i>CORREGIR
                        </div>
                        <div onclick="btnControl('LISTA', '${group.color}')" class="btn-tool bg-white text-slate-600">
                            <i class="ph-bold ph-list-numbers text-lg text-slate-800"></i>LISTA
                        </div>
                        <div onclick="btnControl('PDF', '${group.color}')" class="btn-tool bg-white text-slate-600">
                            <i class="ph-bold ph-file-pdf text-lg text-red-500"></i>PDF
                        </div>
                    </div>
                </div>`;
            });

            container.innerHTML = html || `<div class="py-20 text-center opacity-20 font-black uppercase text-xs tracking-widest">Sin datos disponibles</div>`;
            document.getElementById('total-boxes').innerText = globalCajas.toLocaleString();
            document.getElementById('total-skus').innerText = globalSkus.toLocaleString();
        }

        // FUNCIONALIDAD DE BOTONES
        function btnControl(tipo, colorId) {
            const filtered = masterData.filter(i => i.fontColor === colorId);
            
            if (tipo === 'LISTA') {
                const detalle = filtered.map(i => `${i.sku} | ${i.descripcion} | ${i.meta} cajas`).join('\n');
                alert(`DETALLE DEL CONTENEDOR:\n\n${detalle}`);
            } 
            else if (tipo === 'PDF') {
                const footer = "Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.";
                alert(`Generando PDF para contenedor con letras color ${colorId}...\n\n${footer}`);
            }
            else if (tipo === 'CORREGIR') {
                alert(`Abriendo editor para los ${filtered.length} productos de este contenedor.`);
            }
        }

        // Inicio nativo e inmediato
        renderApp();
        fetchUpdate();
        setInterval(fetchUpdate, 60000);
    </script>
</body>
</html>
