<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twins Despacho - Black Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-green: #39ff14; --bg-black: #000000; --card-gray: #0a0a0a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-black); color: #ffffff; margin: 0; overflow-x: hidden; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        
        /* Efecto de Cristal Negro */
        .cyber-card { 
            background: linear-gradient(145deg, #0f0f0f, #050505); 
            border: 1px solid rgba(255,255,255,0.03); 
            box-shadow: 0 10px 30px rgba(0,0,0,1);
            border-radius: 2.5rem; 
        }
        
        /* Botones Neón */
        .btn-neon { 
            background: #ffffff; color: #000; border-radius: 1.5rem; 
            font-weight: 900; padding: 1.3rem; transition: 0.4s;
            box-shadow: 0 0 15px rgba(255,255,255,0.2); border: none;
        }
        .btn-neon-blue { background: var(--neon-blue); box-shadow: 0 0 20px rgba(0,242,255,0.3); }

        .view { display: none; min-height: 100vh; padding: 1.5rem; }
        .view.active { display: flex; flex-direction: column; animation: zoomFade 0.5s ease-out; }
        
        @keyframes zoomFade {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Input Estilo HUD */
        .hud-input { 
            background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.2rem;
            padding: 1.2rem; color: var(--neon-blue); font-weight: 800; width: 100%; outline: none;
            transition: 0.3s;
        }
        .hud-input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0,242,255,0.1); }
        
        /* Resultados de búsqueda flotantes */
        #results { backdrop-filter: blur(20px); background: rgba(10,10,10,0.95); }
    </style>
</head>
<body>

    <header class="fixed top-0 left-0 right-0 h-24 px-8 flex justify-between items-center z-[100] bg-black/50 backdrop-blur-xl border-b border-white/5">
        <div onclick="navTo('home')" class="flex flex-col">
            <span class="font-cyber text-2xl font-black italic tracking-tighter">TWINS<span class="text-cyan-400">OS</span></span>
            <span class="text-[8px] font-bold text-slate-500 tracking-[0.4em] uppercase">Inventory Control v3.0</span>
        </div>
        <button onclick="navTo('historial')" class="w-12 h-12 cyber-card flex items-center justify-center border-white/10">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </button>
    </header>

    <div id="view-home" class="view active pt-32">
        <div class="mb-12">
            <h2 class="text-xs font-black text-cyan-400 tracking-[0.5em] mb-4">SISTEMA ACTIVO</h2>
            <h1 class="text-6xl font-black tracking-tighter italic leading-none mb-6">ANGELO<br><span class="text-slate-500">PRO.</span></h1>
        </div>
        
        <div class="grid gap-6">
            <button onclick="navTo('crear')" class="btn-neon btn-neon-blue flex justify-between items-center px-8">
                <span class="font-cyber">NUEVO DESPACHO</span>
                <span class="text-2xl">→</span>
            </button>
            
            <div class="grid grid-cols-2 gap-4">
                <div onclick="navTo('historial')" class="cyber-card p-6 flex flex-col justify-between h-44 border-white/5">
                    <span class="text-[10px] font-black text-slate-500 uppercase">Log History</span>
                    <span class="text-2xl font-black italic">REPORTES</span>
                </div>
                <div class="cyber-card p-6 flex flex-col justify-between h-44 border-white/5 opacity-40">
                    <span class="text-[10px] font-black text-slate-500 uppercase">Cloud Status</span>
                    <span class="text-2xl font-black italic">SYNC</span>
                </div>
            </div>
        </div>
    </div>

    <div id="view-crear" class="view pt-32">
        <div class="flex items-center gap-4 mb-10">
            <button onclick="navTo('home')" class="text-slate-600 font-black">BACK</button>
            <h2 class="font-cyber text-xl font-black italic">INITIALIZE</h2>
        </div>
        
        <div class="space-y-4 mb-8">
            <div class="p-1 rounded-[1.5rem] bg-gradient-to-r from-cyan-500 to-blue-600">
                <input type="text" id="c-id" class="hud-input !border-none text-white text-center text-xl" placeholder="NUM. CONTENEDOR">
            </div>
            
            <div class="relative">
                <input type="text" id="s-sku" oninput="smartSearch()" class="hud-input" placeholder="BUSCAR PRODUCTO O SKU">
                <div id="results" class="absolute z-50 left-0 right-0 rounded-2xl mt-4 hidden border border-cyan-500/30 max-h-60 overflow-y-auto shadow-[0_0_40px_rgba(0,0,0,0.8)]"></div>
            </div>

            <div class="flex gap-4">
                <input type="number" id="s-meta" class="hud-input flex-1" placeholder="META CJ">
                <button onclick="addMani()" class="w-20 h-full btn-neon !p-0 flex items-center justify-center text-3xl">+</button>
            </div>
        </div>

        <div id="pre-list" class="flex-grow space-y-4 overflow-y-auto mb-24"></div>
        
        <div class="fixed bottom-10 left-6 right-6">
            <button onclick="saveAndGo()" class="btn-neon btn-neon-blue w-full font-cyber tracking-widest">START OPERATION</button>
        </div>
    </div>

    <div id="view-ops" class="view pt-32">
        <div class="cyber-card p-8 mb-8 border-b-4 border-cyan-500 shadow-cyan-900/20">
            <p id="op-title" class="text-[10px] font-black text-cyan-400 tracking-[0.4em] mb-6 text-center"></p>
            <select id="sel-sku" onchange="renderMiniBars()" class="text-4xl font-black bg-transparent text-white w-full text-center outline-none mb-8 appearance-none italic"></select>
            
            <div class="flex justify-center items-center gap-8">
                <input type="number" id="qty-in" class="bg-black border-2 border-white/10 w-32 h-24 text-center text-5xl font-black rounded-[2rem] text-cyan-400" placeholder="0">
                <button onclick="registrarBulto()" class="w-24 h-24 btn-neon-blue rounded-[2.5rem] text-3xl font-black shadow-cyan-500/50">OK</button>
            </div>
        </div>
        
        <div id="mini-progress-list" class="space-y-4 pb-36"></div>
        
        <div class="fixed bottom-10 left-6 right-6">
            <button onclick="finalizarOficial()" class="btn-neon !bg-white !text-black w-full font-cyber">FINALIZAR & GENERAR PDF</button>
        </div>
    </div>

    <div id="view-historial" class="view pt-32">
        <h2 class="font-cyber text-2xl font-black mb-10 italic">ARCHIVOS<span class="text-cyan-400">_</span></h2>
        <div id="history-list" class="space-y-6 pb-20"></div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_items = {};
        let currentMani = [];
        let activeJob = null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                const raw = await res.json();
                raw.forEach(r => { if(r.CODIGO) db_items[r.CODIGO.toString().trim().toUpperCase()] = r.DESCRIPCION; });
            } catch (e) {}
            activeJob = JSON.parse(localStorage.getItem('tj_active'));
            if (activeJob) { navTo('ops'); resumeOps(); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'historial') renderHistory();
            window.scrollTo(0,0);
        }

        function smartSearch() {
            const val = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('results');
            if(val.length < 2) { resDiv.classList.add('hidden'); return; }
            const matches = Object.entries(db_items).filter(([sku, desc]) => 
                sku.includes(val) || desc.toUpperCase().includes(val)
            ).slice(0, 6);
            resDiv.innerHTML = matches.map(([sku, desc]) => `
                <div onclick="setProd('${sku}')" class="p-5 border-b border-white/5 active:bg-cyan-500 active:text-black transition-all">
                    <p class="font-black text-lg font-cyber">${sku}</p>
                    <p class="text-xs text-slate-500 uppercase truncate">${desc}</p>
                </div>
            `).join('');
            resDiv.classList.remove('hidden');
        }

        function setProd(sku) { 
            document.getElementById('s-sku').value = sku; 
            document.getElementById('results').classList.add('hidden'); 
            document.getElementById('s-meta').focus(); 
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_items[sku] || "S/D", meta, real: 0 });
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderPreList() {
            document.getElementById('pre-list').innerHTML = currentMani.map((i, idx) => `
                <div class="cyber-card p-6 flex justify-between items-center border-white/5">
                    <div><p class="font-black text-cyan-400 font-cyber">${i.sku}</p><p class="text-[10px] text-slate-500 italic">${i.desc}</p></div>
                    <div class="flex items-center gap-6">
                        <span class="text-xl font-black">${i.meta}</span>
                        <button onclick="currentMani.splice(${idx},1);renderPreList()" class="text-red-500 text-2xl">×</button>
                    </div>
                </div>
            `).join('');
        }

        function saveAndGo() {
            if(currentMani.length === 0) return;
            const id = document.getElementById('c-id').value || "TW-" + Math.floor(1000 + Math.random()*9000);
            activeJob = { id, items: [...currentMani], fecha: new Date().toLocaleString(), status: 'RUNNING' };
            localStorage.setItem('tj_active', JSON.stringify(activeJob));
            let history = JSON.parse(localStorage.getItem('tj_history')) || [];
            history.unshift(activeJob);
            localStorage.setItem('tj_history', JSON.stringify(history));
            currentMani = [];
            navTo('ops');
            resumeOps();
        }

        function resumeOps() {
            document.getElementById('op-title').innerText = "TRACKING ID: " + activeJob.id;
            document.getElementById('sel-sku').innerHTML = activeJob.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            renderMiniBars();
        }

        function registrarBulto() {
            const val = parseInt(document.getElementById('qty-in').value);
            if(!val) return;
            const target = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            if(target) target.real += val;
            document.getElementById('qty-in').value = '';
            localStorage.setItem('tj_active', JSON.stringify(activeJob));
            renderMiniBars();
        }

        function renderMiniBars() {
            document.getElementById('mini-progress-list').innerHTML = activeJob.items.map(i => {
                const pc = Math.min(Math.round((i.real / i.meta) * 100), 100);
                const isSelected = i.sku === document.getElementById('sel-sku').value;
                return `<div class="cyber-card p-5 transition-all ${isSelected ? 'border-cyan-500 border-2 shadow-[0_0_20px_rgba(0,242,255,0.1)]' : 'opacity-40'}">
                    <div class="flex justify-between font-black text-xs mb-3">
                        <span class="font-cyber">${i.sku}</span>
                        <span class="${pc>=100?'text-green-400':'text-cyan-400'}">${i.real} / ${i.meta}</span>
                    </div>
                    <div class="h-2 w-full bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r from-cyan-500 to-blue-500" style="width:${pc}%"></div>
                    </div>
                </div>`;
            }).join('');
        }

        function finalizarOficial() {
            if(!activeJob) return;
            let history = JSON.parse(localStorage.getItem('tj_history')) || [];
            const idx = history.findIndex(h => h.id === activeJob.id && h.status !== 'DONE');
            activeJob.status = "DONE";
            if(idx !== -1) history[idx] = activeJob;
            localStorage.setItem('tj_history', JSON.stringify(history));
            generarPDF(activeJob);
            localStorage.removeItem('tj_active');
            activeJob = null;
            navTo('home');
        }

        function generarPDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(0, 0, 0); doc.rect(0, 0, 210, 45, 'F');
            doc.setTextColor(0, 242, 255); doc.setFontSize(26); doc.text("TWINS BLACK OPS", 14, 28);
            doc.setTextColor(0,0,0); doc.setFontSize(10);
            doc.text(`ID OPERACIÓN: ${data.id} | FECHA: ${data.fecha}`, 14, 55);
            doc.autoTable({
                startY: 65,
                head: [['SKU', 'DESCRIPCION', 'EXPECTED', 'ACTUAL', 'STATUS']],
                body: data.items.map(i => [i.sku, i.desc.slice(0,30), i.meta, i.real, (i.real === i.meta ? 'OK' : 'DIFF')]),
                theme: 'grid',
                headStyles: { fillColor: [0, 0, 0], textColor: [0, 242, 255] }
            });
            doc.setFontSize(8); doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 20);
            doc.save(`LOG_${data.id}.pdf`);
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('tj_history')) || [];
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="cyber-card p-8 border-l-8 ${h.status==='DONE'?'border-l-green-500':'border-l-cyan-500'}">
                    <p class="text-[10px] font-black text-slate-600 tracking-widest mb-2">${h.fecha}</p>
                    <h3 class="text-3xl font-black font-cyber mb-6 italic">${h.id}</h3>
                    <div class="flex gap-4">
                        ${h.status!=='DONE' ? `<button onclick="loadJob('${h.id}')" class="flex-1 bg-cyan-500 text-black font-black p-4 rounded-2xl text-[10px] font-cyber">RESUME</button>`:''}
                        <button onclick='descargarManual("${h.id}")' class="flex-1 bg-white/5 border border-white/10 text-white font-black p-4 rounded-2xl text-[10px] font-cyber">EXPORT PDF</button>
                    </div>
                </div>
            `).join('');
        }

        function loadJob(id) {
            activeJob = (JSON.parse(localStorage.getItem('tj_history'))).find(x => x.id === id);
            localStorage.setItem('tj_active', JSON.stringify(activeJob));
            navTo('ops'); resumeOps();
        }

        function descargarManual(id) {
            const h = (JSON.parse(localStorage.getItem('tj_history'))).find(x => x.id === id);
            if(h) generarPDF(h);
        }

        init();
    </script>
</body>
</html>
