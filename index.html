<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TITAN LOGISTICS | Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --primary: #0052cc;
            --danger: #ff5630;
            --dark: #172b4d;
            --bg: #f8f9fa;
        }

        body { 
            background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--dark); padding-bottom: 100px;
        }

        /* HEADER */
        .top-bar {
            background: #fff; padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.06);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        /* CARDS */
        .glass-card {
            background: #ffffff; border-radius: 24px; padding: 20px;
            margin: 15px; border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
        }

        .label-sm { font-size: 10px; font-weight: 800; color: #6b778c; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; display: block; }

        .input-pro {
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 2px solid #ebecf0;
            font-size: 15px; font-weight: 600; margin-bottom: 15px; transition: 0.2s;
        }
        .input-pro:focus { border-color: var(--primary); outline: none; background: #fff; }

        /* AREA DE NOTAS */
        .notes-area {
            background: #fff9db; border: 1px solid #f5e08e; border-radius: 12px;
            padding: 10px; font-size: 14px; min-height: 60px; width: 100%;
            resize: none; font-family: inherit;
        }

        /* HISTORIAL */
        .hist-card {
            background: #fff; border-radius: 18px; padding: 16px; margin-bottom: 12px;
            border-left: 6px solid var(--danger); transition: 0.2s;
        }
        .time-badge { font-size: 11px; background: #f4f5f7; padding: 4px 8px; border-radius: 6px; font-weight: 700; }

        /* NAV */
        .nav-bottom {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; border-top: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-around; padding: 12px;
        }
        .nav-link { border: none; background: none; color: #a5adba; font-weight: 700; font-size: 11px; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }

        .btn-save {
            background: var(--dark); color: #fff; border: none; border-radius: 15px;
            padding: 15px; font-weight: 800; width: 100%; margin-top: 15px;
            box-shadow: 0 4px 12px rgba(23, 43, 77, 0.2);
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div>
            <div style="font-size: 16px; font-weight: 800;">TITAN <span style="color:var(--danger)">DEV</span></div>
            <div style="font-size: 10px; color: #6b778c;">Logística de Inventarios</div>
        </div>
        <div class="time-badge"><i class="far fa-clock"></i> <span id="clock">--:--</span></div>
    </header>

    <main>
        <section id="v-reg" class="view">
            <div class="glass-card">
                <span class="label-sm">Datos de Ruta</span>
                <input type="text" id="cli" class="input-pro" placeholder="Cliente..." oninput="autoSuggest(this.value)">
                <input type="text" id="ven" class="input-pro" placeholder="Vendedor...">

                <span class="label-sm">Buscador de Items</span>
                <div class="position-relative">
                    <input type="text" id="src" class="input-pro" placeholder="SKU o Producto..." oninput="findItem(this.value)">
                    <div id="results" class="list-group shadow-lg position-absolute w-100" style="z-index: 1000; display: none; margin-top: -10px;"></div>
                </div>

                <div id="cart-box" class="mb-3"></div>

                <span class="label-sm">Observaciones Rápidas</span>
                <textarea id="notes" class="notes-area" placeholder="Escribe aquí información adicional..."></textarea>

                <button class="btn-save" onclick="processFinal()">GUARDAR DEVOLUCIÓN <i class="fas fa-check-circle ms-2"></i></button>
            </div>
        </section>

        <section id="v-his" class="view d-none">
            <div class="p-3">
                <div class="position-relative mb-3">
                    <i class="fas fa-search position-absolute" style="top: 15px; left: 15px; color: #a5adba;"></i>
                    <input type="text" id="search-his" class="input-pro" style="padding-left: 45px;" placeholder="Buscar por cliente o vendedor..." oninput="filterHis(this.value)">
                </div>
                <div id="history-feed"></div>
            </div>
        </section>
    </main>

    <nav class="nav-bottom">
        <button class="nav-link active" onclick="tab('reg', this)"><i class="fas fa-plus-square"></i>REGISTRO</button>
        <button class="nav-link" onclick="tab('his', this)"><i class="fas fa-history"></i>HISTORIAL</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCeMB7Cf1DpA41NEmprwR0XqrvdD_-xTEbl3vKsMlaHIp_r3b5MpMWcbrQKyOiYFF2NQ/exec";
        let MASTER = [], CART = [], MEM = {}, HIS_DATA = [];

        function init() {
            MEM = JSON.parse(localStorage.getItem('TITAN_MEM')) || {};
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }, 1000);
            fetchSync();
        }

        async function fetchSync() {
            try {
                const r = await fetch(API, {method: "POST", body: JSON.stringify({action: "load"})});
                const d = await r.json();
                MASTER = d.p; HIS_DATA = d.h;
                renderHistory();
            } catch(e) {}
        }

        function autoSuggest(v) {
            const val = v.toUpperCase();
            if(MEM[val]) document.getElementById('ven').value = MEM[val];
        }

        function findItem(v) {
            const box = document.getElementById('results');
            if(v.length < 1) { box.style.display='none'; return; }
            const matches = MASTER.filter(p => p[1].toLowerCase().includes(v.toLowerCase()) || p[0].toString().includes(v)).slice(0,5);
            box.innerHTML = matches.map(p => `
                <button class="list-group-item list-group-item-action text-start" onclick="addToCart('${p[0]}','${p[1]}')">
                    <b>${p[1]}</b><br><small class="text-muted">SKU: ${p[0]}</small>
                </button>
            `).join('');
            box.style.display = matches.length ? 'block' : 'none';
        }

        function addToCart(sku, name) {
            Swal.fire({
                title: 'Cantidad',
                input: 'number',
                inputAttributes: { min: 1 },
                showCancelButton: true,
                confirmButtonColor: '#0052cc'
            }).then(res => {
                if(res.value) {
                    CART.push({sku, name, q: res.value});
                    document.getElementById('results').style.display='none';
                    document.getElementById('src').value = '';
                    renderCart();
                }
            });
        }

        function renderCart() {
            document.getElementById('cart-box').innerHTML = CART.map((i, idx) => `
                <div class="d-flex justify-content-between align-items-center p-2 mb-2 bg-light rounded-3">
                    <span style="font-size:13px"><b>${i.q}</b> x ${i.name}</span>
                    <i class="fas fa-trash text-muted" onclick="CART.splice(${idx},1); renderCart();"></i>
                </div>
            `).join('');
        }

        async function processFinal() {
            const cli = document.getElementById('cli').value.toUpperCase();
            const ven = document.getElementById('ven').value.toUpperCase();
            const note = document.getElementById('notes').value;

            if(!cli || CART.length === 0) return Swal.fire("Atención", "Falta cliente o productos", "warning");

            MEM[cli] = ven;
            localStorage.setItem('TITAN_MEM', JSON.stringify(MEM));

            const payload = CART.map(i => [new Date(), "DEVOLUCION", i.sku, i.name, i.q, cli, `Vendedor: ${ven} | Nota: ${note}`]);

            // Diálogo Moderno de Éxito
            Swal.fire({
                title: '¡Registro Exitoso!',
                text: `Se guardó correctamente la devolución del cliente ${cli}`,
                icon: 'success',
                timer: 2500,
                showConfirmButton: false,
                customClass: { popup: 'rounded-5' }
            });

            // Reset y Envío
            CART = []; renderCart();
            document.getElementById('cli').value = ''; 
            document.getElementById('ven').value = '';
            document.getElementById('notes').value = '';

            fetch(API, {method: "POST", body: JSON.stringify({action: "save", sheet: "Devoluciones", payload})})
            .then(() => fetchSync());
        }

        function renderHistory(filter = "") {
            const feed = document.getElementById('history-feed');
            const groups = {};
            
            HIS_DATA.filter(r => r[1] === "DEVOLUCION").forEach(r => {
                const dateObj = new Date(r[0]);
                const timeStr = dateObj.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const dateStr = dateObj.toLocaleDateString();
                const vendor = r[6].split('|')[0].replace('Vendedor: ', '');
                
                // Filtro por Cliente o Vendedor
                if(filter && !r[5].toLowerCase().includes(filter.toLowerCase()) && !vendor.toLowerCase().includes(filter.toLowerCase())) return;

                const key = r[5] + "_" + r[0];
                if(!groups[key]) groups[key] = { cli: r[5], ven: vendor, date: dateStr, time: timeStr, items: [] };
                groups[key].items.push({ n: r[3], q: r[4] });
            });

            feed.innerHTML = Object.values(groups).reverse().slice(0,20).map(g => `
                <div class="hist-card" onclick="openDetails('${btoa(JSON.stringify(g))}')">
                    <div class="d-flex justify-content-between align-items-start">
                        <span class="label-sm" style="color:var(--danger)">Hoja de Ruta</span>
                        <div class="text-end">
                            <div class="fw-bold" style="font-size:12px">${g.date}</div>
                            <div class="text-muted" style="font-size:10px">${g.time}</div>
                        </div>
                    </div>
                    <div style="font-size: 16px; font-weight: 800; margin-top:5px;">${g.cli}</div>
                    <div style="font-size: 12px; color: #6b778c;">Atendido por: <b>${g.ven}</b></div>
                </div>
            `).join('');
        }

        function filterHis(v) { renderHistory(v); }

        function openDetails(data) {
            const g = JSON.parse(atob(data));
            Swal.fire({
                title: g.cli,
                html: `
                    <div class="text-start" style="font-size:14px">
                        <p class="mb-2 text-muted">Vendedor: ${g.ven}</p>
                        <hr>
                        ${g.items.map(i => `<div class="d-flex justify-content-between mb-1"><span>${i.n}</span><b>x${i.q}</b></div>`).join('')}
                    </div>
                `,
                confirmButtonText: '<i class="fas fa-file-pdf"></i> GENERAR REPORTE',
                confirmButtonColor: '#172b4d',
                showCancelButton: true
            }).then(r => { if(r.isConfirmed) generatePDF(g); });
        }

        function generatePDF(g) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(23, 43, 77); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255); doc.setFontSize(20); doc.text("REPORTE DE CARGA Y DEVOLUCIÓN", 14, 25);
            
            doc.setTextColor(0); doc.setFontSize(11);
            doc.text(`CLIENTE: ${g.cli}`, 14, 50);
            doc.text(`VENDEDOR: ${g.ven}`, 14, 56);
            doc.text(`FECHA: ${g.date} | HORA: ${g.time}`, 14, 62);

            doc.autoTable({
                startY: 70,
                head: [['Cant', 'Producto / Descripción']],
                body: g.items.map(i => [i.q, i.n]),
                headStyles: { fillColor: [255, 86, 48] }
            });

            const finalY = doc.lastAutoTable.finalY + 25;
            doc.setFontSize(8); doc.setTextColor(100);
            doc.text("----------------------------------------------------------------", 105, finalY, {align:'center'});
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 105, finalY + 5, {align:'center'});
            
            doc.save(`REPORTE_${g.cli}_${g.date}.pdf`);
        }

        function tab(v, b) {
            document.querySelectorAll('.view').forEach(x => x.classList.add('d-none'));
            document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active'));
            document.getElementById('v-'+v).classList.remove('d-none');
            b.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
