<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS TITAN | Official QC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        :root { --bg: #0a0b0d; --card: #16181c; --accent: #007AFF; --danger: #FF3B30; --success: #32D74B; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; padding-bottom: 100px; }
        
        .smart-input { background: #1c1f26; border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; color: white; width: 100%; outline: none; transition: 0.3s; }
        .smart-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,122,255,0.2); }
        
        .panel-qc { background: var(--card); border-radius: 30px; padding: 25px; margin: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .item-list { background: rgba(255,255,255,0.02); border-radius: 20px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--danger); }
        
        .nav-dock { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(22,24,28,0.95); backdrop-filter: blur(20px); border-radius: 25px; display: flex; justify-content: space-around; padding: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { background: none; border: none; color: #636366; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; }
        .nav-btn.active { color: var(--accent); }
    </style>
</head>
<body>

<header class="p-4 text-center">
    <h2 class="fw-black mb-0">TITAN <span class="text-accent">LOGISTICS</span></h2>
    <small class="opacity-50 fw-bold">SISTEMA AUTORIZADO - QC V10</small>
</header>

<main>
    <section id="v-qc" class="view active">
        <div class="panel-qc">
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="small fw-bold opacity-50 ms-2">CLIENTE</label>
                    <input type="text" id="cli" class="smart-input" placeholder="Nombre..." oninput="suggestVendedor(this.value)">
                </div>
                <div class="col-6">
                    <label class="small fw-bold opacity-50 ms-2">VENDEDOR</label>
                    <input type="text" id="ven" class="smart-input" placeholder="Nombre...">
                </div>
            </div>

            <div class="mb-3 position-relative">
                <input type="text" id="search" class="smart-input" placeholder="🔍 Buscar SKU o Producto..." oninput="findProd(this.value)">
                <div id="results" class="list-group position-absolute w-100 shadow-lg" style="z-index: 1000; display:none;"></div>
            </div>

            <div id="form-add" class="d-none animate__animated animate__fadeIn">
                <div class="p-3 mb-3" style="background:rgba(0,122,255,0.1); border-radius:15px;">
                    <b id="sel-name"></b><br><small id="sel-sku" class="text-accent"></small>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6"><label class="small fw-bold ms-2">CANT. GUÍA</label><input type="number" id="c-g" class="smart-input"></div>
                    <div class="col-6"><label class="small fw-bold ms-2">CANT. REAL</label><input type="number" id="c-r" class="smart-input"></div>
                </div>
                <select id="state" class="smart-input mb-3">
                    <option>FALLADO A MERMA</option>
                    <option>SE ARREGLO EL PRODUCTO</option>
                    <option>PRODUCTO FALLA DE IMPORTACION</option>
                </select>
                <button class="btn w-100 py-3 fw-bold btn-primary rounded-pill" onclick="addToList()">AÑADIR A LISTA</button>
            </div>

            <div id="list-area" class="mt-4 d-none">
                <div id="list-items"></div>
                <button class="btn btn-success w-100 py-3 fw-bold rounded-pill mt-3 shadow-lg" onclick="finalProcess()">FINALIZAR REPORTE OFICIAL</button>
            </div>
        </div>
    </section>

    <section id="v-log" class="view d-none">
        <div id="log-content" class="px-3"></div>
    </section>
</main>

<nav class="nav-dock">
    <button class="nav-btn active" onclick="nav('qc')"><i class="fas fa-clipboard-check fs-4"></i><span>NUEVO QC</span></button>
    <button class="nav-btn" onclick="nav('log')"><i class="fas fa-database fs-4"></i><span>HISTORIAL</span></button>
</nav>

<script>
    const API = "TU_URL_DE_APPSCRIPT"; // Asegúrate de poner tu URL real aquí
    let DB = []; let QUEUE = []; let RELATIONS = {}; let ACTIVE = null;

    async function init() {
        const r = await fetch(API, {method: "POST", body: JSON.stringify({action: "load"})});
        const d = await r.json(); 
        DB = d.p; 
        // Generar memoria de Cliente-Vendedor basada en el historial
        d.h.forEach(row => { RELATIONS[row[5].toLowerCase()] = row[6].split('| Vend: ')[1] || ''; });
        renderLog(d.h);
    }

    function suggestVendedor(val) {
        const v = RELATIONS[val.toLowerCase()];
        if(v) document.getElementById('ven').value = v;
    }

    function findProd(v) {
        const res = document.getElementById('results');
        if(v.length < 2) { res.style.display='none'; return; }
        const matches = DB.filter(p => p[1].toLowerCase().includes(v.toLowerCase())).slice(0,5);
        res.innerHTML = matches.map(p => `<button class="list-group-item list-group-item-action bg-dark text-white border-secondary" onclick="selectProd('${p[0]}','${p[1]}')">${p[1]}</button>`).join('');
        res.style.display='block';
    }

    function selectProd(sku, name) {
        ACTIVE = {sku, name};
        document.getElementById('sel-name').innerText = name;
        document.getElementById('sel-sku').innerText = sku;
        document.getElementById('form-add').classList.remove('d-none');
        document.getElementById('results').style.display='none';
    }

    function addToList() {
        const cg = document.getElementById('c-g').value;
        const cr = document.getElementById('c-r').value;
        QUEUE.push({...ACTIVE, cg, cr, st: document.getElementById('state').value});
        renderUI();
        document.getElementById('form-add').classList.add('d-none');
        document.getElementById('search').value = "";
    }

    function renderUI() {
        document.getElementById('list-area').classList.remove('d-none');
        document.getElementById('list-items').innerHTML = QUEUE.map(i => `
            <div class="item-list">
                <div class="d-flex justify-content-between"><b>${i.name}</b> <span class="badge bg-danger">REAL: ${i.cr}</span></div>
                <small class="opacity-50">${i.st}</small>
            </div>
        `).join('');
    }

    async function finalProcess() {
        const cli = document.getElementById('cli').value;
        const ven = document.getElementById('ven').value;
        if(!cli || !ven) return Swal.fire("Error", "Cliente y Vendedor son obligatorios", "error");

        const payload = QUEUE.map(i => [new Date(), "QC-OFFICIAL", i.sku, i.name, i.cr, cli, `Guia: ${i.cg} | Rev: ${i.st} | Vend: ${ven}`]);
        
        Swal.fire({title:'Guardando y Firmando...', didOpen:()=>Swal.showLoading()});
        await fetch(API, {method: "POST", body: JSON.stringify({action: "save", sheet: "Devoluciones", payload})});
        
        generateOfficialPDF(cli, ven);
        sendWhatsApp(cli, ven);
        
        Swal.fire("Finalizado", "Reporte firmado y enviado", "success").then(()=>location.reload());
    }

    function generateOfficialPDF(cli, ven) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20); doc.text("REPORTE TÉCNICO DE INSPECCIÓN", 14, 20);
        doc.setFontSize(10); doc.text(`CLIENTE: ${cli} | VENDEDOR: ${ven}`, 14, 30);
        
        doc.autoTable({
            head: [['SKU', 'ARTÍCULO', 'GUÍA', 'REAL', 'ESTADO']],
            body: QUEUE.map(i => [i.sku, i.name, i.cg, i.cr, i.st]),
            startY: 40,
            theme: 'grid',
            headStyles: { fillColor: [0, 122, 255] }
        });

        // PIE DE PÁGINA AUTORIZADO
        const finalY = doc.lastAutoTable.finalY + 20;
        doc.line(14, finalY, 100, finalY);
        doc.setFontSize(9);
        doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, finalY + 5);
        doc.text("Asist. Inventario Logístico", 14, finalY + 10);
        
        doc.save(`QC_${cli}.pdf`);
    }

    function sendWhatsApp(cli, ven) {
        let msg = `*REPORTE DE RETORNO - QC*%0ACliente: ${cli}%0A---%0A`;
        QUEUE.forEach(i => {
            msg += `• ${i.name} (${i.cr}/${i.cg}) - ${i.st}%0A`;
        });
        msg += `%0A_Firma: J. Angelo Nuñez Durand_`;
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    function renderLog(h) {
        document.getElementById('log-content').innerHTML = h.slice(0,20).map(r => `
            <div class="panel-qc p-3 mb-2" style="font-size:13px">
                <div class="d-flex justify-content-between text-accent fw-bold"><span>${r[5]}</span> <span>x${r[4]}</span></div>
                <div class="fw-bold">${r[3]}</div>
                <small class="opacity-50">${r[6]}</small>
            </div>
        `).join('');
    }

    function nav(v) {
        document.querySelectorAll('.view').forEach(e => e.classList.add('d-none'));
        document.getElementById('v-'+v).classList.remove('d-none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    window.onload = init;
</script>
</body>
</html>
