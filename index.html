<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS LOGISTICS PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --log-blue: #0052cc; --log-dark: #091e42; --log-green: #36b37e; 
            --log-red: #ff5630; --log-bg: #f4f5f7; --white: #ffffff; 
        }
        body { background: var(--log-bg); font-family: 'Inter', system-ui, -apple-system; padding-bottom: 110px; color: var(--log-dark); }
        
        .app-bar { background: var(--log-dark); color: white; padding: 25px 20px 45px; border-radius: 0 0 30px 30px; }
        .app-bar h1 { font-size: 20px; font-weight: 800; margin: 0; }

        .main-container { margin-top: -30px; padding: 0 16px; }
        .glass-card { background: var(--white); border-radius: 20px; padding: 20px; box-shadow: 0 4px 12px rgba(9, 30, 66, 0.08); border: none; margin-bottom: 20px; }
        
        /* Buscador Inteligente */
        .search-wrapper { position: relative; }
        .search-input-pro { background: #ebecf0; border: 2px solid transparent; border-radius: 12px; padding: 12px 12px 12px 40px; width: 100%; font-size: 16px; transition: 0.2s; }
        .search-input-pro:focus { background: white; border-color: var(--log-blue); outline: none; }
        .search-icon { position: absolute; left: 15px; top: 15px; color: #6b778c; }
        
        .sug-dropdown { position: absolute; width: 100%; background: white; border-radius: 12px; z-index: 1100; box-shadow: 0 15px 30px rgba(0,0,0,0.1); max-height: 250px; overflow-y: auto; display: none; margin-top: 5px; border: 1px solid #dfe1e6; }
        .sug-item { padding: 12px; border-bottom: 1px solid #f4f5f7; cursor: pointer; }

        /* Botones Logísticos */
        .log-btn { border-radius: 12px; padding: 14px; font-weight: 700; border: none; width: 100%; transition: 0.2s; }
        .btn-blue { background: var(--log-blue); color: white; }
        .btn-red { background: var(--log-red); color: white; }
        .btn-green { background: var(--log-green); color: white; }

        /* Listas Temporales */
        .temp-list-item { background: #f8f9fa; border-radius: 12px; padding: 10px 15px; margin-bottom: 8px; border-left: 4px solid var(--log-blue); font-size: 14px; }
        .dev-item { border-left-color: var(--log-red) !important; }

        .bottom-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: white; border-radius: 20px; display: flex; justify-content: space-around; padding: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-tab { border: none; background: none; color: #6b778c; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 600; }
        .nav-tab.active { color: var(--log-blue); }
        
        .view { display: none; } .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="app-bar d-flex justify-content-between align-items-center">
        <h1>TWINS HUB PRO</h1>
        <button class="btn text-white p-0" onclick="location.reload()"><i class="fas fa-sync-alt"></i></button>
    </header>

    <main class="main-container">
        
        <section id="v-salidas" class="view active">
            <div class="glass-card">
                <p class="small fw-bold text-muted mb-3"><i class="fas fa-arrow-up me-2"></i>NUEVA SALIDA DE BODEGA</p>
                <div class="search-wrapper mb-3">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="sSal" class="search-input-pro" placeholder="SKU o Nombre..." oninput="smartSearch(this.value, 'sugSal', 'sal')">
                    <div id="sugSal" class="sug-dropdown"></div>
                </div>
                <div id="boxSal" class="d-none">
                    <div class="p-2 bg-light rounded small mb-2" id="infoSal"></div>
                    <div class="row g-2 mb-3">
                        <div class="col-4"><input type="number" id="cSal" class="form-control" placeholder="Cant."></div>
                        <div class="col-8"><button class="log-btn btn-blue" onclick="addToList('sal')">AGREGAR</button></div>
                    </div>
                </div>
                <div id="listSalArea" class="d-none">
                    <div id="listSalCont" class="mb-3"></div>
                    <input type="text" id="whoSal" class="form-control mb-2" placeholder="Responsable">
                    <select id="tipoSal" class="form-select mb-3">
                        <option value="MARKETING">MARKETING</option><option value="OFICINA">OFICINA</option><option value="VENDEDOR">VENDEDOR</option>
                    </select>
                    <button class="log-btn btn-green" onclick="processAll('Pedidos', 'sal')">CONFIRMAR SALIDA</button>
                </div>
            </div>
        </section>

        <section id="v-dev" class="view">
            <div class="glass-card">
                <p class="small fw-bold text-danger mb-3"><i class="fas fa-arrow-down me-2"></i>RETORNO DE MERCANCÍA (LISTA)</p>
                <div class="search-wrapper mb-3">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="sDev" class="search-input-pro" placeholder="SKU o Nombre del producto..." oninput="smartSearch(this.value, 'sugDev', 'dev')">
                    <div id="sugDev" class="sug-dropdown"></div>
                </div>
                <div id="boxDev" class="d-none">
                    <div class="p-2 bg-light rounded small mb-2" id="infoDev"></div>
                    <div class="row g-2 mb-3">
                        <div class="col-4"><input type="number" id="cDev" class="form-control" placeholder="Cant."></div>
                        <div class="col-8">
                            <select id="mDev" class="form-select">
                                <option>Dañado/Mal estado</option><option>Rotación/Sin Venta</option><option>Error Despacho</option>
                            </select>
                        </div>
                    </div>
                    <button class="log-btn btn-red mb-3" onclick="addToList('dev')">AGREGAR A DEVOLUCIÓN</button>
                </div>
                <div id="listDevArea" class="d-none">
                    <hr>
                    <div id="listDevCont" class="mb-3"></div>
                    <input type="text" id="cliDev" class="form-control mb-3" placeholder="Nombre del Cliente / Origen">
                    <button class="log-btn btn-green shadow" onclick="processAll('Devoluciones', 'dev')">GUARDAR Y GENERAR PDF <i class="fas fa-file-pdf ms-2"></i></button>
                </div>
            </div>
        </section>

        <section id="v-hist" class="view">
            <h6 class="fw-bold px-2 mb-3">Movimientos Recientes</h6>
            <div id="histLog">Cargando datos...</div>
        </section>

    </main>

    <nav class="bottom-nav">
        <button class="nav-tab active" onclick="nav('salidas', this)"><i class="fas fa-truck-loading"></i><span>Salidas</span></button>
        <button class="nav-tab" onclick="nav('dev', this)"><i class="fas fa-box-tissue"></i><span>Devolución</span></button>
        <button class="nav-tab" onclick="nav('hist', this)"><i class="fas fa-history"></i><span>Historial</span></button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxCeMB7Cf1DpA41NEmprwR0XqrvdD_-xTEbl3vKsMlaHIp_r3b5MpMWcbrQKyOiYFF2NQ/exec"; // <--- PEGA TU URL DE GOOGLE AQUÍ
        let DB = []; let LIST_SAL = []; let LIST_DEV = []; let SEL = null;

        async function init() {
            const r = await fetch(API_URL, {method: "POST", body: JSON.stringify({action: "load"})});
            const d = await r.json();
            DB = d.p;
            renderHist(d.h);
        }

        function smartSearch(v, bId, t) {
            const b = document.getElementById(bId);
            if(v.length < 2) { b.style.display='none'; return; }
            const m = DB.filter(p => p[0].toString().toLowerCase().includes(v.toLowerCase()) || p[1].toString().toLowerCase().includes(v.toLowerCase())).slice(0,6);
            b.innerHTML = m.map(p => `<div class="sug-item" onclick="selectItem('${p[0]}','${p[1]}','${t}')"><b>${p[1]}</b><small>${p[0]}</small></div>`).join('');
            b.style.display='block';
        }

        function selectItem(s, n, t) {
            SEL = {s, n};
            const pref = t === 'sal' ? 'Sal' : 'Dev';
            document.getElementById('info'+pref).innerHTML = `<b>${n}</b><br><span class="text-primary">${s}</span>`;
            document.getElementById('box'+pref).classList.remove('d-none');
            document.getElementById('sug'+pref).style.display='none';
        }

        function addToList(t) {
            const cant = document.getElementById('c'+(t==='sal'?'Sal':'Dev')).value;
            if(!cant) return;
            if(t === 'sal') {
                LIST_SAL.push({...SEL, cant});
                renderListUI('sal');
            } else {
                const mot = document.getElementById('mDev').value;
                LIST_DEV.push({...SEL, cant, mot});
                renderListUI('dev');
            }
            document.getElementById('box'+(t==='sal'?'Sal':'Dev')).classList.add('d-none');
            document.getElementById('s'+(t==='sal'?'Sal':'Dev')).value = "";
        }

        function renderListUI(t) {
            const cont = document.getElementById('list'+(t==='sal'?'Sal':'Dev')+'Cont');
            const area = document.getElementById('list'+(t==='sal'?'Sal':'Dev')+'Area');
            const list = t === 'sal' ? LIST_SAL : LIST_DEV;
            area.classList.remove('d-none');
            cont.innerHTML = list.map(i => `
                <div class="temp-list-item ${t==='dev'?'dev-item':''} d-flex justify-content-between">
                    <span>${i.n} ${t==='dev'?'('+i.mot+')':''}</span>
                    <b>x${i.cant}</b>
                </div>
            `).join('');
        }

        async function processAll(sheet, t) {
            const q = document.getElementById(t==='sal'?'whoSal':'cliDev').value;
            if(!q) return Swal.fire("Atención","Escribe el nombre del responsable/cliente","warning");
            
            const list = t === 'sal' ? LIST_SAL : LIST_DEV;
            const payload = list.map(i => [
                new Date(), 
                t === 'sal' ? document.getElementById('tipoSal').value : "DEVOLUCIÓN",
                i.s, i.n, i.cant, q, 
                t === 'sal' ? "PENDIENTE SAP" : i.mot
            ]);

            Swal.fire({title:'Guardando...', didOpen:()=>Swal.showLoading()});
            await fetch(API_URL, {method: "POST", body: JSON.stringify({action: "save", sheet, payload})});
            
            if(t === 'dev') generatePDF(q, list);
            
            Swal.fire("Éxito","Registros guardados","success").then(()=>location.reload());
        }

        function generatePDF(cli, list) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.text("REPORTE DE DEVOLUCIÓN - TWINS", 20, 20);
            doc.setFontSize(12); doc.text(`Cliente: ${cli}`, 20, 35);
            doc.text(`Fecha: ${new Date().toLocaleString()}`, 20, 42);
            doc.line(20, 48, 190, 48);
            let y = 55;
            list.forEach(i => {
                doc.text(`${i.n} (${i.s})`, 20, y);
                doc.text(`Cant: ${i.cant} - Motivo: ${i.mot}`, 130, y);
                y += 10;
            });
            doc.save(`Devolucion_${cli}.pdf`);
        }

        function renderHist(l) {
            document.getElementById('histLog').innerHTML = l.map(r => `
                <div class="temp-list-item d-flex flex-column mb-2" style="border-left-color:#ccc">
                    <div class="d-flex justify-content-between"><b>${r[3]}</b> <span>x${r[4]}</span></div>
                    <small class="text-muted">${r[1]} | ${r[5]} | ${new Date(r[0]).toLocaleDateString()}</small>
                </div>
            `).join('');
        }

        function nav(v, b) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
            const id = v === 'salidas' ? 'v-salidas' : (v === 'dev' ? 'v-dev' : 'v-hist');
            document.getElementById(id).classList.add('active');
            b.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
