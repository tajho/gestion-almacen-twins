<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TWINS PRO | J. ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --black: #000; --white: #fff; --gray: #f4f4f4; --success: #d4edda; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { background: var(--white); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { background: var(--black); color: var(--white); padding: 45px 20px 20px; border-radius: 0 0 25px 25px; flex-shrink: 0; z-index: 10; }
        header h1 { font-size: 0.9rem; margin: 0; letter-spacing: 3px; font-weight: 900; }
        header p { font-size: 0.6rem; margin: 5px 0 0; opacity: 0.8; letter-spacing: 1px; }

        #main-scroll { flex: 1; overflow-y: auto; padding: 20px 15px 160px; scroll-behavior: smooth; }
        .card { border: 2px solid #eee; border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; transition: 0.3s; }
        .card.complete { background: var(--black); color: var(--white); border-color: var(--black); }
        
        .sku-tag { font-size: 0.65rem; font-weight: 900; background: #000; color: #fff; padding: 4px 10px; border-radius: 5px; margin-bottom: 10px; display: inline-block; }
        .card.complete .sku-tag { background: #fff; color: #000; }

        .desc { font-size: 0.9rem; font-weight: 700; margin-bottom: 15px; line-height: 1.3; }

        /* Controles de Suma */
        .sum-engine { display: flex; gap: 10px; }
        input[type="number"] { flex: 1; background: #f9f9f9; border: 2px solid #ddd; border-radius: 12px; padding: 15px; font-size: 1.4rem; font-weight: 900; outline: none; }
        .card.complete input { background: #333; border-color: #444; color: #fff; }
        
        .btn-plus { background: var(--black); color: #fff; border: none; width: 60px; height: 60px; border-radius: 12px; font-size: 1.8rem; font-weight: 900; cursor: pointer; }
        .card.complete .btn-plus { background: var(--white); color: var(--black); }

        .status-info { margin-top: 15px; display: flex; justify-content: space-between; align-items: flex-end; }
        .counter { font-size: 0.7rem; font-weight: 800; color: #888; text-transform: uppercase; }
        .card.complete .counter { color: #aaa; }
        .count-val { display: block; font-size: 1.3rem; color: var(--black); }
        .card.complete .count-val { color: var(--white); }

        /* Footer Fijo con Botón de Reporte */
        footer { position: fixed; bottom: 0; width: 100%; background: var(--white); padding: 25px; border-top: 1px solid #eee; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .btn-report { background: var(--black); color: var(--white); border: none; width: 100%; padding: 20px; border-radius: 15px; font-weight: 900; letter-spacing: 1px; font-size: 0.85rem; cursor: pointer; }
        
        .loader { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        textarea { width: 100%; height: 200px; border-radius: 15px; border: 2px solid #eee; padding: 15px; margin-bottom: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="setup" class="loader">
    <h2 style="font-weight: 900; margin-bottom: 5px;">INICIAR SISTEMA</h2>
    <p style="font-size: 0.7rem; color: #888; margin-bottom: 25px;">PEGA EL MANIFIESTO (JSON)</p>
    <textarea id="json-input" placeholder="[{...}, {...}]"></textarea>
    <button class="btn-report" onclick="loadSystem()">CARGAR DATOS DEL CONTENEDOR</button>
</div>

<header>
    <h1>J. ANGELO NUÑEZ DURAND</h1>
    <p>ASISTENTE DE LOGÍSTICA | AUDITORÍA TWINS</p>
</header>

<div id="main-scroll" class="hidden">
    <div id="list-container"></div>
</div>

<footer class="hidden" id="footer-ui">
    <button id="main-pdf-btn" class="btn-report" onclick="generateOfficialPDF()">DESCARGAR REPORTE PDF INFALIBLE</button>
</footer>

<script>
    let inventory = [];
    // Firma estilizada en alta calidad
    const FIRMA_B64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAABkCAYAAADD9n8HAAAAAXNSR0IArs4c6QAAEchJREFUeF7tXWtsHMcV/mZ29+79uCTvS5RESpYpWZZjxY6dWnHaInZsOHVaw0DRFm0fDf3ToAUK9E+BAn3ToEDRP9mgaVvHSBEnTuw6LlzVkiXHkhV9iqREiqIoeZ8P7969O7szU9zLS2mXpC7Iu0uu7wMGe7N378z55szMmTMzR0BfGgMaA1UfA9Xfgr6hxoDGgBoB9CHQGKjxGNAI1HjD69trBGoM0GdAY6DGY0AjUOMNr2+vEagxQJ8BjYEajwGNQI03vL69RoDGAn0GNAZqPAY0AjXe8Pr2GgEaA/QZ0Bio8RjQCNR4w+vbawRoDNBnQGOgxmNAI1DjDa9vrxGgMUCTAclI7E7M7M49eIAs6X6X7u/60hioixigTCI2En0pZnbnHzxAlvS4S/d3fWkM1EUMUCYRG4m+FDO78w8eIEt63KX7u740BuoiBiiTiI1EX4qZ3fkHD5AlPe7S/V1fGgN1EQOUScRGoi/FzO78gwfIkh536f6uL42BuogByiRiI9GXYmZ3/sEDZEmPu3R/15fGQF3EAGUSsZHoSzGzO/8fHSDqIatfF7fN9GvXFv6Sre/N0beu3higSCKmi0XEnBv8f15E6O8EInYnHqAn3Z/N8TfR8/Pz5Mknnmh5XpD6f9m5IubY4P+vE/mE7uD8AmXSuZHoCzGzu/7hAWpU6i6fHz9+nHznO98pS7mI6WIRMeH8/3QiH9f9XpBAEisRG4vOi5ndfX8XIEt6WvT5v3MMLFuAlEnERmIvxczuvr8LkCU9Xfr83zkGlilAnInYvTHM7P76O8fAkh4uff7vHgPLEyDxvTHM7P76O8fAkh4uff7vHgPLEyDxHTHM7P76O8fAkh4uff7vHgPLEyDx7THM7P76O8fAkh4uff7vHgPLEiDxbTHM7P76O8fAkh4uff7vHgPLEiDxzTHM7P76O8fAkh4uff7vHgPLEiDxjTHM7P76O8fAkh4uff7vHgPLEyDujTHM7P76O8fAkh4uff7vHgPLEiDu9THM7P76O8fAkh4uff7vHgPLEiDu1THM7P76O8fAkh4uff7vHgPLEiDubTHM7P76O8fAkh4uff7vHgPLEiDurzHM7P76O8fAkh4uff7vHgPLEiDu9TDM7P76O8fAkh4uff7vHgPLEiDu8TDM7P76O8fAkh4uff7vHgPLEiDu7jDM7P76O8fAkh4uff7vHgPLEiDuTjPM7P76O8fAkh4uff7vHgPLEiDuNTPM7P76O8fAkh4uff7vHgPLEiDuFTPM7P76O8fAkh4uff7vHgPLEiDubjPM7P76O8fAkh4uff7vHgPLEiDuVTPM7P76O8fAkh4uff7vHgPLEyDuyTDMPPofvMvS/S7d3/WlMVAnMUCZRGwkekPM7MH/WpY0f/r9v86Krt6/XGUSsbHoXszshR8dIEt6XfT5v3MMLFeAuFNR8U6O+f889S9fXxoDdX4C0X8W/f8Rk79v9O/79K99Y4CyREz3X8TfM+7vGfeZ940B5f//BvA68Y9TInUfAAAAAElFTkSuQmCC";

    function loadSystem() {
        const raw = document.getElementById('json-input').value;
        try {
            inventory = JSON.parse(raw).map(i => ({...i, total_contado: 0}));
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('main-scroll').classList.remove('hidden');
            document.getElementById('footer-ui').classList.remove('hidden');
            renderCards();
        } catch(e) { alert("ERROR: El JSON no es válido. Revisa los corchetes y comas."); }
    }

    function renderCards() {
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        inventory.forEach((item, idx) => {
            const cajasActuales = item.total_contado / item.u_por_caja;
            const metaCajas = item.cajas_pck;
            const complete = cajasActuales >= metaCajas;

            container.innerHTML += `
                <div class="card ${complete ? 'complete' : ''}" id="card-${idx}">
                    <span class="sku-tag">${item.sku}</span>
                    <div class="desc">${item.desc}</div>
                    <div class="sum-engine">
                        <input type="number" id="input-${idx}" placeholder="Suma..." inputmode="numeric">
                        <button class="btn-plus" onclick="sumar(${idx})">+</button>
                    </div>
                    <div class="status-info">
                        <span class="counter">Contado Actual:</span>
                        <span class="count-val"><b>${cajasActuales.toFixed(0)}</b> / ${metaCajas} CJ</span>
                    </div>
                </div>`;
        });
    }

    function sumar(idx) {
        const input = document.getElementById(`input-${idx}`);
        const val = parseFloat(input.value) || 0;
        if (val === 0) return;

        // SUMA ACUMULADA: No borra, suma al total
        inventory[idx].total_contado += (val * inventory[idx].u_por_caja);
        input.value = ""; // Limpiar input
        renderCards();
        
        // Efecto visual de confirmación
        const card = document.getElementById(`card-${idx}`);
        card.style.transform = "scale(1.02)";
        setTimeout(() => card.style.transform = "scale(1)", 200);
    }

    async function generateOfficialPDF() {
        const btn = document.getElementById('main-pdf-btn');
        btn.innerText = "PROCESANDO ARCHIVO...";
        btn.style.background = "#555";

        // Verificar si la librería cargó
        if (typeof window.jspdf === 'undefined') {
            alert("Error: La librería de PDF no ha cargado. Revisa tu conexión a internet y refresca la página.");
            btn.innerText = "ERROR DE LIBRERÍA";
            return;
        }

        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Encabezado Negro Profesional
            doc.setFillColor(0, 0, 0);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(18).setFont(undefined, 'bold').text("REPORTE DE AUDITORÍA LOGÍSTICA", 105, 20, {align: 'center'});
            doc.setFontSize(9).setFont(undefined, 'normal').text("SISTEMA DE GESTIÓN DE INVENTARIOS TWINS", 105, 30, {align: 'center'});

            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10).setFont(undefined, 'bold').text(`AUDITOR: J. ANGELO NUÑEZ DURAND`, 15, 55);
            doc.setFontSize(8).setFont(undefined, 'normal').text(`FECHA DE EMISIÓN: ${new Date().toLocaleString()}`, 15, 62);

            const tableData = inventory.map(i => [
                i.sku,
                i.desc.substring(0, 45),
                i.cajas_pck,
                (i.total_contado / i.u_por_caja).toFixed(0),
                (i.total_contado / i.u_por_caja >= i.cajas_pck ? "OK" : "PENDIENTE")
            ]);

            doc.autoTable({
                startY: 70,
                head: [['SKU', 'PRODUCTO', 'PLAN', 'REAL', 'ESTADO']],
                body: tableData,
                headStyles: { fillColor: [0, 0, 0], fontSize: 8 },
                styles: { fontSize: 7, cellPadding: 4 },
                columnStyles: { 4: { fontStyle: 'bold' } }
            });

            const finalY = doc.lastAutoTable.finalY + 30;
            if (finalY > 260) doc.addPage();

            // Bloque de Firma Oficial
            doc.addImage(FIRMA_B64, 'PNG', 80, finalY - 20, 50, 20);
            doc.setLineWidth(0.5).line(70, finalY, 140, finalY);
            doc.setFontSize(10).setFont(undefined, 'bold').text("J. ANGELO NUÑEZ DURAND", 105, finalY + 8, {align: 'center'});
            doc.setFontSize(8).setFont(undefined, 'normal').text("ASISTENTE DE LOGÍSTICA", 105, finalY + 14, {align: 'center'});
            doc.setFontSize(7).setTextColor(100).text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 105, finalY + 25, {align: 'center'});

            doc.save(`TWINS_AUDIT_${new Date().getTime()}.pdf`);
            btn.innerText = "PDF DESCARGADO ✓";
            btn.style.background = "#28a745";
            setTimeout(() => { 
                btn.innerText = "DESCARGAR REPORTE PDF INFALIBLE"; 
                btn.style.background = "#000";
            }, 3000);

        } catch (err) {
            alert("Error crítico al generar PDF: " + err.message);
            btn.innerText = "ERROR AL GENERAR";
        }
    }
</script>
</body>
</html>
