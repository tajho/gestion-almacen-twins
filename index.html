<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tajho Aura Prime | Twins Elite</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #f4f7fa; --accent: #007AFF; --success: #34C759; --warning: #F59E0B; --danger: #6B7280; --header-h: 70px; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #1e293b; margin: 0; min-height: 100vh; }
        
        .main-header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        /* MENU ESTATICO SIN SALTOS */
        .side-menu { position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: #fff; z-index: 3000; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.08); display: flex; flex-direction: column; padding: 40px 20px; transform: translateX(-105%); }
        .side-menu.active { transform: translateX(0); }
        
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 2500; display: none; }
        .menu-overlay.active { display: block; }
        
        .view { display: none; padding: 20px; padding-top: calc(var(--header-h) + 20px); flex-direction: column; animation: viewIn 0.3s ease; }
        .view.active { display: flex; }
        @keyframes viewIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .aura-card { background: #fff; border-radius: 24px; border: 1px solid rgba(0,0,0,0.02); box-shadow: 0 4px 15px rgba(0,0,0,0.01); }
        input, select { background: #fff!important; border: 1px solid #e2e8f0!important; border-radius: 14px!important; padding: 12px!important; font-weight: 700!important; outline: none!important; font-size: 14px!important;}
        
        /* BOTÓN CAJITA COLOR */
        .btn-add-count { background: linear-gradient(135deg, #007AFF, #0055ff); color: white; box-shadow: 0 6px 20px rgba(0,122,255,0.3); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 4000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .progress-ring__circle { transition: stroke-dashoffset 0.5s ease; transform: rotate(-90deg); transform-origin: 50% 50%; }
    </style>
</head>
<body>

    <header class="main-header shadow-sm">
        <button onclick="toggleMenu()" class="text-3xl text-slate-800 p-2 active:scale-90"><i class="ph-bold ph-list"></i></button>
        <h2 class="text-xl font-black italic tracking-tighter text-slate-950">Tajho <span class="text-accent not-italic">Prime</span></h2>
        <div class="w-10"></div>
    </header>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="side-menu" id="side-menu">
        <div class="mb-10 px-4"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Menú</p></div>
        <button onclick="navTo('dash')" class="flex items-center gap-4 p-4 rounded-xl mb-2 font-bold text-slate-600 active:bg-blue-50" id="m-dash"><i class="ph-bold ph-house-line text-2xl"></i>Inicio</button>
        <button onclick="navTo('create')" class="flex items-center gap-4 p-4 rounded-xl mb-2 font-bold text-slate-600 active:bg-blue-50" id="m-create"><i class="ph-bold ph-package text-2xl"></i>Planificar</button>
        <button onclick="navTo('hist')" class="flex items-center gap-4 p-4 rounded-xl mb-2 font-bold text-slate-600 active:bg-blue-50" id="m-hist"><i class="ph-bold ph-folders text-2xl"></i>Historial</button>
        <div class="mt-auto border-t pt-6 text-center">
            <p class="text-[9px] font-bold text-slate-400 uppercase">J. Angelo Nuñez Durand<br>Asist. Inventario Logístico</p>
        </div>
    </nav>

    <div id="v-dash" class="view active">
        <div class="aura-card p-10 text-center mt-6 border border-blue-50">
            <i class="ph-duotone ph-identification-card text-7xl text-accent mb-6 block"></i>
            <h3 class="font-black text-2xl uppercase tracking-tighter">Inventory Manager</h3>
            <p class="text-[10px] text-slate-400 font-bold uppercase mt-2">Twins Elite | Tajho Official</p>
        </div>
    </div>

    <div id="v-create" class="view">
        <h2 class="text-2xl font-black mb-6 tracking-tighter">Planificar Carga</h2>
        <div class="aura-card p-6 mb-6">
            <input type="text" id="sku-in" oninput="searchMaster(this.value)" class="w-full mb-4" placeholder="Buscar SKU..." autocomplete="off">
            <div id="search-results" class="hidden absolute w-full mt-[-10px] bg-white rounded-2xl shadow-2xl border z-[2000] max-h-60 overflow-y-auto"></div>
            <div class="flex gap-3">
                <input type="number" id="meta-in" class="flex-1 text-center font-black" placeholder="Meta">
                <button onclick="addToQueue()" class="h-[52px] px-8 bg-accent text-white rounded-xl font-bold uppercase text-[10px] active:scale-95">Añadir</button>
            </div>
        </div>
        <div id="queue-list" class="space-y-2 mb-6"></div>
        <button onclick="saveContenedor()" id="btn-save-all" class="w-full py-5 bg-slate-950 text-white rounded-2xl font-black text-xs uppercase hidden shadow-xl active:scale-95">Registrar Contenedor</button>
    </div>

    <div id="v-hist" class="view">
        <h2 class="text-2xl font-black mb-6 tracking-tighter">Historial</h2>
        <div class="aura-card p-6 mb-6">
            <div class="grid grid-cols-2 gap-4 mb-4 text-center">
                <div class="bg-blue-50 p-4 rounded-2xl"><p class="text-[8px] font-black text-blue-400">CONTENEDORES</p><p id="stats-cont" class="text-2xl font-black text-accent">0</p></div>
                <div class="bg-green-50 p-4 rounded-2xl"><p class="text-[8px] font-black text-green-400">CAJAS TOTALES</p><p id="stats-cajas" class="text-2xl font-black text-success">0</p></div>
            </div>
            <input type="text" id="sku-query" class="w-full text-sm" placeholder="Buscar SKU o ID..." oninput="filterByProduct(this.value)">
        </div>
        <div id="product-results" class="space-y-4"></div>
    </div>

    <div id="v-work" class="view">
        <div class="flex justify-between items-center mb-4 sticky top-[70px] bg-slate-50/95 backdrop-blur-md py-3 z-[100]">
            <h2 class="text-2xl font-black tracking-tighter" id="work-title">--</h2>
            <div class="text-right">
                <span id="work-perc-title" class="text-2xl font-black text-accent">0%</span>
                <p class="text-[8px] font-black text-slate-400 uppercase">Progreso</p>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-2 mb-6 p-2 bg-white rounded-3xl border shadow-lg sticky top-[135px] z-[90]">
            <div class="col-span-8"><select id="work-select" class="w-full h-12 text-sm font-black border-none"></select></div>
            <div class="col-span-2"><input type="number" id="work-input" class="w-full h-12 text-lg font-black text-center border-none bg-slate-50 rounded-xl" placeholder="0"></div>
            <div class="col-span-2">
                <button onclick="commitCount()" class="btn-add-count w-full h-12 rounded-xl flex items-center justify-center active:scale-90 transition-all">
                    <i class="ph-bold ph-package text-2xl"></i>
                </button>
            </div>
        </div>

        <div id="work-stats" class="space-y-3 min-h-[300px]"></div>
        
        <div class="mt-10 mb-20">
            <button onclick="showModal('m-finish')" class="w-full py-6 bg-slate-900 text-white rounded-3xl font-black text-xs uppercase shadow-2xl active:scale-95">
                Finalizar y Firmar Reporte
            </button>
        </div>
    </div>

    <div id="m-list" class="modal">
        <div class="aura-card p-6 w-full max-w-sm"><h3 id="list-modal-title" class="font-black mb-4">Detalle</h3><div id="list-modal-content" class="space-y-2"></div><button onclick="hideModal('m-list')" class="w-full mt-4 py-3 bg-slate-100 rounded-xl font-bold">Cerrar</button></div>
    </div>

    <div id="m-finish" class="modal">
        <div class="aura-card p-10 w-full max-w-sm text-center">
            <i class="ph-duotone ph-warning-circle text-7xl text-amber-500 mb-6 block"></i>
            <h3 class="text-2xl font-black mb-6 uppercase">¿Cerrar Descarga?</h3>
            <button onclick="finalizeWork()" class="w-full py-5 bg-slate-900 text-white rounded-xl font-black text-xs uppercase mb-4 active:scale-95">SÍ, GENERAR PDF</button>
            <button onclick="hideModal('m-finish')" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">REGRESAR</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw0RuZMVNBGi0OsbB3ASFsZdCcNtT1rwNBjFzM6SMmsm3u75LM4sa0xEgSIpVDaH_7vtg/exec";
        let master = [], queue = [], currentOp = null, master_history = [];

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        async function navTo(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            if(v === 'hist') await refreshHistory();
            document.getElementById('side-menu').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        window.onload = async () => { await loadMasterData(); await refreshHistory(); checkSession(); };

        async function loadMasterData() { try { const res = await fetch(API_URL); const data = await res.json(); master = data.productos || []; } catch(e) {}}
        async function refreshHistory() { try { const res = await fetch(API_URL); const data = await res.json(); master_history = data.historial || []; filterByProduct(''); } catch(e) {}}

        function searchMaster(q) {
            const resDiv = document.getElementById('search-results');
            if (q.length < 1) { resDiv.classList.add('hidden'); return; }
            const matches = master.filter(row => String(row.sku).toLowerCase().includes(q.toLowerCase())).slice(0, 5);
            if(matches.length > 0) {
                resDiv.innerHTML = matches.map(x => `<div onclick="pickSku('${x.sku}', '${x.descripcion || x.desc || ''}')" class="p-4 border-b font-bold active:bg-blue-50">${x.sku}</div>`).join('');
                resDiv.classList.remove('hidden');
            } else resDiv.classList.add('hidden');
        }

        function pickSku(s, d) { document.getElementById('sku-in').value = s; document.getElementById('sku-in').dataset.desc = d; document.getElementById('search-results').classList.add('hidden'); }

        function addToQueue() {
            const s = document.getElementById('sku-in').value, m = parseInt(document.getElementById('meta-in').value);
            if(!s || isNaN(m)) return;
            queue.push({ sku: s, desc: document.getElementById('sku-in').dataset.desc || '', meta: m, r: 0 });
            document.getElementById('sku-in').value = ''; document.getElementById('meta-in').value = '';
            renderQueue();
        }

        function renderQueue() {
            document.getElementById('btn-save-all').classList.toggle('hidden', queue.length === 0);
            document.getElementById('queue-list').innerHTML = queue.map(x => `<div class="bg-white rounded-xl p-4 flex justify-between border font-black text-xs"><span>${x.sku}</span><span class="text-accent">${x.meta}</span></div>`).join('');
        }

        async function saveContenedor() {
            const h = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            const id = `TWINS-${String(h.length + 1).padStart(4, '0')}`;
            const fecha = new Date().toLocaleString('es-PE');
            const nuevo = { id, date: fecha, items: [...queue], done: false };
            h.unshift(nuevo);
            localStorage.setItem('tajho_v3', JSON.stringify(h));
            queue = []; renderQueue(); navTo('hist');
        }

        function filterByProduct(q) {
            const term = q.toLowerCase();
            const grouped = master_history.reduce((acc, curr) => {
                const idOp = curr.operacion || curr.id || curr.idoperacion;
                if (!acc[idOp]) acc[idOp] = { id: idOp, date: curr.fecha || "", items: [], done: (curr.estado || "").toUpperCase() === 'COMPLETADO' };
                acc[idOp].items.push(curr); return acc;
            }, {});
            let html = "", totalCajas = 0, totalCont = 0;
            Object.values(grouped).forEach(op => {
                if (op.id.toLowerCase().includes(term)) {
                    totalCont++;
                    const localH = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
                    const localIdx = localH.findIndex(lh => lh.id === op.id);
                    op.items.forEach(i => totalCajas += parseInt(i.real || 0));
                    html += `
                    <div class="aura-card p-5 border-l-8 ${op.done ? 'border-success' : 'border-accent'} bg-white mb-4">
                        <div class="flex justify-between mb-4"><div><p class="text-[9px] font-bold text-slate-400 uppercase">${op.date}</p><h4 class="font-black text-xl text-slate-950">${op.id}</h4></div></div>
                        <div class="grid grid-cols-3 gap-2">
                            ${!op.done && localIdx !== -1 ? `<button onclick="openWork(${localIdx})" class="bg-accent text-white py-3 rounded-2xl text-[10px] font-black active:scale-95">SEGUIR</button>` : `<button disabled class="bg-slate-50 text-slate-300 py-3 rounded-2xl text-[10px] font-black">LISTO</button>`}
                            <button onclick="viewItems('${op.id}')" class="bg-slate-100 text-slate-700 py-3 rounded-2xl text-[10px] font-black">ITEMS</button>
                            <button onclick="genPDF('${op.id}')" class="bg-amber-50 text-amber-600 border border-amber-100 py-3 rounded-2xl text-[10px] font-black">PDF</button>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('stats-cont').innerText = totalCont;
            document.getElementById('stats-cajas').innerText = totalCajas.toLocaleString();
            document.getElementById('product-results').innerHTML = html || '<p class="text-center py-10 text-slate-300 font-black">VACÍO</p>';
        }

        function openWork(idx) {
            const h = JSON.parse(localStorage.getItem('tajho_v3') || '[]');
            currentOp = { ...h[idx], localIdx: idx };
            localStorage.setItem('tajho_active_op', JSON.stringify(currentOp));
            navTo('work');
            document.getElementById('work-title').innerText = currentOp.id;
            document.getElementById('work-select').innerHTML = currentOp.items.map(x => `<option value="${x.sku}">${x.sku}</option>`).join('');
            refreshWorkStats();
        }

        function commitCount() {
            const val = parseInt(document.getElementById('work-input').value); if(isNaN(val) || val === 0) return;
            const sku = document.getElementById('work-select').value;
            const item = currentOp.items.find(x => x.sku === sku);
            item.r += val; 
            document.getElementById('work-input').value = '';
            saveWorkState(); refreshWorkStats();
        }

        function saveWorkState() {
            localStorage.setItem('tajho_active_op', JSON.stringify(currentOp));
            let h = JSON.parse(localStorage.getItem('tajho_v3') || '[]'); h[currentOp.localIdx] = currentOp;
            localStorage.setItem('tajho_v3', JSON.stringify(h));
        }

        function refreshWorkStats() {
            let totalMeta = 0, totalReal = 0;
            currentOp.items.forEach(x => { totalMeta += x.meta; totalReal += x.r; });
            const porcTotal = totalMeta > 0 ? Math.min(Math.round((totalReal / totalMeta) * 100), 100) : 0;
            document.getElementById('work-perc-title').innerText = porcTotal + "%";
            document.getElementById('work-stats').innerHTML = currentOp.items.map(x => {
                const itemPorc = Math.min((x.r/x.meta)*100, 100);
                const color = x.r >= x.meta ? 'var(--success)' : 'var(--accent)';
                return `
                <div class="aura-card p-5 flex items-center gap-4 ${x.r >= x.meta ? 'bg-green-50/20' : ''}">
                    <div class="relative flex items-center justify-center">
                        <svg width="50" height="50" viewBox="0 0 40 40"><circle stroke="#eee" stroke-width="4" fill="transparent" r="16" cx="20" cy="20"/><circle class="progress-ring__circle" stroke="${color}" stroke-width="4" stroke-linecap="round" fill="transparent" r="16" cx="20" cy="20" style="stroke-dasharray: 100 100; stroke-dashoffset: ${100 - itemPorc};"/></svg>
                        <span class="absolute text-[8px] font-black">${Math.round(itemPorc)}%</span>
                    </div>
                    <div class="flex-1"><p class="font-black text-sm text-slate-950">${x.sku}</p><p class="text-[9px] text-slate-400 font-bold uppercase">${x.desc || ''}</p></div>
                    <div class="text-right"><p class="font-black text-2xl" style="color:${color}">${x.r}</p><p class="text-[9px] text-slate-300 font-bold">/ ${x.meta}</p></div>
                </div>`;
            }).join('');
        }

        function checkSession() {
            const savedOp = localStorage.getItem('tajho_active_op');
            if (savedOp) { currentOp = JSON.parse(savedOp); openWork(currentOp.localIdx); }
        }

        function showModal(id) { document.getElementById(id).classList.add('active'); }
        function hideModal(id) { document.getElementById(id).classList.remove('active'); }

        function viewItems(opId) {
            const items = master_history.filter(it => (it.operacion || it.id) === opId);
            document.getElementById('list-modal-title').innerText = opId;
            document.getElementById('list-modal-content').innerHTML = items.map(it => `<div class="bg-slate-50 p-3 rounded-xl flex justify-between font-black text-xs"><span>${it.sku}</span><span class="text-accent">${it.real} / ${it.meta}</span></div>`).join('');
            showModal('m-list');
        }

        function genPDF(opId) {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const items = master_history.filter(it => (it.operacion || it.id) === opId);
            doc.setFontSize(14); doc.text("REPORTE DE CARGA - TWINS ELITE", 14, 20);
            doc.autoTable({ startY: 30, head: [['SKU', 'META', 'REAL']], body: items.map(it => [it.sku, it.meta, it.real]), headStyles: { fillColor: [0, 122, 255] } });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, doc.lastAutoTable.finalY + 15);
            doc.save(`${opId}.pdf`);
        }

        async function finalizeWork() {
            currentOp.done = true; saveWorkState();
            localStorage.removeItem('tajho_active_op');
            hideModal('m-finish'); navTo('hist');
        }
    </script>
</body>
</html>
