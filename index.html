<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS G-FORCE PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --bg: #050505;
            --accent: #007AFF;
            --card-bg: rgba(28, 28, 30, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a1a1a6;
            --success: #30d158;
            --danger: #ff453a;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif;
            margin: 0; padding-bottom: 120px;
            -webkit-font-smoothing: antialiased;
        }

        /* Header Estilo Dashboard */
        .app-header {
            padding: 50px 25px 30px;
            background: linear-gradient(180deg, rgba(0,122,255,0.15) 0%, rgba(5,5,5,0) 100%);
        }
        .app-header h1 { font-weight: 800; font-size: 26px; letter-spacing: -1px; margin: 0; }
        .app-header p { color: var(--accent); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin: 0; }

        /* Contenedores de Cristal */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 22px;
            margin: 0 16px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Buscador Ultra-Slim */
        .search-container { position: relative; }
        .search-input {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 16px 16px 48px;
            color: white; width: 100%; font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .search-input:focus { 
            background: rgba(255,255,255,0.12);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0,122,255,0.2);
            outline: none;
        }
        .search-icon { position: absolute; left: 18px; top: 18px; color: var(--accent); font-size: 18px; }

        /* Lista de sugerencias con diseño flotante */
        .sug-box {
            position: absolute; width: 100%; background: #1c1c1e;
            border-radius: 18px; z-index: 1000; margin-top: 8px;
            border: 1px solid var(--border); overflow: hidden;
            display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .sug-item { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .sug-item:last-child { border: none; }
        .sug-item b { display: block; font-size: 14px; margin-bottom: 2px; }
        .sug-item small { color: var(--accent); font-weight: 700; font-size: 11px; }

        /* Botones Tácticos */
        .btn-action {
            border-radius: 18px; padding: 16px; font-weight: 700; 
            border: none; width: 100%; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-blue { background: var(--accent); color: white; }
        .btn-green { background: var(--success); color: #000; }
        .btn-red { background: var(--danger); color: white; }
        .btn-action:active { transform: scale(0.96); opacity: 0.9; }

        /* Items de la lista actual */
        .list-row {
            background: rgba(255,255,255,0.04);
            border-radius: 16px; padding: 14px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--accent);
        }
        .list-row.dev { border-left-color: var(--danger); }

        /* Menú Inferior Nativo */
        .nav-bar {
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            background: rgba(20, 20, 22, 0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 30px; padding: 12px;
            display: flex; justify-content: space-around;
            border: 1px solid var(--border); z-index: 1000;
        }
        .nav-item { border: none; background: none; color: #636366; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; font-weight: 600; }

        .view { display: none; padding-top: 10px; }
        .view.active { display: block; animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        input, select { background: rgba(255,255,255,0.08) !important; color: white !important; border: 1px solid var(--border) !important; border-radius: 14px !important; }
    </style>
</head>
<body>

    <header class="app-header">
        <p>Inventory System</p>
        <h1>TWINS G-FORCE</h1>
    </header>

    <main>
        <section id="v-sal" class="view active">
            <div class="glass-panel">
                <div class="search-container mb-4">
                    <i class="fas fa-barcode search-icon"></i>
                    <input type="text" id="iSal" class="search-input" placeholder="Escanear o Buscar SKU..." oninput="search(this.value, 'sugSal', 'sal')">
                    <div id="sugSal" class="sug-box"></div>
                </div>

                <div id="selSal" class="d-none">
                    <div class="p-3 mb-3" style="background: rgba(0,122,255,0.1); border-radius: 18px;">
                        <div id="nSal" class="fw-bold"></div>
                        <div id="sSal" class="small text-info"></div>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-4"><input type="number" id="cSal" class="form-control p-3" placeholder="Cant."></div>
                        <div class="col-8"><button class="btn-action btn-blue" onclick="add('sal')">AÑADIR <i class="fas fa-plus"></i></button></div>
                    </div>
                </div>

                <div id="areaSal" class="d-none mt-4">
                    <h6 class="small fw-bold text-dim mb-3">LISTA DE SALIDA</h6>
                    <div id="contSal"></div>
                    <input type="text" id="whoSal" class="form-control mb-2 mt-3" placeholder="Solicitante">
                    <select id="typeSal" class="form-select mb-4">
                        <option value="MARKETING">MARKETING</option>
                        <option value="OFICINA">OFICINA</option>
                        <option value="VENTAS">VENTAS</option>
                    </select>
                    <button class="btn-action btn-green" onclick="submit('Pedidos', 'sal')">CONFIRMAR DESPACHO <i class="fas fa-check-circle"></i></button>
                </div>
            </div>
        </section>

        <section id="v-dev" class="view">
            <div class="glass-panel">
                <div class="search-container mb-4">
                    <i class="fas fa-undo search-icon" style="color:var(--danger)"></i>
                    <input type="text" id="iDev" class="search-input" placeholder="Producto a devolver..." oninput="search(this.value, 'sugDev', 'dev')">
                    <div id="sugDev" class="sug-box"></div>
                </div>

                <div id="selDev" class="d-none">
                    <div class="p-3 mb-3" style="background: rgba(255,69,58,0.1); border-radius: 18px;">
                        <div id="nDev" class="fw-bold"></div>
                        <div id="sDev" class="small text-danger"></div>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-4"><input type="number" id="cDev" class="form-control p-3" placeholder="Cant."></div>
                        <div class="col-8">
                            <select id="mDev" class="form-select p-3">
                                <option>Dañado</option>
                                <option>Cambio</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn-action btn-red" onclick="add('dev')">AÑADIR A LISTA</button>
                </div>

                <div id="areaDev" class="d-none mt-4">
                    <h6 class="small fw-bold text-dim mb-3">LISTA DE DEVOLUCIÓN</h6>
                    <div id="contDev"></div>
                    <input type="text" id="cliDev" class="form-control mb-4 mt-3" placeholder="Cliente / Origen">
                    <button class="btn-action btn-green" onclick="submit('Devoluciones', 'dev')">GENERAR REPORTE PDF <i class="fas fa-file-pdf"></i></button>
                </div>
            </div>
        </section>

        <section id="v-his" class="view">
            <div id="histLog" class="px-2">Cargando movimientos...</div>
        </section>
    </main>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="nav('sal', this)"><i class="fas fa-arrow-up-right-from-square"></i><span>Despacho</span></button>
        <button class="nav-item" onclick="nav('dev', this)"><i class="fas fa-arrow-down-left-and-arrow-up-right-to-triangle"></i><span>Retorno</span></button>
        <button class="nav-item" onclick="nav('his', this)"><i class="fas fa-list-ul"></i><span>Historial</span></button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCeMB7Cf1DpA41NEmprwR0XqrvdD_-xTEbl3vKsMlaHIp_r3b5MpMWcbrQKyOiYFF2NQ/exec";
        let DB = []; let L_SAL = []; let L_DEV = []; let SEL = null;

        async function init() {
            try {
                const r = await fetch(API, {method: "POST", body: JSON.stringify({action: "load"})});
                const d = await r.json();
                DB = d.p;
                renderHist(d.h);
            } catch(e) { console.error(e); }
        }

        function search(v, bId, t) {
            const b = document.getElementById(bId);
            if(v.length < 2) { b.style.display='none'; return; }
            const m = DB.filter(p => p[0].toString().toLowerCase().includes(v.toLowerCase()) || p[1].toString().toLowerCase().includes(v.toLowerCase())).slice(0,5);
            b.innerHTML = m.map(p => `<div class="sug-item" onclick="select('${p[0]}','${p[1]}','${t}')"><b>${p[1]}</b><small>${p[0]}</small></div>`).join('');
            b.style.display='block';
        }

        function select(s, n, t) {
            SEL = {s, n};
            const pref = t==='sal'?'Sal':'Dev';
            document.getElementById('n'+pref).innerText = n;
            document.getElementById('s'+pref).innerText = "SKU: " + s;
            document.getElementById('sel'+pref).classList.remove('d-none');
            document.getElementById('sug'+pref).style.display='none';
            document.getElementById('i'+pref).value = s;
        }

        function add(t) {
            const c = document.getElementById('c'+(t==='sal'?'Sal':'Dev')).value;
            if(!c) return;
            if(t === 'sal') { L_SAL.push({...SEL, c}); renderUI('sal'); }
            else { L_DEV.push({...SEL, c, m: document.getElementById('mDev').value}); renderUI('dev'); }
            document.getElementById('sel'+(t==='sal'?'Sal':'Dev')).classList.add('d-none');
            document.getElementById('i'+(t==='sal'?'Sal':'Dev')).value = "";
        }

        function renderUI(t) {
            const cont = document.getElementById('cont'+(t==='sal'?'Sal':'Dev'));
            const area = document.getElementById('area'+(t==='sal'?'Sal':'Dev'));
            const list = t === 'sal' ? L_SAL : L_DEV;
            area.classList.remove('d-none');
            cont.innerHTML = list.map(i => `
                <div class="list-row ${t==='dev'?'dev':''}">
                    <div><b>${i.n}</b><br><small class="text-dim">${i.s} ${i.m?'| '+i.m:''}</small></div>
                    <span class="badge bg-dark rounded-pill">x${i.c}</span>
                </div>
            `).join('');
        }

        async function submit(sheet, t) {
            const q = document.getElementById(t==='sal'?'whoSal':'cliDev').value;
            if(!q) return Swal.fire("Error", "Ingresa responsable/cliente", "warning");
            
            const list = t === 'sal' ? L_SAL : L_DEV;
            const payload = list.map(i => [new Date(), t==='sal'?document.getElementById('typeSal').value:'DEVOLUCION', i.s, i.n, i.c, q, i.m || 'OK']);
            
            Swal.fire({title:'Procesando...', allowOutsideClick:false, didOpen:()=>Swal.showLoading()});
            await fetch(API, {method: "POST", body: JSON.stringify({action: "save", sheet, payload})});
            
            if(t === 'dev') genPDF(q, list);
            Swal.fire("Éxito", "Registrado correctamente", "success").then(()=>location.reload());
        }

        function genPDF(q, list) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(20); doc.text("REPORTE DE BODEGA", 20, 20);
            doc.setFontSize(10); doc.text(`Cliente: ${q} | Fecha: ${new Date().toLocaleString()}`, 20, 30);
            let y = 45;
            list.forEach(i => {
                doc.text(`${i.n} (${i.s}) x${i.c} - Motivo: ${i.m}`, 20, y);
                y += 8;
            });
            doc.save(`Reporte_TWINS_${q}.pdf`);
        }

        function renderHist(l) {
            document.getElementById('histLog').innerHTML = l.map(r => `
                <div class="glass-panel py-3 mb-2" style="border-radius:20px">
                    <div class="d-flex justify-content-between small text-dim mb-1"><span>${r[1]}</span> <span>${new Date(r[0]).toLocaleDateString()}</span></div>
                    <div class="fw-bold" style="font-size:14px">${r[3]}</div>
                    <div class="d-flex justify-content-between mt-2 align-items-center">
                        <small class="text-dim">${r[5]}</small> <b class="text-info">x${r[4]}</b>
                    </div>
                </div>
            `).join('');
        }

        function nav(v, b) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('v-'+v).classList.add('active');
            b.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
