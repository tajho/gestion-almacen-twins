<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        .premium-card { background: #FFFFFF; border: 1px solid #F1F5F9; border-radius: 32px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.04); }
        .btn-action { border-radius: 16px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 14px 8px; transition: all 0.2s; }
        .btn-action:active { transform: scale(0.95); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 p-6">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-[800] tracking-tighter italic">TWINS <span class="text-blue-600">ELITE</span></h1>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Angelo N. Durand</p>
            </div>
            <div id="month-label" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-2xl text-[10px] font-extrabold uppercase border border-blue-100">
                Resumen de Marzo
            </div>
        </div>
    </header>

    <main class="p-5 max-w-xl mx-auto pb-40">
        
        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
                <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-4">
                    <i class="ph-bold ph-package text-xl"></i>
                </div>
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Cajas del Mes</p>
                <h2 id="total-boxes" class="text-3xl font-black text-slate-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
                <div class="w-10 h-10 bg-green-50 text-green-600 rounded-xl flex items-center justify-center mb-4">
                    <i class="ph-bold ph-barcode text-xl"></i>
                </div>
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Variedad SKUs</p>
                <h2 id="total-skus" class="text-3xl font-black text-slate-800">0</h2>
            </div>
        </div>

        <div class="flex flex-col gap-3 mb-8">
            <div class="relative">
                <i class="ph-bold ph-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                <input type="text" id="search-input" oninput="applyFilters()" placeholder="Buscar contenedor o producto..." 
                    class="w-full bg-white border border-slate-200 rounded-2xl py-5 pl-14 pr-6 text-sm font-semibold outline-none focus:ring-4 focus:ring-blue-500/5 transition-all">
            </div>
            <select id="month-select" onchange="applyFilters()" class="bg-white border border-slate-200 rounded-2xl py-4 px-5 text-xs font-black text-slate-600 outline-none appearance-none">
                <option value="01">Enero</option>
                <option value="02">Febrero</option>
                <option value="03" selected>Marzo</option>
                <option value="04">Abril</option>
                <option value="05">Mayo</option>
                <option value="06">Junio</option>
            </select>
        </div>

        <div id="section-title" class="px-2 mb-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Ingresos Recientes</div>
        
        <div id="operations-list" class="space-y-6">
            </div>

    </main>

    <div id="view-modal" class="fixed inset-0 bg-white z-[60] hidden overflow-y-auto px-6 py-10">
        <div class="max-w-xl mx-auto">
            <button onclick="closeModal()" class="mb-8 w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center"><i class="ph-bold ph-arrow-left"></i></button>
            <div id="modal-header"></div>
            <div id="modal-items" class="space-y-4 mt-10 pb-40"></div>
            <div id="modal-footer" class="fixed bottom-0 left-0 right-0 p-6 bg-white/90 border-t border-slate-50 hidden">
                <div class="max-w-xl mx-auto">
                    <button onclick="saveData()" class="w-full bg-blue-600 text-white py-5 rounded-[24px] font-black text-sm uppercase tracking-widest">Actualizar Excel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw-v5b_DkMPqup6Wm4J5KfGKZq9IRs99drhBYFV-MzHa4tcyb8dSn7YRx7KTHAEj1Jp/exec";
        let master_data = [];

        // SINCRONIZACIÓN INVISIBLE
        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                master_data = data.historial;
                applyFilters();
            } catch (e) { console.log("Silent Sync Fail"); }
        }

        function applyFilters() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const month = document.getElementById('month-select').value;
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio"];
            document.getElementById('month-label').innerText = `Resumen de ${monthNames[parseInt(month)-1]}`;

            // Agrupar y Filtrar
            const grouped = master_data.reduce((acc, curr) => {
                const [d, m] = curr.operacion.match(/\d{2}\/\d{2}/)[0].split('/');
                const matchesSearch = curr.operacion.toLowerCase().includes(query) || 
                                     curr.sku.toLowerCase().includes(query) || 
                                     curr.descripcion.toLowerCase().includes(query);
                const matchesMonth = m === month;

                if(matchesMonth && matchesSearch) {
                    if(!acc[curr.operacion]) acc[curr.operacion] = { ...curr, items: [], totalBoxes: 0 };
                    acc[curr.operacion].items.push(curr);
                    acc[curr.operacion].totalBoxes += curr.meta;
                }
                return acc;
            }, {});

            // Ordenar por fecha (lo más reciente arriba)
            const results = Object.values(grouped).sort((a,b) => {
                const dateA = a.operacion.match(/\d{2}\/\d{2}/)[0].split('/').reverse().join('');
                const dateB = b.operacion.match(/\d{2}\/\d{2}/)[0].split('/').reverse().join('');
                return dateB.localeCompare(dateA);
            });

            // Actualizar Dashboard del Mes
            document.getElementById('total-boxes').innerText = results.reduce((a,b) => a + b.totalBoxes, 0).toLocaleString();
            document.getElementById('total-skus').innerText = results.reduce((a,b) => a + b.items.length, 0).toLocaleString();

            renderCards(results);
        }

        function renderCards(data) {
            const list = document.getElementById('operations-list');
            list.innerHTML = data.map(op => `
                <div class="premium-card p-7">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[9px] font-black uppercase tracking-[0.2em] ${op.estado === 'COMPLETADO' ? 'text-green-500' : 'text-amber-500'}">
                                ${op.estado}
                            </span>
                            <h3 class="text-2xl font-[800] text-slate-800 tracking-tighter mt-1">${op.operacion}</h3>
                        </div>
                        <span class="bg-slate-900 text-white text-[8px] font-black px-3 py-1.5 rounded-xl uppercase tracking-widest">Canal ${op.canal}</span>
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="openModal('${op.operacion}', 'EDIT')" class="btn-action bg-blue-50 text-blue-600 border border-blue-100">
                            <i class="ph-bold ph-pencil-simple text-lg"></i>Corregir
                        </button>
                        <button onclick="openModal('${op.operacion}', 'VIEW')" class="btn-action bg-slate-50 text-slate-600 border border-slate-100">
                            <i class="ph-bold ph-list-bullets text-lg"></i>Ver Lista
                        </button>
                        <button onclick="alert('Generando PDF...')" class="btn-action bg-red-50 text-red-600 border border-red-100">
                            <i class="ph-bold ph-file-pdf text-lg"></i>PDF
                        </button>
                    </div>
                </div>
            `).join('');
        }

        let current_op = null;
        let active_mode = 'VIEW';

        function openModal(id, mode) {
            active_mode = mode;
            current_op = { id: id, items: JSON.parse(JSON.stringify(master_data.filter(i => i.operacion === id))) };
            document.getElementById('view-modal').classList.remove('hidden');
            document.getElementById('modal-footer').classList.toggle('hidden', mode === 'VIEW');
            document.getElementById('modal-header').innerHTML = `
                <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">${mode === 'EDIT' ? 'Editor de Cajas' : 'Vista de Resumen'}</p>
                <h2 class="text-4xl font-[800] text-slate-900 tracking-tighter">${id}</h2>
            `;
            renderModalItems();
        }

        function renderModalItems() {
            const container = document.getElementById('modal-items');
            container.innerHTML = current_op.items.map(item => `
                <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1 pr-4">
                            <p class="text-[10px] font-black text-slate-300 uppercase">${item.sku}</p>
                            <h4 class="font-bold text-slate-700 text-sm leading-tight">${item.descripcion}</h4>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] font-bold text-slate-400 uppercase">Meta</p>
                            <p class="font-black text-lg">${item.meta}</p>
                        </div>
                    </div>
                    ${active_mode === 'EDIT' ? `
                        <div class="flex items-center justify-between bg-slate-50 p-2 rounded-2xl">
                            <button onclick="updateQty('${item.sku}', -1)" class="w-12 h-12 bg-white rounded-xl shadow-sm font-black text-xl">-</button>
                            <span class="text-2xl font-black ${item.real >= item.meta ? 'text-green-500' : 'text-slate-900'}">${item.real}</span>
                            <button onclick="updateQty('${item.sku}', 1)" class="w-12 h-12 bg-slate-900 text-white rounded-xl shadow-sm font-black text-xl">+</button>
                        </div>
                    ` : `
                        <div class="bg-green-50 py-3 px-5 rounded-xl border border-green-100 flex justify-between">
                            <span class="text-[10px] font-black text-green-600 uppercase">Recibido</span>
                            <span class="text-xl font-black text-green-700">${item.real}</span>
                        </div>
                    `}
                </div>
            `).join('');
        }

        function updateQty(sku, v) {
            const i = current_op.items.find(x => x.sku === sku);
            if(i) { i.real = Math.max(0, i.real + v); renderModalItems(); }
        }

        function closeModal() { document.getElementById('view-modal').classList.add('hidden'); }

        async function saveData() {
            const btn = event.target;
            btn.disabled = true; btn.innerText = "Guardando...";
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'FINALIZE',
                        id: current_op.id,
                        items: JSON.stringify(current_op.items.map(i => ({sku: i.sku, r: i.real})))
                    })
                });
                closeModal();
                loadData();
            } catch (e) { btn.disabled = false; btn.innerText = "Error - Reintentar"; }
        }

        // AUTO-SYNC SILENCIOSO CADA 60 SEGUNDOS
        setInterval(loadData, 60000);
        window.onload = loadData;
    </script>
</body>
</html>
