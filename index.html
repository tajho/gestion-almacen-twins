<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TITAN AIR | Stealth Sync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --bg: #fdfdfd;
            --primary: #0052cc;
            --surface: #ffffff;
            --text: #091e42;
            --muted: #6b778c;
            --border: #ebecf0;
            --radius: 20px;
        }

        body { 
            background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text); padding-bottom: 100px;
        }

        /* SYNC STATUS BAR (Invisible/Subtle) */
        #stealth-sync {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px;
            background: transparent; z-index: 9999;
        }
        .sync-active { background: linear-gradient(90deg, transparent, var(--primary), transparent); animation: loading 1.5s infinite; }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .app-header {
            padding: 20px; background: #fff; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .main-card {
            background: var(--surface); border-radius: var(--radius); padding: 20px;
            margin: 15px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .label-pro { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; }

        .input-pro {
            width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid var(--border);
            font-size: 14px; font-weight: 600; margin-bottom: 15px; transition: 0.2s;
        }
        .input-pro:focus { border-color: var(--primary); outline: none; background: #fbfcfe; }

        /* SEARCH ENGINE */
        .results-overlay {
            position: absolute; width: 100%; background: #fff; border-radius: 12px;
            border: 1px solid var(--border); z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-height: 200px; overflow-y: auto; display: none;
        }

        /* HISTORY CARDS */
        .log-card {
            background: #fff; border-radius: 16px; border: 1px solid var(--border);
            padding: 15px; margin-bottom: 12px; border-left: 4px solid var(--primary);
        }
        .log-time { font-size: 11px; font-weight: 700; color: var(--primary); background: #e9f2ff; padding: 2px 8px; border-radius: 10px; }
        .prod-row { font-size: 13px; border-bottom: 1px dashed #f0f0f0; padding: 5px 0; }
        
        .footer-claim { font-size: 9px; color: #999; margin-top: 10px; text-align: center; border-top: 1px solid #f9f9f9; padding-top: 5px; font-weight: 600; }

        .nav-bottom {
            position: fixed; bottom: 0; width: 100%; background: #fff;
            display: flex; justify-content: space-around; padding: 15px;
            border-top: 1px solid var(--border); box-shadow: 0 -5px 15px rgba(0,0,0,0.02);
        }
        .nav-link { color: var(--muted); text-decoration: none; font-size: 10px; font-weight: 700; text-align: center; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 20px; display: block; }
    </style>
</head>
<body>

    <div id="stealth-sync"></div>

    <header class="app-header">
        <div>
            <h5 class="m-0 fw-800">TITAN <span style="color:var(--primary)">2026</span></h5>
            <small class="text-muted" id="status-text">Conexión activa</small>
        </div>
        <button class="btn btn-sm btn-light rounded-pill px-3 fw-bold" onclick="emergencyUser()">
            <i class="fas fa-shield-alt text-primary"></i> Angelo Durand
        </button>
    </header>

    <main class="container p-0">
        <section id="v-op" class="view">
            <div class="main-card">
                <span class="label-pro">Destinatario / Cliente</span>
                <input type="text" id="cli-name" class="input-pro" placeholder="Nombre de destino..." oninput="suggestVendor(this.value)">
                <input type="text" id="ven-sug" class="input-pro" readonly style="opacity: 0.6; background: #f8f9fa;">

                <span class="label-pro">Búsqueda de Inventario</span>
                <div class="position-relative">
                    <input type="text" id="search-input" class="input-pro" placeholder="Escribe SKU o Nombre..." oninput="searchDB(this.value)">
                    <div id="search-results" class="results-overlay"></div>
                </div>

                <div id="item-form" class="d-none p-3 bg-light rounded-4 mb-3">
                    <b id="sel-name" class="d-block mb-1"></b>
                    <div class="row g-2">
                        <div class="col-8"><input type="number" id="sel-qty" class="input-pro m-0" placeholder="Cantidad"></div>
                        <div class="col-4"><button class="btn btn-primary w-100 h-100 rounded-3" onclick="pushItem()"><i class="fas fa-plus"></i></button></div>
                    </div>
                </div>

                <div id="cart-container" class="d-none mt-3">
                    <div id="cart-items"></div>
                    <button class="btn btn-dark w-100 py-3 rounded-4 fw-800 mt-2" onclick="processAll()">FINALIZAR Y SINCRONIZAR</button>
                </div>
            </div>
        </section>

        <section id="v-his" class="view d-none">
            <div id="history-feed" class="p-3"></div>
        </section>
    </main>

    <nav class="nav-bottom">
        <a href="#" class="nav-link active" onclick="showV('op', this)"><i class="fas fa-box-open"></i>REGISTRO</a>
        <a href="#" class="nav-link" onclick="showV('his', this)"><i class="fas fa-list-ul"></i>HISTORIAL</a>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxCeMB7Cf1DpA41NEmprwR0XqrvdD_-xTEbl3vKsMlaHIp_r3b5MpMWcbrQKyOiYFF2NQ/exec";
        let MASTER_DATA = []; let CART = []; let GROUPED_HIS = {};

        async function init() {
            try {
                const r = await fetch(API_URL, {method: "POST", body: JSON.stringify({action: "load"})});
                const d = await r.json();
                MASTER_DATA = d.p;
                processHistory(d.h);
            } catch(e) { console.log("Offline mode"); }
        }

        // --- BÚSQUEDA ---
        function searchDB(val) {
            const box = document.getElementById('search-results');
            if(val.length < 1) { box.style.display='none'; return; }
            const matches = MASTER_DATA.filter(p => p[1].toLowerCase().includes(val.toLowerCase()) || p[0].toString().includes(val)).slice(0,5);
            box.innerHTML = matches.map(p => `<div class="p-3 border-bottom" onclick="selectP('${p[0]}','${p[1]}')"><b>${p[1]}</b><br><small>${p[0]}</small></div>`).join('');
            box.style.display = matches.length ? 'block' : 'none';
        }

        function selectP(sku, name) {
            window.tempItem = {sku, name};
            document.getElementById('sel-name').innerText = name;
            document.getElementById('item-form').classList.remove('d-none');
            document.getElementById('search-results').style.display = 'none';
        }

        function pushItem() {
            const qty = document.getElementById('sel-qty').value;
            if(!qty) return;
            CART.push({...window.tempItem, qty});
            document.getElementById('item-form').classList.add('d-none');
            document.getElementById('search-input').value = '';
            renderCart();
        }

        function renderCart() {
            const cont = document.getElementById('cart-container');
            cont.classList.toggle('d-none', CART.length === 0);
            document.getElementById('cart-items').innerHTML = CART.map((i, idx) => `
                <div class="p-2 border-bottom d-flex justify-content-between">
                    <span>${i.name} (x${i.qty})</span>
                    <i class="fas fa-times text-danger" onclick="CART.splice(${idx},1); renderCart();"></i>
                </div>
            `).join('');
        }

        // --- SINCRONIZACIÓN INVISIBLE ---
        async function processAll() {
            const cli = document.getElementById('cli-name').value;
            if(!cli) return Swal.fire("Error", "Falta Cliente", "error");

            const bar = document.getElementById('stealth-sync');
            const payload = CART.map(i => [new Date(), "SALIDA", i.sku, i.name, i.qty, cli, "Revisión autorizada por J. Angelo Nuñez Durand"]);
            
            // UI Update inmediata
            bar.className = 'sync-active';
            CART = []; renderCart();
            document.getElementById('cli-name').value = '';

            try {
                fetch(API_URL, {method: "POST", body: JSON.stringify({action: "save", payload})})
                .then(() => {
                    bar.className = '';
                    init(); // Recargar historial en fondo
                });
            } catch(e) { bar.className = ''; }
        }

        // --- PROCESAMIENTO DE HISTORIAL ---
        function processHistory(data) {
            // Agrupar por Cliente + Fecha (minuto) para verlos como una sola lista
            const groups = {};
            data.forEach(r => {
                const timeKey = new Date(r[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const key = r[5] + "_" + timeKey;
                if(!groups[key]) groups[key] = { cliente: r[5], hora: timeKey, fecha: new Date(r[0]).toLocaleDateString(), prods: [] };
                groups[key].prods.push({ name: r[3], qty: r[4], sku: r[2] });
            });
            renderHistory(groups);
        }

        function renderHistory(groups) {
            const feed = document.getElementById('history-feed');
            feed.innerHTML = Object.values(groups).reverse().slice(0, 10).map(g => `
                <div class="log-card">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="log-time"><i class="far fa-clock"></i> ${g.hora}</span>
                        <small class="fw-bold text-muted">${g.fecha}</small>
                    </div>
                    <h6 class="fw-800 mb-2">${g.cliente}</h6>
                    <div class="mb-3">
                        ${g.prods.map(p => `<div class="prod-row"><b>${p.qty}</b> x ${p.name} <small class="text-muted">(${p.sku})</small></div>`).join('')}
                    </div>
                    <button class="btn btn-sm btn-outline-primary w-100 fw-bold" onclick="genPDF('${btoa(JSON.stringify(g))}')">
                        <i class="fas fa-file-pdf"></i> GENERAR REPORTE PDF
                    </button>
                    <div class="footer-claim">Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.</div>
                </div>
            `).join('');
        }

        // --- GENERACIÓN DE PDF ---
        function genPDF(dataStr) {
            const g = JSON.parse(atob(dataStr));
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18); doc.text("REPORTE DE MOVIMIENTO", 14, 20);
            doc.setFontSize(10); doc.text(`Cliente: ${g.cliente}`, 14, 30);
            doc.text(`Fecha: ${g.fecha} | Hora: ${g.hora}`, 14, 35);

            doc.autoTable({
                startY: 45,
                head: [['Cant', 'Producto', 'SKU']],
                body: g.prods.map(p => [p.qty, p.name, p.sku]),
                theme: 'striped',
                headStyles: { fillColor: [0, 82, 204] }
            });

            const finalY = doc.lastAutoTable.finalY + 20;
            doc.setFontSize(8);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 105, finalY, {align: 'center'});
            
            doc.save(`TITAN_${g.cliente}_${g.hora}.pdf`);
        }

        function emergencyUser() {
            Swal.fire({
                title: 'Confirmación de Seguridad',
                text: "¿Desea cambiar el responsable del inventario por emergencia?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Sí, cambiar',
                customClass: { popup: 'rounded-4' }
            });
        }

        function showV(v, el) {
            document.querySelectorAll('.view').forEach(x => x.classList.add('d-none'));
            document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active'));
            document.getElementById('v-'+v).classList.remove('d-none');
            el.classList.add('active');
        }

        function suggestVendor(v) {
            let sug = "DISTRIBUIDORA GENERAL";
            if(v.toUpperCase().includes("GLOBAL")) sug = "GLOBAL LOGISTICS S.A.";
            document.getElementById('ven-sug').value = sug;
        }

        window.onload = init;
    </script>
</body>
</html>
