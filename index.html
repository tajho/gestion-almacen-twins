<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajho OS - Elite Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; }
        .card-premium { @apply bg-white rounded-[2.5rem] p-8 shadow-[0_20px_50px_rgba(0,0,0,0.04)] border border-slate-100 transition-all duration-300; }
        .input-pro { @apply w-full p-5 bg-slate-50 border-2 border-transparent rounded-2xl outline-none focus:border-blue-600 focus:bg-white font-bold transition-all text-sm; }
        .btn-black { @apply py-5 bg-slate-900 text-white rounded-3xl font-bold text-xs uppercase tracking-[0.2em] shadow-2xl active:scale-95 transition-all; }
        .hidden { display: none !important; }
        .progress-fill { transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="pb-36">

    <header class="p-8 pt-12 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tighter leading-none text-slate-900 uppercase">Tajho<span class="text-blue-600 italic">.OS</span></h1>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mt-2">Inventory Intelligence</p>
        </div>
        <div class="h-12 w-12 rounded-2xl bg-white shadow-sm border border-slate-100 flex items-center justify-center text-xl">📦</div>
    </header>

    <main class="max-w-md mx-auto px-6 space-y-8">

        <section id="fase-setup" class="space-y-6">
            <div class="px-2">
                <h2 class="text-xl font-[800] italic text-slate-800 uppercase tracking-tighter">Planificación</h2>
                <p class="text-xs text-slate-400 font-medium">Cargue los datos oficiales del Packing List antes de iniciar.</p>
            </div>

            <div class="card-premium space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <input type="text" id="setup-cod" placeholder="CÓDIGO" class="input-pro col-span-2 uppercase">
                    <input type="number" id="setup-meta" placeholder="TOTAL" class="input-pro text-center">
                </div>
                <input type="text" id="setup-desc" placeholder="DESCRIPCIÓN BREVE" class="input-pro">
                <button onclick="registrarEnManifiesto()" class="w-full py-4 bg-blue-50 text-blue-600 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-blue-100">+ Añadir al Manifiesto</button>
            </div>

            <div id="lista-manifiesto" class="space-y-2">
                </div>

            <button id="btn-iniciar-conteo" onclick="iniciarConteoReal()" class="btn-black w-full hidden">
                Confirmar Plan y Abrir Contenedor
            </button>
        </section>

        <section id="fase-operacion" class="hidden space-y-6">
            <div class="px-2 flex justify-between items-center">
                <h2 class="text-xl font-[800] italic text-slate-800 uppercase tracking-tighter">Descarga Activa</h2>
                <span class="animate-pulse bg-green-100 text-green-600 text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Live Audit</span>
            </div>

            <div class="card-premium p-10 text-center space-y-6 border-2 border-blue-50 shadow-blue-50/50">
                <div class="space-y-2">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Seleccionar Producto</p>
                    <select id="select-item" class="input-pro text-center appearance-none cursor-pointer">
                        </select>
                </div>
                
                <div class="space-y-2">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Ingresar Cantidad de Bultos</p>
                    <div class="flex gap-4">
                        <input type="number" id="input-cantidad" placeholder="0" class="w-full text-5xl font-black text-center text-slate-900 bg-transparent outline-none">
                    </div>
                </div>

                <button onclick="sumarBultos()" class="w-full py-5 bg-blue-600 text-white rounded-[1.8rem] font-bold text-xs uppercase tracking-widest shadow-xl shadow-blue-200">
                    Registrar Ingreso
                </button>
            </div>

            <div id="status-update" class="text-center h-4"></div>

            <div id="progreso-items" class="space-y-4">
                </div>

            <button onclick="cerrarYReportar()" class="btn-black w-full bg-slate-900 mt-10">
                Cerrar Contenedor & Generar Reporte
            </button>
        </section>

    </main>

    <nav class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[85%] bg-white/90 backdrop-blur-xl rounded-[2.5rem] p-2 flex border border-slate-100 shadow-2xl z-50">
        <button onclick="location.reload()" class="flex-1 py-4 flex flex-col items-center text-slate-400">
            <span class="text-xl">🔄</span>
            <span class="text-[8px] font-black uppercase mt-1">Nuevo</span>
        </button>
        <button onclick="mostrarHistorial()" class="flex-1 py-4 flex flex-col items-center text-slate-400">
            <span class="text-xl">📁</span>
            <span class="text-[8px] font-black uppercase mt-1">Historial</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;
        let packingPlan = [];
        let historialLocal = JSON.parse(localStorage.getItem('tajho_audit_history')) || [];

        function registrarEnManifiesto() {
            const cod = document.getElementById('setup-cod').value.toUpperCase();
            const meta = parseInt(document.getElementById('setup-meta').value);
            const desc = document.getElementById('setup-desc').value || "Producto Tajho";

            if(!cod || !meta) return;

            packingPlan.push({ cod, meta, desc, real: 0 });
            renderizarManifiesto();
            
            document.getElementById('setup-cod').value = "";
            document.getElementById('setup-meta').value = "";
            document.getElementById('setup-desc').value = "";
            document.getElementById('btn-iniciar-conteo').classList.remove('hidden');
        }

        function renderizarManifiesto() {
            const cont = document.getElementById('lista-manifiesto');
            cont.innerHTML = "";
            packingPlan.forEach(p => {
                cont.innerHTML += `
                    <div class="card-premium p-4 flex justify-between items-center text-xs mb-2">
                        <span class="font-black text-slate-900">${p.cod}</span>
                        <span class="font-bold text-slate-400 uppercase tracking-tighter">${p.desc}</span>
                        <span class="bg-slate-100 px-3 py-1 rounded-full font-black text-slate-600">${p.meta} UND</span>
                    </div>`;
            });
        }

        function iniciarConteoReal() {
            document.getElementById('fase-setup').classList.add('hidden');
            document.getElementById('fase-operacion').classList.remove('hidden');
            
            const select = document.getElementById('select-item');
            select.innerHTML = packingPlan.map(p => `<option value="${p.cod}">${p.cod} - ${p.desc}</option>`).join('');
            
            actualizarUIProgreso();
        }

        function sumarBultos() {
            const cod = document.getElementById('select-item').value;
            const cant = parseInt(document.getElementById('input-cantidad').value);
            const updateDiv = document.getElementById('status-update');

            if(!cant || cant <= 0) return;

            const item = packingPlan.find(p => p.cod === cod);
            item.real += cant;

            updateDiv.innerHTML = `<p class="text-blue-600 font-black text-[10px] uppercase tracking-widest animate-fade">Ingreso: +${cant} unidades a ${cod}</p>`;
            document.getElementById('input-cantidad').value = "";
            
            actualizarUIProgreso();

            if(item.real >= item.meta) {
                navigator.vibrate([200, 100, 200]); // Vibración de alerta
            }
        }

        function actualizarUIProgreso() {
            const cont = document.getElementById('progreso-items');
            cont.innerHTML = "";
            packingPlan.forEach(p => {
                const porc = Math.min((p.real / p.meta) * 100, 100);
                const isDone = p.real >= p.meta;
                
                cont.innerHTML += `
                    <div class="card-premium p-6 space-y-3 ${isDone ? 'border-green-200 bg-green-50/30' : ''}">
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-[9px] font-black text-slate-400 uppercase italic">${p.cod}</p>
                                <p class="font-bold text-slate-800">${p.desc}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xl font-black ${isDone ? 'text-green-600' : 'text-blue-600'}">${p.real} <span class="text-slate-300 text-xs font-normal">/ ${p.meta}</span></p>
                            </div>
                        </div>
                        <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div class="progress-fill h-full ${isDone ? 'bg-green-500' : 'bg-blue-600'}" style="width: ${porc}%"></div>
                        </div>
                    </div>`;
            });
        }

        function cerrarYReportar() {
            const auditID = "TJ-" + Math.floor(1000 + Math.random() * 9000);
            const report = {
                id: auditID,
                fecha: new Date().toLocaleString(),
                data: [...packingPlan]
            };
            
            historialLocal.unshift(report);
            localStorage.setItem('tajho_audit_history', JSON.stringify(historialLocal));
            
            generarPDF(report);
            setTimeout(() => location.reload(), 1500);
        }

        function generarPDF(report) {
            const doc = new jsPDF();
            doc.setFontSize(22); doc.setTextColor(15, 23, 42); doc.text("REPORTE OPERATIVO TAJHO", 14, 25);
            doc.setFontSize(10); doc.setTextColor(100); doc.text(`Folio: ${report.id} | Fecha: ${report.fecha}`, 14, 33);
            
            const rows = report.data.map(i => [
                i.cod, i.desc, i.meta, i.real, (i.real >= i.meta ? 'COMPLETO' : 'FALTANTE')
            ]);

            doc.autoTable({
                startY: 40,
                head: [['CÓDIGO', 'DESCRIPCIÓN', 'PLAN', 'CONTADO', 'ESTADO']],
                body: rows,
                theme: 'grid',
                headStyles: { fillColor: [15, 23, 42], halign: 'center' },
                columnStyles: { 2: { halign: 'center' }, 3: { halign: 'center' } }
            });

            doc.setFontSize(9);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 20);
            doc.save(`${report.id}_Tajho.pdf`);
        }
    </script>
</body>
</html>
