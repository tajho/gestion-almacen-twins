<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twins Elite Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --primary: #0F172A; --bg: #F8FAFC; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--primary); -webkit-tap-highlight-color: transparent; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); position: sticky; top: 0; z-index: 50; }
        .native-card { background: #FFFFFF; border-radius: 24px; border: 1px solid #E2E8F0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
        .search-bar { background: #FFFFFF; border: 1.5px solid #E2E8F0; border-radius: 18px; }
        .fab-sync { position: fixed; bottom: 100px; right: 25px; width: 64px; height: 64px; background: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; z-index: 40; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #E2E8F0; display: flex; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); z-index: 90; border-radius: 30px 30px 0 0;}
        .nav-btn { flex: 1; padding: 16px 0; display: flex; flex-direction: column; align-items: center; color: #94A3B8; }
        .nav-btn.active { color: #2563EB; }
        .nav-btn i { font-size: 24px; }
        .nav-btn span { font-size: 10px; font-weight: 800; text-transform: uppercase; }
        #audit-view { display: none; position: fixed; inset: 0; background: #F8FAFC; z-index: 1000; flex-direction: column; }
        .audit-item-card { background: #FFFFFF; border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid #F1F5F9; position: relative; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">

    <div class="glass-header px-6 py-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p id="top-subtitle" class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Almacén Pro</p>
                <h1 class="text-xl font-extrabold text-slate-900">Twins Elite</h1>
            </div>
            <div id="top-progress" class="flex items-center gap-2">
                <div class="text-right"><p class="text-[10px] font-black text-slate-400">PROGRESO</p><p id="global-perc" class="text-sm font-black text-slate-900">0%</p></div>
            </div>
        </div>
    </div>

    <div id="module-audit" class="max-w-md mx-auto px-6 pb-32">
        <div class="flex gap-2 my-6">
            <div class="flex-1 search-bar flex items-center px-4 py-1">
                <i class="ph-bold ph-magnifying-glass text-slate-400 mr-3"></i>
                <input type="text" id="main-search" oninput="core.render()" placeholder="Contenedor o SKU..." class="w-full py-3 bg-transparent outline-none font-semibold text-sm">
            </div>
            <div class="w-14 h-14 bg-white border border-slate-100 rounded-[18px] flex items-center justify-center relative">
                <i class="ph-bold ph-calendar-blank text-slate-400 text-xl"></i>
                <select id="month-select" onchange="core.filterMonth(this.value)" class="absolute inset-0 opacity-0"></select>
            </div>
        </div>
        <div id="container-list" class="space-y-4"></div>
        <button onclick="core.fetchData()" class="fab-sync"><i id="sync-icon" class="ph-bold ph-arrows-clockwise text-white text-2xl"></i></button>
    </div>

    <div id="module-returns" class="hidden max-w-md mx-auto px-6 pb-32 pt-6">
        <div class="flex bg-slate-200/50 rounded-xl p-1 mb-6">
            <button onclick="core.returns.switchTab('new')" id="tab-dev-new" class="flex-1 py-2.5 text-[11px] font-black uppercase rounded-lg bg-white shadow-sm text-blue-600">Nuevo Ticket</button>
            <button onclick="core.returns.switchTab('history')" id="tab-dev-hist" class="flex-1 py-2.5 text-[11px] font-black uppercase rounded-lg text-slate-500">Historial</button>
        </div>

        <div id="dev-new-section">
            <div class="bg-white rounded-[24px] p-6 border border-slate-100 shadow-sm mb-6">
                <div class="space-y-4">
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Cliente</label>
                    <input type="text" id="dev-cliente" oninput="core.returns.saveDraft()" onblur="core.returns.suggestVendor()" placeholder="Nombre del cliente" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Vendedor</label>
                    <select id="dev-vendedor" onchange="core.returns.saveDraft()" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold">
                        <option value="">Seleccione vendedor</option>
                        <option value="ELIAS AVILA">ELIAS AVILA</option><option value="EVELYN MURO">EVELYN MURO</option><option value="REGULO ANTEZANA">REGULO ANTEZANA</option><option value="JHAYRO MAURICIO">JHAYRO MAURICIO</option><option value="PAULA GARCIA">PAULA GARCIA</option>
                    </select></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Motivo</label>
                    <input type="text" id="dev-motivo" oninput="core.returns.saveDraft()" placeholder="Motivo de devolución" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold"></div>
                </div>
            </div>

            <div class="bg-white rounded-[24px] p-6 border border-slate-100 shadow-sm mb-6">
                <div class="relative">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Producto (SKU o Descripción)</label>
                    <input type="text" id="dev-prod-search" oninput="core.returns.searchProduct()" placeholder="Escribe para buscar..." class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold">
                    <div id="dev-prod-results" class="absolute z-10 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto hidden"></div>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-4">
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Cantidad</label>
                    <input type="number" id="dev-cantidad" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-black text-center"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Estado</label>
                    <select id="dev-estado" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold">
                        <option value="BUEN ESTADO">Buen Estado</option><option value="DAÑADO A MERMA">Dañado a Merma</option><option value="INCOMPLETO">Incompleto</option>
                    </select></div>
                </div>
                <button onclick="core.returns.addItem()" class="w-full mt-4 bg-blue-600 text-white h-12 rounded-xl font-black text-[10px] uppercase tracking-widest">Agregar Producto</button>
            </div>
            <div id="dev-items-list" class="space-y-3 mb-6"></div>
            <button id="dev-btn-save" onclick="core.returns.saveReturn()" class="w-full bg-slate-900 text-white h-14 rounded-2xl font-black text-sm uppercase tracking-widest hidden">Generar Devolución</button>
        </div>

        <div id="dev-hist-section" class="hidden">
            <div class="search-bar flex items-center px-4 py-1 mb-6">
                <i class="ph-bold ph-magnifying-glass text-slate-400 mr-3"></i>
                <input type="text" id="dev-hist-search" oninput="core.returns.renderHistory()" placeholder="Buscar en historial..." class="w-full py-3 bg-transparent outline-none font-semibold text-sm">
            </div>
            <div id="dev-hist-list" class="space-y-4"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="core.nav.go('audit')" id="nav-audit" class="nav-btn active"><i class="ph-fill ph-boxes"></i><span>Almacén</span></button>
        <button onclick="core.nav.go('returns')" id="nav-returns" class="nav-btn"><i class="ph-fill ph-arrow-u-up-left"></i><span>Devolución</span></button>
    </div>

    <div id="audit-view">
        <div class="bg-white px-6 pt-10 pb-4 border-b flex justify-between items-center sticky top-0 z-50">
            <button onclick="core.closeModal('audit-view')" class="text-2xl"><i class="ph-bold ph-arrow-left"></i></button>
            <h2 id="audit-title" class="text-sm font-black uppercase">CARGA</h2>
            <div id="audit-timer-display" class="text-xs font-bold font-mono">00:00</div>
        </div>
        <div id="audit-items-container" class="flex-1 overflow-y-auto px-5 py-6 no-scrollbar"></div>
        <div class="p-6 bg-white border-t flex gap-3 shadow-lg">
            <button onclick="core.saveAndFinish()" class="flex-1 bg-slate-900 text-white h-14 rounded-2xl font-black uppercase text-sm">Finalizar Conteo</button>
        </div>
    </div>

    <script>
        const core = {
            url: "https://script.google.com/macros/s/AKfycbwrgIKcyd0iKQjWNkrGysrIFLstMaHdPe-WWo13RUOykAtMV4uKXJqyGoDdquzzC5BK/exec",
            raw: JSON.parse(localStorage.getItem('twins_cache')) || [],
            productsCache: JSON.parse(localStorage.getItem('twins_prod_cache')) || [],
            historyCache: JSON.parse(localStorage.getItem('twins_hist_cache')) || [],
            activeCont: null, timerInterval: null, currentMonth: "MARZO",
            
            nav: {
                go: function(view) {
                    localStorage.setItem('twins_view', view);
                    document.getElementById('nav-audit').classList.remove('active');
                    document.getElementById('nav-returns').classList.remove('active');
                    document.getElementById('module-audit').classList.add('hidden');
                    document.getElementById('module-returns').classList.add('hidden');
                    document.getElementById('nav-' + view).classList.add('active');
                    document.getElementById('module-' + view).classList.remove('hidden');
                    if(view === 'returns') { core.returns.loadDraft(); core.returns.fetchProducts(); core.returns.fetchHistory(); }
                }
            },

            fetchData: async function() {
                try {
                    const res = await fetch(this.url);
                    const data = await res.json();
                    if(data) { this.raw = data; localStorage.setItem('twins_cache', JSON.stringify(data)); this.render(); }
                } catch(e) { console.error(e); }
            },

            render: function() {
                const list = document.getElementById('container-list');
                const search = document.getElementById('main-search').value.toLowerCase();
                const conts = [...new Set(this.raw.map(i => i.CONTENEDOR_LIMPIO))];
                list.innerHTML = conts.filter(id => id.toLowerCase().includes(search)).map(id => `
                    <div class="native-card p-6 mb-4">
                        <div class="flex justify-between items-center mb-4">
                            <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-[10px] font-black uppercase">CARGA #${id}</span>
                        </div>
                        <button onclick="core.openAudit('${id}')" class="w-full bg-slate-900 text-white h-12 rounded-xl font-bold uppercase text-[10px]">Iniciar Conteo</button>
                    </div>`).join('');
            },

            returns: {
                currentItems: [],
                fetchProducts: async function() {
                    const res = await fetch(core.url + "?type=productos");
                    const data = await res.json();
                    core.productsCache = data;
                    localStorage.setItem('twins_prod_cache', JSON.stringify(data));
                },
                fetchHistory: async function() {
                    const res = await fetch(core.url + "?type=devoluciones");
                    const data = await res.json();
                    core.historyCache = data;
                    this.renderHistory();
                },
                searchProduct: function() {
                    const val = document.getElementById('dev-prod-search').value.toLowerCase().trim();
                    const resBox = document.getElementById('dev-prod-results');
                    if(val.length < 2) { resBox.classList.add('hidden'); return; }
                    const filtered = core.productsCache.filter(i => 
                        String(i["SKU"]).toLowerCase().includes(val) || 
                        String(i["DESCRIPCION"]).toLowerCase().includes(val)
                    ).slice(0, 10);
                    resBox.innerHTML = filtered.map(i => `<div onclick="core.returns.selectProduct('${i["SKU"]}', '${i["DESCRIPCION"]}')" class="p-3 border-b text-sm font-bold active:bg-slate-50">
                        <p class="text-blue-600 text-[10px] font-black">${i["SKU"]}</p>${i["DESCRIPCION"]}</div>`).join('');
                    resBox.classList.remove('hidden');
                },
                selectProduct: function(sku, desc) {
                    document.getElementById('dev-prod-search').value = sku + " - " + desc;
                    this.tempProd = { sku, desc };
                    document.getElementById('dev-prod-results').classList.add('hidden');
                },
                addItem: function() {
                    if(!this.tempProd) return;
                    const cant = document.getElementById('dev-cantidad').value;
                    this.currentItems.push({ ...this.tempProd, cant, estado: document.getElementById('dev-estado').value });
                    this.renderItems(); this.saveDraft();
                },
                renderItems: function() {
                    const list = document.getElementById('dev-items-list');
                    list.innerHTML = this.currentItems.map((i, idx) => `<div class="bg-white p-4 rounded-xl border flex justify-between items-center text-xs font-bold">
                        <div><p class="text-blue-600">${i.sku}</p>${i.desc}</div><div class="text-right">x${i.cant}<br>${i.estado}</div></div>`).join('');
                    document.getElementById('dev-btn-save').classList.toggle('hidden', this.currentItems.length === 0);
                },
                saveReturn: async function() {
                    const btn = document.getElementById('dev-btn-save'); btn.innerText = "ENVIANDO...";
                    const data = {
                        action: "guardar_devolucion",
                        fecha: new Date().toLocaleDateString(),
                        cliente: document.getElementById('dev-cliente').value,
                        vendedor: document.getElementById('dev-vendedor').value,
                        motivo: document.getElementById('dev-motivo').value,
                        items: this.currentItems.map(i => ({ codigo: i.sku, descripcion: i.desc, cantidad: i.cant, estado: i.estado }))
                    };
                    await fetch(core.url, { method: 'POST', body: JSON.stringify(data) });
                    this.generatePDF(data);
                    alert("Devolución Guardada");
                    localStorage.removeItem('twins_dev_draft');
                    location.reload();
                },
                saveDraft: function() {
                    const d = { c: document.getElementById('dev-cliente').value, v: document.getElementById('dev-vendedor').value, m: document.getElementById('dev-motivo').value, i: this.currentItems };
                    localStorage.setItem('twins_dev_draft', JSON.stringify(d));
                },
                loadDraft: function() {
                    const d = JSON.parse(localStorage.getItem('twins_dev_draft'));
                    if(d) { document.getElementById('dev-cliente').value = d.c; document.getElementById('dev-vendedor').value = d.v; document.getElementById('dev-motivo').value = d.m; this.currentItems = d.i; this.renderItems(); }
                },
                switchTab: function(t) {
                    document.getElementById('dev-new-section').classList.toggle('hidden', t === 'history');
                    document.getElementById('dev-hist-section').classList.toggle('hidden', t === 'new');
                    document.getElementById('tab-dev-new').classList.toggle('bg-white', t === 'new');
                    document.getElementById('tab-dev-hist').classList.toggle('bg-white', t === 'history');
                },
                renderHistory: function() {
                    const list = document.getElementById('dev-hist-list');
                    const search = document.getElementById('dev-hist-search').value.toLowerCase();
                    const tickets = {};
                    core.historyCache.forEach(i => {
                        const key = i.CLIENTE + "_" + i.FECHA;
                        if(!tickets[key]) tickets[key] = { ...i, items: [] };
                        tickets[key].items.push(i);
                    });
                    list.innerHTML = Object.values(tickets).filter(t => t.CLIENTE.toLowerCase().includes(search)).map(t => `<div class="native-card p-5">
                        <div class="flex justify-between items-start"><div><p class="text-[9px] font-black text-slate-400">${t.FECHA}</p><h3 class="text-sm font-black">${t.CLIENTE}</h3></div>
                        <button onclick='core.returns.generatePDF(${JSON.stringify(t)})' class="text-red-600"><i class="ph-bold ph-file-pdf text-xl"></i></button></div></div>`).join('');
                },
                generatePDF: function(data) {
                    const { jsPDF } = window.jspdf; const doc = new jsPDF();
                    doc.text("TICKET DE DEVOLUCIÓN - TWINS", 14, 20);
                    doc.setFontSize(10); doc.text(`Cliente: ${data.cliente || data.CLIENTE}`, 14, 30);
                    doc.text(`Vendedor: ${data.vendedor || data.VENDEDOR}`, 14, 35);
                    const items = data.items || data.items || [];
                    doc.autoTable({ startY: 45, head: [['SKU', 'DESC', 'CANT', 'ESTADO']], body: items.map(i => [i.codigo || i.CODIGO, i.descripcion || i.DESCRIPCION, i.cantidad || i.CANTIDAD, i.estado || i.ESTADO]) });
                    doc.text("Revisión: J. Angelo Nuñez Durand", 14, doc.lastAutoTable.finalY + 15);
                    doc.save("Devolucion.pdf");
                }
            },

            openAudit: function(id) {
                this.activeCont = id; document.getElementById('audit-view').style.display = 'flex';
                this.renderAuditItems();
            },
            renderAuditItems: function() {
                const items = this.raw.filter(i => i.CONTENEDOR_LIMPIO == this.activeCont);
                document.getElementById('audit-items-container').innerHTML = items.map(i => `<div class="audit-item-card"><h4 class="text-xs font-black">${i.DESCRIPCION}</h4></div>`).join('');
            },
            closeModal: function(id) { document.getElementById(id).style.display = 'none'; }
        };

        window.onload = () => { 
            core.fetchData(); 
            const lastView = localStorage.getItem('twins_view') || 'audit';
            core.nav.go(lastView);
        };
    </script>
</body>
</html>
