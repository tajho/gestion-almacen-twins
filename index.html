<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v37</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #0f172a; overflow: hidden; height: 100vh; }
        .card-modern { background: white; border-radius: 2.2rem; border: 1px solid #f1f5f9; box-shadow: 0 15px 35px -12px rgba(0,0,0,0.06); }
        .input-clean { background: #f8fafc; border-radius: 1.25rem; border: 2px solid transparent; font-weight: 700; transition: 0.3s; padding: 0.9rem 1.3rem; }
        .input-clean:focus { border-color: var(--blue); background: white; outline: none; }
        
        /* Sistema de Vistas */
        #landing { position: fixed; inset: 0; z-index: 500; background: white; padding: 2.5rem; display: flex; flex-direction: column; justify-content: center; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .hide-landing { transform: translateY(-100%); visibility: hidden; }
        .view { display: none; height: calc(100vh - 80px); overflow-y: auto; padding: 1.5rem; }
        .view.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Barras de Progreso */
        .progress-bg { width: 100%; height: 8px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--blue); transition: width 0.5s ease; }

        /* Menú Lateral */
        #side-menu { position: fixed; inset: 0; z-index: 1000; visibility: hidden; pointer-events: none; }
        #menu-content { width: 80%; max-width: 300px; height: 100%; background: white; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.1); }
        #side-menu.open { visibility: visible; pointer-events: auto; }
        #side-menu.open #menu-content { transform: translateX(0); }
        #menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); opacity: 0; transition: 0.4s; backdrop-filter: blur(2px); }
        #side-menu.open #menu-overlay { opacity: 1; }
    </style>
</head>
<body>

    <div id="side-menu">
        <div id="menu-overlay" onclick="toggleMenu()"></div>
        <div id="menu-content" class="p-8 flex flex-col">
            <h3 class="text-xs font-black tracking-widest italic mb-10">TAJHO<span class="text-blue-600">.OS</span></h3>
            <nav class="space-y-2 flex-1">
                <button onclick="navTo('landing')" class="w-full flex items-center gap-4 p-4 rounded-2xl font-bold text-slate-600">🏠 Inicio</button>
                <button onclick="navTo('historial')" class="w-full flex items-center gap-4 p-4 rounded-2xl font-bold text-slate-600">📦 Historial</button>
            </nav>
        </div>
    </div>

    <div id="landing">
        <header class="mb-12">
            <h1 class="text-5xl font-[800] tracking-tighter leading-tight italic">¿Qué hacemos<br><span class="text-blue-600 font-black">hoy, Tajho?</span></h1>
        </header>
        <div class="space-y-4">
            <button onclick="navTo('contenedor')" class="card-modern w-full p-7 flex items-center gap-6 border-none shadow-2xl">
                <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/></svg>
                </div>
                <div class="text-left"><p class="text-sm font-black uppercase tracking-[0.15em]">Contenedor</p><p class="text-[10px] font-bold text-slate-400 italic">LOGÍSTICA ELITE</p></div>
            </button>
            <button onclick="navTo('historial')" class="card-modern w-full p-7 flex items-center gap-6 border-none shadow-2xl">
                <div class="w-14 h-14 bg-green-50 rounded-2xl flex items-center justify-center text-green-600">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20v-6M9 20V10M15 20V4"/></svg>
                </div>
                <div class="text-left"><p class="text-sm font-black uppercase tracking-[0.15em]">Historial</p><p class="text-[10px] font-bold text-slate-400 italic">REGISTRO DE ESPERA</p></div>
            </button>
            <button onclick="navTo('devoluciones')" class="card-modern w-full p-7 flex items-center gap-6 border-none shadow-2xl">
                <div class="w-14 h-14 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-500">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/><path d="M9 12h12"/></svg>
                </div>
                <div class="text-left"><p class="text-sm font-black uppercase tracking-[0.15em]">Devoluciones</p><p class="text-[10px] font-bold text-slate-400 italic">CONTROL RETORNOS</p></div>
            </button>
        </div>
    </div>

    <header class="h-20 px-6 flex justify-between items-center bg-white sticky top-0 z-50">
        <button onclick="toggleMenu()" class="p-3 bg-slate-50 rounded-2xl text-slate-900"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div id="global-monitor" class="hidden flex-1 px-4">
            <div class="progress-bg"><div id="main-bar" class="progress-fill" style="width: 0%"></div></div>
            <p id="timer" class="text-[9px] font-black text-blue-600 text-center mt-1 italic tracking-widest">00:00:00</p>
        </div>
        <div id="header-label" class="text-right font-black italic text-blue-600 text-xs">T.OS</div>
    </header>

    <main>
        <div id="view-contenedor" class="view space-y-6">
            <div class="card-modern p-8 space-y-4">
                <input type="text" id="c-name" class="input-clean w-full" placeholder="NOMBRE DEL CONTENEDOR">
                <div class="relative">
                    <input type="text" id="s-sku" oninput="smartSearch()" class="input-clean w-full uppercase" placeholder="BUSCAR SKU..." autocomplete="off">
                    <div id="search-results" class="hidden absolute z-10 w-full bg-white mt-2 rounded-2xl shadow-2xl border max-h-48 overflow-y-auto"></div>
                </div>
                <input type="text" id="s-desc" class="input-clean w-full text-xs text-blue-600 font-bold italic" readonly placeholder="...">
                <input type="number" id="s-meta" class="input-clean w-full" placeholder="CANTIDAD META">
                <button onclick="addItem()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest">Añadir a Lista</button>
            </div>
            <div id="pre-list" class="space-y-2"></div>
            <button id="btn-save" onclick="saveContenedor()" class="hidden w-full bg-blue-600 text-white py-5 rounded-3xl font-black uppercase shadow-xl">Guardar en Historial</button>
        </div>

        <div id="view-historial" class="view space-y-4">
            <h2 class="text-2xl font-black italic">Historial <span class="text-blue-600">Espera</span></h2>
            <div id="history-list" class="space-y-4"></div>
        </div>

        <div id="view-ops" class="view">
            <div class="card-modern p-10 space-y-8 text-center">
                <div class="space-y-2">
                    <select id="sel-sku" onchange="syncItem()" class="text-4xl font-[900] bg-transparent w-full text-center outline-none italic"></select>
                    <p id="ops-desc" class="text-[11px] font-black text-blue-600 uppercase tracking-widest"></p>
                </div>
                <div class="py-2">
                    <p class="text-[9px] font-black text-slate-300 uppercase mb-2">Progreso del Ítem</p>
                    <div class="progress-bg"><div id="item-bar" class="progress-fill" style="width: 0%"></div></div>
                </div>
                <div class="flex items-center justify-center gap-4">
                    <input type="number" id="qty-in" class="input-clean w-32 text-center text-4xl h-20 shadow-inner" placeholder="0">
                    <button onclick="doQty()" class="w-20 h-20 bg-blue-600 text-white rounded-[2rem] flex items-center justify-center shadow-2xl text-4xl font-bold">+</button>
                </div>
                <div class="flex justify-around border-t pt-6">
                    <div><p class="text-[9px] font-black text-slate-400 uppercase italic">Faltante</p><p id="txt-rem" class="text-2xl font-black">0</p></div>
                    <div><p class="text-[9px] font-black text-slate-400 uppercase italic">Cargado</p><p id="txt-real" class="text-2xl font-black text-blue-600">0</p></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let db_raw = []; let history = []; let draft = []; let active = null; let tSec = 0; let tInt;

        window.onbeforeunload = () => (draft.length > 0 || active) ? "¿Perder los cambios?" : null;

        async function init() { const r = await fetch(CLOUD_URL); db_raw = await r.json(); }
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
        function navTo(v) {
            if(v === 'landing') { document.getElementById('landing').classList.remove('hide-landing'); return; }
            document.getElementById('landing').classList.add('hide-landing');
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            if(v === 'historial') renderHistory();
            if(document.getElementById('side-menu').classList.contains('open')) toggleMenu();
            init();
        }

        function smartSearch() {
            const val = document.getElementById('s-sku').value.toUpperCase();
            const res = document.getElementById('search-results');
            if(val.length < 2) { res.classList.add('hidden'); return; }
            const matches = db_raw.filter(i => String(i.CODIGO).includes(val)).slice(0,5);
            res.innerHTML = matches.map(m => `<div onclick="setS('${m.CODIGO}','${m.DESCRIPCION}')" class="p-4 border-b font-bold text-xs uppercase">${m.CODIGO} - ${m.DESCRIPCION}</div>`).join('');
            res.classList.remove('hidden');
        }
        function setS(c,d) { document.getElementById('s-sku').value=c; document.getElementById('s-desc').value=d; document.getElementById('search-results').classList.add('hidden'); }

        function addItem() {
            const sku = document.getElementById('s-sku').value; const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            draft.push({sku, desc: document.getElementById('s-desc').value, meta, real: 0});
            document.getElementById('pre-list').innerHTML += `<div class="p-4 bg-slate-50 rounded-2xl font-black text-[10px] uppercase border border-slate-100">${sku} | META: ${meta}</div>`;
            document.getElementById('btn-save').classList.remove('hidden');
            document.getElementById('s-sku').value=''; document.getElementById('s-desc').value=''; document.getElementById('s-meta').value='';
        }

        function saveContenedor() {
            const name = document.getElementById('c-name').value || "CNT-" + Date.now().toString().slice(-4);
            history.push({id: Date.now(), name, items: [...draft], status: 'espera'});
            draft = []; document.getElementById('pre-list').innerHTML = ''; document.getElementById('btn-save').classList.add('hidden');
            navTo('historial');
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="card-modern p-6 flex justify-between items-center">
                    <div><p class="text-[9px] font-black text-blue-600 italic uppercase">${h.status}</p><h3 class="font-black uppercase">${h.name}</h3></div>
                    <button onclick="startOps(${h.id})" class="bg-blue-600 text-white px-5 py-3 rounded-2xl font-black text-[10px] uppercase">Comenzar</button>
                </div>
            `).join('');
        }

        function startOps(id) {
            if(!confirm("¿Comenzar descarga? Se iniciará el tiempo.")) return;
            active = history.find(h => h.id === id); active.status = 'operativo';
            navTo('ops');
            document.getElementById('global-monitor').classList.remove('hidden');
            document.getElementById('sel-sku').innerHTML = active.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem(); startT();
        }

        function syncItem() {
            const item = active.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('ops-desc').innerText = item.desc;
            document.getElementById('txt-rem').innerText = item.meta - item.real;
            document.getElementById('txt-real').innerText = item.real;
            document.getElementById('item-bar').style.width = (item.real/item.meta*100) + "%";
            const tM = active.items.reduce((a,b) => a+b.meta,0); const tR = active.items.reduce((a,b) => a+b.real,0);
            document.getElementById('main-bar').style.width = (tR/tM*100) + "%";
        }

        function doQty() {
            const q = parseInt(document.getElementById('qty-in').value); if(!q) return;
            const item = active.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += q; document.getElementById('qty-in').value = ''; syncItem();
            fetch(CLOUD_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({tipo:'CARGA', datos:[active.name, item.sku, q]})});
        }

        function startT() {
            tInt = setInterval(() => {
                tSec++; let h=Math.floor(tSec/3600), m=Math.floor((tSec%3600)/60), s=tSec%60;
                document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }
    </script>
</body>
</html>
