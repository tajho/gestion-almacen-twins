<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN PRIME | Auditoría Logística</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --bg: #0F172A;
            --surface: #1E293B;
            --accent: #38BDF8;
            --success: #22C55E;
            --danger: #EF4444;
            --text: #F8FAFC;
            --border: #334155;
        }

        body { 
            background: var(--bg); font-family: 'Outfit', sans-serif; color: var(--text);
            margin: 0; padding-bottom: 110px; overflow-x: hidden;
        }

        .main-header {
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            padding: 20px; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .title-brand { font-weight: 800; font-size: 22px; color: var(--accent); letter-spacing: -1px; }

        .card-modern {
            background: var(--surface); border-radius: 20px; padding: 25px;
            margin: 15px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .label-tech { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; display: block; opacity: 0.8; }

        .input-titan {
            background: #0F172A; border: 1.5px solid var(--border);
            border-radius: 12px; padding: 14px; width: 100%; color: #fff;
            font-size: 15px; margin-bottom: 15px; transition: 0.3s;
        }
        .input-titan:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15); }

        .scroller-v { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; scrollbar-width: none; }
        .chip-v {
            background: #334155; border: 1px solid var(--border); padding: 10px 18px;
            border-radius: 10px; font-size: 12px; font-weight: 600; white-space: nowrap; transition: 0.3s;
        }
        .chip-v.active { background: var(--accent); color: #0F172A; font-weight: 800; border-color: var(--accent); }

        .btn-action {
            border-radius: 14px; padding: 16px; font-weight: 800; border: none; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-transform: uppercase; font-size: 13px; transition: 0.3s;
        }
        .btn-accent { background: var(--accent); color: #0F172A; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }

        .item-row {
            background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; margin-bottom: 10px;
            border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center;
        }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: #1E293B;
            display: flex; justify-content: space-around; padding: 15px 0 30px 0;
            border-top: 1px solid var(--border); z-index: 1000;
        }
        .nav-link-t { background: none; border: none; color: #64748B; font-weight: 700; font-size: 10px; text-align: center; }
        .nav-link-t.active { color: var(--accent); }
        .nav-link-t i { font-size: 20px; display: block; margin-bottom: 5px; }

        .view { display: none; }
        .active-view { display: block; }
    </style>
</head>
<body>

    <header class="main-header d-flex justify-content-between align-items-center">
        <div>
            <div class="title-brand">TITAN <span style="color:white">PRIME</span></div>
            <div style="font-size: 9px; color: var(--accent); letter-spacing: 1px;">AUDITORÍA LOGÍSTICA</div>
        </div>
        <div class="text-end">
            <div style="font-size: 11px; font-weight: 800;">J. ANGELO</div>
            <div style="font-size: 9px; color: var(--success);">ESTADO: ACTIVO</div>
        </div>
    </header>

    <main>
        <section id="v-del" class="view active-view">
            <div class="card-modern">
                <span class="label-tech">Datos de Salida</span>
                <input type="text" id="cli-d" class="input-titan" placeholder="Cliente / Empresa" oninput="persistState()">
                
                <span class="label-tech">Responsable Comercial</span>
                <div class="scroller-v" id="vend-d">
                    <div class="chip-v" onclick="selVend('ELIAS AVILA', 'd')">ELIAS AVILA</div>
                    <div class="chip-v" onclick="selVend('EVELYN MURO', 'd')">EVELYN MURO</div>
                    <div class="chip-v" onclick="selVend('JHAYRO MAURICIO', 'd')">JHAYRO MAURICIO</div>
                    <div class="chip-v" onclick="selVend('PAULA GARCIA', 'd')">PAULA GARCIA</div>
                    <div class="chip-v" onclick="setV('REGULO ANTEZA', 'd')">REGULO ANTEZA</div>
                </div>

                <div class="mt-4">
                    <span class="label-tech">Ingreso de Producto</span>
                    <input type="text" id="sku-d" class="input-titan" placeholder="SKU o Descripción">
                    <input type="number" id="qty-d" class="input-titan" placeholder="Cantidad de Unidades">
                    <button class="btn-action btn-accent" onclick="addToList('d')">Añadir Item <i class="fas fa-plus"></i></button>
                </div>

                <div id="list-d" class="mt-4"></div>
                <button id="sync-d" class="btn-action btn-success mt-3 d-none" onclick="syncProcess('d')">Sincronizar Entrega <i class="fas fa-check-circle"></i></button>
            </div>
        </section>

        <section id="v-ret" class="view">
            <div class="card-modern">
                <span class="label-tech">Auditoría de Devolución</span>
                <input type="text" id="cli-r" class="input-titan" placeholder="Origen del Retorno" oninput="persistState()">
                
                <span class="label-tech">Producto en Inspección</span>
                <input type="text" id="sku-r" class="input-titan" placeholder="SKU del Producto">
                
                <div class="row g-2">
                    <div class="col-6">
                        <span class="label-tech">Cant. Guía</span>
                        <input type="number" id="qg-r" class="input-titan" placeholder="0">
                    </div>
                    <div class="col-6">
                        <span class="label-tech">Cant. Real</span>
                        <input type="number" id="qr-r" class="input-titan" placeholder="0">
                    </div>
                </div>

                <span class="label-tech">Estado de Revisión</span>
                <select id="st-r" class="input-titan">
                    <option value="ESTADO ÓPTIMO">ESTADO ÓPTIMO</option>
                    <option value="FALLA DE FÁBRICA">FALLA DE FÁBRICA</option>
                    <option value="MERMA / DAÑADO">MERMA / DAÑADO</option>
                    <option value="EMPAQUE DAÑADO">EMPAQUE DAÑADO</option>
                </select>

                <span class="label-tech"><i class="fas fa-pen"></i> Observaciones Detalladas</span>
                <textarea id="obs-r" class="input-titan" style="height: 100px;" placeholder="Escribe aquí los detalles encontrados..."></textarea>
                
                <button class="btn-action btn-danger" onclick="addToList('r')">Validar e Incluir <i class="fas fa-shield-alt"></i></button>

                <div id="list-r" class="mt-4"></div>
                <button id="sync-r" class="btn-action btn-success mt-3 d-none" onclick="syncProcess('r')">Confirmar Retorno <i class="fas fa-save"></i></button>
            </div>
        </section>

        <section id="v-his" class="view">
            <div class="px-3 py-2" id="his-feed"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-link-t active" onclick="switchTab('del', this)"><i class="fas fa-truck-loading"></i><span>ENTREGA</span></button>
        <button class="nav-link-t" onclick="switchTab('ret', this)"><i class="fas fa-exchange-alt"></i><span>DEVOLUCIÓN</span></button>
        <button class="nav-link-t" onclick="switchTab('his', this)"><i class="fas fa-clipboard-list"></i><span>HISTORIAL</span></button>
    </nav>

    <script>
        let session = { d: [], r: [], vendorD: '', vendorR: '' };

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('TITAN_PRIME_DATA'));
            if(saved) {
                session = saved;
                document.getElementById('cli-d').value = session.clientD || '';
                document.getElementById('cli-r').value = session.clientR || '';
                if(session.vendorD) selVend(session.vendorD, 'd');
                renderList('d'); renderList('r');
            }
        };

        function selVend(v, type) {
            session[`vendor${type.toUpperCase()}`] = v;
            document.querySelectorAll(`#vend-${type} .chip-v`).forEach(c => c.classList.toggle('active', c.innerText === v));
            persistState();
        }

        function persistState() {
            session.clientD = document.getElementById('cli-d').value;
            session.clientR = document.getElementById('cli-r').value;
            localStorage.setItem('TITAN_PRIME_DATA', JSON.stringify(session));
        }

        function addToList(type) {
            if(type === 'd') {
                const sku = document.getElementById('sku-d').value;
                const qty = document.getElementById('qty-d').value;
                if(!sku || !qty) return;
                session.d.push({ sku, qty, time: new Date().toLocaleString() });
                document.getElementById('sku-d').value = ''; document.getElementById('qty-d').value = '';
            } else {
                const sku = document.getElementById('sku-r').value;
                const qg = document.getElementById('qg-r').value;
                const qr = document.getElementById('qr-r').value;
                if(!sku || !qg || !qr) return;
                session.r.push({ 
                    sku, qg, qr, 
                    st: document.getElementById('st-r').value, 
                    obs: document.getElementById('obs-r').value,
                    time: new Date().toLocaleString()
                });
                // Limpiar campos de item pero mantener cliente
                ['sku-r', 'qg-r', 'qr-r', 'obs-r'].forEach(id => document.getElementById(id).value = '');
            }
            renderList(type); persistState();
        }

        function renderList(t) {
            const container = document.getElementById(`list-${t}`);
            const btn = document.getElementById(`sync-${t}`);
            const data = session[t];
            btn.classList.toggle('d-none', data.length === 0);
            container.innerHTML = data.map((item, idx) => `
                <div class="item-row">
                    <div><b>${item.sku}</b><br><small>${t==='d' ? 'Cant: '+item.qty : 'Guía: '+item.qg+' | Real: '+item.qr}</small></div>
                    <i class="fas fa-trash text-danger" onclick="removeItem('${t}', ${idx})"></i>
                </div>
            `).join('');
        }

        function removeItem(t, idx) { session[t].splice(idx, 1); renderList(t); persistState(); }

        function syncProcess(t) {
            Swal.fire({title: 'Sincronizando...', didOpen: () => Swal.showLoading(), background: '#1E293B', color: '#fff'});
            setTimeout(() => {
                const history = JSON.parse(localStorage.getItem('TITAN_HISTORY') || '[]');
                const client = document.getElementById(`cli-${t}`).value;
                const vendor = session[`vendor${t.toUpperCase()}`];
                
                session[t].forEach(i => history.unshift({...i, client, vendor, type: t==='d'?'ENTREGA':'DEVOLUCIÓN'}));
                localStorage.setItem('TITAN_HISTORY', JSON.stringify(history));
                
                session[t] = [];
                if(t==='d') document.getElementById('cli-d').value = ''; else document.getElementById('cli-r').value = '';
                persistState();
                Swal.fire('Completado', 'Registro almacenado en historial', 'success').then(() => location.reload());
            }, 1000);
        }

        function switchTab(v, el) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active-view'));
            document.querySelectorAll('.nav-link-t').forEach(x => x.classList.remove('active'));
            document.getElementById('v-'+v).classList.add('active-view');
            el.classList.add('active');
            if(v === 'his') loadHistory();
        }

        function loadHistory() {
            const h = JSON.parse(localStorage.getItem('TITAN_HISTORY') || '[]');
            document.getElementById('his-feed').innerHTML = h.map((r, idx) => `
                <div class="item-row" onclick="showOptions(${idx})">
                    <div>
                        <span class="badge ${r.type==='ENTREGA'?'bg-info':'bg-danger'}" style="font-size:9px">${r.type}</span>
                        <div class="fw-bold">${r.client}</div>
                        <small class="text-muted">${r.sku} • ${r.vendor || 'S/V'}</small>
                    </div>
                    <div class="text-end">
                        <b class="fs-5">${r.qty || r.qr}</b><br>
                        <small style="font-size:9px">${r.time.split(',')[0]}</small>
                    </div>
                </div>
            `).join('');
        }

        function showOptions(idx) {
            const r = JSON.parse(localStorage.getItem('TITAN_HISTORY'))[idx];
            Swal.fire({
                title: 'Reporte de Movimiento',
                text: `Generar PDF y enviar a ${r.vendor || 'vendedor'}`,
                showCancelButton: true,
                confirmButtonText: 'WhatsApp + PDF',
                confirmButtonColor: '#22C55E',
                background: '#1E293B', color: '#fff'
            }).then(res => { if(res.isConfirmed) generatePDF(r); });
        }

        function generatePDF(r) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Estética de Reporte
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(20); doc.text("TITAN PRIME LOGISTICS", 105, 20, {align: 'center'});
            doc.setFontSize(10); doc.text(`REPORTE OFICIAL DE ${r.type}`, 105, 30, {align: 'center'});
            
            const body = r.type === 'ENTREGA' ? 
                [['CLIENTE', r.client], ['VENDEDOR', r.vendor], ['PRODUCTO', r.sku], ['CANTIDAD', r.qty], ['FECHA', r.time]] :
                [['CLIENTE', r.client], ['PRODUCTO', r.sku], ['CANT. GUÍA', r.qg], ['CANT. REAL', r.qr], ['ESTADO QC', r.st], ['OBSERVACIÓN', r.obs], ['FECHA', r.time]];

            doc.autoTable({
                startY: 50,
                head: [['CONCEPTO', 'DESCRIPCIÓN']],
                body: body,
                theme: 'striped',
                headStyles: { fillColor: [56, 189, 248] }
            });

            // Pie de página autorizado por J. Angelo
            const pY = doc.internal.pageSize.height;
            const pW = doc.internal.pageSize.width;
            doc.setTextColor(100); doc.setFontSize(9);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", pW/2, pY - 15, {align: 'center'});
            
            doc.save(`TITAN_${r.client}.pdf`);
            
            const msg = `Hola, envío reporte de *${r.type}*.\nCliente: ${r.client}\nProducto: ${r.sku}\nEstado: ${r.st || 'Entregado'}\n_Revisión autorizada por J. Angelo._`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
