<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA LOGÍSTICO - ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #000000; --success: #10b981; --border: #e5e7eb; --accent: #2563eb; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #111827; margin: 0; padding: 0; }
        
        /* Header Corporativo */
        .header { padding: 25px 20px; border-bottom: 2px solid var(--primary); background: #fff; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 1.4rem; margin: 0; font-weight: 900; letter-spacing: -1px; }
        .header p { font-size: 0.7rem; color: #6b7280; margin: 5px 0 0; text-transform: uppercase; font-weight: 700; }
        
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        /* Sincronización con IA */
        .sync-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .sync-card h3 { font-size: 0.8rem; margin: 0 0 10px 0; color: var(--primary); font-weight: 800; }
        .sync-input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-family: monospace; font-size: 0.75rem; margin-bottom: 10px; box-sizing: border-box; }
        
        /* Tarjetas de Producto */
        .item-card { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .item-card.exacto { border: 2px solid var(--success); background: #f0fdf4; }
        
        .sku-info { flex: 1; }
        .sku-title { font-weight: 800; font-size: 1.1rem; display: block; }
        .sku-status { font-size: 0.65rem; font-weight: 700; margin-top: 4px; display: block; }

        .counter { display: flex; align-items: center; gap: 15px; }
        .qty-box { text-align: center; }
        .qty-label { font-size: 0.6rem; color: #94a3b8; font-weight: 800; display: block; text-transform: uppercase; }
        .qty-num { font-size: 1.2rem; font-weight: 900; }

        .btn-plus { background: #f1f5f9; border: none; width: 48px; height: 48px; border-radius: 14px; font-size: 1.6rem; font-weight: 900; cursor: pointer; color: var(--primary); }
        .btn-plus:active { background: #e2e8f0; transform: scale(0.9); }

        /* Pie de página y Reporte */
        .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: #fff; border-top: 1px solid var(--border); box-shadow: 0 -10px 20px rgba(0,0,0,0.05); }
        .btn-report { background: var(--primary); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 14px; font-weight: 800; font-size: 0.9rem; cursor: pointer; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>INBOUND BOX-CONTROL</h1>
    <p>Revisión Autorizada: J. Angelo Nuñez Durand</p>
</div>

<div class="container">
    <div class="sync-card" id="sync-zone">
        <h3>1. PEGAR CÓDIGO DEL PACKING (JSON)</h3>
        <textarea id="data-input" class="sync-input" rows="4" placeholder="Pega el código generado por la IA aquí..."></textarea>
        <button onclick="cargarData()" style="background:var(--primary); color:white; border:none; width:100%; padding:14px; border-radius:10px; font-weight:800; cursor:pointer;">INICIAR CONTEO DE CONTENEDOR</button>
    </div>

    <div id="lista-items">
        <p style="text-align: center; color: #94a3b8; font-size: 0.85rem; margin-top: 50px;">
            Sube la foto del packing al chat, copia el código y pégalo arriba para empezar.
        </p>
    </div>
    
    <div style="height: 120px;"></div>
</div>

<div class="footer hidden" id="footer-actions">
    <button class="btn-report" onclick="generarReporte()">FINALIZAR Y CREAR REPORTE PDF</button>
</div>

<script>
    let items = [];

    // Función para cargar los datos procesados por la IA
    function cargarData() {
        const input = document.getElementById('data-input').value;
        try {
            items = JSON.parse(input);
            document.getElementById('sync-zone').classList.add('hidden');
            document.getElementById('footer-actions').classList.remove('hidden');
            render();
        } catch (e) {
            alert("Error: El código no es válido. Asegúrate de copiar todo el bloque JSON.");
        }
    }

    // Función para sumar por cajas
    function sumar(index) {
        const item = items[index];
        const cantCajas = prompt(`¿Cuántas CAJAS de ${item.sku} ingresan?\n(Capacidad: ${item.u_por_caja} und/caja)`, "1");
        
        if (cantCajas !== null && cantCajas !== "") {
            const bultos = parseFloat(cantCajas);
            if (!isNaN(bultos)) {
                items[index].fisico += (bultos * item.u_por_caja);
                render();
            }
        }
    }

    // Renderizado de la lista
    function render() {
        const container = document.getElementById('lista-items');
        container.innerHTML = "";
        
        items.forEach((item, index) => {
            const esExacto = item.fisico === item.pck;
            const cajasFisicas = item.fisico / item.u_por_caja;
            const faltanteCajas = (item.pck - item.fisico) / item.u_por_caja;
            
            container.innerHTML += `
                <div class="item-card ${esExacto ? 'exacto' : ''}">
                    <div class="sku-info">
                        <span class="sku-title">${item.sku}</span>
                        <span class="sku-status" style="color:${esExacto ? 'var(--success)' : '#f59e0b'}">
                            ${esExacto ? '✓ EXACTO' : `Faltan ${faltanteCajas.toFixed(1)} cajas`}
                        </span>
                    </div>
                    <div class="counter">
                        <div class="qty-box">
                            <span class="qty-label">CJ PCK</span>
                            <div class="qty-num" style="color:#94a3b8">${item.cajas_pck}</div>
                        </div>
                        <div class="qty-box">
                            <span class="qty-label">CJ FIS</span>
                            <div class="qty-num">${cajasFisicas}</div>
                        </div>
                        <button class="btn-plus" onclick="sumar(${index})">+</button>
                    </div>
                </div>
            `;
        });
    }

    // Generación del Reporte PDF
    function generarReporte() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Encabezado del PDF
        doc.setFillColor(0, 0, 0);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(20).setFont(undefined, 'bold').text("REPORTE DE INBOUND", 15, 25);
        
        doc.setTextColor(0, 0, 0);
        doc.setFontSize(10).setFont(undefined, 'normal').text(`Fecha de Emisión: ${new Date().toLocaleString()}`, 15, 50);

        const tableData = items.map(i => [
            i.sku, 
            i.u_por_caja,
            i.pck, 
            i.fisico, 
            i.fisico === i.pck ? "EXACTO" : (i.fisico - i.pck)
        ]);

        doc.autoTable({
            startY: 55,
            head: [['SKU', 'UND/CJ', 'TOT. PACKING', 'TOT. CONTEO', 'ESTADO/DIF']],
            body: tableData,
            theme: 'grid',
            headStyles: { fillColor: [0, 0, 0], fontSize: 9 },
            styles: { fontSize: 8 },
            columnStyles: { 4: { fontStyle: 'bold' } }
        });

        const finalY = doc.lastAutoTable.finalY + 35;
        
        // Firma Autorizada
        doc.line(15, finalY, 80, finalY);
        doc.setFontSize(10).setFont(undefined, 'bold').text("J. Angelo Nuñez Durand", 15, finalY + 7);
        doc.setFont(undefined, 'normal').text("Asist. Inventario Logístico", 15, finalY + 12);
        
        doc.text("Revisión autorizada y conforme.", 15, finalY + 22);

        doc.save(`Inbound_Angelo_${new Date().getTime()}.pdf`);
    }
</script>
</body>
</html>
