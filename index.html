<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v29</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; }
        .card-main { background: white; border-radius: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .input-qty { background: #f1f5f9; border-radius: 12px; border: 2px solid transparent; text-align: center; font-weight: 800; transition: 0.2s; }
        .input-qty:focus { border-color: #2563eb; background: white; outline: none; }
        .btn-plus { background: #2563eb; color: white; border-radius: 12px; transition: 0.2s; font-weight: 800; }
        .btn-plus:active { transform: scale(0.9); }
        .tab-panel { display: none; }
        .active { display: block; }
        #side-menu { position: fixed; top: 0; left: -100%; width: 80%; height: 100%; background: white; z-index: 1000; transition: 0.3s; }
        .menu-open { left: 0 !important; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 900; display: none; backdrop-filter: blur(2px); }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleMenu()"></div>
    <nav id="side-menu" class="p-8">
        <h2 class="text-2xl font-black italic mb-8 text-blue-600">TAJHO.OS</h2>
        <div class="space-y-6">
            <button onclick="navTo('contenedor')" class="block font-bold text-slate-600">📦 Carga Contenedor</button>
            <button onclick="navTo('devoluciones')" class="block font-bold text-slate-600">🔄 Devoluciones</button>
            <button onclick="navTo('historial')" class="block font-bold text-slate-600">📂 Historial</button>
        </div>
    </nav>

    <header class="p-4 flex justify-between items-center bg-white sticky top-0 z-50">
        <button onclick="toggleMenu()" class="p-2 text-slate-600">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="text-center">
            <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Almacén</p>
            <h1 class="text-xs font-black italic">TAJHO<span class="text-blue-600">.OS</span></h1>
        </div>
        <div class="w-10 text-[9px] font-bold text-blue-600" id="clock">00:00</div>
    </header>

    <main class="p-4">
        <section id="view-contenedor" class="tab-panel active space-y-4">
            <div id="status-card" class="hidden bg-[#0f172a] p-5 rounded-[2rem] text-white">
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-[9px] font-bold text-blue-400 uppercase">Progreso</p>
                        <h2 id="perc-val" class="text-3xl font-black italic leading-none">0%</h2>
                    </div>
                    <div class="text-right">
                        <p id="unit-count" class="text-[10px] font-bold">0 / 0 UND</p>
                    </div>
                </div>
                <div class="h-1 w-full bg-white/10 rounded-full mt-3 overflow-hidden">
                    <div id="perc-bar" class="h-full bg-blue-500 transition-all" style="width: 0%"></div>
                </div>
            </div>

            <div id="input-card" class="hidden card-main p-5 border border-slate-100">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <select id="sel-sku" onchange="updateItemInfo()" class="text-xl font-black bg-transparent outline-none text-slate-900"></select>
                        <p id="item-desc" class="text-[9px] font-bold text-blue-500 uppercase"></p>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] font-black text-slate-400 uppercase">Restante</p>
                        <p id="item-rem" class="text-lg font-black text-slate-900">0</p>
                    </div>
                </div>

                <div class="flex gap-2 items-center justify-center">
                    <input type="number" id="qty-add" class="input-qty w-24 h-12 text-xl" placeholder="Cant." inputmode="numeric">
                    <button onclick="doSum()" class="btn-plus w-12 h-12 text-2xl flex items-center justify-center shadow-lg shadow-blue-100">+</button>
                </div>
                
                <button onclick="finishAndSave()" class="w-full mt-4 py-2 text-[8px] font-black text-slate-300 uppercase tracking-widest">Finalizar Despacho</button>
            </div>

            <div id="setup-card" class="card-main p-6 space-y-3">
                <div class="flex justify-between items-center">
                    <h3 class="text-[10px] font-black uppercase text-slate-400">Nuevo Manifiesto</h3>
                    <button onclick="document.getElementById('xl-file').click()" class="text-[9px] font-bold text-blue-600 underline">Vincular Base Datos</button>
                    <input type="file" id="xl-file" class="hidden" onchange="loadXL(event)">
                </div>
                <input type="text" id="in-sku" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" placeholder="CÓDIGO (SKU)">
                <input type="text" id="in-desc" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" placeholder="DESCRIPCIÓN">
                <input type="number" id="in-meta" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" placeholder="META UNIDADES">
                <button onclick="addToList()" class="w-full bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black uppercase">Agregar Item</button>
                <div id="pre-list" class="space-y-2 mt-4"></div>
                <button id="btn-init" onclick="startLoading()" class="hidden w-full bg-blue-600 text-white py-4 rounded-xl text-[11px] font-black uppercase shadow-lg shadow-blue-200">Iniciar Carga</button>
            </div>
        </section>

        <section id="view-devoluciones" class="tab-panel space-y-4">
            <div class="card-main p-6 space-y-3">
                <h3 class="text-[10px] font-black uppercase text-slate-400">Registrar Devolución</h3>
                <input type="text" id="ret-cli" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" placeholder="CLIENTE / VENDEDOR">
                <input type="text" id="ret-sku" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" placeholder="SKU">
                <input type="number" id="ret-qty" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" placeholder="CANTIDAD">
                <textarea id="ret-obs" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold h-20" placeholder="OBSERVACIONES"></textarea>
                <button onclick="saveRet()" class="w-full bg-orange-500 text-white py-3 rounded-xl text-[10px] font-black uppercase">Guardar Retorno</button>
            </div>
        </section>

        <section id="view-historial" class="tab-panel space-y-3">
            <div id="hist-list" class="space-y-3"></div>
        </section>
    </main>

    <script>
        let db_desc = {}, manifest = [], time = 0, timer;

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('menu-open');
            const ov = document.getElementById('overlay');
            ov.style.display = (ov.style.display === 'block') ? 'none' : 'block';
        }

        function navTo(v) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            toggleMenu();
            if(v === 'historial') showHist();
        }

        function loadXL(e) {
            const reader = new FileReader();
            reader.onload = (f) => {
                const wb = XLSX.read(new Uint8Array(f.target.result), {type: 'array'});
                XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]).forEach(r => {
                    db_desc[String(r.CODIGO || r.codigo).toUpperCase()] = r.DESCRIPCION || r.descripcion;
                });
                alert("Base de datos cargada.");
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        }

        function addToList() {
            const sku = document.getElementById('in-sku').value.toUpperCase().trim();
            const desc = document.getElementById('in-desc').value.toUpperCase() || db_desc[sku] || "SIN DESCRIPCIÓN";
            const meta = parseInt(document.getElementById('in-meta').value);
            if(!sku || !meta) return;
            manifest.push({ sku, desc, meta, real: 0 });
            document.getElementById('in-sku').value=''; document.getElementById('in-desc').value=''; document.getElementById('in-meta').value='';
            renderPre();
            document.getElementById('btn-init').classList.remove('hidden');
        }

        function renderPre() {
            document.getElementById('pre-list').innerHTML = manifest.map(i => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                    <div class="text-[9px] font-bold"><strong>${i.sku}</strong><br><span class="text-slate-400">${i.desc}</span></div>
                    <div class="text-[10px] font-black">${i.meta} UND</div>
                </div>
            `).join('');
        }

        function startLoading() {
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('status-card').classList.remove('hidden');
            document.getElementById('input-card').classList.remove('hidden');
            const sel = document.getElementById('sel-sku');
            sel.innerHTML = manifest.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            updateItemInfo();
            timer = setInterval(() => {
                time++;
                let m = Math.floor(time/60).toString().padStart(2,'0');
                let s = (time%60).toString().padStart(2,'0');
                document.getElementById('clock').innerText = `${m}:${s}`;
            }, 1000);
            refreshUI();
        }

        function updateItemInfo() {
            const item = manifest.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('item-desc').innerText = item.desc;
            document.getElementById('item-rem').innerText = item.meta - item.real;
        }

        function doSum() {
            const val = parseInt(document.getElementById('qty-add').value);
            if(!val) return;
            const item = manifest.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += val;
            document.getElementById('qty-add').value = '';
            refreshUI();
            updateItemInfo();
            navigator.vibrate(50);
        }

        function refreshUI() {
            const totalMeta = manifest.reduce((a, b) => a + b.meta, 0);
            const totalReal = manifest.reduce((a, b) => a + b.real, 0);
            const p = Math.round((totalReal / totalMeta) * 100) || 0;
            document.getElementById('perc-val').innerText = p + "%";
            document.getElementById('perc-bar').style.width = p + "%";
            document.getElementById('unit-count').innerText = `${totalReal} / ${totalMeta} UND`;
        }

        function saveRet() {
            const r = {
                cli: document.getElementById('ret-cli').value,
                sku: document.getElementById('ret-sku').value,
                qty: document.getElementById('ret-qty').value,
                fecha: new Date().toLocaleString()
            };
            let logs = JSON.parse(localStorage.getItem('tajho_v29_logs') || '[]');
            logs.unshift({...r, type: 'RETORNO'});
            localStorage.setItem('tajho_v29_logs', JSON.stringify(logs));
            alert("Devolución Guardada");
            location.reload();
        }

        function finishAndSave() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(16); doc.text("REPORTE DE CARGA TAJHO.OS", 14, 20);
            doc.autoTable({
                startY: 30,
                head: [['SKU', 'DESCRIPCION', 'META', 'REAL', 'DIFF']],
                body: manifest.map(i => [i.sku, i.desc, i.meta, i.real, i.meta - i.real])
            });
            doc.setFontSize(10);
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 15);
            
            let logs = JSON.parse(localStorage.getItem('tajho_v29_logs') || '[]');
            logs.unshift({id: Date.now(), fecha: new Date().toLocaleString(), type: 'CARGA'});
            localStorage.setItem('tajho_v29_logs', JSON.stringify(logs));
            
            doc.save(`TAJHO_REPORTE_${Date.now()}.pdf`);
            location.reload();
        }

        function showHist() {
            const logs = JSON.parse(localStorage.getItem('tajho_v29_logs') || '[]');
            document.getElementById('hist-list').innerHTML = logs.map(l => `
                <div class="card-main p-4 flex justify-between items-center ${l.type === 'RETORNO' ? 'border-l-4 border-orange-500' : ''}">
                    <div>
                        <p class="text-[7px] font-black text-slate-400">${l.fecha}</p>
                        <h4 class="text-xs font-black">${l.type}: ${l.sku || l.id}</h4>
                    </div>
                    <span class="text-[9px] font-black text-blue-600">VER</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
