<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA LOGÍSTICO | ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; padding: 15px; }
        .card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; }
        .status { font-size: 0.7rem; font-weight: bold; padding: 4px 10px; border-radius: 20px; float: right; }
        .online { background: #064e3b; color: #34d399; }
        .offline { background: #7f1d1d; color: #f87171; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: white; box-sizing: border-box; }
        .preview-box { background: #0f172a; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); margin: 10px 0; color: var(--accent); font-weight: bold; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-add { background: var(--accent); color: white; }
        .btn-pdf { background: transparent; border: 2px solid var(--success); color: var(--success); }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 15px; }
        th { text-align: left; color: #94a3b8; padding: 10px; border-bottom: 2px solid #334155; }
        td { padding: 10px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

<div class="card">
    <span id="conn-status" class="status offline">SINCRO OFF</span>
    <h2 style="margin:0; font-size: 1.1rem;">INBOUND: <span id="view-cont">---</span></h2>
    <input type="text" id="cont-id" placeholder="N° CONTENEDOR (Ej: 0116)" oninput="document.getElementById('view-cont').innerText = this.value">
</div>

<div class="card">
    <label style="font-size:0.7rem; font-weight:bold;">BUSCADOR MAESTRO</label>
    <input type="text" id="sku-search" placeholder="Escriba SKU o Nombre..." oninput="buscarProducto(this.value)">
    <div id="res-nombre" class="preview-box">Esperando entrada...</div>

    <div style="display: flex; gap: 10px;">
        <div style="flex:1"><label style="font-size:0.7rem;">PACKING</label><input type="number" id="q-pack" placeholder="Cantidad Foto"></div>
        <div style="flex:1"><label style="font-size:0.7rem;">FÍSICO</label><input type="number" id="q-fisico" placeholder="Conteo"></div>
    </div>
    <button class="btn btn-add" onclick="registrar()">+ REGISTRAR CONTEO</button>
</div>

<div class="card">
    <table id="tabla-conteo">
        <thead><tr><th>PRODUCTO</th><th>PK</th><th>FIS</th><th>DIF</th></tr></thead>
        <tbody id="lista-items"></tbody>
    </table>
    <button class="btn btn-pdf" onclick="generarReporte()">GENERAR REPORTE FINAL</button>
</div>

<script>
    // PEGA AQUÍ TU URL DE GOOGLE SCRIPTS
    const URL_API = "https://script.google.com/macros/s/AKfycbz2FWrNqYTWr2TZiD56WDidmjAg1Xkgx2Bkka6uG_xUGhtwMUAOhFiDIHBpxvKIAHmh/exec"; 
    
    let maestro = [];
    let items = {};
    let actual = null;

    window.onload = async () => {
        const s = document.getElementById('conn-status');
        try {
            const r = await fetch(URL_API);
            maestro = await r.json();
            s.innerText = "SINCRO ON";
            s.className = "status online";
        } catch (e) { s.innerText = "ERROR DE CONEXIÓN"; }
    };

    function buscarProducto(v) {
        v = v.trim().toUpperCase();
        if(v.length < 2) return;
        const p = maestro.find(x => x[0].includes(v) || x[1].includes(v));
        const res = document.getElementById('res-nombre');
        if(p) {
            actual = { sku: p[0], nombre: p[1] };
            res.innerText = `📦 ${p[1]}`;
            res.style.color = "var(--accent)";
        } else {
            actual = null;
            res.innerText = "PRODUCTO NO ENCONTRADO";
            res.style.color = "var(--danger)";
        }
    }

    function registrar() {
        const pk = parseInt(document.getElementById('q-pack').value) || 0;
        const fs = parseInt(document.getElementById('q-fisico').value) || 0;
        const cont = document.getElementById('cont-id').value;

        if(!actual || fs === 0 || !cont) return alert("Complete todos los campos");

        if(!items[actual.sku]) items[actual.sku] = { nombre: actual.nombre, p: pk, f: 0 };
        items[actual.sku].f += fs;
        if(pk > 0) items[actual.sku].p = pk;

        // Sincronización en segundo plano al Historial
        fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ contenedor: cont, sku: actual.sku, cantidad: fs }) });

        actualizarTabla();
        document.getElementById('sku-search').value = "";
        document.getElementById('q-fisico').value = "";
        document.getElementById('sku-search').focus();
    }

    function actualizarTabla() {
        const b = document.getElementById('lista-items');
        b.innerHTML = "";
        for(let s in items) {
            const i = items[s];
            const d = i.f - i.p;
            b.innerHTML += `<tr>
                <td><b>${s}</b><br><small>${i.nombre}</small></td>
                <td>${i.p}</td><td>${i.f}</td>
                <td style="color:${d === 0 ? 'var(--success)' : 'var(--danger)'}">${d}</td>
            </tr>`;
        }
    }

    function generarReporte() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const n = document.getElementById('cont-id').value;

        doc.setFontSize(18).text("REPORTE DE INGRESO LOGÍSTICO", 105, 20, {align:'center'});
        doc.setFontSize(10).text("CONTENEDOR: " + n + " | FECHA: " + new Date().toLocaleString(), 105, 28, {align:'center'});

        const rows = Object.keys(items).map(s => [s, items[s].nombre, items[s].p, items[s].f, items[s].f - items[s].p]);

        doc.autoTable({
            startY: 35,
            head: [['CÓDIGO', 'DESCRIPCIÓN', 'PACKING', 'FÍSICO', 'DIFERENCIA']],
            body: rows,
            theme: 'grid',
            headStyles: { fillColor: [15, 23, 42] }
        });

        const y = doc.lastAutoTable.finalY + 30;
        doc.text("Recepción autorizada por:", 105, y, {align:'center'});
        doc.setFont(undefined, 'bold').text("J. Angelo Nuñez Durand", 105, y + 8, {align:'center'});
        doc.setFont(undefined, 'normal').text("Asist. Inventario Logístico", 105, y + 14, {align:'center'});
        doc.save(`Ingreso_${n}.pdf`);
    }
</script>
</body>
</html>
