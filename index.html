<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v18 - Smart Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2563eb; --bg: #0f172a; } /* Modo Oscuro Profundo para Máxima Modernidad */
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Neumorfismo Oscuro */
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; }
        .input-dark { background: rgba(15, 23, 42, 0.8); border-radius: 1.2rem; border: 1px solid rgba(255,255,255,0.1); color: white; transition: all 0.3s; }
        .input-dark:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(37, 99, 235, 0.2); outline: none; }

        .viewport { flex: 1; overflow-y: auto; padding: 1.5rem; padding-bottom: 120px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .progress-glow { box-shadow: 0 0 15px rgba(37, 99, 235, 0.5); }
    </style>
</head>
<body>

    <header class="px-6 pt-6 pb-2 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black tracking-tighter italic">TAJHO<span class="text-blue-500">.OS</span></h1>
            <p id="status-db" class="text-[7px] font-bold text-red-500 uppercase tracking-[0.2em]">Offline Database</p>
        </div>
        <input type="file" id="excel-input" class="hidden" accept=".xlsx, .xls" onchange="loadDatabase(event)">
        <button onclick="document.getElementById('excel-input').click()" class="bg-blue-600/10 text-blue-400 border border-blue-500/30 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Cargar Excel</button>
    </header>

    <main class="viewport no-scrollbar space-y-4">
        
        <div id="stats-area" class="hidden">
            <div class="glass-panel p-5 border-l-4 border-l-blue-500">
                <div class="flex justify-between items-end mb-3">
                    <h2 id="global-perc" class="text-4xl font-black leading-none">0%</h2>
                    <div class="text-right">
                        <p id="timer-val" class="text-xs font-mono text-blue-400">00:00:00</p>
                        <p id="global-counter" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">0 / 0 Unidades</p>
                    </div>
                </div>
                <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                    <div id="global-bar" class="h-full bg-blue-500 progress-glow duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <section id="main-section" class="space-y-4">
            
            <div id="config-card" class="glass-panel p-6 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-slate-500 ml-2 uppercase">Código SKU</label>
                        <input type="text" id="in-cod" class="input-dark w-full p-4 text-xs text-center uppercase" placeholder="---">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-slate-500 ml-2 uppercase">Cant. Plan</label>
                        <input type="number" id="in-meta" class="input-dark w-full p-4 text-xs text-center" placeholder="0">
                    </div>
                </div>
                <button onclick="addPackingItem()" class="w-full py-4 bg-white text-slate-900 rounded-2xl font-black text-[10px] uppercase tracking-widest">Agregar al Plan</button>
                <div id="mini-list" class="space-y-2 max-h-40 overflow-y-auto no-scrollbar"></div>
                <button id="btn-start" onclick="startOperations()" class="hidden w-full bg-blue-600 py-5 rounded-2xl font-black text-[10px] uppercase tracking-[0.3em] shadow-lg shadow-blue-900/40">Iniciar Operación</button>
            </div>

            <div id="ops-panel" class="hidden space-y-3">
                <div class="glass-panel p-6">
                    <div class="flex flex-col items-center mb-4">
                        <select id="op-select" onchange="syncDesc()" class="bg-transparent text-xl font-black outline-none text-center w-full mb-1"></select>
                        <p id="op-desc" class="text-[9px] font-bold text-blue-400 text-center uppercase tracking-tight opacity-80">Esperando Selección...</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="number" id="op-input" class="input-dark flex-1 p-5 text-4xl font-black text-center" placeholder="0">
                        <button onclick="submitCount()" class="bg-blue-600 h-16 w-16 rounded-2xl flex items-center justify-center text-2xl shadow-lg active:scale-90 transition-transform">✓</button>
                    </div>
                </div>
                <div id="items-grid" class="space-y-2"></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 w-full h-24 bg-slate-900/80 backdrop-blur-xl border-t border-white/5 flex justify-around items-center px-10">
        <button onclick="location.reload()" class="flex flex-col items-center opacity-100">
            <span class="text-2xl mb-1">📦</span>
            <span class="text-[8px] font-black uppercase">Carga</span>
        </button>
        <button onclick="closeReport()" class="flex flex-col items-center opacity-40">
            <span class="text-2xl mb-1">💾</span>
            <span class="text-[8px] font-black uppercase">Guardar</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;
        let db = {}; // Base de datos del Excel
        let pList = [];
        let sec = 0, timer;

        function loadDatabase(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet);
                
                // Mapear el Excel: Buscamos columnas "CODIGO" y "DESCRIPCION"
                json.forEach(row => {
                    const code = String(row.CODIGO || row.codigo || row.Codigo).toUpperCase().trim();
                    const desc = row.DESCRIPCION || row.descripcion || row.Descripcion || "SIN DESCRIPCIÓN";
                    db[code] = desc;
                });
                document.getElementById('status-db').innerText = "Database Online";
                document.getElementById('status-db').className = "text-[7px] font-bold text-green-500 uppercase tracking-[0.2em]";
                alert("Excel Cargado: " + Object.keys(db).length + " productos vinculados.");
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        }

        function addPackingItem() {
            const cod = document.getElementById('in-cod').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('in-meta').value);
            if(!cod || !meta) return;
            
            // Aquí entra la inteligencia: Busca en la DB si existe el código
            const desc = db[cod] || "NUEVO PRODUCTO (Sin Excel)";
            pList.push({ cod, desc, meta, real: 0 });
            
            renderMiniList();
            document.getElementById('in-cod').value = "";
            document.getElementById('in-meta').value = "";
            document.getElementById('btn-start').classList.remove('hidden');
        }

        function renderMiniList() {
            const cont = document.getElementById('mini-list');
            cont.innerHTML = pList.map(p => `
                <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-xl border border-white/5">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black text-white">${p.cod}</span>
                        <span class="text-[7px] font-bold text-slate-500 uppercase">${p.desc.substring(0,35)}...</span>
                    </div>
                    <span class="text-[10px] font-black text-blue-500">${p.meta}</span>
                </div>
            `).join('');
        }

        function startOperations() {
            document.getElementById('config-card').classList.add('hidden');
            document.getElementById('stats-area').classList.remove('hidden');
            document.getElementById('ops-panel').classList.remove('hidden');
            const sel = document.getElementById('op-select');
            sel.innerHTML = pList.map(p => `<option value="${p.cod}">${p.cod}</option>`).join('');
            syncDesc();
            timer = setInterval(() => {
                sec++;
                const h = Math.floor(sec/3600).toString().padStart(2,'0');
                const m = Math.floor((sec%3600)/60).toString().padStart(2,'0');
                const s = (sec%60).toString().padStart(2,'0');
                document.getElementById('timer-val').innerText = `${h}:${m}:${s}`;
            }, 1000);
            updateView();
        }

        function syncDesc() {
            const cod = document.getElementById('op-select').value;
            const item = pList.find(p => p.cod === cod);
            document.getElementById('op-desc').innerText = item.desc;
        }

        function submitCount() {
            const cod = document.getElementById('op-select').value;
            const val = parseInt(document.getElementById('op-input').value);
            if(!val) return;
            const item = pList.find(p => p.cod === cod);
            item.real += val;
            document.getElementById('op-input').value = "";
            updateView();
            navigator.vibrate(50);
        }

        function updateView() {
            const tPlan = pList.reduce((a,b) => a + b.meta, 0);
            const tReal = pList.reduce((a,b) => a + b.real, 0);
            const perc = Math.round((tReal / tPlan) * 100) || 0;
            document.getElementById('global-perc').innerText = perc + "%";
            document.getElementById('global-bar').style.width = Math.min(perc, 100) + "%";
            document.getElementById('global-counter').innerText = `${tReal} / ${tPlan} Unidades`;
            
            document.getElementById('items-grid').innerHTML = pList.map(p => `
                <div class="glass-panel p-4 flex flex-col gap-2 border-l-2 ${p.real >= p.meta ? 'border-l-green-500' : 'border-l-blue-500'}">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <p class="text-[10px] font-black">${p.cod}</p>
                            <p class="text-[7px] font-bold text-slate-500 uppercase leading-none">${p.desc}</p>
                        </div>
                        <p class="text-[10px] font-black text-blue-400 font-mono">${p.real}/${p.meta}</p>
                    </div>
                </div>
            `).join('');
        }

        function closeReport() {
            const doc = new jsPDF();
            doc.setFontSize(20); doc.text("REPORTE TAJHO.OS v18", 14, 20);
            doc.autoTable({ startY: 30, head: [['COD', 'DESC', 'PLAN', 'REAL']], body: pList.map(i => [i.cod, i.desc, i.meta, i.real]) });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 20);
            doc.save(`Reporte_Tajho_${new Date().getTime()}.pdf`);
        }
    </script>
</body>
</html>
