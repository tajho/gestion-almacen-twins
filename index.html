<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TWINS Logística v24</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2563eb; --dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: var(--dark); margin: 0; overflow-x: hidden; }
        
        /* Pantalla de Inicio Estilo Apple */
        #landing-page { position: fixed; inset: 0; z-index: 500; background: white; display: flex; flex-direction: column; justify-content: center; padding: 2rem; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-landing { transform: translateY(-100%); pointer-events: none; }

        .choice-card { background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 2rem; transition: all 0.3s; cursor: pointer; }
        .choice-card:active { transform: scale(0.95); background: var(--dark); color: white; }

        /* Navegación Superior Fina */
        .top-nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #f1f5f9; }
        .nav-link { font-size: 7px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; padding: 12px 4px; border-bottom: 2px solid transparent; transition: all 0.3s; }
        .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .input-twins { background: #f1f5f9; border-radius: 1.2rem; border: 1.5px solid transparent; transition: all 0.2s; font-weight: 700; }
        .input-twins:focus { border-color: var(--accent); background: white; outline: none; }
    </style>
</head>
<body>

    <div id="landing-page">
        <header class="mb-12">
            <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.4em] mb-2">Twins Logística</p>
            <h1 class="text-4xl font-[800] tracking-tighter leading-none text-slate-900">¿Qué hacemos<br>hoy?</h1>
        </header>

        <div class="space-y-3">
            <button onclick="enterApp('contenedor')" class="choice-card w-full p-6 flex items-center gap-6">
                <span class="text-3xl">📦</span>
                <div class="text-left">
                    <p class="text-xs font-black uppercase tracking-widest">Contenedor</p>
                    <p class="text-[9px] font-bold text-slate-400">GESTIÓN DE CARGA Y DESPACHO</p>
                </div>
            </button>
            <button onclick="enterApp('historial')" class="choice-card w-full p-6 flex items-center gap-6">
                <span class="text-3xl">📂</span>
                <div class="text-left">
                    <p class="text-xs font-black uppercase tracking-widest">Historial</p>
                    <p class="text-[9px] font-bold text-slate-400">ARCHIVOS Y REPORTES PDF</p>
                </div>
            </button>
            <button onclick="enterApp('retornos')" class="choice-card w-full p-6 flex items-center gap-6">
                <span class="text-3xl">🔄</span>
                <div class="text-left">
                    <p class="text-xs font-black uppercase tracking-widest">Retornos</p>
                    <p class="text-[9px] font-bold text-slate-400">DEVOLUCIONES Y MERMAS</p>
                </div>
            </button>
        </div>
    </div>

    <div id="work-zone" class="opacity-0 transition-opacity duration-500">
        
        <nav class="top-nav px-6 flex justify-between items-center">
            <div class="flex gap-4">
                <button onclick="switchTab('contenedor')" id="link-contenedor" class="nav-link active">Contenedor</button>
                <button onclick="switchTab('historial')" id="link-historial" class="nav-link">Historial</button>
                <button onclick="switchTab('retornos')" id="link-retornos" class="nav-link">Retornos</button>
            </div>
            <button onclick="location.reload()" class="text-[18px]">🏠</button>
        </nav>

        <div id="sticky-progress" class="hidden px-6 py-3 border-b border-slate-50 bg-white/50 backdrop-blur-sm sticky top-[45px] z-[90]">
            <div class="flex justify-between items-end mb-1">
                <span id="txt-perc" class="text-xl font-black italic text-blue-600 leading-none">0%</span>
                <span id="txt-timer" class="text-[9px] font-mono font-bold text-slate-400 uppercase tracking-widest">00:00:00</span>
            </div>
            <div class="h-1 w-full bg-slate-100 rounded-full overflow-hidden">
                <div id="bar-fill" class="h-full bg-blue-600 transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <main class="p-6">
            <section id="tab-contenedor" class="tab-content active">
                <div id="view-setup" class="space-y-4">
                    <div class="flex justify-between items-center">
                        <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Configurar Manifiesto</h2>
                        <button onclick="document.getElementById('xl').click()" class="text-[8px] font-bold text-blue-500 underline uppercase">Subir Excel</button>
                        <input type="file" id="xl" class="hidden" accept=".xlsx, .xls" onchange="readExcel(event)">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="sku" class="input-twins w-full p-4 text-xs uppercase" placeholder="SKU">
                        <input type="number" id="meta" class="input-twins w-full p-4 text-xs uppercase" placeholder="META">
                    </div>
                    <button onclick="add()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] shadow-xl shadow-slate-200">Añadir SKU</button>
                    <div id="pre-list" class="space-y-2"></div>
                    <button id="btn-run" onclick="start()" class="hidden w-full bg-blue-600 text-white py-5 rounded-[1.8rem] font-black text-[10px] uppercase tracking-[0.3em] shadow-2xl shadow-blue-100">Abrir Despacho</button>
                </div>

                <div id="view-ops" class="hidden space-y-4">
                    <div class="bg-white border border-slate-200 rounded-3xl p-4 shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="flex-1 min-w-0">
                                <select id="sel" onchange="sync()" class="w-full bg-transparent font-black text-xl outline-none truncate"></select>
                                <p id="desc-ui" class="text-[8px] font-bold text-blue-500 uppercase truncate">---</p>
                            </div>
                            <input type="number" id="qty-add" placeholder="0" class="input-twins w-16 p-4 text-xl text-center text-blue-600">
                            <button onclick="commit()" class="w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-xl shadow-lg shadow-blue-100">✓</button>
                        </div>
                    </div>
                    <div id="live-list" class="space-y-2"></div>
                    <button onclick="save()" class="w-full py-10 text-slate-300 font-bold text-[8px] uppercase tracking-[0.5em]">Finalizar y Autorizar</button>
                </div>
            </section>

            <section id="tab-historial" class="tab-content">
                <div id="hist-grid" class="space-y-3">
                    <p class="text-center py-20 text-[9px] font-black text-slate-300 uppercase">Sin reportes en memoria</p>
                </div>
            </section>

            <section id="tab-retornos" class="tab-content">
                <div class="bg-white border border-slate-100 rounded-[2rem] p-6 space-y-5 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest text-center">Registro de Devolución</p>
                    <div class="space-y-3">
                        <input type="text" placeholder="CLIENTE / VENDEDOR" class="input-twins w-full p-4 text-[10px] uppercase">
                        <input type="text" placeholder="SKU" class="input-twins w-full p-4 text-[10px] uppercase">
                        <textarea placeholder="ESTADO DE LA MERCADERÍA" class="input-twins w-full p-4 text-[10px] uppercase h-24 resize-none"></textarea>
                    </div>
                    <button class="w-full py-4 bg-orange-500 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest">Registrar Ingreso</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let db = {}; let manifest = []; let time = 0, clock;

        function enterApp(tab) {
            document.getElementById('landing-page').classList.add('hidden-landing');
            document.getElementById('work-zone').classList.remove('opacity-0');
            switchTab(tab);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('link-' + tab).classList.add('active');
            if(tab === 'historial') renderHist();
        }

        function readExcel(e) {
            const r = new FileReader();
            r.onload = (x) => {
                const d = new Uint8Array(x.target.result);
                const wb = XLSX.read(d, {type: 'array'});
                const ws = wb.Sheets[wb.SheetNames[0]];
                XLSX.utils.sheet_to_json(ws).forEach(row => {
                    const c = String(row.CODIGO || row.codigo || "").toUpperCase().trim();
                    db[c] = row.DESCRIPCION || row.descripcion || "ITEM SIN EXCEL";
                });
                alert("Base de datos vinculada.");
            };
            r.readAsArrayBuffer(e.target.files[0]);
        }

        function add() {
            const s = document.getElementById('sku').value.toUpperCase().trim();
            const m = parseInt(document.getElementById('meta').value);
            if(!s || !m) return;
            manifest.push({ sku: s, desc: db[s] || "NUEVO ITEM", meta: m, real: 0 });
            document.getElementById('sku').value = ""; document.getElementById('meta').value = "";
            renderMini();
            document.getElementById('btn-run').classList.remove('hidden');
        }

        function renderMini() {
            document.getElementById('pre-list').innerHTML = manifest.map(i => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-white">
                    <div><p class="text-[10px] font-black">${i.sku}</p><p class="text-[7px] text-slate-400 uppercase font-bold">${i.desc}</p></div>
                    <span class="text-xs font-black text-slate-600">${i.meta}</span>
                </div>
            `).join('');
        }

        function start() {
            document.getElementById('view-setup').classList.add('hidden');
            document.getElementById('sticky-progress').classList.remove('hidden');
            document.getElementById('view-ops').classList.remove('hidden');
            const s = document.getElementById('sel');
            s.innerHTML = manifest.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            sync();
            clock = setInterval(() => {
                time++;
                const h = Math.floor(time/3600).toString().padStart(2,'0');
                const m = Math.floor((time%3600)/60).toString().padStart(2,'0');
                const s = (time%60).toString().padStart(2,'0');
                document.getElementById('txt-timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
            updateUI();
        }

        function sync() {
            const v = document.getElementById('sel').value;
            document.getElementById('desc-ui').innerText = manifest.find(i => i.sku === v).desc;
        }

        function commit() {
            const s = document.getElementById('sel').value;
            const v = parseInt(document.getElementById('qty-add').value);
            if(!v) return;
            manifest.find(i => i.sku === s).real += v;
            document.getElementById('qty-add').value = "";
            updateUI();
            navigator.vibrate(30);
        }

        function updateUI() {
            const plan = manifest.reduce((a,b) => a + b.meta, 0);
            const real = manifest.reduce((a,b) => a + b.real, 0);
            const p = Math.round((real / plan) * 100) || 0;
            document.getElementById('txt-perc').innerText = p + "%";
            document.getElementById('bar-fill').style.width = p + "%";
            
            document.getElementById('live-list').innerHTML = manifest.map(i => `
                <div class="bg-white border border-slate-100 p-4 rounded-2xl flex justify-between items-center shadow-sm">
                    <div class="min-w-0 flex-1 pr-4">
                        <p class="text-[11px] font-[800] truncate text-slate-900">${i.sku}</p>
                        <p class="text-[8px] font-bold text-slate-400 truncate uppercase">${i.desc}</p>
                    </div>
                    <span class="text-[11px] font-black font-mono text-blue-600">${i.real}/${i.meta}</span>
                </div>
            `).join('');
        }

        function save() {
            const doc = new jsPDF();
            doc.setFontSize(22); doc.text("REPORTE TWINS LOGÍSTICA", 14, 25);
            doc.autoTable({ startY: 35, head: [['SKU', 'DESC', 'PLAN', 'REAL', 'ST']], body: manifest.map(i => [i.sku, i.desc, i.meta, i.real, i.real >= i.meta ? 'OK' : 'F']) });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 15);
            
            const storage = JSON.parse(localStorage.getItem('twins_v24') || '[]');
            storage.unshift({ id: 'REP-' + Date.now(), fecha: new Date().toLocaleString(), items: [...manifest] });
            localStorage.setItem('twins_v24', JSON.stringify(storage));
            
            doc.save(`Reporte_Twins_${Date.now()}.pdf`);
            location.reload();
        }

        function renderHist() {
            const h = JSON.parse(localStorage.getItem('twins_v24') || '[]');
            if(h.length > 0) {
                document.getElementById('hist-grid').innerHTML = h.map(r => `
                    <div class="bg-slate-50 p-5 rounded-2xl flex justify-between items-center border border-white shadow-sm">
                        <div>
                            <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">${r.fecha}</p>
                            <h4 class="text-sm font-black text-slate-900">${r.id}</h4>
                        </div>
                        <span class="text-blue-600 text-[10px] font-black italic">VER PDF</span>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
