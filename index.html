<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS OS | Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #007AFF; --dark: #1c1c1e; --bg: #f2f2f7; --card: #ffffff; --accent: #5856D6; }
        body { background: var(--bg); font-family: -apple-system, system-ui, sans-serif; padding-bottom: 20px; }
        
        /* Header Nativo Premium */
        .app-header { background: var(--dark); color: white; padding: 45px 20px 65px; border-radius: 0 0 40px 40px; }
        .app-header h1 { font-size: 26px; font-weight: 800; letter-spacing: -1px; margin: 0; }
        
        /* Main Container */
        .main-content { margin-top: -45px; padding: 0 16px; }
        .ios-card { background: var(--card); border-radius: 24px; padding: 22px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); border: none; margin-bottom: 18px; }
        
        /* Buscador Predictivo */
        .search-box { position: relative; }
        .search-input { background: #e3e3e8; border: none; border-radius: 14px; padding: 14px 14px 14px 45px; width: 100%; font-size: 16px; transition: 0.3s; }
        .search-input:focus { background: #fff; box-shadow: 0 0 0 3px rgba(0,122,255,0.2); outline: none; }
        .search-icon { position: absolute; left: 15px; top: 16px; color: #8e8e93; }
        
        /* Lista de Sugerencias */
        .sug-list { position: absolute; width: 100%; background: white; border-radius: 16px; z-index: 1000; box-shadow: 0 15px 35px rgba(0,0,0,0.2); max-height: 220px; overflow-y: auto; display: none; margin-top: 8px; border: 1px solid #e5e5ea; }
        .sug-item { padding: 14px 18px; border-bottom: 1px solid #f2f2f7; cursor: pointer; }
        .sug-item b { display: block; color: var(--dark); font-size: 14px; }
        .sug-item small { color: var(--primary); font-weight: 700; font-size: 11px; }

        /* Lista Temporal (Carrito) */
        .cart-item { background: #f8f9fb; border-radius: 16px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .cart-item-info { max-width: 70%; }
        .btn-add-list { background: var(--accent); color: white; border: none; border-radius: 14px; width: 100%; padding: 14px; font-weight: 700; }
        .btn-save-all { background: #34C759; color: white; border: none; border-radius: 20px; width: 100%; padding: 20px; font-weight: 800; font-size: 18px; box-shadow: 0 10px 20px rgba(52, 199, 89, 0.3); }
        
        .empty-state { text-align: center; color: #8e8e93; padding: 30px 0; font-size: 14px; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="d-flex justify-content-between align-items-center">
            <h1>TWINS HUB</h1>
            <button class="btn btn-sm btn-outline-light rounded-pill px-3" onclick="location.reload()">Sincronizar</button>
        </div>
    </header>

    <main class="main-content">
        <div class="ios-card">
            <h6 class="fw-bold small text-muted mb-3 uppercase">1. BUSCAR PRODUCTO</h6>
            <div class="search-box mb-3">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Nombre o SKU..." oninput="filterProducts(this.value)">
                <div id="suggestions" class="sug-list"></div>
            </div>

            <div id="selectionArea" class="d-none">
                <div class="p-3 rounded-4 bg-light border-0 mb-3">
                    <div id="dispName" class="fw-bold text-dark mb-1"></div>
                    <div id="dispSku" class="text-primary small fw-bold"></div>
                </div>
                <div class="row g-2 mb-2">
                    <div class="col-4"><input type="number" id="inputCant" class="form-control p-3 rounded-4 border-0 bg-light" placeholder="Cant."></div>
                    <div class="col-8"><button class="btn-add-list" onclick="addItem()">AÑADIR A LISTA <i class="fas fa-plus"></i></button></div>
                </div>
            </div>
        </div>

        <div class="ios-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="fw-bold small text-muted m-0">2. LISTA ACTUAL</h6>
                <span id="itemCount" class="badge bg-primary rounded-pill">0 items</span>
            </div>

            <div id="cartContainer">
                <div class="empty-state">No hay productos en la lista aún</div>
            </div>

            <div id="saveControls" class="d-none mt-4 animate__animated animate__fadeIn">
                <hr class="my-4 opacity-25">
                <label class="small fw-bold text-muted mb-2">DATOS DE ENTREGA</label>
                <input type="text" id="inputQuien" class="form-control mb-2 p-3 rounded-4 border-0 bg-light" placeholder="Nombre del Solicitante">
                <select id="inputTipo" class="form-select mb-4 p-3 rounded-4 border-0 bg-light">
                    <option value="MARKETING">MARKETING</option>
                    <option value="OFICINA">OFICINA</option>
                    <option value="VENDEDOR">VENDEDOR</option>
                </select>
                <button class="btn-save-all" onclick="submitToGoogle()">GUARDAR EN EXCEL <i class="fas fa-check-double ms-2"></i></button>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzzRTyeEoCjNAHhiAU7BreoItNqgpy4pdJIzmbdRqrvkzNyFZP9ewB3LuTdOlAOSA5duQ/exec"; // <--- PEGA TU URL UNA ÚLTIMA VEZ
        let MASTER_DB = [];
        let TEMP_CART = [];
        let SELECTED_TMP = null;

        async function init() {
            const r = await fetch(API_URL, {method: "POST", body: JSON.stringify({action: "load"})});
            const d = await r.json();
            MASTER_DB = d.p;
        }

        function filterProducts(val) {
            const sug = document.getElementById('suggestions');
            if(val.length < 2) { sug.style.display = 'none'; return; }
            const matches = MASTER_DB.filter(p => p[0].toString().toLowerCase().includes(val.toLowerCase()) || p[1].toString().toLowerCase().includes(val.toLowerCase())).slice(0, 10);
            sug.innerHTML = matches.map(p => `<div class="sug-item" onclick="selectItem('${p[0]}','${p[1]}')"><b>${p[1]}</b><small>${p[0]}</small></div>`).join('');
            sug.style.display = 'block';
        }

        function selectItem(sku, name) {
            SELECTED_TMP = {sku, name};
            document.getElementById('dispName').innerText = name;
            document.getElementById('dispSku').innerText = "SKU: " + sku;
            document.getElementById('selectionArea').classList.remove('d-none');
            document.getElementById('suggestions').style.display = 'none';
            document.getElementById('searchInput').value = sku;
        }

        function addItem() {
            const cant = document.getElementById('inputCant').value;
            if(!cant || !SELECTED_TMP) return;
            
            TEMP_CART.push({...SELECTED_TMP, cant});
            updateUI();
            
            // Reset parcial
            document.getElementById('inputCant').value = "";
            document.getElementById('searchInput').value = "";
            document.getElementById('selectionArea').classList.add('d-none');
        }

        function removeItem(idx) {
            TEMP_CART.splice(idx, 1);
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('cartContainer');
            const controls = document.getElementById('saveControls');
            document.getElementById('itemCount').innerText = TEMP_CART.length + " items";
            
            if(TEMP_CART.length === 0) {
                container.innerHTML = '<div class="empty-state">No hay productos en la lista aún</div>';
                controls.classList.add('d-none');
                return;
            }
            
            controls.classList.remove('d-none');
            container.innerHTML = TEMP_CART.map((item, i) => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="fw-bold" style="font-size:14px">${item.name}</div>
                        <div class="small text-primary fw-bold">${item.sku}</div>
                    </div>
                    <div class="d-flex align-items-center">
                        <span class="badge bg-dark rounded-pill me-2 px-3">${item.cant}</span>
                        <button class="btn btn-sm text-danger" onclick="removeItem(${i})"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
        }

        async function submitToGoogle() {
            const quien = document.getElementById('inputQuien').value;
            const tipo = document.getElementById('inputTipo').value;
            if(!quien) return Swal.fire("Nombre faltante", "Por favor indica quién solicita", "warning");

            const finalPayload = TEMP_CART.map(i => [new Date(), tipo, i.sku, i.name, i.cant, quien, "PENDIENTE SAP"]);

            Swal.fire({title: 'Guardando Lista...', didOpen: () => Swal.showLoading()});
            
            await fetch(API_URL, {method: "POST", body: JSON.stringify({action: "saveBulk", payload: finalPayload})});
            
            Swal.fire({icon:'success', title:'Guardado Correctamente', text:'Se han registrado los '+TEMP_CART.length+' items'}).then(() => {
                location.reload();
            });
        }

        window.onload = init;
    </script>
</body>
</html>
