<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUDITORÍA PACKING | ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #3b82f6; --success: #10b981; --warn: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; padding-bottom: 90px; }
        
        /* Layout */
        .header { padding: 25px 20px; background: linear-gradient(180deg, rgba(30,41,59,1) 0%, rgba(2,6,23,1) 100%); border-bottom: 1px solid #334155; }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .glass { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Formulario */
        label { font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 5px; }
        input { width: 100%; background: #020617; border: 1px solid #334155; padding: 14px; border-radius: 12px; color: white; font-size: 1rem; margin-bottom: 15px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }

        /* Visualizador de Búsqueda */
        .item-preview { background: rgba(59, 130, 246, 0.1); padding: 15px; border-radius: 16px; border-left: 4px solid var(--accent); margin-bottom: 15px; }
        .sku-tag { font-weight: 800; color: var(--accent); font-size: 1.1rem; }
        .desc-tag { font-size: 0.75rem; color: #94a3b8; display: block; }

        /* Tarjeta de Progreso Dinámico */
        .audit-card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .progress-track { width: 100%; height: 8px; background: #020617; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.6s ease; border-radius: 10px; }
        
        .color-ok { background: var(--success); box-shadow: 0 0 12px var(--success); }
        .color-run { background: var(--accent); }
        .color-err { background: var(--danger); }

        /* Botonera */
        .btn { width: 100%; padding: 18px; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-main { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .btn-done { background: var(--success); color: white; margin-top: 20px; }

        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); display: flex; border-radius: 20px; padding: 8px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-opt { flex: 1; text-align: center; color: #64748b; font-size: 0.7rem; font-weight: bold; cursor: pointer; padding: 12px; border-radius: 15px; }
        .nav-opt.active { color: white; background: var(--accent); }

        .view { display: none; }
        .view.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header class="header">
    <div style="font-weight: 800; font-size: 1.2rem;">LOGÍSTICA AUDIT</div>
    <div style="font-size: 0.7rem; color: var(--accent);">J. ANGELO NUÑEZ DURAND</div>
</header>

<div class="container">
    <div id="v1" class="view active">
        <div class="glass">
            <label>Paso 1: Identificación</label>
            <input type="text" id="cont_id" placeholder="N° Contenedor / Código">
            <label>Paso 2: Foto del Packing List</label>
            <input type="file" id="foto_pck" accept="image/*">
            <button class="btn btn-main" onclick="nav(1)">Abrir Panel de Auditoría</button>
        </div>
    </div>

    <div id="v2" class="view">
        <div class="glass">
            <label>Buscador (Maestro)</label>
            <input type="text" id="search" placeholder="Escribe SKU o nombre..." oninput="lookup(this.value)">
            
            <div id="preview_box" class="item-preview">
                <span id="p_sku" class="sku-tag">---</span>
                <span id="p_name" class="desc-tag">Esperando selección...</span>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex:1">
                    <label>Cant. Según Foto</label>
                    <input type="number" id="q_target" placeholder="Packing">
                </div>
                <div style="flex:1">
                    <label>Cant. Físico</label>
                    <input type="number" id="q_real" placeholder="Conteo">
                </div>
            </div>
            <button class="btn btn-main" onclick="register()">Registrar y Sumar</button>
        </div>

        <div id="audit_list">
            </div>
    </div>

    <div id="v3" class="view">
        <div class="glass" style="text-align: center;">
            <h2 style="margin:0;">Cierre de Reporte</h2>
            <p style="color: #94a3b8; font-size: 0.8rem;">Basado en la auditoría del packing fotografiado.</p>
            <button class="btn btn-done" onclick="generatePDF()">Exportar PDF Profesional</button>
        </div>
    </div>
</div>

<nav class="nav">
    <div class="nav-opt active" onclick="nav(0)">CONFIG</div>
    <div class="nav-opt" onclick="nav(1)">CONTEO</div>
    <div class="nav-opt" onclick="nav(2)">REPORTE</div>
</nav>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz2FWrNqYTWr2TZiD56WDidmjAg1Xkgx2Bkka6uG_xUGhtwMUAOhFiDIHBpxvKIAHmh/exec"; 
    let master = [];
    let log = {};
    let active = null;

    window.onload = async () => {
        try {
            const r = await fetch(API_URL);
            master = await r.json();
        } catch (e) { console.error("Sin conexión al maestro"); }
    };

    function nav(idx) {
        document.querySelectorAll('.view').forEach((v, i) => v.classList.toggle('active', i === idx));
        document.querySelectorAll('.nav-opt').forEach((n, i) => n.classList.toggle('active', i === idx));
    }

    function lookup(v) {
        v = v.trim().toUpperCase();
        const found = master.find(x => x[0].toString().includes(v) || x[1].toString().includes(v));
        if(found) {
            active = { sku: found[0], nombre: found[1] };
            document.getElementById('p_sku').innerText = found[0];
            document.getElementById('p_name').innerText = found[1];
        }
    }

    function register() {
        const target = parseInt(document.getElementById('q_target').value) || 0;
        const real = parseInt(document.getElementById('q_real').value) || 0;
        const cont = document.getElementById('cont_id').value;

        if(!active || real === 0 || !cont) return alert("Complete Contenedor y Cantidades");

        const sku = active.sku;
        if(!log[sku]) log[sku] = { nombre: active.nombre, target: target, current: 0 };
        
        log[sku].current += real;
        if(target > 0) log[sku].target = target;

        // Sincronización Invisible al Historial
        fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ contenedor: cont, sku: sku, cantidad: real }) });

        render();
        // Reset campos buscador
        document.getElementById('search').value = "";
        document.getElementById('q_real').value = "";
        document.getElementById('search').focus();
    }

    function render() {
        const list = document.getElementById('audit_list');
        list.innerHTML = "";
        
        Object.keys(log).reverse().forEach(k => {
            const i = log[k];
            const pct = Math.min((i.current / i.target) * 100, 100);
            const color = i.current === i.target ? 'color-ok' : (i.current > i.target ? 'color-err' : 'color-run');
            
            list.innerHTML += `
                <div class="audit-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:800; font-size:0.9rem;">${k}</span>
                        <span style="font-size:0.8rem; font-weight:bold;">${i.current} / ${i.target}</span>
                    </div>
                    <span style="font-size:0.7rem; color:#94a3b8; display:block; margin-top:2px;">${i.nombre}</span>
                    
                    <div class="progress-track">
                        <div class="progress-fill ${color}" style="width: ${pct}%"></div>
                    </div>
                    
                    <div style="text-align:right; font-size:0.65rem; font-weight:800; color:${i.current === i.target ? 'var(--success)' : (i.current > i.target ? 'var(--danger)' : 'var(--accent)')}">
                        ${i.current === i.target ? '✓ CUADRADO' : (i.current > i.target ? '⚠ EXCESO' : 'EN CONTEO...')}
                    </div>
                </div>
            `;
        });
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const c = document.getElementById('cont_id').value;

        doc.setFillColor(2, 6, 23).rect(0, 0, 210, 45, 'F');
        doc.setTextColor(255, 255, 255).setFontSize(22).text("REPORTE DE AUDITORÍA FÍSICA", 105, 22, {align:'center'});
        doc.setFontSize(10).text(`SEGÚN PACKING DE REFERENCIA | CONTENEDOR: ${c}`, 105, 32, {align:'center'});

        const rows = Object.keys(log).map(s => [s, log[s].nombre, log[s].target, log[s].current, log[s].current - log[s].target]);

        doc.autoTable({
            startY: 50,
            head: [['SKU', 'DESCRIPCIÓN', 'PACK. FOTO', 'CONTEO', 'DIF']],
            body: rows,
            headStyles: { fillColor: [59, 130, 246] },
            theme: 'grid'
        });

        const y = doc.lastAutoTable.finalY + 30;
        doc.setTextColor(0,0,0).text("Revisión autorizada por:", 105, y, {align:'center'});
        doc.setFont(undefined, 'bold').text("J. Angelo Nuñez Durand", 105, y + 8, {align:'center'});
        doc.setFont(undefined, 'normal').text("Asist. Inventario Logístico", 105, y + 14, {align:'center'});
        
        doc.save(`Auditoria_Packing_${c}.pdf`);
    }
</script>
</body>
</html>
