<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v16 - Precision Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #0f172a; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Contenedor dinámico para aprovechar cada pixel */
        .scroll-container { flex: 1; overflow-y: auto; padding-bottom: 120px; scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Tarjetas con bordes optimizados */
        .card-tajho { background: white; border-radius: 1.5rem; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01); }
        
        /* Inputs compactos pero táctiles */
        .input-smart { background: #f1f5f9; border-radius: 1rem; border: 2px solid transparent; transition: all 0.2s; font-weight: 700; text-align: center; }
        .input-smart:focus { border-color: var(--accent); background: white; }

        /* Animaciones fluidas */
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-0 m-0">

    <header class="px-6 py-3 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div>
            <h1 class="text-lg font-black tracking-tighter uppercase leading-none">TAJHO<span class="text-blue-600">.OS</span></h1>
        </div>
        <div class="bg-slate-900 px-3 py-1 rounded-full flex items-center gap-2">
            <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></div>
            <span id="timer-val" class="text-[10px] font-mono font-black text-white">00:00:00</span>
        </div>
    </header>

    <main class="scroll-container no-scrollbar px-4">
        
        <div id="stats-panel" class="hidden mt-3 fade-in">
            <div class="bg-blue-600 rounded-3xl p-5 text-white flex justify-between items-center shadow-lg shadow-blue-100">
                <div class="flex-1">
                    <p class="text-[8px] font-black uppercase opacity-70 tracking-widest">Contenedor Activo</p>
                    <div class="flex items-baseline gap-2">
                        <h2 id="global-perc" class="text-3xl font-black italic">0%</h2>
                        <span id="global-counter" class="text-[10px] font-mono font-bold opacity-80">0 / 0</span>
                    </div>
                </div>
                <div class="w-20">
                    <div class="h-1.5 bg-blue-800/50 rounded-full overflow-hidden">
                        <div id="global-bar" class="h-full bg-white duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <section id="tab-recepcion" class="space-y-3 pt-3">
            
            <div id="config-card" class="card-tajho p-5 space-y-4">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Nuevo Ingreso</p>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="in-cod" placeholder="CÓDIGO" class="input-smart p-4 text-xs uppercase outline-none">
                    <input type="number" id="in-meta" placeholder="CANTIDAD" class="input-smart p-4 text-xs outline-none">
                </div>
                <button onclick="addPackingItem()" class="w-full py-3 bg-slate-50 text-slate-500 rounded-xl font-black text-[9px] uppercase tracking-widest border border-slate-100">Añadir SKU</button>
                <div id="mini-list" class="flex flex-wrap gap-1.5 max-h-32 overflow-y-auto no-scrollbar"></div>
                <button id="btn-start-ops" onclick="startOperations()" class="hidden w-full bg-blue-600 text-white py-4.5 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] shadow-lg shadow-blue-200">Iniciar Operación</button>
            </div>

            <div id="ops-panel" class="hidden space-y-3 fade-in">
                <div class="card-tajho p-4">
                    <div class="flex items-center gap-2">
                        <div class="flex-1 bg-slate-50 rounded-xl p-2 border border-slate-100">
                            <p class="text-[7px] font-black text-slate-400 uppercase ml-1">Producto</p>
                            <select id="op-select" class="w-full bg-transparent font-black text-slate-800 text-base outline-none truncate"></select>
                        </div>
                        <div class="w-24 bg-slate-50 rounded-xl p-2 border border-slate-100">
                            <p class="text-[7px] font-black text-slate-400 uppercase text-center">Bultos</p>
                            <input type="number" id="op-input" placeholder="0" class="w-full text-2xl font-black text-blue-600 bg-transparent text-center outline-none">
                        </div>
                        <button onclick="submitCount()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center text-xl font-bold shadow-lg shadow-blue-100">✓</button>
                    </div>
                </div>

                <div id="items-grid" class="grid grid-cols-2 gap-2"></div>
                
                <button onclick="closeContainerReport()" class="w-full py-6 text-slate-300 font-bold text-[8px] uppercase tracking-[0.4em]">Cerrar Reporte de Inventario</button>
            </div>
        </section>

        <section id="tab-historial" class="hidden space-y-2 pt-3 fade-in">
            <input type="text" id="hist-search" oninput="filterHistory()" placeholder="🔍 Filtrar registros..." class="input-smart w-full p-4 text-left text-xs shadow-sm">
            <div id="hist-container" class="space-y-2"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white h-20 flex justify-around items-center z-50 rounded-t-[2rem] shadow-[0_-10px_40px_rgba(0,0,0,0.03)] border-t border-slate-50 px-6">
        <button onclick="switchTab('tab-recepcion', this)" class="flex flex-col items-center flex-1 text-blue-600">
            <span class="text-xl mb-1">📦</span>
            <span class="text-[8px] font-black uppercase">Ingreso</span>
        </button>
        <button onclick="switchTab('tab-historial', this)" class="flex flex-col items-center flex-1 text-slate-300">
            <span class="text-xl mb-1">📂</span>
            <span class="text-[8px] font-black uppercase">Archivo</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;
        let pList = [];
        let sec = 0, timer;

        function switchTab(id, el) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('text-blue-600');
                b.classList.add('text-slate-300');
            });
            el.classList.add('text-blue-600');
            el.classList.remove('text-slate-300');
            if(id === 'tab-historial') renderHistory();
        }

        function addPackingItem() {
            const cod = document.getElementById('in-cod').value.toUpperCase();
            const meta = parseInt(document.getElementById('in-meta').value);
            if(!cod || !meta) return;
            pList.push({ cod, meta, real: 0 });
            renderMiniList();
            document.getElementById('in-cod').value = "";
            document.getElementById('in-meta').value = "";
            document.getElementById('btn-start-ops').classList.remove('hidden');
        }

        function renderMiniList() {
            const cont = document.getElementById('mini-list');
            cont.innerHTML = pList.map((p, idx) => `
                <div class="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-full text-[9px] font-black flex items-center gap-2 border border-blue-100">
                    ${p.cod} (${p.meta})
                    <button onclick="pList.splice(${idx},1);renderMiniList()" class="text-blue-300">✕</button>
                </div>
            `).join('');
        }

        function startOperations() {
            document.getElementById('config-card').classList.add('hidden');
            document.getElementById('stats-panel').classList.remove('hidden');
            document.getElementById('ops-panel').classList.remove('hidden');
            document.getElementById('op-select').innerHTML = pList.map(p => `<option value="${p.cod}">${p.cod}</option>`).join('');
            timer = setInterval(() => {
                sec++;
                const h = Math.floor(sec/3600).toString().padStart(2,'0');
                const m = Math.floor((sec%3600)/60).toString().padStart(2,'0');
                const s = (sec%60).toString().padStart(2,'0');
                document.getElementById('timer-val').innerText = `${h}:${m}:${s}`;
            }, 1000);
            updateView();
        }

        function submitCount() {
            const cod = document.getElementById('op-select').value;
            const cant = parseInt(document.getElementById('op-input').value);
            if(!cant) return;
            pList.find(p => p.cod === cod).real += cant;
            document.getElementById('op-input').value = "";
            updateView();
            navigator.vibrate(50);
        }

        function updateView() {
            const tPlan = pList.reduce((a,b) => a + b.meta, 0);
            const tReal = pList.reduce((a,b) => a + b.real, 0);
            const perc = Math.round((tReal / tPlan) * 100) || 0;
            document.getElementById('global-perc').innerText = perc + "%";
            document.getElementById('global-bar').style.width = Math.min(perc, 100) + "%";
            document.getElementById('global-counter').innerText = `${tReal} / ${tPlan}`;
            
            const grid = document.getElementById('items-grid');
            grid.innerHTML = pList.map(p => `
                <div class="card-tajho p-3 border-l-4 ${p.real >= p.meta ? 'border-l-green-500' : 'border-l-blue-600'}">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[9px] font-black text-slate-800 truncate">${p.cod}</span>
                        <span class="text-[8px] font-mono font-bold">${p.real}/${p.meta}</span>
                    </div>
                    <div class="h-1 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-600" style="width: ${Math.min((p.real/p.meta)*100, 100)}%"></div>
                    </div>
                </div>`).join('');
        }

        function closeContainerReport() {
            clearInterval(timer);
            const reportID = "TJ-" + Math.floor(1000 + Math.random() * 9000);
            const storage = JSON.parse(localStorage.getItem('tajho_v16_data') || '[]');
            storage.unshift({ id: reportID, fecha: new Date().toLocaleString(), tiempo: document.getElementById('timer-val').innerText, data: [...pList] });
            localStorage.setItem('tajho_v16_data', JSON.stringify(storage));
            
            const doc = new jsPDF();
            doc.text("REPORTE TAJHO.OS v16", 14, 20);
            doc.autoTable({ startY: 30, head: [['SKU', 'PLAN', 'REAL', 'ST']], body: pList.map(i => [i.cod, i.meta, i.real, i.real >= i.meta ? 'OK' : 'F']) });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 15);
            doc.save(`${reportID}_Tajho.pdf`);
            location.reload();
        }

        function renderHistory(filter = "") {
            const cont = document.getElementById('hist-container');
            const storage = JSON.parse(localStorage.getItem('tajho_v16_data') || '[]');
            const filtered = storage.filter(h => h.id.includes(filter) || h.fecha.includes(filter));
            cont.innerHTML = filtered.map(h => `
                <div class="card-tajho p-4 flex justify-between items-center shadow-sm">
                    <div>
                        <p class="text-[7px] font-bold text-slate-400 uppercase">${h.fecha}</p>
                        <h4 class="font-black text-slate-800 text-xs">${h.id}</h4>
                    </div>
                    <span class="text-[10px] font-black text-blue-600 font-mono">${h.tiempo}</span>
                </div>`).join('');
        }

        function filterHistory() { renderHistory(document.getElementById('hist-search').value.toUpperCase()); }
    </script>
</body>
</html>
