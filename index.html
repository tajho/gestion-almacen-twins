<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajho.OS - Elite Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2563eb; --bg-main: #f1f5f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: #0f172a; transition: all 0.3s ease; }
        
        /* Efecto Glassmorphism para Tarjetas */
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 2.5rem; }
        
        /* Botón Pro con Sombra Dinámica */
        .btn-pro { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; border-radius: 1.5rem; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 10px 20px -5px rgba(15, 23, 42, 0.3); }
        .btn-pro:active { transform: scale(0.96); }

        /* Input Estilo Neumórfico */
        .input-neo { background: #f1f5f9; border: 2px solid transparent; border-radius: 1.25rem; box-shadow: inset 4px 4px 8px #e2e8f0, inset -4px -4px 8px #ffffff; transition: all 0.3s ease; font-weight: 700; }
        .input-neo:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .nav-fixed { background: rgba(255, 255, 255, 0.8); backdrop-filter: saturate(180%) blur(20px); border-top: 1px solid rgba(0,0,0,0.05); }
        .tab-content { display: none; }
        .tab-active { display: block; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .progress-fill { transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="pb-32">

    <header class="p-8 pt-12 flex justify-between items-center max-w-md mx-auto">
        <div>
            <h1 class="text-3xl font-[800] tracking-tighter text-slate-900 uppercase">Tajho<span class="text-blue-600">.OS</span></h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">System Active</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[8px] font-black text-slate-400 uppercase">Efficiency Timer</p>
            <p id="timer-val" class="text-sm font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full border border-blue-100">00:00:00</p>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6 space-y-8">

        <section id="tab-recepcion" class="tab-content tab-active space-y-6">
            
            <div id="stats-panel" class="hidden">
                <div class="bg-slate-900 rounded-[3rem] p-8 text-white relative overflow-hidden shadow-2xl">
                    <div class="relative z-10 flex justify-between items-end mb-6">
                        <div>
                            <p class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em]">Carga Global</p>
                            <h2 id="global-perc" class="text-5xl font-black mt-1 italic">0%</h2>
                        </div>
                        <div class="text-right pb-1">
                            <p id="global-counter" class="text-lg font-bold">0 <span class="text-slate-500 text-xs">/ 0</span></p>
                            <p class="text-[8px] font-black text-slate-500 uppercase">Unidades Totales</p>
                        </div>
                    </div>
                    <div class="h-2.5 bg-slate-800 rounded-full overflow-hidden">
                        <div id="global-bar" class="progress-fill h-full bg-gradient-to-r from-blue-600 to-cyan-400" style="width: 0%"></div>
                    </div>
                    <div class="absolute top-0 right-0 w-32 h-32 bg-blue-600/10 rounded-full blur-3xl"></div>
                </div>
            </div>

            <div id="config-card" class="glass-card p-8 space-y-5">
                <div class="flex items-center gap-3 mb-2">
                    <div class="p-2 bg-blue-100 rounded-lg text-blue-600">📥</div>
                    <h3 class="text-xs font-black text-slate-800 uppercase tracking-widest">Configurar Contenedor</h3>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Código</label>
                        <input type="text" id="in-cod" placeholder="XXC" class="input-neo w-full p-4 uppercase">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Total</label>
                        <input type="number" id="in-meta" placeholder="000" class="input-neo w-full p-4">
                    </div>
                </div>
                <button onclick="addPackingItem()" class="w-full py-4 bg-slate-50 text-slate-500 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-100 transition-colors border border-slate-200">Añadir al Manifiesto</button>
                <div id="mini-list" class="space-y-2 max-h-32 overflow-y-auto pr-2"></div>
                <button id="btn-start-ops" onclick="startOperations()" class="hidden w-full btn-pro py-5 uppercase font-black text-[11px] tracking-[0.2em]">Abrir Registro de Carga</button>
            </div>

            <div id="ops-panel" class="hidden space-y-6">
                <div class="glass-card p-10 text-center space-y-6 border-2 border-blue-100">
                    <div class="space-y-2">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Seleccionar Referencia</p>
                        <select id="op-select" class="input-neo w-full p-4 text-center appearance-none cursor-pointer"></select>
                    </div>
                    <div class="py-4">
                        <input type="number" id="op-input" placeholder="0" class="w-full text-7xl font-[800] text-slate-900 bg-transparent text-center outline-none">
                        <p class="text-[10px] font-bold text-blue-500 mt-2">REGISTRAR BULTOS</p>
                    </div>
                    <button onclick="submitCount()" class="w-full btn-pro py-5 text-sm uppercase tracking-widest">Confirmar Ingreso</button>
                </div>
                <div id="items-grid" class="space-y-4"></div>
                <button onclick="closeContainerReport()" class="w-full btn-pro bg-red-600 py-6 mt-10 shadow-red-200">Cerrar Contenedor & Exportar</button>
            </div>
        </section>

        <section id="tab-devolucion" class="tab-content space-y-6">
            <div class="glass-card p-8 space-y-5">
                <div class="flex items-center gap-3 mb-2">
                    <div class="p-2 bg-orange-100 rounded-lg text-orange-600">📤</div>
                    <h3 class="text-xs font-black text-slate-800 uppercase tracking-widest">Gestión de Retornos</h3>
                </div>
                <input type="text" id="dev-cli" placeholder="NOMBRE DEL VENDEDOR / CLIENTE" class="input-neo w-full p-4">
                <input type="text" id="dev-sku" placeholder="CÓDIGO DE PRODUCTO" class="input-neo w-full p-4 uppercase">
                <input type="number" id="dev-qty" placeholder="CANTIDAD DEVUELTA" class="input-neo w-full p-4">
                <textarea id="dev-note" placeholder="MOTIVO DE LA DEVOLUCIÓN..." class="input-neo w-full p-4 h-32"></textarea>
                <button onclick="saveDevolution()" class="w-full btn-pro bg-orange-600 py-5 shadow-orange-200">Registrar en Sistema</button>
            </div>
        </section>

        <section id="tab-historial" class="tab-content space-y-6">
            <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest px-4">Registros Recientes</h2>
            <div id="hist-container" class="space-y-4 px-2"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 w-full nav-fixed px-10 py-5 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('tab-recepcion', this)" class="flex flex-col items-center text-blue-600 transition-all scale-110">
            <span class="text-xl">📦</span>
            <span class="text-[8px] font-black uppercase mt-1">Carga</span>
        </button>
        <button onclick="switchTab('tab-devolucion', this)" class="flex flex-col items-center text-slate-300 transition-all">
            <span class="text-xl">🔄</span>
            <span class="text-[8px] font-black uppercase mt-1">Devolu.</span>
        </button>
        <button onclick="switchTab('tab-historial', this)" class="flex flex-col items-center text-slate-300 transition-all">
            <span class="text-xl">📄</span>
            <span class="text-[8px] font-black uppercase mt-1">Historial</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;
        let pList = [];
        let timer;
        let sec = 0;

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(id).classList.add('tab-active');
            
            const btns = el.parentElement.querySelectorAll('button');
            btns.forEach(b => {
                b.classList.remove('text-blue-600', 'scale-110');
                b.classList.add('text-slate-300');
            });
            el.classList.add('text-blue-600', 'scale-110');
            el.classList.remove('text-slate-300');

            if(id === 'tab-historial') renderHistory();
        }

        function addPackingItem() {
            const cod = document.getElementById('in-cod').value.toUpperCase();
            const meta = parseInt(document.getElementById('in-meta').value);
            if(!cod || !meta) return;

            pList.push({ cod, meta, real: 0 });
            renderMiniList();
            document.getElementById('in-cod').value = "";
            document.getElementById('in-meta').value = "";
            document.getElementById('btn-start-ops').classList.remove('hidden');
        }

        function renderMiniList() {
            const cont = document.getElementById('mini-list');
            cont.innerHTML = pList.map(p => `
                <div class="flex justify-between p-3 bg-white rounded-xl text-[10px] font-bold border border-slate-100 shadow-sm animate-in fade-in">
                    <span class="text-slate-800">${p.cod}</span>
                    <span class="text-blue-600">${p.meta} UND</span>
                </div>
            `).join('');
        }

        function startOperations() {
            document.getElementById('config-card').classList.add('hidden');
            document.getElementById('stats-panel').classList.remove('hidden');
            document.getElementById('ops-panel').classList.remove('hidden');
            
            const sel = document.getElementById('op-select');
            sel.innerHTML = pList.map(p => `<option value="${p.cod}">${p.cod}</option>`).join('');
            
            timer = setInterval(() => {
                sec++;
                const h = Math.floor(sec/3600).toString().padStart(2,'0');
                const m = Math.floor((sec%3600)/60).toString().padStart(2,'0');
                const s = (sec%60).toString().padStart(2,'0');
                document.getElementById('timer-val').innerText = `${h}:${m}:${s}`;
            }, 1000);
            updateView();
        }

        function submitCount() {
            const cod = document.getElementById('op-select').value;
            const cant = parseInt(document.getElementById('op-input').value);
            if(!cant) return;

            const item = pList.find(p => p.cod === cod);
            item.real += cant;
            document.getElementById('op-input').value = "";
            updateView();
            if(item.real >= item.meta) navigator.vibrate([100, 50, 100]);
        }

        function updateView() {
            const tPlan = pList.reduce((a,b) => a + b.meta, 0);
            const tReal = pList.reduce((a,b) => a + b.real, 0);
            const perc = Math.round((tReal / tPlan) * 100) || 0;

            document.getElementById('global-perc').innerText = perc + "%";
            document.getElementById('global-bar').style.width = Math.min(perc, 100) + "%";
            document.getElementById('global-counter').innerHTML = `${tReal} <span class="text-slate-500 text-xs">/ ${tPlan}</span>`;

            const grid = document.getElementById('items-grid');
            grid.innerHTML = pList.map(p => {
                const pPerc = Math.min((p.real / p.meta) * 100, 100);
                return `
                <div class="glass-card p-6 space-y-3">
                    <div class="flex justify-between font-[800] text-[11px] tracking-widest uppercase">
                        <span class="text-slate-400">${p.cod}</span>
                        <span class="${p.real >= p.meta ? 'text-green-500' : 'text-blue-600'}">${p.real} / ${p.meta}</span>
                    </div>
                    <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-600 progress-fill" style="width: ${pPerc}%"></div>
                    </div>
                </div>`;
            }).join('');
        }

        function closeContainerReport() {
            clearInterval(timer);
            const reportID = "TJ-" + Math.floor(1000 + Math.random() * 9000);
            const storage = JSON.parse(localStorage.getItem('tajho_os_data') || '[]');
            
            const record = {
                id: reportID,
                tipo: 'Recepción',
                fecha: new Date().toLocaleString(),
                tiempo: document.getElementById('timer-val').innerText,
                items: [...pList]
            };

            storage.unshift(record);
            localStorage.setItem('tajho_os_data', JSON.stringify(storage));
            
            const doc = new jsPDF();
            doc.setFontSize(22); doc.setTextColor(15, 23, 42); doc.text("REPORTE LOGÍSTICO TAJHO.OS", 14, 20);
            doc.setFontSize(10); doc.setTextColor(100); doc.text(`Folio: ${reportID} | Duración: ${record.tiempo}`, 14, 28);
            
            const rows = pList.map(i => [i.cod, i.meta, i.real, (i.real >= i.meta ? 'COMPLETO' : 'FALTANTE')]);
            doc.autoTable({ startY: 35, head: [['COD', 'PLAN', 'REAL', 'ESTADO']], body: rows, theme: 'grid', headStyles: { fillColor: [15, 23, 42] } });
            
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 15);
            doc.save(`${reportID}_Tajho.pdf`);
            
            location.reload();
        }

        function renderHistory() {
            const cont = document.getElementById('hist-container');
            const storage = JSON.parse(localStorage.getItem('tajho_os_data') || '[]');
            cont.innerHTML = storage.length ? "" : "<p class='text-center text-slate-400 py-20'>No hay registros almacenados.</p>";
            
            storage.forEach(h => {
                cont.innerHTML += `
                    <div class="glass-card p-6 flex justify-between items-center border-l-4 border-l-blue-600">
                        <div>
                            <p class="text-[8px] font-black text-blue-500 uppercase">${h.tipo}</p>
                            <h4 class="font-bold text-slate-800">${h.id}</h4>
                            <p class="text-[9px] text-slate-400 font-medium">${h.fecha}</p>
                        </div>
                        <div class="text-right">
                             <p class="text-xs font-black text-slate-900">${h.tiempo}</p>
                             <span class="text-[8px] px-2 py-1 bg-blue-50 rounded-full font-bold text-blue-600 italic">ARCHIVADO</span>
                        </div>
                    </div>`;
            });
        }

        function saveDevolution() {
            const cli = document.getElementById('dev-cli').value;
            const sku = document.getElementById('dev-sku').value;
            const qty = document.getElementById('dev-qty').value;
            if(!cli || !sku || !qty) return;

            const storage = JSON.parse(localStorage.getItem('tajho_os_data') || '[]');
            storage.unshift({ id: "DEV-" + Math.floor(1000 + Math.random() * 99), tipo: 'Devolución', fecha: new Date().toLocaleString(), tiempo: 'N/A' });
            localStorage.setItem('tajho_os_data', JSON.stringify(storage));
            alert("Devolución Guardada");
            switchTab('tab-historial', document.querySelectorAll('nav button')[2]);
        }
    </script>
</body>
</html>
