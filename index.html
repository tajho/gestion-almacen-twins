<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v46 - Dynamic Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --slate-bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #0f172a; overflow: hidden; -webkit-font-smoothing: antialiased; }
        
        .card-modern { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.04); transition: transform 0.3s ease; }
        .card-modern:active { transform: scale(0.99); }
        
        .input-clean { background: var(--slate-bg); border-radius: 1rem; border: 2px solid transparent; font-weight: 700; transition: 0.3s; padding: 0.8rem 1.2rem; font-size: 0.85rem; width: 100%; }
        .input-clean:focus { border-color: var(--blue); background: white; outline: none; }
        
        /* Menú Dinámico */
        #side-menu { position: fixed; inset: 0; z-index: 1000; visibility: hidden; pointer-events: none; }
        #menu-content { width: 80%; max-width: 280px; height: 100%; background: white; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        #menu-overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.4); opacity: 0; transition: 0.4s; backdrop-filter: blur(4px); }
        #side-menu.open { visibility: visible; pointer-events: auto; }
        #side-menu.open #menu-content { transform: translateX(0); }
        #side-menu.open #menu-overlay { opacity: 1; }

        /* Capas Dinámicas */
        #landing { position: fixed; inset: 0; z-index: 500; background: white; padding: 2.5rem; display: flex; flex-direction: column; justify-content: center; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .hide-landing { transform: translateY(-100%); opacity: 0; visibility: hidden; }
        
        .tab-panel { display: none; height: calc(100vh - 85px); overflow-y: auto; padding-bottom: 50px; }
        .active { display: block; animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* Barras con Brillo */
        .progress-track { background: #e2e8f0; border-radius: 10px; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; background: var(--blue); transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .progress-bar::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); animation: shine 2s infinite; }
        @keyframes shine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body>

    <div id="side-menu">
        <div id="menu-overlay" onclick="toggleMenu()"></div>
        <div id="menu-content" class="p-8 flex flex-col">
            <div class="mb-10">
                <h3 class="text-[11px] font-black tracking-[.2em] italic text-slate-400 uppercase">Tajho.OS <span class="text-blue-600 italic">v46</span></h3>
            </div>
            <nav class="space-y-2 flex-1">
                <button onclick="navTo('contenedor')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-50 text-slate-600 transition-all active:scale-95">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
                    <span class="text-[11px] font-black uppercase tracking-widest">Contenedor</span>
                </button>
            </nav>
            <button onclick="clearAll()" class="w-full p-4 text-red-400 font-black text-[9px] uppercase tracking-[.3em] border-t border-slate-100">Limpiar Todo</button>
        </div>
    </div>

    <div id="landing">
        <header class="mb-12">
            <p class="text-[10px] font-black text-blue-600 uppercase tracking-[.4em] mb-2">Control Logístico</p>
            <h1 class="text-4xl font-[800] tracking-tighter leading-none italic">¿Qué hacemos<br><span class="text-blue-600 font-black">hoy, Tajho?</span></h1>
        </header>
        <div class="space-y-4">
            <button onclick="navTo('contenedor')" class="card-modern w-full p-6 flex items-center gap-5 border-none shadow-2xl active:bg-slate-50">
                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
                </div>
                <div class="text-left">
                    <p class="text-[11px] font-black uppercase tracking-[.1em]">Nuevo Contenedor</p>
                    <p class="text-[9px] font-bold text-slate-400 italic">LOGÍSTICA ELITE</p>
                </div>
            </button>
        </div>
    </div>

    <header class="h-20 px-6 flex justify-between items-center bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-50">
        <button onclick="toggleMenu()" class="p-3 bg-slate-50 rounded-xl text-slate-900 active:scale-90 transition-all">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="text-center">
            <p id="header-subtitle" class="text-[8px] font-black uppercase tracking-[0.4em] text-blue-600">CARGA</p>
            <h3 class="text-[11px] font-black tracking-widest italic uppercase">Tajho<span class="text-blue-600">.OS</span></h3>
        </div>
        <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white font-black text-[10px] shadow-lg">T</div>
    </header>

    <main class="p-5">
        <div id="view-contenedor" class="tab-panel active space-y-6">
            
            <div id="setup-card" class="card-modern p-6 space-y-4">
                <div class="space-y-3">
                    <div class="relative">
                        <input type="text" id="s-sku" oninput="smartSearch()" class="input-clean" placeholder="BUSCAR SKU..." autocomplete="off">
                        <div id="search-results" class="hidden absolute z-50 w-full bg-white mt-2 rounded-2xl shadow-2xl border border-slate-100 max-h-48 overflow-y-auto"></div>
                    </div>
                    <input type="text" id="s-desc" class="input-clean text-[10px] text-blue-600 font-bold italic" placeholder="Descripción automática..." readonly>
                    <input type="number" id="s-meta" class="input-clean" placeholder="CANTIDAD META">
                </div>
                <button onclick="addMani()" class="w-full bg-slate-900 text-white py-4 rounded-xl text-[10px] font-black uppercase tracking-[.2em] active:scale-95 transition-all">Vincular Item</button>
                <div id="pre-list" class="space-y-2"></div>
                <button id="btn-start" onclick="startWork()" class="hidden w-full bg-blue-600 text-white py-5 rounded-2xl text-[11px] font-black uppercase shadow-xl tracking-[.2em] animate-bounce">CREAR CONTENEDOR</button>
            </div>

            <div id="ops-card" class="hidden card-modern p-6 space-y-6 text-center">
                
                <div class="bg-slate-50 rounded-[2rem] p-5 border border-slate-100">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="text-blue-600">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
                        </div>
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Estado del Contenedor</p>
                    </div>
                    <div class="progress-track h-4 shadow-inner">
                        <div id="global-bar" class="progress-bar rounded-full shadow-[0_0_15px_rgba(37,99,235,0.5)]" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-between mt-3">
                        <p id="global-pc" class="text-[10px] font-black text-blue-600 italic">0%</p>
                        <p id="items-pending-label" class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">0 SKUS</p>
                    </div>
                </div>

                <div class="py-2">
                    <select id="sel-sku" onchange="syncItem()" class="text-3xl font-[900] bg-transparent outline-none text-slate-900 text-center italic w-full tracking-tighter cursor-pointer"></select>
                    <p id="live-desc" class="text-[9px] font-black text-blue-600 uppercase tracking-widest mt-1 opacity-60"></p>
                </div>

                <div class="px-2">
                    <div class="flex justify-between mb-1.5">
                        <p class="text-[8px] font-black text-slate-300 uppercase italic">Avance Item</p>
                        <p id="item-pc-text" class="text-[9px] font-black text-slate-900">0%</p>
                    </div>
                    <div class="progress-track h-2 bg-slate-100">
                        <div id="item-bar" class="progress-bar bg-slate-900" style="width: 0%"></div>
                    </div>
                </div>

                <div class="flex flex-col items-center gap-6">
                    <div class="flex items-center gap-4">
                        <input type="number" id="qty-in" class="input-clean w-28 text-center text-4xl h-16 shadow-inner" placeholder="0">
                        <button onclick="registrarBulto()" class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-2xl active:scale-75 transition-all">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg>
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 w-full border-t border-slate-50 pt-6">
                        <div class="bg-slate-50 p-3 rounded-2xl">
                            <p class="text-[8px] font-black text-slate-300 uppercase tracking-widest mb-1">Faltan</p>
                            <p id="live-rem" class="text-xl font-black text-slate-800">0</p>
                        </div>
                        <div class="bg-blue-50/50 p-3 rounded-2xl border border-blue-100">
                            <p class="text-[8px] font-black text-blue-400 uppercase tracking-widest mb-1">Real</p>
                            <p id="live-real" class="text-xl font-black text-blue-600">0</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec"; 
        let raw_data = []; 
        let db_tajho = {}; 
        let manifest = JSON.parse(localStorage.getItem('tajho_manifest')) || [];
        let isWorking = localStorage.getItem('tajho_isWorking') === 'true';

        async function initCloud() {
            try {
                const res = await fetch(CLOUD_URL);
                raw_data = await res.json();
                raw_data.forEach(r => {
                    const cod = String(r.CODIGO || "").toUpperCase().trim();
                    if(cod) db_tajho[cod] = { desc: r.DESCRIPCION || "SIN NOMBRE" };
                });
                if(isWorking) startWork(true);
            } catch (e) { console.warn("Offline Mode"); }
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }

        function smartSearch() {
            const input = document.getElementById('s-sku').value.toUpperCase().trim();
            const resultsDiv = document.getElementById('search-results');
            if (input.length < 1) { resultsDiv.classList.add('hidden'); return; }
            const matches = raw_data.filter(item => String(item.CODIGO).toUpperCase().includes(input) || String(item.DESCRIPCION).toUpperCase().includes(input)).slice(0, 5);
            if (matches.length > 0) {
                resultsDiv.innerHTML = matches.map(m => `<div onclick="selectProduct('${m.CODIGO}', '${m.DESCRIPCION}')" class="p-4 border-b border-slate-50 active:bg-blue-50 transition-colors"><p class="text-[9px] font-black text-blue-600 tracking-widest uppercase">${m.CODIGO}</p><p class="text-[10px] font-bold text-slate-600 truncate">${m.DESCRIPCION}</p></div>`).join('');
                resultsDiv.classList.remove('hidden');
            } else { resultsDiv.classList.add('hidden'); }
        }

        function selectProduct(sku, desc) {
            document.getElementById('s-sku').value = sku;
            document.getElementById('s-desc').value = desc;
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function navTo(t) {
            document.getElementById('landing').classList.add('hide-landing');
            document.getElementById('header-subtitle').innerText = t.toUpperCase();
            if(document.getElementById('side-menu').classList.contains('open')) toggleMenu();
            initCloud();
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!db_tajho[sku] || !meta) return;
            manifest.push({ sku, desc: db_tajho[sku].desc, meta, real: 0 });
            saveState();
            renderList();
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('s-sku').value = ''; document.getElementById('s-desc').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderList() {
            document.getElementById('pre-list').innerHTML = manifest.map(i => `<div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100 animate-fadeIn"><p class="text-[10px] font-black italic uppercase">${i.sku} <span class="text-blue-600 ml-2">→ ${i.meta} CJ</span></p></div>`).join('');
            if(manifest.length > 0) document.getElementById('btn-start').classList.remove('hidden');
        }

        function startWork(fromReload = false) {
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('ops-card').classList.remove('hidden');
            const sel = document.getElementById('sel-sku');
            sel.innerHTML = manifest.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            if(!fromReload) {
                isWorking = true;
                saveState();
            }
            syncItem();
        }

        function syncItem() {
            const item = manifest.find(i => i.sku === document.getElementById('sel-sku').value);
            if(!item) return;
            document.getElementById('live-desc').innerText = item.desc;
            document.getElementById('live-rem').innerText = item.meta - item.real;
            document.getElementById('live-real').innerText = item.real;

            const itemPc = Math.min(Math.round((item.real / item.meta) * 100), 100);
            document.getElementById('item-pc-text').innerText = itemPc + "%";
            document.getElementById('item-bar').style.width = itemPc + "%";

            const totalMeta = manifest.reduce((acc, i) => acc + i.meta, 0);
            const totalReal = manifest.reduce((acc, i) => acc + i.real, 0);
            const globalPc = Math.min(Math.round((totalReal / totalMeta) * 100), 100);
            
            document.getElementById('global-bar').style.width = globalPc + "%";
            document.getElementById('global-pc').innerText = globalPc + "% COMPLETADO";
            document.getElementById('items-pending-label').innerText = manifest.filter(i => i.real < i.meta).length + " SKUS PENDIENTES";
        }

        async function registrarBulto() {
            const qty = parseInt(document.getElementById('qty-in').value);
            const sku = document.getElementById('sel-sku').value;
            const item = manifest.find(i => i.sku === sku);
            if(!qty) return;
            item.real += qty;
            saveState();
            syncItem();
            document.getElementById('qty-in').value = '';
            navigator.vibrate(25);
            fetch(CLOUD_URL, {method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: 'CARGA', datos: [new Date().toLocaleString(), sku, item.desc, qty, "CJ"] })});
        }

        function saveState() {
            localStorage.setItem('tajho_manifest', JSON.stringify(manifest));
            localStorage.setItem('tajho_isWorking', isWorking);
        }

        function clearAll() {
            if(confirm("¿Eliminar todos los datos del contenedor actual?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // Carga Inicial
        renderList();
        initCloud();
    </script>
</body>
</html>
