<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twins Elite - Logística</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        .premium-card { background: white; border-radius: 28px; border: 1px solid #F1F5F9; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 20px; overflow: hidden; }
        .btn-tool { border-radius: 14px; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 14px 2px; transition: all 0.2s; cursor: pointer; border: 1px solid #F1F5F9; background: #FFF; width: 100%; }
        .btn-tool:active { transform: scale(0.95); background: #f8fafc; }
        .badge-canal { background: #0F172A; color: white; padding: 4px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 p-6">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-[800] tracking-tighter italic text-slate-900">TWINS <span class="text-blue-600">ELITE</span></h1>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic">J. Angelo Nuñez Durand</p>
            </div>
            <i class="ph-bold ph-package text-2xl text-blue-600"></i>
        </div>
    </header>

    <main class="p-5 max-w-xl mx-auto pb-40">
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm text-center">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Contenedores</p>
                <h2 id="count-containers" class="text-3xl font-black text-slate-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm text-center">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Total SKUs</p>
                <h2 id="count-skus" class="text-3xl font-black text-blue-600">0</h2>
            </div>
        </div>

        <div id="main-content">
            </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw-v5b_DkMPqup6Wm4J5KfGKZq9IRs99drhBYFV-MzHa4tcyb8dSn7YRx7KTHAEj1Jp/exec";
        let inventoryData = JSON.parse(localStorage.getItem('twins_final_cache')) || [];

        async function syncData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                inventoryData = Array.isArray(data) ? data : (data.historial || []);
                localStorage.setItem('twins_final_cache', JSON.stringify(inventoryData));
                renderApp();
            } catch(e) { console.log("Actualización en segundo plano..."); }
        }

        function renderApp() {
            const container = document.getElementById('main-content');
            
            // AGRUPACIÓN POR CANAL (Número 1, 2, 3...)
            const grouped = inventoryData.reduce((acc, curr) => {
                const canalID = curr.canal || "S/N";
                if (!acc[canalID]) {
                    acc[canalID] = { 
                        id: canalID, 
                        items: [], 
                        fechaLlegada: curr.almacen || "Sin Fecha" 
                    };
                }
                acc[canalID].items.push(curr);
                return acc;
            }, {});

            let html = '';
            const channels = Object.values(grouped);

            channels.forEach(group => {
                html += `
                <div class="premium-card">
                    <div style="height: 6px; background-color: #3b82f6;"></div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="badge-canal">CANAL ${group.id}</span>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase">${group.fechaLlegada}</span>
                                </div>
                                <h3 class="text-xl font-black tracking-tighter text-slate-800">CONTENEDOR ${group.id}</h3>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3">
                            <div onclick="ejecutar('CORREGIR', '${group.id}')" class="btn-tool">
                                <i class="ph-bold ph-pencil-simple text-lg text-blue-500"></i>CORREGIR
                            </div>
                            <div onclick="ejecutar('LISTA', '${group.id}')" class="btn-tool">
                                <i class="ph-bold ph-list-magnifying text-lg text-slate-700"></i>LISTA
                            </div>
                            <div onclick="ejecutar('PDF', '${group.id}')" class="btn-tool">
                                <i class="ph-bold ph-file-pdf text-lg text-red-500"></i>PDF
                            </div>
                        </div>
                    </div>
                </div>`;
            });

            container.innerHTML = html || '<p class="text-center py-20 opacity-30 font-bold uppercase text-[10px]">Esperando datos del canal...</p>';
            document.getElementById('count-containers').innerText = channels.length;
            document.getElementById('count-skus').innerText = inventoryData.length;
        }

        function ejecutar(tipo, canalId) {
            const filtrados = inventoryData.filter(i => String(i.canal) === String(canalId));
            
            if (tipo === 'LISTA') {
                const lista = filtrados.map(i => `COD: ${i.codigo || i.sku} | ${i.descripcion}`).join('\n');
                alert(`CONTENEDOR CANAL ${canalId}:\n\n${lista}`);
            } else if (tipo === 'PDF') {
                const firma = "Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.";
                alert(`Generando Reporte de Canal ${canalId}...\n\n${firma}`);
            } else if (tipo === 'CORREGIR') {
                alert(`Editor abierto para Canal ${canalId}`);
            }
        }

        // Ejecución
        renderApp();
        syncData();
        setInterval(syncData, 60000);
    </script>
</body>
</html>
