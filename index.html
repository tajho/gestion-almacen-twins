<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INBOUND VISION - ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #000000; --accent: #2563eb; --success: #10b981; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; margin: 0; padding: 0; color: #1e293b; }
        
        .header { padding: 25px 20px; border-bottom: 1px solid var(--border); background: #fff; }
        .header h1 { font-size: 1.3rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .header p { font-size: 0.7rem; color: #64748b; margin-top: 5px; text-transform: uppercase; font-weight: 700; }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        /* Zona de Carga */
        .upload-card { border: 2px dashed var(--border); border-radius: 20px; padding: 40px 20px; text-align: center; cursor: pointer; transition: 0.3s; background: #fafafa; }
        .upload-card:hover { border-color: var(--accent); }
        .loading-text { font-size: 0.9rem; color: var(--accent); font-weight: 600; margin-top: 10px; }

        /* Lista de Items */
        .item-card { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .item-card.exacto { border-left: 6px solid var(--success); background: #f0fdf4; }
        
        .sku-text { font-weight: 800; font-size: 1rem; display: block; }
        .desc-text { font-size: 0.7rem; color: #64748b; display: block; }

        .counter-zone { display: flex; align-items: center; gap: 15px; }
        .qty-box { text-align: center; }
        .qty-label { font-size: 0.6rem; color: #94a3b8; font-weight: 700; display: block; }
        .qty-num { font-size: 1.1rem; font-weight: 800; }

        .btn-inc { background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 10px; font-size: 1.3rem; font-weight: bold; cursor: pointer; }
        .btn-inc:active { background: var(--border); transform: scale(0.9); }

        .footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: #fff; border-top: 1px solid var(--border); display: flex; gap: 10px; box-sizing: border-box; }
        .btn-pdf { background: #000; color: #fff; border: none; flex: 1; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        
        .hidden { display: none; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="overlay" class="hidden">
    <div style="font-size: 2rem;">🔍</div>
    <div class="loading-text">Analizando Packing List...</div>
    <div id="progress" style="font-size: 0.8rem; color: #64748b; margin-top: 5px;">0%</div>
</div>

<div class="header">
    <h1>INBOUND VISION PRO</h1>
    <p>Revisión: J. Angelo Nuñez Durand - Asist. Inventario</p>
</div>

<div class="container">
    <div id="step-1">
        <div class="upload-card" onclick="document.getElementById('input-file').click()">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">📸</div>
            <p style="font-weight: 600;">Subir o Tomar Foto del Packing</p>
            <span style="font-size: 0.7rem; color: #94a3b8;">La app extraerá los productos automáticamente</span>
            <input type="file" id="input-file" class="hidden" accept="image/*" onchange="procesarImagen(this)">
        </div>
    </div>

    <div id="step-2" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="font-size: 1rem; margin: 0;">Items Detectados</h2>
            <button onclick="location.reload()" style="font-size: 0.7rem; border: none; background: none; color: var(--accent); font-weight: bold;">CAMBIAR FOTO</button>
        </div>
        <div id="lista-conteo"></div>
        <div style="height: 100px;"></div>
    </div>
</div>

<div class="footer hidden" id="footer-actions">
    <button class="btn-pdf" onclick="generarReporte()">GENERAR REPORTE & CIERRE</button>
</div>

<script>
    let items = [];

    async function procesarImagen(input) {
        if (!input.files || !input.files[0]) return;
        
        const overlay = document.getElementById('overlay');
        const progressTxt = document.getElementById('progress');
        overlay.classList.remove('hidden');

        try {
            const worker = await Tesseract.createWorker({
                logger: m => {
                    if(m.status === 'recognizing text') {
                        progressTxt.innerText = Math.round(m.progress * 100) + "%";
                    }
                }
            });

            await worker.loadLanguage('spa');
            await worker.initialize('spa');
            
            const { data: { text } } = await worker.recognize(input.files[0]);
            await worker.terminate();

            // Lógica de extracción (Busca patrones de SKU y Cantidad)
            interpretarTexto(text);
            
        } catch (e) {
            alert("Error al leer la imagen. Intenta con una foto más clara.");
            console.error(e);
        } finally {
            overlay.classList.add('hidden');
        }
    }

    function interpretarTexto(text) {
        // Buscamos líneas que parezcan SKU y Cantidad
        const lineas = text.split('\n');
        items = [];

        lineas.forEach(linea => {
            // Ejemplo de búsqueda simple: Texto seguido de números
            const match = linea.match(/([A-Z0-9-]{4,})\s+(\d+)/);
            if (match) {
                items.push({
                    sku: match[1],
                    desc: "Detectado en Packing",
                    pck: parseInt(match[2]),
                    fisico: 0
                });
            }
        });

        if (items.length === 0) {
            alert("No se detectaron productos claros. Intenta tomar la foto más de cerca.");
            location.reload();
        } else {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('footer-actions').classList.remove('hidden');
            render();
        }
    }

    function render() {
        const container = document.getElementById('lista-conteo');
        container.innerHTML = "";
        items.forEach((item, index) => {
            const esExacto = item.fisico === item.pck;
            container.innerHTML += `
                <div class="item-card ${esExacto ? 'exacto' : ''}">
                    <div style="flex:1">
                        <span class="sku-text">${item.sku} ${esExacto ? '✅' : ''}</span>
                        <span class="desc-text">${item.desc}</span>
                    </div>
                    <div class="counter-zone">
                        <div class="qty-box">
                            <span class="qty-label">PACKING</span>
                            <div class="qty-num" style="color:#94a3b8">${item.pck}</div>
                        </div>
                        <div class="qty-box">
                            <span class="qty-label">CONTEO</span>
                            <div class="qty-num">${item.fisico}</div>
                        </div>
                        <button class="btn-inc" onclick="modificar(${index}, 1)">+</button>
                        <button class="btn-inc" onclick="modificar(${index}, -1)" style="font-size:0.8rem">-</button>
                    </div>
                </div>
            `;
        });
    }

    function modificar(index, val) {
        if(val === 1) {
            const num = prompt("Cantidad a sumar:", "1");
            if(num) items[index].fisico += parseInt(num);
        } else {
            items[index].fisico -= 1;
        }
        if(items[index].fisico < 0) items[index].fisico = 0;
        render();
    }

    function generarReporte() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(18).text("REPORTE DE INVENTARIO LOGÍSTICO", 105, 20, {align:'center'});
        
        const tableData = items.map(i => [
            i.sku, 
            i.pck, 
            i.fisico, 
            i.fisico === i.pck ? "SÍ" : "NO"
        ]);

        doc.autoTable({
            startY: 35,
            head: [['SKU', 'PACKING', 'CONTEO', 'EXACTO']],
            body: tableData,
            theme: 'striped',
            headStyles: { fillColor: [0, 0, 0] }
        });

        const finalY = doc.lastAutoTable.finalY + 30;
        doc.text("Revisión autorizada por:", 20, finalY);
        doc.setFont(undefined, 'bold').text("J. Angelo Nuñez Durand", 20, finalY + 7);
        doc.setFont(undefined, 'normal').text("Asist. Inventario Logístico", 20, finalY + 12);

        doc.save("Reporte_Inbound.pdf");
    }
</script>
</body>
</html>
