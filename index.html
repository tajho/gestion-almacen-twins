<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v17 - Ultra Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #f0f4f8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #1e293b; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Glassmorphism Effects */
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.4); }
        .neo-card { border-radius: 2rem; box-shadow: 20px 20px 60px #d9dee3, -20px -20px 60px #ffffff; }
        
        /* Inputs Modernos */
        .input-ultra { background: #e2e8f0; border-radius: 1.5rem; border: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 600; text-align: center; }
        .input-ultra:focus { background: white; box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.2); transform: translateY(-2px); }

        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 110px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .progress-fill { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="p-0 m-0">

    <header class="px-8 pt-8 pb-4 flex justify-between items-end shrink-0">
        <div>
            <h1 class="text-3xl font-[800] tracking-tighter text-slate-900 leading-none">TAJHO<span class="text-blue-600">.OS</span></h1>
            <div class="h-1 w-8 bg-blue-600 rounded-full mt-2"></div>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Session Live</span>
            <div id="timer-val" class="text-sm font-mono font-black text-slate-700">00:00:00</div>
        </div>
    </header>

    <main class="scroll-area no-scrollbar px-6">
        
        <div id="stats-panel" class="hidden mt-4 animate-[fadeIn_0.5s]">
            <div class="neo-card bg-white p-7 mb-6 text-slate-800">
                <div class="flex justify-between items-center mb-4">
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Estado Contenedor</p>
                    <h2 id="global-perc" class="text-4xl font-black italic">0%</h2>
                </div>
                <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden mb-2">
                    <div id="global-bar" class="progress-fill h-full bg-gradient-to-r from-blue-500 to-indigo-600" style="width: 0%"></div>
                </div>
                <div class="flex justify-between text-[10px] font-bold text-slate-400 font-mono">
                    <span id="global-counter">0 / 0 UNIDADES</span>
                    <span>LOGÍSTICA TAJHO</span>
                </div>
            </div>
        </div>

        <section id="tab-recepcion" class="space-y-5">
            
            <div id="config-card" class="neo-card bg-white p-8 space-y-5">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] text-center">Configurar Manifiesto</h3>
                <div class="space-y-3">
                    <input type="text" id="in-cod" placeholder="SKU / CÓDIGO" class="input-ultra w-full p-5 text-sm uppercase outline-none">
                    <input type="text" id="in-desc" placeholder="DESCRIPCIÓN DEL PRODUCTO" class="input-ultra w-full p-5 text-sm outline-none">
                    <input type="number" id="in-meta" placeholder="CANTIDAD TOTAL" class="input-ultra w-full p-5 text-sm outline-none">
                </div>
                <button onclick="addPackingItem()" class="w-full py-5 bg-slate-900 text-white rounded-[1.8rem] font-black text-[10px] uppercase tracking-widest active:scale-95 transition-transform shadow-xl">Agregar SKU</button>
                <div id="mini-list" class="flex flex-col gap-2 max-h-40 overflow-y-auto no-scrollbar"></div>
                <button id="btn-start-ops" onclick="startOperations()" class="hidden w-full bg-blue-600 text-white py-6 rounded-[2rem] font-black text-[11px] uppercase tracking-[0.3em] shadow-[0_20px_40px_rgba(59,130,246,0.3)]">Abrir Operación</button>
            </div>

            <div id="ops-panel" class="hidden space-y-4">
                <div class="neo-card bg-white p-8 space-y-6 text-center">
                    <div class="space-y-1">
                        <select id="op-select" onchange="updateSelectedDesc()" class="bg-transparent font-black text-slate-900 text-2xl outline-none text-center w-full"></select>
                        <p id="op-current-desc" class="text-[10px] font-bold text-slate-400 uppercase italic">---</p>
                    </div>
                    <input type="number" id="op-input" placeholder="0" class="w-full text-7xl font-light text-blue-600 bg-transparent text-center outline-none">
                    <button onclick="submitCount()" class="w-full bg-slate-900 text-white py-6 rounded-3xl font-black text-[11px] uppercase tracking-widest shadow-2xl">Confirmar Registro</button>
                </div>

                <div id="items-grid" class="space-y-3"></div>
                
                <button onclick="closeContainerReport()" class="w-full py-8 text-slate-300 font-bold text-[8px] uppercase tracking-[0.5em]">Finalizar y Firmar Reporte</button>
            </div>
        </section>

        <section id="tab-historial" class="hidden space-y-4 pt-4">
            <div id="hist-container" class="space-y-3"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-xl h-24 flex justify-around items-center z-50 rounded-t-[3rem] shadow-[0_-20px_50px_rgba(0,0,0,0.05)] px-10">
        <button onclick="switchTab('tab-recepcion', this)" class="flex flex-col items-center flex-1 text-blue-600">
            <span class="text-2xl mb-1">📦</span>
            <span class="text-[9px] font-black uppercase tracking-tighter">Carga</span>
        </button>
        <button onclick="switchTab('tab-historial', this)" class="flex flex-col items-center flex-1 text-slate-300">
            <span class="text-2xl mb-1">📂</span>
            <span class="text-[9px] font-black uppercase tracking-tighter">Archivo</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;
        let pList = [];
        let sec = 0, timer;

        function switchTab(id, el) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-blue-600', 'text-slate-300'));
            el.classList.replace('text-slate-300', 'text-blue-600');
            if(id === 'tab-historial') renderHistory();
        }

        function addPackingItem() {
            const cod = document.getElementById('in-cod').value.toUpperCase();
            const desc = document.getElementById('in-desc').value.toUpperCase();
            const meta = parseInt(document.getElementById('in-meta').value);
            if(!cod || !meta) return;
            pList.push({ cod, desc, meta, real: 0 });
            renderMiniList();
            ['in-cod', 'in-desc', 'in-meta'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('btn-start-ops').classList.remove('hidden');
        }

        function renderMiniList() {
            const cont = document.getElementById('mini-list');
            cont.innerHTML = pList.map((p, idx) => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-white">
                    <div>
                        <p class="text-[10px] font-black text-slate-800">${p.cod}</p>
                        <p class="text-[8px] font-bold text-slate-400 truncate w-32">${p.desc}</p>
                    </div>
                    <button onclick="pList.splice(${idx},1);renderMiniList()" class="text-slate-300">✕</button>
                </div>
            `).join('');
        }

        function startOperations() {
            document.getElementById('config-card').classList.add('hidden');
            document.getElementById('stats-panel').classList.remove('hidden');
            document.getElementById('ops-panel').classList.remove('hidden');
            const sel = document.getElementById('op-select');
            sel.innerHTML = pList.map(p => `<option value="${p.cod}">${p.cod}</option>`).join('');
            updateSelectedDesc();
            timer = setInterval(() => {
                sec++;
                const h = Math.floor(sec/3600).toString().padStart(2,'0');
                const m = Math.floor((sec%3600)/60).toString().padStart(2,'0');
                const s = (sec%60).toString().padStart(2,'0');
                document.getElementById('timer-val').innerText = `${h}:${m}:${s}`;
            }, 1000);
            updateView();
        }

        function updateSelectedDesc() {
            const cod = document.getElementById('op-select').value;
            const item = pList.find(p => p.cod === cod);
            document.getElementById('op-current-desc').innerText = item.desc || "SIN DESCRIPCIÓN";
        }

        function submitCount() {
            const cod = document.getElementById('op-select').value;
            const cant = parseInt(document.getElementById('op-input').value);
            if(!cant) return;
            pList.find(p => p.cod === cod).real += cant;
            document.getElementById('op-input').value = "";
            updateView();
            navigator.vibrate(60);
        }

        function updateView() {
            const tPlan = pList.reduce((a,b) => a + b.meta, 0);
            const tReal = pList.reduce((a,b) => a + b.real, 0);
            const perc = Math.round((tReal / tPlan) * 100) || 0;
            document.getElementById('global-perc').innerText = perc + "%";
            document.getElementById('global-bar').style.width = Math.min(perc, 100) + "%";
            document.getElementById('global-counter').innerText = `${tReal} / ${tPlan} UNIDADES`;
            
            const grid = document.getElementById('items-grid');
            grid.innerHTML = pList.map(p => `
                <div class="neo-card bg-white p-5 flex flex-col gap-3">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h4 class="text-xs font-black text-slate-800 tracking-tight">${p.cod}</h4>
                            <p class="text-[9px] font-bold text-slate-400 uppercase leading-none mt-1">${p.desc}</p>
                        </div>
                        <span class="text-[10px] font-black font-mono text-blue-600">${p.real} / ${p.meta}</span>
                    </div>
                    <div class="h-1.5 w-full bg-slate-50 rounded-full overflow-hidden">
                        <div class="progress-fill h-full bg-slate-900 shadow-[0_0_8px_rgba(0,0,0,0.2)]" style="width: ${Math.min((p.real/p.meta)*100, 100)}%"></div>
                    </div>
                </div>`).join('');
        }

        function closeContainerReport() {
            clearInterval(timer);
            const reportID = "TJ-" + Math.floor(1000 + Math.random() * 9000);
            const storage = JSON.parse(localStorage.getItem('tajho_v17_data') || '[]');
            storage.unshift({ id: reportID, fecha: new Date().toLocaleString(), tiempo: document.getElementById('timer-val').innerText, data: [...pList] });
            localStorage.setItem('tajho_v17_data', JSON.stringify(storage));
            
            const doc = new jsPDF();
            doc.setFontSize(22); doc.text("TAJHO.OS - REPORTE DE INVENTARIO", 14, 25);
            doc.setFontSize(10); doc.text(`FECHA: ${new Date().toLocaleString()} | DURACIÓN: ${document.getElementById('timer-val').innerText}`, 14, 32);
            doc.autoTable({ startY: 40, head: [['COD', 'DESCRIPCIÓN', 'PLAN', 'REAL', 'ST']], body: pList.map(i => [i.cod, i.desc, i.meta, i.real, i.real >= i.meta ? 'OK' : 'F']), theme: 'grid' });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 15);
            doc.save(`${reportID}_Tajho_v17.pdf`);
            location.reload();
        }

        function renderHistory() {
            const cont = document.getElementById('hist-container');
            const storage = JSON.parse(localStorage.getItem('tajho_v17_data') || '[]');
            cont.innerHTML = storage.map(h => `
                <div class="neo-card bg-white p-6 flex justify-between items-center">
                    <div>
                        <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">${h.fecha}</p>
                        <h4 class="font-black text-slate-900 text-sm mt-1">${h.id}</h4>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-black text-blue-600 font-mono">${h.tiempo}</p>
                        <p class="text-[7px] font-bold text-slate-300 uppercase">Duración</p>
                    </div>
                </div>`).join('');
        }
    </script>
</body>
</html>
