<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v47 - Flow Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --slate-bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #0f172a; overflow: hidden; }
        
        .card-modern { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.04); }
        .input-clean { background: var(--slate-bg); border-radius: 1rem; border: 2px solid transparent; font-weight: 700; transition: 0.3s; padding: 0.8rem 1.2rem; font-size: 0.85rem; width: 100%; }
        .input-clean:focus { border-color: var(--blue); background: white; outline: none; }
        
        /* Capas de Navegación */
        .view { display: none; height: 100vh; overflow-y: auto; padding: 1.5rem; padding-top: 5rem; }
        .view.active { display: block; animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal Moderno */
        #modal-confirm { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 2rem; }
        #modal-confirm.open { display: flex; }

        /* Barras de Carga */
        .progress-track { background: #e2e8f0; border-radius: 10px; overflow: hidden; height: 8px; }
        .progress-bar { height: 100%; background: var(--blue); transition: width 0.6s ease; position: relative; }
        .progress-bar::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: shine 2s infinite; }
        @keyframes shine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full h-20 px-6 flex justify-between items-center bg-white/80 backdrop-blur-md z-[1000] border-b border-slate-50">
        <button onclick="goHome()" class="p-3 bg-slate-50 rounded-xl active:scale-90 transition-all">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <div class="text-center">
            <h3 class="text-[11px] font-black tracking-widest italic uppercase">Tajho<span class="text-blue-600">.OS</span></h3>
        </div>
        <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white font-black text-[10px]">T</div>
    </header>

    <div id="view-home" class="view active">
        <header class="mb-10 mt-10">
            <p class="text-[10px] font-black text-blue-600 uppercase tracking-[.4em] mb-2">Panel Principal</p>
            <h1 class="text-4xl font-[800] tracking-tighter leading-tight italic">¿Qué hacemos<br><span class="text-blue-600">hoy, Tajho?</span></h1>
        </header>
        <div class="space-y-4">
            <button onclick="navTo('crear')" class="card-modern w-full p-6 flex items-center gap-5 active:bg-slate-50">
                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 font-bold">C</div>
                <div class="text-left"><p class="text-[11px] font-black uppercase">Contenedor</p><p class="text-[9px] text-slate-400 font-bold uppercase italic">Crear Manifiesto</p></div>
            </button>
            <button onclick="navTo('historial')" class="card-modern w-full p-6 flex items-center gap-5 active:bg-slate-50">
                <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 font-bold">H</div>
                <div class="text-left"><p class="text-[11px] font-black uppercase">Historial</p><p class="text-[9px] text-slate-400 font-bold uppercase italic">Descargas y Reportes</p></div>
            </button>
            <button class="card-modern w-full p-6 flex items-center gap-5 opacity-50">
                <div class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-400 font-bold">D</div>
                <div class="text-left"><p class="text-[11px] font-black uppercase">Devoluciones</p><p class="text-[9px] text-slate-400 font-bold uppercase italic">Próximamente</p></div>
            </button>
        </div>
    </div>

    <div id="view-crear" class="view">
        <div class="card-modern p-6 space-y-4">
            <h2 class="text-[11px] font-black text-blue-600 uppercase tracking-widest">Nuevo Manifiesto</h2>
            <div class="relative">
                <input type="text" id="s-sku" oninput="smartSearch()" class="input-clean" placeholder="BUSCAR SKU..." autocomplete="off">
                <div id="search-results" class="hidden absolute z-50 w-full bg-white mt-2 rounded-2xl shadow-2xl border border-slate-100 max-h-40 overflow-y-auto"></div>
            </div>
            <input type="text" id="s-desc" class="input-clean text-[9px] text-blue-600 font-bold" placeholder="DESCRIPCIÓN" readonly>
            <input type="number" id="s-meta" class="input-clean" placeholder="CANTIDAD META">
            <button onclick="addMani()" class="w-full bg-slate-900 text-white py-4 rounded-xl text-[10px] font-black uppercase tracking-[.2em]">Vincular Item</button>
            
            <div id="pre-list" class="space-y-2 pt-4"></div>
            
            <button onclick="openConfirm()" id="btn-finalizar-crear" class="hidden w-full bg-blue-600 text-white py-5 rounded-2xl text-[11px] font-black uppercase shadow-xl tracking-[.2em] mt-4">Finalizar Manifiesto</button>
        </div>
    </div>

    <div id="view-historial" class="view">
        <h2 class="text-xl font-black italic mb-6">HISTORIAL DE <span class="text-blue-600">CARGAS</span></h2>
        <div id="history-list" class="space-y-4"></div>
    </div>

    <div id="view-ops" class="view">
        <div class="card-modern p-6 space-y-6 text-center">
            <div class="bg-slate-50 rounded-[2rem] p-5 border border-slate-100">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-3">Estado de Descarga</p>
                <div class="progress-track"><div id="global-bar" class="progress-bar" style="width: 0%"></div></div>
                <div class="flex justify-between mt-3 px-1"><p id="global-pc" class="text-[10px] font-black text-blue-600">0%</p><p id="items-pending-label" class="text-[9px] font-bold text-slate-400">0 SKUS</p></div>
            </div>
            <select id="sel-sku" onchange="syncItem()" class="text-3xl font-black bg-transparent outline-none text-slate-900 text-center italic w-full"></select>
            <p id="live-desc" class="text-[9px] font-black text-blue-600 uppercase tracking-widest opacity-60"></p>
            <div class="flex flex-col items-center gap-4">
                <div class="flex items-center gap-4">
                    <input type="number" id="qty-in" class="input-clean w-24 text-center text-3xl h-16 shadow-inner" placeholder="0">
                    <button onclick="registrarBulto()" class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-xl active:scale-75 transition-all">+</button>
                </div>
                <div class="grid grid-cols-2 gap-4 w-full border-t border-slate-50 pt-4">
                    <div class="bg-slate-50 p-3 rounded-2xl"><p class="text-[8px] font-black text-slate-300 uppercase mb-1">Faltan</p><p id="live-rem" class="text-xl font-black">0</p></div>
                    <div class="bg-blue-50 p-3 rounded-2xl"><p class="text-[8px] font-black text-blue-400 uppercase mb-1">Real</p><p id="live-real" class="text-xl font-black text-blue-600">0</p></div>
                </div>
            </div>
            <button onclick="checkFinalDescarga()" id="btn-save-descarga" class="w-full bg-slate-900 text-white py-4 rounded-xl text-[10px] font-black tracking-widest uppercase">Guardar y Generar PDF</button>
        </div>
    </div>

    <div id="modal-confirm">
        <div class="card-modern w-full max-w-sm p-8 text-center animate-bounceIn">
            <h3 class="text-lg font-black italic mb-4">¿QUÉ DESEAS HACER?</h3>
            <p class="text-xs text-slate-400 font-bold mb-8 uppercase tracking-tighter">El manifiesto está listo para procesar</p>
            <div class="space-y-3">
                <button onclick="continuarConteo()" class="w-full bg-blue-600 text-white py-4 rounded-2xl text-[11px] font-black uppercase shadow-lg">Continuar Conteo</button>
                <button onclick="guardarContenedor()" class="w-full bg-slate-900 text-white py-4 rounded-2xl text-[11px] font-black uppercase">Guardar en Historial</button>
                <button onclick="closeConfirm()" class="w-full text-slate-400 py-2 text-[10px] font-black uppercase tracking-widest">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let raw_data = [];
        let db_tajho = {};
        let currentMani = JSON.parse(localStorage.getItem('tajho_current')) || [];
        let history = JSON.parse(localStorage.getItem('tajho_history')) || [];
        let activeJob = JSON.parse(localStorage.getItem('tajho_active_job')) || null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                raw_data = await res.json();
                raw_data.forEach(r => { if(r.CODIGO) db_tajho[r.CODIGO.toString().toUpperCase().trim()] = r.DESCRIPCION; });
                
                // RESTAURAR ESTADO SI EXISTE
                const lastView = localStorage.getItem('tajho_view') || 'home';
                if(lastView === 'ops') startWork(activeJob);
                else navTo(lastView);
            } catch (e) { console.warn("Modo Offline"); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            localStorage.setItem('tajho_view', v);
            if(v === 'historial') renderHistory();
            if(v === 'crear') renderPreList();
        }

        function goHome() { navTo('home'); }

        // LÓGICA DE CREACIÓN
        function smartSearch() {
            const input = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('search-results');
            if(input.length < 1) { resDiv.classList.add('hidden'); return; }
            const matches = raw_data.filter(i => String(i.CODIGO).toUpperCase().includes(input) || String(i.DESCRIPCION).toUpperCase().includes(input)).slice(0,5);
            resDiv.innerHTML = matches.map(m => `<div onclick="selectProduct('${m.CODIGO}','${m.DESCRIPCION}')" class="p-4 border-b border-slate-50 active:bg-blue-50 text-[10px] font-black uppercase">${m.CODIGO} - ${m.DESCRIPCION}</div>`).join('');
            resDiv.classList.remove('hidden');
        }

        function selectProduct(s,d) {
            document.getElementById('s-sku').value = s; document.getElementById('s-desc').value = d;
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_tajho[sku] || "GENERICO", meta, real: 0 });
            localStorage.setItem('tajho_current', JSON.stringify(currentMani));
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderPreList() {
            document.getElementById('pre-list').innerHTML = currentMani.map(i => `<div class="p-4 bg-slate-50 rounded-xl text-[10px] font-black uppercase">${i.sku} <span class="text-blue-600">→ ${i.meta} CJ</span></div>`).join('');
            if(currentMani.length > 0) document.getElementById('btn-finalizar-crear').classList.remove('hidden');
        }

        // LÓGICA DE MODAL Y GUARDADO
        function openConfirm() { document.getElementById('modal-confirm').classList.add('open'); }
        function closeConfirm() { document.getElementById('modal-confirm').classList.remove('open'); }

        function continuarConteo() {
            closeConfirm();
            activeJob = { id: Date.now(), items: [...currentMani], status: 'PROCESO' };
            localStorage.setItem('tajho_active_job', JSON.stringify(activeJob));
            startWork(activeJob);
        }

        function guardarContenedor() {
            closeConfirm();
            history.push({ id: Date.now(), name: "CONT-" + new Date().toLocaleTimeString(), items: [...currentMani], status: 'PENDIENTE' });
            localStorage.setItem('tajho_history', JSON.stringify(history));
            currentMani = []; localStorage.removeItem('tajho_current');
            navTo('historial');
        }

        // LÓGICA DE HISTORIAL
        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="card-modern p-6 flex justify-between items-center">
                    <div><p class="text-[9px] font-black text-blue-600 uppercase mb-1">${h.status}</p><h4 class="text-sm font-black italic uppercase">${h.name}</h4></div>
                    <button onclick="startWorkById(${h.id})" class="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase">Descarga</button>
                </div>
            `).join('');
        }

        function startWorkById(id) {
            activeJob = history.find(x => x.id === id);
            localStorage.setItem('tajho_active_job', JSON.stringify(activeJob));
            startWork(activeJob);
        }

        // LÓGICA DE DESCARGA (OPS)
        function startWork(job) {
            navTo('ops');
            document.getElementById('sel-sku').innerHTML = job.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem();
        }

        function syncItem() {
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('live-desc').innerText = item.desc;
            document.getElementById('live-rem').innerText = item.meta - item.real;
            document.getElementById('live-real').innerText = item.real;

            const tMeta = activeJob.items.reduce((a,b) => a+b.meta,0);
            const tReal = activeJob.items.reduce((a,b) => a+b.real,0);
            const pc = Math.min(Math.round((tReal/tMeta)*100), 100);
            document.getElementById('global-bar').style.width = pc + "%";
            document.getElementById('global-pc').innerText = pc + "%";
            document.getElementById('items-pending-label').innerText = activeJob.items.filter(x => x.real < x.meta).length + " SKUS";
            localStorage.setItem('tajho_active_job', JSON.stringify(activeJob));
        }

        function registrarBulto() {
            const q = parseInt(document.getElementById('qty-in').value);
            if(!q) return;
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += q;
            document.getElementById('qty-in').value = '';
            syncItem();
            navigator.vibrate(30);
            fetch(CLOUD_URL, {method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: 'CARGA', datos: [new Date().toLocaleString(), item.sku, q] })});
        }

        function checkFinalDescarga() {
            generatePDF();
            activeJob.status = 'COMPLETADO';
            // Actualizar en historial
            const idx = history.findIndex(h => h.id === activeJob.id);
            if(idx !== -1) history[idx] = activeJob;
            else history.push(activeJob);
            
            localStorage.setItem('tajho_history', JSON.stringify(history));
            localStorage.removeItem('tajho_active_job');
            alert("Descarga Guardada y PDF Generado");
            navTo('historial');
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.text("REPORTE DE DESCARGA TAJHO.OS", 14, 20);
            doc.setFontSize(10); doc.text("Contenedor: " + activeJob.name, 14, 30);
            
            const tableData = activeJob.items.map(i => [i.sku, i.desc, i.meta, i.real, i.meta - i.real]);
            doc.autoTable({
                startY: 40,
                head: [['SKU', 'DESCRIPCIÓN', 'META', 'REAL', 'DIF']],
                body: tableData,
                theme: 'grid'
            });
            
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, doc.lastAutoTable.finalY + 20);
            doc.text("Asist. Inventario Logístico", 14, doc.lastAutoTable.finalY + 25);
            doc.save(`REPORTE_${activeJob.name}.pdf`);
        }

        init();
    </script>
</body>
</html>
