<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA LOGÍSTICO - ANGELO NUÑEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #000000; --accent: #2563eb; --success: #10b981; --border: #e5e7eb; --bg: #ffffff; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #111827; margin: 0; padding: 0; overflow-x: hidden; }
        
        .header { padding: 30px 20px; border-bottom: 2px solid var(--primary); background: #fff; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 1.4rem; margin: 0; font-weight: 900; letter-spacing: -1px; }
        .header p { font-size: 0.7rem; color: #6b7280; margin: 5px 0 0; font-weight: 700; text-transform: uppercase; }
        
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        .sync-box { background: #fafafa; border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 25px; text-align: center; }
        .sync-box textarea { width: 100%; padding: 15px; border: 1px solid #d1d5db; border-radius: 12px; font-family: monospace; font-size: 0.75rem; box-sizing: border-box; resize: none; background: #fff; }
        .btn-load { width: 100%; margin-top: 15px; padding: 16px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }

        .item-card { background: #fff; border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 15px; transition: 0.3s; }
        .item-card.exacto { border-color: var(--success); background: #f0fdf4; }
        
        .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
        .sku-name { font-weight: 900; font-size: 1.1rem; color: #000; display: block; }
        .sku-desc { font-size: 0.65rem; color: #6b7280; font-weight: 600; text-transform: uppercase; margin-top: 2px; display: block; }
        .sku-status { font-size: 0.6rem; font-weight: 800; padding: 4px 8px; border-radius: 6px; background: #f3f4f6; }
        .item-card.exacto .sku-status { background: var(--success); color: white; }

        .card-body { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 10px; }
        .qty-info { display: flex; gap: 20px; }
        .qty-col { text-align: center; }
        .qty-label { font-size: 0.55rem; color: #9ca3af; font-weight: 800; display: block; text-transform: uppercase; }
        .qty-num { font-size: 1.2rem; font-weight: 900; }

        .btn-plus { background: #f3f4f6; color: #000; border: none; width: 55px; height: 55px; border-radius: 16px; font-size: 1.5rem; font-weight: 900; cursor: pointer; }
        .item-card.exacto .btn-plus { background: transparent; color: var(--success); font-size: 1.8rem; }

        .progress-container { width: 100%; height: 8px; background: #f3f4f6; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .item-card.exacto .progress-bar { background: var(--success); width: 100% !important; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: rgba(255,255,255,0.95); border-top: 1px solid var(--border); backdrop-filter: blur(10px); }
        .btn-report { background: var(--primary); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 14px; font-weight: 800; font-size: 1rem; cursor: pointer; }
        
        /* Panel Numérico Táctil */
        #calc-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; }
        .calc-pad { background: #fff; width: 100%; max-width: 450px; border-radius: 30px 30px 0 0; padding: 25px; }
        .calc-display { background: #f3f4f6; padding: 20px; border-radius: 15px; font-size: 2.5rem; font-weight: 900; text-align: right; margin-bottom: 20px; color: #000; }
        .calc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .calc-btn { background: #f9fafb; border: 1px solid #e5e7eb; padding: 20px; font-size: 1.6rem; font-weight: 800; border-radius: 15px; text-align: center; }
        .calc-btn.action { background: #000; color: #fff; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="calc-overlay" class="hidden" onclick="cerrarCalc(event)">
    <div class="calc-pad" onclick="event.stopPropagation()">
        <div style="text-align:center; font-size:0.7rem; color:#9ca3af; margin-bottom:10px; font-weight:800;">INGRESAR CAJAS RECIBIDAS</div>
        <div class="calc-display" id="calc-display">0</div>
        <div class="calc-grid">
            <div class="calc-btn" onclick="pressN(1)">1</div><div class="calc-btn" onclick="pressN(2)">2</div><div class="calc-btn" onclick="pressN(3)">3</div>
            <div class="calc-btn" onclick="pressN(4)">4</div><div class="calc-btn" onclick="pressN(5)">5</div><div class="calc-btn" onclick="pressN(6)">6</div>
            <div class="calc-btn" onclick="pressN(7)">7</div><div class="calc-btn" onclick="pressN(8)">8</div><div class="calc-btn" onclick="pressN(9)">9</div>
            <div class="calc-btn action" onclick="clearCalc()">C</div><div class="calc-btn" onclick="pressN(0)">0</div><div class="calc-btn action" onclick="confirmarCalc()">OK</div>
        </div>
    </div>
</div>

<div class="header">
    <p>Asist. Inventario Logístico</p>
    <h1>J. ANGELO NUÑEZ</h1>
</div>

<div class="container">
    <div class="sync-box" id="sync-ui">
        <p style="font-size: 0.75rem; font-weight: 800; margin-bottom: 12px; color:#000;">PEGAR CÓDIGO DEL PACKING (JSON)</p>
        <textarea id="json-input" rows="4" placeholder="Copia el código de Gemini y pégalo aquí..."></textarea>
        <button class="btn-load" onclick="cargarPacking()">INICIAR CONTEO</button>
    </div>

    <div id="lista-conteo"></div>
    <div style="height: 120px;"></div>
</div>

<div class="footer hidden" id="footer-ui">
    <button class="btn-report" onclick="generarReporte()">GENERAR REPORTE AUTORIZADO</button>
</div>

<script>
    let db = [];
    let curIdx = null;
    let curVal = "";

    function cargarPacking() {
        try {
            db = JSON.parse(document.getElementById('json-input').value);
            document.getElementById('sync-ui').classList.add('hidden');
            document.getElementById('footer-ui').classList.remove('hidden');
            render();
        } catch(e) { alert("Error: El código no es válido."); }
    }

    function render() {
        const container = document.getElementById('lista-conteo');
        container.innerHTML = "";
        db.forEach((item, i) => {
            const ok = item.fisico === item.pck;
            const cjFis = (item.fisico / item.u_por_caja);
            const porc = Math.min((item.fisico / item.pck) * 100, 100);
            
            container.innerHTML += `
                <div class="item-card ${ok ? 'exacto' : ''}">
                    <div class="card-header">
                        <div>
                            <span class="sku-name">${item.sku}</span>
                            <span class="sku-desc">${item.desc}</span>
                        </div>
                        <span class="sku-status">${ok ? 'RECIBIDO' : 'PENDIENTE'}</span>
                    </div>
                    <div class="card-body">
                        <div class="qty-info">
                            <div class="qty-col">
                                <span class="qty-label">CJ PCK</span>
                                <div class="qty-num" style="color:#9ca3af">${item.cajas_pck}</div>
                            </div>
                            <div class="qty-col">
                                <span class="qty-label">CJ FIS</span>
                                <div class="qty-num">${cjFis.toFixed(ok ? 0 : 1)}</div>
                            </div>
                        </div>
                        <button class="btn-plus" onclick="abrirCalc(${i})">${ok ? '✓' : '+'}</button>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" style="width: ${porc}%"></div>
                    </div>
                </div>
            `;
        });
    }

    function abrirCalc(i) {
        if(db[i].fisico === db[i].pck) return;
        curIdx = i; curVal = ""; actualizarDisplay();
        document.getElementById('calc-overlay').classList.remove('hidden');
    }

    function cerrarCalc() { document.getElementById('calc-overlay').classList.add('hidden'); }
    function pressN(n) { curVal += n; actualizarDisplay(); }
    function clearCalc() { curVal = ""; actualizarDisplay(); }
    function actualizarDisplay() { document.getElementById('calc-display').innerText = curVal || "0"; }

    function confirmarCalc() {
        if(!curVal || curIdx === null) return;
        const item = db[curIdx];
        db[curIdx].fisico += (parseFloat(curVal) * item.u_por_caja);
        cerrarCalc(); render();
    }

    function generarReporte() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Header PDF
        doc.setFillColor(0, 0, 0);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont("helvetica", "bold").setFontSize(22).text("REPORTE DE INBOUND", 15, 25);
        
        doc.setTextColor(0,0,0);
        doc.setFontSize(9).setFont("helvetica", "normal").text(`Emitido: ${new Date().toLocaleString()}`, 15, 48);

        const rows = db.map(i => [i.sku, i.desc, i.pck, i.fisico, i.fisico === i.pck ? "SÍ" : (i.fisico - i.pck)]);

        doc.autoTable({
            startY: 55,
            head: [['SKU', 'DESCRIPCIÓN', 'TOTAL PCK', 'TOTAL FIS', 'EXACTO']],
            body: rows,
            theme: 'grid',
            headStyles: { fillColor: [0, 0, 0], fontSize: 8 },
            styles: { fontSize: 7 }
        });

        const y = doc.lastAutoTable.finalY + 30;
        doc.line(15, y, 80, y);
        doc.setFontSize(10).setFont(undefined, 'bold').text("J. ANGELO NUÑEZ DURAND", 15, y + 7);
        doc.setFont(undefined, 'normal').text("Asist. Inventario Logístico Logística", 15, y + 12);
        doc.text("Revisión autorizada por el área de inventarios.", 15, y + 20);
        
        doc.save(`Inbound_Angelo_${Date.now()}.pdf`);
    }
</script>
</body>
</html>
