<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogiMaster Pro - Warehouse Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        .card-pro { @apply bg-white rounded-[2rem] shadow-sm border border-slate-200/60 p-5; }
        .input-pro { @apply w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-600 outline-none transition-all text-sm font-semibold; }
        .btn-main { @apply bg-slate-900 text-white font-bold py-4 px-6 rounded-2xl active:scale-95 transition-all shadow-xl flex items-center justify-center gap-2; }
        .hidden { display: none !important; }
        .active-nav { @apply text-blue-600 bg-blue-50/50 rounded-2xl; }
    </style>
</head>
<body class="pb-36">

    <header class="bg-white/70 backdrop-blur-xl sticky top-0 z-50 border-b border-slate-200/50 p-5 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-extrabold tracking-tighter">LOGIMASTER<span class="text-blue-600 italic">PRO</span></h1>
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Inventory Systems</p>
        </div>
        <div class="px-3 py-1 bg-slate-100 rounded-full border border-slate-200">
            <span class="text-[10px] font-black text-slate-600">v3.0 OP</span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-8">

        <section id="vista-ingreso" class="space-y-6">
            <header class="px-2">
                <h2 class="text-2xl font-extrabold tracking-tight">Ingreso de Contenedor</h2>
                <p class="text-xs text-slate-500">Contabilización de carga por pallet/bulto</p>
            </header>

            <div class="card-pro space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">ID del Contenedor</label>
                    <input type="text" id="cont_id" placeholder="EJ: MCU-99201" class="input-pro mt-1 uppercase">
                </div>
            </div>

            <div id="lista-pallets" class="space-y-4">
                </div>

            <button onclick="agregarPallet()" class="w-full py-4 border-2 border-dashed border-slate-300 rounded-3xl text-slate-400 font-bold text-xs hover:bg-slate-50 transition-colors">
                + REGISTRAR NUEVO PALLET / CARGA
            </button>

            <button onclick="guardarYGenerarPDF('CONTENEDOR')" class="btn-main w-full bg-blue-600 shadow-blue-200">
                <span>📄</span> GENERAR REPORTE OFICIAL
            </button>
        </section>

        <section id="vista-devolucion" class="space-y-6 hidden">
            <header class="px-2">
                <h2 class="text-2xl font-extrabold tracking-tight">Devoluciones</h2>
                <p class="text-xs text-slate-500">Recepción y revisión de mercadería</p>
            </header>

            <div class="card-pro space-y-4">
                <input type="text" id="dev_cliente" placeholder="Nombre del Cliente" class="input-pro">
                <input type="text" id="dev_vendedor" placeholder="Vendedor Responsable" class="input-pro">
            </div>

            <div id="lista-devolucion" class="space-y-4"></div>
            
            <button onclick="agregarFilaDev()" class="w-full py-4 border-2 border-dashed border-orange-200 rounded-3xl text-orange-400 font-bold text-xs">
                + AÑADIR PRODUCTO DEVUELTO
            </button>
            <button onclick="guardarYGenerarPDF('DEVOLUCION')" class="btn-main bg-slate-800">
                REGISTRAR Y CREAR PDF
            </button>
        </section>

        <section id="vista-historial" class="space-y-6 hidden">
            <header class="px-2">
                <h2 class="text-2xl font-extrabold tracking-tight">Historial</h2>
                <input type="text" onkeyup="renderHistorial()" id="busqueda" placeholder="Buscar registros..." class="input-pro mt-4 shadow-sm border-none">
            </header>
            <div id="historial-lista" class="space-y-3"></div>
        </section>

    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white shadow-2xl rounded-[2.5rem] p-2 flex border border-slate-100">
        <button onclick="navegar('vista-ingreso', this)" class="active-nav flex-1 py-4 flex flex-col items-center">
            <span class="text-lg">⚓</span>
            <span class="text-[8px] font-black uppercase mt-1">Carga</span>
        </button>
        <button onclick="navegar('vista-devolucion', this)" class="flex-1 py-4 flex flex-col items-center text-slate-400">
            <span class="text-lg">🔄</span>
            <span class="text-[8px] font-black uppercase mt-1">Devolución</span>
        </button>
        <button onclick="navegar('vista-historial', this)" class="flex-1 py-4 flex flex-col items-center text-slate-400">
            <span class="text-lg">📁</span>
            <span class="text-[8px] font-black uppercase mt-1">Historial</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;

        // Base de Datos Maestra
        const maestra = [
            { cod: "1010", desc: "ZAPATILLA SPORT TR-X", pack: "12x1" },
            { cod: "2020", desc: "BOXER ALGODÓN TAJHO", pack: "24x1" },
            { cod: "3030", desc: "GORRA URBAN PRO", pack: "50x1" }
        ];

        let registros = JSON.parse(localStorage.getItem('logi_db')) || [];

        function navegar(id, btn) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav', 'text-blue-600'));
            btn.classList.add('active-nav', 'text-blue-600');
            if(id === 'vista-historial') renderHistorial();
        }

        function agregarPallet() {
            const cont = document.getElementById('lista-pallets');
            const div = document.createElement('div');
            div.className = "card-pro border-l-4 border-blue-500 animate-in fade-in duration-300";
            div.innerHTML = `
                <div class="flex justify-between mb-3 border-b border-slate-50 pb-2">
                    <span class="text-[10px] font-black text-blue-600 uppercase italic">Pallet / Bulto</span>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-slate-300 text-xs">Eliminar</button>
                </div>
                <div class="space-y-3">
                    <input type="text" oninput="buscarProd(this)" placeholder="Código del Producto" class="input-pro text-xs uppercase">
                    <div class="p-3 bg-blue-50 rounded-xl text-[10px] font-bold text-blue-800 desc-p italic">Esperando código...</div>
                    <div class="flex gap-2">
                        <input type="number" placeholder="Cantidad" class="w-1/2 p-3 bg-white border border-slate-200 rounded-xl text-center font-bold text-blue-600 q-val">
                        <select class="w-1/2 p-3 bg-white border border-slate-200 rounded-xl text-[10px] font-bold status-val">
                            <option>BUENO</option>
                            <option>DAÑADO</option>
                        </select>
                    </div>
                </div>
            `;
            cont.appendChild(div);
        }

        function buscarProd(input) {
            const match = maestra.find(p => p.cod === input.value.toUpperCase());
            const label = input.nextElementSibling;
            if(match) {
                label.innerText = match.desc + " | PACK: " + match.pack;
                label.classList.replace('text-slate-500', 'text-blue-800');
            } else {
                label.innerText = "Producto no registrado";
                label.classList.replace('text-blue-800', 'text-slate-500');
            }
        }

        function guardarYGenerarPDF(tipo) {
            const docId = tipo === 'CONTENEDOR' ? document.getElementById('cont_id').value : document.getElementById('dev_cliente').value;
            if(!docId) return alert("Falta el identificador (Contenedor o Cliente)");

            // Capturar datos para el PDF
            const doc = new jsPDF();
            doc.setFontSize(18);
            doc.text("REPORTE LOGÍSTICO PROFESIONAL", 14, 22);
            doc.setFontSize(10);
            doc.text(`Tipo: ${tipo} | ID: ${docId}`, 14, 30);
            doc.text(`Fecha: ${new Date().toLocaleDateString()}`, 14, 35);

            // Simulación de tabla en PDF
            const headers = [["Código", "Producto", "Cant", "Estado"]];
            const data = [["Ejemplo", "Producto Revisado", "100", "Óptimo"]];

            doc.autoTable({
                startY: 45,
                head: headers,
                body: data,
                theme: 'grid',
                headStyles: { fillColor: [30, 58, 138] }
            });

            // Pie de página oficial
            const finalY = doc.lastAutoTable.finalY + 20;
            doc.setFont("helvetica", "italic");
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, finalY);

            // Guardar en Historial
            const nuevo = { id: docId, tipo: tipo, fecha: new Date().toLocaleDateString() };
            registros.unshift(nuevo);
            localStorage.setItem('logi_db', JSON.stringify(registros));

            doc.save(`Reporte_${docId}.pdf`);
            alert("PDF Generado y Registro Guardado.");
        }

        window.onload = () => { agregarPallet(); };
    </script>
</body>
</html>
