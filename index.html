<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twins Elite Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --primary: #0F172A; --bg: #F8FAFC; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--primary); -webkit-tap-highlight-color: transparent; user-select: none; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); position: sticky; top: 0; z-index: 50; }
        .native-card { background: #FFFFFF; border-radius: 24px; border: 1px solid #E2E8F0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .native-card:active { transform: scale(0.97); }
        .search-bar { background: #FFFFFF; border: 1.5px solid #E2E8F0; border-radius: 18px; transition: all 0.2s ease; }
        .fab-sync { position: fixed; bottom: 100px; right: 25px; width: 64px; height: 64px; background: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.2); z-index: 40; }
        .modal-full { display: none; position: fixed; inset: 0; background: #F1F5F9; z-index: 100; flex-direction: column; animation: slideIn 0.3s cubic-bezier(0.32, 0.72, 0, 1); }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #audit-view { display: none; position: fixed; inset: 0; background: #F8FAFC; z-index: 1000; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .audit-item-card { background: #FFFFFF; border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid #F1F5F9; box-shadow: 0 4px 10px -2px rgba(0,0,0,0.03); position: relative; overflow: hidden; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-top: 1px solid #E2E8F0; display: flex; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); z-index: 90; box-shadow: 0 -4px 20px rgba(0,0,0,0.03); border-radius: 30px 30px 0 0;}
        .nav-btn { flex: 1; padding: 16px 0; display: flex; flex-col; align-items: center; justify-content: center; color: #94A3B8; transition: all 0.3s ease; }
        .nav-btn.active { color: #2563EB; }
        .nav-btn i { font-size: 24px; margin-bottom: 4px; transition: transform 0.2s; }
        .nav-btn.active i { transform: translateY(-2px); }
        .nav-btn span { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="antialiased">

    <div class="glass-header safe-area-top px-6 py-4 mb-2">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p id="top-subtitle" class="text-[10px] font-[800] text-blue-600 uppercase tracking-widest">Almacén Pro</p>
                <h1 class="text-xl font-[800] text-slate-900 tracking-tight">Twins Elite</h1>
            </div>
            <div id="top-progress" class="relative flex items-center justify-center">
                <svg class="w-12 h-12">
                    <circle class="text-slate-100" stroke-width="4" stroke="currentColor" fill="transparent" r="20" cx="24" cy="24"/>
                    <circle id="global-ring" class="text-blue-600 progress-ring" stroke-width="4" stroke-dasharray="125.6" stroke-dashoffset="125.6" stroke-linecap="round" stroke="currentColor" fill="transparent" r="20" cx="24" cy="24"/>
                </svg>
                <span id="global-perc" class="absolute text-[10px] font-[800]">0%</span>
            </div>
        </div>
    </div>

    <div id="module-audit" class="max-w-md mx-auto px-6 pb-32">
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white p-4 rounded-[22px] border border-slate-100 shadow-sm">
                <i class="ph-fill ph-package text-blue-500 text-xl mb-2"></i>
                <p id="stat-containers" class="text-2xl font-[800] text-slate-900">0</p>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Cargas Activas</p>
            </div>
            <div class="bg-white p-4 rounded-[22px] border border-slate-100 shadow-sm">
                <i class="ph-fill ph-barcode text-purple-500 text-xl mb-2"></i>
                <p id="stat-skus" class="text-2xl font-[800] text-slate-900">0</p>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">SKUs Registrados</p>
            </div>
        </div>

        <div class="flex gap-2 mb-8">
            <div class="flex-1 search-bar flex items-center px-4 py-1">
                <i class="ph-bold ph-magnifying-glass text-slate-400 mr-3"></i>
                <input type="text" id="main-search" oninput="core.render()" placeholder="N° Contenedor, SKU..." class="w-full py-3 bg-transparent outline-none font-semibold text-sm text-slate-700">
            </div>
            <div class="w-14 h-14 bg-white border border-slate-100 rounded-[18px] flex items-center justify-center relative">
                <i class="ph-bold ph-calendar-blank text-slate-400 text-xl"></i>
                <select id="month-select" onchange="core.filterMonth(this.value)" class="absolute inset-0 opacity-0 cursor-pointer"></select>
            </div>
        </div>
        <div id="container-list" class="space-y-4"><div class="py-20 text-center text-slate-400 font-medium">Cargando inventario...</div></div>
        <button onclick="core.fetchData()" class="fab-sync"><i id="sync-icon" class="ph-bold ph-arrows-clockwise text-white text-2xl"></i></button>
    </div>

    <div id="module-returns" class="hidden max-w-md mx-auto px-6 pb-32">
        
        <div class="flex bg-slate-200/50 rounded-xl p-1 mb-6">
            <button onclick="core.returns.switchTab('new')" id="tab-dev-new" class="flex-1 py-2.5 text-[11px] font-black uppercase tracking-widest rounded-lg bg-white shadow-sm text-blue-600 transition-all">Nuevo Ticket</button>
            <button onclick="core.returns.switchTab('history')" id="tab-dev-hist" class="flex-1 py-2.5 text-[11px] font-black uppercase tracking-widest rounded-lg text-slate-500 transition-all">Historial</button>
        </div>

        <div id="dev-new-section">
            <div class="bg-white rounded-[24px] p-6 border border-slate-100 shadow-sm mb-6">
                <h2 class="text-sm font-black uppercase tracking-widest text-slate-900 mb-6 flex items-center gap-2"><i class="ph-bold ph-file-text text-blue-600 text-lg"></i> Datos del Ticket</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1">Cliente</label>
                        <input type="text" id="dev-cliente" oninput="core.returns.saveDraft()" onblur="core.returns.suggestVendor()" placeholder="Nombre del cliente" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold outline-none focus:border-blue-500 transition-colors">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1">Vendedor</label>
                        <select id="dev-vendedor" onchange="core.returns.saveDraft()" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold outline-none focus:border-blue-500 transition-colors appearance-none">
                            <option value="" disabled selected>Seleccione un vendedor</option>
                            <option value="ELIAS AVILA">ELIAS AVILA</option>
                            <option value="EVELYN MURO">EVELYN MURO</option>
                            <option value="REGULO ANTEZANA">REGULO ANTEZANA</option>
                            <option value="JHAYRO MAURICIO">JHAYRO MAURICIO</option>
                            <option value="PAULA GARCIA">PAULA GARCIA</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1">Motivo de Devolución</label>
                        <input type="text" id="dev-motivo" oninput="core.returns.saveDraft()" placeholder="Ej: Cambio de talla, Garantía..." class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold outline-none focus:border-blue-500 transition-colors">
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[24px] p-6 border border-slate-100 shadow-sm mb-6">
                <h2 class="text-sm font-black uppercase tracking-widest text-slate-900 mb-6 flex items-center gap-2"><i class="ph-bold ph-package text-blue-600 text-lg"></i> Agregar Producto</h2>
                <div class="space-y-4">
                    <div class="relative">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1">Producto (Código o Desc)</label>
                        <div class="relative mt-1">
                            <i class="ph-bold ph-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                            <input type="text" id="dev-prod-search" oninput="core.returns.searchProduct()" onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.blur(); }" placeholder="Buscar en Hoja 1..." class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm font-semibold outline-none focus:border-blue-500 transition-colors">
                        </div>
                        <div id="dev-prod-results" class="absolute z-10 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg max-h-48 overflow-y-auto hidden"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1">Cant (U/M)</label>
                            <input type="number" id="dev-cantidad" placeholder="0" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-black text-center outline-none focus:border-blue-500 transition-colors">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1">Estado</label>
                            <select id="dev-estado" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold outline-none focus:border-blue-500 transition-colors appearance-none">
                                <option value="BUEN ESTADO">Buen Estado</option>
                                <option value="DAÑADO A MERMA">Dañado a Merma</option>
                                <option value="INCOMPLETO">Incompleto</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1">Observaciones</label>
                        <textarea id="dev-obs" rows="2" placeholder="Detalles adicionales..." class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold outline-none focus:border-blue-500 transition-colors"></textarea>
                    </div>
                    <button onclick="core.returns.addItem()" class="w-full bg-blue-50 text-blue-600 h-12 rounded-xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition-transform flex items-center justify-center gap-2">
                        <i class="ph-bold ph-plus-circle text-lg"></i> Agregar a la Lista
                    </button>
                </div>
            </div>

            <div id="dev-items-list" class="space-y-3 mb-6"></div>

            <button id="dev-btn-save" onclick="core.returns.saveReturn()" class="w-full bg-slate-900 text-white h-14 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg active:scale-95 transition-transform hidden">
                Generar Devolución
            </button>
        </div>

        <div id="dev-hist-section" class="hidden">
            <div class="search-bar flex items-center px-4 py-1 mb-6">
                <i class="ph-bold ph-magnifying-glass text-slate-400 mr-3"></i>
                <input type="text" id="dev-hist-search" oninput="core.returns.renderHistory()" placeholder="Buscar cliente o código..." class="w-full py-3 bg-transparent outline-none font-semibold text-sm text-slate-700">
            </div>
            <div id="dev-hist-list" class="space-y-4">
                <div class="py-10 text-center text-slate-400 font-medium">Sincronizando historial...</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="core.nav.go('audit')" id="nav-audit" class="nav-btn active flex flex-col items-center">
            <i class="ph-fill ph-boxes"></i><span>Auditoría</span>
        </button>
        <button onclick="core.nav.go('returns')" id="nav-returns" class="nav-btn flex flex-col items-center">
            <i class="ph-fill ph-arrow-u-up-left"></i><span>Devoluciones</span>
        </button>
    </div>

    <div id="audit-view">
        <div class="bg-white border-b border-slate-100 sticky top-0 z-50 shadow-sm">
            <div class="px-6 pt-10 pb-4 flex items-center justify-between">
                <button onclick="core.closeModal('audit-view')" class="text-slate-900 active:scale-90 transition-transform p-2 -ml-2"><i class="ph-bold ph-arrow-left text-2xl"></i></button>
                <div class="text-center">
                    <h2 id="audit-title" class="text-sm font-black uppercase tracking-widest text-slate-900">CARGA #---</h2>
                    <div class="flex items-center justify-center gap-1.5 mt-0.5"><i class="ph-fill ph-clock text-[12px] text-blue-500"></i><span id="audit-timer-display" class="text-[11px] font-bold font-mono tracking-widest text-slate-600">00:00</span></div>
                </div>
                <button onclick="core.toggleAuditSearch()" class="text-slate-900 active:scale-90 transition-transform p-2 -mr-2"><i class="ph-bold ph-magnifying-glass text-2xl"></i></button>
            </div>
            <div id="audit-search-bar" class="hidden px-6 pb-4">
                <input type="text" id="inner-search" oninput="core.filterAuditItems(this.value)" onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.blur(); }" placeholder="Buscar SKU..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold outline-none focus:border-blue-500 transition-colors">
            </div>
            <div class="px-6 pb-4">
                 <div class="flex justify-between items-end mb-1.5"><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Progreso del Contenedor</span><span id="audit-perc-text" class="text-[10px] font-black text-blue-600">0%</span></div>
                 <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden"><div id="audit-perc-bar" class="h-full bg-blue-600 transition-all duration-500" style="width:0%"></div></div>
            </div>
        </div>
        <div id="audit-items-container" class="flex-1 overflow-y-auto px-5 py-6 no-scrollbar"></div>
        <div class="p-6 bg-white border-t border-slate-100 safe-area-bottom flex gap-3 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
            <button onclick="core.generatePDF(core.activeCont)" class="w-14 h-14 bg-slate-50 text-slate-600 rounded-2xl flex items-center justify-center active:scale-95 transition-transform border border-slate-200"><i class="ph-bold ph-file-pdf text-2xl"></i></button>
            <button onclick="core.saveAndFinish()" class="flex-1 bg-slate-900 text-white h-14 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg active:scale-95 transition-transform">Finalizar Conteo</button>
        </div>
    </div>

    <div id="list-view" class="modal-full">
        <div class="px-6 py-8 flex items-center justify-between bg-white border-b">
            <button onclick="core.closeModal('list-view')" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center"><i class="ph-bold ph-x text-xl"></i></button>
            <div class="text-center"><h2 class="text-base font-[800] text-slate-900">Contenido del Contenedor</h2><p id="list-cont-id" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">--</p></div>
            <div class="w-12"></div>
        </div>
        <div id="list-items-content" class="flex-1 overflow-y-auto px-6 py-6 space-y-4 no-scrollbar pb-10"></div>
    </div>

    <script>
        const core = {
            url: "https://script.google.com/macros/s/AKfycbxlrzDTXdZYKtCyQhqn2qsapaKQ5uOzJda109rEYKCOcVITl0VE9O25SnXfT9gSdBYf/exec",
            raw: JSON.parse(localStorage.getItem('twins_cache')) || [],
            productsCache: JSON.parse(localStorage.getItem('twins_prod_cache')) || [],
            historyCache: JSON.parse(localStorage.getItem('twins_hist_cache')) || [],
            mesesNombre: ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"],
            currentMonth: "", activeCont: null, timerInterval: null,

            // --- NAVEGACIÓN Y PERSISTENCIA ---
            nav: {
                go: function(view) {
                    localStorage.setItem('twins_current_view', view);
                    document.getElementById('nav-audit').classList.remove('active');
                    document.getElementById('nav-returns').classList.remove('active');
                    document.getElementById('module-audit').classList.add('hidden');
                    document.getElementById('module-returns').classList.add('hidden');
                    
                    document.getElementById('nav-' + view).classList.add('active');
                    document.getElementById('module-' + view).classList.remove('hidden');
                    
                    if (view === 'returns') {
                        document.getElementById('top-subtitle').innerText = "Logística";
                        document.getElementById('top-progress').classList.add('hidden');
                        core.returns.loadDraft(); // Recupera datos al entrar
                        if (core.productsCache.length === 0) core.returns.fetchProducts();
                        core.returns.fetchHistory(); // Sincroniza historial
                    } else {
                        document.getElementById('top-subtitle').innerText = "Almacén Pro";
                        document.getElementById('top-progress').classList.remove('hidden');
                    }
                }
            },

            // GREEDY FINDERS PARA LEER HOJA 1 Y HOJA 3 SIN IMPORTAR EL NOMBRE DEL TÍTULO
            getDesc: function(item) {
                const keys = Object.keys(item);
                const descKey = keys.find(k => { const ck = k.toString().toUpperCase(); return ck.includes("DESC") || ck.includes("PROD") || ck.includes("DETALLE") || ck.includes("NOMB"); });
                return descKey ? item[descKey] : "---";
            },
            getCode: function(item) {
                const keys = Object.keys(item);
                const codeKey = keys.find(k => { const ck = k.toString().toUpperCase(); return ck.includes("COD") || ck.includes("SKU") || ck.includes("ART"); });
                return codeKey ? item[codeKey] : "---";
            },

            fetchData: async function(silent = false) {
                const btn = document.getElementById('sync-icon');
                if (!silent && btn) btn.classList.add('animate-spin'); 
                try {
                    const response = await fetch(this.url);
                    const data = await response.json();
                    if (data && Array.isArray(data)) {
                        this.raw = data.map(item => {
                            const isCompleted = item["ESTADO"] && item["ESTADO"].toString().toUpperCase() === "COMPLETADO";
                            const cached = this.raw.find(c => c["CODIGO"] === item["CODIGO"] && (c["CONTENEDOR"] || c["CONTENEDOR_LIMPIO"]) === (item["CONTENEDOR"] || item["CONTENEDOR_LIMPIO"]));
                            return { ...item, audit: isCompleted ? (parseInt(item["CAJAS"]) || 0) : (cached ? (cached.audit || 0) : 0), auditTime: cached ? (cached.auditTime || 0) : 0 };
                        });
                        localStorage.setItem('twins_cache', JSON.stringify(this.raw));
                        const auditView = document.getElementById('audit-view');
                        if (!auditView || auditView.style.display !== 'flex') this.render();
                    }
                } catch (e) { if (!silent) console.error(e); } finally { if (!silent && btn) btn.classList.remove('animate-spin'); }
            },

            getItemMonth: function(item) { const fecha = item["FECHA_LIMPIA"] || item["FECHA"] || ""; if (!fecha || fecha === "") return "EN PROGRAMACIÓN"; const partes = fecha.split("/"); if (partes.length < 2) return "EN PROGRAMACIÓN"; return this.mesesNombre[parseInt(partes[1]) - 1] || "EN PROGRAMACIÓN"; },
            filterMonth: function(m) { this.currentMonth = m; this.render(); },
            render: function() {
                const list = document.getElementById('container-list'); const search = document.getElementById('main-search').value.toLowerCase();
                if (!this.currentMonth) this.currentMonth = this.mesesNombre[new Date().getMonth()];
                const select = document.getElementById('month-select'); const uniqueMonths = new Set(this.raw.map(i => this.getItemMonth(i))); let options = `<option value="TODOS">TODOS</option>`;
                this.mesesNombre.forEach(m => { if(uniqueMonths.has(m)) options += `<option value="${m}" ${this.currentMonth===m?'selected':''}>${m}</option>`; });
                select.innerHTML = options;
                const groups = {}; let tTotalCj = 0, tTotalAud = 0; const tempGroups = {};
                this.raw.forEach(i => { const id = (i["CONTENEDOR"] || i["CONTENEDOR_LIMPIO"] || "S/N").toString(); if (!tempGroups[id]) tempGroups[id] = []; tempGroups[id].push(i); });
                Object.keys(tempGroups).forEach(contId => {
                    const items = tempGroups[contId];
                    if ((this.currentMonth === "TODOS" || this.currentMonth === this.getItemMonth(items[0])) && (contId.toLowerCase().includes(search) || items.some(i => (i["CODIGO"]&&i["CODIGO"].toString().toLowerCase().includes(search)) || this.getDesc(i).toLowerCase().includes(search)))) { groups[contId] = items; items.forEach(i => { tTotalCj += (parseInt(i["CAJAS"]) || 0); tTotalAud += (i.audit || 0); }); }
                });
                const globalP = tTotalCj > 0 ? Math.round((tTotalAud/tTotalCj)*100) : 0;
                document.getElementById('global-perc').innerText = globalP + "%"; document.getElementById('global-ring').style.strokeDashoffset = 125.6 - (125.6 * globalP) / 100;
                const ids = Object.keys(groups); document.getElementById('stat-containers').innerText = ids.length; document.getElementById('stat-skus').innerText = this.raw.length;
                if(ids.length === 0) { list.innerHTML = `<div class="py-10 text-center text-slate-400">Sin datos</div>`; return; }
                list.innerHTML = ids.map(id => {
                    const items = groups[id]; let t=0, a=0; items.forEach(i => { t+=(parseInt(i["CAJAS"])||0); a+=(i.audit||0); }); const perc = t>0 ? Math.round((a/t)*100) : 0; const esProg = this.getItemMonth(items[0]) === "EN PROGRAMACIÓN"; const isCompleted = items[0]["ESTADO"] && items[0]["ESTADO"].toString().toUpperCase() === "COMPLETADO";

            closeModal: function(id) { if (id === 'audit-view') { this.stopTimer(); localStorage.removeItem('twins_active_cont'); } document.getElementById(id).style.display = 'none'; },
            saveAndFinish: async function() { const confirmar = confirm(`¿Confirmas finalizar la auditoría de la carga #${this.activeCont}?`); if (!confirmar) return; this.stopTimer(); const items = this.raw.filter(i => (i["CONTENEDOR"] || i["CONTENEDOR_LIMPIO"]) == this.activeCont); let ts = 0; items.forEach(i => { if ((i.auditTime || 0) > ts) ts = i.auditTime; }); const h = Math.floor(ts / 3600); const m = Math.floor((ts % 3600) / 60); const s = ts % 60; const tF = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; const hoy = new Date(); const fD = `${String(hoy.getDate()).padStart(2, '0')}/${String(hoy.getMonth() + 1).padStart(2, '0')}/${hoy.getFullYear()}`; items.forEach(i => { i["ESTADO"] = "COMPLETADO"; i.auditTime = ts; i["FECHA_LIMPIA"] = fD; i["FECHA"] = fD; }); localStorage.setItem('twins_cache', JSON.stringify(this.raw)); localStorage.removeItem('twins_active_cont'); fetch(this.url, { redirect: "follow", method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: "completar_auditoria", contenedor: this.activeCont, tiempo: tF, fecha: fD }) }).catch(e => console.log(e)); this.closeModal('audit-view'); this.render(); window.scrollTo({ top: 0, behavior: 'smooth' }); },
            viewList: function(id) { const items = this.raw.filter(i => (i["CONTENEDOR"] || i["CONTENEDOR_LIMPIO"]) == id); document.getElementById('list-cont-id').innerText = "Ref: " + id; document.getElementById('list-items-content').innerHTML = items.map(item => ` <div class="bg-white px-6 py-5 rounded-[24px] border border-slate-100 flex justify-between items-center shadow-sm"> <div class="flex-1 pr-4"> <p class="text-[10px] font-[900] text-blue-600 mb-1 uppercase">${item["CODIGO"]}</p> <p class="text-xs font-bold text-slate-800 uppercase line-clamp-2">${this.getDesc(item)}</p> </div> <div class="text-right flex items-center gap-4"> <div class="flex flex-col items-end"> <span class="text-sm font-[900] ${item.audit >= item["CAJAS"] ? 'text-emerald-500' : 'text-slate-900'}">${item.audit || 0} / ${item["CAJAS"] || 0}</span> <span class="text-[7px] font-black text-slate-300 uppercase">Auditado</span> </div> <i class="ph-fill ph-check-circle ${item.audit >= item["CAJAS"] ? 'text-emerald-400' : 'text-slate-100'} text-2xl"></i> </div> </div> `).join(''); document.getElementById('list-view').style.display = 'flex'; },
            generatePDF: function(id) { const { jsPDF } = window.jspdf; const doc = new jsPDF(); const items = this.raw.filter(i => (i["CONTENEDOR"] || i["CONTENEDOR_LIMPIO"]) == id); if (!items || items.length === 0) return alert("Sin datos"); const f = items[0]["FECHA_LIMPIA"] || "PENDIENTE"; const ts = items[0].auditTime || 0; doc.setFontSize(22); doc.setTextColor(15, 23, 42); doc.text("TWINS ALMACEN", 14, 22); doc.setFontSize(9); doc.setTextColor(120); doc.text(`REPORTE DE AUDITORÍA • TAJHO • CONTENEDOR: ${id}`, 14, 30); const h = Math.floor(ts / 3600); const m = Math.floor((ts % 3600) / 60); const s = ts % 60; let tStr = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; if (h > 0) tStr = `${h.toString().padStart(2, '0')}:${tStr}`; doc.text(`FECHA: ${f} | TIEMPO DE DESCARGA: ${tStr}`, 14, 36); const body = items.map(i => [ i["CODIGO"], this.getDesc(i), i["CAJAS"]||0, i.audit||0, (i.audit||0)-(parseInt(i["CAJAS"])||0) ]); doc.autoTable({ startY: 42, head: [['SKU', 'DESCRIPCIÓN', 'TEO', 'AUD', 'DIF']], body: body, headStyles: { fillColor: [15, 23, 42], fontSize: 6, halign: 'center' }, styles: { fontSize: 5, cellPadding: 1 }, columnStyles: { 0: { cellWidth: 25 }, 1: { cellWidth: 90 }, 2: { halign: 'center' }, 3: { halign: 'center' }, 4: { halign: 'center' } } }); const finalY = doc.lastAutoTable.finalY + 15; doc.setFontSize(9); doc.setTextColor(15, 23, 42); doc.text("Revisión autorizada por:", 14, finalY); doc.setFont("helvetica", "bold"); doc.text("J. Angelo Nuñez Durand", 14, finalY + 6); doc.setFont("helvetica", "normal"); doc.text("Asist. Inventario Logístico", 14, finalY + 11); doc.save(`Reporte_Conteo_${id}.pdf`); }
        };

        window.onload = async () => {
            const currentView = localStorage.getItem('twins_current_view') || 'audit';
            if(core.raw.length > 0) { core.render(); const activeId = localStorage.getItem('twins_active_cont'); if(activeId) { core.openAudit(activeId); } }
            core.nav.go(currentView); // Nos regresa a la pestaña donde estábamos
            core.fetchData(true);
            setInterval(() => { core.fetchData(true); }, 10000);
            document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') core.fetchData(true); });
        };
    </script>
</body>
