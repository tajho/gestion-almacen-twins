<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAJHO.OS v48 - Master Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --slate-bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #0f172a; overflow: hidden; -webkit-font-smoothing: antialiased; }
        
        .card-modern { background: white; border-radius: 2.2rem; border: 1px solid #f1f5f9; box-shadow: 0 15px 35px -12px rgba(0,0,0,0.06); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .input-clean { background: var(--slate-bg); border-radius: 1.25rem; border: 2px solid transparent; font-weight: 700; transition: 0.3s; padding: 0.9rem 1.3rem; font-size: 0.85rem; width: 100%; }
        .input-clean:focus { border-color: var(--blue); background: white; outline: none; box-shadow: 0 0 0 4px rgba(37,99,235,0.05); }
        
        /* Navegación por Capas */
        .view { display: none; height: 100vh; overflow-y: auto; padding: 1.5rem; padding-top: 5.5rem; padding-bottom: 5rem; }
        .view.active { display: block; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* Barras con Efecto Shine */
        .progress-track { background: #e2e8f0; border-radius: 20px; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; background: var(--blue); transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); position: relative; }
        .progress-bar::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shine 2s infinite; }
        @keyframes shine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* Modal Moderno */
        #modal-confirm { position: fixed; inset: 0; z-index: 2000; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; padding: 2rem; }
        #modal-confirm.open { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full h-20 px-6 flex justify-between items-center bg-white/90 backdrop-blur-md z-[1000] border-b border-slate-50">
        <button onclick="goHome()" class="p-3 bg-slate-50 rounded-2xl text-slate-900 active:scale-90 transition-all">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <div class="text-center">
            <p id="top-label" class="text-[8px] font-black uppercase tracking-[0.4em] text-blue-600">SISTEMA</p>
            <h3 class="text-[11px] font-black tracking-widest italic uppercase">Tajho<span class="text-blue-600">.OS</span></h3>
        </div>
        <div class="w-11 h-11 bg-slate-900 rounded-2xl flex items-center justify-center text-white font-black text-xs shadow-xl shadow-slate-200">T</div>
    </header>

    <div id="view-home" class="view active">
        <header class="mb-12 mt-4">
            <p class="text-[10px] font-black text-blue-600 uppercase tracking-[.4em] mb-2">Logística Avanzada</p>
            <h1 class="text-5xl font-[800] tracking-tighter leading-[0.9] italic">¿Qué hacemos<br><span class="text-blue-600">hoy, Tajho?</span></h1>
        </header>
        <div class="space-y-4">
            <button onclick="navTo('crear')" class="card-modern w-full p-7 flex items-center gap-6 active:bg-slate-50">
                <div class="w-14 h-14 bg-blue-50 rounded-[1.4rem] flex items-center justify-center text-blue-600">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
                </div>
                <div class="text-left"><p class="text-sm font-black uppercase tracking-widest">Contenedor</p><p class="text-[10px] text-slate-400 font-bold italic uppercase">Crear nuevo manifiesto</p></div>
            </button>
            <button onclick="navTo('historial')" class="card-modern w-full p-7 flex items-center gap-6 active:bg-slate-50">
                <div class="w-14 h-14 bg-slate-50 rounded-[1.4rem] flex items-center justify-center text-slate-400">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
                </div>
                <div class="text-left"><p class="text-sm font-black uppercase tracking-widest">Historial</p><p class="text-[10px] text-slate-400 font-bold italic uppercase">Registros y Descargas</p></div>
            </button>
        </div>
    </div>

    <div id="view-crear" class="view">
        <div class="card-modern p-7 space-y-5">
            <h2 class="text-xs font-black text-blue-600 uppercase tracking-[.3em] mb-4 italic">Creación de Manifiesto</h2>
            <div class="relative">
                <input type="text" id="s-sku" oninput="smartSearch()" class="input-clean uppercase" placeholder="BUSCAR SKU..." autocomplete="off">
                <div id="search-results" class="hidden absolute z-50 w-full bg-white mt-2 rounded-2xl shadow-2xl border border-slate-100 max-h-48 overflow-y-auto"></div>
            </div>
            <input type="text" id="s-desc" class="input-clean text-[10px] text-blue-600 font-bold italic" placeholder="DESCRIPCIÓN AUTOMÁTICA" readonly>
            <input type="number" id="s-meta" class="input-clean" placeholder="CANTIDAD META">
            <button onclick="addMani()" class="w-full bg-slate-900 text-white py-5 rounded-2xl text-[11px] font-black uppercase tracking-[.2em] shadow-xl active:scale-95 transition-all">Vincular Item</button>
            
            <div id="pre-list" class="space-y-2 pt-4"></div>
            
            <button onclick="openConfirm()" id="btn-finalizar-crear" class="hidden w-full bg-blue-600 text-white py-5 rounded-2xl text-[11px] font-black uppercase shadow-xl tracking-[.2em] mt-6 animate-bounce">Finalizar Contenedor</button>
        </div>
    </div>

    <div id="view-historial" class="view">
        <div class="flex justify-between items-end mb-8">
            <h2 class="text-3xl font-[800] tracking-tighter italic">Historial<br><span class="text-blue-600">Cargas</span></h2>
            <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </div>
        </div>
        <div id="history-list" class="space-y-4"></div>
    </div>

    <div id="view-ops" class="view">
        <div class="card-modern p-7 space-y-7 text-center">
            <div class="bg-slate-50 rounded-[2.2rem] p-6 border border-slate-100 relative overflow-hidden">
                <div class="flex items-center gap-3 mb-4">
                    <div class="text-blue-600">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
                    </div>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.3em]">Avance de Descarga</p>
                </div>
                <div class="progress-track h-4 shadow-inner"><div id="global-bar" class="progress-bar rounded-full" style="width: 0%"></div></div>
                <div class="flex justify-between mt-4 px-1"><p id="global-pc" class="text-xs font-black text-blue-600 italic">0% COMPLETADO</p><p id="items-pending-label" class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">0 SKUS</p></div>
            </div>

            <div class="space-y-1">
                <select id="sel-sku" onchange="syncItem()" class="text-4xl font-[900] bg-transparent outline-none text-slate-900 text-center italic w-full tracking-tighter"></select>
                <p id="live-desc" class="text-[10px] font-black text-blue-600 uppercase tracking-widest opacity-60"></p>
            </div>

            <div class="flex flex-col items-center gap-6">
                <div class="flex items-center gap-5">
                    <input type="number" id="qty-in" class="input-clean w-28 text-center text-4xl h-20 shadow-inner" placeholder="0">
                    <button onclick="registrarBulto()" class="w-20 h-20 bg-blue-600 text-white rounded-[2rem] flex items-center justify-center shadow-2xl active:scale-75 transition-all">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-5 w-full border-t border-slate-50 pt-6">
                    <div class="bg-slate-50 p-4 rounded-3xl"><p class="text-[9px] font-black text-slate-300 uppercase tracking-widest mb-1">Restante</p><p id="live-rem" class="text-2xl font-black text-slate-800">0</p></div>
                    <div class="bg-blue-50/50 p-4 rounded-3xl border border-blue-100"><p class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-1">Cargado</p><p id="live-real" class="text-2xl font-black text-blue-600">0</p></div>
                </div>
            </div>
            <button onclick="checkFinalDescarga()" class="w-full bg-slate-900 text-white py-5 rounded-2xl text-[11px] font-black tracking-[.2em] uppercase shadow-xl active:scale-95 transition-all">Finalizar y Reportar</button>
        </div>
    </div>

    <div id="modal-confirm">
        <div class="card-modern w-full max-w-sm p-10 text-center transform scale-100 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.3)]">
            <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 mx-auto mb-6">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <h3 class="text-xl font-[800] italic mb-2 uppercase">Manifiesto Listo</h3>
            <p class="text-[10px] text-slate-400 font-bold mb-8 uppercase tracking-widest leading-relaxed">Selecciona la siguiente acción operativa</p>
            <div class="space-y-3">
                <button onclick="continuarConteo()" class="w-full bg-blue-600 text-white py-5 rounded-2xl text-[11px] font-black uppercase shadow-xl">Continuar Conteo</button>
                <button onclick="guardarContenedor()" class="w-full bg-slate-900 text-white py-5 rounded-2xl text-[11px] font-black uppercase">Guardar en Historial</button>
                <button onclick="closeConfirm()" class="w-full text-slate-400 py-2 text-[10px] font-black uppercase tracking-widest">Regresar</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzspD7G0ahM5Ahed3n2fHf_GWTXW4WahI5HMcVlixpEd3kpFTWCL9BICWdSqcUIuwL1Wg/exec";
        let raw_data = [];
        let db_tajho = {};
        let currentMani = JSON.parse(localStorage.getItem('tajho_current')) || [];
        let history = JSON.parse(localStorage.getItem('tajho_history')) || [];
        let activeJob = JSON.parse(localStorage.getItem('tajho_active_job')) || null;

        async function init() {
            try {
                const res = await fetch(CLOUD_URL);
                raw_data = await res.json();
                raw_data.forEach(r => { if(r.CODIGO) db_tajho[r.CODIGO.toString().toUpperCase().trim()] = r.DESCRIPCION; });
                
                const lastView = localStorage.getItem('tajho_view') || 'home';
                if(lastView === 'ops' && activeJob) startWork(activeJob);
                else navTo(lastView);
            } catch (e) { console.warn("Modo Offline"); }
        }

        function navTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            localStorage.setItem('tajho_view', v);
            if(v === 'historial') renderHistory();
            if(v === 'crear') renderPreList();
        }

        function goHome() { navTo('home'); }

        // BÚSQUEDA SMART
        function smartSearch() {
            const input = document.getElementById('s-sku').value.toUpperCase().trim();
            const resDiv = document.getElementById('search-results');
            if(input.length < 1) { resDiv.classList.add('hidden'); return; }
            const matches = raw_data.filter(i => String(i.CODIGO).toUpperCase().includes(input) || String(i.DESCRIPCION).toUpperCase().includes(input)).slice(0,5);
            resDiv.innerHTML = matches.map(m => `<div onclick="selectProduct('${m.CODIGO}','${m.DESCRIPCION}')" class="p-5 border-b border-slate-50 active:bg-blue-50 text-[10px] font-black uppercase tracking-widest text-slate-600">${m.CODIGO} <br> <span class="text-blue-600 text-[8px]">${m.DESCRIPCION}</span></div>`).join('');
            resDiv.classList.remove('hidden');
        }

        function selectProduct(s,d) {
            document.getElementById('s-sku').value = s; document.getElementById('s-desc').value = d;
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('s-meta').focus();
        }

        // CREACIÓN
        function addMani() {
            const sku = document.getElementById('s-sku').value.toUpperCase().trim();
            const meta = parseInt(document.getElementById('s-meta').value);
            if(!sku || !meta) return;
            currentMani.push({ sku, desc: db_tajho[sku] || "GENERICO", meta, real: 0 });
            localStorage.setItem('tajho_current', JSON.stringify(currentMani));
            renderPreList();
            document.getElementById('s-sku').value = ''; document.getElementById('s-meta').value = '';
        }

        function renderPreList() {
            document.getElementById('pre-list').innerHTML = currentMani.map(i => `<div class="p-5 bg-slate-50 rounded-2xl text-[10px] font-black uppercase border border-slate-100 flex justify-between"><span>${i.sku}</span> <span class="text-blue-600">${i.meta} CJ</span></div>`).join('');
            if(currentMani.length > 0) document.getElementById('btn-finalizar-crear').classList.remove('hidden');
        }

        // MODAL
        function openConfirm() { document.getElementById('modal-confirm').classList.add('open'); }
        function closeConfirm() { document.getElementById('modal-confirm').classList.remove('open'); }

        function continuarConteo() {
            closeConfirm();
            activeJob = { id: Date.now(), name: "CONT-" + new Date().getHours() + ":" + new Date().getMinutes(), items: [...currentMani], status: 'PROCESO' };
            localStorage.setItem('tajho_active_job', JSON.stringify(activeJob));
            startWork(activeJob);
        }

        function guardarContenedor() {
            closeConfirm();
            history.push({ id: Date.now(), name: "MANI-" + new Date().toLocaleTimeString(), items: [...currentMani], status: 'PENDIENTE' });
            localStorage.setItem('tajho_history', JSON.stringify(history));
            currentMani = []; localStorage.removeItem('tajho_current');
            navTo('historial');
        }

        // HISTORIAL
        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="card-modern p-6 flex justify-between items-center bg-white border-l-4 ${h.status === 'COMPLETADO' ? 'border-l-green-400' : 'border-l-blue-400'}">
                    <div><p class="text-[8px] font-black ${h.status === 'COMPLETADO' ? 'text-green-500' : 'text-blue-500'} uppercase mb-1 tracking-widest">${h.status}</p><h4 class="text-sm font-black italic uppercase">${h.name}</h4></div>
                    <button onclick="startWorkById(${h.id})" class="bg-slate-900 text-white px-6 py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest active:scale-90">Operar</button>
                </div>
            `).join('');
        }

        function startWorkById(id) {
            activeJob = history.find(x => x.id === id);
            localStorage.setItem('tajho_active_job', JSON.stringify(activeJob));
            startWork(activeJob);
        }

        // OPERACIÓN (DESCARGA)
        function startWork(job) {
            navTo('ops');
            document.getElementById('sel-sku').innerHTML = job.items.map(i => `<option value="${i.sku}">${i.sku}</option>`).join('');
            syncItem();
        }

        function syncItem() {
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            document.getElementById('live-desc').innerText = item.desc;
            document.getElementById('live-rem').innerText = item.meta - item.real;
            document.getElementById('live-real').innerText = item.real;

            const tMeta = activeJob.items.reduce((a,b) => a+b.meta,0);
            const tReal = activeJob.items.reduce((a,b) => a+b.real,0);
            const pc = Math.min(Math.round((tReal/tMeta)*100), 100);
            document.getElementById('global-bar').style.width = pc + "%";
            document.getElementById('global-pc').innerText = pc + "% COMPLETADO";
            document.getElementById('items-pending-label').innerText = activeJob.items.filter(x => x.real < x.meta).length + " SKUS PENDIENTES";
            localStorage.setItem('tajho_active_job', JSON.stringify(activeJob));
        }

        function registrarBulto() {
            const q = parseInt(document.getElementById('qty-in').value);
            if(!q) return;
            const item = activeJob.items.find(i => i.sku === document.getElementById('sel-sku').value);
            item.real += q;
            document.getElementById('qty-in').value = '';
            syncItem();
            navigator.vibrate(40);
            fetch(CLOUD_URL, {method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: 'CARGA', datos: [new Date().toLocaleString(), item.sku, q] })});
        }

        function checkFinalDescarga() {
            generatePDF();
            activeJob.status = 'COMPLETADO';
            const idx = history.findIndex(h => h.id === activeJob.id);
            if(idx !== -1) history[idx] = activeJob; else history.push(activeJob);
            localStorage.setItem('tajho_history', JSON.stringify(history));
            localStorage.removeItem('tajho_active_job');
            navTo('historial');
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("helvetica", "bold"); doc.text("TAJHO.OS - REPORTE LOGÍSTICO", 14, 20);
            doc.setFontSize(10); doc.setFont("helvetica", "normal"); doc.text("Identificador: " + activeJob.name, 14, 30);
            doc.autoTable({
                startY: 40, head: [['SKU', 'PRODUCTO', 'META', 'REAL', 'DIF']],
                body: activeJob.items.map(i => [i.sku, i.desc, i.meta, i.real, i.meta - i.real]),
                theme: 'striped', headStyles: { fillColor: [37, 99, 235] }
            });
            doc.setFont("helvetica", "italic");
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand", 14, doc.lastAutoTable.finalY + 20);
            doc.text("Asist. Inventario Logístico", 14, doc.lastAutoTable.finalY + 26);
            doc.save(`REPORTE_${activeJob.name}.pdf`);
        }

        init();
    </script>
</body>
</html>
