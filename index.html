<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twins Inventory Elite - Web</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #38bdf8; --bg: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .nav-active { color: var(--accent); transform: translateY(-4px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-active::after { content: ''; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
        input, select { background: rgba(15, 23, 42, 0.8) !important; border: 1.5px solid rgba(255, 255, 255, 0.1) !important; color: white !important; transition: all 0.2s ease; }
        input:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1); outline: none; }
        .btn-gradient { background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%); transition: all 0.3s ease; border: none; }
        .btn-gradient:active { transform: scale(0.96); }
    </style>
</head>
<body class="pb-32">

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] max-w-md glass-card rounded-[2.5rem] px-10 py-5 z-50">
        <div class="flex justify-between items-center text-gray-500">
            <button onclick="showSection('devolucion')" id="tab-devolucion" class="nav-active relative"><i data-lucide="package" class="w-6 h-6"></i></button>
            <button onclick="showSection('contadores')" id="tab-contadores" class="relative"><i data-lucide="bar-chart-3" class="w-6 h-6"></i></button>
            <button onclick="showSection('historial')" id="tab-historial" class="relative"><i data-lucide="history" class="w-6 h-6"></i></button>
        </div>
    </nav>

    <main class="p-6 max-w-xl mx-auto space-y-10">
        
        <header class="flex justify-between items-center mt-6">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter italic">Twins <span class="text-sky-400">Elite</span></h1>
                <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mt-1">Gestión de Inventario Web</p>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-sky-500/10 flex items-center justify-center border border-sky-500/20 text-sky-400">
                <i data-lucide="globe" class="w-6 h-6"></i>
            </div>
        </header>

        <section id="sec-devolucion" class="space-y-6">
            <div class="glass-card p-7 rounded-[2.5rem] space-y-5">
                <h2 class="text-sky-400 text-[10px] font-black uppercase tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 bg-sky-400 rounded-full animate-pulse"></span> Nueva Entrada
                </h2>
                <input type="text" id="cliente" placeholder="Nombre del Cliente" class="w-full p-4 rounded-2xl outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <select id="vendedor" class="p-4 rounded-2xl outline-none text-sm font-semibold">
                        <option value="">Vendedor</option>
                        <option>Elias Ávila</option>
                        <option>Evelyn Muro</option>
                        <option>Regulo Antezana</option>
                        <option>Paula García</option>
                        <option>Jhayro Mauricio</option>
                    </select>
                    <input type="number" id="cajasGuia" placeholder="Cajas Guía" class="p-4 rounded-2xl outline-none text-center font-bold">
                </div>
            </div>

            <div class="glass-card p-7 rounded-[2.5rem] space-y-4 border-l-4 border-sky-500">
                <h3 class="text-white text-sm font-bold opacity-80">Agregar Productos</h3>
                <input type="text" id="producto" placeholder="SKU o Descripción" class="w-full p-4 rounded-2xl outline-none">
                <div class="flex gap-3">
                    <input type="number" id="cantAprobada" placeholder="00" class="w-1/3 p-4 rounded-2xl outline-none font-black text-sky-400 text-center text-xl">
                    <button onclick="agregarALista()" class="w-2/3 btn-gradient rounded-2xl font-bold flex items-center justify-center gap-2">
                        <i data-lucide="plus" class="w-5 h-5"></i> AÑADIR
                    </button>
                </div>
            </div>

            <div id="contenedor-tabla" class="hidden glass-card rounded-[2.5rem] overflow-hidden border border-white/5 shadow-2xl">
                <div class="max-h-72 overflow-y-auto">
                    <table class="w-full text-left">
                        <thead class="bg-white/5 text-[9px] uppercase font-black text-gray-500">
                            <tr>
                                <th class="p-5">Producto</th>
                                <th class="p-5 text-center">Cant</th>
                                <th class="p-5 text-center">Obs</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpo-tabla" class="text-sm divide-y divide-white/5"></tbody>
                    </table>
                </div>
                <button onclick="finalizarReporte()" class="w-full p-6 bg-sky-500/10 hover:bg-sky-500 text-sky-400 hover:text-white font-black uppercase tracking-widest text-xs transition-all">
                    Finalizar y Generar PDF
                </button>
            </div>
        </section>

        <section id="sec-contadores" class="hidden space-y-6"></section>

        <section id="sec-historial" class="hidden space-y-6"></section>
    </main>

    <script>
        lucide.createIcons();
        let productosTemporales = [];
        let historialReportes = JSON.parse(localStorage.getItem('twins_pro_v3')) || [];

        function showSection(section) {
            ['devolucion', 'contadores', 'historial'].forEach(s => {
                document.getElementById(`sec-${s}`).classList.add('hidden');
                document.getElementById(`tab-${s}`).classList.remove('nav-active');
            });
            document.getElementById(`sec-${section}`).classList.remove('hidden');
            document.getElementById(`tab-${section}`).classList.add('nav-active');
            if(section === 'contadores') actualizarContadores();
            if(section === 'historial') actualizarHistorial();
        }

        function agregarALista() {
            const nombre = document.getElementById('producto').value;
            const aprobada = document.getElementById('cantAprobada').value;
            if (!nombre || !aprobada) return;
            productosTemporales.push({ nombre, aprobada, observacion: "" });
            renderizarTabla();
            document.getElementById('producto').value = '';
            document.getElementById('cantAprobada').value = '';
        }

        function renderizarTabla() {
            const tabla = document.getElementById('contenedor-tabla');
            const cuerpo = document.getElementById('cuerpo-tabla');
            tabla.classList.toggle('hidden', productosTemporales.length === 0);
            cuerpo.innerHTML = productosTemporales.map((item, i) => `
                <tr class="hover:bg-white/5 transition-colors">
                    <td class="p-5 font-semibold text-gray-200 uppercase text-xs">${item.nombre}</td>
                    <td class="p-5 text-center font-black text-sky-400 text-lg">${item.aprobada}</td>
                    <td class="p-5 text-center">
                        <button onclick="addObs(${i})" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center mx-auto">
                            <i data-lucide="message-square" class="w-4 h-4 ${item.observacion ? 'text-green-400' : 'text-gray-500'}"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function addObs(i) {
            const val = prompt("Nota técnica del ítem:", productosTemporales[i].observacion);
            if (val !== null) { productosTemporales[i].observacion = val; renderizarTabla(); }
        }

        function finalizarReporte() {
            const cliente = document.getElementById('cliente').value;
            const vendedor = document.getElementById('vendedor').value;
            const cajas = parseInt(document.getElementById('cajasGuia').value) || 0;
            if (!cliente || !vendedor) return alert("Por favor complete Cliente y Vendedor.");

            const reporte = {
                id: Date.now(),
                fechaCompleta: new Date().toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }),
                timestamp: Date.now(),
                cliente, vendedor, cajas,
                items: [...productosTemporales]
            };

            historialReportes.unshift(reporte);
            localStorage.setItem('twins_pro_v3', JSON.stringify(historialReportes));
            productosTemporales = [];
            renderizarTabla();
            document.getElementById('cliente').value = '';
            document.getElementById('cajasGuia').value = '';
            showSection('historial');
        }

        function actualizarContadores() {
            const lista = document.getElementById('sec-contadores');
            const mesActual = new Date().getMonth();
            const nombreMes = new Intl.DateTimeFormat('es-ES', { month: 'long' }).format(new Date());
            const vendedores = ["Elias Ávila", "Evelyn Muro", "Regulo Antezana", "Paula García", "Jhayro Mauricio"];
            const stats = {};
            vendedores.forEach(v => stats[v] = 0);
            historialReportes.forEach(rep => {
                if(new Date(rep.timestamp).getMonth() === mesActual) {
                    if(stats[rep.vendedor] !== undefined) stats[rep.vendedor] += rep.cajas;
                }
            });

            lista.innerHTML = `
                <div class="glass-card p-8 rounded-[2.5rem] text-center mb-6">
                    <h2 class="text-2xl font-black uppercase tracking-tighter">${nombreMes}</h2>
                    <p class="text-gray-500 text-[10px] font-bold uppercase mt-1">Acumulado Mensual por Vendedor</p>
                </div>
                ${vendedores.map(v => `
                    <div class="glass-card p-6 rounded-3xl flex justify-between items-center mb-4">
                        <p class="text-xs text-gray-400 font-bold uppercase">${v}</p>
                        <p class="text-2xl font-black text-white">${stats[v]} <span class="text-sky-400 text-xs font-medium">CAJAS</span></p>
                    </div>
                `).join('')}
            `;
            lucide.createIcons();
        }

        function actualizarHistorial() {
            const lista = document.getElementById('sec-historial');
            lista.innerHTML = `
                <h2 class="text-xl font-extrabold mb-6 px-2">Historial de Reportes</h2>
                ${historialReportes.map((rep, idx) => `
                    <div class="glass-card p-6 rounded-[2.5rem] border-l-4 border-sky-500 mb-6 shadow-xl">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-[9px] text-sky-400 font-black uppercase mb-1">${rep.fechaCompleta}</p>
                                <h3 class="text-lg font-extrabold text-white uppercase">${rep.cliente}</h3>
                                <p class="text-[11px] text-gray-400">Vend: ${rep.vendedor}</p>
                            </div>
                            <div class="bg-sky-500/10 text-sky-400 px-4 py-2 rounded-2xl text-center">
                                <span class="block text-xl font-black">${rep.cajas}</span>
                                <span class="text-[8px] font-bold uppercase">Cajas</span>
                            </div>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="exportPDF(${idx})" class="flex-1 py-4 bg-white/5 hover:bg-sky-500 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 transition-all">
                                <i data-lucide="download" class="w-4 h-4"></i> Descargar PDF
                            </button>
                            <button onclick="alert('LISTA:\\n${rep.items.map(i => '• ' + i.nombre + ' [' + i.aprobada + ']').join('\\n')}')" 
                                    class="w-14 h-14 bg-white/5 text-gray-400 rounded-2xl flex items-center justify-center border border-white/5">
                                <i data-lucide="list" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                `).join('')}
            `;
            lucide.createIcons();
        }

        function exportPDF(idx) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const r = historialReportes[idx];

            // Cabecera Corporativa
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 45, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22); doc.setFont("helvetica", "bold"); doc.text("TWINS ELITE", 15, 22);
            doc.setFontSize(9); doc.setFont("helvetica", "normal"); doc.text("REPORTE DE CONTROL LOGÍSTICO E INVENTARIO", 15, 30);
            doc.text(`REGISTRO ID: #TR-${r.id.toString().slice(-6)}`, 160, 22);

            // Datos
            doc.setTextColor(40, 40, 40); doc.setFontSize(11); doc.setFont("helvetica", "bold"); doc.text("DETALLES DEL REGISTRO", 15, 58);
            doc.setDrawColor(200, 200, 200); doc.line(15, 60, 195, 60);

            doc.setFontSize(10); doc.setFont("helvetica", "normal");
            doc.text(`CLIENTE:`, 15, 70); doc.setFont("helvetica", "bold"); doc.text(`${r.cliente.toUpperCase()}`, 45, 70);
            doc.setFont("helvetica", "normal"); doc.text(`VENDEDOR:`, 15, 78); doc.text(`${r.vendedor}`, 45, 78);
            doc.text(`FECHA / HORA:`, 15, 86); doc.text(`${r.fechaCompleta}`, 45, 86);
            doc.text(`TOTAL CAJAS:`, 15, 94); doc.setFontSize(12); doc.setTextColor(37, 99, 235); doc.text(`${r.cajas}`, 45, 94);

            // Tabla
            doc.autoTable({
                startY: 105,
                head: [['ÍTEM / PRODUCTO', 'CANTIDAD', 'OBSERVACIÓN']],
                body: r.items.map(i => [i.nombre.toUpperCase(), i.aprobada, i.observacion || '-']),
                headStyles: { fillColor: [15, 23, 42], fontSize: 9, halign: 'center' },
                styles: { fontSize: 9, cellPadding: 5 },
                columnStyles: { 1: { halign: 'center', fontStyle: 'bold' } },
                margin: { left: 15, right: 15 }
            });

            // Firma Autorizada
            const finalY = doc.lastAutoTable.finalY + 30;
            doc.setDrawColor(180, 180, 180); doc.line(70, finalY, 140, finalY);
            doc.setFontSize(9); doc.setTextColor(100, 100, 100); doc.setFont("helvetica", "italic");
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 105, finalY + 10, { align: "center" });

            doc.save(`Reporte_Twins_${r.cliente.replace(/\s+/g, '_')}.pdf`);
        }
    </script>
</body>
</html>
