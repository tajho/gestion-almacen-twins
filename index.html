<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajho.OS v11 - Proporción Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #0f172a; overflow: hidden; }
        
        /* Contenedor principal con scroll interno para no mover la UI fija */
        .main-scroll { height: calc(100vh - 160px); overflow-y: auto; padding-bottom: 20px; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 2rem; border: 1px solid rgba(255,255,255,0.5); }
        .input-neo { background: #f1f5f9; border-radius: 1.25rem; box-shadow: inset 2px 2px 5px #e2e8f0, inset -2px -2px 5px #ffffff; }
        .btn-pro { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border-radius: 1.25rem; box-shadow: 0 8px 15px -3px rgba(15, 23, 42, 0.2); transition: all 0.2s; }
        .btn-pro:active { transform: scale(0.97); }

        .tab-content { display: none; }
        .tab-active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .progress-fill { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body>

    <header class="px-6 pt-6 pb-2 flex justify-between items-center max-w-md mx-auto">
        <div class="flex flex-col">
            <h1 class="text-xl font-[800] tracking-tighter text-slate-900 uppercase leading-none">Tajho<span class="text-blue-600">.OS</span></h1>
            <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest mt-1">System Active</span>
        </div>
        <div class="bg-blue-50 px-3 py-1.5 rounded-2xl border border-blue-100 flex items-center gap-2">
            <div class="w-1.5 h-1.5 bg-blue-600 rounded-full animate-pulse"></div>
            <p id="timer-val" class="text-[10px] font-bold text-blue-600 font-mono">00:00:00</p>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4">
        
        <div class="main-scroll">
            
            <section id="tab-recepcion" class="tab-content tab-active space-y-4">
                
                <div id="stats-panel" class="hidden">
                    <div class="bg-slate-900 rounded-[2.2rem] p-6 text-white shadow-xl relative overflow-hidden">
                        <div class="flex justify-between items-end mb-4">
                            <div>
                                <p class="text-[8px] font-black text-blue-400 uppercase tracking-widest">Contenedor</p>
                                <h2 id="global-perc" class="text-4xl font-black italic leading-none mt-1">0%</h2>
                            </div>
                            <div class="text-right">
                                <p id="global-counter" class="text-sm font-bold">0 / 0</p>
                                <p class="text-[7px] font-black text-slate-500 uppercase">Cajas Totales</p>
                            </div>
                        </div>
                        <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                            <div id="global-bar" class="progress-fill h-full bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.5)]" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div id="config-card" class="glass-panel p-6 space-y-4">
                    <div class="flex items-center gap-2">
                        <span class="text-sm">📦</span>
                        <h3 class="text-[10px] font-black text-slate-800 uppercase tracking-widest">Configurar Contenedor</h3>
                    </div>
                    <div class="grid grid-cols-5 gap-2">
                        <input type="text" id="in-cod" placeholder="CÓD" class="col-span-2 input-neo p-3.5 text-xs text-center uppercase font-bold outline-none">
                        <input type="number" id="in-meta" placeholder="CANT" class="col-span-2 input-neo p-3.5 text-xs text-center font-bold outline-none">
                        <button onclick="addPackingItem()" class="col-span-1 bg-blue-600 text-white rounded-xl font-bold">+</button>
                    </div>
                    
                    <div id="mini-list" class="space-y-1.5 max-h-48 overflow-y-auto"></div>
                    
                    <button id="btn-start-ops" onclick="startOperations()" class="hidden w-full btn-pro py-4 text-[10px] text-white font-black uppercase tracking-widest">Iniciar Descarga</button>
                </div>

                <div id="ops-panel" class="hidden space-y-4">
                    <div class="glass-panel p-6 text-center space-y-4 border-2 border-blue-50">
                        <select id="op-select" class="w-full bg-transparent text-center font-black text-slate-700 text-sm outline-none"></select>
                        <div class="flex items-center justify-center gap-4">
                            <input type="number" id="op-input" placeholder="0" class="w-32 text-6xl font-black text-slate-900 bg-transparent text-center outline-none">
                        </div>
                        <button onclick="submitCount()" class="w-full btn-pro py-4 text-[11px] text-white font-black uppercase tracking-widest">Confirmar Ingreso</button>
                    </div>
                    <div id="items-grid" class="space-y-2"></div>
                    <button onclick="closeContainerReport()" class="w-full py-4 border-2 border-slate-200 text-slate-400 rounded-2xl font-black text-[10px] uppercase">Finalizar Operación</button>
                </div>
            </section>

            <section id="tab-devolucion" class="tab-content space-y-4">
                <div class="glass-panel p-6 space-y-4">
                    <h3 class="text-[10px] font-black text-slate-800 uppercase tracking-widest">Nueva Devolución</h3>
                    <input type="text" id="dev-cli" placeholder="Vendedor / Cliente" class="input-neo w-full p-4 text-xs font-bold outline-none">
                    <input type="text" id="dev-sku" placeholder="Código de Producto" class="input-neo w-full p-4 text-xs font-bold uppercase outline-none">
                    <input type="number" id="dev-qty" placeholder="Cantidad" class="input-neo w-full p-4 text-xs font-bold outline-none">
                    <textarea id="dev-note" placeholder="Motivo..." class="input-neo w-full p-4 text-xs font-bold outline-none h-24"></textarea>
                    <button onclick="saveDevolution()" class="w-full btn-pro py-4 text-white text-[10px] font-black uppercase">Registrar Retorno</button>
                </div>
            </section>

            <section id="tab-historial" class="tab-content space-y-3">
                <div id="hist-container" class="space-y-3"></div>
            </section>

        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-100 px-8 py-4 flex justify-between items-end z-50 rounded-t-[2.5rem] shadow-2xl">
        <button onclick="switchTab('tab-recepcion', this)" class="flex flex-col items-center text-blue-600 transition-all">
            <span class="text-xl">📦</span>
            <span class="text-[8px] font-black uppercase mt-1">Carga</span>
        </button>
        <button onclick="switchTab('tab-devolucion', this)" class="flex flex-col items-center text-slate-300 transition-all">
            <span class="text-xl">🔄</span>
            <span class="text-[8px] font-black uppercase mt-1">Devol.</span>
        </button>
        <button onclick="switchTab('tab-historial', this)" class="flex flex-col items-center text-slate-300 transition-all">
            <span class="text-xl">📄</span>
            <span class="text-[8px] font-black uppercase mt-1">Historial</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;
        let pList = [];
        let timer;
        let sec = 0;

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(id).classList.add('tab-active');
            const btns = el.parentElement.querySelectorAll('button');
            btns.forEach(b => b.classList.replace('text-blue-600', 'text-slate-300'));
            el.classList.replace('text-slate-300', 'text-blue-600');
            if(id === 'tab-historial') renderHistory();
        }

        function addPackingItem() {
            const cod = document.getElementById('in-cod').value.toUpperCase();
            const meta = parseInt(document.getElementById('in-meta').value);
            if(!cod || !meta) return;
            pList.push({ cod, meta, real: 0 });
            renderMiniList();
            document.getElementById('in-cod').value = "";
            document.getElementById('in-meta').value = "";
            document.getElementById('btn-start-ops').classList.remove('hidden');
        }

        function renderMiniList() {
            const cont = document.getElementById('mini-list');
            cont.innerHTML = pList.map(p => `
                <div class="flex justify-between items-center p-3 bg-white rounded-xl border border-slate-100 shadow-sm text-[10px] font-bold">
                    <span class="text-slate-900">${p.cod}</span>
                    <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-lg">${p.meta} UNIDADES</span>
                </div>
            `).join('');
        }

        function startOperations() {
            document.getElementById('config-card').classList.add('hidden');
            document.getElementById('stats-panel').classList.remove('hidden');
            document.getElementById('ops-panel').classList.remove('hidden');
            const sel = document.getElementById('op-select');
            sel.innerHTML = pList.map(p => `<option value="${p.cod}">${p.cod}</option>`).join('');
            timer = setInterval(() => {
                sec++;
                const h = Math.floor(sec/3600).toString().padStart(2,'0');
                const m = Math.floor((sec%3600)/60).toString().padStart(2,'0');
                const s = (sec%60).toString().padStart(2,'0');
                document.getElementById('timer-val').innerText = `${h}:${m}:${s}`;
            }, 1000);
            updateView();
        }

        function submitCount() {
            const cod = document.getElementById('op-select').value;
            const cant = parseInt(document.getElementById('op-input').value);
            if(!cant) return;
            pList.find(p => p.cod === cod).real += cant;
            document.getElementById('op-input').value = "";
            updateView();
        }

        function updateView() {
            const tPlan = pList.reduce((a,b) => a + b.meta, 0);
            const tReal = pList.reduce((a,b) => a + b.real, 0);
            const perc = Math.round((tReal / tPlan) * 100) || 0;
            document.getElementById('global-perc').innerText = perc + "%";
            document.getElementById('global-bar').style.width = Math.min(perc, 100) + "%";
            document.getElementById('global-counter').innerText = `${tReal} / ${tPlan}`;
            const grid = document.getElementById('items-grid');
            grid.innerHTML = pList.map(p => `
                <div class="glass-panel p-4 flex justify-between items-center border-l-4 border-l-blue-600 shadow-sm">
                    <div>
                        <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">${p.cod}</p>
                        <p class="text-xs font-black text-slate-800">${p.real} / ${p.meta}</p>
                    </div>
                    <div class="w-24 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-600" style="width: ${Math.min((p.real/p.meta)*100, 100)}%"></div>
                    </div>
                </div>`).join('');
        }

        function closeContainerReport() {
            clearInterval(timer);
            const reportID = "TJ-" + Math.floor(1000 + Math.random() * 9000);
            const storage = JSON.parse(localStorage.getItem('tajho_v11_data') || '[]');
            const record = { id: reportID, tipo: 'Recepción', fecha: new Date().toLocaleString(), tiempo: document.getElementById('timer-val').innerText, data: [...pList] };
            storage.unshift(record);
            localStorage.setItem('tajho_v11_data', JSON.stringify(storage));
            const doc = new jsPDF();
            doc.setFontSize(20); doc.text("REPORTE TAJHO.OS v11", 14, 20);
            const rows = pList.map(i => [i.cod, i.meta, i.real, (i.real >= i.meta ? 'OK' : 'FALTANTE')]);
            doc.autoTable({ startY: 30, head: [['COD', 'PLAN', 'REAL', 'ESTADO']], body: rows });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 15);
            doc.save(`${reportID}_Tajho.pdf`);
            location.reload();
        }

        function renderHistory() {
            const cont = document.getElementById('hist-container');
            const storage = JSON.parse(localStorage.getItem('tajho_v11_data') || '[]');
            cont.innerHTML = storage.length ? storage.map(h => `
                <div class="glass-panel p-5 flex justify-between items-center shadow-sm">
                    <div>
                        <p class="text-[7px] font-black text-blue-500 uppercase">${h.tipo}</p>
                        <h4 class="font-bold text-slate-800 text-sm">${h.id}</h4>
                        <p class="text-[8px] text-slate-400 font-medium">${h.fecha}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-black text-slate-900 italic">${h.tiempo}</p>
                    </div>
                </div>`).join('') : "<p class='text-center py-20 text-slate-400 text-xs uppercase font-bold tracking-widest'>Sin registros</p>";
        }

        function saveDevolution() {
            const cli = document.getElementById('dev-cli').value;
            if(!cli) return;
            const storage = JSON.parse(localStorage.getItem('tajho_v11_data') || '[]');
            storage.unshift({ id: "DEV-" + Math.floor(100), tipo: 'Devolución', fecha: new Date().toLocaleString(), tiempo: 'N/A' });
            localStorage.setItem('tajho_v11_data', JSON.stringify(storage));
            alert("Devolución Guardada");
            switchTab('tab-historial', document.querySelectorAll('nav button')[2]);
        }
    </script>
</body>
</html>
