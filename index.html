<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJHO.OS v14 - Diseño Original Optimizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2563eb; --bg: #f4f7fa; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #0f172a; overflow: hidden; height: 100vh; }
        
        /* Recuperando las tarjetas del diseño original */
        .glass-card { background: white; border-radius: 2.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.03); border: 1px solid rgba(255,255,255,0.8); }
        
        /* Inputs elegantes como en tus fotos */
        .input-tajho { background: #f8fafc; border-radius: 1.5rem; border: 2px solid transparent; transition: all 0.2s; font-weight: 700; text-align: center; }
        .input-tajho:focus { border-color: #2563eb; background: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        .main-scroll { height: calc(100vh - 140px); overflow-y: auto; padding-bottom: 2rem; scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Botón Pro */
        .btn-main { background: #2563eb; border-radius: 1.5rem; color: white; font-weight: 800; font-size: 0.8rem; letter-spacing: 0.05em; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }
        .btn-main:active { transform: scale(0.96); }

        .tab-active { color: #2563eb !important; }
    </style>
</head>
<body class="flex flex-col">

    <header class="px-8 pt-6 pb-4 flex justify-between items-start shrink-0 bg-transparent">
        <div>
            <h1 class="text-2xl font-[800] tracking-tighter text-slate-900 uppercase leading-none">TAJHO<span class="text-blue-600">.OS</span></h1>
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Inventory Management V14</p>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-[8px] font-black text-slate-300 uppercase mb-1">Efficiency Timer</span>
            <div class="bg-blue-50 px-3 py-1.5 rounded-2xl border border-blue-100">
                <p id="timer-val" class="text-[11px] font-black text-blue-600 font-mono">00:00:00</p>
            </div>
        </div>
    </header>

    <main class="main-scroll no-scrollbar px-6">
        
        <section id="tab-recepcion" class="space-y-4 pt-2">
            
            <div id="stats-panel" class="hidden">
                <div class="bg-[#0f172a] rounded-[2.5rem] p-7 text-white shadow-2xl relative overflow-hidden">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Progreso Global</p>
                            <h2 id="global-perc" class="text-5xl font-black italic mt-1 leading-none">0%</h2>
                        </div>
                        <div class="text-right">
                            <p id="global-counter" class="text-lg font-black text-white leading-none">0 / 0</p>
                            <p class="text-[9px] font-bold text-slate-500 uppercase mt-1">Unidades Totales</p>
                        </div>
                    </div>
                    <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                        <div id="global-bar" class="h-full bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.6)] duration-700" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div id="config-card" class="glass-card p-7 space-y-5">
                <div class="flex items-center gap-3 mb-2">
                    <div class="p-2 bg-blue-50 rounded-xl text-lg">📦</div>
                    <h3 class="font-extrabold text-slate-800 text-sm tracking-tight uppercase">Configurar Contenedor</h3>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Código SKU</label>
                        <input type="text" id="in-cod" placeholder="XXC" class="input-tajho w-full p-4 uppercase outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Cant. Total</label>
                        <input type="number" id="in-meta" placeholder="000" class="input-tajho w-full p-4 outline-none">
                    </div>
                </div>
                
                <button onclick="addPackingItem()" class="w-full py-4 btn-main shadow-none bg-slate-50 text-slate-400 hover:bg-blue-600 hover:text-white transition-all uppercase font-black text-[10px]">Añadir al Manifiesto</button>
                
                <div id="mini-list" class="max-h-40 overflow-y-auto space-y-2 no-scrollbar"></div>
                
                <button id="btn-start-ops" onclick="startOperations()" class="hidden w-full btn-main py-5 uppercase tracking-[0.15em] text-[11px]">Iniciar Recepción en Tiempo Real</button>
            </div>

            <div id="ops-panel" class="hidden space-y-4">
                <div class="glass-card p-8 text-center space-y-5">
                    <div class="flex flex-col items-center">
                        <select id="op-select" class="bg-transparent font-black text-slate-800 text-xl outline-none mb-2"></select>
                        <div class="w-16 h-1 bg-blue-600 rounded-full opacity-20"></div>
                    </div>
                    <input type="number" id="op-input" placeholder="0" class="w-full text-7xl font-black text-slate-900 bg-transparent text-center outline-none">
                    <button onclick="submitCount()" class="w-full btn-main py-5 text-sm uppercase">Registrar Bulto</button>
                </div>
                
                <div id="items-grid" class="space-y-3"></div>
                
                <button onclick="closeContainerReport()" class="w-full py-4 text-slate-300 font-bold text-[9px] uppercase tracking-[0.2em]">Finalizar y Guardar Reporte</button>
            </div>
        </section>

        <section id="tab-devolucion" class="hidden space-y-4 pt-2">
            <div class="glass-card p-8 space-y-4">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Registro de Retornos</h3>
                <input type="text" id="dev-cli" placeholder="NOMBRE DEL CLIENTE" class="input-tajho w-full p-4 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="dev-sku" placeholder="CÓDIGO" class="input-tajho w-full p-4 uppercase outline-none">
                    <input type="number" id="dev-qty" placeholder="CANT" class="input-tajho w-full p-4 outline-none">
                </div>
                <textarea id="dev-note" placeholder="MOTIVO..." class="input-tajho w-full p-4 h-28 outline-none text-left"></textarea>
                <button onclick="saveDevolution()" class="w-full btn-main py-5 bg-blue-600">Guardar Devolución</button>
            </div>
        </section>

        <section id="tab-historial" class="hidden space-y-4 pt-2">
            <div class="sticky top-0 bg-[#f4f7fa] pb-4 z-10">
                <input type="text" id="hist-search" oninput="filterHistory()" placeholder="🔍 Buscar por código o ID..." class="input-tajho w-full p-4 text-left shadow-sm">
            </div>
            <div id="hist-container" class="space-y-3"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white h-24 flex justify-around items-center z-50 rounded-t-[2.5rem] shadow-[0_-15px_40px_rgba(0,0,0,0.04)] px-6">
        <button onclick="switchTab('tab-recepcion', this)" class="flex flex-col items-center flex-1 tab-active">
            <span class="text-2xl mb-1">📥</span>
            <span class="text-[9px] font-black uppercase tracking-tighter">Carga</span>
        </button>
        <button onclick="switchTab('tab-devolucion', this)" class="flex flex-col items-center flex-1 text-slate-300">
            <span class="text-2xl mb-1">🔄</span>
            <span class="text-[9px] font-black uppercase tracking-tighter">Devolu.</span>
        </button>
        <button onclick="switchTab('tab-historial', this)" class="flex flex-col items-center flex-1 text-slate-300">
            <span class="text-2xl mb-1">📂</span>
            <span class="text-[9px] font-black uppercase tracking-tighter">Historial</span>
        </button>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;
        let pList = [];
        let sec = 0, timer;

        function switchTab(id, el) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-slate-300'));
            el.classList.add('tab-active');
            if(id === 'tab-historial') renderHistory();
        }

        function addPackingItem() {
            const cod = document.getElementById('in-cod').value.toUpperCase();
            const meta = parseInt(document.getElementById('in-meta').value);
            if(!cod || !meta) return;
            pList.push({ cod, meta, real: 0 });
            renderMiniList();
            document.getElementById('in-cod').value = "";
            document.getElementById('in-meta').value = "";
            document.getElementById('btn-start-ops').classList.remove('hidden');
        }

        function renderMiniList() {
            const cont = document.getElementById('mini-list');
            cont.innerHTML = pList.map((p, idx) => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <span class="text-xs font-black text-slate-800">${p.cod}</span>
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-bold text-blue-600">${p.meta} UNIDADES</span>
                        <button onclick="pList.splice(${idx},1);renderMiniList()" class="text-slate-300">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function startOperations() {
            document.getElementById('config-card').classList.add('hidden');
            document.getElementById('stats-panel').classList.remove('hidden');
            document.getElementById('ops-panel').classList.remove('hidden');
            document.getElementById('op-select').innerHTML = pList.map(p => `<option value="${p.cod}">${p.cod}</option>`).join('');
            timer = setInterval(() => {
                sec++;
                const h = Math.floor(sec/3600).toString().padStart(2,'0');
                const m = Math.floor((sec%3600)/60).toString().padStart(2,'0');
                const s = (sec%60).toString().padStart(2,'0');
                document.getElementById('timer-val').innerText = `${h}:${m}:${s}`;
            }, 1000);
            updateView();
        }

        function submitCount() {
            const cod = document.getElementById('op-select').value;
            const cant = parseInt(document.getElementById('op-input').value);
            if(!cant) return;
            pList.find(p => p.cod === cod).real += cant;
            document.getElementById('op-input').value = "";
            updateView();
            navigator.vibrate(50);
        }

        function updateView() {
            const tPlan = pList.reduce((a,b) => a + b.meta, 0);
            const tReal = pList.reduce((a,b) => a + b.real, 0);
            const perc = Math.round((tReal / tPlan) * 100) || 0;
            document.getElementById('global-perc').innerText = perc + "%";
            document.getElementById('global-bar').style.width = Math.min(perc, 100) + "%";
            document.getElementById('global-counter').innerText = `${tReal} / ${tPlan}`;
            
            const grid = document.getElementById('items-grid');
            grid.innerHTML = pList.map(p => `
                <div class="glass-card p-5 flex justify-between items-center border-l-[6px] ${p.real >= p.meta ? 'border-l-green-500' : 'border-l-blue-600'}">
                    <div>
                        <p class="text-[9px] font-black text-slate-400 uppercase">${p.cod}</p>
                        <p class="text-sm font-black text-slate-800">${p.real} / ${p.meta}</p>
                    </div>
                    <div class="w-24 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-600" style="width: ${Math.min((p.real/p.meta)*100, 100)}%"></div>
                    </div>
                </div>`).join('');
        }

        function closeContainerReport() {
            clearInterval(timer);
            const reportID = "TJ-" + Math.floor(1000 + Math.random() * 9000);
            const time = document.getElementById('timer-val').innerText;
            const storage = JSON.parse(localStorage.getItem('tajho_v14_data') || '[]');
            storage.unshift({ id: reportID, tipo: 'RECEPCIÓN', fecha: new Date().toLocaleString(), tiempo: time, data: [...pList] });
            localStorage.setItem('tajho_v14_data', JSON.stringify(storage));
            
            const doc = new jsPDF();
            doc.setFontSize(22); doc.text("REPORTE OPERATIVO TAJHO.OS", 14, 25);
            doc.setFontSize(10); doc.text(`ID: ${reportID} | FECHA: ${new Date().toLocaleDateString()}`, 14, 32);
            doc.autoTable({ startY: 40, head: [['SKU', 'META', 'REAL', 'ESTADO']], body: pList.map(i => [i.cod, i.meta, i.real, i.real >= i.meta ? 'COMPLETO' : 'FALTANTE']), theme: 'striped', headStyles: {fillColor: [37, 99, 235]} });
            doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico.", 14, doc.lastAutoTable.finalY + 15);
            doc.save(`${reportID}_Tajho.pdf`);
            location.reload();
        }

        function renderHistory(filter = "") {
            const cont = document.getElementById('hist-container');
            const storage = JSON.parse(localStorage.getItem('tajho_v14_data') || '[]');
            const filtered = storage.filter(h => h.id.includes(filter) || h.tipo.includes(filter) || (h.data && h.data.some(d => d.cod.includes(filter))));
            
            cont.innerHTML = filtered.map(h => `
                <div class="glass-card p-6 flex justify-between items-center">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="w-2 h-2 rounded-full ${h.tipo === 'RECEPCIÓN' ? 'bg-blue-600' : 'bg-orange-500'}"></span>
                            <h4 class="font-black text-slate-800 text-xs">${h.id}</h4>
                        </div>
                        <p class="text-[9px] text-slate-400 font-bold uppercase">${h.fecha}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-black text-blue-600 font-mono italic">${h.tiempo}</p>
                        <p class="text-[7px] font-black text-slate-300 uppercase">Tiempo Carga</p>
                    </div>
                </div>`).join('') || "<div class='py-20 text-center opacity-20 font-black text-xs uppercase'>Sin registros</div>";
        }

        function filterHistory() { renderHistory(document.getElementById('hist-search').value.toUpperCase()); }

        function saveDevolution() {
            const cli = document.getElementById('dev-cli').value;
            if(!cli) return;
            const storage = JSON.parse(localStorage.getItem('tajho_v14_data') || '[]');
            storage.unshift({ id: "DEV-" + Math.floor(Math.random()*999), tipo: 'DEVOLUCIÓN', fecha: new Date().toLocaleString(), tiempo: '---', data: [{cod: document.getElementById('dev-sku').value}] });
            localStorage.setItem('tajho_v14_data', JSON.stringify(storage));
            alert("Devolución Guardada Exitosamente"); 
            switchTab('tab-historial', document.querySelectorAll('nav button')[2]);
        }
    </script>
</body>
</html>
