<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twins Elite Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --primary: #0F172A; --bg: #F8FAFC; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--primary); -webkit-tap-highlight-color: transparent; user-select: none; }
        
        /* Tus estilos originales se mantienen */
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); position: sticky; top: 0; z-index: 50; }
        .native-card { background: #FFFFFF; border-radius: 24px; border: 1px solid #E2E8F0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .native-card:active { transform: scale(0.97); }
        .search-bar { background: #FFFFFF; border: 1.5px solid #E2E8F0; border-radius: 18px; }
        .fab-sync { position: fixed; bottom: 100px; right: 25px; width: 64px; height: 64px; background: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; z-index: 40; }
        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Estilos Auditoría */
        #audit-view { display: none; position: fixed; inset: 0; background: #F8FAFC; z-index: 1000; flex-direction: column; }
        .audit-item-card { background: #FFFFFF; border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid #F1F5F9; position: relative; }

        /* MODAL DEVOLUCIONES (NUEVO) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #E2E8F0; display: flex; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); z-index: 90; border-radius: 30px 30px 0 0;}
        .nav-btn { flex: 1; padding: 16px 0; display: flex; flex-direction: column; align-items: center; color: #94A3B8; transition: all 0.3s ease; }
        .nav-btn.active { color: #2563EB; }
        .nav-btn i { font-size: 24px; }
        .nav-btn span { font-size: 10px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body class="antialiased">

    <div class="glass-header px-6 py-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p id="module-subtitle" class="text-[10px] font-black text-blue-600 uppercase tracking-widest">tajho</p>
                <h1 id="module-title" class="text-xl font-extrabold text-slate-900">TWINS AUDITORIA</h1>
            </div>
            <div id="header-progress-box" class="relative flex items-center justify-center">
                <svg class="w-12 h-12">
                    <circle class="text-slate-100" stroke-width="4" stroke="currentColor" fill="transparent" r="20" cx="24" cy="24"/>
                    <circle id="global-ring" class="text-blue-600 progress-ring" stroke-width="4" stroke-dasharray="125.6" stroke-dashoffset="125.6" stroke-linecap="round" stroke="currentColor" fill="transparent" r="20" cx="24" cy="24"/>
                </svg>
                <span id="global-perc" class="absolute text-[10px] font-bold">0%</span>
            </div>
        </div>
    </div>

    <div id="module-audit" class="max-w-md mx-auto px-6 pb-32">
        <div class="grid grid-cols-2 gap-3 my-6">
            <div class="bg-white p-4 rounded-[22px] border border-slate-100 shadow-sm"><i class="ph-fill ph-package text-blue-500 text-xl"></i><p id="stat-containers" class="text-2xl font-black">0</p><p class="text-[9px] font-bold text-slate-400 uppercase">Cargas</p></div>
            <div class="bg-white p-4 rounded-[22px] border border-slate-100 shadow-sm"><i class="ph-fill ph-barcode text-purple-500 text-xl"></i><p id="stat-skus" class="text-2xl font-black">0</p><p class="text-[9px] font-bold text-slate-400 uppercase">SKUs</p></div>
        </div>
        <div class="flex gap-2 mb-8">
            <div class="flex-1 search-bar flex items-center px-4 py-1"><i class="ph-bold ph-magnifying-glass text-slate-400 mr-3"></i><input type="text" id="main-search" oninput="core.render()" placeholder="Contenedor, SKU..." class="w-full py-3 bg-transparent outline-none font-semibold text-sm"></div>
            <div class="w-14 h-14 bg-white border border-slate-100 rounded-[18px] flex items-center justify-center relative"><i class="ph-bold ph-calendar-blank text-slate-400 text-xl"></i><select id="month-select" onchange="core.filterMonth(this.value)" class="absolute inset-0 opacity-0"></select></div>
        </div>
        <div id="container-list" class="space-y-4"></div>
        <button onclick="core.fetchData()" class="fab-sync"><i id="sync-icon" class="ph-bold ph-arrows-clockwise text-white text-2xl"></i></button>
    </div>

    <div id="module-returns" class="hidden max-w-md mx-auto px-6 pb-32 pt-6">
        <div class="bg-white rounded-[24px] p-6 border shadow-sm mb-6">
            <div class="space-y-4">
                <input type="text" id="dev-cliente" oninput="core.dev.saveDraft()" placeholder="Nombre del Cliente" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold outline-none">
                
                <div class="grid grid-cols-1 gap-4">
                    <select id="dev-vendedor" onchange="core.dev.saveDraft()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold outline-none">
                        <option value="">Seleccionar Vendedor</option>
                        <option value="ELIAS AVILA">ELIAS AVILA</option><option value="EVELYN MURO">EVELYN MURO</option>
                        <option value="REGULO ANTEZANA">REGULO ANTEZANA</option><option value="JHAYRO MAURICIO">JHAYRO MAURICIO</option>
                        <option value="PAULA GARCIA">PAULA GARCIA</option>
                    </select>
                    <input type="text" id="dev-motivo" oninput="core.dev.saveDraft()" placeholder="Motivo de Devolución" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold outline-none">
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[24px] p-6 border shadow-sm mb-6">
            <p class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Agregar Artículo</p>
            <div class="space-y-4">
                <div class="relative">
                    <input type="text" id="dev-search-prod" oninput="core.dev.searchProduct()" placeholder="Buscar Código o Descripción..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold outline-none">
                    <div id="dev-results" class="absolute z-10 w-full mt-1 bg-white border rounded-xl shadow-xl max-h-48 overflow-y-auto hidden"></div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="dev-cant" placeholder="Cantidad U/M" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-black text-center">
                    <select id="dev-estado" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold">
                        <option value="BUEN ESTADO">BUEN ESTADO</option>
                        <option value="DAÑADO A MERMA">DAÑADO A MERMA</option>
                        <option value="INCOMPLETO">INCOMPLETO</option>
                    </select>
                </div>
                <textarea id="dev-obs" placeholder="Observaciones..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold h-20 outline-none"></textarea>
                <button onclick="core.dev.addItem()" class="w-full bg-blue-600 text-white h-12 rounded-xl font-black text-xs uppercase tracking-widest">Añadir a la lista</button>
            </div>
        </div>

        <div id="dev-items-list" class="space-y-3 mb-6"></div>
        <button id="btn-save-dev" onclick="core.dev.save()" class="w-full bg-slate-900 text-white h-14 rounded-2xl font-black text-sm uppercase tracking-widest hidden">Generar Reporte de Devolución</button>
        
        <div class="mt-10 border-t pt-6">
            <p class="text-[10px] font-black text-slate-400 uppercase mb-4">Historial Reciente</p>
            <div id="dev-history" class="space-y-3"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="core.nav('audit')" id="nav-audit" class="nav-btn active"><i class="ph-fill ph-boxes"></i><span>Auditoría</span></button>
        <button onclick="core.nav('returns')" id="nav-returns" class="nav-btn"><i class="ph-fill ph-arrow-u-up-left"></i><span>Devolución</span></button>
    </div>

    <div id="audit-view">
        </div>

    <script>
        const core = {
            url: "https://script.google.com/macros/s/AKfycbyPs1JqifjBcC1glGOtYct9hTT61SNGSa55l4cxtJ5a-BqRD5Fq4Q_Bml9cC4d7XCwb/exec", // Pon tu URL aquí
            raw: JSON.parse(localStorage.getItem('twins_cache')) || [],
            prodMaster: [], // Hoja 1
            mesesNombre: ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"],
            
            // --- NAVEGACIÓN ---
            nav: function(m) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('nav-'+m).classList.add('active');
                document.getElementById('module-audit').style.display = m === 'audit' ? 'block' : 'none';
                document.getElementById('module-returns').style.display = m === 'returns' ? 'block' : 'none';
                document.getElementById('module-title').innerText = m === 'audit' ? 'TWINS AUDITORIA' : 'DEVOLUCIONES';
                document.getElementById('header-progress-box').style.display = m === 'audit' ? 'flex' : 'none';
                if(m === 'returns') { this.dev.init(); }
            },

            // --- TU LÓGICA DE AUDITORÍA ORIGINAL (NO TOCAR) ---
            fetchData: async function(s) { /* Tu función fetchData original */ },
            render: function() { /* Tu función render original */ },
            openAudit: function(id) { /* Tu función openAudit original */ },
            // ... (Todas tus funciones originales)

            // --- NUEVO MÓDULO DE DEVOLUCIONES (INDEPENDIENTE) ---
            dev: {
                items: [],
                init: async function() {
                    this.loadDraft();
                    this.fetchHistory();
                    if(core.prodMaster.length === 0) {
                        const res = await fetch(core.url + "?type=productos");
                        core.prodMaster = await res.json();
                    }
                },
                searchProduct: function() {
                    const term = document.getElementById('dev-search-prod').value.toLowerCase();
                    const box = document.getElementById('dev-results');
                    if(term.length < 2) { box.classList.add('hidden'); return; }
                    const matches = core.prodMaster.filter(p => p.CODIGO.toString().toLowerCase().includes(term) || p.DESCRIPCION.toLowerCase().includes(term)).slice(0, 10);
                    box.innerHTML = matches.map(p => `<div onclick="core.dev.select('${p.CODIGO}','${p.DESCRIPCION}')" class="p-3 border-b text-xs font-bold active:bg-slate-100">${p.CODIGO} - ${p.DESCRIPCION}</div>`).join('');
                    box.classList.remove('hidden');
                },
                select: function(c, d) {
                    document.getElementById('dev-search-prod').value = c + " - " + d;
                    this.selected = { c, d };
                    document.getElementById('dev-results').classList.add('hidden');
                },
                addItem: function() {
                    const cant = document.getElementById('dev-cant').value;
                    if(!this.selected || !cant) return;
                    this.items.push({ codigo: this.selected.c, descripcion: this.selected.d, cantidad: cant, estado: document.getElementById('dev-estado').value, observaciones: document.getElementById('dev-obs').value });
                    this.renderList();
                    this.saveDraft();
                },
                renderList: function() {
                    const l = document.getElementById('dev-items-list');
                    l.innerHTML = this.items.map((i, idx) => `<div class="bg-white p-4 rounded-xl border flex justify-between items-center text-xs font-bold"><div><p class="text-blue-600">${i.codigo}</p>${i.descripcion}</div><div class="text-right">x${i.cantidad}<br>${i.estado}</div></div>`).join('');
                    document.getElementById('btn-save-dev').classList.toggle('hidden', this.items.length === 0);
                },
                saveDraft: function() {
                    const d = { c: document.getElementById('dev-cliente').value, v: document.getElementById('dev-vendedor').value, m: document.getElementById('dev-motivo').value, i: this.items };
                    localStorage.setItem('twins_dev_draft', JSON.stringify(d));
                },
                loadDraft: function() {
                    const d = JSON.parse(localStorage.getItem('twins_dev_draft'));
                    if(d) { document.getElementById('dev-cliente').value = d.c; document.getElementById('dev-vendedor').value = d.v; document.getElementById('dev-motivo').value = d.m; this.items = d.i || []; this.renderList(); }
                },
                save: async function() {
                    const data = { action: "guardar_devolucion", fecha: new Date().toLocaleDateString(), cliente: document.getElementById('dev-cliente').value, vendedor: document.getElementById('dev-vendedor').value, motivo: document.getElementById('dev-motivo').value, items: this.items };
                    await fetch(core.url, { method: 'POST', body: JSON.stringify(data) });
                    this.generatePDF(data);
                    this.items = []; localStorage.removeItem('twins_dev_draft');
                    location.reload();
                },
                fetchHistory: async function() {
                    const res = await fetch(core.url + "?type=historial_dev");
                    const h = await res.json();
                    document.getElementById('dev-history').innerHTML = h.reverse().slice(0,5).map(i => `<div class="bg-white p-3 rounded-xl border text-[10px] font-bold"><span>${i.FECHA}</span> - <span>${i.CLIENTE}</span></div>`).join('');
                },
                generatePDF: function(data) {
                    const { jsPDF } = window.jspdf; const doc = new jsPDF();
                    doc.setFontSize(18); doc.text("TICKET DE DEVOLUCION", 14, 20);
                    doc.setFontSize(10); doc.text(`CLIENTE: ${data.cliente}`, 14, 30); doc.text(`VENDEDOR: ${data.vendedor}`, 14, 35); doc.text(`MOTIVO: ${data.motivo}`, 14, 40);
                    doc.autoTable({ startY: 45, head: [['COD', 'DESC', 'CANT', 'ESTADO']], body: data.items.map(i => [i.codigo, i.descripcion, i.cantidad, i.estado]) });
                    doc.text("Revisión autorizada por J. Angelo Nuñez Durand Asist. Inventario Logístico", 14, doc.lastAutoTable.finalY + 10);
                    doc.save(`Devolucion_${data.cliente}.pdf`);
                }
            }
        };

        window.onload = () => { core.fetchData(true); core.nav('audit'); };
    </script>
</body>
</html>
